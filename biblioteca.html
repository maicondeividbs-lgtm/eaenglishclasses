// Slugify para nome de arquivo: remove acentos/símbolos
function slugify(s) {
  return (s || 'card')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '')
    .slice(0, 60);
}

// Carrega o html2canvas (~195KB) sob demanda — só na 1ª vez que o professor
// clica em "Baixar". Depois fica em cache (resolve na hora nas próximas vezes).
let _h2cPromise = null;
function ensureHtml2Canvas() {
  if (typeof html2canvas !== 'undefined') return Promise.resolve();
  if (_h2cPromise) return _h2cPromise;
  _h2cPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'html2canvas.min.js';
    s.onload = () => resolve();
    s.onerror = () => { _h2cPromise = null; reject(new Error('Falha ao carregar html2canvas')); };
    document.head.appendChild(s);
  });
  return _h2cPromise;
}

// Baixa o card de gramática atual como imagem PNG
async function downloadGramAsPNG() {
  const ex = window._currentGramEx;
  if (!ex) return;

  const dlBtn = document.getElementById('gramDownloadBtn');
  const lbl = dlBtn.querySelector('.gram-foot-label');
  // Feedback: estado "gerando" (já cobre o tempo de baixar a biblioteca na 1ª vez)
  dlBtn.disabled = true;
  dlBtn.classList.add('is-loading');
  dlBtn.classList.remove('is-success');
  if (lbl) lbl.textContent = 'Gerando…';

  // Garante que o html2canvas está disponível (carrega na 1ª vez)
  try {
    await ensureHtml2Canvas();
  } catch (e) {
    dlBtn.classList.remove('is-loading');
    dlBtn.disabled = false;
    if (lbl) lbl.textContent = 'Baixar';
    showToast('Não foi possível carregar o gerador de imagem.');
    return;
  }

  // Elemento a capturar: o modal-box inteiro
  const modalBox = document.querySelector('#gramModal .modal-box');
  const modalBody = document.getElementById('gramBody');

  // Salvar estados a restaurar depois
  const closeBtn = document.getElementById('gramCloseBtn');
  const foot = document.getElementById('gramFoot');
  const prevBodyMaxH = modalBody.style.maxHeight;
  const prevBodyOverflow = modalBody.style.overflowY;
  const prevBoxMaxH = modalBox.style.maxHeight;
  const prevBoxHeight = modalBox.style.height;
  const footPrevDisplay = foot.style.display;
  const closePrevDisplay = closeBtn.style.display;

  // Para a captura: esconder rodapé + fechar e expandir o corpo
  foot.style.display = 'none';
  closeBtn.style.display = 'none';
  modalBody.style.maxHeight = 'none';
  modalBody.style.overflowY = 'visible';
  modalBox.style.maxHeight = 'none';
  modalBox.style.height = 'auto';

  try {
    // Pequena pausa para o layout reagir
    await new Promise(r => setTimeout(r, 60));

    const canvas = await html2canvas(modalBox, {
      backgroundColor: '#ffffff',
      scale: 2,            // 2x para alta resolução
      useCORS: true,
      logging: false,
      windowWidth: modalBox.scrollWidth,
      windowHeight: modalBox.scrollHeight
    });

    // Gerar nome de arquivo
    const topic = (ex.topic || 'card').replace(/<[^>]+>/g, '');
    const levelTag = window._currentGramLevel || '';
    const filename = 'gramatica-' + slugify(topic) + (levelTag ? '-' + slugify(levelTag) : '') + '.png';

    // Baixar
    const link = document.createElement('a');
    link.download = filename;
    link.href = canvas.toDataURL('image/png');
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    // Feedback: sucesso
    dlBtn.classList.remove('is-loading');
    dlBtn.classList.add('is-success');
    if (lbl) lbl.textContent = 'Baixado ✓';
    setTimeout(() => {
      dlBtn.classList.remove('is-success');
      dlBtn.disabled = false;
      if (lbl) lbl.textContent = 'Baixar imagem';
    }, 2200);
  } catch (err) {
    console.error('Erro ao gerar PNG:', err);
    dlBtn.classList.remove('is-loading');
    if (lbl) lbl.textContent = 'Erro — tentar de novo';
    dlBtn.disabled = false;
    showToast('Não foi possível gerar a imagem.');
  } finally {
    // Restaurar estados
    foot.style.display = footPrevDisplay;
    closeBtn.style.display = closePrevDisplay;
    modalBody.style.maxHeight = prevBodyMaxH;
    modalBody.style.overflowY = prevBodyOverflow;
    modalBox.style.maxHeight = prevBoxMaxH;
    modalBox.style.height = prevBoxHeight;
  }
}

// Copia os exemplos (inglês + tradução) do card atual como texto limpo
function copyGramExamples() {
  const ex = window._currentGramEx;
  const body = document.getElementById('gramBody');
  if (!body) return;

  // Converte um elemento em texto legível, tratando <br> como quebra de linha
  function cleanText(el) {
    const clone = el.cloneNode(true);
    Array.prototype.slice.call(clone.querySelectorAll('br')).forEach(function (br) {
      br.replaceWith('\n');
    });
    return clone.textContent.replace(/\u00a0/g, ' ').replace(/[ \t]{2,}/g, ' ')
      .split('\n').map(function (s) { return s.trim(); }).filter(Boolean).join('\n').trim();
  }

  // Percorre TODAS as seções do pop-up (Explicação, Estrutura, Exemplos, Dica…)
  const sections = Array.prototype.slice.call(body.querySelectorAll('.gram-section'));
  const parts = [];
  sections.forEach(function (sec) {
    const titleEl = sec.querySelector('.gram-section-title');
    const title = titleEl ? titleEl.textContent.trim() : '';
    const secBody = sec.querySelector('.gram-section-body');
    const lines = [];
    if (secBody) {
      Array.prototype.slice.call(secBody.children).forEach(function (node) {
        if (node.classList && node.classList.contains('gram-subhead')) {
          lines.push('— ' + node.textContent.trim());
        } else if ((node.classList && node.classList.contains('gram-bullets')) || node.tagName === 'UL' || node.tagName === 'OL') {
          Array.prototype.slice.call(node.querySelectorAll('li')).forEach(function (li) {
            const eng = li.querySelector('.gram-eng');
            const trans = li.querySelector('.gram-trans');
            if (eng || trans) {
              const e = eng ? eng.textContent.trim() : '';
              const t = trans ? trans.textContent.trim() : '';
              lines.push('• ' + (t ? (e + ' ' + t) : e));
            } else {
              lines.push('• ' + cleanText(li));
            }
          });
        } else {
          const txt = cleanText(node);
          if (txt) lines.push(txt);
        }
      });
    }
    if (title || lines.length) {
      parts.push(title.toUpperCase() + (lines.length ? '\n' + lines.join('\n') : ''));
    }
  });

  if (!parts.length) { showToast('Nada para copiar.'); return; }

  const topic = ex ? (ex.topic || '').replace(/<[^>]+>/g, '').trim() : '';
  const ref = ex ? (ex.ref || '').trim() : '';
  const header = [topic, ref].filter(Boolean).join('\n');
  const text = (header ? header + '\n\n' : '') +
    parts.join('\n\n') +
    '\n\nEA English Classes · Biblioteca Pedagógica';

  const cpBtn = document.getElementById('gramCopyBtn');
  const clbl = cpBtn ? cpBtn.querySelector('.gram-foot-label') : null;
  const markCopied = function () {
    if (cpBtn) cpBtn.classList.add('is-success');
    if (clbl) clbl.textContent = 'Copiado ✓';
    showToast('Conteúdo copiado!');
    setTimeout(function () {
      if (cpBtn) cpBtn.classList.remove('is-success');
      if (clbl) clbl.textContent = 'Copiar conteúdo';
    }, 2200);
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(markCopied).catch(function () {
      fallbackCopy(text, markCopied);
    });
  } else {
    fallbackCopy(text, markCopied);
  }
}

// Cópia de reserva (navegadores antigos / sem permissão de clipboard)
function fallbackCopy(text, onOk) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.top = '-1000px';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok && onOk) onOk();
    else showToast('Não foi possível copiar.');
  } catch (e) {
    showToast('Não foi possível copiar.');
  }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'bib-toast';
  t.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' + msg;
  document.body.appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity 0.3s, transform 0.3s';
    t.style.opacity = '0';
    t.style.transform = 'translateY(10px)';
    setTimeout(() => t.remove(), 320);
  }, 2400);
}

function escapeHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ═══ EVENT DELEGATION ═══
document.addEventListener('click', (e) => {
  // Journey level
  const jStep = e.target.closest('.j-step');
  if (jStep) { setLevel(jStep.dataset.level); return; }
  // Tab
  const tab = e.target.closest('.bib-tab');
  if (tab) { setView(tab.dataset.view); return; }
  // Conversação: abrir pop-up da unidade
  const convOpen = e.target.closest('[data-conv-open]');
  if (convOpen) { openConvUnit(parseInt(convOpen.dataset.convOpen, 10)); return; }
  // Conversação: copiar perguntas (no pop-up)
  if (e.target.closest('#convCopyBtn')) { if (window._convUnit) copyConvUnit(window._convUnit.n, document.getElementById('convCopyBtn')); return; }
  // Conversação: fechar pop-up
  if (e.target.closest('#convCloseBtn') || e.target.id === 'convModal') { document.getElementById('convModal').classList.remove('open'); return; }
  // Carrossel currículo: prev
  if (e.target.closest('[data-cur-prev]')) { goCarousel(curCarouselState.index - 1); return; }
  // Carrossel currículo: next
  if (e.target.closest('[data-cur-next]')) { goCarousel(curCarouselState.index + 1); return; }
  // Carrossel currículo: dot (ir direto)
  const curDot = e.target.closest('[data-cur-go]');
  if (curDot) { goCarousel(parseInt(curDot.dataset.curGo, 10)); return; }
  // Copy worksheet link
  const copyBtn = e.target.closest('[data-copy]');
  if (copyBtn) {
    navigator.clipboard.writeText(copyBtn.dataset.copy)
      .then(() => showToast('Link copiado!'))
      .catch(() => showToast('Erro ao copiar.'));
    return;
  }
  // Gram card
  const gramCard = e.target.closest('[data-gram-idx]');
  if (gramCard) { openGram(parseInt(gramCard.dataset.gramIdx)); return; }
  // Modal copiar exemplos
  if (e.target.closest('#gramCopyBtn')) {
    copyGramExamples();
    return;
  }
  // Modal download (gerar PNG)
  if (e.target.closest('#gramDownloadBtn')) {
    downloadGramAsPNG();
    return;
  }
  // Modal close
  if (e.target.closest('#gramCloseBtn')) {
    document.getElementById('gramModal').classList.remove('open');
    return;
  }
  // Click outside modal box
  if (e.target.id === 'gramModal') {
    document.getElementById('gramModal').classList.remove('open');
  }
});

// Search input
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(window._searchTimer);
  window._searchTimer = setTimeout(render, 180);
});

// Escape to close modal + setas no carrossel
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { document.getElementById('gramModal').classList.remove('open'); document.getElementById('convModal').classList.remove('open'); }
  // Setas só navegam o carrossel quando estamos na aba Currículo e modal fechado
  const modalOpen = document.getElementById('gramModal').classList.contains('open');
  const searchFocused = document.activeElement && document.activeElement.id === 'searchInput';
  if (!modalOpen && !searchFocused && currentView === 'curriculum') {
    if (e.key === 'ArrowLeft') { goCarousel(curCarouselState.index - 1); }
    else if (e.key === 'ArrowRight') { goCarousel(curCarouselState.index + 1); }
  }
});

render();
</script>
