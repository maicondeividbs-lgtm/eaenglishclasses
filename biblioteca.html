<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca — EA English Classes</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css">
<!-- html2canvas (~195KB) NÃO é carregado aqui: só é baixado sob demanda, quando o
     professor clica em "Baixar" no card de gramática (ver ensureHtml2Canvas no rodapé). -->
<style>
/* ════════════════════════════════════════════════════════
   📚 BIBLIOTECA PEDAGÓGICA — Timeline Design (v7.3)
   Inspirado em cursos.html, com linha do tempo cinematográfica
   ════════════════════════════════════════════════════════ */

* { box-sizing: border-box; }

/* === HERO === */
.bib-hero {
  background: linear-gradient(135deg, var(--navy) 0%, #1a2d6d 60%, #253c96 100%);
  padding: 80px 0 120px;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.bib-hero::before {
  content: '';
  position: absolute;
  top: -30%; right: -10%;
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(243,107,46,0.18), transparent 60%);
  border-radius: 50%;
  animation: heroBlobFloat 18s ease-in-out infinite;
}
.bib-hero::after {
  content: '';
  position: absolute;
  bottom: -30%; left: -10%;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(196,231,229,0.12), transparent 60%);
  border-radius: 50%;
  animation: heroBlobFloat 22s ease-in-out infinite reverse;
}
@keyframes heroBlobFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(-30px, 40px) scale(1.08); }
}
.bib-hero .container { position: relative; z-index: 1; }
.bib-back {
  color: rgba(255,255,255,0.55);
  font-size: 13px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 6px;
  margin-bottom: 22px;
  text-decoration: none;
  transition: all 0.2s;
}
.bib-back:hover { color: #fff; transform: translateX(-2px); }
.bib-eyebrow {
  display: inline-block;
  padding: 6px 14px; border-radius: 999px;
  background: rgba(245,154,30,0.15);
  border: 1px solid rgba(245,154,30,0.4);
  color: var(--mango);
  font-size: 11px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 16px;
}
.bib-title {
  font-family: 'Fraunces', serif;
  font-size: clamp(2.2rem, 5vw, 3.4rem);
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
  line-height: 1.05;
}
.bib-title em { color: var(--mango); font-style: italic; }
.bib-sub {
  font-size: 15.5px; opacity: 0.7;
  max-width: 580px; line-height: 1.55;
}

/* Search refinado */
.bib-search {
  position: relative;
  max-width: 460px;
  margin-top: 26px;
}
.bib-search input {
  width: 100%;
  padding: 14px 18px 14px 46px;
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  color: #fff;
  font-family: inherit; font-size: 14px;
  outline: none;
  transition: all 0.25s;
}
.bib-search input::placeholder { color: rgba(255,255,255,0.4); }
.bib-search input:focus {
  border-color: var(--mango);
  background: rgba(255,255,255,0.14);
  box-shadow: 0 0 0 4px rgba(245,154,30,0.12);
}
.bib-search svg {
  position: absolute; left: 16px; top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
}

/* === LEVEL NAVIGATOR (capas dos livros no hero) === */
.journey-wrap {
  margin-top: 44px;
  position: relative;
}
.j-line {
  position: absolute;
  top: 78px;
  left: 8%; right: 8%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18) 18%, rgba(255,255,255,0.18) 82%, transparent);
  z-index: 0;
  pointer-events: none;
}
.journey-bar {
  display: flex;
  justify-content: center;
  gap: clamp(18px, 4vw, 44px);
  position: relative;
  flex-wrap: wrap;
  z-index: 1;
}
.j-step {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
  cursor: pointer;
  padding: 4px;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  background: transparent;
  border: none;
  color: inherit;
  font-family: inherit;
  position: relative;
}
.j-step:hover { transform: translateY(-4px); }

.j-cover {
  width: 92px;
  height: 130px;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.18);
  box-shadow: 0 8px 22px rgba(0,0,0,0.32);
  transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  filter: saturate(0.7) brightness(0.8);
}
.j-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.j-cover::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.35) 100%);
  pointer-events: none;
}
.j-step:hover .j-cover {
  filter: saturate(1) brightness(1);
  border-color: rgba(255,255,255,0.5);
  transform: scale(1.05);
}
.j-step:hover .j-cover img { transform: scale(1.06); }

.j-step.active .j-cover {
  filter: saturate(1.05) brightness(1.02);
  border-color: var(--j-glow, var(--mango));
  box-shadow: 0 12px 32px var(--j-shadow, rgba(245,154,30,0.55)), 0 0 0 4px rgba(255,255,255,0.08);
  transform: scale(1.08);
}
.j-step.active .j-cover::before {
  content: '';
  position: absolute;
  top: 8px; right: 8px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--j-glow, var(--mango));
  box-shadow: 0 0 0 4px rgba(255,255,255,0.25), 0 2px 8px rgba(0,0,0,0.3);
  z-index: 2;
  animation: jDotPulse 2s ease-out infinite;
}
@keyframes jDotPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.25); opacity: 0.7; }
}

.j-label {
  font-size: 11.5px; font-weight: 800;
  opacity: 0.6;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
  transition: all 0.25s;
  text-align: center;
}
.j-step:hover .j-label { opacity: 0.9; }
.j-step.active .j-label { opacity: 1; }

/* Cores por nível — espelhando as capas reais */
.j-step[data-level="intro"] { --j-glow: var(--mango); --j-shadow: rgba(245,154,30,0.55); }
.j-step[data-level="intro"].active .j-label { color: var(--mango); }

.j-step[data-level="lvl1"] { --j-glow: #ef4444; --j-shadow: rgba(239,68,68,0.55); }
.j-step[data-level="lvl1"].active .j-label { color: #f87171; }

.j-step[data-level="lvl2"] { --j-glow: #60a5fa; --j-shadow: rgba(96,165,250,0.55); }
.j-step[data-level="lvl2"].active .j-label { color: #93c5fd; }

.j-step[data-level="lvl3"] { --j-glow: #34d399; --j-shadow: rgba(52,211,153,0.55); }
.j-step[data-level="lvl3"].active .j-label { color: #6ee7b7; }

.j-step[data-level="evolve5"] { --j-glow: #a78bfa; --j-shadow: rgba(167,139,250,0.55); }
.j-step[data-level="evolve5"].active .j-label { color: #c4b5fd; }

.j-step[data-level="evolve6"] { --j-glow: #818cf8; --j-shadow: rgba(129,140,248,0.55); }
.j-step[data-level="evolve6"].active .j-label { color: #a5b4fc; }

/* === TABS (Currículo / Worksheets / Gramática) === */
.bib-tabs-wrap {
  position: relative;
  z-index: 5;
  margin-top: -36px;
  padding: 0 16px;
}
.bib-tabs {
  display: flex;
  gap: 4px;
  background: #fff;
  padding: 6px;
  border-radius: 16px;
  border: 1px solid var(--g100);
  max-width: 580px;
  margin: 0 auto;
  box-shadow: 0 12px 36px rgba(25,36,78,0.12);
}
.bib-tab {
  flex: 1;
  padding: 14px 12px;
  border: none;
  border-radius: 11px;
  background: transparent;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  color: var(--g500);
  cursor: pointer;
  transition: all 0.25s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: -0.005em;
}
.bib-tab:hover { background: var(--g50); color: var(--navy); }
.bib-tab.active {
  background: var(--navy);
  color: #fff;
  box-shadow: 0 4px 12px rgba(25,36,78,0.25);
}
.bib-tab svg { flex-shrink: 0; }

/* ═══ Conversação (perguntas por unidade) ═══ */
.conv-list { display: flex; flex-direction: column; gap: 12px; }
.conv-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.conv-unit { width: 100%; display: flex; align-items: center; gap: 12px; padding: 16px 18px; cursor: pointer; font-family: inherit; text-align: left; }
.conv-unit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(25,36,78,0.10); border-color: rgba(243,107,46,0.35); }
.conv-unit-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.conv-unit .conv-unit-title { white-space: normal; line-height: 1.25; }
.conv-unit-arrow { flex-shrink: 0; color: var(--g300, #cbd2dd); transition: transform .2s, color .2s; }
.conv-unit:hover .conv-unit-arrow { color: var(--orange, #f36b2e); transform: translateX(3px); }
.conv-unit {
  background: #fff;
  border: 1px solid var(--g100, #eef0f4);
  border-radius: 16px;
  overflow: hidden;
  transition: box-shadow .25s, border-color .25s;
}
.conv-unit.open { box-shadow: 0 10px 30px rgba(25,36,78,0.08); border-color: rgba(243,107,46,0.35); }
.conv-unit-head {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 18px;
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  text-align: left;
  min-height: 44px;
}
.conv-unit-emoji { font-size: 22px; flex-shrink: 0; line-height: 1; }
.conv-unit-badge {
  flex-shrink: 0;
  font-size: 11px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase;
  color: var(--orange, #f36b2e);
  background: rgba(243,107,46,0.10);
  padding: 4px 10px; border-radius: 99px;
}
.conv-unit-title {
  flex: 1; min-width: 0;
  font-family: 'Fraunces', Georgia, serif;
  font-size: 17px; font-weight: 600; color: var(--navy, #19244e);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.conv-unit-count {
  flex-shrink: 0;
  font-size: 12px; font-weight: 600; color: var(--g500, #6b7280);
}
.conv-chevron { flex-shrink: 0; color: var(--g400, #9ca3af); transition: transform .3s ease; }
.conv-unit.open .conv-chevron { transform: rotate(180deg); color: var(--orange, #f36b2e); }
.conv-unit-body { max-height: 0; overflow: hidden; transition: max-height .35s cubic-bezier(0.16,1,0.3,1); }
.conv-unit.open .conv-unit-body { max-height: 4000px; }
.conv-unit-inner { padding: 0 18px 18px; border-top: 1px solid var(--g100, #eef0f4); }
.conv-unit-tools { display: flex; justify-content: flex-end; padding: 12px 0 4px; }
.conv-copy {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: inherit; font-size: 12px; font-weight: 700;
  color: var(--navy, #19244e);
  background: var(--g50, #f7f8fa);
  border: 1px solid var(--g200, #e5e7eb);
  border-radius: 9px; padding: 8px 12px; cursor: pointer;
  transition: all .2s; min-height: 36px;
}
.conv-copy:hover { background: var(--navy, #19244e); color: #fff; border-color: var(--navy, #19244e); }
.conv-copy.is-success { background: #047857; color: #fff; border-color: #047857; }
.conv-qs { margin: 0; padding: 4px 0 0 0; list-style: none; counter-reset: convq; }
.conv-qs li {
  counter-increment: convq;
  position: relative;
  padding: 11px 6px 11px 40px;
  font-size: 15px; line-height: 1.5; color: var(--g700, #374151);
  border-bottom: 1px solid var(--g50, #f4f5f7);
}
.conv-qs li:last-child { border-bottom: none; }
.conv-qs li::before {
  content: counter(convq);
  position: absolute; left: 0; top: 11px;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800;
  color: var(--blue, #253c96); background: rgba(37,60,150,0.08);
  border-radius: 8px;
}

/* === CONTENT === */
.bib-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}
.bib-view { display: none; }
.bib-view.active { display: block; animation: bibFade 0.45s cubic-bezier(0.4,0,0.2,1); }
@keyframes bibFade {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Section intro */
.view-intro {
  text-align: center;
  margin-bottom: 56px;
}
.view-intro-eyebrow {
  display: inline-block;
  padding: 6px 14px; border-radius: 999px;
  background: var(--mango-soft);
  color: var(--orange);
  font-size: 11px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 14px;
}
.view-intro h2 {
  font-family: 'Fraunces', serif;
  font-size: clamp(1.8rem, 3.5vw, 2.4rem);
  font-weight: 800;
  color: var(--navy);
  letter-spacing: -0.02em;
  margin-bottom: 8px;
  line-height: 1.15;
}
.view-intro h2 em { color: var(--orange); font-style: italic; }
.view-intro p {
  font-size: 14.5px; color: var(--g500);
  max-width: 520px; margin: 0 auto;
  line-height: 1.6;
}

/* ════════════════════════════════════════════════════════
   📋 CURRÍCULO — Carrossel horizontal com zigzag de capa
   ════════════════════════════════════════════════════════ */
.cur-carousel {
  position: relative;
  max-width: 1180px;
  margin: 0 auto;
  padding: 8px 0 40px;
}

/* Track = container que desliza */
.cur-viewport {
  position: relative;
  overflow: hidden;
  border-radius: 24px;
}
.cur-track {
  display: flex;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  will-change: transform;
  touch-action: pan-y;
}
.cur-slide {
  flex: 0 0 100%;
  min-width: 0;
  padding: 24px;
}

/* Card do slide: livro + info, alternando lado */
.cur-row {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 56px;
  align-items: center;
  background: #fff;
  border: 1px solid var(--g100);
  border-radius: 22px;
  padding: 40px 44px;
  box-shadow: 0 12px 40px rgba(25,36,78,0.06);
  position: relative;
  overflow: hidden;
  min-height: 460px;
}
.cur-row::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: linear-gradient(90deg, var(--lvl-color, var(--mango)), var(--lvl-color-2, var(--orange)));
}
.cur-slide:nth-child(even) .cur-row {
  grid-template-columns: 1fr 360px;
}
.cur-slide:nth-child(even) .cur-row-img { order: 2; }
.cur-slide:nth-child(even) .cur-row-info { order: 1; }

/* Lado do livro */
.cur-row-img {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  height: 100%;
}
.cur-book-stage {
  position: relative;
  width: 100%;
  max-width: 320px;
  aspect-ratio: 3 / 4.2;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cur-book-stage::before {
  content: '';
  position: absolute;
  inset: -20px;
  background: radial-gradient(circle at 50% 60%, var(--lvl-color-glow, rgba(245,154,30,0.18)), transparent 65%);
  z-index: 0;
}
.cur-book-stage img {
  position: relative;
  z-index: 1;
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
  border-radius: 6px;
  box-shadow:
    0 20px 50px rgba(0,0,0,0.22),
    0 4px 12px rgba(0,0,0,0.10);
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
}
.cur-row:hover .cur-book-stage img {
  transform: translateY(-6px) rotate(-1.5deg);
}
.cur-unit-badge {
  position: absolute;
  top: 12px; right: 12px;
  z-index: 2;
  width: 64px; height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--lvl-color, var(--mango)), var(--lvl-color-2, var(--orange)));
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Fraunces', serif;
  box-shadow: 0 8px 22px var(--lvl-color-glow, rgba(245,154,30,0.45));
  transform: rotate(8deg);
}
.cur-unit-badge .cur-unit-badge-label {
  font-size: 8.5px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.92;
  line-height: 1;
  margin-bottom: 2px;
}
.cur-unit-badge .cur-unit-badge-num {
  font-size: 24px;
  font-weight: 900;
  line-height: 1;
}

/* Lado da informação */
.cur-row-info {
  min-width: 0;
}
.cur-info-head {
  margin-bottom: 22px;
}
.cur-unit-tag {
  display: inline-block;
  font-size: 10.5px; font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--lvl-color, var(--orange));
  padding: 5px 12px;
  background: var(--lvl-color-soft, var(--mango-soft));
  border-radius: 999px;
  margin-bottom: 14px;
}
.cur-title {
  font-family: 'Fraunces', serif;
  font-size: clamp(22px, 2.6vw, 30px);
  font-weight: 800;
  color: var(--navy);
  letter-spacing: -0.015em;
  line-height: 1.18;
  margin: 0;
}

.cur-meta-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 18px;
}
.cur-meta-item {
  display: flex; gap: 12px;
  align-items: flex-start;
  font-size: 13.5px;
  line-height: 1.5;
}
.cur-meta-icon {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 8px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800;
  letter-spacing: 0.04em;
}
.cur-meta-icon.voc { background: rgba(245,154,30,0.13); color: var(--mango); }
.cur-meta-icon.gra { background: rgba(37,60,150,0.13); color: var(--blue); }
.cur-meta-icon.obj { background: rgba(16,185,129,0.13); color: #10b981; }
.cur-meta-icon.wri { background: rgba(139,92,246,0.13); color: #7c3aed; }
.cur-meta-text { color: var(--g700); flex: 1; min-width: 0; }
.cur-meta-text strong {
  display: block;
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--g400);
  margin-bottom: 3px;
}

/* Setas de navegação */
.cur-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 5;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: #fff;
  border: 1.5px solid var(--g100);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 10px 28px rgba(25,36,78,0.14);
  color: var(--navy);
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  font-family: inherit;
}
.cur-nav:hover:not([disabled]) {
  background: var(--lvl-color, var(--navy));
  border-color: var(--lvl-color, var(--navy));
  color: #fff;
  transform: translateY(-50%) scale(1.08);
}
.cur-nav[disabled] {
  opacity: 0.35;
  cursor: not-allowed;
  box-shadow: 0 4px 10px rgba(25,36,78,0.06);
}
.cur-nav svg { width: 22px; height: 22px; }
.cur-nav-prev { left: -10px; }
.cur-nav-next { right: -10px; }

/* Indicador de progresso */
.cur-progress {
  margin-top: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.cur-progress-info {
  display: flex; align-items: center; gap: 12px;
  font-size: 12.5px;
  color: var(--g500);
  font-weight: 600;
}
.cur-progress-info strong {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 900;
  color: var(--lvl-color, var(--navy));
}
.cur-progress-info .cur-progress-sep {
  width: 1px; height: 16px;
  background: var(--g100);
}
.cur-dots {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 720px;
}
.cur-dot {
  width: 28px; height: 4px;
  background: var(--g100);
  border: none;
  border-radius: 99px;
  cursor: pointer;
  padding: 0;
  transition: all 0.3s ease;
}
.cur-dot:hover { background: var(--g200); transform: scaleY(1.5); }
.cur-dot.active {
  background: var(--lvl-color, var(--mango));
  width: 40px;
}

/* Cores por nível */
.cur-carousel[data-level="intro"] {
  --lvl-color: var(--mango);
  --lvl-color-2: var(--orange);
  --lvl-color-soft: var(--mango-soft);
  --lvl-color-glow: rgba(245,154,30,0.30);
}
.cur-carousel[data-level="lvl1"] {
  --lvl-color: #ef4444;
  --lvl-color-2: #dc2626;
  --lvl-color-soft: #fee2e2;
  --lvl-color-glow: rgba(239,68,68,0.28);
}
.cur-carousel[data-level="lvl2"] {
  --lvl-color: #3b82f6;
  --lvl-color-2: #2563eb;
  --lvl-color-soft: #dbeafe;
  --lvl-color-glow: rgba(59,130,246,0.28);
}
.cur-carousel[data-level="lvl3"] {
  --lvl-color: #10b981;
  --lvl-color-2: #059669;
  --lvl-color-soft: #d1fae5;
  --lvl-color-glow: rgba(16,185,129,0.28);
}

/* ════════════════════════════════════════════════════════
   📄 WORKSHEETS — Timeline horizontal compacta
   ════════════════════════════════════════════════════════ */
.ws-timeline {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
  max-width: 1080px;
  margin: 0 auto;
}
.ws-card {
  background: #fff;
  border: 1.5px solid var(--g100);
  border-radius: 16px;
  padding: 20px 18px;
  display: flex; flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  cursor: default;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  overflow: hidden;
  opacity: 0;
  transform: translateY(20px);
}
.ws-card.in-view {
  opacity: 1; transform: translateY(0);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.ws-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--lvl-color, var(--mango)), var(--lvl-color-2, var(--orange)));
  transform: scaleX(0.3);
  transform-origin: left;
  transition: transform 0.35s ease;
}
.ws-card:hover {
  transform: translateY(-6px);
  border-color: var(--lvl-color, var(--mango));
  box-shadow: 0 16px 40px rgba(25,36,78,0.12);
}
.ws-card:hover::before { transform: scaleX(1); }

.ws-card[data-level="intro"] { --lvl-color: #fbbf24; --lvl-color-2: var(--mango); }
.ws-card[data-level="lvl1"] { --lvl-color: #f87171; --lvl-color-2: #dc2626; }
.ws-card[data-level="lvl2"] { --lvl-color: #60a5fa; --lvl-color-2: #2563eb; }
.ws-card[data-level="lvl3"] { --lvl-color: #6ee7b7; --lvl-color-2: #059669; }
.ws-card[data-level="evolve5"] { --lvl-color: #c4b5fd; --lvl-color-2: #7c3aed; }
.ws-card[data-level="evolve6"] { --lvl-color: #a5b4fc; --lvl-color-2: #4f46e5; }

/* Worksheet ainda não disponível */
.ws-card-soon {
  background: var(--g50, #f8fafc);
  border-style: dashed;
  cursor: default;
}
.ws-card-soon:hover {
  transform: none;
  border-color: var(--g100);
  box-shadow: none;
}
.ws-card-soon:hover::before { transform: scaleX(0.3); }
.ws-card-soon .ws-num-wrap {
  background: linear-gradient(135deg, var(--g100, #e2e8f0) 0%, var(--g200, #cbd5e1) 100%);
  color: var(--g500, #64748b);
}
.ws-card-soon:hover .ws-num-wrap { transform: none; }
.ws-card-soon .ws-label { color: var(--g500, #64748b); }
.ws-soon-tag {
  margin-top: 4px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--g500, #64748b);
  background: var(--g100, #e2e8f0);
  padding: 5px 12px;
  border-radius: 999px;
}

.ws-num-wrap {
  width: 62px; height: 62px;
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--lvl-color, #fbbf24) 0%, var(--lvl-color-2, var(--mango)) 100%);
  color: #fff;
  font-family: 'Fraunces', serif;
  font-size: 28px; font-weight: 900;
  box-shadow: 0 6px 16px rgba(0,0,0,0.10);
  margin-bottom: 4px;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.ws-card:hover .ws-num-wrap {
  transform: rotate(-6deg) scale(1.06);
}
.ws-label {
  font-size: 11px;
  color: var(--g500);
  font-weight: 700;
  text-align: center;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.ws-actions {
  display: flex; gap: 6px;
  margin-top: 8px;
  width: 100%;
}
.ws-btn {
  flex: 1;
  display: inline-flex;
  align-items: center; justify-content: center;
  gap: 4px;
  padding: 9px 8px;
  border-radius: 10px;
  font-size: 11.5px; font-weight: 700;
  text-decoration: none;
  border: none; cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.ws-btn svg { width: 12px; height: 12px; }
.ws-dl {
  background: linear-gradient(135deg, var(--orange), var(--mango));
  color: #fff;
  box-shadow: 0 3px 10px rgba(243,107,46,0.25);
}
.ws-dl:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 14px rgba(243,107,46,0.40);
}
.ws-copy {
  background: var(--g50);
  color: var(--navy);
  border: 1px solid var(--g100);
}
.ws-copy:hover {
  background: var(--navy);
  color: #fff;
  border-color: var(--navy);
}

/* ════════════════════════════════════════════════════════
   💡 GRAMÁTICA — Timeline vertical com cards expansíveis
   ════════════════════════════════════════════════════════ */
.gram-timeline {
  position: relative;
  max-width: 880px;
  margin: 0 auto;
  padding-left: 58px;
}
.gram-timeline::before {
  content: '';
  position: absolute;
  left: 25px;
  top: 16px; bottom: 16px;
  width: 2px;
  background: linear-gradient(180deg,
    transparent,
    var(--lvl-color, var(--blue)) 6%,
    var(--lvl-color, var(--blue)) 94%,
    transparent);
  opacity: 0.4;
  border-radius: 1px;
}
.gram-item {
  position: relative;
  margin-bottom: 16px;
  opacity: 0;
  transform: translateX(-12px);
  transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
}
.gram-item.in-view {
  opacity: 1; transform: translateX(0);
}
.gram-item::before {
  content: '';
  position: absolute;
  left: -40px; top: 26px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  border: 3px solid var(--lvl-color, var(--blue));
  box-shadow: 0 0 0 5px rgba(255,255,255,0.6), 0 4px 10px rgba(25,36,78,0.10);
  z-index: 1;
  transition: all 0.3s ease;
}
.gram-item:hover::before {
  background: var(--lvl-color, var(--blue));
  transform: scale(1.2);
}
.gram-item::after {
  content: '';
  position: absolute;
  left: -26px; top: 32px;
  width: 26px; height: 2px;
  background: var(--lvl-color, var(--blue));
  opacity: 0.35;
}

.gram-card {
  background: #fff;
  border: 1px solid var(--g100);
  border-radius: 16px;
  padding: 18px 22px;
  cursor: pointer;
  transition: all 0.28s cubic-bezier(0.4,0,0.2,1);
  display: flex; align-items: center; gap: 18px;
  position: relative;
  overflow: hidden;
}
.gram-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--lvl-color, var(--blue));
  opacity: 0;
  transition: opacity 0.25s ease;
}
.gram-card:hover {
  transform: translateX(4px);
  border-color: var(--lvl-color, var(--blue));
  box-shadow: 0 10px 28px rgba(25,36,78,0.08);
}
.gram-card:hover::before { opacity: 1; }

.gram-page-badge {
  flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  flex-direction: column;
  width: 58px; height: 58px;
  border-radius: 14px;
  background: var(--lvl-color-soft, var(--blue-soft));
  color: var(--lvl-color, var(--blue));
  font-family: 'Fraunces', serif;
  line-height: 1;
  transition: all 0.25s ease;
}
.gram-card:hover .gram-page-badge {
  background: var(--lvl-color, var(--blue));
  color: #fff;
}
.gram-page-badge .gram-page-label {
  font-size: 8.5px; font-weight: 800;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  opacity: 0.7;
  margin-bottom: 3px;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.gram-page-badge .gram-page-num {
  font-size: 22px; font-weight: 900;
  letter-spacing: -0.02em;
}
.gram-card-body {
  flex: 1; min-width: 0;
}
.gram-topic {
  font-size: 15px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1.4;
  margin-bottom: 5px;
  letter-spacing: -0.01em;
  text-transform: none;
  /* Limita topic muito longo */
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.gram-book-tag {
  font-size: 11px;
  color: var(--g500);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  display: inline-flex; align-items: center; gap: 6px;
}
.gram-book-tag::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--lvl-color, var(--blue));
  opacity: 0.6;
}
.gram-arrow {
  flex-shrink: 0;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--g50);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--g400);
  transition: all 0.25s ease;
}
.gram-card:hover .gram-arrow {
  background: var(--lvl-color, var(--blue));
  color: #fff;
  transform: translateX(2px);
}

.gram-timeline[data-level="intro"] { --lvl-color: #f59a1e; --lvl-color-soft: #fef3c7; }
.gram-timeline[data-level="lvl1"] { --lvl-color: #ef4444; --lvl-color-soft: #fee2e2; }
.gram-timeline[data-level="lvl2"] { --lvl-color: #3b82f6; --lvl-color-soft: #dbeafe; }
.gram-timeline[data-level="lvl3"] { --lvl-color: #10b981; --lvl-color-soft: #d1fae5; }

/* Toast */
.bib-toast {
  position: fixed; bottom: 28px; right: 28px;
  padding: 14px 22px;
  border-radius: 12px;
  background: linear-gradient(135deg, #10b981, #059669);
  color: #fff;
  font-size: 14px; font-weight: 600;
  z-index: 9999;
  display: inline-flex; align-items: center; gap: 10px;
  box-shadow: 0 12px 32px rgba(16,185,129,0.30);
  animation: toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === Seções estruturadas dentro do modal de gramática === */
.modal-body .gram-section {
  margin-bottom: 16px;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--g100);
  background: #fff;
  box-shadow: 0 2px 10px rgba(25,36,78,0.05);
}
.modal-body .gram-section:last-child { margin-bottom: 0; }
.modal-body .gram-section-head {
  padding: 13px 18px;
  display: flex;
  align-items: center;
  gap: 11px;
  font-weight: 800;
  font-size: 12.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border-bottom: 1px solid transparent;
}
.modal-body .gram-section-icon {
  font-size: 16px;
  line-height: 1;
  display: inline-flex;
  width: 30px; height: 30px;
  align-items: center; justify-content: center;
  background: rgba(255,255,255,0.7);
  border-radius: 9px;
  box-shadow: 0 2px 6px rgba(25,36,78,0.10);
  flex-shrink: 0;
}
.modal-body .gram-section-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  letter-spacing: 0.08em;
}
.modal-body .gram-section-body {
  padding: 16px 18px 18px;
  font-size: 14.5px;
  line-height: 1.7;
  color: var(--g700);
}
.modal-body .gram-section-body > *:first-child { margin-top: 0; }
.modal-body .gram-section-body > *:last-child { margin-bottom: 0; }
.modal-body .gram-section-body p {
  margin: 0 0 10px;
  color: var(--g700);
}
.modal-body .gram-section-body .gram-subhead {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 12px;
  font-weight: 800;
  color: var(--navy);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin: 16px 0 10px;
  padding: 8px 12px;
  background: linear-gradient(90deg, var(--g50) 0%, transparent 100%);
  border-left: 3px solid var(--lvl-color-modal, var(--blue));
  border-radius: 6px;
}
.modal-body .gram-section-body .gram-subhead:first-child { margin-top: 0; }
.modal-body .gram-section-body .gram-bullets {
  list-style: none;
  padding: 0;
  margin: 0 0 10px;
}
/* Bullets padrão (usados na seção DICA) */
.modal-body .gram-section-body .gram-bullets li {
  position: relative;
  padding: 9px 0 9px 22px;
  border-bottom: 1px dashed var(--g100);
}
.modal-body .gram-section-body .gram-bullets li:last-child { border-bottom: none; padding-bottom: 4px; }
.modal-body .gram-section-body .gram-bullets li::before {
  content: "";
  position: absolute;
  left: 4px;
  top: 17px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--lvl-color-modal, var(--blue));
}

/* Exemplos: cada item vira um "cartão" numerado — inglês em cima, tradução embaixo */
.modal-body .gram-section-exemplos .gram-bullets {
  display: grid;
  gap: 9px;
  margin-bottom: 0;
  counter-reset: ex;
}
.modal-body .gram-section-exemplos .gram-bullets li {
  padding: 12px 14px 12px 46px;
  border: 1px solid #d6f3e4;
  border-left: 3px solid #10b981;
  border-radius: 12px;
  background: linear-gradient(180deg, #f4fcf8 0%, #ffffff 100%);
  transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  counter-increment: ex;
}
.modal-body .gram-section-exemplos .gram-bullets li:last-child { padding-bottom: 12px; }
.modal-body .gram-section-exemplos .gram-bullets li::before {
  content: counter(ex);
  left: 12px; top: 12px;
  width: 22px; height: 22px;
  display: inline-flex;
  align-items: center; justify-content: center;
  background: #10b981;
  border-radius: 7px;
  color: #fff;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800;
  font-size: 12px;
}
.modal-body .gram-section-exemplos .gram-bullets li:hover {
  transform: translateX(2px);
  border-color: #10b981;
  box-shadow: 0 4px 14px rgba(16,185,129,0.14);
}
.modal-body .gram-section-body .gram-eng {
  display: block;
  color: var(--navy);
  font-weight: 700;
  font-size: 14.5px;
  line-height: 1.5;
}
.modal-body .gram-section-body .gram-trans {
  display: block;
  color: #a16207;
  font-style: italic;
  font-weight: 500;
  font-size: 13.5px;
  line-height: 1.45;
  margin-top: 3px;
}
/* Cores específicas por tipo de seção (cabeçalho colorido) */
.modal-body .gram-section-explicacao {
  border-color: #fde68a;
}
.modal-body .gram-section-explicacao .gram-section-head {
  background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
  color: #92400e;
}
.modal-body .gram-section-estrutura {
  border-color: #bfdbfe;
}
.modal-body .gram-section-estrutura .gram-section-head {
  background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
  color: #1e40af;
}
.modal-body .gram-section-exemplos {
  border-color: #a7f3d0;
}
.modal-body .gram-section-exemplos .gram-section-head {
  background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
  color: #065f46;
}
.modal-body .gram-section-observacoes {
  border-color: #fbcfe8;
}
.modal-body .gram-section-observacoes .gram-section-head {
  background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
  color: #9d174d;
}

/* Rodapé "marca" do card (aparece principalmente no PNG) */
.modal-watermark {
  margin-top: 22px;
  padding-top: 18px;
  border-top: 1px solid var(--g100);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.modal-watermark-brand {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  color: var(--navy);
}
.modal-watermark-mark {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--orange) 0%, var(--mango) 100%);
  display: inline-flex;
  align-items: center; justify-content: center;
  color: #fff;
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: 13px;
  letter-spacing: -0.02em;
  box-shadow: 0 4px 10px rgba(243,107,46,0.30);
}
.modal-watermark-name {
  font-size: 12.5px;
  font-weight: 800;
  letter-spacing: 0.02em;
  color: var(--navy);
}
.modal-watermark-sub {
  font-size: 10.5px;
  font-weight: 600;
  color: var(--g500);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* Modal de gramática */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  z-index: 9999;
  background: rgba(25,36,78,0.65);
  backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
  padding: 20px;
  animation: modalBgIn 0.25s ease;
}
.modal-bg.open { display: flex; }
@keyframes modalBgIn { from { opacity: 0; } to { opacity: 1; } }
.modal-box {
  background: #fff;
  border-radius: 22px;
  max-width: 720px; width: 100%;
  max-height: 88vh;
  overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: 0 32px 80px rgba(0,0,0,0.28);
  animation: modalBoxIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalBoxIn {
  from { transform: translateY(30px) scale(0.96); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}
.modal-head {
  padding: 26px 28px 24px;
  background: linear-gradient(135deg, var(--lvl-color-2, var(--blue)) 0%, var(--lvl-color, var(--blue-light)) 100%);
  color: #fff;
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 16px;
  position: relative;
  overflow: hidden;
}
.modal-head::before {
  content: '';
  position: absolute;
  top: -55%; right: -12%;
  width: 260px; height: 260px;
  background: radial-gradient(circle, rgba(255,255,255,0.20) 0%, transparent 62%);
  border-radius: 50%;
  pointer-events: none;
}
.modal-head::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: rgba(255,255,255,0.22);
  pointer-events: none;
}
.modal-head > * { position: relative; z-index: 1; }
.modal-head-text { min-width: 0; }
.modal-chip {
  display: inline-flex;
  align-items: center;
  height: 24px;
  padding: 0 11px;
  margin-bottom: 11px;
  border-radius: 99px;
  background: rgba(255,255,255,0.22);
  border: 1px solid rgba(255,255,255,0.30);
  color: #fff;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  backdrop-filter: blur(2px);
}
.modal-head h3 {
  font-family: 'Fraunces', serif;
  font-size: 23px; font-weight: 800;
  letter-spacing: -0.01em;
  line-height: 1.22;
  margin: 0;
}
.modal-close {
  flex-shrink: 0;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  border: none;
  color: #fff;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
}
.modal-close:hover { background: rgba(255,255,255,0.35); transform: rotate(90deg); }

{"order": 3, "badge": "3", "topic": "Possessive Adjectives — My, Your, His, Her", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 03 (Unit 1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Os adjetivos possessivos indicam a QUEM algo pertence. Vêm sempre antes do substantivo e NÃO mudam de forma para singular/plural.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ADJETIVOS POSSESSIVOS (1ª e 2ª pessoa do singular + ele/ela)</h5><p>my   → meu, minha<br>your → seu, sua (você)<br>his  → dele<br>her  → dela</p><h5 class=\"gram-subhead\">FÓRMULA</h5><p>POSSESSIVO + SUBSTANTIVO<br>&quot;What's YOUR name?&quot; / &quot;MY name is Carlos.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Hello. What's your name?</span> <span class=\"gram-trans\">(Olá. Qual é o seu nome?)</span></li><li><span class=\"gram-eng\">Hi. My name is Carlos.</span> <span class=\"gram-trans\">(Oi. Meu nome é Carlos.)</span></li><li><span class=\"gram-eng\">What's his name? — His name is Joshua.</span> <span class=\"gram-trans\">(Qual é o nome dele? — O nome dele é Joshua.)</span></li><li><span class=\"gram-eng\">What's her name? — Her name is Isabella.</span> <span class=\"gram-trans\">(Qual é o nome dela? — O nome dela é Isabella.)</span></li><li><span class=\"gram-eng\">What's = What is</span> <span class=\"gram-trans\">(&quot;What's&quot; é a contração de &quot;what is&quot;.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>HIS é para homens; HER é para mulheres — não confunda com he/she (pronomes sujeito).</li><li>Os possessivos NÃO mudam: &quot;his name&quot; ou &quot;his names&quot; — sempre &quot;his&quot;.</li></ul></div></div>"},
{"order": 5, "badge": "5", "topic": "The Verb Be (Afirmativa)", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 05 (Unit 1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O verbo BE é o mais importante do inglês. Equivale a 'ser' e 'estar' em português. Tem três formas no presente: AM, IS e ARE — uma para cada pronome.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FORMAS AFIRMATIVAS</h5><p>I am       (I'm)        You are    (You're)<br>He is      (He's)       We are     (We're)<br>She is     (She's)      They are   (They're)<br>It is      (It's)</p><h5 class=\"gram-subhead\">PERGUNTA — inverte sujeito e verbo</h5><p>&quot;Are you Andrea Clark?&quot; — &quot;Yes, I am. / No, I'm not.&quot;<br>&quot;How are you?&quot; — &quot;I'm fine, thanks.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I'm Lena Garza.</span> <span class=\"gram-trans\">(Eu sou a Lena Garza.)</span></li><li><span class=\"gram-eng\">You're in my class.</span> <span class=\"gram-trans\">(Você está na minha turma.)</span></li><li><span class=\"gram-eng\">She's over there. Andrea is over there.</span> <span class=\"gram-trans\">(Ela está ali. A Andrea está ali.)</span></li><li><span class=\"gram-eng\">He's in our class. Ben is in our class.</span> <span class=\"gram-trans\">(Ele está na nossa turma. O Ben está na nossa turma.)</span></li><li><span class=\"gram-eng\">How are you? — I'm fine, thanks.</span> <span class=\"gram-trans\">(Como você está? — Estou bem, obrigado.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use as contrações (I'm, you're, he's...) na fala — soa mais natural.</li><li>IT'S serve para coisas, animais, tempo e clima: &quot;It's a book&quot;, &quot;It's hot&quot;.</li></ul></div></div>"},
{"order": 10, "badge": "10", "topic": "This/These, It/They; Plurals", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 10 (Unit 2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para apontar e identificar objetos usamos THIS (singular) e THESE (plural). Para retomar o objeto na resposta usamos IT (singular) ou THEY (plural). Substantivos contáveis ganham -S no plural.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">THIS / THESE (apontar)</h5><p>This  → este/esta (singular)<br>These → estes/estas (plural)</p><h5 class=\"gram-subhead\">IT / THEY (retomar)</h5><p>It's   = It is   → para singular<br>They're = They are → para plural</p><h5 class=\"gram-subhead\">PLURAIS</h5><p>Maioria dos substantivos + -S: laptop → laptops, key → keys<br>Substantivos em -s, -sh, -ch + -ES: glass → glasses</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">This is a laptop. — What's this? It's a flash drive.</span> <span class=\"gram-trans\">(Isto é um laptop. — O que é isto? É um pen drive.)</span></li><li><span class=\"gram-eng\">These are laptops. — What are these? They're flash drives.</span> <span class=\"gram-trans\">(Estes são laptops. — O que são estes? São pen drives.)</span></li><li><span class=\"gram-eng\">What are these? — They're keys.</span> <span class=\"gram-trans\">(O que são estes? — São chaves.)</span></li><li><span class=\"gram-eng\">What's this? — It's an umbrella.</span> <span class=\"gram-trans\">(O que é isto? — É um guarda-chuva.)</span></li><li><span class=\"gram-eng\">What are these? — They're sunglasses.</span> <span class=\"gram-trans\">(O que são estes? — São óculos de sol.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Pergunta com THIS → resposta com IT. Pergunta com THESE → resposta com THEY.</li><li>Glasses, sunglasses, headphones são SEMPRE plurais em inglês.</li></ul></div></div>"},
{"order": 11, "badge": "11", "topic": "Yes/No and Where Questions with Be", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 11 (Unit 2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para fazer perguntas com BE, inverte-se a ordem: o verbo (is/are) vem ANTES do sujeito. Respostas curtas usam YES + sujeito + be ou NO + sujeito + be + not.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">YES/NO QUESTIONS</h5><p>Is this your wallet?     → Yes, it is. / No, it's not.<br>Are these your keys?     → Yes, they are. / No, they're not.</p><h5 class=\"gram-subhead\">WHERE QUESTIONS (onde)</h5><p>Where + is/are + sujeito?<br>Where's your wallet?  → It's in my pocket.<br>Where are my keys?    → They're on the table.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Is this your cell phone? — Yes, it is. / No, it's not.</span> <span class=\"gram-trans\">(Este é o seu celular? — Sim, é. / Não, não é.)</span></li><li><span class=\"gram-eng\">Are these your keys? — Yes, they are. / No, they're not.</span> <span class=\"gram-trans\">(Estas são as suas chaves? — Sim, são. / Não, não são.)</span></li><li><span class=\"gram-eng\">Where's my umbrella? — It's on your chair.</span> <span class=\"gram-trans\">(Onde está meu guarda-chuva? — Está na sua cadeira.)</span></li><li><span class=\"gram-eng\">Where are my glasses? — They're in your pocket.</span> <span class=\"gram-trans\">(Onde estão meus óculos? — Estão no seu bolso.)</span></li><li><span class=\"gram-eng\">Where are my headphones? — They're in my backpack.</span> <span class=\"gram-trans\">(Onde estão meus fones? — Estão na minha mochila.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>A resposta curta usa o mesmo verbo da pergunta: Is...? → Yes, it IS. Are...? → Yes, they ARE.</li><li>Use IN (dentro), ON (sobre), UNDER (embaixo) para localizar objetos.</li></ul></div></div>"},
{"order": 17, "badge": "17", "topic": "Negative Statements and Yes/No Questions with Be", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 17 (Unit 3)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para negar o verbo BE, basta adicionar NOT depois dele. As contrações são muito comuns: isn't (is not), aren't (are not). Em perguntas yes/no, BE vem antes do sujeito.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">NEGATIVA — sujeito + be + NOT</h5><p>I'm not / You're not (aren't) / She's not (isn't)<br>He's not (isn't) / We're not (aren't) / They're not (aren't)</p><h5 class=\"gram-subhead\">YES/NO QUESTIONS — be + sujeito</h5><p>Are you from Ecuador? → Yes, I am. / No, I'm not.<br>Is she from Mexico?   → Yes, she is. / No, she's not.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I'm not from Rio. I'm from São Paulo.</span> <span class=\"gram-trans\">(Não sou do Rio. Sou de São Paulo.)</span></li><li><span class=\"gram-eng\">She's not from Japan. She's from Korea.</span> <span class=\"gram-trans\">(Ela não é do Japão. Ela é da Coreia.)</span></li><li><span class=\"gram-eng\">Are Diana and Mario from Ecuador? — No, they're not. They're from Mexico.</span> <span class=\"gram-trans\">(A Diana e o Mario são do Equador? — Não, não são. Eles são do México.)</span></li><li><span class=\"gram-eng\">Is Meera from England? — No, she's not. She's from Australia.</span> <span class=\"gram-trans\">(A Meera é da Inglaterra? — Não, não é. Ela é da Austrália.)</span></li><li><span class=\"gram-eng\">Are you Egyptian? — No, it's not. It's Cantonese.</span> <span class=\"gram-trans\">(Você é egípcio? — Não. É cantonês.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Há duas formas de contração negativa: &quot;she's not&quot; = &quot;she isn't&quot; — as duas estão certas.</li><li>Em respostas curtas afirmativas NÃO se contrai: &quot;Yes, I am&quot; (nunca &quot;Yes, I'm&quot;).</li></ul></div></div>"},
{"order": 20, "badge": "20", "topic": "Wh-Questions with Be", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 20 (Unit 3)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Perguntas com palavras interrogativas (Wh-questions) pedem informações específicas, não apenas sim ou não. A estrutura sempre coloca a palavra Wh- no início, seguida do verbo BE.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ESTRUTURA</h5><p>WH-WORD + BE + SUJEITO + ...?</p><h5 class=\"gram-subhead\">PRINCIPAIS WH-WORDS</h5><p>What       → o que / qual<br>Where      → onde<br>Who        → quem<br>How        → como<br>How old    → quantos anos<br>What ... like → como é (descrição)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">What's your name? — My name is Sophia.</span> <span class=\"gram-trans\">(Qual é o seu nome? — Meu nome é Sophia.)</span></li><li><span class=\"gram-eng\">Where are you from? — I'm from Canada.</span> <span class=\"gram-trans\">(De onde você é? — Sou do Canadá.)</span></li><li><span class=\"gram-eng\">How old is she? — She's twenty-eight.</span> <span class=\"gram-trans\">(Quantos anos ela tem? — Ela tem 28 anos.)</span></li><li><span class=\"gram-eng\">Who's that? — She's my sister.</span> <span class=\"gram-trans\">(Quem é aquela? — É a minha irmã.)</span></li><li><span class=\"gram-eng\">What's San Francisco like? — It's very beautiful.</span> <span class=\"gram-trans\">(Como é São Francisco? — É muito bonita.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Who's = Who is. Em inglês, idade se expressa com BE: &quot;She IS 28&quot; (não &quot;has&quot;).</li><li>&quot;What ... like?&quot; pede DESCRIÇÃO. Não confunda com &quot;What does she LIKE?&quot; (do que ela gosta).</li></ul></div></div>"},
{"order": 24, "badge": "24", "topic": "Possessives — Adjectives, Pronouns, and Names", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 24 (Unit 4)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Há três formas de mostrar posse em inglês: adjetivos possessivos (vão ANTES do substantivo), pronomes possessivos (substituem o substantivo) e a forma com -'S para nomes de pessoas.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ADJETIVOS POSSESSIVOS (antes do substantivo)</h5><p>my, your, his, her, our, their<br>&quot;These are his shoes.&quot;</p><h5 class=\"gram-subhead\">PRONOMES POSSESSIVOS (sozinhos, sem substantivo)</h5><p>mine, yours, his, hers, ours, theirs<br>&quot;These shoes are his.&quot;</p><h5 class=\"gram-subhead\">NOMES + 'S (apóstrofo + s)</h5><p>&quot;Jack's tie&quot; (a gravata do Jack)<br>&quot;Whose tie is this? It's Greg's.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">This isn't my raincoat. Is it yours?</span> <span class=\"gram-trans\">(Esta capa de chuva não é minha. É a sua?)</span></li><li><span class=\"gram-eng\">These aren't our sneakers. They're Logan's.</span> <span class=\"gram-trans\">(Estes não são nossos tênis. São do Logan.)</span></li><li><span class=\"gram-eng\">Are these your gloves, Erin? — No, they're not mine.</span> <span class=\"gram-trans\">(Estas luvas são suas, Erin? — Não, não são minhas.)</span></li><li><span class=\"gram-eng\">Whose T-shirts are these? — They're Hayley and Brad's.</span> <span class=\"gram-trans\">(De quem são estas camisetas? — São da Hayley e do Brad.)</span></li><li><span class=\"gram-eng\">Taylor's shoes are over there.</span> <span class=\"gram-trans\">(Os sapatos da Taylor estão ali.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>HIS é igual como adjetivo e pronome: &quot;his car&quot; / &quot;the car is his&quot;.</li><li>'S no fim do nome = posse: &quot;Greg's&quot; = do Greg. Não confunda com contração de IS.</li></ul></div></div>"},
{"order": 26, "badge": "26", "topic": "Present Continuous Statements; Conjunctions", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 26 (Unit 4)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O present continuous descreve ações acontecendo AGORA, no momento da fala. É formado por BE + verbo + -ing. As conjunções AND, BUT e SO conectam ideias relacionadas.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA: sujeito + AM/IS/ARE + verbo-ING</h5><p>&quot;She's wearing shoes.&quot; / &quot;They're studying.&quot;</p><h5 class=\"gram-subhead\">NEGATIVA: sujeito + AM/IS/ARE + NOT + verbo-ING</h5><p>&quot;He isn't wearing boots.&quot; / &quot;It's not raining.&quot;</p><h5 class=\"gram-subhead\">CONJUNÇÕES</h5><p>AND → adiciona ideia parecida: &quot;It's snowing, AND it's windy.&quot;<br>BUT → contrasta ideias: &quot;It's sunny, BUT it's cold.&quot;<br>SO  → mostra consequência: &quot;It's windy, SO it's very cold.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">My name is Dylan Jones. I'm wearing a new gray suit.</span> <span class=\"gram-trans\">(Meu nome é Dylan Jones. Estou usando um terno cinza novo.)</span></li><li><span class=\"gram-eng\">It's hot and sunny today. Michael is wearing shorts.</span> <span class=\"gram-trans\">(Está quente e ensolarado hoje. O Michael está usando shorts.)</span></li><li><span class=\"gram-eng\">Adriana is wearing a yellow dress and a brown belt.</span> <span class=\"gram-trans\">(A Adriana está usando um vestido amarelo e um cinto marrom.)</span></li><li><span class=\"gram-eng\">It's snowing, but it's not very cold.</span> <span class=\"gram-trans\">(Está nevando, mas não está muito frio.)</span></li><li><span class=\"gram-eng\">It's windy, so we're wearing heavy coats.</span> <span class=\"gram-trans\">(Está ventando, então estamos usando casacos pesados.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Verbos terminados em -E perdem o E antes de -ING: write → writing, ride → riding.</li><li>Em inglês falado, use AND/BUT/SO no meio da frase, NÃO no início — diferente do português.</li></ul></div></div>"},
{"order": 27, "badge": "27", "topic": "Present Continuous Yes/No Questions; Adjective + Noun", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 27 (Unit 4)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Perguntas yes/no no present continuous invertem BE e sujeito. Já a estrutura ADJETIVO + SUBSTANTIVO segue uma regra fixa: o adjetivo SEMPRE vem ANTES do substantivo em inglês.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">YES/NO QUESTIONS — be + sujeito + verbo-ING</h5><p>Are you wearing gloves?  → Yes, I am. / No, I'm not.<br>Is she wearing boots?    → Yes, she is. / No, she isn't.<br>Are they wearing sunglasses? → Yes, they are. / No, they aren't.</p><h5 class=\"gram-subhead\">ADJECTIVE + NOUN (ordem fixa)</h5><p>adjetivo SEMPRE antes do substantivo (sem -s no adjetivo)<br>&quot;My suit is BLACK.&quot; / &quot;I'm wearing a BLACK SUIT.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Is Dylan wearing a gray suit? — Yes, he is.</span> <span class=\"gram-trans\">(O Dylan está usando um terno cinza? — Sim, está.)</span></li><li><span class=\"gram-eng\">Is he wearing a raincoat? — No, he's not.</span> <span class=\"gram-trans\">(Ele está usando uma capa de chuva? — Não, não está.)</span></li><li><span class=\"gram-eng\">Are they wearing gloves and hats? — Yes, they are.</span> <span class=\"gram-trans\">(Eles estão usando luvas e chapéus? — Sim, estão.)</span></li><li><span class=\"gram-eng\">My suit is black. I'm wearing a black suit.</span> <span class=\"gram-trans\">(Meu terno é preto. Estou usando um terno preto.)</span></li><li><span class=\"gram-eng\">Is Bruno wearing a red shirt? — No, he isn't.</span> <span class=\"gram-trans\">(O Bruno está usando uma camisa vermelha? — Não, não está.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Em inglês, o ADJETIVO vem antes: &quot;a BLACK SUIT&quot; (não &quot;a suit black&quot;).</li><li>Adjetivos não levam -S no plural: &quot;black suits&quot; (não &quot;blacks suits&quot;).</li></ul></div></div>"},
{"order": 31, "badge": "31", "topic": "What Time Is It? / A.M. and P.M.", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 31 (Unit 5)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para perguntar e dizer as horas em inglês, usamos a pergunta 'What time is it?' e respostas com IT'S. As preposições IN, AT e ON indicam períodos do dia.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PERGUNTA E RESPOSTA</h5><p>What time is it? → It's two o'clock. / It's two-fifteen.</p><h5 class=\"gram-subhead\">FORMAS DE DIZER A HORA</h5><p>2:05 → two-oh-five  /  five after two<br>2:15 → two-fifteen  /  a quarter after two<br>2:30 → two-thirty   /  half past two<br>2:45 → two forty-five  /  a quarter to three</p><h5 class=\"gram-subhead\">A.M. E P.M.</h5><p>in the morning / in the afternoon / in the evening<br>at night / at noon (12 p.m.) / at midnight (12 a.m.)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">What time is it? — It's two o'clock.</span> <span class=\"gram-trans\">(Que horas são? — São duas horas.)</span></li><li><span class=\"gram-eng\">It's a quarter after two. (2:15)</span> <span class=\"gram-trans\">(São duas e quinze.)</span></li><li><span class=\"gram-eng\">It's twenty to three. (2:40)</span> <span class=\"gram-trans\">(São vinte para as três.)</span></li><li><span class=\"gram-eng\">It's eight o'clock in the morning. It's 8:00 a.m.</span> <span class=\"gram-trans\">(São oito horas da manhã.)</span></li><li><span class=\"gram-eng\">It's twelve o'clock at night. It's midnight.</span> <span class=\"gram-trans\">(É meia-noite.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Períodos: IN the morning/afternoon/evening, mas AT night.</li><li>NOON = meio-dia (12 p.m.) | MIDNIGHT = meia-noite (12 a.m.).</li></ul></div></div>"},
{"order": 37, "badge": "37", "topic": "Simple Present Statements", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 37 (Unit 6)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O simple present descreve rotinas, hábitos e fatos. Na 3ª pessoa do singular (he/she/it), o verbo recebe -S. Na negativa, usamos DON'T ou DOESN'T + verbo na forma base.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA</h5><p>I/You/We/They + verbo (forma base)<br>He/She/It + verbo + -S<br>&quot;I walk to school.&quot; / &quot;He works near here.&quot;</p><h5 class=\"gram-subhead\">NEGATIVA</h5><p>I/You/We/They + DON'T + verbo<br>He/She/It + DOESN'T + verbo (sem -s)<br>&quot;I don't live far from here.&quot; / &quot;He doesn't drive to work.&quot;</p><h5 class=\"gram-subhead\">TERMINAÇÕES DA 3ª PESSOA</h5><p>walk → walks  |  ride → rides  |  study → studies  |  watch → watches</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">My family and I live in the suburbs.</span> <span class=\"gram-trans\">(Minha família e eu moramos nos subúrbios.)</span></li><li><span class=\"gram-eng\">My wife and I walk to work.</span> <span class=\"gram-trans\">(Minha esposa e eu vamos andando para o trabalho.)</span></li><li><span class=\"gram-eng\">Our daughter Megan works downtown.</span> <span class=\"gram-trans\">(Nossa filha Megan trabalha no centro.)</span></li><li><span class=\"gram-eng\">My son doesn't drive a car. He rides his bike to school.</span> <span class=\"gram-trans\">(Meu filho não dirige. Ele vai de bicicleta para a escola.)</span></li><li><span class=\"gram-eng\">My father doesn't work now. He's retired.</span> <span class=\"gram-trans\">(Meu pai não trabalha agora. Está aposentado.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>DON'T = do not (I/you/we/they) | DOESN'T = does not (he/she/it).</li><li>Depois de DOESN'T, o verbo NÃO leva -s: &quot;She doesn't WORK&quot; (não &quot;works&quot;).</li></ul></div></div>"},
{"order": 38, "badge": "38", "topic": "Simple Present with Irregular Verbs — Have, Do, Go", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 38 (Unit 6)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Alguns verbos têm forma irregular na 3ª pessoa do singular (he/she/it): HAVE vira HAS, DO vira DOES, GO vira GOES. Não seguem a regra do -S comum.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FORMAS IRREGULARES NA 3ª PESSOA</h5><p>HAVE → HAS<br>DO   → DOES<br>GO   → GOES</p><h5 class=\"gram-subhead\">COMPARAÇÃO</h5><p>I/You/We/They have / do / go<br>He/She/It     has  / does / goes</p><h5 class=\"gram-subhead\">PRONÚNCIA DA 3ª PESSOA (-S no fim)</h5><p>/s/ → takes, sleeps  |  /z/ → drives, studies  |  /ɪz/ → dances, watches, has</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I have a bike.</span> <span class=\"gram-trans\">(Eu tenho uma bicicleta.)</span></li><li><span class=\"gram-eng\">My mother has a car.</span> <span class=\"gram-trans\">(Minha mãe tem um carro.)</span></li><li><span class=\"gram-eng\">We do our homework every day.</span> <span class=\"gram-trans\">(Fazemos a lição todo dia.)</span></li><li><span class=\"gram-eng\">My father does a lot of work at home.</span> <span class=\"gram-trans\">(Meu pai faz muito trabalho em casa.)</span></li><li><span class=\"gram-eng\">My parents go to work by train. The train goes downtown.</span> <span class=\"gram-trans\">(Meus pais vão de trem para o trabalho. O trem vai para o centro.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>HAS, DOES e GOES são as únicas formas irregulares importantes no presente simples.</li><li>HAS tem o som /æz/ — é diferente de HAVE (/hæv/).</li></ul></div></div>"},
{"order": 39, "badge": "39", "topic": "Simple Present Questions", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 39 (Unit 6)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para fazer perguntas no presente simples (yes/no e Wh-), usamos os auxiliares DO e DOES. O verbo principal sempre fica na forma base (sem -s), pois o auxiliar já marca a 3ª pessoa.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">YES/NO QUESTIONS</h5><p>DO + I/you/we/they + verbo? → Do you get up early?<br>DOES + he/she/it + verbo?    → Does he eat breakfast at seven?</p><h5 class=\"gram-subhead\">WH-QUESTIONS</h5><p>Wh-word + do/does + sujeito + verbo?<br>What time DO you get up?<br>When DOES she have dinner?</p><h5 class=\"gram-subhead\">TIME EXPRESSIONS COMUNS</h5><p>early, late, every day, at 9:00, at noon/midnight, at night,<br>in the morning/afternoon/evening, on Sundays, on weekdays/weekends</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Do you get up early on Sundays? — No, I get up late.</span> <span class=\"gram-trans\">(Você acorda cedo aos domingos? — Não, acordo tarde.)</span></li><li><span class=\"gram-eng\">Does he eat breakfast at seven o'clock? — No, he eats breakfast at seven-thirty.</span> <span class=\"gram-trans\">(Ele toma café às sete? — Não, toma café às sete e meia.)</span></li><li><span class=\"gram-eng\">What time do you get up? — At noon.</span> <span class=\"gram-trans\">(Que horas você acorda? — Ao meio-dia.)</span></li><li><span class=\"gram-eng\">When do you take the subway? — On Mondays and Wednesdays.</span> <span class=\"gram-trans\">(Quando você pega o metrô? — Às segundas e quartas.)</span></li><li><span class=\"gram-eng\">What time does she have dinner? — At eight o'clock.</span> <span class=\"gram-trans\">(Que horas ela janta? — Às oito horas.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de DO/DOES, o verbo principal SEMPRE fica na forma base, sem -s.</li><li>&quot;Does she WORKS?&quot; está ERRADO. O certo é &quot;Does she WORK?&quot;.</li></ul></div></div>"},
{"order": 45, "badge": "45", "topic": "Simple Present Short Answers", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 45 (Unit 7)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Em respostas curtas a perguntas yes/no no simple present, usamos o auxiliar DO ou DOES (afirmativo ou negativo). NÃO se repete o verbo principal.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ESTRUTURA</h5><p>YES, sujeito + DO/DOES.<br>NO, sujeito + DON'T/DOESN'T.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Do you live in an apartment? — No, I don't. I live in a house.</span> <span class=\"gram-trans\">(Você mora num apartamento? — Não. Moro numa casa.)</span></li><li><span class=\"gram-eng\">Does it have a yard? — Yes, it does.</span> <span class=\"gram-trans\">(Ela tem um quintal? — Sim, tem.)</span></li><li><span class=\"gram-eng\">Do you live alone? — No, I don't. I live with my family.</span> <span class=\"gram-trans\">(Você mora sozinho? — Não. Moro com minha família.)</span></li><li><span class=\"gram-eng\">Do you have any brothers or sisters? — Yes, I do. I have four sisters.</span> <span class=\"gram-trans\">(Você tem irmãos? — Sim, tenho. Tenho quatro irmãs.)</span></li><li><span class=\"gram-eng\">Does your house have many bedrooms? — Yes, it does. It has four.</span> <span class=\"gram-trans\">(Sua casa tem muitos quartos? — Sim, tem. Tem quatro.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Na resposta curta, NÃO se diz o verbo principal: &quot;Yes, I do&quot; (não &quot;Yes, I do live&quot;).</li><li>Para AFIRMATIVA não usa contração: &quot;Yes, he DOES&quot; (nunca &quot;Yes, he's&quot;).</li></ul></div></div>"},
{"order": 47, "badge": "47", "topic": "There Is, There Are", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 47 (Unit 7)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>THERE IS e THERE ARE indicam a existência de algo (= 'há' em português). Use THERE IS com substantivos no singular e THERE ARE com o plural. Aprenda também as formas com SOME, ANY e NO.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA</h5><p>There is (There's) + singular: &quot;There's a bed in the bedroom.&quot;<br>There are + plural: &quot;There are some chairs in the kitchen.&quot;</p><h5 class=\"gram-subhead\">NEGATIVA</h5><p>There isn't + a/any + singular: &quot;There isn't a sofa.&quot;<br>There aren't any + plural: &quot;There aren't any rugs.&quot;<br>There's no / There are no + substantivo (mais enfático)</p><h5 class=\"gram-subhead\">QUANTIFICADORES</h5><p>SOME (afirmativa) | ANY (negativa/perguntas) | NO (negação enfática)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">There's a bed in the bedroom.</span> <span class=\"gram-trans\">(Há uma cama no quarto.)</span></li><li><span class=\"gram-eng\">There are some chairs in the kitchen.</span> <span class=\"gram-trans\">(Há algumas cadeiras na cozinha.)</span></li><li><span class=\"gram-eng\">There's no sofa in the bedroom.</span> <span class=\"gram-trans\">(Não há sofá no quarto.)</span></li><li><span class=\"gram-eng\">There are no chairs in the living room.</span> <span class=\"gram-trans\">(Não há cadeiras na sala.)</span></li><li><span class=\"gram-eng\">There aren't any curtains on the windows.</span> <span class=\"gram-trans\">(Não há cortinas nas janelas.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>THERE'S NO = THERE ISN'T ANY (mas é mais enfático).</li><li>SOME só em afirmativas; em perguntas e negativas, use ANY.</li></ul></div></div>"},
{"order": 52, "badge": "52", "topic": "Simple Present Wh-Questions", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 52 (Unit 8)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para perguntar detalhes sobre profissões e rotinas, usamos Wh-questions no simple present. A estrutura é: WH-word + DO/DOES + sujeito + verbo.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ESTRUTURA</h5><p>WH-WORD + DO/DOES + SUJEITO + VERBO (forma base) + ...?</p><h5 class=\"gram-subhead\">WH-WORDS COMUNS</h5><p>Where? → Onde       What? → O quê / Que<br>How?   → Como        When? → Quando<br>Who?   → Quem        Why?  → Por quê</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Where do you work? — In a hospital.</span> <span class=\"gram-trans\">(Onde você trabalha? — Em um hospital.)</span></li><li><span class=\"gram-eng\">What do you do? — I'm a doctor.</span> <span class=\"gram-trans\">(O que você faz? — Sou médico.)</span></li><li><span class=\"gram-eng\">What does he do? — He's a manager.</span> <span class=\"gram-trans\">(O que ele faz? — Ele é gerente.)</span></li><li><span class=\"gram-eng\">Where do they work? — In an office.</span> <span class=\"gram-trans\">(Onde eles trabalham? — Em um escritório.)</span></li><li><span class=\"gram-eng\">How does he like it? — It's OK.</span> <span class=\"gram-trans\">(Como ele acha o trabalho? — É legal.)</span>
