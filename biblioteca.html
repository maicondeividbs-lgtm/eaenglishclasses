{order:3,badge:"3",topic:"Subject Pronouns",book:"Red book",ref:"Red book - pg. 03 (Unit 1 - Where are you from?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Os subject pronouns (pronomes pessoais) substituem o nome do sujeito<br>da frase. São essenciais para conjugar verbos corretamente.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">SUBJECT PRONOUNS</h5><p>I       (eu)<br>YOU     (você / vocês)<br>HE      (ele)<br>SHE     (ela)<br>IT      (objetos, animais, situações)<br>WE      (nós)<br>THEY    (eles / elas)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I am a student.</span> <span class=\"gram-trans\">(Eu sou estudante.)</span></li><li><span class=\"gram-eng\">You are my friend.</span> <span class=\"gram-trans\">(Você é meu amigo.)</span></li><li><span class=\"gram-eng\">He works in a bank.</span> <span class=\"gram-trans\">(Ele trabalha em um banco.)</span></li><li><span class=\"gram-eng\">She lives in São Paulo.</span> <span class=\"gram-trans\">(Ela mora em São Paulo.)</span></li><li><span class=\"gram-eng\">It is a beautiful day.</span> <span class=\"gram-trans\">(É um belo dia.)</span></li><li><span class=\"gram-eng\">We study together.</span> <span class=\"gram-trans\">(Nós estudamos juntos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;I&quot; sempre maiúsculo, em qualquer posição da frase.</li><li>YOU é usado para singular E plural — o contexto define qual.</li></ul></div></div>"},
{order:4,badge:"4",topic:"WH-Words Com to Be",book:"Red book",ref:"Red book - pg. 4",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As WH-words (what, where, who, how, when) com o verbo TO BE servem para<br>pedir informações específicas sobre pessoas, lugares ou coisas.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>WH-WORD + AM/IS/ARE + SUJEITO + complemento?</p><h5 class=\"gram-subhead\">PRINCIPAIS</h5><p>What's your job? | Where are you from?<br>Who is she? | How old are you?</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">What's your name?</span> <span class=\"gram-trans\">(Qual é o seu nome?)</span></li><li><span class=\"gram-eng\">Where is the bank?</span> <span class=\"gram-trans\">(Onde fica o banco?)</span></li><li><span class=\"gram-eng\">Who are those people?</span> <span class=\"gram-trans\">(Quem são aquelas pessoas?)</span></li><li><span class=\"gram-eng\">How is your family?</span> <span class=\"gram-trans\">(Como está sua família?)</span></li><li><span class=\"gram-eng\">When is the meeting?</span> <span class=\"gram-trans\">(Quando é a reunião?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Contrações comuns: What's, Where's, Who's, How's, When's.</li><li>Responda com uma informação — não com Yes/No.</li></ul></div></div>"},
{order:10,badge:"10",topic:"WH-Questions Com Simple Present",book:"Red book",ref:"Red book - pg. 10",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As WH-questions no Simple Present usam o auxiliar DO/DOES para<br>fazer perguntas sobre rotinas, hábitos e preferências.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>WH-WORD + DO/DOES + SUJEITO + VERBO + complemento?</p><h5 class=\"gram-subhead\">EXEMPLOS DE WH-WORDS</h5><p>What | Where | When | Why | How</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Where do you live?</span> <span class=\"gram-trans\">(Onde você mora?)</span></li><li><span class=\"gram-eng\">What does he do?</span> <span class=\"gram-trans\">(O que ele faz?)</span></li><li><span class=\"gram-eng\">When do they study?</span> <span class=\"gram-trans\">(Quando eles estudam?)</span></li><li><span class=\"gram-eng\">Why does she like jazz?</span> <span class=\"gram-trans\">(Por que ela gosta de jazz?)</span></li><li><span class=\"gram-eng\">How do you go to work?</span> <span class=\"gram-trans\">(Como você vai ao trabalho?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de DOES, o verbo NUNCA leva -s: ❌ &quot;Where does she works?&quot; ✔️ &quot;Where does she work?&quot;</li><li>Use DO com I/you/we/they; DOES com he/she/it.</li></ul></div></div>"},
{order:12,badge:"12",topic:"Time Expressions (Avançado)",book:"Red book",ref:"Red book - pg. 12 (Unit 2 - What do you do?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Esta unidade aprofunda as time expressions: AT (horário pontual),<br>IN (período), ON (data), AROUND (aproximadamente), e advérbios como<br>EARLY, LATE.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PREPOSIÇÕES DE TEMPO</h5><p>AT      → horário específico (at 7 p.m.)<br>IN      → manhã/tarde/noite/mês (in the morning, in May)<br>ON      → dia/data (on Monday, on May 5th)<br>AROUND  → aproximadamente (around 8 o'clock)</p><h5 class=\"gram-subhead\">ADVÉRBIOS</h5><p>early (cedo) | late (tarde) | on time (pontual)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I usually wake up around 7 a.m.</span> <span class=\"gram-trans\">(Geralmente acordo por volta das 7h.)</span></li><li><span class=\"gram-eng\">She always arrives early.</span> <span class=\"gram-trans\">(Ela sempre chega cedo.)</span></li><li><span class=\"gram-eng\">We have a meeting on Friday at 3 p.m.</span> <span class=\"gram-trans\">(Temos reunião sexta às 15h.)</span></li><li><span class=\"gram-eng\">He gets home late at night.</span> <span class=\"gram-trans\">(Ele chega tarde à noite.)</span></li><li><span class=\"gram-eng\">The store closes at 10 p.m.</span> <span class=\"gram-trans\">(A loja fecha às 22h.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;On time&quot; = pontual | &quot;In time&quot; = a tempo (antes do prazo).</li><li>AROUND suaviza o horário — útil em conversas informais.</li></ul></div></div>"},
{order:17,badge:"17",topic:"One / Ones, Which, This / These",book:"Red book",ref:"Red book - pg. 17",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>ONE e ONES substituem substantivos já mencionados, evitando repetição.<br>WHICH é usado para pedir uma escolha entre opções. THIS/THESE indicam<br>proximidade.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ONE / ONES</h5><p>ONE  → substitui substantivo singular<br>ONES → substitui substantivo plural</p><h5 class=\"gram-subhead\">WHICH</h5><p>Which + substantivo + ...? (qual?)</p><h5 class=\"gram-subhead\">THIS / THESE</h5><p>THIS (este/esta) — singular<br>THESE (estes/estas) — plural</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I like the red shirt. — Which one?</span> <span class=\"gram-trans\">(Qual?)</span></li><li><span class=\"gram-eng\">These shoes are nice. — Which ones?</span> <span class=\"gram-trans\">(Quais?)</span></li><li><span class=\"gram-eng\">Which dress do you prefer?</span> <span class=\"gram-trans\">(Qual vestido você prefere?)</span></li><li><span class=\"gram-eng\">I like this one better.</span> <span class=\"gram-trans\">(Gosto mais deste.)</span></li><li><span class=\"gram-eng\">These ones are cheaper.</span> <span class=\"gram-trans\">(Estes aqui são mais baratos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>ONE substitui um substantivo contável singular: &quot;the red one&quot; (a vermelha).</li><li>Use WHICH quando há opções limitadas; WHAT quando são opções abertas.</li></ul></div></div>"},
{order:20,badge:"20",topic:"Preferences & Comparatives",book:"Red book",ref:"Red book - pg. 20",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para falar de PREFERÊNCIAS, usamos PREFER ou LIKE...BETTER. Para<br>COMPARAR duas coisas, usamos o COMPARATIVE (-ER / MORE + adjetivo + THAN).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PREFERÊNCIAS</h5><p>I prefer X to Y.<br>I like X better than Y.</p><h5 class=\"gram-subhead\">COMPARATIVES</h5><p>Curtos: adjetivo + -ER + than (cheaper than)<br>Longos: more + adjetivo + than (more expensive than)<br>Irregulares: good→better | bad→worse</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I prefer tea to coffee.</span> <span class=\"gram-trans\">(Prefiro chá a café.)</span></li><li><span class=\"gram-eng\">I like jazz better than rock.</span> <span class=\"gram-trans\">(Gosto mais de jazz que de rock.)</span></li><li><span class=\"gram-eng\">This car is cheaper than that one.</span> <span class=\"gram-trans\">(Este carro é mais barato que aquele.)</span></li><li>English is more difficult than Spanish for me.</li><li>Her house is bigger than mine.</li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Curto (1-2 sílabas): -er → bigger, faster.</li><li>Longo (3+ sílabas): more → more interesting, more beautiful.</li></ul></div></div>"},
{order:23,badge:"23",topic:"Simple Present - Yes/no questions",book:"Red book",ref:"Red book - pg. 23",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As perguntas Yes/No no Simple Present começam com DO ou DOES, e a<br>resposta curta usa o mesmo auxiliar.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PERGUNTA</h5><p>DO/DOES + SUJEITO + VERBO + complemento?</p><h5 class=\"gram-subhead\">RESPOSTAS CURTAS</h5><p>Yes, + sujeito + DO/DOES.<br>No,  + sujeito + DON'T/DOESN'T.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Do you like sports?         → Yes, I do. / No, I don't.</li><li>Does she work here?         → Yes, she does. / No, she doesn't.</li><li>Do they speak French?       → Yes, they do.</li><li>Does he play tennis?        → No, he doesn't.</li><li>Do we have homework?        → Yes, we do.</li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use DOES (e não DOS) para he/she/it.</li><li>Depois de DOES, o verbo principal volta à forma original (sem -s).</li></ul></div></div>"},
{order:23,badge:"23",topic:"Verb + to + Verb",book:"Red book",ref:"Red book - pg. 23 (Unit 4 - Do you play the guitar?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Vários verbos em inglês são seguidos por TO + verbo (infinitivo). Esta<br>estrutura é muito comum para expressar planos, desejos e intenções.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">VERBO + TO + VERBO</h5><p>want / need / plan / decide / hope / like / love</p><h5 class=\"gram-subhead\">FÓRMULA</h5><p>SUJEITO + VERBO(1) + TO + VERBO(2 na forma original)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I want to learn French.</span> <span class=\"gram-trans\">(Quero aprender francês.)</span></li><li><span class=\"gram-eng\">She plans to travel next year.</span> <span class=\"gram-trans\">(Ela planeja viajar ano que vem.)</span></li><li><span class=\"gram-eng\">They need to study more.</span> <span class=\"gram-trans\">(Eles precisam estudar mais.)</span></li><li><span class=\"gram-eng\">He hopes to find a new job.</span> <span class=\"gram-trans\">(Ele espera encontrar um novo emprego.)</span></li><li><span class=\"gram-eng\">We love to dance.</span> <span class=\"gram-trans\">(Adoramos dançar.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de WANT, NEED, PLAN, DECIDE, HOPE sempre vem TO + verbo na forma original.</li><li>LIKE/LOVE aceitam tanto TO + verbo quanto verbo-ING: &quot;I like to read&quot; = &quot;I like reading&quot;.</li></ul></div></div>"},
{order:26,badge:"26",topic:"Invitations",book:"Red book",ref:"Red book - pg. 26 e 27",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para fazer convites em inglês, usamos estruturas com WOULD LIKE TO,<br>WANT TO ou expressões como HOW ABOUT. As respostas podem aceitar (Yes,<br>I'd love to) ou recusar educadamente (Sorry, I can't).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FAZER CONVITE</h5><p>Would you like to + verbo + ...?<br>Do you want to + verbo + ...?<br>How about + verbo-ING + ...?</p><h5 class=\"gram-subhead\">RESPONDER</h5><p>Aceitar: Yes, I'd love to. / Sure!<br>Recusar: Sorry, I can't. / I'd love to, but...</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Would you like to have dinner tonight?</li></ul><p>→ Yes, I'd love to.</p><ul class=\"gram-bullets\"><li>Do you want to see a movie?</li></ul><p>→ Sorry, I can't. I'm busy.</p><ul class=\"gram-bullets\"><li>How about going to the beach?</li></ul><p>→ Great idea!</p><ul class=\"gram-bullets\"><li>Would you like to come to my party?</li></ul><p>→ I'd love to, but I have to work.</p></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;I'd love to&quot; é a forma mais natural e educada de aceitar.</li><li>Para recusar, sempre dê uma razão — soa mais educado.</li></ul></div></div>"},
{order:34,badge:"34",topic:"Quantifiers",book:"Red book",ref:"Red book - pg. 34",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Os quantifiers indicam QUANTIDADE. A escolha depende do tipo de<br>substantivo (contável ou incontável) e da quantidade que queremos expressar.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">COM CONTÁVEIS</h5><p>many | a few | few | some | any</p><h5 class=\"gram-subhead\">COM INCONTÁVEIS</h5><p>much | a little | little | some | any</p><h5 class=\"gram-subhead\">COM AMBOS</h5><p>a lot of | lots of | plenty of | no</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I have many friends.</span> <span class=\"gram-trans\">(Tenho muitos amigos.)</span></li><li><span class=\"gram-eng\">She drinks a lot of water.</span> <span class=\"gram-trans\">(Ela bebe muita água.)</span></li><li><span class=\"gram-eng\">There isn't much sugar left.</span> <span class=\"gram-trans\">(Não sobrou muito açúcar.)</span></li><li><span class=\"gram-eng\">We have a few apples.</span> <span class=\"gram-trans\">(Temos algumas maçãs.)</span></li><li><span class=\"gram-eng\">I need a little help.</span> <span class=\"gram-trans\">(Preciso de um pouco de ajuda.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>MANY = contáveis | MUCH = incontáveis.</li><li>A LOT OF funciona com os dois — mais comum no inglês falado.</li></ul></div></div>"},
{order:40,badge:"40",topic:"Questions with How",book:"Red book",ref:"Red book - pg. 40",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As perguntas com HOW pedem informações sobre quantidade, frequência,<br>distância, tempo, idade, tamanho, etc. HOW combina com outras palavras<br>para formar perguntas específicas.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PRINCIPAIS COMBINAÇÕES</h5><p>How much? — quanto (incontável/preço)<br>How many? — quantos (contável)<br>How often? — com que frequência<br>How long? — quanto tempo<br>How far? — qual distância<br>How old? — qual idade</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">How much does it cost?</span> <span class=\"gram-trans\">(Quanto custa?)</span></li><li><span class=\"gram-eng\">How many books do you have?</span> <span class=\"gram-trans\">(Quantos livros você tem?)</span></li><li><span class=\"gram-eng\">How often do you exercise?</span> <span class=\"gram-trans\">(Com que frequência você se exercita?)</span></li><li><span class=\"gram-eng\">How long is the movie?</span> <span class=\"gram-trans\">(Quanto dura o filme?)</span></li><li><span class=\"gram-eng\">How old are you?</span> <span class=\"gram-trans\">(Quantos anos você tem?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>HOW MUCH para preço e incontáveis | HOW MANY para coisas contáveis.</li><li>A resposta a &quot;How often?&quot; usa advérbios de frequência (always, sometimes, never).</li></ul></div></div>"},
{order:45,badge:"45",topic:"Simple Past",book:"Red book",ref:"Red book - pg. 45",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O SIMPLE PAST descreve ações JÁ CONCLUÍDAS no passado. Há dois tipos<br>de verbos: REGULARES (terminam em -ED) e IRREGULARES (forma própria).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA</h5><p>SUJEITO + VERBO NO PASSADO</p><h5 class=\"gram-subhead\">NEGATIVA</h5><p>SUJEITO + DIDN'T + VERBO (forma original)</p><h5 class=\"gram-subhead\">INTERROGATIVA</h5><p>DID + SUJEITO + VERBO (forma original) + ...?</p><h5 class=\"gram-subhead\">REGRA -ED</h5><p>work → worked | study → studied | stop → stopped</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I worked yesterday.</span> <span class=\"gram-trans\">(Trabalhei ontem.)</span></li><li><span class=\"gram-eng\">She went to the party.</span> <span class=\"gram-trans\">(Ela foi à festa.)</span></li><li><span class=\"gram-eng\">We didn't see the movie.</span> <span class=\"gram-trans\">(Não vimos o filme.)</span></li><li><span class=\"gram-eng\">Did you call him?</span> <span class=\"gram-trans\">(Você ligou para ele?)</span></li><li><span class=\"gram-eng\">They had a great time.</span> <span class=\"gram-trans\">(Eles se divertiram muito.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Em negativa/interrogativa com DID, o verbo volta à forma original.</li><li>Verbos irregulares precisam ser memorizados: go→went, see→saw, eat→ate.</li></ul></div></div>"},
{order:47,badge:"47",topic:"Past of to Be",book:"Red book",ref:"Red book - pg. 47",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O verbo TO BE no passado tem duas formas: WAS (para I, he, she, it) e<br>WERE (para you, we, they).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA</h5><p>I / He / She / It + WAS<br>You / We / They   + WERE</p><h5 class=\"gram-subhead\">NEGATIVA</h5><p>wasn't / weren't</p><h5 class=\"gram-subhead\">INTERROGATIVA</h5><p>Was / Were + sujeito + ...?</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I was at home yesterday.</span> <span class=\"gram-trans\">(Eu estava em casa ontem.)</span></li><li><span class=\"gram-eng\">She was tired last night.</span> <span class=\"gram-trans\">(Ela estava cansada ontem à noite.)</span></li><li><span class=\"gram-eng\">We were at the beach.</span> <span class=\"gram-trans\">(Estávamos na praia.)</span></li><li><span class=\"gram-eng\">They weren't here.</span> <span class=\"gram-trans\">(Eles não estavam aqui.)</span></li><li><span class=\"gram-eng\">Were you at school?</span> <span class=\"gram-trans\">(Você estava na escola?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>WAS = singular (eu, ele, ela, isso) | WERE = plural + you.</li><li>Contrações: wasn't, weren't.</li></ul></div></div>"},
{order:54,badge:"54",topic:"Quantifiers - Count & noncount",book:"Red book",ref:"Red book - pg. 54",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Aprofundamento dos quantifiers: a escolha depende se o substantivo é<br>contável (count) ou incontável (noncount), e também da forma (afirmativa,<br>negativa, interrogativa).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVAS</h5><p>contáveis: many, a lot of, some, a few<br>incontáveis: much, a lot of, some, a little</p><h5 class=\"gram-subhead\">NEGATIVAS E PERGUNTAS</h5><p>contáveis: any, many<br>incontáveis: any, much</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">There are a lot of restaurants here.</span> <span class=\"gram-trans\">(Há muitos restaurantes aqui.)</span></li><li><span class=\"gram-eng\">I don't have much time.</span> <span class=\"gram-trans\">(Não tenho muito tempo.)</span></li><li><span class=\"gram-eng\">Are there any eggs?</span> <span class=\"gram-trans\">(Há algum ovo?)</span></li><li><span class=\"gram-eng\">She has a few good friends.</span> <span class=\"gram-trans\">(Ela tem alguns bons amigos.)</span></li><li><span class=\"gram-eng\">I drink a little coffee in the morning.</span> <span class=\"gram-trans\">(Bebo um pouco de café de manhã.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use ANY em perguntas e negativas: &quot;Do you have any sugar?&quot;</li><li>Use SOME em afirmativas e ofertas: &quot;I have some bread.&quot; / &quot;Would you like some tea?&quot;</li></ul></div></div>"},
{order:62,badge:"62",topic:"Present Participle & Prepositions (Describing People)",book:"Red book",ref:"Red book - pg. 62",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para descrever pessoas em fotos ou na rua, usamos o PARTICÍPIO PRESENTE<br>(verbo-ING) e PREPOSIÇÕES (in, with) para identificar.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PRESENT PARTICIPLE (verbo + ING)</h5><p>&quot;The woman wearing a red dress...&quot;<br>&quot;The man standing by the door...&quot;</p><h5 class=\"gram-subhead\">PREPOSIÇÕES &quot;IN&quot; / &quot;WITH&quot;</h5><p>IN + roupa/cor: &quot;the man in a blue shirt&quot;<br>WITH + característica: &quot;the girl with long hair&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The man wearing glasses is my dad.</span> <span class=\"gram-trans\">(O homem de óculos é meu pai.)</span></li><li><span class=\"gram-eng\">Who is the woman talking to John?</span> <span class=\"gram-trans\">(Quem é a mulher falando com o John?)</span></li><li><span class=\"gram-eng\">The girl in the red dress is Sarah.</span> <span class=\"gram-trans\">(A garota de vestido vermelho é a Sarah.)</span></li><li><span class=\"gram-eng\">The boy with curly hair is my brother.</span> <span class=\"gram-trans\">(O menino de cabelo cacheado é meu irmão.)</span></li><li><span class=\"gram-eng\">The people sitting over there are nice.</span> <span class=\"gram-trans\">(As pessoas sentadas ali são legais.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;in&quot; + cor/roupa: in red, in jeans.</li><li>&quot;with&quot; + parte do corpo/característica: with blue eyes, with a beard.</li></ul></div></div>"},
{order:65,badge:"65",topic:"Present Perfect - Already, Yet, Ever, Never",book:"Red book",ref:"Red book - pg. 65 (Unit 10 - Have you ever been there?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Estes advérbios são usados com o PRESENT PERFECT para indicar se uma<br>ação já ocorreu ou ainda não, e para perguntar sobre experiências.<br>Não indicam tempo específico.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">MARCADORES</h5><p>ALREADY → já (em frases afirmativas — meio da frase)<br>YET     → ainda / já (em negativas e perguntas — fim da frase)<br>EVER    → alguma vez (em perguntas)<br>NEVER   → nunca (em afirmativas)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I have already finished my homework.</span> <span class=\"gram-trans\">(Já terminei meu dever.)</span></li><li><span class=\"gram-eng\">She hasn't called yet.</span> <span class=\"gram-trans\">(Ela ainda não ligou.)</span></li><li><span class=\"gram-eng\">Have you finished yet?</span> <span class=\"gram-trans\">(Você já terminou?)</span></li><li><span class=\"gram-eng\">Have you ever been to Japan?</span> <span class=\"gram-trans\">(Você já esteve no Japão?)</span></li><li><span class=\"gram-eng\">I have never tried sushi.</span> <span class=\"gram-trans\">(Nunca experimentei sushi.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>ALREADY vai no MEIO da frase | YET vai no FIM da frase.</li><li>EVER aparece em perguntas; NEVER em afirmativas (mas tem sentido negativo).</li></ul></div></div>"},
{order:67,badge:"67",topic:"Present Perfect - For & since",book:"Red book",ref:"Red book - pg. 67 (Unit 10 - Have you ever been there?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>FOR e SINCE são usados com o PRESENT PERFECT para falar de ações<br>que começaram no passado e continuam até o presente. Indicam DURAÇÃO<br>(for) ou PONTO INICIAL (since).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FOR + DURAÇÃO (quanto tempo)</h5><p>for two hours / for three days / for ten years / for a long time</p><h5 class=\"gram-subhead\">SINCE + PONTO INICIAL (a partir de quando)</h5><p>since 2020 / since Monday / since I was a child / since last year</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">They have lived here for ten years.</span> <span class=\"gram-trans\">(Moram aqui há dez anos.)</span></li><li><span class=\"gram-eng\">I have known her for a long time.</span> <span class=\"gram-trans\">(Conheço ela há muito tempo.)</span></li><li><span class=\"gram-eng\">She has worked at the school since 2018.</span> <span class=\"gram-trans\">(Ela trabalha na escola desde 2018.)</span></li><li><span class=\"gram-eng\">We have been friends since high school.</span> <span class=\"gram-trans\">(Somos amigos desde o colégio.)</span></li><li><span class=\"gram-eng\">He hasn't seen them since last summer.</span> <span class=\"gram-trans\">(Ele não os vê desde o verão passado.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>FOR + PERÍODO de tempo (for 3 hours, for a week).</li><li>SINCE + MOMENTO específico de início (since Monday, since 2020).</li></ul></div></div>"},
{order:73,badge:"73",topic:"Adverbs of Intensity & Conjunctions",book:"Red book",ref:"Red book - pg. 73",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Os advérbios de intensidade modificam adjetivos (very, really, pretty).<br>As conjunções de adição (and, also) e contraste (but) conectam ideias.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ADVÉRBIOS DE INTENSIDADE (ordem crescente)</h5><p>a little | pretty | very | really | extremely</p><h5 class=\"gram-subhead\">CONJUNÇÕES</h5><p>AND   → adição<br>BUT   → contraste<br>ALSO  → também (no meio da frase)<br>TOO   → também (no fim da frase)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The movie is really interesting.</span> <span class=\"gram-trans\">(O filme é muito interessante.)</span></li><li><span class=\"gram-eng\">She's pretty smart.</span> <span class=\"gram-trans\">(Ela é bem inteligente.)</span></li><li><span class=\"gram-eng\">I like jazz, and I also like rock.</span> <span class=\"gram-trans\">(Gosto de jazz, e também de rock.)</span></li><li><span class=\"gram-eng\">It's cheap, but very good.</span> <span class=\"gram-trans\">(É barato, mas muito bom.)</span></li><li><span class=\"gram-eng\">I like it, too.</span> <span class=\"gram-trans\">(Eu também gosto.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Posição: very/really vêm ANTES do adjetivo.</li><li>&quot;Also&quot; no meio; &quot;too&quot; no fim — ambos significam &quot;também&quot;.</li></ul></div></div>"},
{order:79,badge:"79",topic:"Adjective + Infinitive / Noun + Infinitive",book:"Red book",ref:"Red book - pg. 79 (Unit 12 - It's a really nice city.)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Adjetivos e substantivos podem ser seguidos por TO + verbo (infinitivo)<br>para dar mais informação ou indicar propósito.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ADJETIVO + INFINITIVO</h5><p>&quot;It's nice TO MEET you.&quot;<br>&quot;I'm happy TO HELP.&quot;</p><h5 class=\"gram-subhead\">SUBSTANTIVO + INFINITIVO</h5><p>&quot;It's a great place TO VISIT.&quot;<br>&quot;I have a lot of work TO DO.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">It's important to study every day.</span> <span class=\"gram-trans\">(É importante estudar todos os dias.)</span></li><li><span class=\"gram-eng\">She's ready to leave.</span> <span class=\"gram-trans\">(Ela está pronta para sair.)</span></li><li><span class=\"gram-eng\">I'm glad to see you.</span> <span class=\"gram-trans\">(Estou contente em te ver.)</span></li><li><span class=\"gram-eng\">It's a good book to read.</span> <span class=\"gram-trans\">(É um bom livro para ler.)</span></li><li><span class=\"gram-eng\">I have something to tell you.</span> <span class=\"gram-trans\">(Tenho algo para te dizer.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use TO + verbo (não verbo-ING) depois desses adjetivos.</li><li>&quot;It's + adjetivo + to + verbo&quot; é uma estrutura muito comum em opiniões.</li></ul></div></div>"},
{order:81,badge:"81",topic:"Modals Could and May for Requests",book:"Red book",ref:"Red book - pg. 81 (Unit 12 - It's a really nice city.)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Os modais COULD e MAY são usados para fazer pedidos EDUCADOS — mais<br>formais e cordiais que CAN.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">COULD (mais comum)</h5><p>Could you + verbo + ...?<br>Could I + verbo + ...?</p><h5 class=\"gram-subhead\">MAY (mais formal)</h5><p>May I + verbo + ...?</p><h5 class=\"gram-subhead\">RESPOSTAS</h5><p>Aceitar: Sure. / Of course. / Yes, you may.<br>Recusar: Sorry, I can't. / I'm afraid not.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Could you help me, please?</span> <span class=\"gram-trans\">(Você poderia me ajudar, por favor?)</span></li><li><span class=\"gram-eng\">Could I have some water?</span> <span class=\"gram-trans\">(Eu poderia tomar um pouco de água?)</span></li><li><span class=\"gram-eng\">May I come in?</span> <span class=\"gram-trans\">(Posso entrar?)</span></li><li><span class=\"gram-eng\">May I borrow your pen?</span> <span class=\"gram-trans\">(Posso pegar emprestada sua caneta?)</span></li><li><span class=\"gram-eng\">Could you speak more slowly?</span> <span class=\"gram-trans\">(Você poderia falar mais devagar?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>MAY é mais formal — comum em situações profissionais.</li><li>COULD é amigável e versátil — bom para uso diário.</li></ul></div></div>"},
{order:87,badge:"87",topic:"So, Too, Neither, Either",book:"Red book",ref:"Red book - pg. 87 (Unit 13 - What would you like?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Estas palavras expressam CONCORDÂNCIA: &quot;eu também&quot; e &quot;eu também não&quot;.<br>SO/TOO para afirmativas; NEITHER/EITHER para negativas.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVAS</h5><p>SO + auxiliar + sujeito  →  &quot;So do I.&quot;<br>Sujeito + auxiliar + TOO  →  &quot;I do too.&quot;</p><h5 class=\"gram-subhead\">NEGATIVAS</h5><p>NEITHER + auxiliar + sujeito  →  &quot;Neither do I.&quot;<br>Sujeito + auxiliar + NOT + EITHER  →  &quot;I don't either.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">A: I like coffee.       B: So do I.</span> <span class=\"gram-trans\">(Eu também.)</span></li><li><span class=\"gram-eng\">A: I'm tired.           B: I am too.</span> <span class=\"gram-trans\">(Eu também.)</span></li><li><span class=\"gram-eng\">A: I don't eat meat.    B: Neither do I.</span> <span class=\"gram-trans\">(Nem eu.)</span></li><li><span class=\"gram-eng\">A: She can't swim.      B: He can't either.</span> <span class=\"gram-trans\">(Ele também não.)</span></li><li><span class=\"gram-eng\">A: We're going home.    B: So are we.</span> <span class=\"gram-trans\">(Nós também.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>SO/NEITHER inverte sujeito e verbo: &quot;So do I&quot;, &quot;Neither am I&quot;.</li><li>Use o MESMO auxiliar da frase anterior: am/is/are/do/does/can/will.</li></ul></div></div>"},
{order:89,badge:"89",topic:"Modal Would - Pedidos e convites",book:"Red book",ref:"Red book - pg. 89 (Unit 13 - What would you like?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>WOULD LIKE é um modal usado para fazer pedidos e expressar desejos<br>educadamente. É a forma EDUCADA de WANT.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA</h5><p>SUJEITO + WOULD LIKE + (substantivo ou TO + verbo)<br>&quot;I'd like a coffee.&quot; / &quot;I'd like to go.&quot;</p><h5 class=\"gram-subhead\">PERGUNTA</h5><p>WOULD + sujeito + LIKE + ...?<br>&quot;Would you like some tea?&quot; / &quot;Would you like to come?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I'd like a coffee, please.</span> <span class=\"gram-trans\">(Gostaria de um café, por favor.)</span></li><li><span class=\"gram-eng\">Would you like to come with us?</span> <span class=\"gram-trans\">(Gostaria de vir conosco?)</span></li><li><span class=\"gram-eng\">She'd like to order dessert.</span> <span class=\"gram-trans\">(Ela gostaria de pedir sobremesa.)</span></li><li><span class=\"gram-eng\">Would you like a glass of water?</span> <span class=\"gram-trans\">(Você gostaria de um copo d'água?)</span></li><li><span class=\"gram-eng\">They'd like to make a reservation.</span> <span class=\"gram-trans\">(Eles gostariam de fazer uma reserva.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;I'd like&quot; é mais educado que &quot;I want&quot; — use em pedidos formais e restaurantes.</li><li>Depois de WOULD LIKE TO, sempre verbo na forma original: &quot;would like to go&quot;.</li></ul></div></div>"},
{order:93,badge:"93",topic:"Superlatives",book:"Red book",ref:"Red book - pg. 93",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O SUPERLATIVO indica que algo está no MAIS ALTO ou MAIS BAIXO grau<br>dentro de um grupo (o maior, o mais bonito, o pior).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ADJETIVOS CURTOS (1-2 sílabas)</h5><p>THE + adjetivo + -EST<br>(the biggest, the smallest, the easiest)</p><h5 class=\"gram-subhead\">ADJETIVOS LONGOS (3+ sílabas)</h5><p>THE MOST + adjetivo<br>(the most expensive, the most interesting)</p><h5 class=\"gram-subhead\">IRREGULARES</h5><p>good → the best | bad → the worst</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Mount Everest is the highest mountain.</span> <span class=\"gram-trans\">(O Everest é a montanha mais alta.)</span></li><li><span class=\"gram-eng\">She is the smartest student in class.</span> <span class=\"gram-trans\">(Ela é a aluna mais inteligente da turma.)</span></li><li><span class=\"gram-eng\">This is the most expensive restaurant.</span> <span class=\"gram-trans\">(Este é o restaurante mais caro.)</span></li><li><span class=\"gram-eng\">It was the best day of my life.</span> <span class=\"gram-trans\">(Foi o melhor dia da minha vida.)</span></li><li><span class=\"gram-eng\">That's the worst movie I've ever seen.</span> <span class=\"gram-trans\">(É o pior filme que já vi.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use sempre THE antes do superlativo.</li><li>Curto → -est | Longo → most.</li></ul></div></div>"},
{order:101,badge:"101",topic:"Future with Present Continuous",book:"Red book",ref:"Red book - pg. 101 (Unit 15 - What are you doing later?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O Present Continuous (BE + verbo-ING) também é usado para falar de<br>PLANOS FUTUROS JÁ COMBINADOS — com data, hora ou lugar definidos.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>SUJEITO + AM/IS/ARE + VERBO-ING + (tempo futuro)</p><h5 class=\"gram-subhead\">MARCADORES DE FUTURO</h5><p>tomorrow, next week, tonight, this weekend,<br>on Friday, at 8 p.m.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I'm meeting Anna tomorrow.</span> <span class=\"gram-trans\">(Vou me encontrar com a Anna amanhã.)</span></li><li><span class=\"gram-eng\">She's flying to New York next week.</span> <span class=\"gram-trans\">(Ela vai voar para Nova York semana que vem.)</span></li><li><span class=\"gram-eng\">We're having dinner with friends tonight.</span> <span class=\"gram-trans\">(Vamos jantar com amigos hoje à noite.)</span></li><li><span class=\"gram-eng\">They're moving to Spain in June.</span> <span class=\"gram-trans\">(Eles vão se mudar para a Espanha em junho.)</span></li><li><span class=\"gram-eng\">Are you doing anything this weekend?</span> <span class=\"gram-trans\">(Vai fazer algo neste fim de semana?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use o Present Continuous para PLANOS JÁ MARCADOS, com data/hora definidos.</li><li>A diferença para &quot;going to&quot;: ambos servem, mas o Continuous soa mais &quot;agendado&quot;.</li></ul></div></div>"},
{order:103,badge:"103",topic:"Indirect Messages",book:"Red book",ref:"Red book - pg. 103",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As mensagens indiretas (indirect messages) servem para transmitir um<br>recado de outra pessoa. Usamos verbos como TELL, ASK e SAY.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">COM TELL</h5><p>tell + alguém + (that) + frase<br>&quot;Tell him that I'll be late.&quot;</p><h5 class=\"gram-subhead\">COM ASK</h5><p>ask + alguém + to + verbo<br>&quot;Ask her to call me back.&quot;</p><h5 class=\"gram-subhead\">COM SAY</h5><p>say + (that) + frase<br>&quot;She said that she's busy.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Please tell John that I called.</span> <span class=\"gram-trans\">(Por favor diga ao John que liguei.)</span></li><li><span class=\"gram-eng\">Could you ask Maria to come here?</span> <span class=\"gram-trans\">(Pode pedir à Maria para vir aqui?)</span></li><li><span class=\"gram-eng\">Tell her I'll be back at 5.</span> <span class=\"gram-trans\">(Diga a ela que volto às 5.)</span></li><li><span class=\"gram-eng\">Ask him to bring his book.</span> <span class=\"gram-trans\">(Peça a ele para trazer o livro.)</span></li><li><span class=\"gram-eng\">Tell them the meeting is at 3 p.m.</span> <span class=\"gram-trans\">(Diga a eles que a reunião é às 15h.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>TELL precisa de pessoa (tell HIM that...) | SAY não precisa (say that...).</li><li>ASK + pessoa + TO + verbo: &quot;ask him to wait&quot;.</li></ul></div></div>"},
{order:107,badge:"107",topic:"Describing Changes",book:"Red book",ref:"Red book - pg. 107 (Unit 16 - How have you changed?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para descrever MUDANÇAS na vida (carreira, lugar, hábitos, aparência),<br>usamos verbos específicos no passado ou no present perfect. Esses verbos<br>expressam transformações que aconteceram em algum momento.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">VERBOS DE MUDANÇA</h5><p>move (mudar de lugar)   |  change (mudar)<br>start (começar)         |  stop (parar)<br>quit (largar/desistir)  |  get (a new job/married)</p><h5 class=\"gram-subhead\">COMBINADOS COM PRESENT PERFECT (mudança recente/relevante)</h5><p>&quot;I've moved to a new city.&quot;<br>&quot;She has changed careers.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I moved to a new city last year.</span> <span class=\"gram-trans\">(Mudei para uma nova cidade ano passado.)</span></li><li><span class=\"gram-eng\">She has changed careers.</span> <span class=\"gram-trans\">(Ela mudou de carreira.)</span></li><li><span class=\"gram-eng\">He quit smoking last month.</span> <span class=\"gram-trans\">(Ele parou de fumar mês passado.)</span></li><li><span class=\"gram-eng\">They got married in 2022.</span> <span class=\"gram-trans\">(Eles se casaram em 2022.)</span></li><li><span class=\"gram-eng\">I've gotten more confident.</span> <span class=\"gram-trans\">(Fiquei mais confiante.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>GET + adjetivo = ficar (get tired, get older, get better).</li><li>QUIT pede -ING: &quot;quit smoking&quot;, &quot;quit drinking&quot;.</li></ul></div></div>"},
{order:109,badge:"109",topic:"Verb + Infinitive - Planos futuros",book:"Red book",ref:"Red book - pg. 109 (Unit 16 - How have you changed?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para falar de PLANOS e DECISÕES futuras, usamos verbos seguidos do<br>INFINITIVO (TO + verbo). Essa estrutura é muito usada para falar de<br>metas, esperanças e intenções.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">VERBOS + TO + VERBO (planos/metas)</h5><p>plan, decide, hope, want, would like, intend, expect</p><h5 class=\"gram-subhead\">EXPRESSÕES FREQUENTES</h5><p>&quot;I'm planning to...&quot; / &quot;I want to...&quot; / &quot;I hope to...&quot;<br>&quot;I'd like to...&quot;   / &quot;I'm thinking of -ING&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I plan to start a business.</span> <span class=\"gram-trans\">(Planejo abrir um negócio.)</span></li><li><span class=\"gram-eng\">She hopes to travel more next year.</span> <span class=\"gram-trans\">(Ela espera viajar mais ano que vem.)</span></li><li><span class=\"gram-eng\">They decided to move abroad.</span> <span class=\"gram-trans\">(Decidiram morar fora.)</span></li><li><span class=\"gram-eng\">I want to learn a new language.</span> <span class=\"gram-trans\">(Quero aprender uma nova língua.)</span></li><li><span class=\"gram-eng\">He'd like to go back to school.</span> <span class=\"gram-trans\">(Ele gostaria de voltar a estudar.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>PLAN/DECIDE/HOPE/WANT/WOULD LIKE pedem TO + verbo.</li><li>&quot;Thinking OF&quot; pede -ING: &quot;I'm thinking of moving&quot; (NÃO &quot;to move&quot;).</li></ul></div></div>"},
{order:999,badge:"★",topic:"Present Perfect",book:"Red book + Blue book · resumo",ref:"Resumo · Red book + Blue book",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O PRESENT PERFECT conecta o PASSADO ao PRESENTE — fala de experiências<br>de vida, ações recentes, ou estados que começaram no passado e continuam.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>SUJEITO + HAVE/HAS + past participle</p><h5 class=\"gram-subhead\">TRÊS USOS PRINCIPAIS</h5><p>1. Experiência de vida: &quot;I've been to Italy.&quot;<br>2. Ação recente: &quot;She has just left.&quot;<br>3. Duração até agora: &quot;I've lived here for 5 years.&quot;</p><h5 class=\"gram-subhead\">MARCADORES</h5><p>ever, never, already, yet, just, for, since</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I have visited Paris three times.</span> <span class=\"gram-trans\">(Já visitei Paris três vezes.)</span></li><li><span class=\"gram-eng\">She has just arrived.</span> <span class=\"gram-trans\">(Ela acabou de chegar.)</span></li><li><span class=\"gram-eng\">Have you ever tried sushi?</span> <span class=\"gram-trans\">(Você já experimentou sushi?)</span></li><li><span class=\"gram-eng\">They haven't finished yet.</span> <span class=\"gram-trans\">(Eles ainda não terminaram.)</span></li><li><span class=\"gram-eng\">We've lived here since 2018.</span> <span class=\"gram-trans\">(Moramos aqui desde 2018.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>FOR + duração (&quot;for 3 years&quot;) | SINCE + ponto inicial (&quot;since 2020&quot;).</li><li>Não use com tempo específico passado: ❌ &quot;I've seen him yesterday&quot; / ✔️ &quot;I saw him yesterday&quot;.</li></ul></div></div>"},
