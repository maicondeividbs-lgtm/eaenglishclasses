 em banco é mais exigente que uma em vendas.)</span></li><li><span class=\"gram-eng\">Game testers don't need as much experience as software developers.</span> <span class=\"gram-trans\">(Testadores de jogos não precisam de tanta experiência quanto desenvolvedores.)</span></li><li><span class=\"gram-eng\">Nutritionists aren't as well paid as doctors.</span> <span class=\"gram-trans\">(Nutricionistas não são tão bem pagos quanto médicos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;as much as&quot; para incontáveis/verbos; &quot;as many as&quot; para contáveis. E cuidado: é &quot;as well paid&quot; (advérbio well), não &quot;as good paid&quot;.</li></ul></div></div>"},
{"order": 17, "badge": "17", "topic": "Requests with Modals, If Clauses, and Gerunds", "book": "Interchange 3", "ref": "Interchange 3 - pg. 17 (Unit 3)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Há várias formas de fazer pedidos em inglês, do mais informal ao mais formal. O que muda é o modal, o uso de if e do gerúndio.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Menos formal (modais diretos)</h5><p>Can/Could you...?  |  Do you mind if + presente...?<br>&quot;Could you lend me your truck, please?&quot;</p><h5 class=\"gram-subhead\">Mais formal (if + passado / I was wondering)</h5><p>Would you mind if + passado...?  |  I was wondering if you could...<br>&quot;Would you mind if I borrowed your truck?&quot;</p><h5 class=\"gram-subhead\">Would you mind + gerúndio</h5><p>Would you mind + gerund...?<br>&quot;Would you mind helping me on Sunday?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Is it OK if I use your credit card?</span> <span class=\"gram-trans\">(Tudo bem se eu usar seu cartão de crédito?)</span></li><li><span class=\"gram-eng\">Would it be all right if I used your credit card?</span> <span class=\"gram-trans\">(Tudo bem se eu usasse seu cartão de crédito? — mais formal)</span></li><li><span class=\"gram-eng\">I was wondering if you could help me move.</span> <span class=\"gram-trans\">(Eu queria saber se você poderia me ajudar na mudança.)</span></li><li><span class=\"gram-eng\">Would you mind feeding my cats while I'm on vacation?</span> <span class=\"gram-trans\">(Você se importaria de alimentar meus gatos enquanto eu viajo?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de &quot;Would you mind&quot; use gerúndio (helping); com &quot;Would you mind IF&quot; use passado (I borrowed). Responder &quot;No, I don't mind&quot; significa SIM, aceito.</li></ul></div></div>"},
{"order": 20, "badge": "20", "topic": "Indirect Requests", "book": "Interchange 3", "ref": "Interchange 3 - pg. 20 (Unit 3)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Pedidos indiretos servem para transmitir, de forma educada, algo que outra pessoa quer dizer ou perguntar. Transformamos frases diretas em pedidos suavizados.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">A partir de afirmações / imperativos</h5><p>Could you tell (someone) (that)...  |  ...(not) to + verbo<br>&quot;Could you tell Mary (that) she left her phone in my car?&quot;</p><h5 class=\"gram-subhead\">A partir de perguntas yes/no</h5><p>Can you ask + if/whether...?<br>&quot;Can you ask her if she's graded our tests yet?&quot;</p><h5 class=\"gram-subhead\">A partir de wh-questions</h5><p>Can you ask + question word + sujeito + verbo?<br>&quot;Can you ask Mary where she's having lunch?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Can you tell Mary not to forget the students' reports?</span> <span class=\"gram-trans\">(Você pode dizer à Mary para não esquecer os relatórios dos alunos?)</span></li><li><span class=\"gram-eng\">Could you ask whether or not she is coming to the meeting?</span> <span class=\"gram-trans\">(Você poderia perguntar se ela vem ou não à reunião?)</span></li><li><span class=\"gram-eng\">Could you ask Mary if she got my message about her phone?</span> <span class=\"gram-trans\">(Você poderia perguntar à Mary se ela recebeu minha mensagem?)</span></li><li><span class=\"gram-eng\">Would you ask her what time I can talk to her about my homework?</span> <span class=\"gram-trans\">(Você perguntaria a ela a que horas posso falar sobre minha lição?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>No pedido indireto a ordem volta a ser sujeito + verbo (sem inversão de pergunta): &quot;where she's having lunch&quot;, e não &quot;where is she having lunch&quot;.</li></ul></div></div>"},
{"order": 23, "badge": "23", "topic": "Past Continuous vs. Simple Past", "book": "Interchange 3", "ref": "Interchange 3 - pg. 23 (Unit 4)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos o past continuous para uma ação em andamento no passado, e o simple past para um evento que interrompe essa ação.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Past continuous (ação em curso)</h5><p>was/were + verbo-ing<br>&quot;While I was working out,...&quot;</p><h5 class=\"gram-subhead\">Simple past (ação que interrompe)</h5><p>verbo no passado<br>&quot;...it calculated how many calories I burned.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">As scientists were doing research, they discovered that women need more sleep.</span> <span class=\"gram-trans\">(Enquanto os cientistas pesquisavam, descobriram que mulheres precisam de mais sono.)</span></li><li><span class=\"gram-eng\">A man was looking for his cat when he found a suspicious package.</span> <span class=\"gram-trans\">(Um homem procurava seu gato quando encontrou um pacote suspeito.)</span></li><li><span class=\"gram-eng\">As she was walking home, she remembered she had left $20 in her pocket.</span> <span class=\"gram-trans\">(Enquanto caminhava para casa, ela lembrou que tinha deixado 20 dólares no bolso.)</span></li><li><span class=\"gram-eng\">While Diane was driving to work, she had a bad accident.</span> <span class=\"gram-trans\">(Enquanto Diane dirigia para o trabalho, ela sofreu um grave acidente.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;While&quot; e &quot;as&quot; geralmente acompanham o past continuous (ação longa); &quot;when&quot; costuma introduzir o simple past (ação curta que interrompe).</li></ul></div></div>"},
{"order": 25, "badge": "25", "topic": "Past Perfect", "book": "Interchange 3", "ref": "Interchange 3 - pg. 25 (Unit 4)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos o past perfect para um evento que aconteceu ANTES de outro evento no passado. Ele deixa claro qual ação veio primeiro.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Evento mais antigo (past perfect)</h5><p>had + particípio passado<br>&quot;I had parked my bike on the street.&quot;</p><h5 class=\"gram-subhead\">Evento mais recente (simple past)</h5><p>verbo no passado<br>&quot;When I came back, someone had stolen it.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I took a trip to London last year. I hadn't traveled abroad before.</span> <span class=\"gram-trans\">(Fiz uma viagem a Londres ano passado. Eu não tinha viajado para o exterior antes.)</span></li><li><span class=\"gram-eng\">I was visiting the museum when I ran into a friend I hadn't seen for 10 years.</span> <span class=\"gram-trans\">(Eu visitava o museu quando esbarrei num amigo que eu não via há 10 anos.)</span></li><li><span class=\"gram-eng\">We ran out of gas because we had forgotten to fill up the tank.</span> <span class=\"gram-trans\">(Ficamos sem gasolina porque tínhamos esquecido de encher o tanque.)</span></li><li><span class=\"gram-eng\">After I had been stuck for an hour, someone started the elevator again.</span> <span class=\"gram-trans\">(Depois de ficar preso por uma hora, alguém ligou o elevador de novo.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>O past perfect (had + particípio) marca a ação que veio ANTES. Pense numa linha do tempo: primeiro o &quot;had done&quot;, depois o &quot;did&quot;.</li></ul></div></div>"},
{"order": 31, "badge": "31", "topic": "Noun Phrases Containing Relative Clauses", "book": "Interchange 3", "ref": "Interchange 3 - pg. 31 (Unit 5)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>São frases que destacam uma coisa ou pessoa usando uma oração relativa, geralmente para falar de sentimentos e opiniões. Podem começar pela &quot;coisa&quot; ou pelo sentimento.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Coisa + oração relativa + verbo &quot;to be&quot;</h5><p>Something/One thing (that) I'd... + is...<br>&quot;Something (that) I'd be worried about is the local food.&quot;</p><h5 class=\"gram-subhead\">Forma invertida (to be + something + relativa)</h5><p>... is something (that) I'd...<br>&quot;The local food is something (that) I'd be worried about.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">One thing (that) I'd really miss is hanging out with my friends.</span> <span class=\"gram-trans\">(Uma coisa de que eu sentiria muita falta é sair com meus amigos.)</span></li><li><span class=\"gram-eng\">The people (who/that) I'd miss the most are my parents.</span> <span class=\"gram-trans\">(As pessoas de quem eu mais sentiria falta são meus pais.)</span></li><li><span class=\"gram-eng\">Trying new foods is something I'd be very enthusiastic about.</span> <span class=\"gram-trans\">(Experimentar comidas novas é algo que me deixaria muito animado.)</span></li><li><span class=\"gram-eng\">Speaking a foreign language is something I'd be anxious about.</span> <span class=\"gram-trans\">(Falar uma língua estrangeira é algo que me deixaria ansioso.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>O &quot;that/who&quot; pode ser omitido quando é objeto da relativa (&quot;One thing I'd miss...&quot;). A preposição costuma ir para o fim: &quot;worried about&quot;, &quot;miss the most&quot;.</li></ul></div></div>"},
{"order": 33, "badge": "33", "topic": "Expectations", "book": "Interchange 3", "ref": "Interchange 3 - pg. 33 (Unit 5)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos estas expressões para falar de costumes e do que se espera (ou não) que façamos em certas situações sociais.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">O que é costume / esperado</h5><p>it's the custom to  |  you're expected to  |  you're supposed to + verbo<br>&quot;When you visit someone, it's the custom to bring a small gift.&quot;</p><h5 class=\"gram-subhead\">O que NÃO se deve / não é aceitável</h5><p>you aren't supposed to  |  it's not acceptable to + verbo<br>&quot;You aren't supposed to arrive early.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">If you want to bring others, you're expected to ask if it's OK first.</span> <span class=\"gram-trans\">(Se quiser levar outras pessoas, espera-se que você pergunte antes.)</span></li><li><span class=\"gram-eng\">You're supposed to check with the host.</span> <span class=\"gram-trans\">(Você deve confirmar com o anfitrião.)</span></li><li><span class=\"gram-eng\">It's not acceptable to bring them without asking.</span> <span class=\"gram-trans\">(Não é aceitável levá-los sem perguntar.)</span></li><li><span class=\"gram-eng\">When someone sends you a gift, you're expected to thank the person.</span> <span class=\"gram-trans\">(Quando alguém te manda um presente, espera-se que você agradeça.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;be supposed to&quot; e &quot;be expected to&quot; expressam expectativa/obrigação social. Não confunda &quot;supposed to&quot; (esperado) com &quot;able to&quot; (capaz de).</li></ul></div></div>"},
{"order": 37, "badge": "37", "topic": "Describing Problems 1", "book": "Interchange 3", "ref": "Interchange 3 - pg. 37 (Unit 6)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para descrever defeitos e problemas, podemos usar particípios como adjetivos (the car is damaged) ou substantivos (there is some damage).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Com particípio passado como adjetivo</h5><p>thing + be + p.p. (torn, damaged, chipped, stained, scratched)<br>&quot;The coffee mug is chipped.&quot;</p><h5 class=\"gram-subhead\">Com substantivo</h5><p>There is/are + a + noun  |  It has + a + noun<br>&quot;There is a chip in it.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The suitcase lining is torn. / It has a tear in it.</span> <span class=\"gram-trans\">(O forro da mala está rasgado. / Tem um rasgo nele.)</span></li><li><span class=\"gram-eng\">My pants are stained. / They have a stain on them.</span> <span class=\"gram-trans\">(Minha calça está manchada. / Tem uma mancha nela.)</span></li><li><span class=\"gram-eng\">The camera lens is scratched. / There are a few scratches on it.</span> <span class=\"gram-trans\">(A lente da câmera está arranhada. / Há alguns arranhões nela.)</span></li><li><span class=\"gram-eng\">The car is damaged. / There is some damage on the bumper.</span> <span class=\"gram-trans\">(O carro está danificado. / Há algum dano no para-choque.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Exceção importante: &quot;is leaking&quot; é present continuous, não particípio. Diga &quot;The washing machine is leaking&quot; (e não &quot;is leaked&quot;).</li></ul></div></div>"},
{"order": 39, "badge": "39", "topic": "Describing Problems 2", "book": "Interchange 3", "ref": "Interchange 3 - pg. 39 (Unit 6)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Outra forma de descrever problemas é dizer o que precisa ser feito (need + gerúndio / need + infinitivo passivo) ou o que fica acontecendo de errado (keep + gerúndio).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Need + gerúndio (sentido passivo)</h5><p>thing + needs + verbo-ing<br>&quot;The oven needs adjusting.&quot;</p><h5 class=\"gram-subhead\">Need + infinitivo passivo</h5><p>thing + needs to be + p.p.<br>&quot;It needs to be adjusted.&quot;</p><h5 class=\"gram-subhead\">Keep + gerúndio (algo que se repete)</h5><p>thing + keeps + verbo-ing<br>&quot;The alarm keeps going off.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The alarm needs fixing. / It needs to be fixed.</span> <span class=\"gram-trans\">(O alarme precisa de conserto. / Precisa ser consertado.)</span></li><li><span class=\"gram-eng\">The cupboards need cleaning. / They need to be cleaned.</span> <span class=\"gram-trans\">(Os armários precisam de limpeza. / Precisam ser limpos.)</span></li><li><span class=\"gram-eng\">Everything keeps burning.</span> <span class=\"gram-trans\">(Tudo fica queimando.)</span></li><li><span class=\"gram-eng\">My phone keeps dropping calls.</span> <span class=\"gram-trans\">(Meu telefone fica derrubando as ligações.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;needs cleaning&quot; = &quot;needs to be cleaned&quot; (mesmo sentido passivo). Já &quot;keep + -ing&quot; indica repetição irritante: it keeps freezing, keeps crashing.</li></ul></div></div>"},
{"order": 45, "badge": "45", "topic": "Passive with Prepositions", "book": "Interchange 3", "ref": "Interchange 3 - pg. 45 (Unit 7)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos a voz passiva com preposições para falar de problemas (ambientais, sociais) e suas causas, sem focar em quem fez. A preposição liga o efeito à causa.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Present continuous passive</h5><p>is/are being + p.p. + by / as a result of / due to...<br>&quot;Our water supply is being contaminated by toxic chemicals.&quot;</p><h5 class=\"gram-subhead\">Present perfect passive</h5><p>has/have been + p.p. + because of / through...<br>&quot;Our community center has been closed because of high costs.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Our city streets are being damaged as a result of heavy traffic.</span> <span class=\"gram-trans\">(Nossas ruas estão sendo danificadas em consequência do trânsito intenso.)</span></li><li><span class=\"gram-eng\">The roads aren't being repaired due to a lack of funding.</span> <span class=\"gram-trans\">(As estradas não estão sendo consertadas por falta de verba.)</span></li><li><span class=\"gram-eng\">Climate changes are being caused by high emissions of carbon dioxide.</span> <span class=\"gram-trans\">(As mudanças climáticas estão sendo causadas por altas emissões de CO2.)</span></li><li><span class=\"gram-eng\">Many public parks have been lost through overbuilding.</span> <span class=\"gram-trans\">(Muitos parques públicos foram perdidos por causa da construção excessiva.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;by&quot; introduz o agente (quem causa); &quot;due to / because of / as a result of / through&quot; introduzem a causa. Não confunda &quot;because of&quot; (+ substantivo) com &quot;because&quot; (+ frase).</li></ul></div></div>"},
{"order": 47, "badge": "47", "topic": "Infinitive Clauses and Phrases", "book": "Interchange 3", "ref": "Interchange 3 - pg. 47 (Unit 7)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos orações com infinitivo (to + verbo) para falar de soluções, formas e maneiras de resolver problemas.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Way/option + to + verbo</h5><p>One way to + verbo + is + to + verbo<br>&quot;One way to change things is to talk to the company's management.&quot;</p><h5 class=\"gram-subhead\">Com superlativo</h5><p>The best way(s) to + verbo + is/are + to + verbo<br>&quot;The best ways to fight unemployment are to create more jobs and invest in<br>education.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Another way to stop them is to get a news station to run a story.</span> <span class=\"gram-trans\">(Outra forma de detê-los é conseguir que um canal publique uma matéria.)</span></li><li><span class=\"gram-eng\">The best way to fight poverty is to provide education to all children.</span> <span class=\"gram-trans\">(A melhor forma de combater a pobreza é dar educação a todas as crianças.)</span></li><li><span class=\"gram-eng\">One way to reduce unemployment is to create more jobs.</span> <span class=\"gram-trans\">(Uma forma de reduzir o desemprego é criar mais empregos.)</span></li><li><span class=\"gram-eng\">One way to improve air quality is to increase the use of cleaner energy.</span> <span class=\"gram-trans\">(Uma forma de melhorar a qualidade do ar é aumentar o uso de energia limpa.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Tanto o &quot;way to + verbo&quot; quanto a solução usam infinitivo com &quot;to&quot;. Estrutura típica: &quot;[The/One/Another] way to X is to Y.&quot;</li></ul></div></div>"},
{"order": 51, "badge": "51", "topic": "Would Rather and Would Prefer", "book": "Interchange 3", "ref": "Interchange 3 - pg. 51 (Unit 8)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos would rather e would prefer para falar de preferências. A diferença está na estrutura do verbo que vem depois.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Would rather + forma base (sem &quot;to&quot;)</h5><p>would rather + verbo<br>&quot;I'd rather take an art course.&quot;</p><h5 class=\"gram-subhead\">Would prefer + infinitivo (com &quot;to&quot;)</h5><p>would prefer + to + verbo<br>&quot;I'd prefer to take an online course.&quot;</p><h5 class=\"gram-subhead\">Comparando duas opções</h5><p>would rather + base + than + base<br>&quot;I'd rather take a language course than study art.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Would you rather take an art course or a professional course?</span> <span class=\"gram-trans\">(Você prefere fazer um curso de arte ou um curso profissional?)</span></li><li><span class=\"gram-eng\">I'd rather not take either.</span> <span class=\"gram-trans\">(Eu prefiro não fazer nenhum dos dois.)</span></li><li><span class=\"gram-eng\">I'd prefer not to join a group.</span> <span class=\"gram-trans\">(Eu prefiro não entrar num grupo.)</span></li><li><span class=\"gram-eng\">I'd definitely rather have a job where I'm outdoors.</span> <span class=\"gram-trans\">(Eu com certeza prefiro um emprego em que eu fique ao ar livre.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;would rather&quot; pede verbo SEM &quot;to&quot; (rather take); &quot;would prefer&quot; pede &quot;to&quot; (prefer to take). Na negativa: &quot;I'd rather not&quot; / &quot;I'd prefer not to&quot;.</li></ul></div></div>"},
{"order": 53, "badge": "53", "topic": "By + Gerund to Describe How to Do Things", "book": "Interchange 3", "ref": "Interchange 3 - pg. 53 (Unit 8)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos &quot;by + gerúndio&quot; para explicar COMO fazer ou alcançar algo — o método ou o meio usado.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">By + gerúndio</h5><p>... + by + verbo-ing<br>&quot;You could improve your accent by watching movies.&quot;</p><h5 class=\"gram-subhead\">Contraste (not by... but by...)</h5><p>not by + verbo-ing + but by + verbo-ing<br>&quot;The best way to learn slang is not by watching the news but by watching TV<br>series.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I learn new words best by writing them down and reviewing them many times.</span> <span class=\"gram-trans\">(Aprendo palavras novas melhor anotando-as e revisando muitas vezes.)</span></li><li><span class=\"gram-eng\">Students can become better writers by reading more.</span> <span class=\"gram-trans\">(Os alunos podem se tornar melhores escritores lendo mais.)</span></li><li><span class=\"gram-eng\">You can improve your accent by listening to songs and singing along.</span> <span class=\"gram-trans\">(Você pode melhorar seu sotaque ouvindo músicas e cantando junto.)</span></li><li><span class=\"gram-eng\">A good way to memorize new vocabulary is by playing vocabulary games.</span> <span class=\"gram-trans\">(Uma boa forma de memorizar vocabulário novo é jogando jogos de vocabulário.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de &quot;by&quot; sempre vem o gerúndio (by reading, by watching), nunca o infinitivo. É o equivalente ao nosso gerúndio (&quot;lendo&quot;, &quot;assistindo&quot;).</li></ul></div></div>"},
{"order": 59, "badge": "59", "topic": "Get or Have Something Done", "book": "Interchange 3", "ref": "Interchange 3 - pg. 59 (Unit 9)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos get/have + objeto + particípio passado para falar de um serviço que OUTRA pessoa faz para nós (não fazemos nós mesmos).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Have something done</h5><p>have + objeto + p.p.<br>&quot;He is having his bedroom painted.&quot;</p><h5 class=\"gram-subhead\">Get something done</h5><p>get + objeto + p.p.<br>&quot;I get my house cleaned every week.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">They got the sink fixed.</span> <span class=\"gram-trans\">(Eles mandaram consertar a pia.)</span></li><li><span class=\"gram-eng\">Did you have your bedroom painted?</span> <span class=\"gram-trans\">(Você mandou pintar seu quarto?)</span></li><li><span class=\"gram-eng\">I didn't repair my own laptop. I got it fixed at the electronics store.</span> <span class=\"gram-trans\">(Não consertei meu notebook. Mandei consertar na loja de eletrônicos.)</span></li><li><span class=\"gram-eng\">Jessica is having her nails done.</span> <span class=\"gram-trans\">(A Jessica está fazendo as unhas — alguém faz para ela.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Cuidado com a ordem: o particípio vem DEPOIS do objeto (have my car washed, não &quot;have washed my car&quot;). &quot;Get&quot; é só um pouco mais informal que &quot;have&quot;.</li></ul></div></div>"},
{"order": 61, "badge": "61", "topic": "Making Suggestions", "book": "Interchange 3", "ref": "Interchange 3 - pg. 61 (Unit 9)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Há várias maneiras de dar sugestões em inglês, usando modais, gerúndios, perguntas negativas ou infinitivos.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Com modais + verbo / com gerúndio</h5><p>Maybe you could + verbo  |  What about + verbo-ing?<br>&quot;Maybe you could take part in a singing group.&quot;</p><h5 class=\"gram-subhead\">Com pergunta negativa / com infinitivo</h5><p>Why don't you...?  |  One option is to + verbo  |  It might be a good idea to...<br>&quot;Why don't you do some volunteer work?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">What about joining a running club?</span> <span class=\"gram-trans\">(Que tal entrar num clube de corrida?)</span></li><li><span class=\"gram-eng\">Have you thought about asking your friends to introduce you around?</span> <span class=\"gram-trans\">(Você já pensou em pedir aos amigos para te apresentarem às pessoas?)</span></li><li><span class=\"gram-eng\">One option is to join a club.</span> <span class=\"gram-trans\">(Uma opção é entrar num clube.)</span></li><li><span class=\"gram-eng\">It might be a good idea to check out the cultural events at the university.</span> <span class=\"gram-trans\">(Pode ser uma boa ideia conferir os eventos culturais da universidade.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;What about&quot; e &quot;Have you thought about&quot; pedem gerúndio (joining); &quot;Why don't you&quot; e &quot;Maybe you could&quot; pedem verbo base (join); &quot;One option is&quot; e &quot;It might be a good idea&quot; pedem infinitivo (to join).</li></ul></div></div>"},
{"order": 65, "badge": "65", "topic": "Referring to Time in the Past", "book": "Interchange 3", "ref": "Interchange 3 - pg. 65 (Unit 10)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos diferentes preposições e expressões para situar fatos no tempo: um ponto ou período no passado, ou um período que continua até hoje.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Ponto ou período no passado</h5><p>during / in / ago / from...to / for<br>&quot;The first modern Olympics were held in 1896.&quot;</p><h5 class=\"gram-subhead\">Período que continua até o presente</h5><p>since / for<br>&quot;Washington has been the capital since 1800. / For about 220 years.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The Olympic Games originated about 3,000 years ago.</span> <span class=\"gram-trans\">(Os Jogos Olímpicos surgiram há cerca de 3.000 anos.)</span></li><li><span class=\"gram-eng\">During the 1970s, the first video game console was released.</span> <span class=\"gram-trans\">(Durante os anos 1970, o primeiro console de videogame foi lançado.)</span></li><li><span class=\"gram-eng\">The Beatles were together from 1960 to 1970.</span> <span class=\"gram-trans\">(Os Beatles ficaram juntos de 1960 a 1970.)</span></li><li><span class=\"gram-eng\">Women have competed in the Olympics since 1900.</span> <span class=\"gram-trans\">(As mulheres competem nas Olimpíadas desde 1900.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;for&quot; + duração (for 10 years); &quot;since&quot; + ponto de início (since 1900); &quot;ago&quot; vem DEPOIS do tempo e com passado (3,000 years ago). &quot;Since/for&quot; com sentido até hoje pedem present perfect.</li></ul></div></div>"},
{"order": 67, "badge": "67", "topic": "Predicting the Future with Will", "book": "Interchange 3", "ref": "Interchange 3 - pg. 67 (Unit 10)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos &quot;will&quot; e suas formas para fazer previsões sobre o futuro: eventos, ações em andamento ou ações já concluídas até certo momento.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Will simples (eventos / situações)</h5><p>will + verbo base<br>&quot;We will spend vacations in space.&quot;</p><h5 class=\"gram-subhead\">Future continuous (ações em andamento)</h5><p>will be + verbo-ing<br>&quot;Human beings will be living on another planet.&quot;</p><h5 class=\"gram-subhead\">Future perfect (ações concluídas até um prazo)</h5><p>will have + p.p.<br>&quot;By 2050, a company will have built a resort on the moon.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">We won't have colonies on Mars.</span> <span class=\"gram-trans\">(Não teremos colônias em Marte.)</span></li><li><span class=\"gram-eng\">In the future, most of the population will be living in cities.</span> <span class=\"gram-trans\">(No futuro, a maior parte da população estará vivendo em cidades.)</span></li><li><span class=\"gram-eng\">Within 50 years, we will have set up a research center on Mars.</span> <span class=\"gram-trans\">(Em até 50 anos, teremos montado um centro de pesquisa em Marte.)</span></li><li><span class=\"gram-eng\">Soon, computers will become more intelligent than humans.</span> <span class=\"gram-trans\">(Em breve, os computadores se tornarão mais inteligentes que os humanos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Future continuous (will be living) = ação em curso no futuro; future perfect (will have built) = ação já completa antes de um prazo. Marcadores: &quot;by 2050&quot;, &quot;within 50 years&quot;.</li></ul></div></div>"},
{"order": 73, "badge": "73", "topic": "Time Clauses", "book": "Interchange 3", "ref": "Interchange 3 - pg. 73 (Unit 11)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Orações temporais ligam dois eventos no tempo, mostrando o que veio antes, depois ou ao mesmo tempo. São introduzidas por before, after, once, until, by the time, etc.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Conectivos comuns</h5><p>before / after / once / the moment / as soon as / until / by the time + frase<br>&quot;After I graduated, I went to Alaska to work as a fisherman.&quot;</p><h5 class=\"gram-subhead\">Combinando com past perfect (ação anterior)</h5><p>By the time + simple past, + past perfect<br>&quot;By the time I went to college, I had already lived away from home.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Before I graduated from high school, I had never worked.</span> <span class=\"gram-trans\">(Antes de me formar no ensino médio, eu nunca tinha trabalhado.)</span></li><li><span class=\"gram-eng\">Once I moved away from home, I learned to take care of myself.</span> <span class=\"gram-trans\">(Assim que saí de casa, aprendi a cuidar de mim mesmo.)</span></li><li><span class=\"gram-eng\">As soon as I got my own bank account, I started to be more responsible.</span> <span class=\"gram-trans\">(Assim que abri minha conta bancária, comecei a ser mais responsável.)</span></li><li><span class=\"gram-eng\">Until I moved to Alaska, I had never been away from home.</span> <span class=\"gram-trans\">(Até eu me mudar para o Alasca, eu nunca tinha saído de casa.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;by the time&quot; e &quot;until&quot; costumam pedir past perfect na outra oração (had never been). &quot;As soon as&quot; e &quot;the moment&quot; indicam algo imediato.</li></ul></div></div>"},
{"order": 75, "badge": "75", "topic": "Expressing Regret and Hypothetical Situations", "book": "Interchange 3", "ref": "Interchange 3 - pg. 75 (Unit 11)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos modais no passado para falar de arrependimento (should have) e de situações hipotéticas no passado (would have, could have).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Arrependimento</h5><p>should (not) have + p.p.<br>&quot;I should have done an internship while I was in college.&quot;</p><h5 class=\"gram-subhead\">Resultado provável hipotético (3º condicional)</h5><p>If + past perfect, + would have + p.p.<br>&quot;If I'd listened to my professors, I would have taken additional courses.&quot;</p><h5 class=\"gram-subhead\">Resultado possível hipotético</h5><p>If + past perfect, + could have + p.p.<br>&quot;If I hadn't been so irresponsible, I could have gotten better grades.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I shouldn't have taken out a student loan to pay for college.</span> <span class=\"gram-trans\">(Eu não deveria ter feito um empréstimo estudantil para pagar a faculdade.)</span></li><li><span class=\"gram-eng\">If I'd been more ambitious in college, I could have learned another language.</span> <span class=\"gram-trans\">(Se eu tivesse sido mais ambicioso na faculdade, poderia ter aprendido outro idioma.)</span></li><li><span class=\"gram-eng\">If I hadn't wasted so much money, I would have saved enough for grad school.</span> <span class=\"gram-trans\">(Se eu não tivesse desperdiçado tanto dinheiro, teria juntado o suficiente para a pós.)</span></li><li><span class=\"gram-eng\">I should have stayed in touch with my school friends.</span> <span class=\"gram-trans\">(Eu deveria ter mantido contato com meus amigos de escola.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;should have + p.p.&quot; = arrependimento (algo que não fiz mas devia). No 3º condicional, a condição usa &quot;had + p.p.&quot; e o resultado usa &quot;would/could have + p.p.&quot;.</li></ul></div></div>"},
{"order": 79, "badge": "79", "topic": "Describing Purpose", "book": "Interchange 3", "ref": "Interchange 3 - pg. 79 (Unit 12)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos orações com infinitivo (e com &quot;for&quot;) para descrever o PROPÓSITO ou objetivo de uma ação — o &quot;para quê&quot;.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Infinitive clauses</h5><p>(In order) to + verbo, + oração principal<br>&quot;To attract talented professionals, a company should offer competitive salaries.&quot;</p><h5 class=\"gram-subhead\">Infinitive clauses with &quot;for&quot;</h5><p>For + alguém/algo + to + verbo, + oração principal<br>&quot;For a small company to be profitable, it should have a good marketing plan.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">(In order) to finance a new business, it's a good idea to get a bank loan.</span> <span class=\"gram-trans\">(Para financiar um novo negócio, é uma boa ideia conseguir um empréstimo.)</span></li><li><span class=\"gram-eng\">For an app to succeed, it has to be easy to use.</span> <span class=\"gram-trans\">(Para um aplicativo ter sucesso, ele precisa ser fácil de usar.)</span></li><li><span class=\"gram-eng\">To run a popular convenience store, you need to choose the right location.</span> <span class=\"gram-trans\">(Para administrar uma loja de conveniência popular, é preciso escolher o ponto certo.)</span></li><li><span class=\"gram-eng\">For a restaurant to attract more customers, it's important to understand their needs.</span> <span class=\"gram-trans\">(Para um restaurante atrair mais clientes, é importante entender as necessidades deles.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use &quot;for + alguém + to + verbo&quot; quando o propósito envolve outro sujeito. &quot;In order to&quot; é só uma forma mais formal e explícita de &quot;to&quot;.</li></ul></div></div>"},
{"order": 81, "badge": "81", "topic": "Giving Reasons", "book": "Interchange 3", "ref": "Interchange 3 - pg. 81 (Unit 12)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos vários conectivos para dar razões e explicar por que algo acontece ou tem sucesso.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Com frase completa</h5><p>because / since + sujeito + verbo  |  The reason (that/why)... is...<br>&quot;I like the Dizzy Lizard because it's always packed.&quot;</p><h5 class=\"gram-subhead\">Com substantivo</h5><p>for / because of / due to + substantivo<br>&quot;It's popular because of the trendy people.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Since it's always so packed, there's a long wait outside the club.</span> <span class=\"gram-trans\">(Como vive lotado, há uma longa espera na entrada do clube.)</span></li><li><span class=\"gram-eng\">The Firefly is famous for its fantastic music.</span> <span class=\"gram-trans\">(O Firefly é famoso pela sua música fantástica.)</span></li><li><span class=\"gram-eng\">Due to the crowds, the Dizzy Lizard is difficult to get into.</span> <span class=\"gram-trans\">(Por causa da multidão, é difícil entrar no Dizzy Lizard.)</span></li><li><span class=\"gram-eng\">Samsung is a successful company due to its high investment in research.</span> <span class=\"gram-trans\">(A Samsung é uma empresa de sucesso por causa do alto investimento em pesquisa.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;because&quot; + frase (sujeito + verbo); &quot;because of / due to / for&quot; + substantivo. Não diga &quot;because of it's popular&quot;; o certo é &quot;because it's popular&quot;.</li></ul></div></div>"},
{"order": 87, "badge": "87", "topic": "Past Modals for Degrees of Certainty", "book": "Interchange 3", "ref": "Interchange 3 - pg. 87 (Unit 13)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos modais no passado para fazer deduções sobre o que aconteceu, mostrando o grau de certeza: quase certo, possível ou impossível.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Quase certo</h5><p>must (not) have + p.p.<br>&quot;He must have fallen asleep.&quot;</p><h5 class=\"gram-subhead\">Possível</h5><p>may/might (not) have + p.p.  |  could have + p.p.<br>&quot;He may/might have gone out.&quot;</p><h5 class=\"gram-subhead\">Impossível</h5><p>couldn't have + p.p.<br>&quot;He couldn't have forgotten about it.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">He must not have heard the doorbell.</span> <span class=\"gram-trans\">(Ele deve não ter ouvido a campainha.)</span></li><li><span class=\"gram-eng\">She may have just come back from vacation.</span> <span class=\"gram-trans\">(Ela talvez tenha acabado de voltar de férias.)</span></li><li><span class=\"gram-eng\">He could have had an emergency.</span> <span class=\"gram-trans\">(Ele pode ter tido uma emergência.)</span></li><li><span class=\"gram-eng\">She must have gotten fired.</span> <span class=\"gram-trans\">(Ela deve ter sido demitida.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;must have&quot; = dedução quase certa; &quot;may/might/could have&quot; = possibilidade; &quot;couldn't have&quot; = impossibilidade. Na fala, &quot;have&quot; reduz para /əv/ (&quot;must've&quot;).</li></ul></div></div>"},
{"order": 89, "badge": "89", "topic": "Past Modals for Judgments and Suggestions", "book": "Interchange 3", "ref": "Interchange 3 - pg. 89 (Unit 13)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos modais no passado para julgar ações passadas (criticar/avaliar) e para sugerir o que a pessoa poderia ter feito diferente.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Julgando ações passadas</h5><p>should (not) have + p.p.<br>&quot;You should have asked your sister to help.&quot;</p><h5 class=\"gram-subhead\">Sugerindo alternativas no passado</h5><p>could have / would (not) have + p.p.<br>&quot;You could have told her that you had to get up early.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">He shouldn't have used your car.</span> <span class=\"gram-trans\">(Ele não deveria ter usado seu carro.)</span></li><li><span class=\"gram-eng\">I would have asked them to help clean up the place.</span> <span class=\"gram-trans\">(Eu teria pedido que eles ajudassem a arrumar o lugar.)</span></li><li><span class=\"gram-eng\">I wouldn't have invited them to spend the weekend.</span> <span class=\"gram-trans\">(Eu não teria convidado eles para passar o fim de semana.)</span></li><li><span class=\"gram-eng\">She shouldn't have asked for such a personal favor in the first place.</span> <span class=\"gram-trans\">(Ela nem deveria ter pedido um favor tão pessoal, para começar.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;should have&quot; julga (certo/errado); &quot;could have&quot; sugere uma opção que existia; &quot;would have&quot; diz o que VOCÊ teria feito no lugar da pessoa.</li></ul></div></div>"},
{"order": 93, "badge": "93", "topic": "The Passive to Describe Process", "book": "Interchange 3", "ref": "Interchange 3 - pg. 93 (Unit 14)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos a voz passiva para descrever processos e etapas (como algo é feito), sem precisar dizer quem faz cada parte.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">is/are + particípio passado</h5><p>thing + is/are + p.p.<br>&quot;A screenplay is chosen.&quot;</p><h5 class=\"gram-subhead\">Modal + be + particípio passado</h5><p>thing + modal + be + p.p.<br>&quot;The characters have to be drawn just right.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Many drawings are presented.</span> <span class=\"gram-trans\">(Muitos desenhos são apresentados.)</span></li><li><span class=\"gram-eng\">The drawings might be changed 10 times.</span> <span class=\"gram-trans\">(Os desenhos podem ser alterados 10 vezes.)</span></li><li><span class=\"gram-eng\">First, storyboards are drawn by story artists.</span> <span class=\"gram-trans\">(Primeiro, os storyboards são desenhados pelos artistas.)</span></li><li><span class=\"gram-eng\">Finally, the best recording is chosen for the final movie.</span> <span class=\"gram-trans\">(Por fim, a melhor gravação é escolhida para o filme final.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Com modais (have to, might, must), a estrutura é &quot;modal + be + particípio&quot; (might be changed), não &quot;might changed&quot;. Use a passiva quando o foco é o processo, não o agente.</li></ul></div></div>"},
{"order": 96, "badge": "96", "topic": "Defining and Non-Defining Relative Clauses", "book": "Interchange 3", "ref": "Interchange 3 - pg. 96 (Unit 14)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Orações relativas definidoras identificam de qual pessoa/coisa falamos (são essenciais). As não-definidoras só dão informação extra (vêm entre vírgulas e são dispensáveis).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Defining (sem vírgulas, identifica)</h5><p>noun + who/that + verbo...<br>&quot;I want to become a photographer who/that covers conflicts.&quot;</p><h5 class=\"gram-subhead\">Non-defining (com vírgulas, info extra)</h5><p>noun, who + verbo..., ...<br>&quot;Videographers, who shoot weddings and social events, work evenings and weekends.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The art editor who creates the look of a magazine should make it attractive. (D)</span> <span class=\"gram-trans\">(O editor de arte que cria o visual da revista deve deixá-la atraente.)</span></li><li><span class=\"gram-eng\">The extras are the people who appear in the background scenes. (D)</span> <span class=\"gram-trans\">(Os figurantes são as pessoas que aparecem nas cenas de fundo.)</span></li><li><span class=\"gram-eng\">A game designer, who creates new games, works closely with the programmers. (ND)</span> <span class=\"gram-trans\">(Um designer de jogos, que cria novos jogos, trabalha junto com os programadores.)</span></li><li><span class=\"gram-eng\">A news reporter, who should be impartial, collects information about events. (ND)</span> <span class=\"gram-trans\">(Um repórter, que deve ser imparcial, coleta informações sobre os fatos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Non-defining clauses vêm SEMPRE entre vírgulas e não usam &quot;that&quot; (use &quot;who&quot; ou &quot;which&quot;). Se a informação for essencial para identificar, é defining (sem vírgulas).</li></ul></div></div>"},
{"order": 101, "badge": "101", "topic": "Giving Recommendations and Opinions", "book": "Interchange 3", "ref": "Interchange 3 - pg. 101 (Unit 15)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos modais na voz passiva para dar recomendações e opiniões: quando achamos algo uma boa ideia, ou quando achamos algo absolutamente necessário.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Boa ideia (recomendação)</h5><p>should (not) be + p.p.  |  shouldn't be allowed to  |  ought (not) to be + p.p.<br>&quot;Clubs should be required to install soundproof walls.&quot;</p><h5 class=\"gram-subhead\">Absolutamente necessário</h5><p>must be + p.p.  |  has to be made  |  has got to be done<br>&quot;A law must be passed to control the pollution from vehicles.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Pet owners shouldn't be allowed to walk dogs without a leash.</span> <span class=\"gram-trans\">(Donos de pets não deveriam poder passear com cães sem coleira.)</span></li><li><span class=\"gram-eng\">Riding a bike on the sidewalk mustn't be permitted.</span> <span class=\"gram-trans\">(Andar de bicicleta na calçada não pode ser permitido.)</span></li><li><span class=\"gram-eng\">A rule has to be made to require bike lanes on city streets.</span> <span class=\"gram-trans\">(Uma regra precisa ser criada para exigir ciclovias nas ruas.)</span></li><li><span class=\"gram-eng\">Something has got to be done to stop littering.</span> <span class=\"gram-trans\">(Algo tem que ser feito para acabar com o lixo jogado na rua.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;should/ought to be&quot; = recomendação; &quot;must / has to / has got to be&quot; = necessidade forte. Repare que tudo está na passiva (be + particípio), focando na medida, não em quem age.</li></ul></div></div>"},
{"order": 103, "badge": "103", "topic": "Tag Questions for Opinions", "book": "Interchange 3", "ref": "Interchange 3 - pg. 103 (Unit 15)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Tag questions são perguntinhas no fim da frase usadas para pedir concordância ou confirmar uma opinião. A regra de ouro: afirmativa pede tag negativa, e vice-versa.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Afirmativa + tag negativa</h5><p>statement (+), + auxiliar negativo + pronome?<br>&quot;Everything is really expensive nowadays, isn't it?&quot;</p><h5 class=\"gram-subhead\">Negativa + tag afirmativa</h5><p>statement (-), + auxiliar afirmativo + pronome?<br>&quot;It isn't easy to find a nice apartment, is it?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">There are lots of clubs around, aren't there?</span> <span class=\"gram-trans\">(Tem um monte de clubes por aí, não tem?)</span></li><li><span class=\"gram-eng\">Her neighbors don't make much noise, do they?</span> <span class=\"gram-trans\">(Os vizinhos dela não fazem muito barulho, fazem?)</span></li><li><span class=\"gram-eng\">The city should provide child care, shouldn't it?</span> <span class=\"gram-trans\">(A cidade deveria oferecer creche, não deveria?)</span></li><li><span class=\"gram-eng\">You can't sleep because of the noise, can you?</span> <span class=\"gram-trans\">(Você não consegue dormir por causa do barulho, consegue?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>A tag repete o auxiliar do verbo e inverte o sinal (is -&gt; isn't; don't -&gt; do). O pronome da tag concorda com o sujeito (the city -&gt; it; neighbors -&gt; they).</li></ul></div></div>"},
{"order": 107, "badge": "107", "topic": "Talking About Past Accomplishments", "book": "Interchange 3", "ref": "Interchange 3 - pg. 107 (Unit 16)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Falamos de conquistas usando &quot;manage to&quot; e &quot;be able to&quot;. Com o simple past, falamos de um momento específico; com o present perfect, de algo que se estende até agora.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Com simple past (momento definido)</h5><p>managed to / was able to + verbo<br>&quot;I managed to quit my nine-to-five job two years ago.&quot;</p><h5 class=\"gram-subhead\">Com present perfect (até o presente)</h5><p>have managed to / have been able to + verbo<br>&quot;I've managed to make a living with my music.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I didn't manage to get good grades in school.</span> <span class=\"gram-trans\">(Não consegui tirar boas notas na escola.)</span></li><li><span class=\"gram-eng\">I was able to finish the marathon last year.</span> <span class=\"gram-trans\">(Consegui terminar a maratona ano passado.)</span></li><li><span class=\"gram-eng\">I haven't managed to record an album yet.</span> <span class=\"gram-trans\">(Ainda não consegui gravar um álbum.)</span></li><li><span class=\"gram-eng\">I've been able to help kids achieve their goals.</span> <span class=\"gram-trans\">(Tenho conseguido ajudar crianças a alcançar seus objetivos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;manage to&quot; enfatiza esforço/dificuldade superada; &quot;be able to&quot; é mais neutro. Use simple past com tempo definido (last year) e present perfect com &quot;yet&quot;, &quot;already&quot; ou ideia de até agora.</li></ul></div></div>"},
{"order": 109, "badge": "109", "topic": "Describing Goals and Possible Future Accomplishments", "book": "Interchange 3", "ref": "Interchange 3 - pg. 109 (Unit 16)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Falamos de metas e do que esperamos ter conquistado no futuro usando o future perfect e &quot;would like to have + particípio&quot;.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Future perfect (o que terá sido alcançado)</h5><p>will have + p.p.<br>&quot;What do you hope you'll have achieved?&quot;</p><h5 class=\"gram-subhead\">Would like to have + particípio (desejo / meta)</h5><p>would like to have + p.p.<br>&quot;I'd like to have developed many successful apps.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I hope I'll have seen more of the world.</span> <span class=\"gram-trans\">(Espero ter conhecido mais do mundo.)</span></li><li><span class=\"gram-eng\">What would you like to have achieved?</span> <span class=\"gram-trans\">(O que você gostaria de ter alcançado?)</span></li><li><span class=\"gram-eng\">By this time next year, I hope I'll have finished my English course.</span> <span class=\"gram-trans\">(Até esta época no ano que vem, espero ter terminado meu curso de inglês.)</span></li><li><span class=\"gram-eng\">I'd like to have spent some time in an English-speaking country.</span> <span class=\"gram-trans\">(Eu gostaria de ter passado um tempo num país de língua inglesa.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;will have + p.p.&quot; projeta uma conquista concluída antes de um prazo futuro (by next year). &quot;would like to have + p.p.&quot; expressa o desejo de ter feito algo até lá.</li></ul></div></div>"}
  ]
};
</script>
<script>
let currentLevel = 'intro';
let currentView = 'curriculum';
let scrollObserver = null;
const LEVEL_NAMES = { intro: 'Intro', lvl1: 'Level 1', lvl2: 'Level 2', lvl3: 'Level 3', evolve5: 'Evolve 5', evolve6: 'Evolve 6' };
const LEVEL_BOOK_TAGS = { intro: 'Interchange Intro', lvl1: 'Interchange 1 (Red)', lvl2: 'Interchange 2 (Blue)', lvl3: 'Interchange 3 (Green)', evolve5: 'Evolve 5 (B2)', evolve6: 'Evolve 6 (B2+)' };
const LEVEL_BOOK_IMG = { intro: 'img/books/interchange-intro.jpg', lvl1: 'img/books/interchange-1.jpg', lvl2: 'img/books/interchange-2.jpg', lvl3: 'img/books/interchange-3.jpg', evolve5: 'img/books/evolve-5.jpg', evolve6: 'img/books/evolve-6.jpg' };
const WS_KEYS = { intro: 'intro', lvl1: 'level1', lvl2: 'level2', lvl3: 'level3', evolve5: 'evolve5', evolve6: 'evolve6' };
// Nº de worksheets disponíveis por nível (Evolve 5 está incompleto: só units 1-10)
const WS_COUNT = { intro: 16, lvl1: 16, lvl2: 16, lvl3: 16, evolve5: 12, evolve6: 12 };
const WS_AVAILABLE = { intro: 16, lvl1: 16, lvl2: 16, lvl3: 16, evolve5: 10, evolve6: 12 };
let curCarouselState = { index: 0, total: 0 };

function setLevel(level) {
  currentLevel = level;
  document.querySelectorAll('.j-step').forEach(s => s.classList.toggle('active', s.dataset.level === level));
  render();
}
function setView(view) {
  currentView = view;
  document.querySelectorAll('.bib-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  document.querySelectorAll('.bib-view').forEach(v => v.classList.remove('active'));
  document.getElementById('v-' + view).classList.add('active');
  render();
}

function setupObserver() {
  if (scrollObserver) scrollObserver.disconnect();
  scrollObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
        scrollObserver.unobserve(entry.target);
      }
    });
  }, { rootMargin: '0px 0px -8% 0px', threshold: 0.08 });
  document.querySelectorAll('.ws-card, .gram-item').forEach(el => scrollObserver.observe(el));
}

function render() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  if (currentView === 'curriculum') renderCurriculum(search);
  else if (currentView === 'worksheets') renderWorksheets();
  else renderExamples(search);
  // Small delay so DOM is ready
  setTimeout(setupObserver, 30);
}

// === CURRICULUM: carrossel horizontal com zigzag ===
function renderCurriculum(search) {
  const items = curriculum[currentLevel] || [];
  const filtered = search
    ? items.filter(u => (u.u + ' ' + u.t + ' ' + u.v + ' ' + u.g + ' ' + u.o + ' ' + u.w).toLowerCase().includes(search))
    : items;
  const div = document.getElementById('v-curriculum');

  if (!filtered.length) {
    div.innerHTML = emptyState('📋', 'Nenhuma unidade encontrada com esses termos.');
    return;
  }

  const intro = '<div class="view-intro">' +
    '<div class="view-intro-eyebrow">' + LEVEL_BOOK_TAGS[currentLevel] + '</div>' +
    '<h2>16 unidades, uma <em>jornada</em></h2>' +
    '<p>Acompanhe a progressão do livro unidade por unidade — vocabulário, gramática, objetivos comunicativos e a writing prevista para cada uma. Use as setas, os pontos abaixo ou arraste para navegar.</p>' +
  '</div>';

  const bookImg = LEVEL_BOOK_IMG[currentLevel] || LEVEL_BOOK_IMG.intro;
  const bookAlt = LEVEL_BOOK_TAGS[currentLevel] || '';

  const slidesHtml = filtered.map(u => {
    return '<div class="cur-slide">' +
      '<div class="cur-row">' +
        '<div class="cur-row-img">' +
          '<div class="cur-book-stage">' +
            '<img src="' + bookImg + '" alt="' + escapeHtml(bookAlt) + '" loading="lazy">' +
            '<div class="cur-unit-badge">' +
              '<span class="cur-unit-badge-label">Unit</span>' +
              '<span class="cur-unit-badge-num">' + String(u.u).padStart(2,'0') + '</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="cur-row-info">' +
          '<div class="cur-info-head">' +
