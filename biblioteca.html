<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca — EA English Classes</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css">
<!-- html2canvas para gerar PNG dos cards de gramática (~195KB, servido localmente) -->
<script src="html2canvas.min.js" defer></script>
<style>
/* ════════════════════════════════════════════════════════
   📚 BIBLIOTECA PEDAGÓGICA — Timeline Design (v7.3)
   Inspirado em cursos.html, com linha do tempo cinematográfica
   ════════════════════════════════════════════════════════ */

* { box-sizing: border-box; }

/* === HERO === */
.bib-hero {
  background: linear-gradient(135deg, var(--navy) 0%, #1a2d6d 60%, #253c96 100%);
  padding: 80px 0 120px;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.bib-hero::before {
  content: '';
  position: absolute;
  top: -30%; right: -10%;
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(243,107,46,0.18), transparent 60%);
  border-radius: 50%;
  animation: heroBlobFloat 18s ease-in-out infinite;
}
.bib-hero::after {
  content: '';
  position: absolute;
  bottom: -30%; left: -10%;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(196,231,229,0.12), transparent 60%);
  border-radius: 50%;
  animation: heroBlobFloat 22s ease-in-out infinite reverse;
}
@keyframes heroBlobFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(-30px, 40px) scale(1.08); }
}
.bib-hero .container { position: relative; z-index: 1; }
.bib-back {
  color: rgba(255,255,255,0.55);
  font-size: 13px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 6px;
  margin-bottom: 22px;
  text-decoration: none;
  transition: all 0.2s;
}
.bib-back:hover { color: #fff; transform: translateX(-2px); }
.bib-eyebrow {
  display: inline-block;
  padding: 6px 14px; border-radius: 999px;
  background: rgba(245,154,30,0.15);
  border: 1px solid rgba(245,154,30,0.4);
  color: var(--mango);
  font-size: 11px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 16px;
}
.bib-title {
  font-family: 'Fraunces', serif;
  font-size: clamp(2.2rem, 5vw, 3.4rem);
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
  line-height: 1.05;
}
.bib-title em { color: var(--mango); font-style: italic; }
.bib-sub {
  font-size: 15.5px; opacity: 0.7;
  max-width: 580px; line-height: 1.55;
}

/* Search refinado */
.bib-search {
  position: relative;
  max-width: 460px;
  margin-top: 26px;
}
.bib-search input {
  width: 100%;
  padding: 14px 18px 14px 46px;
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  color: #fff;
  font-family: inherit; font-size: 14px;
  outline: none;
  transition: all 0.25s;
}
.bib-search input::placeholder { color: rgba(255,255,255,0.4); }
.bib-search input:focus {
  border-color: var(--mango);
  background: rgba(255,255,255,0.14);
  box-shadow: 0 0 0 4px rgba(245,154,30,0.12);
}
.bib-search svg {
  position: absolute; left: 16px; top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
}

/* === LEVEL NAVIGATOR (capas dos livros no hero) === */
.journey-wrap {
  margin-top: 44px;
  position: relative;
}
.j-line {
  position: absolute;
  top: 78px;
  left: 8%; right: 8%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18) 18%, rgba(255,255,255,0.18) 82%, transparent);
  z-index: 0;
  pointer-events: none;
}
.journey-bar {
  display: flex;
  justify-content: center;
  gap: clamp(18px, 4vw, 44px);
  position: relative;
  flex-wrap: wrap;
  z-index: 1;
}
.j-step {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
  cursor: pointer;
  padding: 4px;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  background: transparent;
  border: none;
  color: inherit;
  font-family: inherit;
  position: relative;
}
.j-step:hover { transform: translateY(-4px); }

.j-cover {
  width: 92px;
  height: 130px;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.18);
  box-shadow: 0 8px 22px rgba(0,0,0,0.32);
  transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  filter: saturate(0.7) brightness(0.8);
}
.j-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.j-cover::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.35) 100%);
  pointer-events: none;
}
.j-step:hover .j-cover {
  filter: saturate(1) brightness(1);
  border-color: rgba(255,255,255,0.5);
  transform: scale(1.05);
}
.j-step:hover .j-cover img { transform: scale(1.06); }

.j-step.active .j-cover {
  filter: saturate(1.05) brightness(1.02);
  border-color: var(--j-glow, var(--mango));
  box-shadow: 0 12px 32px var(--j-shadow, rgba(245,154,30,0.55)), 0 0 0 4px rgba(255,255,255,0.08);
  transform: scale(1.08);
}
.j-step.active .j-cover::before {
  content: '';
  position: absolute;
  top: 8px; right: 8px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--j-glow, var(--mango));
  box-shadow: 0 0 0 4px rgba(255,255,255,0.25), 0 2px 8px rgba(0,0,0,0.3);
  z-index: 2;
  animation: jDotPulse 2s ease-out infinite;
}
@keyframes jDotPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.25); opacity: 0.7; }
}

.j-label {
  font-size: 11.5px; font-weight: 800;
  opacity: 0.6;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
  transition: all 0.25s;
  text-align: center;
}
.j-step:hover .j-label { opacity: 0.9; }
.j-step.active .j-label { opacity: 1; }

/* Cores por nível — espelhando as capas reais */
.j-step[data-level="intro"] { --j-glow: var(--mango); --j-shadow: rgba(245,154,30,0.55); }
.j-step[data-level="intro"].active .j-label { color: var(--mango); }

.j-step[data-level="lvl1"] { --j-glow: #ef4444; --j-shadow: rgba(239,68,68,0.55); }
.j-step[data-level="lvl1"].active .j-label { color: #f87171; }

.j-step[data-level="lvl2"] { --j-glow: #60a5fa; --j-shadow: rgba(96,165,250,0.55); }
.j-step[data-level="lvl2"].active .j-label { color: #93c5fd; }

.j-step[data-level="lvl3"] { --j-glow: #34d399; --j-shadow: rgba(52,211,153,0.55); }
.j-step[data-level="lvl3"].active .j-label { color: #6ee7b7; }

/* === TABS (Currículo / Worksheets / Gramática) === */
.bib-tabs-wrap {
  position: relative;
  z-index: 5;
  margin-top: -36px;
  padding: 0 16px;
}
.bib-tabs {
  display: flex;
  gap: 4px;
  background: #fff;
  padding: 6px;
  border-radius: 16px;
  border: 1px solid var(--g100);
  max-width: 580px;
  margin: 0 auto;
  box-shadow: 0 12px 36px rgba(25,36,78,0.12);
}
.bib-tab {
  flex: 1;
  padding: 14px 12px;
  border: none;
  border-radius: 11px;
  background: transparent;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  color: var(--g500);
  cursor: pointer;
  transition: all 0.25s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: -0.005em;
}
.bib-tab:hover { background: var(--g50); color: var(--navy); }
.bib-tab.active {
  background: var(--navy);
  color: #fff;
  box-shadow: 0 4px 12px rgba(25,36,78,0.25);
}
.bib-tab svg { flex-shrink: 0; }

/* === CONTENT === */
.bib-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}
.bib-view { display: none; }
.bib-view.active { display: block; animation: bibFade 0.45s cubic-bezier(0.4,0,0.2,1); }
@keyframes bibFade {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Section intro */
.view-intro {
  text-align: center;
  margin-bottom: 56px;
}
.view-intro-eyebrow {
  display: inline-block;
  padding: 6px 14px; border-radius: 999px;
  background: var(--mango-soft);
  color: var(--orange);
  font-size: 11px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 14px;
}
.view-intro h2 {
  font-family: 'Fraunces', serif;
  font-size: clamp(1.8rem, 3.5vw, 2.4rem);
  font-weight: 800;
  color: var(--navy);
  letter-spacing: -0.02em;
  margin-bottom: 8px;
  line-height: 1.15;
}
.view-intro h2 em { color: var(--orange); font-style: italic; }
.view-intro p {
  font-size: 14.5px; color: var(--g500);
  max-width: 520px; margin: 0 auto;
  line-height: 1.6;
}

/* ════════════════════════════════════════════════════════
   📋 CURRÍCULO — Carrossel horizontal com zigzag de capa
   ════════════════════════════════════════════════════════ */
.cur-carousel {
  position: relative;
  max-width: 1180px;
  margin: 0 auto;
  padding: 8px 0 40px;
}

/* Track = container que desliza */
.cur-viewport {
  position: relative;
  overflow: hidden;
  border-radius: 24px;
}
.cur-track {
  display: flex;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  will-change: transform;
  touch-action: pan-y;
}
.cur-slide {
  flex: 0 0 100%;
  min-width: 0;
  padding: 24px;
}

/* Card do slide: livro + info, alternando lado */
.cur-row {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 56px;
  align-items: center;
  background: #fff;
  border: 1px solid var(--g100);
  border-radius: 22px;
  padding: 40px 44px;
  box-shadow: 0 12px 40px rgba(25,36,78,0.06);
  position: relative;
  overflow: hidden;
  min-height: 460px;
}
.cur-row::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: linear-gradient(90deg, var(--lvl-color, var(--mango)), var(--lvl-color-2, var(--orange)));
}
.cur-slide:nth-child(even) .cur-row {
  grid-template-columns: 1fr 360px;
}
.cur-slide:nth-child(even) .cur-row-img { order: 2; }
.cur-slide:nth-child(even) .cur-row-info { order: 1; }

/* Lado do livro */
.cur-row-img {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  height: 100%;
}
.cur-book-stage {
  position: relative;
  width: 100%;
  max-width: 320px;
  aspect-ratio: 3 / 4.2;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cur-book-stage::before {
  content: '';
  position: absolute;
  inset: -20px;
  background: radial-gradient(circle at 50% 60%, var(--lvl-color-glow, rgba(245,154,30,0.18)), transparent 65%);
  z-index: 0;
}
.cur-book-stage img {
  position: relative;
  z-index: 1;
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
  border-radius: 6px;
  box-shadow:
    0 20px 50px rgba(0,0,0,0.22),
    0 4px 12px rgba(0,0,0,0.10);
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
}
.cur-row:hover .cur-book-stage img {
  transform: translateY(-6px) rotate(-1.5deg);
}
.cur-unit-badge {
  position: absolute;
  top: 12px; right: 12px;
  z-index: 2;
  width: 64px; height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--lvl-color, var(--mango)), var(--lvl-color-2, var(--orange)));
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Fraunces', serif;
  box-shadow: 0 8px 22px var(--lvl-color-glow, rgba(245,154,30,0.45));
  transform: rotate(8deg);
}
.cur-unit-badge .cur-unit-badge-label {
  font-size: 8.5px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.92;
  line-height: 1;
  margin-bottom: 2px;
}
.cur-unit-badge .cur-unit-badge-num {
  font-size: 24px;
  font-weight: 900;
  line-height: 1;
}

/* Lado da informação */
.cur-row-info {
  min-width: 0;
}
.cur-info-head {
  margin-bottom: 22px;
}
.cur-unit-tag {
  display: inline-block;
  font-size: 10.5px; font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--lvl-color, var(--orange));
  padding: 5px 12px;
  background: var(--lvl-color-soft, var(--mango-soft));
  border-radius: 999px;
  margin-bottom: 14px;
}
.cur-title {
  font-family: 'Fraunces', serif;
  font-size: clamp(22px, 2.6vw, 30px);
  font-weight: 800;
  color: var(--navy);
  letter-spacing: -0.015em;
  line-height: 1.18;
  margin: 0;
}

.cur-meta-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 18px;
}
.cur-meta-item {
  display: flex; gap: 12px;
  align-items: flex-start;
  font-size: 13.5px;
  line-height: 1.5;
}
.cur-meta-icon {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 8px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800;
  letter-spacing: 0.04em;
}
.cur-meta-icon.voc { background: rgba(245,154,30,0.13); color: var(--mango); }
.cur-meta-icon.gra { background: rgba(37,60,150,0.13); color: var(--blue); }
.cur-meta-icon.obj { background: rgba(16,185,129,0.13); color: #10b981; }
.cur-meta-icon.wri { background: rgba(139,92,246,0.13); color: #7c3aed; }
.cur-meta-text { color: var(--g700); flex: 1; min-width: 0; }
.cur-meta-text strong {
  display: block;
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--g400);
  margin-bottom: 3px;
}

/* Setas de navegação */
.cur-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 5;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: #fff;
  border: 1.5px solid var(--g100);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 10px 28px rgba(25,36,78,0.14);
  color: var(--navy);
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  font-family: inherit;
}
.cur-nav:hover:not([disabled]) {
  background: var(--lvl-color, var(--navy));
  border-color: var(--lvl-color, var(--navy));
  color: #fff;
  transform: translateY(-50%) scale(1.08);
}
.cur-nav[disabled] {
  opacity: 0.35;
  cursor: not-allowed;
  box-shadow: 0 4px 10px rgba(25,36,78,0.06);
}
.cur-nav svg { width: 22px; height: 22px; }
.cur-nav-prev { left: -10px; }
.cur-nav-next { right: -10px; }

/* Indicador de progresso */
.cur-progress {
  margin-top: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.cur-progress-info {
  display: flex; align-items: center; gap: 12px;
  font-size: 12.5px;
  color: var(--g500);
  font-weight: 600;
}
.cur-progress-info strong {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 900;
  color: var(--lvl-color, var(--navy));
}
.cur-progress-info .cur-progress-sep {
  width: 1px; height: 16px;
  background: var(--g100);
}
.cur-dots {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 720px;
}
.cur-dot {
  width: 28px; height: 4px;
  background: var(--g100);
  border: none;
  border-radius: 99px;
  cursor: pointer;
  padding: 0;
  transition: all 0.3s ease;
}
.cur-dot:hover { background: var(--g200); transform: scaleY(1.5); }
.cur-dot.active {
  background: var(--lvl-color, var(--mango));
  width: 40px;
}

/* Cores por nível */
.cur-carousel[data-level="intro"] {
  --lvl-color: var(--mango);
  --lvl-color-2: var(--orange);
  --lvl-color-soft: var(--mango-soft);
  --lvl-color-glow: rgba(245,154,30,0.30);
}
.cur-carousel[data-level="lvl1"] {
  --lvl-color: #ef4444;
  --lvl-color-2: #dc2626;
  --lvl-color-soft: #fee2e2;
  --lvl-color-glow: rgba(239,68,68,0.28);
}
.cur-carousel[data-level="lvl2"] {
  --lvl-color: #3b82f6;
  --lvl-color-2: #2563eb;
  --lvl-color-soft: #dbeafe;
  --lvl-color-glow: rgba(59,130,246,0.28);
}
.cur-carousel[data-level="lvl3"] {
  --lvl-color: #10b981;
  --lvl-color-2: #059669;
  --lvl-color-soft: #d1fae5;
  --lvl-color-glow: rgba(16,185,129,0.28);
}

/* ════════════════════════════════════════════════════════
   📄 WORKSHEETS — Timeline horizontal compacta
   ════════════════════════════════════════════════════════ */
.ws-timeline {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
  max-width: 1080px;
  margin: 0 auto;
}
.ws-card {
  background: #fff;
  border: 1.5px solid var(--g100);
  border-radius: 16px;
  padding: 20px 18px;
  display: flex; flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  cursor: default;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  overflow: hidden;
  opacity: 0;
  transform: translateY(20px);
}
.ws-card.in-view {
  opacity: 1; transform: translateY(0);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.ws-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--lvl-color, var(--mango)), var(--lvl-color-2, var(--orange)));
  transform: scaleX(0.3);
  transform-origin: left;
  transition: transform 0.35s ease;
}
.ws-card:hover {
  transform: translateY(-6px);
  border-color: var(--lvl-color, var(--mango));
  box-shadow: 0 16px 40px rgba(25,36,78,0.12);
}
.ws-card:hover::before { transform: scaleX(1); }

.ws-card[data-level="intro"] { --lvl-color: #fbbf24; --lvl-color-2: var(--mango); }
.ws-card[data-level="lvl1"] { --lvl-color: #f87171; --lvl-color-2: #dc2626; }
.ws-card[data-level="lvl2"] { --lvl-color: #60a5fa; --lvl-color-2: #2563eb; }
.ws-card[data-level="lvl3"] { --lvl-color: #6ee7b7; --lvl-color-2: #059669; }

.ws-num-wrap {
  width: 62px; height: 62px;
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--lvl-color, #fbbf24) 0%, var(--lvl-color-2, var(--mango)) 100%);
  color: #fff;
  font-family: 'Fraunces', serif;
  font-size: 28px; font-weight: 900;
  box-shadow: 0 6px 16px rgba(0,0,0,0.10);
  margin-bottom: 4px;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.ws-card:hover .ws-num-wrap {
  transform: rotate(-6deg) scale(1.06);
}
.ws-label {
  font-size: 11px;
  color: var(--g500);
  font-weight: 700;
  text-align: center;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.ws-actions {
  display: flex; gap: 6px;
  margin-top: 8px;
  width: 100%;
}
.ws-btn {
  flex: 1;
  display: inline-flex;
  align-items: center; justify-content: center;
  gap: 4px;
  padding: 9px 8px;
  border-radius: 10px;
  font-size: 11.5px; font-weight: 700;
  text-decoration: none;

/* ════════════════════════════════════════════════════════
   💡 GRAMÁTICA — Timeline vertical com cards expansíveis
   ════════════════════════════════════════════════════════ */
.gram-timeline {
  position: relative;
  max-width: 880px;
  margin: 0 auto;
  padding-left: 58px;
}
.gram-timeline::before {
  content: '';
  position: absolute;
  left: 25px;
  top: 16px; bottom: 16px;
  width: 2px;
  background: linear-gradient(180deg,
    transparent,
    var(--lvl-color, var(--blue)) 6%,
    var(--lvl-color, var(--blue)) 94%,
    transparent);
  opacity: 0.4;
  border-radius: 1px;
}
.gram-item {
  position: relative;
  margin-bottom: 16px;
  opacity: 0;
  transform: translateX(-12px);
  transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
}
.gram-item.in-view {
  opacity: 1; transform: translateX(0);
}
.gram-item::before {
  content: '';
  position: absolute;
  left: -40px; top: 26px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  border: 3px solid var(--lvl-color, var(--blue));
  box-shadow: 0 0 0 5px rgba(255,255,255,0.6), 0 4px 10px rgba(25,36,78,0.10);
  z-index: 1;
  transition: all 0.3s ease;
}
.gram-item:hover::before {
  background: var(--lvl-color, var(--blue));
  transform: scale(1.2);
}
.gram-item::after {
  content: '';
  position: absolute;
  left: -26px; top: 32px;
  width: 26px; height: 2px;
  background: var(--lvl-color, var(--blue));
  opacity: 0.35;
}

.gram-card {
  background: #fff;
  border: 1px solid var(--g100);
  border-radius: 16px;
  padding: 18px 22px;
  cursor: pointer;
  transition: all 0.28s cubic-bezier(0.4,0,0.2,1);
  display: flex; align-items: center; gap: 18px;
  position: relative;
  overflow: hidden;
}
.gram-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--lvl-color, var(--blue));
  opacity: 0;
  transition: opacity 0.25s ease;
}
.gram-card:hover {
  transform: translateX(4px);
  border-color: var(--lvl-color, var(--blue));
  box-shadow: 0 10px 28px rgba(25,36,78,0.08);
}
.gram-card:hover::before { opacity: 1; }

.gram-page-badge {
  flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  flex-direction: column;
  width: 58px; height: 58px;
  border-radius: 14px;
  background: var(--lvl-color-soft, var(--blue-soft));
  color: var(--lvl-color, var(--blue));
  font-family: 'Fraunces', serif;
  line-height: 1;
  transition: all 0.25s ease;
}
.gram-card:hover .gram-page-badge {
  background: var(--lvl-color, var(--blue));
  color: #fff;
}
.gram-page-badge .gram-page-label {
  font-size: 8.5px; font-weight: 800;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  opacity: 0.7;
  margin-bottom: 3px;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.gram-page-badge .gram-page-num {
  font-size: 22px; font-weight: 900;
  letter-spacing: -0.02em;
}
.gram-card-body {
  flex: 1; min-width: 0;
}
.gram-topic {
  font-size: 15px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1.4;
  margin-bottom: 5px;
  letter-spacing: -0.01em;
  text-transform: none;
  /* Limita topic muito longo */
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.gram-book-tag {
  font-size: 11px;
  color: var(--g500);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  display: inline-flex; align-items: center; gap: 6px;
}
.gram-book-tag::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--lvl-color, var(--blue));
  opacity: 0.6;
}
.gram-arrow {
  flex-shrink: 0;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--g50);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--g400);
  transition: all 0.25s ease;
}
.gram-card:hover .gram-arrow {
  background: var(--lvl-color, var(--blue));

  transform: translateX(2px);
}

.gram-timeline[data-level="intro"] { --lvl-color: #f59a1e; --lvl-color-soft: #fef3c7; }
.gram-timeline[data-level="lvl1"] { --lvl-color: #ef4444; --lvl-color-soft: #fee2e2; }

{order:3,badge:"3",topic:"Possessive Adjectives & Verb to Be",book:"Intro",ref:"Intro - pg. 3",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Esta página apresenta os adjetivos possessivos (my, your, his, her) e o<br>verbo TO BE no presente, usados para apresentações pessoais.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">POSSESSIVE ADJECTIVES</h5><p>MY (meu) | YOUR (seu) | HIS (dele) | HER (dela)<br>→ Sempre vêm ANTES do substantivo: my name, his car.</p><h5 class=\"gram-subhead\">VERBO TO BE (presente)</h5><p>I am | You are | He/She/It is | We/They are</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">My name is Carlos.</span> <span class=\"gram-trans\">(Meu nome é Carlos.)</span></li><li><span class=\"gram-eng\">What's your name?</span> <span class=\"gram-trans\">(Qual é o seu nome?)</span></li><li><span class=\"gram-eng\">His name is Ethan.</span> <span class=\"gram-trans\">(O nome dele é Ethan.)</span></li><li><span class=\"gram-eng\">Her name is Caroline.</span> <span class=\"gram-trans\">(O nome dela é Caroline.)</span></li><li><span class=\"gram-eng\">I am a student.</span> <span class=\"gram-trans\">(Eu sou um estudante.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Formas contraídas comuns: I'm, you're, he's, she's, it's.</li><li>HIS = dele (homem) | HER = dela (mulher).</li></ul></div></div>"},
{order:8,badge:"8",topic:"Articles - A, An, The",book:"Intro",ref:"Intro - pg. 08 (Unit 2 - Where are my keys?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Os artigos em inglês ficam ANTES de substantivos. A/AN são indefinidos<br>(algo geral); THE é definido (algo específico ou já mencionado).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">A / AN (indefinido)</h5><p>A  → antes de som de CONSOANTE: a book, a cat<br>AN → antes de som de VOGAL: an apple, an hour</p><h5 class=\"gram-subhead\">THE (definido)</h5><p>Usado com algo específico, único ou já citado.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I have a cat.</span> <span class=\"gram-trans\">(Tenho um gato.)</span></li><li><span class=\"gram-eng\">She wants an apple.</span> <span class=\"gram-trans\">(Ela quer uma maçã.)</span></li><li><span class=\"gram-eng\">It's an honor.</span> <span class=\"gram-trans\">(&quot;h&quot; mudo → som de vogal)</span></li><li><span class=\"gram-eng\">The sun is bright today.</span> <span class=\"gram-trans\">(O sol está brilhante hoje — único.)</span></li><li><span class=\"gram-eng\">Close the door, please.</span> <span class=\"gram-trans\">(Feche a porta, por favor — específica.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>A vs AN é pelo SOM, não pela letra: &quot;a university&quot; (som de &quot;y&quot;), &quot;an hour&quot; (h mudo).</li><li>Não use &quot;the&quot; com refeições, idiomas e esportes: have breakfast, speak English, play soccer.</li></ul></div></div>"},
{order:10,badge:"10",topic:"Plurals",book:"Intro",ref:"Intro - pg. 10 (Unit 2 - Where are my keys?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para formar o plural dos substantivos em inglês, geralmente<br>acrescentamos -S no final. Algumas terminações pedem -ES, e há também<br>plurais irregulares.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">REGRA GERAL</h5><p>substantivo + S → book/books, car/cars</p><h5 class=\"gram-subhead\">TERMINADOS EM -S, -SH, -CH, -X, -Z: + ES</h5><p>bus/buses, watch/watches, box/boxes</p><h5 class=\"gram-subhead\">TERMINADOS EM CONSOANTE + Y: troca Y por IES</h5><p>baby/babies, city/cities</p><h5 class=\"gram-subhead\">IRREGULARES (memorizar)</h5><p>man/men, woman/women, child/children, foot/feet</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">one book → two books</span> <span class=\"gram-trans\">(livro/livros)</span></li><li><span class=\"gram-eng\">one bus → three buses</span> <span class=\"gram-trans\">(ônibus/ônibus)</span></li><li><span class=\"gram-eng\">one baby → many babies</span> <span class=\"gram-trans\">(bebê/bebês)</span></li><li><span class=\"gram-eng\">one man → two men</span> <span class=\"gram-trans\">(homem/homens)</span></li><li><span class=\"gram-eng\">one child → many children</span> <span class=\"gram-trans\">(criança/crianças)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Substantivos terminados em -F ou -FE viram -VES: leaf → leaves, knife → knives.</li><li>Alguns são iguais no singular e plural: sheep, fish, deer.</li></ul></div></div>"},
{order:17,badge:"17",topic:"Verb to Be - Forma negativa",book:"Intro",ref:"Intro - pg. 17",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para negar com o verbo TO BE, basta acrescentar NOT depois do verbo<br>(am/is/are). É muito comum usar contrações.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>SUJEITO + AM/IS/ARE + NOT + complemento</p><h5 class=\"gram-subhead\">CONTRAÇÕES</h5><p>I'm not | You're not / You aren't<br>He's not / He isn't | She's not / She isn't<br>We're not / We aren't | They're not / They aren't</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I'm not from Brazil.</span> <span class=\"gram-trans\">(Eu não sou do Brasil.)</span></li><li><span class=\"gram-eng\">She's not a teacher.</span> <span class=\"gram-trans\">(Ela não é professora.)</span></li><li><span class=\"gram-eng\">He isn't here today.</span> <span class=\"gram-trans\">(Ele não está aqui hoje.)</span></li><li><span class=\"gram-eng\">We aren't tired.</span> <span class=\"gram-trans\">(Nós não estamos cansados.)</span></li><li><span class=\"gram-eng\">They're not Canadian.</span> <span class=\"gram-trans\">(Eles não são canadenses.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;I am not&quot; tem APENAS uma contração: I'm not (não existe &quot;I amn't&quot;).</li><li>As outras pessoas têm duas opções iguais (he's not = he isn't).</li></ul></div></div>"},
{order:20,badge:"20",topic:"WH-Questions Com to Be",book:"Intro",ref:"Intro - pg. 20",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As WH-questions com o verbo TO BE pedem informações específicas<br>(o quê, onde, quem, como, etc.). A estrutura inverte o sujeito e o verbo.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>WH-WORD + AM/IS/ARE + SUJEITO + complemento?</p><h5 class=\"gram-subhead\">PRINCIPAIS WH-WORDS</h5><p>WHAT (o quê) | WHERE (onde) | WHO (quem)<br>HOW (como) | WHEN (quando) | WHY (por quê)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">What is your name?</span> <span class=\"gram-trans\">(Qual é o seu nome?)</span></li><li><span class=\"gram-eng\">Where are you from?</span> <span class=\"gram-trans\">(De onde você é?)</span></li><li><span class=\"gram-eng\">Who is that woman?</span> <span class=\"gram-trans\">(Quem é aquela mulher?)</span></li><li><span class=\"gram-eng\">How are you today?</span> <span class=\"gram-trans\">(Como você está hoje?)</span></li><li><span class=\"gram-eng\">When is your birthday?</span> <span class=\"gram-trans\">(Quando é seu aniversário?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Contrações comuns: What's, Where's, Who's, How's.</li><li>A resposta NÃO usa Yes/No — dá uma informação completa.</li></ul></div></div>"},
{order:24,badge:"24",topic:"Possessive Pronouns & Apóstrofo 's",book:"Intro",ref:"Intro - pg. 24",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Os pronomes possessivos (mine, yours, his, hers...) substituem o<br>substantivo, evitando repetição. O 'S após um nome também indica posse<br>(Maria's book = o livro da Maria).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">POSSESSIVE PRONOUNS</h5><p>mine | yours | his | hers | ours | theirs<br>→ Usados SOZINHOS, sem substantivo depois.</p><h5 class=\"gram-subhead\">APÓSTROFO 'S</h5><p>NOME + 'S + substantivo  →  Maria's bag (a bolsa da Maria)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">This book is mine.</span> <span class=\"gram-trans\">(Este livro é meu.)</span></li><li><span class=\"gram-eng\">Is this pen yours?</span> <span class=\"gram-trans\">(Esta caneta é sua?)</span></li><li><span class=\"gram-eng\">That car is hers.</span> <span class=\"gram-trans\">(Aquele carro é dela.)</span></li><li><span class=\"gram-eng\">Those bags are theirs.</span> <span class=\"gram-trans\">(Aquelas bolsas são deles.)</span></li><li><span class=\"gram-eng\">This is John's phone.</span> <span class=\"gram-trans\">(Este é o telefone do John.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Adjetivo possessivo (my) vem ANTES do substantivo: &quot;my book&quot;.</li><li>Pronome possessivo (mine) substitui o substantivo: &quot;It's mine&quot;.</li></ul></div></div>"},
{order:26,badge:"26",topic:"Conjunctions - And, But, So",book:"Intro",ref:"Intro - pg. 26 (Unit 4 - Is this coat yours?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As conjunções conectam ideias. AND adiciona; BUT mostra contraste; SO<br>indica resultado/consequência.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AND  → adição (e)</h5><p>&quot;I like coffee AND tea.&quot;</p><h5 class=\"gram-subhead\">BUT  → contraste (mas)</h5><p>&quot;It's cheap BUT good.&quot;</p><h5 class=\"gram-subhead\">SO   → consequência (então)</h5><p>&quot;I was tired, SO I went to bed.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I have a dog and a cat.</span> <span class=\"gram-trans\">(Tenho um cachorro e um gato.)</span></li><li><span class=\"gram-eng\">She's young but very smart.</span> <span class=\"gram-trans\">(Ela é jovem mas muito inteligente.)</span></li><li><span class=\"gram-eng\">It was raining, so we stayed home.</span> <span class=\"gram-trans\">(Estava chovendo, então ficamos em casa.)</span></li><li><span class=\"gram-eng\">He likes pizza but doesn't like pasta.</span> <span class=\"gram-trans\">(Ele gosta de pizza mas não de macarrão.)</span></li><li><span class=\"gram-eng\">I was hungry, so I ate a sandwich.</span> <span class=\"gram-trans\">(Estava com fome, então comi um sanduíche.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use vírgula antes de SO (&quot;..., so I left&quot;).</li><li>AND e BUT geralmente não pedem vírgula em frases curtas.</li></ul></div></div>"},
{order:26,badge:"26",topic:"Present Continuous",book:"Intro",ref:"Intro - pg. 26",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O PRESENT CONTINUOUS expressa ações que estão ACONTECENDO AGORA,<br>no momento da fala. Equivale a &quot;estar + -ndo&quot; em português.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA</h5><p>SUJEITO + AM/IS/ARE + VERBO-ING</p><h5 class=\"gram-subhead\">NEGATIVA</h5><p>SUJEITO + AM/IS/ARE + NOT + VERBO-ING</p><h5 class=\"gram-subhead\">INTERROGATIVA</h5><p>AM/IS/ARE + SUJEITO + VERBO-ING?</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I am studying English.</span> <span class=\"gram-trans\">(Estou estudando inglês.)</span></li><li><span class=\"gram-eng\">She is reading a book.</span> <span class=\"gram-trans\">(Ela está lendo um livro.)</span></li><li><span class=\"gram-eng\">They are playing soccer.</span> <span class=\"gram-trans\">(Eles estão jogando futebol.)</span></li><li><span class=\"gram-eng\">He isn't working now.</span> <span class=\"gram-trans\">(Ele não está trabalhando agora.)</span></li><li><span class=\"gram-eng\">What are you doing?</span> <span class=\"gram-trans\">(O que você está fazendo?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Palavras-chave: now, right now, at the moment, today.</li><li>Verbos terminados em -E: tire o E e ponha -ING (write → writing).</li></ul></div></div>"},
{order:31,badge:"31",topic:"Time Expressions",book:"Intro",ref:"Intro - pg. 31 (Unit 5 - What time is it?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para falar de tempo (que horas são, quando algo acontece), usamos<br>expressões específicas com preposições — AT, IN, ON.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AT  → para HORÁRIO específico</h5><p>at 8 o'clock, at noon, at night</p><h5 class=\"gram-subhead\">IN  → para PARTE do dia / MÊS / ANO / ESTAÇÃO</h5><p>in the morning, in July, in 2024, in summer</p><h5 class=\"gram-subhead\">ON  → para DIA da semana / DATA específica</h5><p>on Monday, on July 4th, on weekends</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I wake up at 7 a.m.</span> <span class=\"gram-trans\">(Acordo às 7h.)</span></li><li><span class=\"gram-eng\">She studies in the afternoon.</span> <span class=\"gram-trans\">(Ela estuda à tarde.)</span></li><li><span class=\"gram-eng\">My birthday is in May.</span> <span class=\"gram-trans\">(Meu aniversário é em maio.)</span></li><li><span class=\"gram-eng\">We have class on Mondays.</span> <span class=\"gram-trans\">(Temos aula às segundas.)</span></li><li><span class=\"gram-eng\">I was born on March 15th.</span> <span class=\"gram-trans\">(Nasci em 15 de março.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Exceção: &quot;at night&quot; (não &quot;in the night&quot;).</li><li>AT = momento exato | IN = dentro de um período | ON = data específica.</li></ul></div></div>"},
{order:37,badge:"37",topic:"Simple Present",book:"Intro",ref:"Intro - pg. 37 e 39",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O SIMPLE PRESENT descreve ROTINAS, HÁBITOS e FATOS gerais. Não é para<br>ações que estão acontecendo agora — é para o que se faz em geral.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA</h5><p>I / You / We / They + VERBO (forma original)<br>He / She / It      + VERBO + S/ES</p><h5 class=\"gram-subhead\">NEGATIVA</h5><p>I / You / We / They + DON'T + VERBO<br>He / She / It      + DOESN'T + VERBO</p><h5 class=\"gram-subhead\">INTERROGATIVA</h5><p>DO/DOES + SUJEITO + VERBO + complemento?</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I work every day.</span> <span class=\"gram-trans\">(Eu trabalho todos os dias.)</span></li><li><span class=\"gram-eng\">She studies English.</span> <span class=\"gram-trans\">(Ela estuda inglês.)</span></li><li><span class=\"gram-eng\">They live in São Paulo.</span> <span class=\"gram-trans\">(Eles moram em São Paulo.)</span></li><li><span class=\"gram-eng\">He doesn't like coffee.</span> <span class=\"gram-trans\">(Ele não gosta de café.)</span></li><li><span class=\"gram-eng\">Do you speak Spanish?</span> <span class=\"gram-trans\">(Você fala espanhol?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Na 3ª pessoa (he/she/it), acrescente -S no verbo: he works, she studies.</li><li>Em negativa/interrogativa com DOES, o verbo volta à forma original.</li></ul></div></div>"},
{order:45,badge:"45",topic:"Simple Present - Short answers",book:"Intro",ref:"Intro - pg. 45",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Em perguntas com DO/DOES, a resposta curta usa o MESMO auxiliar — nunca<br>se repete o verbo principal.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ESTRUTURA</h5><p>Pergunta: DO/DOES + sujeito + verbo + ...?<br>Resposta: Yes, + sujeito + DO/DOES.<br>No,  + sujeito + DON'T/DOESN'T.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Do you like pizza?</li></ul><p>→ Yes, I do. / No, I don't.</p><ul class=\"gram-bullets\"><li>Does she play tennis?</li></ul><p>→ Yes, she does. / No, she doesn't.</p><ul class=\"gram-bullets\"><li>Do they work here?</li></ul><p>→ Yes, they do. / No, they don't.</p></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Nunca diga &quot;Yes, I like&quot; — o correto é &quot;Yes, I do&quot;.</li><li>Mantenha o mesmo pronome da pergunta na resposta.</li></ul></div></div>"},
{order:47,badge:"47",topic:"There is / There are",book:"Intro",ref:"Intro - pg. 47",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>THERE IS / THERE ARE indica a EXISTÊNCIA de algo em um lugar. Equivale<br>a &quot;há&quot; ou &quot;existe(m)&quot; em português.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA</h5><p>THERE IS + substantivo singular<br>THERE ARE + substantivo plural</p><h5 class=\"gram-subhead\">NEGATIVA</h5><p>There isn't / There aren't</p><h5 class=\"gram-subhead\">INTERROGATIVA</h5><p>Is there...? / Are there...?</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">There is a book on the table.</span> <span class=\"gram-trans\">(Há um livro na mesa.)</span></li><li><span class=\"gram-eng\">There are three chairs here.</span> <span class=\"gram-trans\">(Há três cadeiras aqui.)</span></li><li><span class=\"gram-eng\">There isn't a TV in my room.</span> <span class=\"gram-trans\">(Não há TV no meu quarto.)</span></li><li><span class=\"gram-eng\">Are there any students?</span> <span class=\"gram-trans\">(Há algum estudante?)</span></li><li><span class=\"gram-eng\">How many people are there?</span> <span class=\"gram-trans\">(Quantas pessoas há?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use IS para singular e incontáveis (there is water).</li><li>Use ARE para plural (there are people).</li></ul></div></div>"},
{order:54,badge:"54",topic:"Adjective + Noun",book:"Intro",ref:"Intro - pg. 54",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Em inglês, o adjetivo vem SEMPRE ANTES do substantivo — diferente do<br>português. Além disso, o adjetivo NUNCA varia em número.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>ADJETIVO + SUBSTANTIVO<br>(a red car, beautiful houses)</p><h5 class=\"gram-subhead\">REGRA-CHAVE</h5><ul class=\"gram-bullets\"><li>a big house → big houses (não &quot;bigs houses&quot;)</li></ul></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I have a new car.</span> <span class=\"gram-trans\">(Tenho um carro novo.)</span></li><li><span class=\"gram-eng\">She lives in a small house.</span> <span class=\"gram-trans\">(Ela mora em uma casa pequena.)</span></li><li><span class=\"gram-eng\">They are nice people.</span> <span class=\"gram-trans\">(Eles são pessoas legais.)</span></li><li><span class=\"gram-eng\">It's an expensive restaurant.</span> <span class=\"gram-trans\">(É um restaurante caro.)</span></li><li><span class=\"gram-eng\">I like old movies.</span> <span class=\"gram-trans\">(Gosto de filmes antigos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>❌ &quot;a car red&quot; / ✔️ &quot;a red car&quot; — adjetivo vem ANTES.</li><li>❌ &quot;reds cars&quot; / ✔️ &quot;red cars&quot; — adjetivo NUNCA tem -s.</li></ul></div></div>"},
{order:59,badge:"59",topic:"Count and Noncount Nouns",book:"Intro",ref:"Intro - pg. 59",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Substantivos contáveis (count) podem ser contados (one apple, two apples).<br>Substantivos incontáveis (noncount) não têm plural — não podemos contar<br>&quot;two waters&quot;, por exemplo.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">COUNT NOUNS</h5><p>Têm singular e plural: book/books, car/cars.<br>Use a/an no singular.</p><h5 class=\"gram-subhead\">NONCOUNT NOUNS</h5><p>Não têm plural: water, sugar, money, advice, information.<br>NÃO use a/an. Use SOME/ANY.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>I have two apples.            (Tenho duas maçãs.) — contável</li><li>She drinks water every day.   (Ela bebe água todo dia.) — incontável</li><li><span class=\"gram-eng\">There is some milk in the fridge.</span> <span class=\"gram-trans\">(Há algum leite na geladeira.)</span></li><li><span class=\"gram-eng\">Do you have any sugar?</span> <span class=\"gram-trans\">(Você tem açúcar?)</span></li><li><span class=\"gram-eng\">I need some information.</span> <span class=\"gram-trans\">(Preciso de informação.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Incontáveis comuns: water, milk, rice, bread, money, time, music.</li><li>Para quantidades, use: a glass of water, a piece of bread.</li></ul></div></div>"},
{order:61,badge:"61",topic:"Adverbs of Frequency",book:"Intro",ref:"Intro - pg. 61",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Os advérbios de frequência indicam COM QUE FREQUÊNCIA algo acontece.<br>Eles geralmente vêm ANTES do verbo principal, mas DEPOIS do verbo TO BE.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ESCALA DE FREQUÊNCIA</h5><p>100%  always (sempre)<br>80%  usually (normalmente)<br>60%  often (frequentemente)<br>50%  sometimes (às vezes)<br>20%  rarely / hardly ever (raramente)<br>0%  never (nunca)</p><h5 class=\"gram-subhead\">POSIÇÃO</h5><p>Antes do verbo: I always study.<br>Depois do TO BE: She is always late.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I always drink coffee in the morning.</span> <span class=\"gram-trans\">(Sempre tomo café de manhã.)</span></li><li><span class=\"gram-eng\">She usually works late.</span> <span class=\"gram-trans\">(Ela normalmente trabalha tarde.)</span></li><li><span class=\"gram-eng\">They sometimes go to the gym.</span> <span class=\"gram-trans\">(Eles às vezes vão à academia.)</span></li><li><span class=\"gram-eng\">He never eats meat.</span> <span class=\"gram-trans\">(Ele nunca come carne.)</span></li><li><span class=\"gram-eng\">We are often tired on Mondays.</span> <span class=\"gram-trans\">(Estamos frequentemente cansados.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Sometimes pode ir no início ou fim: &quot;Sometimes I run.&quot; / &quot;I run sometimes.&quot;</li><li>NUNCA use never com não: ❌ &quot;I don't never&quot;. ✔️ &quot;I never&quot;.</li></ul></div></div>"},
{order:67,badge:"67",topic:"Can for Ability",book:"Intro",ref:"Intro - pg. 67",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O modal CAN é usado para expressar HABILIDADE — o que sabemos ou<br>conseguimos fazer. Equivale a &quot;saber/conseguir/poder&quot; em português.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA</h5><p>SUJEITO + CAN + VERBO (forma original)</p><h5 class=\"gram-subhead\">NEGATIVA</h5><p>SUJEITO + CAN'T (cannot) + VERBO</p><h5 class=\"gram-subhead\">INTERROGATIVA</h5><p>CAN + SUJEITO + VERBO?</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I can speak English.</span> <span class=\"gram-trans\">(Sei falar inglês.)</span></li><li><span class=\"gram-eng\">She can play the guitar.</span> <span class=\"gram-trans\">(Ela sabe tocar violão.)</span></li><li><span class=\"gram-eng\">He can't swim.</span> <span class=\"gram-trans\">(Ele não sabe nadar.)</span></li><li><span class=\"gram-eng\">Can you cook?</span> <span class=\"gram-trans\">(Você sabe cozinhar?)</span></li><li><span class=\"gram-eng\">They can dance very well.</span> <span class=\"gram-trans\">(Eles sabem dançar muito bem.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>CAN não muda com a 3ª pessoa: ❌ &quot;she cans&quot; / ✔️ &quot;she can&quot;.</li><li>Depois de CAN, o verbo fica na forma original (sem -s, sem to).</li></ul></div></div>"},
{order:73,badge:"73",topic:"Be Going to",book:"Intro",ref:"Intro - pg. 73",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>BE GOING TO expressa PLANOS e INTENÇÕES para o futuro — coisas que<br>já estão decididas antes da fala.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA</h5><p>SUJEITO + AM/IS/ARE + GOING TO + VERBO</p><h5 class=\"gram-subhead\">NEGATIVA</h5><p>SUJEITO + AM/IS/ARE NOT + GOING TO + VERBO</p><h5 class=\"gram-subhead\">INTERROGATIVA</h5><p>AM/IS/ARE + SUJEITO + GOING TO + VERBO?</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I am going to travel next week.</span> <span class=\"gram-trans\">(Vou viajar semana que vem.)</span></li><li><span class=\"gram-eng\">She is going to study tonight.</span> <span class=\"gram-trans\">(Ela vai estudar hoje à noite.)</span></li><li><span class=\"gram-eng\">They are going to buy a house.</span> <span class=\"gram-trans\">(Eles vão comprar uma casa.)</span></li><li><span class=\"gram-eng\">He isn't going to come.</span> <span class=\"gram-trans\">(Ele não vai vir.)</span></li><li><span class=\"gram-eng\">What are you going to do?</span> <span class=\"gram-trans\">(O que você vai fazer?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Expressões comuns: tomorrow, next week, tonight, this weekend.</li><li>Use para planos JÁ DECIDIDOS — se a decisão é na hora, use WILL.</li></ul></div></div>"},
{order:79,badge:"79",topic:"Have + Noun / Feel + Adjective",book:"Intro",ref:"Intro - pg. 79 (Unit 12 - How do you feel?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para descrever problemas de saúde e sensações, usamos duas estruturas:<br>HAVE + substantivo (para sintomas físicos) e FEEL + adjetivo (para<br>sensações/estados emocionais).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">HAVE + SUBSTANTIVO (sintoma físico)</h5><p>&quot;I have a headache.&quot; (cabeça)<br>&quot;She has a fever.&quot; (febre)<br>&quot;He has a cold.&quot; (resfriado)</p><h5 class=\"gram-subhead\">FEEL + ADJETIVO (sensação/estado)</h5><p>&quot;I feel sick.&quot; (me sinto mal)<br>&quot;She feels tired.&quot; (ela se sente cansada)<br>&quot;They feel better today.&quot; (eles se sentem melhor hoje)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I have a cold.</span> <span class=\"gram-trans\">(Estou resfriado.)</span></li><li><span class=\"gram-eng\">She has a sore throat.</span> <span class=\"gram-trans\">(Ela está com dor de garganta.)</span></li><li><span class=\"gram-eng\">He has a backache.</span> <span class=\"gram-trans\">(Ele está com dor nas costas.)</span></li><li><span class=\"gram-eng\">He feels tired today.</span> <span class=\"gram-trans\">(Ele se sente cansado hoje.)</span></li><li><span class=\"gram-eng\">I feel awful.</span> <span class=\"gram-trans\">(Me sinto péssimo.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>HAVE para sintomas FÍSICOS: a headache, a cough, a fever, a cold.</li><li>FEEL para SENSAÇÕES/ESTADOS: tired, sick, better, awful, fine.</li></ul></div></div>"},
{order:82,badge:"82",topic:"Imperatives",book:"Intro",ref:"Intro - pg. 82 (Unit 12 - How do you feel?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O IMPERATIVO é usado para dar instruções, conselhos, ordens ou<br>sugestões. A forma afirmativa usa o verbo na forma original; a<br>negativa usa DON'T + verbo.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">IMPERATIVO AFIRMATIVO</h5><p>Verbo na forma original (sem to)<br>&quot;Drink water.&quot; / &quot;Take this medicine.&quot;</p><h5 class=\"gram-subhead\">IMPERATIVO NEGATIVO</h5><p>DON'T + verbo na forma original<br>&quot;Don't worry.&quot; / &quot;Don't eat sugar.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Take this medicine.</span> <span class=\"gram-trans\">(Tome este remédio.)</span></li><li><span class=\"gram-eng\">Drink a lot of water.</span> <span class=\"gram-trans\">(Beba bastante água.)</span></li><li><span class=\"gram-eng\">Get some rest.</span> <span class=\"gram-trans\">(Descanse.)</span></li><li><span class=\"gram-eng\">Don't eat too much sugar.</span> <span class=\"gram-trans\">(Não coma muito açúcar.)</span></li><li><span class=\"gram-eng\">Don't go out in the cold.</span> <span class=\"gram-trans\">(Não saia no frio.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>O sujeito (you) NÃO aparece no imperativo: &quot;Open the door&quot; (não &quot;You open&quot;).</li><li>Para soar mais educado, adicione PLEASE: &quot;Please sit down&quot; / &quot;Sit down, please&quot;.</li></ul></div></div>"},
{order:88,badge:"88",topic:"Giving Directions (Prepositions)",book:"Intro",ref:"Intro - pg. 88",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para dar direções em inglês, usamos preposições de lugar e expressões<br>específicas de movimento e localização.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PREPOSIÇÕES DE LUGAR</h5><p>on (em cima de) | in (dentro de) | at (em - ponto)<br>next to (ao lado de) | between (entre)<br>in front of (em frente a) | behind (atrás de)<br>across from (do outro lado de) | near (perto de)</p><h5 class=\"gram-subhead\">EXPRESSÕES DE MOVIMENTO</h5><p>go straight | turn left/right | on the corner of</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The bank is next to the hotel.</span> <span class=\"gram-trans\">(O banco é ao lado do hotel.)</span></li><li><span class=\"gram-eng\">Go straight and turn right.</span> <span class=\"gram-trans\">(Siga reto e vire à direita.)</span></li><li><span class=\"gram-eng\">The store is on the corner.</span> <span class=\"gram-trans\">(A loja é na esquina.)</span></li><li><span class=\"gram-eng\">It's across from the park.</span> <span class=\"gram-trans\">(É do outro lado do parque.)</span></li><li><span class=\"gram-eng\">Walk down Main Street for two blocks.</span> <span class=\"gram-trans\">(Ande pela Main Street dois quarteirões.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;On the corner of X and Y&quot; → na esquina das ruas X e Y.</li><li>&quot;Down/up the street&quot; → seguindo pela rua (não literal de descer/subir).</li></ul></div></div>"},
{order:88,badge:"88",topic:"Prepositional Phrases",book:"Intro",ref:"Intro - pg. 88 (Unit 13 - How do I get there?) [conteúdo aborda prepositional phrases gerais usadas ao longo do livro: lugar, tempo, modo]",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As prepositional phrases são pequenos grupos de palavras formados por<br>PREPOSIÇÃO + SUBSTANTIVO (ou pronome). Servem para localizar, indicar<br>tempo ou propósito.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>PREPOSIÇÃO + (artigo) + SUBSTANTIVO</p><h5 class=\"gram-subhead\">FUNÇÕES PRINCIPAIS</h5><p>Lugar:   in the office, at home, on the phone<br>Tempo:   at 3 p.m., in the morning, on Monday<br>Modo:    by car, by bus, with my friend</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">She's at the office now.</span> <span class=\"gram-trans\">(Ela está no escritório agora.)</span></li><li><span class=\"gram-eng\">I left a message on the phone.</span> <span class=\"gram-trans\">(Deixei um recado no telefone.)</span></li><li><span class=\"gram-eng\">I'll call you in the afternoon.</span> <span class=\"gram-trans\">(Vou te ligar à tarde.)</span></li><li><span class=\"gram-eng\">He goes to work by car.</span> <span class=\"gram-trans\">(Ele vai ao trabalho de carro.)</span></li><li><span class=\"gram-eng\">I'm with my family today.</span> <span class=\"gram-trans\">(Estou com minha família hoje.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Algumas expressões prontas: &quot;on the phone&quot;, &quot;at work&quot;, &quot;in a hurry&quot;.</li><li>&quot;By + meio de transporte&quot;: by car, by bus, by plane (sem artigo).</li></ul></div></div>"},
{order:88,badge:"88",topic:"Prepositions of Place",book:"Intro",ref:"Intro - pg. 88 (Unit 13 - How do I get there?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As preposições de lugar indicam ONDE algo está localizado em relação<br>a outro objeto.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PRINCIPAIS</h5><p>IN          → dentro de<br>ON          → em cima de<br>UNDER       → embaixo de<br>BEHIND      → atrás de<br>IN FRONT OF → em frente a<br>NEXT TO     → ao lado de<br>BETWEEN     → entre<br>NEAR        → perto de</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The book is on the table.</span> <span class=\"gram-trans\">(O livro está em cima da mesa.)</span></li><li><span class=\"gram-eng\">My keys are in the drawer.</span> <span class=\"gram-trans\">(Minhas chaves estão na gaveta.)</span></li><li><span class=\"gram-eng\">The cat is under the bed.</span> <span class=\"gram-trans\">(O gato está embaixo da cama.)</span></li><li><span class=\"gram-eng\">The bank is next to the hotel.</span> <span class=\"gram-trans\">(O banco fica ao lado do hotel.)</span></li><li><span class=\"gram-eng\">The pen is between the books.</span> <span class=\"gram-trans\">(A caneta está entre os livros.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>IN para espaços fechados (in the box, in the room) | ON para superfícies (on the table).</li><li>BETWEEN sempre se refere a DOIS objetos; entre três ou mais: AMONG.</li></ul></div></div>"},
{order:103,badge:"103",topic:"WH-Questions Past with Did/Was/Were",book:"Intro",ref:"Intro - pg. 103 (Unit 15 - Where were you born?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As WH-questions no passado usam dois auxiliares diferentes: DID para<br>verbos comuns (do, eat, go) e WAS/WERE para o verbo TO BE.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">COM DID (verbos comuns)</h5><p>WH-WORD + DID + sujeito + VERBO (forma original)?</p><h5 class=\"gram-subhead\">COM WAS/WERE (verbo TO BE)</h5><p>WH-WORD + WAS/WERE + sujeito + complemento?</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Where did you go yesterday?</span> <span class=\"gram-trans\">(Onde você foi ontem?)</span></li><li><span class=\"gram-eng\">What did she do last weekend?</span> <span class=\"gram-trans\">(O que ela fez no fim de semana?)</span></li><li><span class=\"gram-eng\">When were you born?</span> <span class=\"gram-trans\">(Quando você nasceu?)</span></li><li><span class=\"gram-eng\">Where was the party?</span> <span class=\"gram-trans\">(Onde foi a festa?)</span></li><li><span class=\"gram-eng\">Why did they leave early?</span> <span class=\"gram-trans\">(Por que eles saíram cedo?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Verbos comuns: WH + DID + sujeito + VERBO ORIGINAL (&quot;Where did you go?&quot;).</li><li>Verbo TO BE: WH + WAS/WERE + sujeito (&quot;Where were you?&quot;).</li></ul></div></div>"},
{order:107,badge:"107",topic:"Object Pronouns",book:"Intro",ref:"Intro - pg. 107",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Os object pronouns (me, you, him, her, it, us, them) substituem o<br>substantivo quando ele é OBJETO da frase (recebe a ação do verbo).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">SUBJECT PRONOUNS  →  OBJECT PRONOUNS</h5><p>I    → me<br>you  → you<br>he   → him<br>she  → her<br>it   → it<br>we   → us<br>they → them</p><h5 class=\"gram-subhead\">POSIÇÃO: vêm DEPOIS do verbo ou da preposição.</h5></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I love her.</span> <span class=\"gram-trans\">(Eu a amo.)</span></li><li><span class=\"gram-eng\">Call me later.</span> <span class=\"gram-trans\">(Me ligue mais tarde.)</span></li><li><span class=\"gram-eng\">Can you help us?</span> <span class=\"gram-trans\">(Você pode nos ajudar?)</span></li><li><span class=\"gram-eng\">I gave him the book.</span> <span class=\"gram-trans\">(Dei o livro a ele.)</span></li><li><span class=\"gram-eng\">I bought a gift for them.</span> <span class=\"gram-trans\">(Comprei um presente para eles.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Sujeito faz a ação: &quot;He loves Maria.&quot; | Objeto recebe a ação: &quot;Maria loves him.&quot;</li><li>Depois de preposições, sempre use object pronoun: &quot;for me&quot;, &quot;with him&quot;.</li></ul></div></div>"},
