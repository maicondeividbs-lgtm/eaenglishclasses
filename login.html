    width: 600px;
    height: 600px;

  .login-logo .nav-logo-text { color: var(--white); font-size: 24px; }

  .login-card {
    background: var(--white);
    border-radius: var(--r-xl);
    padding: 40px;
    box-shadow: var(--shadow-xl);
  }
  .login-card h2 {
    font-size: 28px;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .login-card h2 em { color: var(--orange); font-style: italic; font-weight: 900; }
  .login-card > p {
    font-size: 14px;
    color: var(--g500);
    margin-bottom: 28px;
  }
  .login-footer {
    text-align: center;
    font-size: 13px;
    color: var(--g500);
    margin-top: 20px;
  }
  .login-footer a {
    color: var(--orange);
    font-weight: 700;
  }
  .portal-demo {
    margin-top: 28px;
    padding-top: 28px;
    border-top: 2px dashed var(--g200);
    text-align: center;
  }
  .portal-demo p {
    font-size: 13px;
    color: var(--g500);
    margin-bottom: 14px;
  }
  .portal-buttons {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .portal-btn {
    padding: 10px 16px;
    border-radius: var(--r-full);
    font-size: 13px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .portal-btn.student { background: var(--blue-soft); color: var(--blue); }
  .portal-btn.student:hover { background: var(--blue); color: var(--white); transform: translateY(-2px); }
  .portal-btn.teacher { background: var(--orange-soft); color: var(--orange); }
  .portal-btn.teacher:hover { background: var(--orange); color: var(--white); transform: translateY(-2px); }
  .portal-btn.coord { background: var(--mango-soft); color: var(--mango); }
  .portal-btn.coord:hover { background: var(--mango); color: var(--white); transform: translateY(-2px); }
  .back-home {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 24px;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    transition: color 0.2s;
  }
  .back-home:hover { color: var(--white); }
  .protopip {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-align: center;
    margin-top: 20px;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .login-box { animation: fadeUp 0.6s cubic-bezier(0.4,0,0.2,1); }
  .login-card { animation: fadeUp 0.6s cubic-bezier(0.4,0,0.2,1) 0.1s backwards; }
  .form-group { animation: fadeUp 0.5s cubic-bezier(0.4,0,0.2,1) backwards; }
  .form-group:nth-child(1) { animation-delay: 0.15s; }
  .form-group:nth-child(2) { animation-delay: 0.25s; }
  .login-spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  .login-card .form-group input:valid {
    border-color: #10b981;
  }
  .login-card .form-group input:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 4px rgba(243,107,46,0.1);
  }
  .login-welcome {
    text-align: center;
    padding: 16px;
    margin-bottom: 20px;
    background: rgba(245,154,30,0.08);
    border-radius: 12px;
    font-size: 13px;
    color: var(--g700);

<script>
document.addEventListener('DOMContentLoaded',()=>{
  const reveals=document.querySelectorAll('.reveal');
  const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible')})},{threshold:0.08,rootMargin:'0px 0px -50px 0px'});
  reveals.forEach(el=>obs.observe(el));
  window.addEventListener('scroll',()=>{document.getElementById('nav')?.classList.toggle('scrolled',window.scrollY>50)},{passive:true});
});
</script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const loginForm = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
  const loginError = document.getElementById('loginError');

  // Check if already logged in
  (async () => {
    const profile = await getUserProfile();
    if (profile) {
      redirectByRole(profile.role);
    }
  })();

  if (loginForm) {
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      loginBtn.disabled = true;
      document.getElementById('loginText').textContent = 'Entrando...';
      document.getElementById('loginSpinner').style.display = 'block';
      loginError.style.display = 'none';

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      try {
        const data = await signIn(email, password);
        
        // Wait a moment for session to settle
        await new Promise(r => setTimeout(r, 500));
        
        // Get user profile to determine role
        const profile = await getUserProfile();
        console.log('Profile loaded:', profile);
        
        if (profile && profile.role) {
          console.log('Redirecting by role:', profile.role);
          redirectByRole(profile.role);
        } else {
          // Fallback: try fetching directly
          const session = await getSession();
          if (session) {
            const { data: p2 } = await db
              .from('profiles')
              .select('role')
              .eq('id', session.user.id)
              .maybeSingle();
            console.log('Fallback profile:', p2);
            if (p2 && p2.role) {
              redirectByRole(p2.role);
            } else {
              window.location.href = 'dashboard-aluno.html';
            }
          }
        }
        
      } catch (err) {
        console.error('Login error:', err);
        let msg = 'E-mail ou senha incorretos.';
        if (err.message?.includes('Invalid login')) {
          msg = 'E-mail ou senha incorretos. Verifique e tente novamente.';
        } else if (err.message?.includes('Email not confirmed')) {
          msg = 'Confirme seu e-mail antes de fazer login. Verifique sua caixa de entrada.';
        }
        loginError.textContent = msg;
        loginError.style.display = 'block';
      } finally {
        loginBtn.disabled = false;
        document.getElementById('loginText').textContent = 'Entrar';
        document.getElementById('loginSpinner').style.display = 'none';
      }
    });
  }
});
</script>
