{order:39,badge:'39',topic:'REQUESTS WITH MODALS AND WOULD YOU MIND',book:'Blue book',ref:'Blue book - pg. 39',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Para fazer PEDIDOS de forma educada em inglês, existem duas estruturas<br>principais:</p><p>1) MODAIS CAN, COULD e WOULD<br>Estruturas básicas para pedir algo de forma educada.</p><p>2) WOULD YOU MIND + VERB(-ING)<br>Estrutura ainda mais polida e formal.</p><p>A diferença está no nível de formalidade e na estrutura que segue cada<br>modal.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM MODAIS CAN/COULD/WOULD:</h5><p>CAN/COULD/WOULD + SUJEITO + VERBO (forma original) ?</p><h5 class="gram-subhead">NÍVEIS DE FORMALIDADE:</h5><p>CAN → informal e direto<br>COULD → mais educado<br>WOULD → mais polido/formal</p><h5 class="gram-subhead">COM WOULD YOU MIND:</h5><p>WOULD YOU MIND + VERBO + ING ?</p><p>⚠️ ATENÇÃO: Após "would you mind", o verbo SEMPRE vai no GERÚNDIO (-ING).</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM CAN/COULD/WOULD:</h5><ul class="gram-bullets"><li><span class="gram-eng">Can you help me?</span> <span class="gram-trans">(Você pode me ajudar?)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Could you move your things away, please?</span> <span class="gram-trans">(Você poderia mover suas coisas, por favor?)</span></li></ul><ul class="gram-bullets"><li>Would you open the window?</li></ul><h5 class="gram-subhead">COM WOULD YOU MIND (+ ing):</h5><ul class="gram-bullets"><li><span class="gram-eng">Would you mind helping me?</span> <span class="gram-trans">(Você se importaria de me ajudar?)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Would you mind moving your things away, please?</span> <span class="gram-trans">(Você se importaria de mover suas coisas, por favor?)</span></li></ul><ul class="gram-bullets"><li>Would you mind opening the window?</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">ATENÇÃO À FORMA DO VERBO após cada estrutura: ✔️ Can you HELP me? (forma original) ✔️ Could you HELP me? (forma original) ✔️ Would you mind HELPING me?</span> <span class="gram-trans">(gerúndio -ING)</span></li></ul><p>❌ Would you mind to help me?<br>❌ Would you mind help me?</p><ul class="gram-bullets"><li>Como RESPONDER a "Would you mind...?": - "No, not at all." / "No, of course not." (Pode sim, sem problema!) - "Sure, no problem." - "I\'m sorry, but..." (negativa educada)</li></ul><p>⚠️ Resposta "No" significa SIM (não me importo de fazer)! Confunde no início.</p><ul class="gram-bullets"><li>Para tornar QUALQUER pedido ainda mais educado, adicione "please": - Could you please close the door? - Would you mind closing the door, please?</li></ul></div></div>'},
{order:45,badge:'45',topic:'INFINITIVES AND GERUNDS FOR USES (Para que serve)',book:'Blue book',ref:'Blue book - pg. 45',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Quando queremos descrever PARA QUE SERVE algo (a função ou utilidade de<br>um objeto, lugar, atividade), podemos usar duas estruturas no inglês:</p><p>1) INFINITIVE STRUCTURE: TO + VERB<br>2) GERUND STRUCTURE: FOR + VERB-ING</p><p>Ambas significam EXATAMENTE A MESMA COISA - são equivalentes.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA INFINITIVA:</h5><p>FRASE + TO + VERBO (forma original)</p><h5 class="gram-subhead">ESTRUTURA COM GERÚNDIO:</h5><p>FRASE + FOR + VERBO + ING</p><h5 class="gram-subhead">TRADUÇÃO em português:</h5><p>Ambas equivalem a "para + verbo" (para aprender, para estudar...).</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">MESMA IDEIA, DUAS ESTRUTURAS:</h5><p>Estrutura INFINITIVA: Estrutura com GERÚNDIO:<br>───────────────────── ──────────────────────────</p><ul class="gram-bullets"><li><span class="gram-eng">I go to school TO LEARN. • I go to school FOR LEARNING.</span> <span class="gram-trans">(Vou à escola para aprender.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">This knife is used • This knife is used TO CUT vegetables. FOR CUTTING vegetables.</span> <span class="gram-trans">(Esta faca serve para cortar legumes.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">The internet is • The internet is TO COMMUNICATE. FOR COMMUNICATING.</span> <span class="gram-trans">(A internet é para comunicar.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>Ambas as estruturas são corretas e usadas no inglês cotidiano. A diferença é apenas estilística: - "TO + VERB" → soa mais natural em conversação - "FOR + VERB-ING" → muito comum em descrições formais</li></ul><ul class="gram-bullets"><li>Estrutura típica para perguntar sobre função: - What is this used for? - It\'s used to cut paper. / It\'s used for cutting paper.</li></ul><ul class="gram-bullets"><li>Cuidado para não misturar as estruturas: ❌ I go to school for learn. ❌ I go to school to learning. ✔️ I go to school TO LEARN. ✔️ I go to school FOR LEARNING.</li></ul><ul class="gram-bullets"><li>"What for?" é uma pergunta comum: - I bought a knife. - What for? (Para quê?) - To cut vegetables. / For cutting vegetables.</li></ul></div></div>'},
{order:54,badge:'54',topic:'ADVERBIAL CLAUSE OF TIME',book:'Blue book',ref:'Blue book - pg. 54',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>ADVERBIAL CLAUSES OF TIME são orações que indicam QUANDO algo acontece em<br>relação a outra ação. Elas conectam duas ações no tempo.</p><p>Os três principais conectores temporais nesta página são:</p><ul class="gram-bullets"><li>WHEN → ao MESMO TEMPO de outra ação</li><li>AFTER → DEPOIS de outra ação</li><li>BEFORE → ANTES de outra ação</li></ul></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM WHEN (ao mesmo tempo):</h5><p>WHEN + sujeito + verbo, + ação principal<br>ou<br>ação principal + WHEN + sujeito + verbo</p><h5 class="gram-subhead">COM AFTER (depois de):</h5><p>AFTER + verbo-ing (ou sujeito+verbo), + ação principal</p><h5 class="gram-subhead">COM BEFORE (antes de):</h5><p>BEFORE + verbo-ing (ou sujeito+verbo), + ação principal</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">WHEN (ao mesmo tempo / no momento que):</h5><ul class="gram-bullets"><li>When we learn we develop. (Quando aprendemos, nos desenvolvemos.) = "At the same time we learn we develop."</li></ul><ul class="gram-bullets"><li>When she arrived, the party started.</li></ul><h5 class="gram-subhead">AFTER (depois de):</h5><ul class="gram-bullets"><li>After getting married, our life changes a lot. (Depois de se casar, a nossa vida muda bastante.) = "At the following moment we get married, our life changes a lot."</li></ul><ul class="gram-bullets"><li>After eating dinner, I always read a book.</li></ul><h5 class="gram-subhead">BEFORE (antes de):</h5><ul class="gram-bullets"><li>Before being alone, be certain you can handle it. (Antes de ficar sozinho, tenha certeza que consegue lidar com isso.) = "At the previous moment of being alone, be certain you can handle it."</li></ul><ul class="gram-bullets"><li>Before going to bed, brush your teeth.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>Quando o sujeito é o MESMO nas duas ações, podemos reduzir usando -ING: - When I arrive home, I cook dinner. - When arriving home, I cook dinner. - Before I sleep, I read. - Before sleeping, I read.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Se a oração temporal vem PRIMEIRO, use VÍRGULA para separá-la: - After eating dinner, I read a book. (com vírgula) - I read a book after eating dinner.</span> <span class="gram-trans">(sem vírgula)</span></li></ul><ul class="gram-bullets"><li>Outros conectores temporais úteis: - WHILE → enquanto (ações simultâneas duradouras) - AS SOON AS → assim que - UNTIL → até que - ONCE → uma vez que / assim que</li></ul></div></div>'},
{order:59,badge:'59',topic:'TIME CONTRASTS & MIGHT (Contrastes de Tempo e Might)',book:'Blue book',ref:'Blue book - pg. 59',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta página apresenta dois conteúdos relacionados ao USO DO TEMPO em<br>inglês:</p><p>1) EXPRESSÕES INDICATIVAS DE TEMPO<br>Além de usar os tempos verbais corretos (Simple Past, Present, Future),<br>é importante usar EXPRESSÕES TEMPORAIS para deixar claro QUANDO algo<br>acontece.</p><p>2) MIGHT (Possibilidade Futura)<br>O modal MIGHT é usado para expressar uma POSSIBILIDADE no futuro -<br>algo que pode ou não acontecer.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">EXPRESSÕES DE TEMPO PARA CADA TEMPO VERBAL:</h5><p>PAST (passado):</p><ul class="gram-bullets"><li>used to</li><li>ago</li><li>in the past</li></ul><p>PRESENT (presente):</p><ul class="gram-bullets"><li>nowadays</li><li>these days</li><li>today</li></ul><p>FUTURE (futuro):</p><ul class="gram-bullets"><li>in the future</li><li>soon</li><li>in a few years</li></ul><h5 class="gram-subhead">USO DE "MIGHT" (possibilidade futura):</h5><p>SUJEITO + MIGHT + VERBO (forma original)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">EXPRESSÕES NO PASSADO:</h5><ul class="gram-bullets"><li><span class="gram-eng">We used to play soccer together.</span> <span class="gram-trans">(Nós costumávamos jogar futebol juntos.)</span></li><li><span class="gram-eng">I lived in that house 10 years ago.</span> <span class="gram-trans">(Eu morei naquela casa 10 anos atrás.)</span></li><li><span class="gram-eng">People spent a lot more time together in the past.</span> <span class="gram-trans">(As pessoas passavam muito mais tempo juntas no passado.)</span></li></ul><h5 class="gram-subhead">EXPRESSÕES NO PRESENTE:</h5><ul class="gram-bullets"><li><span class="gram-eng">Nowadays, everyone is too busy to think about relaxing.</span> <span class="gram-trans">(Hoje em dia, todos estão muito ocupados para pensar em relaxar.)</span></li><li><span class="gram-eng">These days the world has been really noisy.</span> <span class="gram-trans">(Nestes dias, o mundo tem sido muito barulhento.)</span></li><li>We are going to the gym today.</li></ul><h5 class="gram-subhead">EXPRESSÕES NO FUTURO:</h5><ul class="gram-bullets"><li><span class="gram-eng">In the future, there will be flying cars.</span> <span class="gram-trans">(No futuro, haverá carros voadores.)</span></li><li><span class="gram-eng">Soon, everyone will work from home.</span> <span class="gram-trans">(Em breve, todos vão trabalhar de casa.)</span></li><li>In a few years, we are going to be living in modern houses.</li></ul><h5 class="gram-subhead">USO DE "MIGHT" (possibilidade no futuro):</h5><ul class="gram-bullets"><li><span class="gram-eng">It might rain tomorrow.</span> <span class="gram-trans">(Pode chover amanhã.)</span></li><li><span class="gram-eng">She might come to the party.</span> <span class="gram-trans">(Ela pode vir à festa.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">MIGHT vs WILL vs BE GOING TO: - WILL → futuro com certeza - BE GOING TO → plano firme - MIGHT → possibilidade</span> <span class="gram-trans">(talvez sim, talvez não)</span></li></ul><ul class="gram-bullets"><li>Após MIGHT, NUNCA use "to" antes do verbo principal: ❌ It might to rain. ✔️ It might rain.</li></ul><ul class="gram-bullets"><li>MIGHT é parecido com MAY em significado, mas MIGHT é mais usado para possibilidades, enquanto MAY pode também indicar permissão.</li></ul><ul class="gram-bullets"><li>Expressões temporais geralmente vão no INÍCIO ou FIM da frase: - In the future, technology will dominate. - Technology will dominate in the future.</li></ul></div></div>'},
{order:61,badge:'61',topic:'FIRST CONDITIONAL (Primeiro Condicional)',book:'Blue book',ref:'Blue book - pg. 61',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O PRIMEIRO CONDICIONAL é usado para falar de SITUAÇÕES POSSÍVEIS no<br>PRESENTE que terão um RESULTADO no FUTURO.</p><p>É uma frase de causa-e-consequência REAL e PROVÁVEL, diferente do segundo<br>condicional (que trata de situações hipotéticas/impossíveis).</p><p>ESTRUTURA: SE acontecer X (condição real no presente), VAI/PODE acontecer Y<br>(resultado no futuro).</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA BÁSICA:</h5><p>IF + SIMPLE PRESENT, + MODAL/WILL + VERBO</p><h5 class="gram-subhead">MODAIS COMUNS NO RESULTADO:</h5><p>WILL → consequência certa<br>MAY / MIGHT → consequência possível<br>BE ABLE TO → indica capacidade futura</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">CONDIÇÕES (situações possíveis no presente):</h5><ul class="gram-bullets"><li>If you find a wallet on the street...</li><li>If you get late to class...</li><li>If your dog eats a piece of plastic...</li><li>If you study every day...</li></ul><h5 class="gram-subhead">RESULTADOS (consequências futuras):</h5><ul class="gram-bullets"><li><span class="gram-eng">You may give it back to the owner.</span> <span class="gram-trans">(Você pode devolver ao dono.)</span></li><li><span class="gram-eng">You might apologize to your teacher.</span> <span class="gram-trans">(Você pode se desculpar com seu professor.)</span></li><li><span class="gram-eng">You will need to take it to the vet.</span> <span class="gram-trans">(Você vai precisar levá-lo ao veterinário.)</span></li></ul><h5 class="gram-subhead">FRASES COMPLETAS:</h5><ul class="gram-bullets"><li><span class="gram-eng">If you get rich, you will be able to buy a car.</span> <span class="gram-trans">(Se você ficar rico, vai poder comprar um carro.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">If you behave badly, you might have to say sorry.</span> <span class="gram-trans">(Se você se comportar mal, talvez tenha que pedir desculpas.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">If it rains tomorrow, we won\'t go to the beach.</span> <span class="gram-trans">(Se chover amanhã, não vamos para a praia.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">If she studies, she will pass the test.</span> <span class="gram-trans">(Se ela estudar, vai passar na prova.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: na cláusula com IF (condição), NUNCA use WILL. ❌ If it will rain, we\'ll stay home. ✔️ If it rains, we\'ll stay home.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">A ordem das cláusulas pode ser INVERTIDA: - If you study, you will pass. (IF primeiro: usa vírgula) - You will pass if you study.</span> <span class="gram-trans">(resultado primeiro: sem vírgula)</span></li></ul><ul class="gram-bullets"><li>Use WILL vs MIGHT vs MAY conforme a certeza: - WILL → 100% certeza - MAY / MIGHT → 50% (possibilidade)</li></ul><ul class="gram-bullets"><li>Esse é o "REAL" conditional - fala de coisas que podem REALMENTE acontecer, diferente do Second Conditional (irreal).</li></ul></div></div>'},
{order:65,badge:'65',topic:'GERUNDS AFTER VERBS & PREPOSITIONS / SO & NEITHER',book:'Blue book',ref:'Blue book - pg. 65',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta página apresenta dois tópicos importantes para conversação natural:</p><p>1) GERUNDS APÓS VERBOS E PREPOSIÇÕES<br>Determinados verbos e preposições no inglês SEMPRE pedem o verbo<br>seguinte na forma -ING (gerúndio).</p><p>2) AGREEING COM SO/NEITHER<br>Estruturas específicas para CONCORDAR com afirmações positivas (SO) ou<br>negativas (NEITHER) de outras pessoas.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">VERBOS QUE PEDEM GERÚNDIO (-ING):</h5><p>ENJOY, LOVE, AVOID, LIKE, HATE, FINISH, MIND, KEEP, STOP...</p><h5 class="gram-subhead">PREPOSIÇÕES PEDEM GERÚNDIO:</h5><p>AT, ON, IN, OF, FOR, ABOUT, AFTER, BEFORE, WITHOUT...</p><h5 class="gram-subhead">CONCORDÂNCIA AFIRMATIVA (com SO):</h5><p>SO + AUXILIAR (DO/CAN/BE) + SUJEITO<br>"Eu também..."</p><h5 class="gram-subhead">CONCORDÂNCIA NEGATIVA (com NEITHER):</h5><p>NEITHER + AUXILIAR (DO/CAN/BE) + SUJEITO<br>"Eu também não..."</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">GERÚNDIOS APÓS VERBOS:</h5><ul class="gram-bullets"><li><span class="gram-eng">I enjoy talking to you.</span> <span class="gram-trans">(Eu gosto de falar com você.)</span></li><li><span class="gram-eng">I love helping her.</span> <span class="gram-trans">(Adoro ajudá-la.)</span></li><li><span class="gram-eng">I avoid eating chocolate.</span> <span class="gram-trans">(Evito comer chocolate.)</span></li></ul><h5 class="gram-subhead">GERÚNDIOS APÓS PREPOSIÇÕES:</h5><ul class="gram-bullets"><li><span class="gram-eng">I am good at advising people.</span> <span class="gram-trans">(Sou bom em aconselhar pessoas.)</span></li><li>She is interested in learning Spanish.</li><li>He left without saying goodbye.</li></ul><h5 class="gram-subhead">CONCORDÂNCIA AFIRMATIVA (SO):</h5><ul class="gram-bullets"><li><span class="gram-eng">I love chocolate. → So do I.</span> <span class="gram-trans">(Eu também.)</span></li><li><span class="gram-eng">I am really happy today. → So am I.</span> <span class="gram-trans">(Eu também estou.)</span></li><li><span class="gram-eng">I can speak English pretty well. → So can I.</span> <span class="gram-trans">(Eu também consigo.)</span></li></ul><h5 class="gram-subhead">CONCORDÂNCIA NEGATIVA (NEITHER):</h5><ul class="gram-bullets"><li><span class="gram-eng">I don\'t like chocolate. → Neither do I.</span> <span class="gram-trans">(Eu também não.)</span></li><li><span class="gram-eng">I am not sad today. → Neither am I.</span> <span class="gram-trans">(Eu também não estou.)</span></li><li><span class="gram-eng">I can\'t speak Russian. → Neither can I.</span> <span class="gram-trans">(Eu também não consigo.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>A escolha do AUXILIAR depende do verbo da frase original: - Verbo normal (like, want, etc.) → DO / DOES / DID - Verbo TO BE (am, is, are, was) → BE (am, is, are, was) - Modal (can, will, should) → o próprio modal</li></ul><ul class="gram-bullets"><li>Atenção à ORDEM: SO/NEITHER vem ANTES do auxiliar: ❌ I do so. ✔️ So do I.</li></ul><ul class="gram-bullets"><li>Para discordar: - Positivo discorda: "Really? I don\'t!" - Negativo discorda: "Really? I do!"</li></ul><ul class="gram-bullets"><li>Alternativa coloquial: - Instead of "So do I" → "Me too" - Instead of "Neither do I" → "Me neither"</li></ul></div></div>'},
{order:73,badge:'73',topic:'PASSIVE VOICE WITH SIMPLE PAST',book:'Blue book',ref:'Blue book - pg. 73',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>A VOZ PASSIVA (Passive Voice) é usada quando o FOCO da frase está no<br>PROCESSO ou na AÇÃO em si, e não em quem realiza a ação.</p><p>Em outras palavras: o OBJETO da frase ativa torna-se o SUJEITO da frase<br>passiva, dando destaque a ele.</p><p>Quando queremos mencionar QUEM realizou a ação, usamos a preposição BY.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA DA PASSIVE VOICE NO SIMPLE PAST:</h5><p>OBJETO + WAS/WERE + PAST PARTICIPLE + (BY + AGENTE)</p><h5 class="gram-subhead">COMPARAÇÃO ATIVA vs PASSIVA:</h5><p>ATIVA: SUJEITO + verbo no passado + OBJETO<br>PASSIVA: OBJETO + WAS/WERE + past participle + BY + SUJEITO</p><h5 class="gram-subhead">WAS / WERE:</h5><p>WAS → para objetos no SINGULAR<br>WERE → para objetos no PLURAL</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COMPARANDO ATIVA E PASSIVA:</h5><p>ATIVA: The monkey ATE the apple.<br>PASSIVA: The apple WAS EATEN by the monkey.<br>(A maçã foi comida pelo macaco.)</p><p>ATIVA: The architect MADE the building.<br>PASSIVA: The building WAS MADE by the architect.<br>(O prédio foi feito pelo arquiteto.)</p><p>ATIVA: The famous writer WROTE the book.<br>PASSIVA: The book WAS WRITTEN by the famous writer.<br>(O livro foi escrito pelo famoso escritor.)</p><h5 class="gram-subhead">MAIS EXEMPLOS:</h5><ul class="gram-bullets"><li><span class="gram-eng">The cake was baked yesterday.</span> <span class="gram-trans">(O bolo foi assado ontem.)</span></li><li><span class="gram-eng">The windows were cleaned by my mother.</span> <span class="gram-trans">(As janelas foram limpas pela minha mãe.)</span></li><li><span class="gram-eng">The letter was sent last week.</span> <span class="gram-trans">(A carta foi enviada na semana passada.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>Quando usar PASSIVE VOICE? 1) Quando o agente é desconhecido: "My car was stolen." 2) Quando o agente é óbvio ou irrelevante: "He was arrested." 3) Para dar ênfase ao OBJETO em vez de quem fez a ação.</li></ul><ul class="gram-bullets"><li>"BY + agente" é OPCIONAL - use somente quando for relevante: ✔️ The cake was eaten. ✔️ The cake was eaten by my brother. (se quiser destacar quem)</li></ul><ul class="gram-bullets"><li>ATENÇÃO ao PAST PARTICIPLE (3ª coluna dos verbos irregulares): - eat → ate → eaten - write → wrote → written - make → made → made - see → saw → seen</li></ul><ul class="gram-bullets"><li>A passive voice é MUITO COMUM em textos formais, científicos e jornalísticos.</li></ul></div></div>'},
{order:79,badge:'79',topic:'PAST CONTINUOUS (Passado Contínuo)',book:'Blue book',ref:'Blue book - pg. 79 e Green book - pg. 23',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O PAST CONTINUOUS (Passado Contínuo) é usado para expressar uma AÇÃO QUE<br>ESTAVA EM ANDAMENTO em um determinado momento do passado.</p><p>É o equivalente em inglês de "estava + fazendo" em português.</p><p>Esse tempo verbal é frequentemente usado em CONTRASTE com o Simple Past,<br>para indicar que uma ação contínua foi INTERROMPIDA por outra ação no<br>passado.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><p>SUJEITO + WAS/WERE + VERBO + ING + COMPLEMENTO</p><h5 class="gram-subhead">NEGATIVA:</h5><p>SUJEITO + WAS/WERE + NOT + VERBO + ING + COMPLEMENTO</p><h5 class="gram-subhead">INTERROGATIVA:</h5><p>WAS/WERE + SUJEITO + VERBO + ING + COMPLEMENTO ?</p><h5 class="gram-subhead">USO DE WAS / WERE:</h5><p>I, HE, SHE, IT → WAS<br>YOU, WE, THEY → WERE</p><h5 class="gram-subhead">USO TÍPICO (em contraste com Simple Past):</h5><p>Quando uma ação CONTÍNUA é INTERROMPIDA por uma ação PONTUAL.</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">I was drinking water.</span> <span class="gram-trans">(Eu estava bebendo água.)</span></li><li>She was studying when I arrived.</li><li>They were playing soccer all afternoon.</li></ul><h5 class="gram-subhead">NEGATIVA:</h5><ul class="gram-bullets"><li>I was not drinking water. / I wasn\'t drinking water.</li><li>She wasn\'t studying.</li><li>They weren\'t playing soccer.</li></ul><h5 class="gram-subhead">INTERROGATIVA:</h5><ul class="gram-bullets"><li>Was she drinking water? - Yes, she was. / No, she wasn\'t.</li><li>Were you working last night? - Yes, I was. / No, I wasn\'t.</li></ul><h5 class="gram-subhead">PAST CONTINUOUS EM CONTRASTE COM SIMPLE PAST:</h5><p>(Ação contínua interrompida por ação pontual)</p><ul class="gram-bullets"><li><span class="gram-eng">I was drinking water WHEN the glass broke.</span> <span class="gram-trans">(Eu estava bebendo água quando o copo quebrou.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She was playing with her brother WHEN her mother arrived.</span> <span class="gram-trans">(Ela estava brincando com o irmão quando a mãe chegou.)</span></li></ul><ul class="gram-bullets"><li>We were watching TV when the lights went out.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE para contraste com Simple Past: - Ação em andamento (longa) → PAST CONTINUOUS - Ação que interrompe (curta) → SIMPLE PAST</li></ul><p>Conectivos comuns: WHEN, WHILE, AS</p><ul class="gram-bullets"><li>Expressões de tempo típicas: - while, when, as, all day, all night - at 8 o\'clock yesterday - this time last week</li></ul><ul class="gram-bullets"><li>Verbos de estado (love, hate, know, believe, etc.) NORMALMENTE não são usados no Past Continuous: ❌ I was loving the movie. ✔️ I loved the movie.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Diferença sutil: - When she arrived, I cooked dinner. (Ela chegou, depois eu cozinhei) - When she arrived, I was cooking dinner.</span> <span class="gram-trans">(Eu já estava cozinhando)</span></li></ul></div></div>'},
{order:81,badge:'81',topic:'PRESENT PERFECT CONTINUOUS',book:'Blue book',ref:'Blue book - pg. 81',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O PRESENT PERFECT CONTINUOUS é um tempo verbal usado para expressar a<br>ideia de uma ação que COMEÇOU NO PASSADO e CONTINUA até o PRESENTE<br>(podendo até continuar para o futuro).</p><p>Esse tempo verbal enfatiza a DURAÇÃO ou CONTINUIDADE de uma ação que<br>ainda está acontecendo.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><p>SUJEITO + HAVE/HAS + BEEN + VERBO + ING + COMPLEMENTO</p><h5 class="gram-subhead">NEGATIVA:</h5><p>SUJEITO + HAVE/HAS + NOT + BEEN + VERBO + ING + COMPLEMENTO</p><h5 class="gram-subhead">INTERROGATIVA:</h5><p>HAVE/HAS + SUJEITO + BEEN + VERBO + ING + COMPLEMENTO ?</p><h5 class="gram-subhead">USO DE HAVE / HAS:</h5><p>I, YOU, WE, THEY → HAVE<br>HE, SHE, IT → HAS</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">I have been studying English for five years now.</span> <span class="gram-trans">(Eu venho estudando inglês há cinco anos.)</span></li><li><span class="gram-eng">She has been playing soccer since she was a child.</span> <span class="gram-trans">(Ela vem jogando futebol desde que era criança.)</span></li><li>We have been waiting for two hours.</li></ul><h5 class="gram-subhead">NEGATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">I have not been going to the gym lately.</span> <span class="gram-trans">(Eu não venho indo à academia ultimamente.)</span></li><li><span class="gram-eng">She has not been attending her biology classes this semester.</span> <span class="gram-trans">(Ela não vem comparecendo às aulas de biologia neste semestre.)</span></li></ul><h5 class="gram-subhead">INTERROGATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">Has she been studying English for how long now?</span> <span class="gram-trans">(Há quanto tempo ela vem estudando inglês?)</span></li><li><span class="gram-eng">Have you been feeling bad lately?</span> <span class="gram-trans">(Você tem se sentido mal ultimamente?)</span></li><li>Have they been working today?</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">EXPRESSÕES DE TEMPO comuns com Present Perfect Continuous: - FOR + período (for two hours, for three days, for a long time) - SINCE + ponto específico (since 2020, since last week, since Monday) - LATELY, RECENTLY (recentemente, ultimamente) - ALL DAY, ALL WEEK</span> <span class="gram-trans">(o dia inteiro, a semana inteira)</span></li></ul><ul class="gram-bullets"><li>Diferença entre PRESENT PERFECT e PRESENT PERFECT CONTINUOUS: - PRESENT PERFECT → foca no RESULTADO da ação "I have read three books." (Resultado: 3 livros lidos) - PRESENT PERFECT CONTINUOUS → foca na DURAÇÃO/CONTINUIDADE "I have been reading for hours." (Foco: tempo passado lendo)</li></ul><ul class="gram-bullets"><li>Verbos de estado (love, hate, know, want, etc.) GERALMENTE não são usados nesse tempo: ❌ I have been knowing him for years. ✔️ I have known him for years.</li></ul><ul class="gram-bullets"><li>Forma contraída comum: - I have been → I\'ve been - She has been → She\'s been</li></ul></div></div>'},
{order:101,badge:'101',topic:'SECOND CONDITIONAL (Segundo Condicional)',book:'Blue book',ref:'Blue book - pg. 101',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O SEGUNDO CONDICIONAL é usado para falar de situações IRREAIS, HIPOTÉTICAS<br>ou IMPROVÁVEIS no presente ou no futuro. É a forma de imaginar "E se...?"<br>sobre coisas que provavelmente não acontecerão.</p><p>Diferente do First Conditional (situações reais), o Second Conditional<br>trata de FANTASIAS, SONHOS e CONSELHOS hipotéticos.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA BÁSICA:</h5><p>IF + SIMPLE PAST, + WOULD/COULD/MIGHT + VERBO (base form)</p><h5 class="gram-subhead">ATENÇÃO ESPECIAL - VERBO TO BE:</h5><p>No Second Conditional, usamos "WERE" para TODOS os pronomes<br>(não "was"), inclusive I, he, she, it.</p><h5 class="gram-subhead">MODAIS NO RESULTADO:</h5><p>WOULD → faria/seria (certeza hipotética)<br>COULD → poderia (possibilidade)<br>MIGHT → talvez fizesse</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">FRASES COMPLETAS:</h5><ul class="gram-bullets"><li><span class="gram-eng">If I were you, I would go to a different school.</span> <span class="gram-trans">(Se eu fosse você, iria para uma escola diferente.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">If she found a million dollars on the street, she might return it to her husband.</span> <span class="gram-trans">(Se ela encontrasse um milhão de dólares na rua, talvez devolvesse para o marido.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">If she sang better, she could be a famous singer.</span> <span class="gram-trans">(Se ela cantasse melhor, poderia ser uma cantora famosa.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">If I had more money, I would travel the world.</span> <span class="gram-trans">(Se eu tivesse mais dinheiro, viajaria o mundo.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">If he studied more, he would pass the test.</span> <span class="gram-trans">(Se ele estudasse mais, passaria na prova.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE PARA O VERBO TO BE: No Second Conditional, use SEMPRE "WERE": ✔️ If I were rich... ✔️ If he were taller... ✔️ If she were smarter...</li></ul><p>(No inglês informal, "was" às vezes aparece, mas o correto é "were".)</p><ul class="gram-bullets"><li>Diferença CRUCIAL: First vs Second Conditional: - 1st CONDITIONAL: situação REAL e possível "If it rains, I will stay home." (pode realmente chover)</li></ul><p>- 2nd CONDITIONAL: situação IRREAL ou improvável<br>"If I were rich, I would buy a yacht." (eu não sou rico)</p><ul class="gram-bullets"><li><span class="gram-eng">Estrutura clássica de conselho: - "If I were you, I would..."</span> <span class="gram-trans">(Se eu fosse você, eu...)</span></li></ul><p>É uma forma muito comum de dar conselhos em inglês!</p><ul class="gram-bullets"><li><span class="gram-eng">Use VÍRGULA quando a frase começar com "If": - If I had time, I would help you. (com vírgula) - I would help you if I had time.</span> <span class="gram-trans">(sem vírgula)</span></li></ul></div></div>'},
{order:103,badge:'103',topic:'PAST MODALS - SHOULD HAVE & WOULD HAVE',book:'Blue book',ref:'Blue book - pg. 103',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Os PAST MODALS são usados para falar sobre o PASSADO, expressando ideias<br>de SUGESTÕES, ARREPENDIMENTOS, OPINIÕES e ALTERNATIVAS sobre o que JÁ<br>aconteceu.</p><p>São formados pelo modal + HAVE + PAST PARTICIPLE.</p><p>Esta página apresenta dois usos principais:</p><ul class="gram-bullets"><li>SHOULD HAVE + past participle → para fazer uma sugestão sobre o passado</li><li>WOULD HAVE + past participle → para dar uma opinião sobre o passado</li></ul></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">SHOULD HAVE (sugestão no passado):</h5><p>"You should have + past participle"<br>= Você deveria ter feito X (mas não fez)</p><p>Forma negativa:<br>"You shouldn\'t have + past participle"<br>= Você não deveria ter feito X (mas fez)</p><h5 class="gram-subhead">WOULD HAVE (opinião alternativa no passado):</h5><p>"I would have + past participle"<br>= Eu teria feito X (no seu lugar)</p><p>Forma negativa:<br>"I wouldn\'t have + past participle"<br>= Eu não teria feito X</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">SHOULD HAVE (sugestão sobre o passado):</h5><ul class="gram-bullets"><li><span class="gram-eng">You should have called your sister yesterday.</span> <span class="gram-trans">(Você deveria ter ligado para sua irmã ontem.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She shouldn\'t have walked to her mother like that.</span> <span class="gram-trans">(Ela não deveria ter falado com a mãe daquele jeito.)</span></li></ul><ul class="gram-bullets"><li>I should have studied more for the exam.</li><li>You should have arrived earlier.</li></ul><h5 class="gram-subhead">WOULD HAVE (opinião alternativa):</h5><ul class="gram-bullets"><li><span class="gram-eng">I would have called your sister.</span> <span class="gram-trans">(Eu teria ligado para sua irmã - no seu lugar.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">I wouldn\'t have gone to that university.</span> <span class="gram-trans">(Eu não teria ido para aquela universidade.)</span></li></ul><ul class="gram-bullets"><li>If I were you, I would have studied harder.</li><li>She would have helped you.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: após SHOULD HAVE ou WOULD HAVE, usamos sempre o PAST PARTICIPLE (3ª forma do verbo): - go → went → GONE - eat → ate → EATEN - call → called → CALLED</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Diferença sutil: - SHOULD HAVE → expressa ARREPENDIMENTO ou CONSELHO retrospectivo - WOULD HAVE → expressa o que VOCÊ teria feito</span> <span class="gram-trans">(opinião pessoal)</span></li></ul><ul class="gram-bullets"><li>Forma contraída na fala: - should have → should\'ve (soa "shoulda") - would have → would\'ve (soa "woulda") - shouldn\'t have / wouldn\'t have</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Frases típicas em discussões: - "You should\'ve told me!" (Você deveria ter me contado!) - "I would\'ve helped if I knew."</span> <span class="gram-trans">(Eu teria ajudado se soubesse.)</span></li></ul><ul class="gram-bullets"><li>Atenção comum a estudantes: ❌ I should of called you. (incorreto, mas comum por causa do som) ✔️ I should HAVE called you.</li></ul></div></div>'},
{order:107,badge:'107',topic:'REPORTED SPEECH WITH REQUESTS',book:'Blue book',ref:'Blue book - pg. 107',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O REPORTED SPEECH (Discurso Indireto) é usado quando queremos contar a<br>alguém o que UMA TERCEIRA PESSOA pediu ou disse - sem citar a fala<br>diretamente.</p><p>Esta página foca especificamente em REPORTAR PEDIDOS feitos por outras<br>pessoas, transformando ordens diretas em discurso indireto.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURAS PRINCIPAIS:</h5><ul class="gram-bullets"><li>SAID TO + (someone) + TO + verbo</li><li>TOLD ME TO + verbo</li><li>ASKED ME TO + verbo</li></ul><h5 class="gram-subhead">ESTRUTURA AFIRMATIVA:</h5><p>Sujeito + SAID/TOLD/ASKED + (pessoa) + TO + VERBO</p><h5 class="gram-subhead">ESTRUTURA NEGATIVA:</h5><p>Sujeito + SAID/TOLD/ASKED + (pessoa) + NOT + TO + VERBO</p><p>⚠️ ATENÇÃO: na forma negativa, "NOT" vem ANTES do "TO".</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">TRANSFORMANDO DIRETO PARA INDIRETO:</h5><p>Pedido DIRETO:<br>"Please, arrive earlier to the test."</p><p>Pedido INDIRETO:</p><ul class="gram-bullets"><li>She said to arrive earlier to the test.</li></ul><p>Pedido DIRETO:<br>"Don\'t forget your wallet!"</p><p>Pedido INDIRETO (NEGATIVO):</p><ul class="gram-bullets"><li>He told me not to forget my wallet.</li></ul><p>Pedido DIRETO:<br>"Clean the bathroom after dinner."</p><p>Pedido INDIRETO:</p><ul class="gram-bullets"><li>They asked me to clean the bathroom after dinner.</li></ul><h5 class="gram-subhead">MAIS EXEMPLOS:</h5><ul class="gram-bullets"><li><span class="gram-eng">The teacher told us to be quiet.</span> <span class="gram-trans">(O professor nos disse para ficarmos quietos.)</span></li><li>She asked me to help her with the homework.</li><li>My mom told me not to eat too much sugar.</li><li>The doctor said to take the medication every day.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: na NEGATIVA, "NOT" vem ANTES de "TO": ✔️ He told me NOT TO forget. ❌ He told me to not forget.</li></ul><ul class="gram-bullets"><li>Diferença entre SAID, TOLD e ASKED: - SAID → genérico, geralmente sem mencionar a quem "She said to be careful." - TOLD → sempre menciona a pessoa que recebeu a mensagem "She told me to be careful." - ASKED → tem tom de pedido educado "She asked me to be careful."</li></ul><ul class="gram-bullets"><li>ATENÇÃO ao verbo após "to": sempre na FORMA ORIGINAL: ✔️ told me to GO ❌ told me to went / going</li></ul><ul class="gram-bullets"><li>Para reportar perguntas, há regras diferentes (com IF, WHETHER, etc.) - esse não é o foco desta página.</li></ul></div></div>'},
{order:109,badge:'109',topic:'REPORTED SPEECH (Discurso Indireto)',book:'Blue book',ref:'Blue book - pg. 109',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O REPORTED SPEECH (Discurso Indireto) é usado para CONTAR a outra pessoa<br>o que alguém disse, sem usar as palavras EXATAS (sem aspas).</p><p>A REGRA FUNDAMENTAL do reported speech é: MOVEMOS as frases UM TEMPO<br>VERBAL PARA O PASSADO.</p><p>Em outras palavras, todos os tempos verbais "recuam" um passo no tempo.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA BÁSICA:</h5><p>Sujeito + SAID/TOLD + (that) + nova oração com verbo recuado</p><h5 class="gram-subhead">MUDANÇAS DOS TEMPOS VERBAIS:</h5><p>🔹 PRESENT → PAST:<br>am/is/are → was/were<br>play, work → played, worked<br>am eating → was eating</p><p>🔹 PAST → PAST PERFECT:<br>saw → had seen<br>worked → had worked<br>was → had been</p><p>🔹 MODAIS:<br>will → would<br>can → could<br>may → might</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">TRANSFORMANDO DISCURSO DIRETO EM INDIRETO:</h5><ul class="gram-bullets"><li>"I am happy." → He said that he WAS happy.</li></ul><ul class="gram-bullets"><li>"I play soccer." → He said that he PLAYED soccer.</li></ul><ul class="gram-bullets"><li>"I am eating sugar." → He said that he WAS EATING sugar.</li></ul><ul class="gram-bullets"><li>"I will play soccer." → He said that he WOULD play soccer.</li></ul><ul class="gram-bullets"><li>"I worked yesterday." → He said that he HAD WORKED yesterday.</li></ul><ul class="gram-bullets"><li>"I was an English teacher." → He said that he HAD BEEN an English teacher.</li></ul><ul class="gram-bullets"><li>"I can play the piano." → He said that he COULD play the piano.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: TODOS os tempos verbais "andam para trás": - Presente vira passado - Passado vira past perfect - Modais "futuro" viram modais "passado"</li></ul><ul class="gram-bullets"><li>A palavra "THAT" é OPCIONAL no reported speech: - He said (that) he was happy.</li></ul><ul class="gram-bullets"><li>Mudanças nos PRONOMES também são comuns: - "I am tired." → He said that HE was tired. - "My car is new." → She said that HER car was new.</li></ul><ul class="gram-bullets"><li>Mudanças em EXPRESSÕES DE TEMPO: - today → that day - tomorrow → the next day / the following day - yesterday → the day before / the previous day - now → then - here → there</li></ul><ul class="gram-bullets"><li>Cuidado com verbos IRREGULARES na transformação: - eat → ate → eaten - see → saw → seen - go → went → gone</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Se a citação contém VERDADES UNIVERSAIS, não há mudança: - "Water boils at 100 degrees." - He said that water boils at 100 degrees.</span> <span class="gram-trans">(não muda - é verdade sempre)</span></li></ul></div></div>'},
{order:1004,badge:'U4',topic:'SEQUENCE ADVERBS',book:'Blue book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Os SEQUENCE ADVERBS (Advérbios de Sequência) são palavras usadas para<br>INDICAR A ORDEM em que as coisas acontecem. Eles são essenciais para:</p><ul class="gram-bullets"><li>Dar instruções passo a passo (receitas, tutoriais)</li><li>Narrar uma sequência de eventos</li><li>Descrever processos</li><li>Organizar uma história ou explicação</li></ul><p>Saber usar esses advérbios torna a comunicação muito mais clara e organizada.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">PRINCIPAIS SEQUENCE ADVERBS (em ordem):</h5><p>FIRST = Primeiro (início da sequência)<br>THEN = Então / Em seguida<br>NEXT = Depois / Próximo<br>AFTER THAT = Depois disso<br>FINALLY = Por fim / Finalmente</p><h5 class="gram-subhead">POSIÇÃO NA FRASE:</h5><p>Geralmente vão no INÍCIO da frase, seguidos de VÍRGULA:</p><p>ADVÉRBIO DE SEQUÊNCIA, + frase com instrução/ação</p><h5 class="gram-subhead">OUTROS CONECTORES ÚTEIS:</h5><ul class="gram-bullets"><li>Before (antes)</li><li>After (depois)</li><li>Meanwhile (enquanto isso)</li><li>At the same time (ao mesmo tempo)</li><li><span class="gram-eng">Last</span> <span class="gram-trans">(por último)</span></li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">EM UMA RECEITA (uso típico):</h5><p>First, boil some water.<br>(Primeiro, ferva um pouco de água.)</p><p>Then, add the pasta.<br>(Em seguida, adicione a massa.)</p><p>Next, cook for 10 minutes.<br>(Depois, cozinhe por 10 minutos.)</p><p>After that, drain the water.<br>(Depois disso, escorra a água.)</p><p>Finally, add the sauce and serve.<br>(Por fim, adicione o molho e sirva.)</p><h5 class="gram-subhead">EM UMA ROTINA DIÁRIA:</h5><ul class="gram-bullets"><li>First, I wake up at 6 AM.</li><li>Then, I brush my teeth.</li><li>Next, I have breakfast.</li><li>After that, I go to work.</li><li>Finally, I come home in the evening.</li></ul><h5 class="gram-subhead">EM UM TUTORIAL/PROCESSO:</h5><ul class="gram-bullets"><li>First, open the app.</li><li>Then, log in with your account.</li><li>Next, click on "Settings."</li><li>Finally, save your changes.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>ORDEM USUAL e LÓGICA:</li></ul><p>FIRST → THEN → NEXT → AFTER THAT → FINALLY</p><ul class="gram-bullets"><li>FIRST geralmente é único - vem só uma vez no início. THEN, NEXT, AFTER THAT podem ser usados várias vezes ao longo da sequência. FINALLY é único - vem só no fim.</li></ul><ul class="gram-bullets"><li>ALTERNATIVAS COM NÚMEROS (mais formais/técnicas): - Step 1: Open the box. - Step 2: Read the instructions. - Step 3: Assemble the parts.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">CONECTORES SIMILARES MAIS FORMAIS: - To begin with... (Para começar...) - Subsequently... (Subsequentemente...) - In conclusion... (Em conclusão...) - Last but not least...</span> <span class="gram-trans">(Por último, mas não menos importante...)</span></li></ul><ul class="gram-bullets"><li>Use VÍRGULA depois do advérbio de sequência: ✔️ First, you need to mix the ingredients. ❌ First you need to mix the ingredients.</li></ul><ul class="gram-bullets"><li>Em conversas naturais, pode-se usar somente "AND THEN" repetidamente: - "I woke up, AND THEN I had breakfast, AND THEN I went out."</li></ul><ul class="gram-bullets"><li>Combinação com IMPERATIVOS é muito comum em instruções: - First, OPEN the door. - Then, ENTER the room. - Finally, SIT down.</li></ul></div></div>'},
{order:1006,badge:'U6',topic:'TWO-PART VERBS (Phrasal Verbs)',book:'Blue book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>TWO-PART VERBS (também chamados PHRASAL VERBS) são combinações de:</p><p>VERBO + PREPOSIÇÃO/ADVÉRBIO</p><p>Esta combinação cria um SIGNIFICADO NOVO, diferente do significado dos<br>verbos isoladamente. São extremamente comuns em inglês conversacional.</p><p>Exemplo:</p><ul class="gram-bullets"><li>TAKE = pegar/levar</li><li>OFF = fora</li><li>TAKE OFF = decolar (aviões) / tirar (roupa)</li></ul></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA BÁSICA:</h5><p>SUJEITO + VERBO + PARTÍCULA + (COMPLEMENTO)</p><h5 class="gram-subhead">TIPOS DE TWO-PART VERBS:</h5><p>1) SEPARÁVEIS - o objeto pode vir ENTRE o verbo e a partícula:<br>"Turn off the light." = "Turn the light off."<br>Com pronomes, é OBRIGATÓRIO separar:<br>❌ "Turn off it."<br>✔️ "Turn IT off."</p><p>2) INSEPARÁVEIS - o objeto sempre vem DEPOIS da partícula:<br>"Look after the children." (não "look the children after")</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">TWO-PART VERBS COMUNS PARA TAREFAS DOMÉSTICAS:</h5><ul class="gram-bullets"><li>Pick up the toys. (recolher / pegar)</li><li>Put away the dishes. (guardar)</li><li>Take out the trash. (tirar para fora)</li><li>Clean up the room. (arrumar / limpar)</li><li>Turn off the TV. (desligar)</li><li>Turn on the light. (ligar)</li><li>Hang up your jacket. (pendurar)</li></ul><h5 class="gram-subhead">TWO-PART VERBS COMUNS NO DIA A DIA:</h5><ul class="gram-bullets"><li>Wake up at 7 AM. (acordar)</li><li>Get up from bed. (levantar-se)</li><li>Look for your keys. (procurar)</li><li>Look after a baby. (cuidar de)</li><li>Run out of milk. (acabar - ficar sem)</li><li>Throw away old papers. (jogar fora)</li></ul><h5 class="gram-subhead">SEPARÁVEIS COM PRONOMES:</h5><p>✔️ Turn the light off.<br>✔️ Turn off the light.<br>✔️ Turn IT off.<br>❌ Turn off IT.</p><p>✔️ Pick the toys up.<br>✔️ Pick up the toys.<br>✔️ Pick THEM up.<br>❌ Pick up THEM.</p><h5 class="gram-subhead">INSEPARÁVEIS (não podem ser separados):</h5><p>✔️ I look after my brother.<br>❌ I look my brother after.</p><p>✔️ She gets along with everyone.<br>❌ She gets everyone along with.</p></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE para PRONOMES com verbos SEPARÁVEIS: Pronomes (it, them, him, her) sempre vão NO MEIO: ❌ Take off them. ✔️ Take them off.</li></ul><ul class="gram-bullets"><li>LISTA dos TWO-PART VERBS para TAREFAS DOMÉSTICAS:</li></ul><p>VERBO | SIGNIFICADO<br>───────────────|────────────────────────────<br>Pick up | Pegar / Recolher<br>Put away | Guardar (no lugar)<br>Take out | Tirar para fora<br>Clean up | Arrumar / Limpar<br>Turn off | Desligar<br>Turn on | Ligar<br>Hang up | Pendurar<br>Throw away | Jogar fora<br>Put on | Colocar (roupa)<br>Take off | Tirar (roupa)</p><ul class="gram-bullets"><li>DICA PARA APRENDER: Phrasal verbs precisam ser MEMORIZADOS um por um, pois o significado geralmente não é deduzível das partes individuais.</li></ul><p>Exemplos:<br>- "Give up" = desistir (não dar para cima)<br>- "Look up" = pesquisar (não olhar para cima)<br>- "Run into" = encontrar por acaso (não correr para dentro)</p><ul class="gram-bullets"><li>Atenção a SIGNIFICADOS MÚLTIPLOS: - "Take off" = decolar (aviões) / tirar (roupa) - "Pick up" = pegar / aprender rapidamente / buscar alguém</li></ul><ul class="gram-bullets"><li>OUTROS TWO-PART VERBS úteis: - Find out (descobrir) - Look forward to (ansiar por) - Get up (levantar-se) - Sit down (sentar-se) - Stand up (ficar de pé) - Come in (entrar) - Go out (sair)</li></ul></div></div>'},
{order:1007,badge:'U7',topic:'IMPERATIVES AND INFINITIVES FOR SUGGESTIONS',book:'Blue book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Para DAR INSTRUÇÕES sobre como usar algo (especialmente tecnologia, apps,<br>ou processos), utilizamos duas estruturas principais:</p><p>1) IMPERATIVES (Imperativos)<br>Forma do verbo que dá ORDENS, INSTRUÇÕES ou SUGESTÕES diretas.</p><p>2) INFINITIVES (Infinitivos com "to")<br>Para explicar O QUE FAZER ou COMO FAZER algo.</p><p>Essas estruturas são ESSENCIAIS em manuais, tutoriais, receitas e<br>explicações tecnológicas.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">IMPERATIVE (forma de comando):</h5><p>AFIRMATIVO: VERBO (forma original) + complemento<br>NEGATIVO: DON\'T + VERBO + complemento</p><p>⚠️ Não há sujeito explícito (entende-se "YOU")</p><h5 class="gram-subhead">INFINITIVES PARA SUGESTÕES:</h5><ul class="gram-bullets"><li>TO + verbo + complemento</li></ul><p>Estruturas comuns:</p><ul class="gram-bullets"><li>"TO + verb, you need to..."</li><li>"TO make X work, ..."</li><li>"TO turn it on, press..."</li></ul><h5 class="gram-subhead">IMPERATIVES COMUNS EM TECNOLOGIA:</h5><ul class="gram-bullets"><li><span class="gram-eng">Press the button</span> <span class="gram-trans">(Aperte o botão)</span></li><li>Click here (Clique aqui)</li><li>Turn on / Turn off (Ligue / Desligue)</li><li>Save (Salve)</li><li>Close (Feche)</li><li>Open (Abra)</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">IMPERATIVES (instruções diretas):</h5><ul class="gram-bullets"><li><span class="gram-eng">Press the red button to start.</span> <span class="gram-trans">(Aperte o botão vermelho para começar.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Don\'t forget to save your work.</span> <span class="gram-trans">(Não esqueça de salvar seu trabalho.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Turn on the computer.</span> <span class="gram-trans">(Ligue o computador.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Click on the icon to open the app.</span> <span class="gram-trans">(Clique no ícone para abrir o aplicativo.)</span></li></ul><h5 class="gram-subhead">INFINITIVES PARA EXPLICAR O PROPÓSITO:</h5><ul class="gram-bullets"><li><span class="gram-eng">To save your file, click "File" and then "Save".</span> <span class="gram-trans">(Para salvar seu arquivo, clique em "Arquivo" e depois "Salvar".)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">To turn on the TV, press the power button.</span> <span class="gram-trans">(Para ligar a TV, aperte o botão de energia.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">To connect to Wi-Fi, go to settings.</span> <span class="gram-trans">(Para conectar ao Wi-Fi, vá em configurações.)</span></li></ul><h5 class="gram-subhead">COMBINANDO IMPERATIVES E INFINITIVES:</h5><ul class="gram-bullets"><li><span class="gram-eng">Press "Start" to begin. Then, click "Next" to continue.</span> <span class="gram-trans">(Aperte "Iniciar" para começar. Depois, clique em "Próximo" para continuar.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Open the app to access your account.</span> <span class="gram-trans">(Abra o aplicativo para acessar sua conta.)</span></li></ul><h5 class="gram-subhead">DANDO SUGESTÕES SOBRE COMO USAR ALGO:</h5><ul class="gram-bullets"><li>To take a screenshot, press these keys.</li><li>To zoom in, use two fingers on the screen.</li><li>To save battery, turn off Wi-Fi when not in use.</li></ul><h5 class="gram-subhead">INSTRUÇÕES EM SEQUÊNCIA (usando ambos):</h5><ul class="gram-bullets"><li>First, open the app.</li><li>Then, click on "Settings."</li><li>To change your password, click "Edit."</li><li>Don\'t share your password with anyone.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">REGRA-CHAVE: IMPERATIVES não usam sujeito! ✔️ "Press the button." ❌ "You press the button."</span> <span class="gram-trans">(essa é uma afirmação, não imperativo)</span></li></ul><ul class="gram-bullets"><li>Diferença entre IMPERATIVES e INFINITIVES:</li></ul><p>Estrutura | O que faz<br>────────────────|──────────────────────────────────<br>Imperative | Comando direto: "Click here."<br>Infinitive (to) | Mostra propósito: "...to save your file."</p><ul class="gram-bullets"><li>PARA SER EDUCADO ao dar instruções, use "PLEASE": - Please click here. - Please save your work before closing. - Please don\'t forget to log out.</li></ul><ul class="gram-bullets"><li>Tom dos IMPERATIVES varia: - Casual: "Open the door." - Educado: "Please open the door." - Sugestão: "Why don\'t you try opening the door?"</li></ul><ul class="gram-bullets"><li>Para INSTRUÇÕES DE SEGURANÇA, use NEGATIVOS: - Don\'t open while running. - Don\'t share your password. - Don\'t forget to log out.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">ESTRUTURAS úteis para EXPLICAR FUNCIONALIDADE: - "It\'s used to + verb" (É usado para) - "It\'s good for + V-ing" (É bom para) - "You can use it to + verb" (Você pode usar para) - "To do X, you need to..."</span> <span class="gram-trans">(Para fazer X, você precisa)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">OUTRAS FORMAS de dar sugestões (alternativas mais educadas): - "Why don\'t you...?" (Por que você não...?) - "You could try...ing." (Você poderia tentar...) - "Have you tried...ing?" (Você já tentou...?) - "Maybe you could..."</span> <span class="gram-trans">(Talvez você pudesse...)</span></li></ul><ul class="gram-bullets"><li>EM MANUAIS DE INSTRUÇÕES, a sequência típica é: 1) [Imperative] Open the box. 2) [Imperative] Remove all the parts. 3) To assemble the product, [imperatives ou infinitives]... 4) [Imperative] Don\'t forget to read the warnings.</li></ul></div></div>'},
{order:1008,badge:'U8',topic:'RELATIVE CLAUSES OF TIME',book:'Blue book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>As RELATIVE CLAUSES OF TIME (Orações Relativas de Tempo) são usadas para<br>DEFINIR ou DESCREVER um momento, data ou período no tempo.</p><p>Elas são especialmente úteis para falar de:</p><ul class="gram-bullets"><li>Feriados e festividades</li><li>Eventos especiais</li><li>Períodos ou datas específicas</li><li>Tradições e costumes</li></ul><p>A palavra-chave dessas orações é WHEN (quando), que conecta a oração<br>principal à descrição temporal.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA BÁSICA:</h5><p>Substantivo/data + WHEN + sujeito + verbo + complemento</p><p>(substantivo) IS (a time/day/holiday) WHEN (descrição)</p><h5 class="gram-subhead">Pode ser usada para descrever:</h5><ul class="gram-bullets"><li>Feriados: Christmas, Easter, Carnival</li><li>Estações: summer, winter</li><li>Eventos: birthday, anniversary</li><li>Períodos: childhood, weekend, vacation</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">DESCREVENDO FERIADOS:</h5><ul class="gram-bullets"><li><span class="gram-eng">Christmas is a holiday when families get together.</span> <span class="gram-trans">(Natal é um feriado quando famílias se reúnem.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">New Year\'s Eve is a night when people celebrate.</span> <span class="gram-trans">(Réveillon é uma noite quando as pessoas celebram.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Easter is a holiday when Christians celebrate Jesus\' resurrection.</span> <span class="gram-trans">(Páscoa é um feriado quando cristãos celebram a ressurreição de Jesus.)</span></li></ul><h5 class="gram-subhead">DESCREVENDO FESTIVAIS BRASILEIROS:</h5><ul class="gram-bullets"><li><span class="gram-eng">Carnival is a festival when people dance in the streets.</span> <span class="gram-trans">(Carnaval é um festival quando as pessoas dançam nas ruas.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Festa Junina is a celebration when we eat traditional food.</span> <span class="gram-trans">(Festa Junina é uma celebração quando comemos comida tradicional.)</span></li></ul><h5 class="gram-subhead">DESCREVENDO PERÍODOS DA VIDA:</h5><ul class="gram-bullets"><li><span class="gram-eng">Childhood is a time when everything seems magical.</span> <span class="gram-trans">(A infância é um tempo quando tudo parece mágico.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Summer is the season when school is on vacation.</span> <span class="gram-trans">(Verão é a estação quando a escola está de férias.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">The weekend is a period when most people relax.</span> <span class="gram-trans">(O fim de semana é um período quando a maioria das pessoas relaxa.)</span></li></ul><h5 class="gram-subhead">DESCREVENDO EVENTOS PESSOAIS:</h5><ul class="gram-bullets"><li><span class="gram-eng">A birthday is a day when people receive gifts.</span> <span class="gram-trans">(Aniversário é um dia quando as pessoas recebem presentes.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Graduation is a moment when students celebrate their achievements.</span> <span class="gram-trans">(Formatura é um momento quando estudantes celebram suas conquistas.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: a palavra WHEN conecta o substantivo (data/momento) à sua DESCRIÇÃO: - SUBSTANTIVO + WHEN + descrição</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Diferença sutil entre WHEN e THAT: - "A holiday WHEN people celebrate" (foco no TEMPO) - "A holiday THAT we love"</span> <span class="gram-trans">(foco na coisa em si)</span></li></ul><ul class="gram-bullets"><li>WHEN também pode ser SUBSTITUÍDO por palavras mais específicas: - "The day WHEN we met" = "The day ON WHICH we met" (mais formal) - "The year WHEN I was born" = "The year IN WHICH I was born"</li></ul><ul class="gram-bullets"><li>Estrutura útil para perguntas: - "When is..." - "What is the day when...?"</li></ul><ul class="gram-bullets"><li>OUTRAS PALAVRAS RELATIVAS para conectar orações: - WHERE (lugar): "The city WHERE I live." - WHO (pessoas): "The person WHO helped me." - THAT/WHICH (coisas): "The book THAT I read." - WHOSE (posse): "The girl WHOSE car is red."</li></ul><ul class="gram-bullets"><li>Estrutura para DEFINIÇÕES de feriados/festivais:</li></ul><p>[Nome do feriado] is [a/an] [adjetivo] [evento] WHEN [descrição]</p><p>Exemplo: "Christmas is a special holiday when families gather<br>to celebrate together."</p></div></div>'},
{order:1010,badge:'U10',topic:'CLAUSES WITH BECAUSE',book:'Blue book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>A palavra BECAUSE é uma conjunção usada para conectar duas orações e<br>explicar a CAUSA ou RAZÃO de algo. Em português, equivale a "PORQUE".</p><p>É essencial para:</p><ul class="gram-bullets"><li>Justificar opiniões</li><li>Explicar preferências</li><li>Dar razões para escolhas</li><li>Falar sobre causa e consequência</li></ul><p>Diferentemente de "because of" (que vai antes de SUBSTANTIVOS), o<br>"because" sozinho é seguido de uma ORAÇÃO COMPLETA (com sujeito e verbo).</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA BÁSICA:</h5><p>Oração principal + BECAUSE + sujeito + verbo + complemento</p><p>ou</p><p>BECAUSE + sujeito + verbo + complemento, + oração principal</p><h5 class="gram-subhead">DIFERENÇA - BECAUSE vs BECAUSE OF:</h5><ul class="gram-bullets"><li><span class="gram-eng">BECAUSE + sujeito + verbo</span> <span class="gram-trans">(oração completa)</span></li><li><span class="gram-eng">BECAUSE OF + substantivo/nome</span> <span class="gram-trans">(não tem verbo)</span></li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">EXPLICANDO PREFERÊNCIAS DE TRABALHO (foco da unidade):</h5><ul class="gram-bullets"><li><span class="gram-eng">I like working with people because I\'m sociable.</span> <span class="gram-trans">(Eu gosto de trabalhar com pessoas porque sou sociável.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She prefers to work alone because she likes quiet environments.</span> <span class="gram-trans">(Ela prefere trabalhar sozinha porque gosta de ambientes quietos.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">He doesn\'t like office jobs because he gets bored easily.</span> <span class="gram-trans">(Ele não gosta de trabalhos de escritório porque fica entediado fácil.)</span></li></ul><h5 class="gram-subhead">JUSTIFICANDO OPINIÕES:</h5><ul class="gram-bullets"><li><span class="gram-eng">I love this restaurant because the food is amazing.</span> <span class="gram-trans">(Adoro este restaurante porque a comida é incrível.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She doesn\'t watch horror movies because she gets scared.</span> <span class="gram-trans">(Ela não assiste a filmes de terror porque fica com medo.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">We should leave early because traffic is bad.</span> <span class="gram-trans">(Devemos sair cedo porque o trânsito está ruim.)</span></li></ul><h5 class="gram-subhead">FALANDO SOBRE PERSONALIDADE:</h5><ul class="gram-bullets"><li><span class="gram-eng">I would be a good teacher because I\'m patient.</span> <span class="gram-trans">(Eu seria um bom professor porque sou paciente.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">He\'s a great manager because he listens to everyone.</span> <span class="gram-trans">(Ele é um ótimo gerente porque ouve todos.)</span></li></ul><h5 class="gram-subhead">BECAUSE NO INÍCIO DA FRASE:</h5><ul class="gram-bullets"><li><span class="gram-eng">Because I was tired, I went to bed early.</span> <span class="gram-trans">(Porque eu estava cansado, fui para a cama cedo.)</span></li></ul><ul class="gram-bullets"><li>Because the weather was bad, we stayed home.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">REGRA-CHAVE: BECAUSE precisa de UMA ORAÇÃO COMPLETA depois (com sujeito + verbo): ❌ I\'m tired because the work. (work é substantivo) ✔️ I\'m tired because of the work. (because of + substantivo) ✔️ I\'m tired because I worked a lot.</span> <span class="gram-trans">(because + oração)</span></li></ul><ul class="gram-bullets"><li>BECAUSE vs BECAUSE OF - tabela rápida:</li></ul><p>Estrutura | O que vem depois | Exemplo<br>──────────────|─────────────────────────|──────────────────────────<br>BECAUSE | Sujeito + verbo (oração)| because IT WAS COLD<br>BECAUSE OF | Substantivo | because of THE COLD</p><ul class="gram-bullets"><li><span class="gram-eng">POSIÇÃO de BECAUSE na frase: - No MEIO: I stayed home because it was raining. (sem vírgula) - No INÍCIO: Because it was raining, I stayed home.</span> <span class="gram-trans">(com vírgula)</span></li></ul><ul class="gram-bullets"><li>SINÔNIMOS de BECAUSE: - Since → "Since you\'re here, let\'s talk." (já que) - As → "As I was late, I took a taxi." (como) - Now that → "Now that we\'re friends, tell me." (agora que)</li></ul><ul class="gram-bullets"><li>Para RESPONDER a perguntas com "WHY?", use BECAUSE: - Why are you happy? - Because I got a promotion.</li></ul><ul class="gram-bullets"><li>Cuidado para NÃO usar duas vezes a mesma conjunção: ❌ Because I was tired, so I went home. ✔️ Because I was tired, I went home. ✔️ I was tired, so I went home.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Em respostas curtas em conversação, "BECAUSE" pode ficar sozinho: - "Why do you like coffee?" - "Because!"</span> <span class="gram-trans">(informal, comum entre crianças/amigos)</span></li></ul></div></div>'},
{order:1011,badge:'U11',topic:'PASSIVE WITHOUT BY (Simple Present)',book:'Blue book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>A VOZ PASSIVA SEM "BY" é uma estrutura usada quando:</p><ul class="gram-bullets"><li>O agente (quem realiza a ação) é DESCONHECIDO</li><li>O agente é ÓBVIO ou IRRELEVANTE</li><li>Queremos focar APENAS no objeto/resultado</li></ul><p>Esta forma é extremamente comum em textos sobre HISTÓRIA, GEOGRAFIA,<br>LANDMARKS (monumentos) e FATOS GERAIS - onde o foco está no QUE foi<br>feito, não em QUEM fez.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA BÁSICA (Simple Present Passive):</h5><p>SUJEITO + AM/IS/ARE + PAST PARTICIPLE</p><h5 class="gram-subhead">Quando OMITIR o "BY + agente":</h5><ul class="gram-bullets"><li><span class="gram-eng">Quando o agente é DESCONHECIDO: "English is spoken here."</span> <span class="gram-trans">(não sabemos quem fala)</span></li><li><span class="gram-eng">Quando o agente é ÓBVIO: "Criminals are arrested."</span> <span class="gram-trans">(obviamente pela polícia)</span></li><li><span class="gram-eng">Quando o agente é IRRELEVANTE: "Coffee is grown in Brazil."</span> <span class="gram-trans">(não importa quem cultiva)</span></li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">FALANDO DE LANDMARKS E MONUMENTOS:</h5><ul class="gram-bullets"><li><span class="gram-eng">The Eiffel Tower is located in Paris.</span> <span class="gram-trans">(A Torre Eiffel está localizada em Paris.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Many languages are spoken in Brazil.</span> <span class="gram-trans">(Muitos idiomas são falados no Brasil.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">The Statue of Liberty is visited by millions every year.</span> <span class="gram-trans">(A Estátua da Liberdade é visitada por milhões todos os anos.)</span></li></ul><h5 class="gram-subhead">FALANDO DE PRODUTOS E PROCESSOS:</h5><ul class="gram-bullets"><li><span class="gram-eng">Coffee is grown in Brazil.</span> <span class="gram-trans">(Café é cultivado no Brasil.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Cars are manufactured in this factory.</span> <span class="gram-trans">(Carros são fabricados nesta fábrica.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Rice is eaten all over the world.</span> <span class="gram-trans">(Arroz é comido no mundo todo.)</span></li></ul><h5 class="gram-subhead">FALANDO DE FATOS GERAIS:</h5><ul class="gram-bullets"><li><span class="gram-eng">English is spoken in many countries.</span> <span class="gram-trans">(Inglês é falado em muitos países.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Soccer is played in many parts of the world.</span> <span class="gram-trans">(Futebol é jogado em muitas partes do mundo.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Money is used everywhere.</span> <span class="gram-trans">(Dinheiro é usado em todos os lugares.)</span></li></ul><h5 class="gram-subhead">FALANDO DE COSTUMES:</h5><ul class="gram-bullets"><li><span class="gram-eng">In Japan, shoes are taken off before entering a house.</span> <span class="gram-trans">(No Japão, sapatos são tirados antes de entrar em uma casa.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">In Italy, dinner is served late at night.</span> <span class="gram-trans">(Na Itália,
