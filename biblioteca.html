{"order": 3, "badge": "3", "topic": "Commenting Adverbs with Future Forms", "book": "Evolve 6", "ref": "Evolve 6 - pg. 03 (Unit 1.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Advérbios de comentário (commenting adverbs) expressam a OPINIÃO ou ATITUDE do falante sobre a probabilidade de algo acontecer. Com formas de futuro, eles geralmente vêm DEPOIS de will ou do verbo be.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">COM WILL</h5><p>will + commenting adverb + verbo<br>&quot;Robots will undoubtedly change our lives.&quot;</p><h5 class=\"gram-subhead\">COM CONTRAÇÕES NEGATIVAS (won't, aren't)</h5><p>O advérbio vem DEPOIS da contração negativa<br>&quot;They won't certainly gain support.&quot; → &quot;They certainly won't gain support.&quot;</p><h5 class=\"gram-subhead\">COM EXPRESSÕES DE FUTURO (be going to, be about to, be bound to)</h5><p>be + commenting adverb + going to / about to / bound to + verbo<br>&quot;This is inevitably going to cause problems.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Robots will undoubtedly ease the burden on social services.</span> <span class=\"gram-trans\">(Robôs sem dúvida vão aliviar a sobrecarga dos serviços sociais.)</span></li><li><span class=\"gram-eng\">Home health care is inevitably going to become a necessity.</span> <span class=\"gram-trans\">(O atendimento domiciliar inevitavelmente se tornará uma necessidade.)</span></li><li><span class=\"gram-eng\">Social services will certainly not replace human companionship.</span> <span class=\"gram-trans\">(Os serviços sociais certamente não substituirão a companhia humana.)</span></li><li><span class=\"gram-eng\">The robotics industry is definitely about to make life easier.</span> <span class=\"gram-trans\">(A indústria de robótica definitivamente está prestes a facilitar a vida.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>O advérbio vai DEPOIS de will, mas ANTES nas negativas: &quot;will certainly NOT&quot;.</li><li>Advérbios comuns: certainly, clearly, evidently, inevitably, surely,</li><li>undoubtedly, eventually, unfortunately.</li></ul></div></div>"},
{"order": 5, "badge": "5", "topic": "Future Perfect and Future Continuous", "book": "Evolve 6", "ref": "Evolve 6 - pg. 05 (Unit 1.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O future perfect e o future continuous descrevem situações no futuro. O future perfect fala de ações CONCLUÍDAS antes de um momento futuro; o future continuous fala de ações EM PROGRESSO em um momento futuro.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FUTURE PERFECT (ação concluída antes de um ponto no futuro)</h5><p>will + have + past participle<br>&quot;Chatbots will have taken over by the end of the decade.&quot;</p><h5 class=\"gram-subhead\">FUTURE CONTINUOUS (ação em progresso em um momento futuro)</h5><p>will + be + verbo + -ing<br>&quot;We'll be having real conversations with them.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">By 2050, technology will have changed everything.</span> <span class=\"gram-trans\">(Até 2050, a tecnologia terá mudado tudo.)</span></li><li><span class=\"gram-eng\">Will they have taken over all helplines?</span> <span class=\"gram-trans\">(Eles terão assumido todas as centrais de atendimento?)</span></li><li><span class=\"gram-eng\">This time tomorrow, I'll be flying to Hawaii.</span> <span class=\"gram-trans\">(A esta hora amanhã, estarei voando para o Havaí.)</span></li><li><span class=\"gram-eng\">We won't be having conversations with real people anymore.</span> <span class=\"gram-trans\">(Não estaremos mais conversando com pessoas reais.)</span></li><li><span class=\"gram-eng\">By the end of the semester, we will have covered the whole book.</span> <span class=\"gram-trans\">(Até o fim do semestre, teremos coberto o livro inteiro.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>FUTURE PERFECT = olha para TRÁS a partir de um ponto futuro (já concluído).</li><li>FUTURE CONTINUOUS = ação DURANDO em um momento futuro específico.</li></ul></div></div>"},
{"order": 13, "badge": "13", "topic": "Uses of Will", "book": "Evolve 6", "ref": "Evolve 6 - pg. 13 (Unit 2.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O modal WILL tem muitos usos além do futuro simples. Pode expressar previsões, hábitos, decisões instantâneas, críticas a comportamentos e também ofertas, concordância e promessas.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PRINCIPAIS USOS DE WILL</h5><p>1. Previsões/suposições sobre o futuro<br>2. Comportamentos típicos e hábitos (gerais)<br>3. Decisões tomadas no momento da fala<br>4. Críticas a hábitos e características<br>5. Ofertas, concordância e promessas</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Online quizzes will always give flattering results. (previsão)</span> <span class=\"gram-trans\">(Testes online sempre darão resultados lisonjeiros.)</span></li><li><span class=\"gram-eng\">My grandmother will always offer to make a cake. (hábito típico)</span> <span class=\"gram-trans\">(Minha avó sempre se oferece para fazer um bolo.)</span></li><li><span class=\"gram-eng\">I will never take another quiz like this! (decisão no momento)</span> <span class=\"gram-trans\">(Nunca mais farei um teste como esse!)</span></li><li><span class=\"gram-eng\">He won't admit to his real motivation. (crítica de comportamento)</span> <span class=\"gram-trans\">(Ele não admite sua verdadeira motivação.)</span></li><li><span class=\"gram-eng\">We won't ever misuse your personal information. (promessa)</span> <span class=\"gram-trans\">(Nunca usaremos mal suas informações pessoais.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>WILL não é só futuro: também descreve hábitos e comportamentos típicos.</li><li>WON'T enfático pode expressar recusa ou crítica: &quot;He won't listen!&quot;.</li></ul></div></div>"},
{"order": 15, "badge": "15", "topic": "Uses of Would", "book": "Evolve 6", "ref": "Evolve 6 - pg. 15 (Unit 2.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O verbo auxiliar WOULD é usado de várias formas: hábitos passados, pedidos educados, opiniões, discurso indireto, vontade/capacidade e situações irreais (hipotéticas).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PRINCIPAIS USOS DE WOULD</h5><p>1. Hábitos passados e comportamento esperado<br>2. Pedidos educados<br>3. Opiniões e julgamentos de forma educada<br>4. Reportar uma fala/pergunta com will (discurso indireto)<br>5. Vontade ou capacidade de algo/alguém<br>6. Situações irreais (hipotéticas)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">When I was a kid, I would ride my bike everywhere. (hábito passado)</span> <span class=\"gram-trans\">(Quando era criança, eu andava de bicicleta por toda parte.)</span></li><li><span class=\"gram-eng\">Would you help me with these bags, please? (pedido educado)</span> <span class=\"gram-trans\">(Você poderia me ajudar com estas sacolas, por favor?)</span></li><li><span class=\"gram-eng\">I would think he'd wear something nicer. (opinião educada)</span> <span class=\"gram-trans\">(Eu acharia que ele usaria algo mais elegante.)</span></li><li><span class=\"gram-eng\">He promised I would get the job. (discurso indireto)</span> <span class=\"gram-trans\">(Ele prometeu que eu conseguiria o emprego.)</span></li><li><span class=\"gram-eng\">The car wouldn't start, so I had to walk. (capacidade)</span> <span class=\"gram-trans\">(O carro não pegava, então tive que caminhar.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>WOULD para hábitos passados ≈ USED TO, mas só com verbos de ação.</li><li>Em situações irreais, WOULD aparece na oração principal: &quot;What would you do?&quot;.</li></ul></div></div>"},
{"order": 23, "badge": "23", "topic": "Variations on Past Unreal Conditionals", "book": "Evolve 6", "ref": "Evolve 6 - pg. 23 (Unit 3.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Condicionais irreais do passado falam de situações que NÃO aconteceram. Há variações: o resultado imaginado pode estar no passado ou no presente, e formas contínuas expressam ações em progresso.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">RESULTADO NO PASSADO (situação e resultado no passado)</h5><p>if + had(n't) + past participle | would(n't) + have + past participle<br>&quot;If you'd told me, I would have written it down.&quot;</p><h5 class=\"gram-subhead\">RESULTADO NO PRESENTE (situação no passado, resultado agora)</h5><p>if + had(n't) + past participle | would(n't) + verbo<br>&quot;If you hadn't heard the announcement, we would still be at the station.&quot;</p><h5 class=\"gram-subhead\">FORMAS CONTÍNUAS (ação em progresso)</h5><p>if + had(n't) + been + verbo + -ing | would(n't) + be + verbo + -ing</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">If you'd told me, I would have written it down.</span> <span class=\"gram-trans\">(Se você tivesse me dito, eu teria anotado.)</span></li><li><span class=\"gram-eng\">We would've missed the announcement if you hadn't been paying attention.</span> <span class=\"gram-trans\">(Teríamos perdido o aviso se você não estivesse prestando atenção.)</span></li><li><span class=\"gram-eng\">If you hadn't heard it, we would still be at the station.</span> <span class=\"gram-trans\">(Se você não tivesse ouvido, ainda estaríamos na estação.)</span></li><li><span class=\"gram-eng\">If you had been watching the children, Oliver wouldn't have a broken arm now.</span> <span class=\"gram-trans\">(Se você estivesse vigiando as crianças, o Oliver não estaria com o braço quebrado.)</span></li><li><span class=\"gram-eng\">If you hadn't heard the announcement, we would be waiting on the wrong platform.</span> <span class=\"gram-trans\">(Se você não tivesse ouvido o aviso, estaríamos esperando na plataforma errada.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>A oração com IF pode vir no início ou no fim da frase.</li><li>Resultado no PASSADO → would have + particípio. Resultado no PRESENTE → would + verbo.</li></ul></div></div>"},
{"order": 25, "badge": "25", "topic": "Commenting on the Past", "book": "Evolve 6", "ref": "Evolve 6 - pg. 25 (Unit 3.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para comentar o passado, usamos modais perfeitos. MAY, MIGHT e COULD discutem cenários alternativos possíveis; SHOULD e SHOULDN'T criticam ações ou a falta delas.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AÇÃO CONCLUÍDA</h5><p>may/might/could + have + past participle<br>should/shouldn't + have + past participle<br>&quot;She may not have heard the full story.&quot;</p><h5 class=\"gram-subhead\">AÇÃO EM PROGRESSO</h5><p>may/might/could + have + been + verbo + -ing<br>&quot;You could have been telling a story about someone else.&quot;</p><h5 class=\"gram-subhead\">VOZ PASSIVA</h5><p>may/might/could + have + been + past participle<br>&quot;That information shouldn't have been shared.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">She may not have heard the full story. (cenário possível)</span> <span class=\"gram-trans\">(Ela pode não ter ouvido a história completa.)</span></li><li><span class=\"gram-eng\">You should have checked before taking the keys. (crítica)</span> <span class=\"gram-trans\">(Você deveria ter verificado antes de pegar as chaves.)</span></li><li><span class=\"gram-eng\">He could have been telling the truth. (ação em progresso possível)</span> <span class=\"gram-trans\">(Ele podia estar dizendo a verdade.)</span></li><li><span class=\"gram-eng\">They shouldn't have left the bike outside. (crítica de algo feito)</span> <span class=\"gram-trans\">(Eles não deveriam ter deixado a bicicleta lá fora.)</span></li><li><span class=\"gram-eng\">That information shouldn't have been shared with the public. (passiva)</span> <span class=\"gram-trans\">(Essa informação não deveria ter sido compartilhada com o público.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>MAY/MIGHT/COULD HAVE = especulação sobre o passado (talvez tenha acontecido).</li><li>SHOULD HAVE = algo certo que NÃO foi feito; SHOULDN'T HAVE = algo errado que FOI feito.</li></ul></div></div>"},
{"order": 35, "badge": "35", "topic": "Quantifiers and Prepositions in Relative Clauses", "book": "Evolve 6", "ref": "Evolve 6 - pg. 35 (Unit 4.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para acrescentar detalhes em uma oração relativa, usamos quantificadores (all of, most of, none of, some of...) com which/whom. Preposições nas orações relativas podem vir antes do pronome (formal) ou no fim (informal).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">QUANTIFICADOR + OF + WHICH/WHOM</h5><p>which → para coisas | whom → para pessoas<br>&quot;Microphotography reveals objects, most of which we usually ignore.&quot;<br>&quot;Microphotographers, many of whom are scientists, focus on details.&quot;</p><h5 class=\"gram-subhead\">POSIÇÃO DA PREPOSIÇÃO</h5><p>Informal: preposição no FIM → &quot;...which cameras are attached TO&quot;<br>Formal:   preposição ANTES do pronome → &quot;...TO which cameras are attached&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I took hundreds of photos, most of which are really awful.</span> <span class=\"gram-trans\">(Tirei centenas de fotos, a maioria das quais é horrível.)</span></li><li><span class=\"gram-eng\">We invited a hundred guests, many of whom will stay at a hotel.</span> <span class=\"gram-trans\">(Convidamos cem pessoas, muitas das quais ficarão num hotel.)</span></li><li><span class=\"gram-eng\">The restaurant, the manager of which is my brother, is excellent.</span> <span class=\"gram-trans\">(O restaurante, cujo gerente é meu irmão, é excelente.)</span></li><li><span class=\"gram-eng\">This is the book about which I told you. (formal)</span> <span class=\"gram-trans\">(Este é o livro sobre o qual eu te falei.)</span></li><li><span class=\"gram-eng\">This is the book which I told you about. (informal)</span> <span class=\"gram-trans\">(Este é o livro do qual eu te falei.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Com quantificador, WHICH não pode ser substituído por THAT.</li><li>Preposição ANTES do pronome = formal/escrito; no FIM = informal/falado.</li></ul></div></div>"},
{"order": 37, "badge": "37", "topic": "Noun Clauses with Question Words", "book": "Evolve 6", "ref": "Evolve 6 - pg. 37 (Unit 4.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Orações substantivas (noun clauses) com question words substituem substantivos gerais. Podem funcionar como sujeito ou objeto da frase. Importante: usam a ordem de uma AFIRMAÇÃO, não de uma pergunta.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">QUESTION WORDS COMO SUBSTITUTOS</h5><p>what = a coisa | who = a pessoa | why = a razão<br>how = o modo | where = o lugar/ponto</p><h5 class=\"gram-subhead\">FUNÇÃO NA FRASE</h5><p>Sujeito: &quot;What we see is a world of grays.&quot;<br>Objeto:  &quot;Iris scanning proves we are who we say we are.&quot;</p><h5 class=\"gram-subhead\">ORDEM DAS PALAVRAS (afirmativa, NÃO pergunta)</h5><p>&quot;I can't remember where I left my glasses.&quot;<br>(NÃO: &quot;...where did I leave my glasses.&quot;)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I didn't know why you wanted to see me.</span> <span class=\"gram-trans\">(Eu não sabia por que você queria me ver.)</span></li><li><span class=\"gram-eng\">How eyes adjust to light is fascinating.</span> <span class=\"gram-trans\">(Como os olhos se ajustam à luz é fascinante.)</span></li><li><span class=\"gram-eng\">What we see is a world of grays.</span> <span class=\"gram-trans\">(O que vemos é um mundo de tons de cinza.)</span></li><li><span class=\"gram-eng\">If I know where you're standing, I can find you on GPS.</span> <span class=\"gram-trans\">(Se eu souber onde você está, posso te achar no GPS.)</span></li><li><span class=\"gram-eng\">The man in the hat is not who the police are looking for.</span> <span class=\"gram-trans\">(O homem de chapéu não é quem a polícia procura.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>A noun clause usa ordem de AFIRMAÇÃO: sujeito + verbo (sem inversão).</li><li>Não use o auxiliar do/does/did dentro da noun clause.</li></ul></div></div>"},
{"order": 45, "badge": "45", "topic": "Participle Phrases in Initial Position", "book": "Evolve 6", "ref": "Evolve 6 - pg. 45 (Unit 5.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Frases participiais no início da frase acrescentam informação sobre a ação principal ou o sujeito. São usadas para evitar repetição e encurtar frases complexas. NÃO contêm sujeito próprio (compartilham o da principal).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PRESENT PARTICIPLE (-ING) — ação simultânea</h5><p>&quot;Feeling overwhelmed by the crowd, he made his way to the exit.&quot;</p><h5 class=\"gram-subhead\">HAVING + PAST PARTICIPLE — ação anterior à principal</h5><p>&quot;Having experienced the desert sunset, she decided to move there.&quot;</p><h5 class=\"gram-subhead\">PAST PARTICIPLE — descreve o sujeito (sentido passivo)</h5><p>&quot;Convinced this was his last chance, John ran to catch the train.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Feeling overwhelmed by the crowd, he quickly made his way to the exit.</span> <span class=\"gram-trans\">(Sentindo-se sobrecarregado pela multidão, ele foi rápido para a saída.)</span></li><li><span class=\"gram-eng\">Having experienced the beauty of the sunset, she became determined to move.</span> <span class=\"gram-trans\">(Tendo vivido a beleza do pôr do sol, ela ficou decidida a se mudar.)</span></li><li><span class=\"gram-eng\">Convinced this was his last chance, John dropped everything.</span> <span class=\"gram-trans\">(Convencido de que era sua última chance, John largou tudo.)</span></li><li><span class=\"gram-eng\">Having finished college, I took a year off to travel.</span> <span class=\"gram-trans\">(Tendo terminado a faculdade, tirei um ano para viajar.)</span></li><li><span class=\"gram-eng\">Exhausted after a hard week, I decided to take it easy.</span> <span class=\"gram-trans\">(Exausto depois de uma semana difícil, decidi relaxar.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>O sujeito da frase participial e o da oração principal devem ser o MESMO.</li><li>Este recurso soa formal — é mais comum na escrita do que na fala.</li></ul></div></div>"},
{"order": 47, "badge": "47", "topic": "Reduced Relative Clauses", "book": "Evolve 6", "ref": "Evolve 6 - pg. 47 (Unit 5.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Uma oração relativa pode ser ENCURTADA quando seu verbo é BE e não há sujeito próprio (o pronome relativo é sujeito). Basta remover o pronome relativo (which/who/that) e o verbo be.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">BE + VERBO -ING</h5><p>&quot;Tourists who are staying on the island&quot; → &quot;Tourists staying on the island&quot;</p><h5 class=\"gram-subhead\">BE + ADJETIVO</h5><p>&quot;Students who are interested&quot; → &quot;Students interested&quot;</p><h5 class=\"gram-subhead\">BE + PAST PARTICIPLE</h5><p>&quot;Areas that are surrounded by fences&quot; → &quot;Areas surrounded by fences&quot;</p><h5 class=\"gram-subhead\">BE + FRASE PREPOSICIONAL</h5><p>&quot;Requests which are from approved organizations&quot; → &quot;Requests from approved organizations&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Tourists staying on the island need to book early.</span> <span class=\"gram-trans\">(Turistas hospedados na ilha precisam reservar cedo.)</span></li><li><span class=\"gram-eng\">Students interested in visiting the sites should sign up.</span> <span class=\"gram-trans\">(Alunos interessados em visitar os locais devem se inscrever.)</span></li><li><span class=\"gram-eng\">Areas surrounded by fences cannot be visited by the public.</span> <span class=\"gram-trans\">(Áreas cercadas por grades não podem ser visitadas pelo público.)</span></li><li><span class=\"gram-eng\">Requests from approved organizations will be given priority.</span> <span class=\"gram-trans\">(Pedidos de organizações aprovadas terão prioridade.)</span></li><li><span class=\"gram-eng\">I know a lot of people worried about their health.</span> <span class=\"gram-trans\">(Conheço muita gente preocupada com a saúde.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Só é possível reduzir quando o verbo é BE e o pronome relativo é o SUJEITO.</li><li>&quot;The man WHO I met&quot; NÃO pode ser reduzida (who é objeto, não sujeito).</li></ul></div></div>"},
{"order": 55, "badge": "55", "topic": "Clefts", "book": "Evolve 6", "ref": "Evolve 6 - pg. 55 (Unit 6.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Clefts são orações introdutórias usadas para DAR ÊNFASE a uma informação nova, interessante ou surpreendente. Dividem a frase em duas partes para destacar o elemento importante.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FORMAS DE CLEFT</h5><p>1. What ... + be → &quot;What she wanted was a big party!&quot;<br>2. The thing (that) ... + be → &quot;The only thing we wanted to do was dance!&quot;<br>3. The ... (that) ... + be → &quot;The only guests at the party will be people from school.&quot;<br>4. It + be + that/who/which → &quot;It was my uncle who told me the news.&quot;<br>&quot;It wasn't until they brought a cake that I realized the party was for me!&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">What she wanted was a big party.</span> <span class=\"gram-trans\">(O que ela queria era uma grande festa.)</span></li><li><span class=\"gram-eng\">The only thing we wanted to do was dance.</span> <span class=\"gram-trans\">(A única coisa que queríamos fazer era dançar.)</span></li><li><span class=\"gram-eng\">It was my uncle who told me the good news.</span> <span class=\"gram-trans\">(Foi meu tio quem me deu a boa notícia.)</span></li><li><span class=\"gram-eng\">It wasn't until they brought out a cake that I realized the party was for me.</span> <span class=\"gram-trans\">(Só quando trouxeram o bolo é que percebi que a festa era para mim.)</span></li><li><span class=\"gram-eng\">The reason I love surprises is that life is usually predictable.</span> <span class=\"gram-trans\">(A razão de eu amar surpresas é que a vida costuma ser previsível.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Clefts deslocam o foco da frase para o elemento que você quer destacar.</li><li>&quot;It + be + ... + that/who&quot; é a forma mais comum para enfatizar pessoas ou coisas.</li></ul></div></div>"},
{"order": 57, "badge": "57", "topic": "Question Words with Ever", "book": "Evolve 6", "ref": "Evolve 6 - pg. 57 (Unit 6.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Question words podem receber o sufixo -EVER (whatever, whichever, whenever, wherever, whoever, however) virando pronomes que indicam INCERTEZA ou INDIFERENÇA — não são perguntas.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FORMAS E SENTIDOS</h5><p>whatever  = não importa o quê<br>whichever = qualquer um (entre opções)<br>whenever  = não importa quando<br>wherever  = não importa onde<br>whoever   = não importa quem<br>however   = não importa como/quanto<br>(whyever é raro)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Whatever the critics say, I think it's a great movie.</span> <span class=\"gram-trans\">(Não importa o que os críticos digam, acho que é um ótimo filme.)</span></li><li><span class=\"gram-eng\">We'll get there, however long it takes.</span> <span class=\"gram-trans\">(Vamos chegar lá, não importa quanto tempo leve.)</span></li><li><span class=\"gram-eng\">Sleep wherever you like. There are lots of free rooms.</span> <span class=\"gram-trans\">(Durma onde quiser. Há vários quartos livres.)</span></li><li><span class=\"gram-eng\">Whoever told you that was lying. It's not true.</span> <span class=\"gram-trans\">(Quem quer que tenha dito isso estava mentindo. Não é verdade.)</span></li><li><span class=\"gram-eng\">Whenever we do to help, they always complain.</span> <span class=\"gram-trans\">(Não importa o que façamos para ajudar, eles sempre reclamam.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>-EVER indica indiferença/incerteza — NÃO transforma a frase em pergunta.</li><li>&quot;However&quot; aqui significa &quot;não importa como/quanto&quot;, diferente de &quot;however&quot; = porém.</li></ul></div></div>"},
{"order": 67, "badge": "67", "topic": "Negative and Limiting Adverbials", "book": "Evolve 6", "ref": "Evolve 6 - pg. 67 (Unit 7.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para dar ÊNFASE, pode-se começar a frase com um advérbio negativo ou limitante. Quando isso acontece, a ordem das palavras muda: o verbo auxiliar vem ANTES do sujeito (inversão, como em perguntas).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ADVÉRBIOS NEGATIVOS</h5><p>Never, Never again, Never before, No way, Not until</p><h5 class=\"gram-subhead\">ADVÉRBIOS LIMITANTES</h5><p>Little, Hardly, Only then, Only when</p><h5 class=\"gram-subhead\">INVERSÃO COM AUXILIAR</h5><p>&quot;Never again will I take my family for granted.&quot;</p><h5 class=\"gram-subhead\">COM SIMPLE PRESENT/PAST (acrescenta do/does/did)</h5><p>&quot;Not until then did I fully appreciate their importance.&quot;<br>&quot;Little do they know what they're going to find.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Never again will I take my family for granted.</span> <span class=\"gram-trans\">(Nunca mais vou menosprezar minha família.)</span></li><li><span class=\"gram-eng\">Only when everyone is paying attention am I starting the presentation.</span> <span class=\"gram-trans\">(Só quando todos estiverem atentos é que vou começar a apresentação.)</span></li><li><span class=\"gram-eng\">Not until then did I fully appreciate their importance.</span> <span class=\"gram-trans\">(Só então é que apreciei plenamente a importância deles.)</span></li><li><span class=\"gram-eng\">Little do they know what they're going to find.</span> <span class=\"gram-trans\">(Mal sabem eles o que vão encontrar.)</span></li><li><span class=\"gram-eng\">Hardly had we arrived when someone knocked at the door.</span> <span class=\"gram-trans\">(Mal tínhamos chegado quando alguém bateu à porta.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Começar com advérbio negativo/limitante OBRIGA a inversão verbo-sujeito.</li><li>Com simple present/past, é preciso acrescentar do/does/did: &quot;Little DO they know&quot;.</li></ul></div></div>"},
{"order": 69, "badge": "69", "topic": "Fronting Adverbials", "book": "Evolve 6", "ref": "Evolve 6 - pg. 69 (Unit 7.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para um efeito dramático, advérbios de lugar ou movimento podem ser levados ao INÍCIO da frase. Quando o sujeito não tem objeto direto, sujeito e verbo trocam de posição.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">INVERSÃO (quando o sujeito NÃO tem objeto direto)</h5><p>Acontece quando o verbo é:<br>- be → &quot;In the envelopes are crisp new dollar bills.&quot;<br>- de lugar (sit, lie) → &quot;On the table cloth lies a stack of envelopes.&quot;<br>- de movimento (fly, waft) → &quot;From the kitchen wafts the smell of dumplings.&quot;</p><h5 class=\"gram-subhead\">SEM INVERSÃO (quando há objeto direto)</h5><p>&quot;In the garden, she placed a little ceramic frog near the door.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">In the envelopes are crisp new dollar bills.</span> <span class=\"gram-trans\">(Dentro dos envelopes estão notas novinhas de dólar.)</span></li><li><span class=\"gram-eng\">On the table cloth lies a stack of red envelopes.</span> <span class=\"gram-trans\">(Sobre a toalha de mesa repousa uma pilha de envelopes vermelhos.)</span></li><li><span class=\"gram-eng\">From the kitchen wafts the smell of fresh dumplings.</span> <span class=\"gram-trans\">(Da cozinha vem o cheiro de dumplings fresquinhos.)</span></li><li><span class=\"gram-eng\">In the garden, she placed a ceramic frog near the door. (sem inversão)</span> <span class=\"gram-trans\">(No jardim, ela colocou um sapo de cerâmica perto da porta.)</span></li><li><span class=\"gram-eng\">Down the street walked an old man with a cane.</span> <span class=\"gram-trans\">(Pela rua descia um velho com uma bengala.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Há inversão só quando NÃO existe objeto direto após o verbo.</li><li>Se houver objeto direto, a ordem normal sujeito-verbo é mantida.</li></ul></div></div>"},
{"order": 77, "badge": "77", "topic": "Phrases with Get", "book": "Evolve 6", "ref": "Evolve 6 - pg. 77 (Unit 8.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O verbo GET combina-se com outros elementos para expressar causa, conclusão de tarefas e mudança de estado. É muito versátil e comum na linguagem do dia a dia.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">USOS DE GET</h5><p>1. Conclusão de tarefa: get + substantivo/pronome + past participle<br>&quot;How can I get this paper finished?&quot;<br>2. Mudança de estado: get + past participle<br>&quot;The story gets very complicated.&quot;<br>3. Algo provoca uma ação: get + subst./pronome + verbo + -ing<br>&quot;Coffee can get me moving in the morning.&quot;<br>4. Outra pessoa é responsável (passiva): get + subst./pronome + past participle (+ by)<br>&quot;Our new sofa is getting delivered this afternoon.&quot;<br>5. Mandar fazer algo: get ou have<br>&quot;We're going to get/have internet installed on Tuesday.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">How can I get this paper finished with all the noise?</span> <span class=\"gram-trans\">(Como vou terminar este trabalho com todo esse barulho?)</span></li><li><span class=\"gram-eng\">In the second act, the story gets very complicated.</span> <span class=\"gram-trans\">(No segundo ato, a história fica bem complicada.)</span></li><li><span class=\"gram-eng\">Coffee is the only thing that can get me moving in the morning.</span> <span class=\"gram-trans\">(Café é a única coisa que me faz funcionar de manhã.)</span></li><li><span class=\"gram-eng\">Our new sofa is getting delivered by the store this afternoon.</span> <span class=\"gram-trans\">(Nosso sofá novo será entregue pela loja hoje à tarde.)</span></li><li><span class=\"gram-eng\">We're going to get internet service installed on Tuesday.</span> <span class=\"gram-trans\">(Vamos mandar instalar a internet na terça-feira.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>GET + objeto + past participle (causativo) ≈ HAVE + objeto + past participle.</li><li>GET + past participle pode formar passiva informal: &quot;It got delivered&quot;.</li></ul></div></div>"},
{"order": 79, "badge": "79", "topic": "Phrases with As", "book": "Evolve 6", "ref": "Evolve 6 - pg. 79 (Unit 8.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>AS aparece em várias expressões usadas para fazer comparações, dar exemplos, indicar funções e mostrar simultaneidade. É um conector muito frequente em inglês formal e informal.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">EXPRESSÕES COMUNS COM AS</h5><p>as ... as          → comparação de igualdade<br>as if / as though  → comparação hipotética ('como se')<br>such as            → exemplificação ('tais como')<br>as a result of     → causa/consequência<br>as          → função ('como', no papel de) / simultaneidade ('enquanto')</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Most people can tell the difference as instantly as experts can.</span> <span class=\"gram-trans\">(A maioria das pessoas percebe a diferença tão rápido quanto especialistas.)</span></li><li><span class=\"gram-eng\">He spoke as if he knew everything about the topic.</span> <span class=\"gram-trans\">(Ele falava como se soubesse tudo sobre o assunto.)</span></li><li><span class=\"gram-eng\">Fairy tales illustrate basic truths, such as honesty and courage.</span> <span class=\"gram-trans\">(Contos de fada ilustram verdades básicas, como honestidade e coragem.)</span></li><li><span class=\"gram-eng\">As a result of the survey, we changed our strategy.</span> <span class=\"gram-trans\">(Como resultado da pesquisa, mudamos nossa estratégia.)</span></li><li><span class=\"gram-eng\">She works as a translator for an international company.</span> <span class=\"gram-trans\">(Ela trabalha como tradutora numa empresa internacional.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>AS IF / AS THOUGH introduzem comparações hipotéticas ('como se').</li><li>SUCH AS serve para dar exemplos; LIKE também, mas é mais informal.</li></ul></div></div>"},
{"order": 87, "badge": "87", "topic": "Referencing", "book": "Evolve 6", "ref": "Evolve 6 - pg. 87 (Unit 9.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Técnicas de referência permitem EVITAR REPETIÇÃO em um texto. Usamos pronomes, adjetivos possessivos e expressões que retomam algo já mencionado — ou, às vezes, antecipam uma ideia nova.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PARA NÃO REPETIR UM SUBSTANTIVO/CONCEITO</h5><p>- pronomes: it, they, them, this (it pode também antecipar ideia nova)<br>- adjetivos possessivos: its, their<br>- frases com the same / similar + substantivo</p><h5 class=\"gram-subhead\">PARA NÃO REPETIR UM VERBO/FRASE VERBAL</h5><p>- verbo auxiliar (be, have, do) na MESMA forma do verbo original<br>&quot;She doesn't like it, but her parents do.&quot;<br>&quot;They haven't tried it, but he has.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">A sedentary lifestyle has side effects. It increases heart disease risk.</span> <span class=\"gram-trans\">(Um estilo de vida sedentário tem efeitos colaterais. Ele aumenta o risco cardíaco.)</span></li><li><span class=\"gram-eng\">Pedal desks help students focus on their studies.</span> <span class=\"gram-trans\">(Mesas com pedais ajudam os alunos a focar nos estudos deles.)</span></li><li><span class=\"gram-eng\">Schools give children active alternatives. Companies offer their workers the same.</span> <span class=\"gram-trans\">(Escolas dão alternativas ativas às crianças. Empresas oferecem o mesmo aos funcionários.)</span></li><li><span class=\"gram-eng\">She doesn't like it, but her parents do.</span> <span class=\"gram-trans\">(Ela não gosta disso, mas os pais dela gostam.)</span></li><li><span class=\"gram-eng\">They haven't tried it, but he has.</span> <span class=\"gram-trans\">(Eles não experimentaram, mas ele sim.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>O verbo auxiliar substituto deve estar na MESMA forma do verbo original.</li><li>Bom referenciamento deixa o texto mais fluido e evita repetições cansativas.</li></ul></div></div>"},
{"order": 89, "badge": "89", "topic": "Continuous Infinitives", "book": "Evolve 6", "ref": "Evolve 6 - pg. 89 (Unit 9.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O infinitivo contínuo enfatiza que uma ação está EM PROGRESSO ao longo de um período de tempo. É formado com to be + verbo -ing, e também pode aparecer depois de modais.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">TO BE + VERBO -ING</h5><p>- com appear e seem (comentar ações/situações em andamento)<br>&quot;We seem to be packing way too much into our days.&quot;<br>- com want, would like, need (intenções e planos)<br>&quot;We know we need to be racking up seven hours of sleep.&quot;</p><h5 class=\"gram-subhead\">MODAL + BE + VERBO -ING</h5><p>- com should, could, might (criticar ou especular sobre algo em curso)<br>&quot;You should be sleeping, not watching cat videos!&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">My daughter appears to be sleeping, but she isn't.</span> <span class=\"gram-trans\">(Minha filha parece estar dormindo, mas não está.)</span></li><li><span class=\"gram-eng\">The problem seems to be growing.</span> <span class=\"gram-trans\">(O problema parece estar crescendo.)</span></li><li><span class=\"gram-eng\">I need to be running five miles every day for the marathon.</span> <span class=\"gram-trans\">(Preciso estar correndo oito quilômetros por dia para a maratona.)</span></li><li><span class=\"gram-eng\">You're watching cat videos when you should be sleeping!</span> <span class=\"gram-trans\">(Você está vendo vídeos de gato quando deveria estar dormindo!)</span></li><li><span class=\"gram-eng\">We're going to be looking at the flip side of the issue.</span> <span class=\"gram-trans\">(Vamos estar analisando o outro lado da questão.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>O infinitivo contínuo destaca DURAÇÃO/PROGRESSO da ação.</li><li>Comum depois de seem/appear e dos modais should, could, might.</li></ul></div></div>"},
{"order": 99, "badge": "99", "topic": "Simple Past for Unreal Situations", "book": "Evolve 6", "ref": "Evolve 6 - pg. 99 (Unit 10.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O simple past nem sempre se refere ao passado. Com certas estruturas e expressões, ele expressa situações HIPOTÉTICAS, irreais ou desejadas no presente.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">USOS DO SIMPLE PAST PARA SITUAÇÕES IRREAIS</h5><p>1. Condicionais irreais: if + simple past<br>&quot;If we had a varied diet, we would reduce our impact.&quot;<br>2. Desejos/preferências: I wish / If only / would rather + simple past<br>&quot;I wish people were more careful.&quot;<br>3. Especular: What if / Imagine (if) / Suppose + simple past<br>&quot;What if we created a new food product?&quot;<br>4. Comparações: as if / as though / even if + simple past<br>&quot;We cannot keep ignoring the problems as if they didn't exist.&quot;<br>5. Necessidade: It's (about/high) time (we) + simple past<br>&quot;It's high time we expanded our diet.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">If we had a more varied diet, we would reduce our negative effect.</span> <span class=\"gram-trans\">(Se tivéssemos uma dieta mais variada, reduziríamos nosso impacto negativo.)</span></li><li><span class=\"gram-eng\">I wish people were more careful about what they ate.</span> <span class=\"gram-trans\">(Eu queria que as pessoas tomassem mais cuidado com o que comem.)</span></li><li><span class=\"gram-eng\">My parents would rather we didn't eat red meat.</span> <span class=\"gram-trans\">(Meus pais preferiam que não comêssemos carne vermelha.)</span></li><li><span class=\"gram-eng\">Suppose we all stopped eating beef. What would we eat instead?</span> <span class=\"gram-trans\">(Suponha que todos parássemos de comer carne. O que comeríamos?)</span></li><li><span class=\"gram-eng\">It's high time we expanded our diet to include insect proteins.</span> <span class=\"gram-trans\">(Já passou da hora de ampliarmos nossa dieta para incluir proteína de inseto.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Aqui o simple past indica HIPÓTESE, não passado real.</li><li>Com 'were' irreal, usa-se 'were' para todas as pessoas: &quot;I wish I were...&quot;.</li></ul></div></div>"},
{"order": 101, "badge": "101", "topic": "It Constructions", "book": "Evolve 6", "ref": "Evolve 6 - pg. 101 (Unit 10.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Construções com IT tornam as afirmações mais IMPESSOAIS e OBJETIVAS. São muito comuns na escrita acadêmica, pois permitem relatar ideias sem indicar a fonte.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">RELATAR IDEIAS SEM CITAR A FONTE</h5><p>It + verbo de relato na passiva<br>&quot;It is said that...&quot; / &quot;It has been argued that...&quot; / &quot;It was found that...&quot;</p><h5 class=\"gram-subhead\">AVALIAR/ESPECULAR (o verbo e o adjetivo definem o grau de certeza)</h5><p>It + is + adjetivo + infinitivo<br>It + is/appears/seems + adjetivo + that clause<br>It + modal + verbo + that clause<br>It + modal + verbo + adjetivo</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">It is said that renewable energy is our future.</span> <span class=\"gram-trans\">(Diz-se que a energia renovável é o nosso futuro.)</span></li><li><span class=\"gram-eng\">It has been argued that climate change increases hurricanes.</span> <span class=\"gram-trans\">(Argumenta-se que a mudança climática aumenta os furacões.)</span></li><li><span class=\"gram-eng\">It is reasonable to assume a connection between fossil fuels and warming.</span> <span class=\"gram-trans\">(É razoável supor uma conexão entre combustíveis fósseis e o aquecimento.)</span></li><li><span class=\"gram-eng\">It seems unlikely that social enterprises will replace energy companies.</span> <span class=\"gram-trans\">(Parece improvável que empresas sociais substituam as de energia.)</span></li><li><span class=\"gram-eng\">It could be a mistake to assume that this trend will continue.</span> <span class=\"gram-trans\">(Pode ser um erro supor que essa tendência vai continuar.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Construções com IT deixam o texto mais formal e objetivo.</li><li>A escolha do verbo/adjetivo (reasonable, unlikely, logical...) mostra o grau de certeza.</li></ul></div></div>"},
{"order": 109, "badge": "109", "topic": "Subject Verb Agreement", "book": "Evolve 6", "ref": "Evolve 6 - pg. 109 (Unit 11.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>A concordância entre sujeito e verbo tem casos especiais: substantivos coletivos, palavras terminadas em -s, termos de origem latina, pronomes com prefixo e expressões com either/neither.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">REGRAS PRINCIPAIS</h5><p>1. Coletivos (family, team, government): verbo singular (foco no grupo)<br>ou plural (foco nas pessoas).<br>2. Substantivos em -s (news, politics, mathematics): verbo SINGULAR.<br>3. Termos do latim: media/data → plural; criteria/phenomena → plural<br>(singular: medium, datum, criterion, phenomenon).<br>4. Every-/any-/some-/no- + palavra: verbo SINGULAR<br>(mas pronomes de retomada plurais: they, them, their).<br>5. Either/neither: o verbo concorda com o elemento MAIS PRÓXIMO.<br>6. Quantias de dinheiro: verbo SINGULAR (visto como um todo).</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The marketing department is located on the third floor. (foco no grupo)</span> <span class=\"gram-trans\">(O departamento de marketing fica no terceiro andar.)</span></li><li><span class=\"gram-eng\">Good news is always welcome.</span> <span class=\"gram-trans\">(Boa notícia é sempre bem-vinda.)</span></li><li><span class=\"gram-eng\">The media never admits when they're wrong.</span> <span class=\"gram-trans\">(A mídia nunca admite quando está errada.)</span></li><li><span class=\"gram-eng\">Everyone knows that red means stop.</span> <span class=\"gram-trans\">(Todo mundo sabe que vermelho significa parar.)</span></li><li><span class=\"gram-eng\">Either John or my parents are going to meet us at the station.</span> <span class=\"gram-trans\">(Ou o John ou meus pais vão nos encontrar na estação.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Palavras em -s como news, politics, mathematics levam verbo SINGULAR.</li><li>Com either/neither, o verbo concorda com o sujeito MAIS PRÓXIMO dele.</li></ul></div></div>"},
{"order": 111, "badge": "111", "topic": "Articles", "book": "Evolve 6", "ref": "Evolve 6 - pg. 111 (Unit 11.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>A escolha entre artigo definido (the), indefinido (a/an) ou nenhum artigo depende de o substantivo ser conhecido, novo, único, genérico ou contável/incontável.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ARTIGO DEFINIDO (THE) — usar quando</h5><p>- falante e ouvinte conhecem o substantivo<br>- dá informação que identifica um substantivo já citado<br>- com superlativos / coisas únicas (the moon, the army)<br>- com áreas geográficas gerais (the beach, the country)</p><h5 class=\"gram-subhead\">SEM ARTIGO — usar com</h5><p>- substantivo incontável ou plural usado de forma genérica</p><h5 class=\"gram-subhead\">ARTIGO INDEFINIDO (A/AN) — usar quando</h5><p>- o substantivo é mencionado pela primeira vez / novo para o leitor<br>- com profissões e categorias<br>- em generalizações com substantivo singular</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">In U.S. weddings, it is common for the bride to wear white. (compartilhado)</span> <span class=\"gram-trans\">(Em casamentos nos EUA, é comum a noiva usar branco.)</span></li><li><span class=\"gram-eng\">This is the darkest shade of green I've ever seen. (superlativo)</span> <span class=\"gram-trans\">(Este é o tom de verde mais escuro que já vi.)</span></li><li><span class=\"gram-eng\">Color can evoke feelings and memories. (genérico, sem artigo)</span> <span class=\"gram-trans\">(A cor pode evocar sentimentos e memórias.)</span></li><li><span class=\"gram-eng\">He used a shade of orange that I've never seen before. (primeira menção)</span> <span class=\"gram-trans\">(Ele usou um tom de laranja que eu nunca tinha visto.)</span></li><li><span class=\"gram-eng\">I'd like to work as an interior decorator one day. (profissão)</span> <span class=\"gram-trans\">(Eu gostaria de trabalhar como decorador de interiores um dia.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use THE quando o ouvinte sabe exatamente a qual substantivo você se refere.</li><li>Substantivos incontáveis e plurais genéricos NÃO levam artigo.</li></ul></div></div>"},
{"order": 119, "badge": "119", "topic": "The Present Subjunctive", "book": "Evolve 6", "ref": "Evolve 6 - pg. 119 (Unit 12.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O presente do subjuntivo dá AUTORIDADE à fala. É usado em pedidos, sugestões e recomendações; para dizer o que deveria acontecer; ou para destacar o que é importante.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FORMA</h5><p>O verbo NÃO recebe -s na terceira pessoa.<br>A forma de be no subjuntivo é simplesmente 'be'.<br>&quot;He insists that we all be ready at noon.&quot;</p><h5 class=\"gram-subhead\">USA-SE COM THAT CLAUSES depois de</h5><p>- verbos de pedido/proposta: advise, ask, demand, insist, recommend, suggest<br>- adjetivos de importância: essential, imperative, important, vital<br>- substantivos de pedido forte: demand, insistence, recommendation, suggestion</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">He insists that we all be ready to go at noon.</span> <span class=\"gram-trans\">(Ele insiste que estejamos todos prontos para sair ao meio-dia.)</span></li><li><span class=\"gram-eng\">I suggest that you not come any earlier than two.</span> <span class=\"gram-trans\">(Sugiro que você não venha antes das duas.)</span></li><li><span class=\"gram-eng\">He recommended that we allow extra time for traffic.</span> <span class=\"gram-trans\">(Ele recomendou que reservássemos um tempo extra para o trânsito.)</span></li><li><span class=\"gram-eng\">It is imperative that he complete the application immediately.</span> <span class=\"gram-trans\">(É imperativo que ele preencha o formulário imediatamente.)</span></li><li><span class=\"gram-eng\">The officer's demand that we pull the car over was surprising.</span> <span class=\"gram-trans\">(A ordem do policial de que encostássemos o carro foi surpreendente.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>No subjuntivo, o verbo da terceira pessoa NÃO leva -s: &quot;that he complete&quot;.</li><li>A forma negativa é 'not + verbo': &quot;I suggest that you not come early&quot;.</li></ul></div></div>"},
{"order": 121, "badge": "121", "topic": "Perfect Infinitive", "book": "Evolve 6", "ref": "Evolve 6 - pg. 121 (Unit 12.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O infinitivo perfeito é usado para falar de situações e ações CONCLUÍDAS no passado. É formado por to have + particípio passado, e também aparece depois de modais.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">TO HAVE + PAST PARTICIPLE</h5><p>- com estruturas de relato (it is said/thought/reported)<br>&quot;The gardens are thought to have been built 3,000 years ago.&quot;<br>- com adjetivos que descrevem sentimentos sobre algo passado<br>&quot;We were relieved to have made it to the end of the trail.&quot;<br>- com appear e seem (comentar algo que já aconteceu)<br>&quot;Her dinner party appears to have happened after all.&quot;</p><h5 class=\"gram-subhead\">MODAL + HAVE + PAST PARTICIPLE</h5><p>- com should, would, could, might (criticar/especular sobre o passado)<br>&quot;The residents might not have wanted to move, but they had to.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The hanging gardens of Babylon are thought to have been built long ago.</span> <span class=\"gram-trans\">(Os jardins suspensos da Babilônia teriam sido construídos há muito tempo.)</span></li><li><span class=\"gram-eng\">We were relieved to have made it to the end of the trail before sunset.</span> <span class=\"gram-trans\">(Ficamos aliviados por ter chegado ao fim da trilha antes do pôr do sol.)</span></li><li><span class=\"gram-eng\">Based on the mess, her dinner party appears to have happened.</span> <span class=\"gram-trans\">(Pela bagunça, a janta dela parece ter mesmo acontecido.)</span></li><li><span class=\"gram-eng\">The mayor was shocked to have lost the election.</span> <span class=\"gram-trans\">(O prefeito ficou chocado por ter perdido a eleição.)</span></li><li><span class=\"gram-eng\">The residents might not have wanted to move, but they had to.</span> <span class=\"gram-trans\">(Os moradores talvez não quisessem se mudar, mas tiveram que.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>O infinitivo perfeito (to have + particípio) aponta para algo ANTERIOR.</li><li>Comum depois de seem/appear e de adjetivos de sentimento (relieved, glad, sorry).</li></ul></div></div>"}
]

function updateCarousel() {
  const track = document.querySelector('.cur-track');
  if (!track) return;
  const { index, total } = curCarouselState;
  track.style.transform = 'translateX(-' + (index * 100) + '%)';

  document.querySelectorAll('.cur-dot').forEach((d, i) => d.classList.toggle('active', i === index));
  const prev = document.querySelector('[data-cur-prev]');
  const next = document.querySelector('[data-cur-next]');
  if (prev) prev.disabled = index === 0;
  if (next) next.disabled = index >= total - 1;
  const progress = document.getElementById('curProgressNow');
  if (progress) progress.textContent = index + 1;
}

function goCarousel(idx) {
  const { total } = curCarouselState;
  if (idx < 0) idx = 0;
  if (idx >= total) idx = total - 1;
  curCarouselState.index = idx;
  updateCarousel();
}

function attachCarouselSwipe() {
  const viewport = document.querySelector('.cur-viewport');
  if (!viewport) return;
  let startX = 0, startY = 0, deltaX = 0, deltaY = 0, swiping = false;

  viewport.addEventListener('touchstart', (e) => {
    if (!e.touches[0]) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    deltaX = 0; deltaY = 0; swiping = true;
  }, { passive: true });

  viewport.addEventListener('touchmove', (e) => {
    if (!swiping || !e.touches[0]) return;
    deltaX = e.touches[0].clientX - startX;
    deltaY = e.touches[0].clientY - startY;
  }, { passive: true });

  viewport.addEventListener('touchend', () => {
    if (!swiping) return;
    swiping = false;
    // só conta como swipe se foi mais horizontal que vertical e passou de 50px
    if (Math.abs(deltaX) > 50 && Math.abs(deltaX) > Math.abs(deltaY)) {
      if (deltaX < 0) goCarousel(curCarouselState.index + 1);
      else goCarousel(curCarouselState.index - 1);
    }
  });
}
