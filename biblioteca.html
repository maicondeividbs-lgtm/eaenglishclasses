{"order": 3, "badge": "3", "topic": "Present Habits", "book": "Evolve 5", "ref": "Evolve 5 - pg. 03 (Unit 1.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Há várias formas de falar sobre hábitos no presente. A escolha da estrutura muda a ênfase: rotina geral, tendência, frequência ou um hábito incômodo/irritante.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FORMAS DE EXPRESSAR HÁBITOS NO PRESENTE</h5><p>1. Simple present (às vezes com advérbios de frequência)<br>2. Tend to + verbo na forma base (tendência)<br>3. Will + verbo (eventos que acontecem com frequência — presente, não futuro)<br>4. Present continuous (atividade que acontece junto com outro hábito)<br>5. Present continuous + always/constantly (hábito incômodo ou irritante)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">She usually likes things the way they are. (rotina geral)</span> <span class=\"gram-trans\">(Ela geralmente gosta das coisas como estão.)</span></li><li><span class=\"gram-eng\">I tend to adapt to new situations quickly. (tendência)</span> <span class=\"gram-trans\">(Eu costumo me adaptar rapidamente a situações novas.)</span></li><li><span class=\"gram-eng\">I'll often call my parents when I want advice. (frequência)</span> <span class=\"gram-trans\">(Eu costumo ligar para meus pais quando quero um conselho.)</span></li><li><span class=\"gram-eng\">I usually listen to music when I'm cooking. (hábitos simultâneos)</span> <span class=\"gram-trans\">(Eu geralmente ouço música enquanto cozinho.)</span></li><li><span class=\"gram-eng\">I'm always worrying about my work. (hábito incômodo)</span> <span class=\"gram-trans\">(Eu vivo me preocupando com o meu trabalho.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>WILL aqui NÃO é futuro: indica algo que acontece com frequência no presente.</li><li>Present continuous + ALWAYS/CONSTANTLY costuma expressar irritação ou crítica.</li></ul></div></div>"},
{"order": 5, "badge": "5", "topic": "Past Habits", "book": "Evolve 5", "ref": "Evolve 5 - pg. 05 (Unit 1.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para falar de hábitos, ações e estados do passado que não acontecem mais, usamos used to, would e o simple past. Cada forma tem restrições de uso.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">USED TO — hábitos, ações repetidas E estados passados</h5><p>used to / didn't use to + verbo base<br>&quot;We didn't use to make video calls, but we do now.&quot;</p><h5 class=\"gram-subhead\">WOULD — hábitos e ações repetidas (NÃO para estados)</h5><p>would ('d) / wouldn't + verbo base<br>Use would só quando o momento está claro.<br>&quot;We would text each other every night.&quot;</p><h5 class=\"gram-subhead\">SIMPLE PAST — hábitos, ações repetidas, estados E ações únicas concluídas</h5></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">We didn't use to make video calls, but we do now.</span> <span class=\"gram-trans\">(Não fazíamos chamadas de vídeo, mas agora fazemos.)</span></li><li><span class=\"gram-eng\">They never used to ride their bikes to school.</span> <span class=\"gram-trans\">(Eles nunca iam de bicicleta para a escola.)</span></li><li><span class=\"gram-eng\">On weekends, he would let me watch his TV.</span> <span class=\"gram-trans\">(Nos fins de semana, ele me deixava assistir à TV dele.)</span></li><li><span class=\"gram-eng\">I had a big bedroom when I was young. (estado — só used to / simple past)</span> <span class=\"gram-trans\">(Eu tinha um quarto grande quando era criança.)</span></li><li><span class=\"gram-eng\">I watched three shows last night. (ação única — só simple past)</span> <span class=\"gram-trans\">(Assisti a três programas ontem à noite.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>WOULD não serve para estados: &quot;I would have a big phone&quot; está errado → use USED TO.</li><li>Para ações ÚNICAS concluídas, use só o simple past (nem would nem used to).</li></ul></div></div>"},
{"order": 13, "badge": "13", "topic": "Comparative Structures", "book": "Evolve 5", "ref": "Evolve 5 - pg. 13 (Unit 2.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Além de comparativos simples, há várias estruturas para comparar quantidades, preferências, graus de habilidade e ações.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ESTRUTURAS COMPARATIVAS</h5><p>1. fewer + contável / less + incontável (menor quantidade)<br>2. rather than (preferência); to pode substituir rather than com prefer<br>3. verbo + more/less (como pronome)<br>4. adjetivo + (not) enough + infinitivo (grau de habilidade)<br>5. comparativo + infinitivo (comparar ações)<br>6. não é preciso repetir o primeiro sujeito e verbo</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The new project will require fewer resources and less time.</span> <span class=\"gram-trans\">(O novo projeto exigirá menos recursos e menos tempo.)</span></li><li><span class=\"gram-eng\">I prefer to study the ocean rather than learn about space.</span> <span class=\"gram-trans\">(Prefiro estudar o oceano a aprender sobre o espaço.)</span></li><li><span class=\"gram-eng\">I know less about Venus than about Mars.</span> <span class=\"gram-trans\">(Eu sei menos sobre Vênus do que sobre Marte.)</span></li><li><span class=\"gram-eng\">Technology is not advanced enough to send people to Mars.</span> <span class=\"gram-trans\">(A tecnologia não é avançada o suficiente para enviar pessoas a Marte.)</span></li><li><span class=\"gram-eng\">It's easier to use a tablet than to use a laptop.</span> <span class=\"gram-trans\">(É mais fácil usar um tablet do que um laptop.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>FEWER para contáveis (fewer resources); LESS para incontáveis (less time).</li><li>TO substitui RATHER THAN apenas com o verbo PREFER: &quot;I prefer X to Y&quot;.</li></ul></div></div>"},
{"order": 15, "badge": "15", "topic": "Superlative Structures and Ungradable Adjectives", "book": "Evolve 5", "ref": "Evolve 5 - pg. 15 (Unit 2.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Estruturas com superlativo permitem destacar algo dentro de um grupo. Adjetivos não-graduáveis (ungradable) expressam qualidades absolutas e não têm comparativo nem superlativo.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ESTRUTURAS COM SUPERLATIVO</h5><p>- one of / some of + superlativo + substantivo plural<br>- superlativo + infinitivo (função ou propósito)<br>- least = oposto de most<br>- superlativo + that clause (that é opcional)<br>- elipse com the (omite palavra repetida)</p><h5 class=\"gram-subhead\">ADJETIVOS NÃO-GRADUÁVEIS (ungradable)</h5><p>- não têm comparativo/superlativo (furious, exhausted, freezing)<br>- usam intensificadores: absolutely, completely, totally, utterly<br>- alguns (male, female, married, single) NÃO usam intensificadores</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">This country has some of the highest mountains in the world.</span> <span class=\"gram-trans\">(Este país tem algumas das montanhas mais altas do mundo.)</span></li><li><span class=\"gram-eng\">May is the best time to hike here.</span> <span class=\"gram-trans\">(Maio é a melhor época para fazer trilha aqui.)</span></li><li><span class=\"gram-eng\">It's the most fascinating place I've ever visited.</span> <span class=\"gram-trans\">(É o lugar mais fascinante que já visitei.)</span></li><li><span class=\"gram-eng\">The green parrots are totally amazing. (não-graduável + intensificador)</span> <span class=\"gram-trans\">(Os papagaios verdes são totalmente incríveis.)</span></li><li><span class=\"gram-eng\">My friends were absolutely furious.</span> <span class=\"gram-trans\">(Meus amigos estavam absolutamente furiosos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Adjetivos GRADUÁVEIS usam very/a little/really; NÃO-GRADUÁVEIS usam absolutely/totally.</li><li>REALLY pode ser usado com os dois tipos de adjetivo.</li></ul></div></div>"},
{"order": 23, "badge": "23", "topic": "Relative Pronouns and Reduced Relative Clauses", "book": "Evolve 5", "ref": "Evolve 5 - pg. 23 (Unit 3.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Pronomes relativos introduzem orações relativas. Orações relativas de SUJEITO podem ser encurtadas (reduced) omitindo o pronome relativo e o verbo be — mas orações de objeto NÃO podem.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PRONOMES RELATIVOS</h5><p>that/which → coisas | that/who → pessoas<br>where → lugares | when → tempos | whose → posse</p><h5 class=\"gram-subhead\">REDUCED RELATIVE CLAUSES (só orações de sujeito)</h5><p>Omite-se o pronome relativo + be quando há:<br>- be + adjetivo: &quot;people who are worried&quot; → &quot;people worried&quot;<br>- be + past participle: &quot;the bus that is parked&quot; → &quot;the bus parked&quot;<br>- frase nominal: &quot;Steven, who is a quick learner&quot; → &quot;Steven, a quick learner&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">My sister, whose children I take care of, lives next door.</span> <span class=\"gram-trans\">(Minha irmã, de quem cuido dos filhos, mora ao lado.)</span></li><li><span class=\"gram-eng\">Today is the day when we decide it's time for a change.</span> <span class=\"gram-trans\">(Hoje é o dia em que decidimos que é hora de mudar.)</span></li><li><span class=\"gram-eng\">People worried about meeting strangers get nervous at parties.</span> <span class=\"gram-trans\">(Pessoas preocupadas em conhecer estranhos ficam nervosas em festas.)</span></li><li><span class=\"gram-eng\">The bus parked in front of the office is the one we'll take.</span> <span class=\"gram-trans\">(O ônibus estacionado em frente ao escritório é o que vamos pegar.)</span></li><li><span class=\"gram-eng\">Steven, a quick learner, adapts easily to new situations.</span> <span class=\"gram-trans\">(Steven, que aprende rápido, se adapta facilmente a situações novas.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Só dá para reduzir orações relativas de SUJEITO com o verbo BE.</li><li>&quot;The book that I read&quot; (objeto) NÃO pode ser reduzida.</li></ul></div></div>"},
{"order": 25, "badge": "25", "topic": "Present Participles", "book": "Evolve 5", "ref": "Evolve 5 - pg. 25 (Unit 3.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O present participle (verbo + -ing) serve para encurtar frases que descrevem dois eventos simultâneos e para formar reduced relative clauses.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">DOIS EVENTOS SIMULTÂNEOS</h5><p>Usa-se o present participle do segundo verbo após vírgula.<br>NÃO se usa 'and'.<br>&quot;I work and listen to music.&quot; → &quot;I work, listening to music.&quot;</p><h5 class=\"gram-subhead\">EM REDUCED RELATIVE CLAUSES</h5><p>Usa-se o present participle no lugar de 'pronome relativo + be'.<br>&quot;lemons that are growing&quot; → &quot;lemons growing&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The mall is full of people shopping for the holidays.</span> <span class=\"gram-trans\">(O shopping está cheio de gente comprando para as festas.)</span></li><li><span class=\"gram-eng\">We're standing in line waiting to check in for our flight.</span> <span class=\"gram-trans\">(Estamos na fila esperando para fazer o check-in do voo.)</span></li><li><span class=\"gram-eng\">There are a lot of fans waiting outside the stadium.</span> <span class=\"gram-trans\">(Há muitos fãs esperando do lado de fora do estádio.)</span></li><li><span class=\"gram-eng\">I love to stand on the hill looking down at the valley.</span> <span class=\"gram-trans\">(Adoro ficar na colina olhando o vale lá embaixo.)</span></li><li><span class=\"gram-eng\">The storm will affect people living in the South.</span> <span class=\"gram-trans\">(A tempestade vai afetar as pessoas que moram no Sul.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Ao unir dois eventos simultâneos, troque 'and + verbo' por 'vírgula + verbo-ing'.</li><li>O recurso encurta a frase e evita repetição — comum na escrita.</li></ul></div></div>"},
{"order": 35, "badge": "35", "topic": "Adding Emphasis", "book": "Evolve 5", "ref": "Evolve 5 - pg. 35 (Unit 4.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para dar ênfase, usamos quatro recursos: so...that e such...that destacam resultados/efeitos; even e only destacam palavras ou partes da frase.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">SO + adjetivo/advérbio + (that) — enfatiza resultado/efeito</h5><p>&quot;It was so funny (that) I couldn't stop laughing.&quot;</p><h5 class=\"gram-subhead\">SUCH (a/an) + (adjetivo) + substantivo + (that) — enfatiza resultado</h5><p>&quot;She is such a good friend (that) everyone turns to her.&quot;</p><h5 class=\"gram-subhead\">EVEN — antes de palavra/frase: indica surpresa ou ênfase</h5><p>&quot;Even the most confident person needs help sometimes.&quot;</p><h5 class=\"gram-subhead\">ONLY — antes de palavra/frase: 'ninguém/nada além de'</h5><p>&quot;Only you can steer him away from a big mistake.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">It was such a big decision to move to Canada.</span> <span class=\"gram-trans\">(Foi uma decisão tão grande mudar para o Canadá.)</span></li><li><span class=\"gram-eng\">She is so ambitious that she has decided to work toward a PhD.</span> <span class=\"gram-trans\">(Ela é tão ambiciosa que decidiu fazer um doutorado.)</span></li><li><span class=\"gram-eng\">Everyone was on time, even Joseph, who is usually late.</span> <span class=\"gram-trans\">(Todos chegaram na hora, até o Joseph, que costuma se atrasar.)</span></li><li><span class=\"gram-eng\">It was time to leave, but they had only packed one suitcase.</span> <span class=\"gram-trans\">(Era hora de sair, mas eles tinham arrumado só uma mala.)</span></li><li><span class=\"gram-eng\">He demonstrated such talent that they hired him immediately.</span> <span class=\"gram-trans\">(Ele mostrou tanto talento que o contrataram na hora.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>SO vai com adjetivo/advérbio; SUCH vai com substantivo (com ou sem adjetivo).</li><li>EVEN dá ideia de surpresa; ONLY restringe a 'ninguém/nada mais'.</li></ul></div></div>"},
{"order": 37, "badge": "37", "topic": "Reflexive Pronouns and Other Another", "book": "Evolve 5", "ref": "Evolve 5 - pg. 37 (Unit 4.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Pronomes reflexivos (myself, yourself...) referem-se de volta ao sujeito. Os pronomes com other/another indicam membros restantes ou adicionais de um par ou grupo.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PRONOMES REFLEXIVOS — usar quando</h5><p>- sujeito e objeto são a mesma pessoa: &quot;I enjoyed myself.&quot;<br>- para ênfase, após substantivo/pronome: &quot;The employees themselves decide.&quot;<br>- após 'by' = sozinho/sem ajuda: &quot;I can't lift this by myself.&quot;</p><h5 class=\"gram-subhead\">OTHER / ANOTHER</h5><p>the other = o membro restante de um par<br>another = um membro adicional do grupo<br>the others = os membros restantes do grupo<br>others = outros (diferentes dos já mencionados)<br>each other / one another = um ao outro (reciprocidade)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I enjoyed myself at the party.</span> <span class=\"gram-trans\">(Eu me diverti na festa.)</span></li><li><span class=\"gram-eng\">The employees themselves decide what time they start work.</span> <span class=\"gram-trans\">(Os próprios funcionários decidem a que horas começam a trabalhar.)</span></li><li><span class=\"gram-eng\">I can't lift this box by myself.</span> <span class=\"gram-trans\">(Não consigo levantar esta caixa sozinho.)</span></li><li><span class=\"gram-eng\">Some people drink coffee. Others prefer tea.</span> <span class=\"gram-trans\">(Algumas pessoas tomam café. Outras preferem chá.)</span></li><li><span class=\"gram-eng\">During exams, students are not allowed to help each other.</span> <span class=\"gram-trans\">(Durante as provas, os alunos não podem ajudar uns aos outros.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>YOU tem dois reflexivos: yourself (singular) e yourselves (plural).</li><li>THE OTHERS = o restante de um grupo específico; OTHERS = outros quaisquer.</li></ul></div></div>"},
{"order": 45, "badge": "45", "topic": "Real Conditionals", "book": "Evolve 5", "ref": "Evolve 5 - pg. 45 (Unit 5.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Condicionais reais descrevem situações possíveis ou verdadeiras. Há três tipos: presente (fatos/rotinas), futuro (situações possíveis) e com modais (mostrando probabilidade ou necessidade).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PRESENTE (fatos gerais e rotinas)</h5><p>if/when/whenever + simple present + simple present<br>&quot;I feel nervous if/when I think about flying.&quot;</p><h5 class=\"gram-subhead\">FUTURO (situações futuras possíveis e seus resultados)</h5><p>if/when/whenever + simple present + will / be going to<br>&quot;If you try the therapy, it will make you more confident.&quot;</p><h5 class=\"gram-subhead\">COM MODAIS (mostra probabilidade ou necessidade do resultado)</h5><p>if clause + modal na oração principal<br>&quot;Whenever you're worried, you have to try not to panic.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I feel nervous whenever I think about flying.</span> <span class=\"gram-trans\">(Fico nervoso sempre que penso em voar.)</span></li><li><span class=\"gram-eng\">If you try the therapy, it will make you more confident.</span> <span class=\"gram-trans\">(Se você experimentar a terapia, ela te deixará mais confiante.)</span></li><li><span class=\"gram-eng\">When I arrive at the airport, I will call you right away.</span> <span class=\"gram-trans\">(Quando eu chegar ao aeroporto, te ligo na hora.)</span></li><li><span class=\"gram-eng\">Everyone must take off their shoes if they want to enter.</span> <span class=\"gram-trans\">(Todos devem tirar os sapatos se quiserem entrar.)</span></li><li><span class=\"gram-eng\">Whenever I face my fear of heights, I have to cross that bridge.</span> <span class=\"gram-trans\">(Sempre que enfrento meu medo de altura, tenho que atravessar aquela ponte.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>IF = pode acontecer ou não. WHEN/WHENEVER = vai acontecer com certeza.</li><li>Na oração com if, use simple present — nunca will: &quot;If you try&quot; (não &quot;If you will try&quot;).</li></ul></div></div>"},
{"order": 47, "badge": "47", "topic": "Conditionals Alternatives to If", "book": "Evolve 5", "ref": "Evolve 5 - pg. 47 (Unit 5.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>É possível usar condicionais reais com outras expressões além de IF. Cada uma tem um sentido diferente: indiferença à condição, condição única necessária, ou condição negativa.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">EVEN IF — a condição não importa (o resultado é o mesmo)</h5><p>&quot;Even if video calls improve, talking in person is much nicer.&quot;</p><h5 class=\"gram-subhead\">ONLY IF / PROVIDING (THAT) / PROVIDED (THAT) / AS LONG AS /</h5><p>ON CONDITION THAT — o resultado só acontece se a condição específica<br>for verdadeira (nenhuma outra condição serve):<br>&quot;I'll lend you my phone, provided you return it soon.&quot;</p><h5 class=\"gram-subhead\">UNLESS — condição negativa = 'except if' / 'if...not'</h5><p>&quot;We can't reach an agreement unless you communicate openly.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Even if we meet in person, we may not reach an agreement.</span> <span class=\"gram-trans\">(Mesmo que nos encontremos pessoalmente, podemos não chegar a um acordo.)</span></li><li><span class=\"gram-eng\">I'm willing to try virtual meetings providing the technology is reliable.</span> <span class=\"gram-trans\">(Estou disposto a tentar reuniões virtuais, desde que a tecnologia seja confiável.)</span></li><li><span class=\"gram-eng\">We'll leave at 3:00 provided everyone is ready.</span> <span class=\"gram-trans\">(Vamos sair às 3h, desde que todos estejam prontos.)</span></li><li><span class=\"gram-eng\">You shouldn't study late unless it's absolutely necessary.</span> <span class=\"gram-trans\">(Você não deveria estudar até tarde, a não ser que seja absolutamente necessário.)</span></li><li><span class=\"gram-eng\">As long as the company makes a profit, the boss is happy.</span> <span class=\"gram-trans\">(Desde que a empresa dê lucro, o chefe fica feliz.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>EVEN IF = a condição não muda o resultado. UNLESS = 'a menos que / se não'.</li><li>PROVIDED, PROVIDING, AS LONG AS e ON CONDITION THAT são equivalentes a 'only if'.</li></ul></div></div>"},
{"order": 55, "badge": "55", "topic": "Narrative Tenses", "book": "Evolve 5", "ref": "Evolve 5 - pg. 55 (Unit 6.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Tempos narrativos são usados para contar histórias. Combinam-se quatro tempos para organizar eventos principais, ações de fundo e ações anteriores.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">SIMPLE PAST — eventos e situações principais já concluídos</h5><p>&quot;He became famous when he was only 14.&quot;</p><h5 class=\"gram-subhead\">PAST CONTINUOUS (was/were + verbo -ing) — atividades de fundo em</h5><p>progresso ao mesmo tempo que o evento principal:<br>&quot;She translated what the president was saying.&quot;</p><h5 class=\"gram-subhead\">PAST PERFECT (had + past participle) — evento anterior a outro do</h5><p>passado:<br>&quot;All my friends went to the concert, but I'd forgotten to buy a ticket.&quot;</p><h5 class=\"gram-subhead\">PAST PERFECT CONTINUOUS (had been + verbo -ing) — ação que durou até</h5><p>outro momento do passado (mostra razão ou informação de fundo):<br>&quot;The band had been playing all night, so they were very tired.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">He became famous when he was only 14.</span> <span class=\"gram-trans\">(Ele ficou famoso quando tinha apenas 14 anos.)</span></li><li><span class=\"gram-eng\">She translated what the president was saying.</span> <span class=\"gram-trans\">(Ela traduziu o que o presidente estava dizendo.)</span></li><li><span class=\"gram-eng\">All my friends went to the concert, but I'd forgotten to buy a ticket.</span> <span class=\"gram-trans\">(Todos os meus amigos foram ao show, mas eu tinha esquecido de comprar ingresso.)</span></li><li><span class=\"gram-eng\">The band had been playing all night, so they were very tired.</span> <span class=\"gram-trans\">(A banda tinha tocado a noite toda, então estavam muito cansados.)</span></li><li><span class=\"gram-eng\">We were exhausted when we reached the town.</span> <span class=\"gram-trans\">(Estávamos exaustos quando chegamos à cidade.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>PAST PERFECT marca o que aconteceu ANTES de outro evento passado.</li><li>PAST PERFECT CONTINUOUS enfatiza a DURAÇÃO de uma ação que levou a outro momento.</li></ul></div></div>"},
{"order": 57, "badge": "57", "topic": "Reported Speech with Modal Verbs", "book": "Evolve 5", "ref": "Evolve 5 - pg. 57 (Unit 6.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>No discurso indireto, alguns verbos modais MUDAM quando o verbo de relato está no passado; outros NÃO mudam. É preciso saber distinguir.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">MODAIS QUE MUDAM (quando o verbo de relato está no passado)</h5><p>will → would<br>can → could<br>may → might<br>&quot;Will you help me?&quot; → &quot;She asked if I would help her.&quot;</p><h5 class=\"gram-subhead\">MODAIS QUE NÃO MUDAM (mesmo com verbo de relato no passado)</h5><p>might, could, should, must<br>&quot;What could they do?&quot; → &quot;He wondered what they could do.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">&quot;We won't study space next week.&quot; →</span></li><li><span class=\"gram-eng\">&quot;Everyone should study for the test.&quot; →</span></li><li><span class=\"gram-eng\">&quot;We may not have time.&quot; → Lisa explained that we might not have time.</span> <span class=\"gram-trans\">(A Lisa explicou que talvez não tivéssemos tempo.)</span></li><li><span class=\"gram-eng\">&quot;When will you finish?&quot; → My boss asked me when I would finish.</span> <span class=\"gram-trans\">(Meu chefe me perguntou quando eu terminaria.)</span></li><li><span class=\"gram-eng\">&quot;I can play the piano well.&quot; → I said I could play the piano well.</span> <span class=\"gram-trans\">(Eu disse que sabia tocar piano bem.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>WILL→would, CAN→could, MAY→might quando o verbo de relato está no passado.</li><li>SHOULD, MUST, MIGHT e COULD já são formas que não mudam.</li></ul></div></div>"},
{"order": 67, "badge": "67", "topic": "Gerunds and Infinitives after Adjectives Nouns Pronouns", "book": "Evolve 5", "ref": "Evolve 5 - pg. 67 (Unit 7.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Depois de adjetivos, substantivos e pronomes, pode aparecer infinitivo (to + verbo) ou gerúndio (verbo + -ing). A escolha depende da estrutura.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">INFINITIVO (to + verbo)</h5><p>- adjetivo + infinitivo: &quot;It's difficult to work at night.&quot;<br>- substantivo + infinitivo (propósito): &quot;an interesting place to visit&quot;<br>- pronome + infinitivo (propósito): &quot;I need something to eat.&quot;</p><h5 class=\"gram-subhead\">GERÚNDIO (verbo + -ing)</h5><p>- adjetivo + gerúndio: &quot;It was boring waiting in line.&quot;<br>- expressão fixa + gerúndio (be worth, have fun, spend/waste time):<br>&quot;I spend a lot of time traveling for my job.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">It's boring and difficult to work at night.</span> <span class=\"gram-trans\">(É chato e difícil trabalhar à noite.)</span></li><li><span class=\"gram-eng\">It was an interesting place to visit.</span> <span class=\"gram-trans\">(Era um lugar interessante para visitar.)</span></li><li><span class=\"gram-eng\">I need something to eat.</span> <span class=\"gram-trans\">(Preciso de algo para comer.)</span></li><li><span class=\"gram-eng\">It was boring waiting in line for the roller coaster.</span> <span class=\"gram-trans\">(Foi chato esperar na fila da montanha-russa.)</span></li><li><span class=\"gram-eng\">I spend a lot of time traveling for my job.</span> <span class=\"gram-trans\">(Passo muito tempo viajando a trabalho.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Alguns adjetivos aceitam só gerúndio, outros só infinitivo, outros ambos.</li><li>Expressões fixas como BE WORTH, HAVE FUN, WASTE TIME sempre pedem gerúndio.</li></ul></div></div>"},
{"order": 69, "badge": "69", "topic": "Infinitives after Verbs with and without Objects", "book": "Evolve 5", "ref": "Evolve 5 - pg. 69 (Unit 7.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Alguns verbos são seguidos diretamente por infinitivo; outros precisam de um objeto antes do infinitivo; e um terceiro grupo aceita as duas construções, mudando quem realiza a ação.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">VERBO + INFINITIVO (sem objeto)</h5><p>agree, decide, hope, manage, plan, seem, tend<br>&quot;They agreed not to climb the mountain.&quot;</p><h5 class=\"gram-subhead\">VERBO + OBJETO + INFINITIVO (objeto faz a ação)</h5><p>allow, convince, encourage, teach, tell, urge, warn<br>&quot;He did not convince us to hire him.&quot;</p><h5 class=\"gram-subhead\">VERBO + (OBJETO) + INFINITIVO (aceita os dois)</h5><p>ask, expect, need, promise, want, would like<br>sem objeto = o sujeito faz a ação | com objeto = o objeto faz a ação</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">They agreed not to climb the mountain without an instructor.</span> <span class=\"gram-trans\">(Eles concordaram em não escalar a montanha sem um instrutor.)</span></li><li><span class=\"gram-eng\">He did not convince us to hire him.</span> <span class=\"gram-trans\">(Ele não nos convenceu a contratá-lo.)</span></li><li><span class=\"gram-eng\">My parents advised me to save money.</span> <span class=\"gram-trans\">(Meus pais me aconselharam a economizar dinheiro.)</span></li><li><span class=\"gram-eng\">I'd like to buy the lamp. (eu compro)</span> <span class=\"gram-trans\">(Eu gostaria de comprar o abajur.)</span></li><li><span class=\"gram-eng\">I'd like you to buy that lamp. (você compra)</span> <span class=\"gram-trans\">(Eu gostaria que você comprasse aquele abajur.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use NOT antes do infinitivo para torná-lo negativo: &quot;agreed not to climb&quot;.</li><li>Com ask/want/expect/need, o objeto muda quem realiza a ação do infinitivo.</li></ul></div></div>"},
{"order": 77, "badge": "77", "topic": "Modal Like Expressions with Be", "book": "Evolve 5", "ref": "Evolve 5 - pg. 77 (Unit 8.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Expressões com BE funcionam como modais, indicando certeza, probabilidade, expectativa, obrigação ou permissão sobre uma ação.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">EXPRESSÕES MODAIS COM BE</h5><p>be bound to / be certain to / be sure to → certeza de acontecer<br>be likely/unlikely to → provável/improvável de acontecer<br>be supposed to → esperado de acontecer (combinado/responsabilidade)<br>be about to → algo que vai acontecer logo<br>be required to → algo que somos obrigados a fazer (regras)<br>be forced to → obrigados a fazer, mas sem querer<br>be allowed to / be permitted to → ter permissão para fazer</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">If you drop that glass, it's bound to break.</span> <span class=\"gram-trans\">(Se você derrubar esse copo, ele com certeza vai quebrar.)</span></li><li><span class=\"gram-eng\">There's a lot of traffic, so we're likely to be late.</span> <span class=\"gram-trans\">(Há muito trânsito, então é provável que cheguemos atrasados.)</span></li><li><span class=\"gram-eng\">My mom was supposed to pick me up at 3:30, but she didn't.</span> <span class=\"gram-trans\">(Minha mãe deveria me buscar às 15h30, mas não veio.)</span></li><li><span class=\"gram-eng\">Quick, turn on the TV. The game is about to start.</span> <span class=\"gram-trans\">(Rápido, ligue a TV. O jogo está prestes a começar.)</span></li><li><span class=\"gram-eng\">Everyone who travels by plane is required to have a passport.</span> <span class=\"gram-trans\">(Todos que viajam de avião são obrigados a ter passaporte.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>BE REQUIRED TO = obrigação por regra. BE FORCED TO = obrigação contra a vontade.</li><li>BE SUPPOSED TO = o que se espera por combinação, nem sempre acontece.</li></ul></div></div>"},
{"order": 79, "badge": "79", "topic": "Future Forms", "book": "Evolve 5", "ref": "Evolve 5 - pg. 79 (Unit 8.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Há várias formas de falar do futuro em inglês. A escolha depende de o evento ser um plano definido, uma intenção geral, uma previsão, uma incerteza ou uma ação em progresso no futuro.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FORMAS DE FUTURO</h5><p>1. Present continuous → intenções gerais e planos/combinações definidos<br>2. Be going to → planos/intenções gerais e previsões<br>3. Might / may / could → quando não há certeza sobre o futuro<br>4. Will → previsões e decisões tomadas no momento da fala<br>5. Will be + verbo -ing (future continuous) → ação em progresso no<br>futuro e planos/intenções (mais formal)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I'm meeting my friends tomorrow at 6:00 p.m. (plano definido)</span> <span class=\"gram-trans\">(Vou encontrar meus amigos amanhã às 18h.)</span></li><li><span class=\"gram-eng\">It's going to be a big surprise for them. (previsão)</span> <span class=\"gram-trans\">(Vai ser uma grande surpresa para eles.)</span></li><li><span class=\"gram-eng\">I might start my own business one day. (incerteza)</span> <span class=\"gram-trans\">(Talvez eu abra meu próprio negócio um dia.)</span></li><li><span class=\"gram-eng\">That looks difficult. I'll help you with it. (decisão no momento)</span> <span class=\"gram-trans\">(Isso parece difícil. Eu te ajudo com isso.)</span></li><li><span class=\"gram-eng\">In a few years, I'll be looking for a job. (ação em progresso no futuro)</span> <span class=\"gram-trans\">(Daqui a alguns anos, estarei procurando emprego.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Present continuous e future continuous expressam planos; o future continuous é mais formal.</li><li>WILL para decisões instantâneas; BE GOING TO para planos já pensados.</li></ul></div></div>"},
{"order": 87, "badge": "87", "topic": "Unreal Conditionals", "book": "Evolve 5", "ref": "Evolve 5 - pg. 87 (Unit 9.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Condicionais irreais descrevem situações imaginárias — que não são verdadeiras ou não aconteceram. Podem se referir ao presente/futuro ou ao passado.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PRESENTE E FUTURO</h5><p>if clause: could / simple past / past continuous (situação imaginada)<br>result clause: would/could/might + verbo base (resultado possível)<br>&quot;If we got tickets, we wouldn't watch it on TV.&quot;</p><h5 class=\"gram-subhead\">PASSADO</h5><p>if clause: past perfect (algo possível que não aconteceu)<br>result clause: would/could/may/might have + past participle<br>(resultado passado imaginário)<br>&quot;I could have been an X-ray technician if I had studied medicine.&quot;<br>Ou would + verbo base (resultado presente imaginário):<br>&quot;I would have a nicer apartment if I hadn't bought a new car.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">If we got tickets to the concert, we wouldn't watch it on TV.</span> <span class=\"gram-trans\">(Se conseguíssemos ingressos para o show, não o assistiríamos pela TV.)</span></li><li><span class=\"gram-eng\">If Josh was studying at the library, I could help him.</span> <span class=\"gram-trans\">(Se o Josh estivesse estudando na biblioteca, eu poderia ajudá-lo.)</span></li><li><span class=\"gram-eng\">I could have been an X-ray technician if I had studied medicine.</span> <span class=\"gram-trans\">(Eu poderia ter sido técnico de raio-x se tivesse estudado medicina.)</span></li><li><span class=\"gram-eng\">I would have a nicer apartment if I hadn't bought a new car.</span> <span class=\"gram-trans\">(Eu teria um apartamento melhor se não tivesse comprado um carro novo.)</span></li><li><span class=\"gram-eng\">If they could work fewer hours, they wouldn't be so tired.</span> <span class=\"gram-trans\">(Se pudessem trabalhar menos horas, não estariam tão cansados.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Resultado no PASSADO → would have + particípio. Resultado no PRESENTE → would + verbo base.</li><li>Misturar passado e presente é possível: &quot;If I had studied (passado), I would have (presente) a job.&quot;</li></ul></div></div>"},
{"order": 89, "badge": "89", "topic": "Wishes and Regrets", "book": "Evolve 5", "ref": "Evolve 5 - pg. 89 (Unit 9.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>I WISH (that) e IF ONLY expressam um desejo de que algo fosse diferente ou um sentimento de arrependimento. O tempo verbal usado depende de o desejo ser sobre o presente ou o passado.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">DESEJOS SOBRE SITUAÇÕES GERAIS NO PRESENTE</h5><p>I wish / If only + simple past<br>&quot;I wish I knew the answer.&quot;</p><h5 class=\"gram-subhead\">DESEJOS SOBRE SITUAÇÕES CONTÍNUAS NO PRESENTE</h5><p>I wish / If only + past continuous<br>&quot;I wish I was/were sitting at home.&quot;</p><h5 class=\"gram-subhead\">DESEJOS SOBRE HABILIDADE/POSSIBILIDADE NO PRESENTE</h5><p>I wish / If only + could/couldn't<br>&quot;I wish I could find that book.&quot;</p><h5 class=\"gram-subhead\">DESEJOS SOBRE SITUAÇÕES NO PASSADO (arrependimento)</h5><p>I wish / If only + past perfect<br>&quot;I wish I had bought tickets in advance.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I wish it was ten degrees cooler.</span> <span class=\"gram-trans\">(Eu queria que estivesse dez graus mais frio.)</span></li><li><span class=\"gram-eng\">If only we could buy some cold sodas.</span> <span class=\"gram-trans\">(Quem dera pudéssemos comprar uns refrigerantes gelados.)</span></li><li><span class=\"gram-eng\">I wish I had put the bottle in the refrigerator last night.</span> <span class=\"gram-trans\">(Eu queria ter colocado a garrafa na geladeira ontem à noite.)</span></li><li><span class=\"gram-eng\">Right now, I wish I was in a refrigerator!</span> <span class=\"gram-trans\">(Neste momento, eu queria estar dentro de uma geladeira!)</span></li><li><span class=\"gram-eng\">If only the air conditioning hadn't broken!</span> <span class=\"gram-trans\">(Quem dera o ar-condicionado não tivesse quebrado!)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de I WISH / IF ONLY, pode-se usar 'was' (informal) ou 'were' (formal).</li><li>Para arrependimentos do passado, use sempre o past perfect: &quot;I wish I had...&quot;.</li></ul></div></div>"},
{"order": 99, "badge": "99", "topic": "Gerunds after Prepositions", "book": "Evolve 5", "ref": "Evolve 5 - pg. 99 (Unit 10.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Depois de uma preposição, o verbo SEMPRE aparece na forma de gerúndio (verbo + -ing). Isso acontece em três padrões comuns: verbo+preposição, be+adjetivo+preposição e substantivo+of.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">VERBO + PREPOSIÇÃO + GERÚNDIO</h5><p>boast about, care about, insist on, plan on, result in, think of,<br>worry about<br>&quot;Josh boasted about buying a new car.&quot;</p><h5 class=\"gram-subhead\">BE + ADJETIVO + PREPOSIÇÃO + GERÚNDIO</h5><p>be afraid of, be excited about, be guilty of, be interested in<br>&quot;We are guilty of spending too much time on social media.&quot;</p><h5 class=\"gram-subhead\">SUBSTANTIVO + OF + GERÚNDIO</h5><p>benefits, cost, danger, fear, idea, importance, possibility, risk, way<br>&quot;My fear of flying has stopped me from visiting you.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Josh boasted about buying a new car.</span> <span class=\"gram-trans\">(O Josh se gabou de ter comprado um carro novo.)</span></li><li><span class=\"gram-eng\">We are guilty of spending too much time on social media.</span> <span class=\"gram-trans\">(Somos culpados de passar tempo demais nas redes sociais.)</span></li><li><span class=\"gram-eng\">My fear of flying has stopped me from visiting you.</span> <span class=\"gram-trans\">(Meu medo de voar me impediu de te visitar.)</span></li><li><span class=\"gram-eng\">Mia often complains about working on the weekends.</span> <span class=\"gram-trans\">(A Mia vive reclamando de trabalhar nos fins de semana.)</span></li><li><span class=\"gram-eng\">You need to concentrate on developing your plan.</span> <span class=\"gram-trans\">(Você precisa se concentrar em desenvolver o seu plano.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de QUALQUER preposição, o verbo vai no gerúndio (-ing), nunca no infinitivo.</li><li>Cuidado: o TO de 'look forward to', 'be used to' é preposição → pede -ing.</li></ul></div></div>"},
{"order": 101, "badge": "101", "topic": "Causative Verbs", "book": "Evolve 5", "ref": "Evolve 5 - pg. 101 (Unit 10.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Verbos causativos indicam que alguém ou algo faz, permite ou impede que outra pessoa realize uma ação. A estrutura depende do verbo causativo escolhido.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">HELP / LET / MAKE / HAVE + objeto + verbo na forma base</h5><p>&quot;My parents make me save money for my future.&quot;</p><h5 class=\"gram-subhead\">ALLOW / CAUSE / ENABLE + objeto + infinitivo (to + verbo)</h5><p>&quot;Surveys enable stores to estimate sales.&quot;</p><h5 class=\"gram-subhead\">KEEP / PREVENT / PROTECT / STOP + objeto + FROM + gerúndio</h5><p>&quot;Her advice kept me from losing my job.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">My parents make me save money for my future.</span> <span class=\"gram-trans\">(Meus pais me fazem economizar dinheiro para o futuro.)</span></li><li><span class=\"gram-eng\">Surveys enable stores to estimate sales.</span> <span class=\"gram-trans\">(Pesquisas permitem que as lojas estimem as vendas.)</span></li><li><span class=\"gram-eng\">Her advice kept me from losing my job.</span> <span class=\"gram-trans\">(O conselho dela me impediu de perder o emprego.)</span></li><li><span class=\"gram-eng\">Customer feedback frequently makes us improve our products.</span> <span class=\"gram-trans\">(O feedback dos clientes frequentemente nos faz melhorar nossos produtos.)</span></li><li><span class=\"gram-eng\">Having my own home has enabled me to be independent.</span> <span class=\"gram-trans\">(Ter minha própria casa me permitiu ser independente.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>MAKE/LET/HAVE/HELP pedem verbo na forma BASE (sem to).</li><li>ALLOW/ENABLE/CAUSE pedem infinitivo (to); KEEP/PREVENT/STOP pedem FROM + gerúndio.</li></ul></div></div>"},
{"order": 109, "badge": "109", "topic": "Passive Forms", "book": "Evolve 5", "ref": "Evolve 5 - pg. 109 (Unit 11.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Na voz passiva, quem RECEBE a ação é mais importante que quem a pratica, e por isso vira o sujeito da frase. Acrescenta-se 'by + agente' apenas quando é necessário dizer quem praticou a ação.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FORMAS DA VOZ PASSIVA (be + past participle)</h5><p>Simple present: am/is/are + past participle<br>Simple past: was/were + past participle<br>Present perfect: has/have been + past participle<br>Future: will/be going to + be + past participle<br>Present continuous: am/is/are + being + past participle<br>Past continuous: was/were + being + past participle</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">These products are usually imported. (simple present)</span> <span class=\"gram-trans\">(Esses produtos geralmente são importados.)</span></li><li><span class=\"gram-eng\">Were you given a refund? (simple past)</span> <span class=\"gram-trans\">(Você recebeu um reembolso?)</span></li><li><span class=\"gram-eng\">The order has been canceled. (present perfect)</span> <span class=\"gram-trans\">(O pedido foi cancelado.)</span></li><li><span class=\"gram-eng\">The goods will be checked before they're shipped. (future)</span> <span class=\"gram-trans\">(As mercadorias serão verificadas antes de serem enviadas.)</span></li><li><span class=\"gram-eng\">Traders are now being watched more carefully. (present continuous)</span> <span class=\"gram-trans\">(Os comerciantes estão sendo vigiados mais de perto agora.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>A passiva sempre tem BE + particípio passado; o tempo é dado pelo verbo BE.</li><li>Use 'by + agente' só quando for importante saber quem praticou a ação.</li></ul></div></div>"},
{"order": 111, "badge": "111", "topic": "Passives with Modals and Passive Infinitives", "book": "Evolve 5", "ref": "Evolve 5 - pg. 111 (Unit 11.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>A voz passiva pode ser combinada com verbos modais, com expressões modais (have to, need to...) e também aparecer na forma de infinitivo passivo.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PASSIVA COM MODAIS (modal + be + past participle)</h5><p>can, could, might, may, should, must<br>&quot;Should the photos be taken in natural light?&quot;</p><h5 class=\"gram-subhead\">PASSIVA COM EXPRESSÕES MODAIS (+ (to) be + past participle)</h5><p>have to, need to, had better, be likely to, be supposed to<br>&quot;Good journalists don't need to be told what to do.&quot;</p><h5 class=\"gram-subhead\">INFINITIVO PASSIVO (verbo + to be + past participle)</h5><p>após ask, be likely, expect, hope, refuse, seem<br>&quot;The problem isn't likely to be solved soon.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Should the photos be taken in natural light?</span> <span class=\"gram-trans\">(As fotos deveriam ser tiradas com luz natural?)</span></li><li><span class=\"gram-eng\">Good journalists don't need to be told what to do.</span> <span class=\"gram-trans\">(Bons jornalistas não precisam que lhes digam o que fazer.)</span></li><li><span class=\"gram-eng\">The facts must be checked by the editor.</span> <span class=\"gram-trans\">(Os fatos devem ser verificados pelo editor.)</span></li><li><span class=\"gram-eng\">The journalists refused to be told what to write.</span> <span class=\"gram-trans\">(Os jornalistas se recusaram a receber ordens sobre o que escrever.)</span></li><li><span class=\"gram-eng\">That photo of me had better be removed from your post.</span> <span class=\"gram-trans\">(É melhor essa foto minha ser removida da sua publicação.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Estrutura básica: modal + BE + particípio passado.</li><li>Para negativas com 'had better', use 'had better not be + particípio'.</li></ul></div></div>"},
{"order": 119, "badge": "119", "topic": "Adverbs with Adjectives and Adverbs", "book": "Evolve 5", "ref": "Evolve 5 - pg. 119 (Unit 12.1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Advérbios podem modificar adjetivos e outros advérbios, acrescentando detalhe ou indicando a qual área a qualidade se relaciona.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ANTES DE ADJETIVO — dar mais detalhe</h5><p>especially, exceptionally, mainly, (not) necessarily, particularly,<br>reasonably<br>&quot;John is especially skilled at painting.&quot;</p><h5 class=\"gram-subhead\">ANTES DE ADJETIVO — dizer a que área se relaciona</h5><p>artistically, athletically, financially, musically, physically,<br>scientifically, technically<br>&quot;Sandra is artistically talented, but not musically gifted.&quot;</p><h5 class=\"gram-subhead\">ANTES DE OUTRO ADVÉRBIO — dar mais detalhe</h5><p>especially, exceptionally, particularly, reasonably<br>&quot;Paolo learned five languages exceptionally fast.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">John is especially skilled at painting.</span> <span class=\"gram-trans\">(O John é especialmente habilidoso em pintura.)</span></li><li><span class=\"gram-eng\">Sandra is artistically talented in many ways.</span> <span class=\"gram-trans\">(A Sandra é artisticamente talentosa de várias formas.)</span></li><li><span class=\"gram-eng\">Some people are able to learn languages particularly easily.</span> <span class=\"gram-trans\">(Algumas pessoas conseguem aprender idiomas com uma facilidade especial.)</span></li><li><span class=\"gram-eng\">My accountant always gives me financially correct information.</span> <span class=\"gram-trans\">(Meu contador sempre me dá informações financeiramente corretas.)</span></li><li><span class=\"gram-eng\">Natasha's house is full of artistically beautiful objects.</span> <span class=\"gram-trans\">(A casa da Natasha está cheia de objetos artisticamente belos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Advérbio + adjetivo descreve um SUBSTANTIVO (&quot;reasonably good concert&quot;).</li><li>Advérbio + advérbio descreve um VERBO (&quot;paints exceptionally well&quot;).</li></ul></div></div>"},
{"order": 121, "badge": "121", "topic": "Making Non Count Nouns Countable", "book": "Evolve 5", "ref": "Evolve 5 - pg. 121 (Unit 12.2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Substantivos incontáveis (advice, information, coffee...) podem ser tornados contáveis com expressões que descrevem quantidades ou porções específicas.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">IDEIAS ABSTRATAS</h5><p>a little bit of (kindness/luck/time)<br>a piece of (advice/information)<br>a word of (advice/encouragement/wisdom)</p><h5 class=\"gram-subhead\">ATIVIDADES E ESPORTES</h5><p>a game of (basketball/chess/soccer/tennis)</p><h5 class=\"gram-subhead\">COMIDA</h5><p>a box of, a bunch of, a can of, a loaf of, a slice of, a serving of</p><h5 class=\"gram-subhead\">LÍQUIDOS</h5><p>a bottle of, a cup of, a glass of, a drop of, a gallon of</p><h5 class=\"gram-subhead\">DIVERSOS</h5><p>an act of (kindness/bravery), an item of (clothing)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">A little bit of kindness brightens up people's lives.</span> <span class=\"gram-trans\">(Um pouquinho de gentileza ilumina a vida das pessoas.)</span></li><li><span class=\"gram-eng\">This is a useful piece of information.</span> <span class=\"gram-trans\">(Esta é uma informação útil.)</span></li><li><span class=\"gram-eng\">We played a few games of basketball over the weekend.</span> <span class=\"gram-trans\">(Jogamos algumas partidas de basquete no fim de semana.)</span></li><li><span class=\"gram-eng\">At the café, we ordered two cups of coffee and a glass of juice.</span> <span class=\"gram-trans\">(No café, pedimos duas xícaras de café e um copo de suco.)</span></li><li><span class=\"gram-eng\">Helping me move was an act of kindness.</span> <span class=\"gram-trans\">(Me ajudar na mudança foi um ato de gentileza.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Substantivos incontáveis não aceitam 'a/an' nem plural diretamente.</li><li>Use 'a piece of', 'a cup of', 'a game of' etc. para contá-los e dar plural.</li></ul></div></div>"}
],
