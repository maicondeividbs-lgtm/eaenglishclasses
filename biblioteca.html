</li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;What do you do?&quot; pergunta a profissão; &quot;What do you do today?&quot; pergunta atividades.</li><li>Para perguntar como alguém gosta de algo: &quot;How do you LIKE it?&quot;.</li></ul></div></div>"},
{"order": 54, "badge": "54", "topic": "Placement of Adjectives", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 54 (Unit 8)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Adjetivos em inglês podem aparecer em duas posições: depois do verbo BE (be + adjetivo) ou antes do substantivo (adjetivo + substantivo). O sentido é o mesmo, só muda a estrutura.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">BE + ADJETIVO</h5><p>sujeito + BE + adjetivo<br>&quot;A doctor's job IS stressful.&quot;<br>&quot;A firefighter's job IS dangerous.&quot;</p><h5 class=\"gram-subhead\">ADJETIVO + SUBSTANTIVO</h5><p>sujeito + HAS + a/an + adjetivo + substantivo<br>&quot;A doctor HAS a stressful job.&quot;<br>&quot;A firefighter HAS a dangerous job.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">A photographer's job is interesting. — A photographer has an interesting job.</span> <span class=\"gram-trans\">(O trabalho de fotógrafo é interessante. — Um fotógrafo tem um trabalho interessante.)</span></li><li><span class=\"gram-eng\">A pilot's job is exciting. — A pilot has an exciting job.</span> <span class=\"gram-trans\">(O trabalho de piloto é empolgante.)</span></li><li><span class=\"gram-eng\">A teacher's job is stressful. — A teacher has a stressful job.</span> <span class=\"gram-trans\">(O trabalho de professor é estressante.)</span></li><li><span class=\"gram-eng\">A cashier has a boring job.</span> <span class=\"gram-trans\">(Um caixa tem um trabalho chato.)</span></li><li><span class=\"gram-eng\">A receptionist has an easy job.</span> <span class=\"gram-trans\">(Um recepcionista tem um trabalho fácil.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Cuidado com A/AN: A antes de consoante (a boring job), AN antes de vogal (an easy job).</li><li>Adjetivos NUNCA têm plural em inglês: &quot;interesting jobs&quot; (não &quot;interestings jobs&quot;).</li></ul></div></div>"},
{"order": 59, "badge": "59", "topic": "Count and Noncount Nouns; Some and Any", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 59 (Unit 9)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Substantivos em inglês se dividem em CONTÁVEIS (podem ser contados, têm plural) e NÃO-CONTÁVEIS (não podem ser contados, não têm plural). SOME e ANY são quantificadores usados com ambos.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">CONTÁVEIS (count nouns) — têm singular e plural</h5><p>an egg → eggs  |  a potato → potatoes  |  a cracker → crackers</p><h5 class=\"gram-subhead\">NÃO-CONTÁVEIS (noncount nouns) — só têm singular</h5><p>bread, lettuce, mayonnaise, salt, water, juice</p><h5 class=\"gram-subhead\">SOME E ANY</h5><p>SOME → afirmativas e pedidos:<br>&quot;Let's get SOME potatoes.&quot; / &quot;Let's make SOME lettuce.&quot;<br>ANY → negativas e perguntas:<br>&quot;Do we need ANY potatoes?&quot; / &quot;We don't need ANY lettuce.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Do we need any potatoes? — Yes. Let's get some potatoes.</span> <span class=\"gram-trans\">(Precisamos de batatas? — Sim. Vamos comprar algumas batatas.)</span></li><li><span class=\"gram-eng\">Do we need any lettuce? — No. We don't need any lettuce.</span> <span class=\"gram-trans\">(Precisamos de alface? — Não. Não precisamos de alface.)</span></li><li><span class=\"gram-eng\">Let's get some cheese. And some chicken, too.</span> <span class=\"gram-trans\">(Vamos comprar queijo. E frango também.)</span></li><li><span class=\"gram-eng\">We don't have any bread. We need some.</span> <span class=\"gram-trans\">(Não temos pão. Precisamos comprar.)</span></li><li><span class=\"gram-eng\">Do you want some mayonnaise? — No, I don't want any.</span> <span class=\"gram-trans\">(Você quer maionese? — Não, não quero.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Não-contáveis NÃO aceitam A/AN nem plural: &quot;a bread&quot; e &quot;breads&quot; estão errados.</li><li>SOME pode ser usado em PERGUNTAS quando se oferece algo: &quot;Would you like some coffee?&quot;.</li></ul></div></div>"},
{"order": 61, "badge": "61", "topic": "Adverbs of Frequency", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 61 (Unit 9)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Advérbios de frequência mostram com que regularidade uma ação acontece. Vão da máxima frequência (always) à mínima (never). A posição na frase depende do tipo de verbo.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ESCALA DE FREQUÊNCIA (100% → 0%)</h5><p>always (sempre)<br>usually (geralmente)<br>often (frequentemente)<br>sometimes (às vezes)<br>hardly ever (quase nunca)<br>never (nunca)</p><h5 class=\"gram-subhead\">POSIÇÃO NA FRASE</h5><p>- Com verbo BE: DEPOIS do verbo → &quot;He is always late.&quot;<br>- Com outros verbos: ANTES do verbo → &quot;I always eat breakfast.&quot;<br>- SOMETIMES pode ir no início: &quot;Sometimes I eat breakfast.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I always eat breakfast.</span> <span class=\"gram-trans\">(Sempre tomo café da manhã.)</span></li><li><span class=\"gram-eng\">I usually have a big breakfast with my friends.</span> <span class=\"gram-trans\">(Geralmente tomo um grande café com meus amigos.)</span></li><li><span class=\"gram-eng\">I sometimes eat at my desk.</span> <span class=\"gram-trans\">(Às vezes como na minha mesa.)</span></li><li><span class=\"gram-eng\">Do you ever have fish for breakfast? — Yes, I always do.</span> <span class=\"gram-trans\">(Você costuma comer peixe no café? — Sim, sempre.)</span></li><li><span class=\"gram-eng\">I hardly ever have beef for lunch.</span> <span class=\"gram-trans\">(Quase nunca como carne no almoço.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>EVER aparece em perguntas (= 'alguma vez'): &quot;Do you ever eat fish?&quot;.</li><li>Em resposta com NEVER, NÃO usa negativa: &quot;I never eat fish&quot; (não &quot;I don't never eat&quot;).</li></ul></div></div>"},
{"order": 65, "badge": "65", "topic": "Simple Present Wh-Questions — Sports and Free Time", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 65 (Unit 10)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Wh-questions no simple present também são usadas para perguntar sobre esportes, atividades de lazer e frequência. A estrutura é a mesma: WH-word + do/does + sujeito + verbo (forma base).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">WH-WORDS COMUNS PARA ATIVIDADES</h5><p>What sports do you play?      → Esportes praticados<br>Who do you play with?         → Com quem<br>Where do you play?            → Onde<br>How often do you practice?    → Com que frequência<br>When do you practice?         → Em que dias/horários<br>What time do you start?       → A que horas</p><h5 class=\"gram-subhead\">POSIÇÃO DA PREPOSIÇÃO</h5><p>Em inglês, a preposição costuma ir no FIM da pergunta:<br>&quot;Who do you play basketball WITH?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">What sports do you play? — I play soccer and basketball.</span> <span class=\"gram-trans\">(Que esportes você pratica? — Eu jogo futebol e basquete.)</span></li><li><span class=\"gram-eng\">Who do you play basketball with? — I play with some friends from work.</span> <span class=\"gram-trans\">(Com quem você joga basquete? — Eu jogo com uns amigos do trabalho.)</span></li><li><span class=\"gram-eng\">Where do you play? — We play at a gym near the office.</span> <span class=\"gram-trans\">(Onde vocês jogam? — Jogamos numa academia perto do escritório.)</span></li><li><span class=\"gram-eng\">How often do you practice? — We practice twice a week.</span> <span class=\"gram-trans\">(Com que frequência você treina? — Treinamos duas vezes por semana.)</span></li><li><span class=\"gram-eng\">What time do you start? — We start at six in the evening.</span> <span class=\"gram-trans\">(A que horas vocês começam? — Começamos às seis da noite.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>HOW OFTEN pergunta a frequência: once/twice a week, every day, on weekends...</li><li>Em &quot;Who do you play WITH?&quot;, a preposição WITH fica no fim — é o padrão informal.</li></ul></div></div>"},
{"order": 67, "badge": "67", "topic": "Can for Ability", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 67 (Unit 10)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O modal CAN expressa HABILIDADE — algo que se sabe fazer ou se é capaz de fazer. CAN nunca muda de forma: não tem -s na 3ª pessoa nem precisa de auxiliares para perguntas e negativas.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA: sujeito + CAN + verbo (forma base)</h5><p>&quot;She can sing very well.&quot;</p><h5 class=\"gram-subhead\">NEGATIVA: sujeito + CAN'T (cannot) + verbo (forma base)</h5><p>&quot;He can't sing at all.&quot;</p><h5 class=\"gram-subhead\">PERGUNTA: CAN + sujeito + verbo?</h5><p>&quot;Can she sing?&quot; → &quot;Yes, she can. / No, she can't.&quot;</p><h5 class=\"gram-subhead\">WH-PERGUNTA: WH-word + CAN + sujeito + verbo?</h5><p>&quot;What can I do?&quot; → &quot;You can sing.&quot;<br>&quot;Who can dance?&quot; → &quot;Becky can.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I can swim.</span> <span class=\"gram-trans\">(Eu sei nadar.)</span></li><li><span class=\"gram-eng\">I can't fix cars.</span> <span class=\"gram-trans\">(Eu não sei consertar carros.)</span></li><li><span class=\"gram-eng\">Lisa can play the piano.</span> <span class=\"gram-trans\">(A Lisa sabe tocar piano.)</span></li><li><span class=\"gram-eng\">Can Ben swim? — Yes, he can.</span> <span class=\"gram-trans\">(O Ben sabe nadar? — Sim, sabe.)</span></li><li><span class=\"gram-eng\">What can Diane do? — She can sing.</span> <span class=\"gram-trans\">(O que a Diane sabe fazer? — Ela sabe cantar.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>CAN NÃO leva -s na 3ª pessoa: &quot;She can play&quot; (nunca &quot;She cans play&quot;).</li><li>Depois de CAN, o verbo SEMPRE fica na forma base, sem TO: &quot;can play&quot; (não &quot;can to play&quot;).</li></ul></div></div>"},
{"order": 73, "badge": "73", "topic": "The Future with Be Going to", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 73 (Unit 11)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>BE GOING TO é usado para falar de PLANOS futuros — coisas que já foram decididas. A estrutura combina o verbo BE com 'going to' + verbo na forma base.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA</h5><p>sujeito + AM/IS/ARE + going to + verbo<br>&quot;I'm going to celebrate my birthday.&quot;</p><h5 class=\"gram-subhead\">NEGATIVA</h5><p>sujeito + AM/IS/ARE + NOT + going to + verbo<br>&quot;I'm not going to stay home.&quot;</p><h5 class=\"gram-subhead\">PERGUNTA YES/NO</h5><p>BE + sujeito + going to + verbo?<br>&quot;Are you going to do anything this weekend?&quot;<br>→ Yes, I am. / No, I'm not.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Are you going to do anything this weekend? — Yes, I am. I'm going to celebrate my birthday.</span> <span class=\"gram-trans\">(Você vai fazer alguma coisa neste fim de semana? — Sim. Vou comemorar meu aniversário.)</span></li><li><span class=\"gram-eng\">Is Rosa going to cook dinner for you? — Yes, she is. She's going to cook a special dinner.</span> <span class=\"gram-trans\">(A Rosa vai fazer o jantar para você? — Sim. Ela vai fazer um jantar especial.)</span></li><li><span class=\"gram-eng\">Are your friends going to be there? — Yes, they are. They're going to stop by after dinner.</span> <span class=\"gram-trans\">(Seus amigos vão estar lá? — Sim. Eles vão passar lá depois do jantar.)</span></li><li><span class=\"gram-eng\">I'm not going to stay home this weekend.</span> <span class=\"gram-trans\">(Não vou ficar em casa neste fim de semana.)</span></li><li><span class=\"gram-eng\">She's going to order takeout tonight.</span> <span class=\"gram-trans\">(Ela vai pedir comida hoje à noite.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>BE GOING TO indica PLANO ou INTENÇÃO já decidida — não é uma decisão tomada agora.</li><li>Na fala informal, 'going to' vira /gɑnə/ (gonna), mas na escrita formal mantém 'going to'.</li></ul></div></div>"},
{"order": 75, "badge": "75", "topic": "Wh-Questions with Be Going to", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 75 (Unit 11)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para pedir detalhes sobre planos futuros, combinamos Wh-words com a estrutura de BE GOING TO. A palavra Wh- vem primeiro, depois o verbo BE, o sujeito e 'going to' + verbo.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ESTRUTURA</h5><p>WH-WORD + AM/IS/ARE + SUJEITO + going to + VERBO?</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">What are you going to do for Valentine's Day? — I'm going to go to a dance club.</span> <span class=\"gram-trans\">(O que você vai fazer no Dia dos Namorados? — Vou para uma boate.)</span></li><li><span class=\"gram-eng\">How is Allie going to get to the dance club? — She's going to drive.</span> <span class=\"gram-trans\">(Como a Allie vai chegar à boate? — Ela vai dirigir.)</span></li><li><span class=\"gram-eng\">Where are Jim and his girlfriend going to eat? — They're going to eat at the Red Rose.</span> <span class=\"gram-trans\">(Onde o Jim e a namorada vão comer? — Eles vão comer no Red Rose.)</span></li><li><span class=\"gram-eng\">Who are you going to spend Thanksgiving with? — My parents and I are going to visit my grandparents.</span> <span class=\"gram-trans\">(Com quem você vai passar o feriado? — Meus pais e eu vamos visitar meus avós.)</span></li><li><span class=\"gram-eng\">What is she going to do for New Year's Day? — I don't know. She's not going to do anything special.</span> <span class=\"gram-trans\">(O que ela vai fazer no Ano Novo? — Não sei. Ela não vai fazer nada de especial.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Na resposta NEGATIVA, o NOT vem depois de BE: &quot;She's NOT going to do anything&quot;.</li><li>Para indicar quando, use as time expressions: tonight, tomorrow, next week, etc.</li></ul></div></div>"},
{"order": 79, "badge": "79", "topic": "Have + Noun; Feel + Adjective", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 79 (Unit 12)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para descrever problemas de saúde e sensações, usamos duas estruturas: HAVE + substantivo (para sintomas físicos) e FEEL + adjetivo (para estados/sensações). É a forma natural em inglês.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">HAVE + SUBSTANTIVO (sintoma físico)</h5><p>I have a stomachache. / I have a headache. / I have the flu.<br>He has a backache. / She has a cold. / They have a fever.</p><h5 class=\"gram-subhead\">FEEL + ADJETIVO (sensação/estado)</h5><p>Positivos: fine, great, terrific, fantastic, better<br>Negativos: horrible, awful, terrible, miserable, sick</p><h5 class=\"gram-subhead\">PERGUNTAS COMUNS</h5><p>What's the matter? / What's wrong? → What's wrong with you?<br>How are you? / How do you feel?    → How are you feeling?</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">What's the matter? — I have a stomachache.</span> <span class=\"gram-trans\">(Qual é o problema? — Estou com dor de estômago.)</span></li><li><span class=\"gram-eng\">What's wrong? — I have a headache.</span> <span class=\"gram-trans\">(O que houve? — Estou com dor de cabeça.)</span></li><li><span class=\"gram-eng\">I have the flu. I feel terrible.</span> <span class=\"gram-trans\">(Estou com gripe. Me sinto péssimo.)</span></li><li><span class=\"gram-eng\">How are you? — I feel sick. I don't feel well.</span> <span class=\"gram-trans\">(Como você está? — Me sinto mal. Não estou bem.)</span></li><li><span class=\"gram-eng\">He has a backache. He feels awful.</span> <span class=\"gram-trans\">(Ele está com dor nas costas. Está se sentindo horrível.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>HAVE é para sintomas físicos (a cold, a fever); FEEL é para sensações (sick, fine).</li><li>Em respostas a &quot;I'm sick&quot;, diga: &quot;I'm sorry to hear that&quot; / &quot;That's too bad&quot;.</li></ul></div></div>"},
{"order": 82, "badge": "82", "topic": "Imperatives", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 82 (Unit 12)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O IMPERATIVO é usado para dar instruções, conselhos, ordens ou sugestões. A forma afirmativa usa o verbo na forma base (sem to); a negativa usa DON'T + verbo na forma base.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">IMPERATIVO AFIRMATIVO</h5><p>verbo na forma base (sem 'to', sem sujeito)<br>&quot;Get some rest.&quot; / &quot;Drink lots of juice.&quot; / &quot;Take one pill every evening.&quot;</p><h5 class=\"gram-subhead\">IMPERATIVO NEGATIVO</h5><p>DON'T + verbo na forma base<br>&quot;Don't stay up late.&quot; / &quot;Don't drink soda.&quot; / &quot;Don't work too hard.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Call a dentist.</span> <span class=\"gram-trans\">(Chame um dentista.)</span></li><li><span class=\"gram-eng\">Don't worry too much.</span> <span class=\"gram-trans\">(Não se preocupe demais.)</span></li><li><span class=\"gram-eng\">Take a hot bath.</span> <span class=\"gram-trans\">(Tome um banho quente.)</span></li><li><span class=\"gram-eng\">Don't go to school.</span> <span class=\"gram-trans\">(Não vá para a escola.)</span></li><li><span class=\"gram-eng\">Don't drink coffee. Stay in bed.</span> <span class=\"gram-trans\">(Não tome café. Fique na cama.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>O sujeito (you) NÃO aparece no imperativo: &quot;Open the door&quot; (não &quot;You open&quot;).</li><li>Para soar mais educado, adicione PLEASE: &quot;Please sit down&quot; / &quot;Sit down, please&quot;.</li></ul></div></div>"},
{"order": 88, "badge": "88", "topic": "Prepositions of Place", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 88 (Unit 13)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Preposições de lugar mostram a LOCALIZAÇÃO de algo em relação a outra coisa. Em inglês, há preposições específicas para ruas, esquinas, vizinhança, oposição e meio.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PRINCIPAIS PREPOSIÇÕES DE LUGAR</h5><p>on               → em (em cima de / numa rua)<br>on the corner of → na esquina de<br>across from      → em frente a (do outro lado)<br>next to          → ao lado de<br>between          → entre (dois pontos)<br>behind           → atrás de<br>in front of      → na frente de</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The department store is on Third Avenue.</span> <span class=\"gram-trans\">(A loja de departamentos fica na Terceira Avenida.)</span></li><li><span class=\"gram-eng\">It's on the corner of Third and Market.</span> <span class=\"gram-trans\">(Fica na esquina da Third com a Market.)</span></li><li><span class=\"gram-eng\">It's across from the park.</span> <span class=\"gram-trans\">(Fica em frente ao parque.)</span></li><li><span class=\"gram-eng\">It's next to the bank.</span> <span class=\"gram-trans\">(Fica ao lado do banco.)</span></li><li><span class=\"gram-eng\">The bank is between the restaurant and the department store.</span> <span class=\"gram-trans\">(O banco fica entre o restaurante e a loja de departamentos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>ACROSS FROM = do outro lado da rua. NEXT TO = imediatamente ao lado.</li><li>BETWEEN sempre liga DOIS pontos: &quot;between A AND B&quot;.</li></ul></div></div>"},
{"order": 90, "badge": "90", "topic": "Directions — Giving and Asking", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 90 (Unit 13)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para perguntar e dar direções em uma cidade, usamos verbos de movimento (walk, turn, go) com palavras como UP, DOWN, LEFT, RIGHT, e preposições como ON.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">COMO PERGUNTAR</h5><p>How do I get to + lugar?<br>How can I get to + lugar?</p><h5 class=\"gram-subhead\">INSTRUÇÕES COMUNS</h5><p>Walk up / Go up + rua → ir em direção a uma rua<br>Walk down / Go down + rua → descer/seguir uma rua<br>Turn left / Turn right + on + rua → virar à esquerda/direita<br>It's on the left / on the right → fica à esquerda/direita</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">How do I get to Rockefeller Center? — Walk up Fifth Avenue. Turn left on 49th Street. It's on the right.</span> <span class=\"gram-trans\">(Como chego ao Rockefeller Center? — Suba a Fifth Avenue. Vire à esquerda na 49th Street. Fica à direita.)</span></li><li><span class=\"gram-eng\">How can I get to the New York Public Library? — Walk down Fifth Avenue. Turn right on 42nd Street. It's on the left.</span> <span class=\"gram-trans\">(Como chego à Biblioteca? — Desça a Fifth Avenue. Vire à direita na 42nd Street. Fica à esquerda.)</span></li><li><span class=\"gram-eng\">Excuse me. How do I get to the Empire State Building? — Walk up 42nd Street. Turn left on...</span> <span class=\"gram-trans\">(Com licença. Como chego ao Empire State? — Suba a 42nd Street. Vire à esquerda na...)</span></li><li><span class=\"gram-eng\">How do I get to the bus stop? — Walk down this street and turn right.</span> <span class=\"gram-trans\">(Como chego ao ponto de ônibus? — Desça esta rua e vire à direita.)</span></li><li><span class=\"gram-eng\">Go straight ahead and turn left at the corner.</span> <span class=\"gram-trans\">(Siga em frente e vire à esquerda na esquina.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>WALK UP é em direção a um endereço com número maior; WALK DOWN é o contrário.</li><li>Use TURN LEFT/RIGHT + ON + rua: &quot;Turn left ON 49th Street&quot; (não &quot;in 49th Street&quot;).</li></ul></div></div>"},
{"order": 93, "badge": "93", "topic": "Simple Past Statements — Regular Verbs", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 93 (Unit 14)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O simple past expressa ações concluídas no passado. Com verbos REGULARES, o passado se forma adicionando -ED ao verbo. A forma é a MESMA para todas as pessoas (I, you, he, she, etc.).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA: sujeito + verbo + -ED</h5><p>&quot;I stayed home.&quot; / &quot;She exercised on Saturday.&quot;</p><h5 class=\"gram-subhead\">NEGATIVA: sujeito + DIDN'T + verbo (forma base, sem -ed)</h5><p>&quot;I didn't watch TV.&quot; / &quot;They didn't shop for clothes.&quot;<br>(didn't = did not)</p><h5 class=\"gram-subhead\">REGRAS DE ORTOGRAFIA NO -ED</h5><p>• A maioria + -ED:        stay → stayed,  watch → watched<br>• Verbos em -E + -D:      exercise → exercised<br>• Y após consoante → IED: study → studied<br>• Dobra consoante final:  shop → shopped</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">On Friday night, I wanted to go out, but my friends didn't call.</span> <span class=\"gram-trans\">(Na sexta à noite, eu quis sair, mas meus amigos não ligaram.)</span></li><li><span class=\"gram-eng\">I decided to stay home, and I played video games.</span> <span class=\"gram-trans\">(Decidi ficar em casa e joguei videogame.)</span></li><li><span class=\"gram-eng\">On Saturday, I visited my friend Pablo. We talked and listened to music.</span> <span class=\"gram-trans\">(No sábado, visitei meu amigo Pablo. Conversamos e ouvimos música.)</span></li><li><span class=\"gram-eng\">In the evening, he invited some friends over, and we cooked a great meal.</span> <span class=\"gram-trans\">(À noite, ele convidou amigos, e fizemos uma ótima refeição.)</span></li><li><span class=\"gram-eng\">I didn't study at all on Sunday. I just walked to the mall.</span> <span class=\"gram-trans\">(Não estudei nada no domingo. Só caminhei até o shopping.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de DIDN'T, o verbo SEMPRE fica na forma base, sem -ed: &quot;didn't watch&quot; (não &quot;didn't watched&quot;).</li><li>Pronúncia do -ED: /t/ (worked), /d/ (cleaned), /ɪd/ (wanted, visited).</li></ul></div></div>"},
{"order": 94, "badge": "94", "topic": "Simple Past Statements — Irregular Verbs", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 94 (Unit 14)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Muitos verbos comuns em inglês têm forma irregular no passado — não seguem a regra do -ED. É preciso decorar essas formas, mas a estrutura da frase é a mesma do passado regular.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA: sujeito + verbo no passado irregular</h5><p>&quot;I did my homework.&quot; / &quot;She went to the bookstore.&quot;</p><h5 class=\"gram-subhead\">NEGATIVA: sujeito + DIDN'T + verbo na forma BASE</h5><p>&quot;I didn't do the laundry.&quot; / &quot;She didn't go to the library.&quot;</p><h5 class=\"gram-subhead\">VERBOS IRREGULARES COMUNS (presente → passado)</h5><p>do → did       go → went     have → had<br>get → got      come → came   meet → met<br>make → made    eat → ate     ride → rode<br>see → saw      sit → sat     take → took<br>feel → felt    buy → bought</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I did my homework. I didn't do the laundry.</span> <span class=\"gram-trans\">(Fiz minha lição. Não lavei a roupa.)</span></li><li><span class=\"gram-eng\">You got up at noon. You didn't get up at 8:00.</span> <span class=\"gram-trans\">(Você acordou ao meio-dia. Não acordou às 8h.)</span></li><li><span class=\"gram-eng\">She went to the bookstore. She didn't go to the library.</span> <span class=\"gram-trans\">(Ela foi à livraria. Não foi à biblioteca.)</span></li><li><span class=\"gram-eng\">We met our classmates. We didn't meet our teacher.</span> <span class=\"gram-trans\">(Encontramos nossos colegas. Não encontramos o professor.)</span></li><li><span class=\"gram-eng\">They had a barbecue. They didn't have a picnic.</span> <span class=\"gram-trans\">(Eles fizeram um churrasco. Não fizeram um piquenique.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Na NEGATIVA com DIDN'T, o verbo VOLTA para a forma base: &quot;didn't GO&quot; (não &quot;didn't went&quot;).</li><li>Verbos irregulares aparecem MUITO em inglês. Vale memorizar os mais comuns.</li></ul></div></div>"},
{"order": 95, "badge": "95", "topic": "Simple Past Yes/No Questions", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 95 (Unit 14)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para fazer perguntas no simple past, usamos o auxiliar DID. O verbo principal SEMPRE fica na forma base (sem -ed e sem forma irregular). Em respostas curtas, usamos DID ou DIDN'T.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">YES/NO QUESTIONS</h5><p>DID + sujeito + verbo (forma base) + ...?<br>&quot;Did you have a good summer?&quot;<br>&quot;Did Martin like his vacation?&quot;</p><h5 class=\"gram-subhead\">RESPOSTAS CURTAS</h5><p>Yes, sujeito + DID.<br>No, sujeito + DIDN'T.</p><h5 class=\"gram-subhead\">ATENÇÃO COM 'DO'</h5><p>Pergunta: &quot;Did you DO your homework?&quot;<br>Resposta afirmativa: &quot;Yes, I did.&quot;<br>Em frase completa: &quot;Yes, I did my homework.&quot; (aqui DID é o verbo principal!)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Did you have a good summer? — Yes, I did. I had a great summer.</span> <span class=\"gram-trans\">(Você teve um bom verão? — Sim. Tive um ótimo verão.)</span></li><li><span class=\"gram-eng\">Did you go surfing? — No, I didn't. I went swimming.</span> <span class=\"gram-trans\">(Você fez surf? — Não. Eu nadei.)</span></li><li><span class=\"gram-eng\">Did Martin like his vacation? — Yes, he did. He liked it a lot.</span> <span class=\"gram-trans\">(O Martin gostou das férias? — Sim, gostou muito.)</span></li><li><span class=\"gram-eng\">Did Martin and his sister go to Montreal? — No, they didn't. They went to Sydney.</span> <span class=\"gram-trans\">(O Martin e a irmã foram para Montreal? — Não. Foram para Sydney.)</span></li><li><span class=\"gram-eng\">Did you take any classes last summer? — Yes, I did. I took tennis lessons.</span> <span class=\"gram-trans\">(Você fez aula no verão passado? — Sim. Fiz aula de tênis.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de DID/DIDN'T, o verbo SEMPRE na forma base: &quot;Did you GO?&quot; (não &quot;Did you went?&quot;).</li><li>DID em respostas curtas é AUXILIAR, não verbo: &quot;Yes, I did&quot; — não precisa repetir o verbo.</li></ul></div></div>"},
{"order": 101, "badge": "101", "topic": "Past of Be — Was and Were", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 101 (Unit 15)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O verbo BE no passado tem duas formas: WAS (para I, he, she, it) e WERE (para you, we, they). Diferente dos outros verbos, NÃO usa DID em perguntas nem negativas.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA</h5><p>I/He/She/It + WAS<br>You/We/They + WERE<br>&quot;I was born here.&quot; / &quot;They were born in Milan.&quot;</p><h5 class=\"gram-subhead\">NEGATIVA: was/were + NOT (wasn't / weren't)</h5><p>&quot;I wasn't born in Italy.&quot; / &quot;We weren't at the café.&quot;</p><h5 class=\"gram-subhead\">YES/NO QUESTIONS: was/were + sujeito + ...?</h5><p>&quot;Were you in class yesterday?&quot; → Yes, I was. / No, I wasn't.<br>&quot;Was your first teacher American?&quot; → Yes, she was. / No, she wasn't.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I was born here.</span> <span class=\"gram-trans\">(Nasci aqui.)</span></li><li><span class=\"gram-eng\">My family and I were all born in Brazil.</span> <span class=\"gram-trans\">(Minha família e eu nascemos todos no Brasil.)</span></li><li><span class=\"gram-eng\">My father was a teacher and my mother was an engineer.</span> <span class=\"gram-trans\">(Meu pai era professor e minha mãe era engenheira.)</span></li><li><span class=\"gram-eng\">Were you in class yesterday? — Yes, I was. / No, I wasn't.</span> <span class=\"gram-trans\">(Você estava na aula ontem? — Sim, estava. / Não, não estava.)</span></li><li><span class=\"gram-eng\">Were your parents born in the U.S.? — Yes, they were. / No, they weren't.</span> <span class=\"gram-trans\">(Seus pais nasceram nos EUA? — Sim, nasceram. / Não, não nasceram.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>WAS/WERE NÃO usam DID: &quot;Were you here?&quot; (nunca &quot;Did you were here?&quot;).</li><li>Contrações: wasn't = was not | weren't = were not.</li></ul></div></div>"},
{"order": 103, "badge": "103", "topic": "Wh-Questions with Did, Was, and Were", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 103 (Unit 15)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Wh-questions no passado seguem dois padrões: com verbos comuns usam DID; com o verbo BE usam WAS/WERE. A estrutura sempre começa com a Wh-word.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">COM VERBOS COMUNS — DID</h5><p>WH-word + DID + sujeito + verbo (forma base) + ...?<br>&quot;Where DID you grow up?&quot; / &quot;When DID you come to LA?&quot;</p><h5 class=\"gram-subhead\">COM VERBO BE — WAS/WERE</h5><p>WH-word + WAS/WERE + sujeito + ...?<br>&quot;Where WERE you born?&quot; / &quot;What WAS your major in college?&quot;</p><h5 class=\"gram-subhead\">EXPRESSÕES DE ANOS</h5><p>1900 → nineteen hundred<br>1995 → nineteen ninety-five<br>2000 → two thousand<br>2015 → two thousand (and) fifteen / twenty-fifteen</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Where did you grow up? — I grew up in New York.</span> <span class=\"gram-trans\">(Onde você cresceu? — Cresci em Nova York.)</span></li><li><span class=\"gram-eng\">What did your father do there? — He worked in a department store.</span> <span class=\"gram-trans\">(O que seu pai fazia lá? — Trabalhava numa loja de departamentos.)</span></li><li><span class=\"gram-eng\">When did you come to Los Angeles? — I came in 2008.</span> <span class=\"gram-trans\">(Quando você veio para Los Angeles? — Vim em 2008.)</span></li><li><span class=\"gram-eng\">Where were you born? — I was born in Brooklyn.</span> <span class=\"gram-trans\">(Onde você nasceu? — Nasci no Brooklyn.)</span></li><li><span class=\"gram-eng\">What was he like? — He was really friendly.</span> <span class=\"gram-trans\">(Como ele era? — Era muito simpático.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Com verbos comuns, use DID; com BE, use WAS/WERE — NUNCA misture.</li><li>&quot;What was he LIKE?&quot; pede DESCRIÇÃO (era simpático, alto, etc.), não 'gostava'.</li></ul></div></div>"},
{"order": 107, "badge": "107", "topic": "Subject and Object Pronouns", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 107 (Unit 16)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Pronomes pessoais têm duas formas: SUJEITO (antes do verbo, fazem a ação) e OBJETO (depois do verbo ou de preposição, recebem a ação). Saber a diferença é fundamental para se expressar bem.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">TABELA DE PRONOMES</h5><p>Sujeito  Objeto<br>I        me<br>you      you<br>he       him<br>she      her<br>it       it<br>we       us<br>they     them</p><h5 class=\"gram-subhead\">POSIÇÃO</h5><p>SUJEITO: antes do verbo → &quot;SHE got the message.&quot;<br>OBJETO: depois do verbo ou preposição → &quot;Nathan left HER a message.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Can I speak with Ms. Murphy, please? — She's not here, but maybe I can help you.</span> <span class=\"gram-trans\">(Posso falar com a Sra. Murphy? — Ela não está, mas talvez eu possa ajudar.)</span></li><li><span class=\"gram-eng\">Hi, this is Colin Shaw. Is Mr. Kerr there? — He's not here right now. Do you want to leave him a message?</span> <span class=\"gram-trans\">(Aqui é o Colin Shaw. O Sr. Kerr está? — Ele não está agora. Quer deixar uma mensagem para ele?)</span></li><li><span class=\"gram-eng\">Please tell him to call me at work.</span> <span class=\"gram-trans\">(Por favor, peça para ele me ligar no trabalho.)</span></li><li><span class=\"gram-eng\">Are Lauren and Matt in? — No, they're not. I'm their son.</span> <span class=\"gram-trans\">(A Lauren e o Matt estão? — Não, não estão. Sou filho deles.)</span></li><li><span class=\"gram-eng\">I found their keys. They left them on the table.</span> <span class=\"gram-trans\">(Encontrei as chaves deles. Eles deixaram as chaves na mesa.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Sujeito = QUEM faz a ação | Objeto = QUEM/O QUE recebe a ação.</li><li>Depois de preposição, SEMPRE objeto: &quot;give it to ME&quot; (não &quot;to I&quot;).</li></ul></div></div>"},
{"order": 109, "badge": "109", "topic": "Invitations — Verb + to", "book": "Interchange Intro", "ref": "Interchange Intro - pg. 109 (Unit 16)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para fazer convites e descrever planos com gentileza, usamos verbos seguidos de TO + verbo na forma base. As estruturas mais comuns são WOULD LIKE TO e WANT TO; HAVE TO e NEED TO indicam obrigação.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">CONVITES E DESEJOS</h5><p>Would you like to + verbo? → &quot;Would you like to go to a play?&quot;<br>I'd like to + verbo        → &quot;I'd like to (see a play).&quot;<br>I'd love to (+ verbo)      → &quot;Yes, I'd love to.&quot;<br>Do you want to + verbo?    → &quot;Do you want to see a play?&quot;</p><h5 class=\"gram-subhead\">DESCULPAS COM OBRIGAÇÃO</h5><p>I have to + verbo  → &quot;I have to work late.&quot;<br>I need to + verbo  → &quot;I need to study.&quot;</p><h5 class=\"gram-subhead\">CONTRAÇÕES</h5><p>I'd = I would</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Would you like to go to an art festival this weekend? — I'd like to, but I can't.</span> <span class=\"gram-trans\">(Você gostaria de ir a um festival neste fim de semana? — Eu gostaria, mas não posso.)</span></li><li><span class=\"gram-eng\">Would you like to go to an amusement park? — Yes, I'd love to.</span> <span class=\"gram-trans\">(Você gostaria de ir a um parque de diversões? — Sim, adoraria.)</span></li><li><span class=\"gram-eng\">Do you want to see a play with me tonight? — Sure. I'd really like to see a good play.</span> <span class=\"gram-trans\">(Quer ver uma peça comigo hoje à noite? — Claro. Adoraria ver uma boa peça.)</span></li><li><span class=\"gram-eng\">I'd like to, but I have to work late.</span> <span class=\"gram-trans\">(Eu gostaria, mas preciso trabalhar até tarde.)</span></li><li><span class=\"gram-eng\">I'd love to, but I need to help my parents.</span> <span class=\"gram-trans\">(Eu adoraria, mas preciso ajudar meus pais.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;I'd like&quot; é mais educado que &quot;I want&quot; — use em convites e respostas formais.</li><li>Para recusar com gentileza: &quot;I'd love to, but I have to/need to...&quot; (sempre dê uma razão).</li></ul></div></div>"}
  ],

{"order": 3, "badge": "3", "topic": "Statements with Be; Possessive Adjectives", "book": "Interchange 1", "ref": "Interchange 1 - pg. 03 (Unit 1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O verbo &quot;be&quot; (am/is/are) serve para identificar e descrever pessoas e coisas. Os adjetivos possessivos (my, your, his...) dizem a quem algo pertence e vêm sempre antes do substantivo.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Verbo be (afirmativo)</h5><p>I am / You are / He-She-It is / We-They are<br>&quot;I am from Mexico.&quot;</p><h5 class=\"gram-subhead\">Contrações</h5><p>I'm, you're, he's, she's, it's, we're, they're<br>&quot;She's a business student.&quot;</p><h5 class=\"gram-subhead\">Adjetivos possessivos</h5><p>my, your, his, her, its, our, their (+ substantivo)<br>&quot;My family is in Nagoya.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I'm from Brazil.</span> <span class=\"gram-trans\">(Eu sou do Brasil.)</span></li><li><span class=\"gram-eng\">He's a college student.</span> <span class=\"gram-trans\">(Ele é universitário.)</span></li><li><span class=\"gram-eng\">We're in the same class.</span> <span class=\"gram-trans\">(Estamos na mesma turma.)</span></li><li><span class=\"gram-eng\">Her name is Caroline.</span> <span class=\"gram-trans\">(O nome dela é Caroline.)</span></li><li><span class=\"gram-eng\">Their parents are on vacation.</span> <span class=\"gram-trans\">(Os pais deles estão de férias.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Não confunda &quot;it's&quot; (= it is) com &quot;its&quot; (possessivo, SEM apóstrofo).</li><li>&quot;Your&quot; (seu) e &quot;you're&quot; (você é) têm o mesmo som, mas funções diferentes.</li></ul></div></div>"},
{"order": 4, "badge": "4", "topic": "Wh-Questions with Be", "book": "Interchange 1", "ref": "Interchange 1 - pg. 04 (Unit 1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Perguntas com &quot;be&quot; iniciadas por palavras interrogativas (where, who, what, how) pedem uma informação específica, e não um simples sim ou não.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Wh- + be + sujeito</h5><p>Where/Who/What/How + am/is/are + sujeito?<br>&quot;Where are you from?&quot;</p><h5 class=\"gram-subhead\">Contrações</h5><p>Where's = Where is / Who's = Who is / What's = What is<br>&quot;Who's Soo-jin?&quot;</p><h5 class=\"gram-subhead\">What ... like?</h5><p>pergunta COMO algo/alguém é (descrição)<br>&quot;What's Seoul like?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Where's your friend?</span> <span class=\"gram-trans\">(Onde está o seu amigo?)</span></li><li><span class=\"gram-eng\">Who's that?</span> <span class=\"gram-trans\">(Quem é aquele/aquela?)</span></li><li><span class=\"gram-eng\">What's São Paulo like?</span> <span class=\"gram-trans\">(Como é São Paulo?)</span></li><li><span class=\"gram-eng\">Where are you and Vanessa from?</span> <span class=\"gram-trans\">(De onde vocês, você e a Vanessa, são?)</span></li><li><span class=\"gram-eng\">How are your classes?</span> <span class=\"gram-trans\">(Como estão as suas aulas?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;What's it like?&quot; NÃO é o &quot;like&quot; de gostar — aqui &quot;like&quot; pede uma descrição (como é?).</li><li>Cuidado para não responder &quot;What's it like?&quot; com &quot;I like...&quot;.</li></ul></div></div>"},
{"order": 5, "badge": "5", "topic": "Yes/No Questions and Short Answers with Be", "book": "Interchange 1", "ref": "Interchange 1 - pg. 05 (Unit 1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para perguntas de sim/não com &quot;be&quot;, inverte-se o verbo e o sujeito. As respostas curtas repetem o sujeito + o verbo be.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Pergunta</h5><p>Be + sujeito?<br>&quot;Are you free?&quot;</p><h5 class=\"gram-subhead\">Resposta afirmativa</h5><p>Yes, + sujeito + be (sem contração)<br>&quot;Yes, I am.&quot;</p><h5 class=\"gram-subhead\">Resposta negativa</h5><p>No, + sujeito + be + not (contração)<br>&quot;No, he isn't.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Are you free? — Yes, I am.</span> <span class=\"gram-trans\">(Você está livre? — Estou.)</span></li><li><span class=\"gram-eng\">Is your class at 2:00? — No, it isn't.</span> <span class=\"gram-trans\">(Sua aula é às 14h? — Não é.)</span></li><li><span class=\"gram-eng\">Are you and Giovanna from Italy? — Yes, we are.</span> <span class=\"gram-trans\">(Vocês são da Itália? — Somos.)</span></li><li><span class=\"gram-eng\">Is Mr. Jones from the United States? — No, he's not.</span> <span class=\"gram-trans\">(O Sr. Jones é dos EUA? — Não é.)</span></li><li><span class=\"gram-eng\">Are your classes interesting? — Yes, they are.</span> <span class=\"gram-trans\">(Suas aulas são interessantes? — São.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Na resposta afirmativa curta NUNCA use contração: é &quot;Yes, I am&quot; (não &quot;Yes, I'm&quot;).</li><li>Na negativa, as duas formas valem: &quot;No, he isn't&quot; ou &quot;No, he's not&quot;.</li></ul></div></div>"},
{"order": 10, "badge": "10", "topic": "Simple Present Wh-Questions and Statements", "book": "Interchange 1", "ref": "Interchange 1 - pg. 10 (Unit 2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O presente simples descreve rotinas, fatos e hábitos. Nas perguntas com Wh- usa-se o auxiliar do/does. Na 3ª pessoa do singular (he/she/it) o verbo ganha -s.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Pergunta Wh-</h5><p>Wh- + do/does + sujeito + verbo base?<br>&quot;What does Amy do?&quot;</p><h5 class=\"gram-subhead\">Afirmativa (I/You/We/They)</h5><p>sujeito + verbo base<br>&quot;I work at a restaurant.&quot;</p><h5 class=\"gram-subhead\">Afirmativa (He/She/It)</h5><p>sujeito + verbo + -s<br>&quot;She works at a dance company.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">What do you do?</span> <span class=\"gram-trans\">(Qual é a sua profissão?)</span></li><li><span class=\"gram-eng\">Where does she work?</span> <span class=\"gram-trans\">(Onde ela trabalha?)</span></li><li><span class=\"gram-eng\">He teaches an art class.</span> <span class=\"gram-trans\">(Ele dá uma aula de arte.)</span></li><li><span class=\"gram-eng\">I study the piano.</span> <span class=\"gram-trans\">(Eu estudo piano.)</span></li><li><span class=\"gram-eng\">How does she like it?</span> <span class=\"gram-trans\">(O que ela acha disso?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>O -s da 3ª pessoa vai no AUXILIAR, não no verbo principal: &quot;Where does she work?&quot;.</li><li>Casos especiais: do→does, go→goes, have→has, study→studies.</li></ul></div></div>"},
{"order": 12, "badge": "12", "topic": "Time Expressions", "book": "Interchange 1", "ref": "Interchange 1 - pg. 12 (Unit 2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As preposições in/on/at e advérbios como early/late/until organizam quando as ações acontecem. Cada uma combina com um tipo diferente de marcador de tempo.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">at</h5><p>horário exato / night<br>&quot;at 7:00 / at night&quot;</p><h5 class=\"gram-subhead\">in</h5><p>parte do dia<br>&quot;in the morning / in the evening&quot;</p><h5 class=\"gram-subhead\">on</h5><p>dia ou dia da semana<br>&quot;on Fridays / on weekends&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I get up at 7:00 in the morning.</span> <span class=\"gram-trans\">(Eu acordo às 7h da manhã.)</span></li><li><span class=\"gram-eng\">I work late on Wednesdays.</span> <span class=\"gram-trans\">(Eu trabalho até tarde às quartas.)</span></li><li><span class=\"gram-eng\">On weekends, I go to bed at 1:00 a.m.</span> <span class=\"gram-trans\">(Nos fins de semana, vou dormir à 1h.)</span></li><li><span class=\"gram-eng\">I read a book before I go to sleep.</span> <span class=\"gram-trans\">(Eu leio um livro antes de dormir.)</span></li><li><span class=\"gram-eng\">I have lunch at 11:30 on Mondays.</span> <span class=\"gram-trans\">(Eu almoço às 11h30 às segundas.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>A lógica: at = ponto exato (horas), in = período (manhã/tarde/noite), on = dias.</li><li>Exceção clássica: &quot;at night&quot; (não &quot;in the night&quot;).</li></ul></div></div>"},
{"order": 17, "badge": "17", "topic": "Demonstratives; One, Ones", "book": "Interchange 1", "ref": "Interchange 1 - pg. 17 (Unit 3)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>This/that/these/those apontam para coisas conforme a distância e o número. &quot;One/ones&quot; substituem um substantivo já citado para evitar repetição.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Perto</h5><p>this (singular) / these (plural)<br>&quot;How much is this T-shirt?&quot;</p><h5 class=\"gram-subhead\">Longe</h5><p>that (singular) / those (plural)<br>&quot;How much are those jeans?&quot;</p><h5 class=\"gram-subhead\">one / ones</h5><p>substituem substantivo já mencionado<br>&quot;Which one? The blue one.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">How much is this T-shirt?</span> <span class=\"gram-trans\">(Quanto custa esta camiseta?)</span></li><li><span class=\"gram-eng\">Those sneakers are nice.</span> <span class=\"gram-trans\">(Aqueles tênis são legais.)</span></li><li><span class=\"gram-eng\">Which one? The blue one.</span> <span class=\"gram-trans\">(Qual? O azul.)</span></li><li><span class=\"gram-eng\">I like the gray ones.</span> <span class=\"gram-trans\">(Eu gosto dos cinza.)</span></li><li><span class=\"gram-eng\">How much are these?</span> <span class=\"gram-trans\">(Quanto custam estes?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;one/ones&quot; evita repetição: em vez de &quot;the blue T-shirt&quot;, diga &quot;the blue one&quot;.</li><li>this/these = aqui (perto); that/those = ali (longe).</li></ul></div></div>"},
{"order": 20, "badge": "20", "topic": "Preferences; Comparisons with Adjectives", "book": "Interchange 1", "ref": "Interchange 1 - pg. 20 (Unit 3)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para falar de preferências usa-se prefer / like ... more / like ... better. Para comparar duas coisas, usa-se o comparativo do adjetivo + than.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Preferência</h5><p>Which one do you prefer / like better?<br>&quot;Which one do you like better?&quot;</p><h5 class=\"gram-subhead\">Comparativo curto</h5><p>adjetivo + -er + than<br>&quot;It's nicer than the black one.&quot;</p><h5 class=\"gram-subhead\">Comparativo longo (2+ sílabas)</h5><p>more + adjetivo + than<br>&quot;It's more stylish than the blue one.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I prefer the leather one.</span> <span class=\"gram-trans\">(Eu prefiro o de couro.)</span></li><li><span class=\"gram-eng\">The design is nicer.</span> <span class=\"gram-trans\">(O design é mais bonito.)</span></li><li><span class=\"gram-eng\">It's more attractive than the brown one.</span> <span class=\"gram-trans\">(É mais atraente que o marrom.)</span></li><li><span class=\"gram-eng\">The silver ones are cheaper.</span> <span class=\"gram-trans\">(Os prateados são mais baratos.)</span></li><li><span class=\"gram-eng\">Which one do you like more?</span> <span class=\"gram-trans\">(De qual você gosta mais?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Adjetivos em -y trocam para -ier: pretty→prettier, easy→easier.</li><li>Adjetivos longos usam &quot;more&quot;. Nunca junte os dois: &quot;more nicer&quot; está errado.</li></ul></div></div>"},
{"order": 23, "badge": "23", "topic": "Simple Present Questions; Short Answers", "book": "Interchange 1", "ref": "Interchange 1 - pg. 23 (Unit 4)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Perguntas no presente simples usam do/does, e as respostas curtas usam do/does/don't/doesn't. Os pronomes objeto (me, him, them...) substituem o objeto.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Pergunta</h5><p>Do/Does + sujeito + verbo base?<br>&quot;Do you like country music?&quot;</p><h5 class=\"gram-subhead\">Respostas curtas</h5><p>Yes, I do. / No, she doesn't.<br>&quot;No, she doesn't.&quot;</p><h5 class=\"gram-subhead\">Pronomes objeto</h5><p>me, you, him, her, it, us, them<br>&quot;They like them.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Do you like science fiction movies? — Yes, I do.</span> <span class=\"gram-trans\">(Você gosta de ficção científica? — Gosto.)</span></li><li><span class=\"gram-eng\">Does she play the piano? — No, she doesn't.</span> <span class=\"gram-trans\">(Ela toca piano? — Não toca.)</span></li><li><span class=\"gram-eng\">What kind of music does Maya like?</span> <span class=\"gram-trans\">(Que tipo de música a Maya curte?)</span></li><li><span class=\"gram-eng\">I like them a lot.</span> <span class=\"gram-trans\">(Eu gosto muito deles.)</span></li><li><span class=\"gram-eng\">Let's download it.</span> <span class=\"gram-trans\">(Vamos baixar isso.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>O pronome objeto vem DEPOIS do verbo: &quot;I like him&quot; (não &quot;I like he&quot;).</li><li>Na 3ª pessoa, o -s fica no &quot;does&quot; e some do verbo principal.</li></ul></div></div>"},
{"order": 26, "badge": "26", "topic": "Would; Verb + to + Verb", "book": "Interchange 1", "ref": "Interchange 1 - pg. 26 (Unit 4)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>&quot;Would you like to...?&quot; é um convite educado. Para aceitar ou recusar com uma justificativa, usa-se a estrutura verbo + to + verbo (have to, need to, want to).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Convite</h5><p>Would you like to + verbo?<br>&quot;Would you like to go out on Friday?&quot;</p><h5 class=\"gram-subhead\">Aceitar</h5><p>Yes, I would. / Yes, I'd love to.<br>&quot;Yes, I'd love to. Thanks.&quot;</p><h5 class=\"gram-subhead\">Recusar com motivo</h5><p>I'd like to, but + verbo + to + verbo<br>&quot;I'd like to, but I have to work.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Would you like to go to a concert?</span> <span class=\"gram-trans\">(Você gostaria de ir a um show?)</span></li><li><span class=\"gram-eng\">Yes, I'd love to. Thanks.</span> <span class=\"gram-trans\">(Sim, eu adoraria. Obrigado.)</span></li><li><span class=\"gram-eng\">I'd like to, but I have to study.</span> <span class=\"gram-trans\">(Eu gostaria, mas tenho que estudar.)</span></li><li><span class=\"gram-eng\">I need to save money.</span> <span class=\"gram-trans\">(Eu preciso economizar.)</span></li><li><span class=\"gram-eng\">I want to visit my parents.</span> <span class=\"gram-trans\">(Eu quero visitar meus pais.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;I'd&quot; = &quot;I would&quot;. Ao recusar, é educado dar um motivo: &quot;I'd like to, but...&quot;.</li><li>Não esqueça o &quot;to&quot;: have TO work, need TO save, want TO visit.</li></ul></div></div>"},
{"order": 32, "badge": "32", "topic": "Present Continuous", "book": "Interchange 1", "ref": "Interchange 1 - pg. 32 (Unit 5)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O presente contínuo (be + verbo-ing) descreve ações acontecendo agora ou em torno do momento atual (estes dias, este ano).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Afirmativa</h5><p>sujeito + am/is/are + verbo-ing<br>&quot;He's traveling in Thailand.&quot;</p><h5 class=\"gram-subhead\">Pergunta</h5><p>Be + sujeito + verbo-ing?<br>&quot;Are you living at home now?&quot;</p><h5 class=\"gram-subhead\">Resposta curta</h5><p>Yes, I am. / No, they aren't.<br>&quot;No, they aren't.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">What are you doing?</span> <span class=\"gram-trans\">(O que você está fazendo?)</span></li><li><span class=\"gram-eng\">I'm eating a sandwich.</span> <span class=\"gram-trans\">(Estou comendo um sanduíche.)</span></li><li><span class=\"gram-eng\">Is your sister working in another city?</span> <span class=\"gram-trans\">(Sua irmã está trabalhando em outra cidade?)</span></li><li><span class=\"gram-eng\">They're studying for their exams.</span> <span class=\"gram-trans\">(Eles estão estudando para as provas.)</span></li><li><span class=\"gram-eng\">We're having a lot of fun!</span> <span class=\"gram-trans\">(Estamos nos divertindo muito!)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Não confunda com o presente simples: &quot;I work&quot; (rotina) ≠ &quot;I'm working&quot; (agora).</li><li>Verbos de estado como like, want, know normalmente NÃO vão para o -ing.</li></ul></div></div>"},
{"order": 34, "badge": "34", "topic": "Quantifiers", "book": "Interchange 1", "ref": "Interchange 1 - pg. 34 (Unit 5)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Quantificadores indicam a proporção de um grupo (todos, a maioria, poucos, ninguém). Vêm antes do substantivo e variam de 100% a 0%.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Quase tudo (100%)</h5><p>all / nearly all / most<br>&quot;Most families are smaller these days.&quot;</p><h5 class=\"gram-subhead\">Meio-termo</h5><p>many / a lot of / some<br>&quot;Some families have one child.&quot;</p><h5 class=\"gram-subhead\">Pouco (perto de 0%)</h5><p>not many / few / no one<br>&quot;Few couples have more than one child.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Most high school students go to college.</span> <span class=\"gram-trans\">(A maioria dos estudantes do ensino médio vai para a faculdade.)</span></li><li><span class=\"gram-eng\">A lot of people live alone.</span> <span class=\"gram-trans\">(Muitas pessoas moram sozinhas.)</span></li><li><span class=\"gram-eng\">Few people are 65 or older.</span> <span class=\"gram-trans\">(Poucas pessoas têm 65 anos ou mais.)</span></li><li><span class=\"gram-eng\">No one gets married before the age of 18.</span> <span class=\"gram-trans\">(Ninguém se casa antes dos 18.)</span></li><li><span class=\"gram-eng\">Many families are large.</span> <span class=\"gram-trans\">(Muitas famílias são grandes.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;Most + substantivo&quot; (sem &quot;the&quot;) fala de algo em geral: &quot;Most people...&quot;.</li><li>&quot;No one&quot; já é negativo — não acrescente outra negação na frase.</li></ul></div></div>"},
