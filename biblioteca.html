{order:75,badge:'75',topic:'MODAL VERBS WITH THE PAST TENSE',book:'Green book',ref:'Green book - pg. 75',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Os MODAIS NO PASSADO são formados pela estrutura:<br>MODAL + HAVE + PAST PARTICIPLE</p><p>Cada modal expressa uma ideia diferente sobre algo do passado:</p><ul class="gram-bullets"><li>SHOULD HAVE / SHOULDN\'T HAVE → arrependimento</li><li>WOULD HAVE / WOULDN\'T HAVE → resultado hipotético</li><li>COULD HAVE / COULDN\'T HAVE → possível resultado</li></ul><p>Essas estruturas permitem comentar sobre o que poderia, deveria ou<br>teria sido diferente no passado.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA GERAL:</h5><p>SUJEITO + MODAL + HAVE + PAST PARTICIPLE</p><h5 class="gram-subhead">USOS ESPECÍFICOS:</h5><p>1) SHOULD / SHOULDN\'T HAVE + past participle<br>→ Expressa ARREPENDIMENTO ou crítica sobre alguém/algo</p><p>2) WOULD / WOULDN\'T HAVE + past participle<br>→ Expressa um RESULTADO HIPOTÉTICO de uma situação imaginária</p><p>3) COULD / COULDN\'T HAVE + past participle<br>→ Expressa um RESULTADO POSSÍVEL que não ocorreu</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">SHOULD / SHOULDN\'T HAVE (arrependimento):</h5><ul class="gram-bullets"><li><span class="gram-eng">I should have worked more in my younger years.</span> <span class="gram-trans">(Eu deveria ter trabalhado mais quando era mais novo.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">I should have practiced more sports while I could.</span> <span class="gram-trans">(Eu deveria ter praticado mais esportes enquanto podia.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">I shouldn\'t have spoken to her that way, I was rude.</span> <span class="gram-trans">(Eu não deveria ter falado com ela daquele jeito, fui rude.)</span></li></ul><h5 class="gram-subhead">WOULD / WOULDN\'T HAVE (resultado hipotético):</h5><ul class="gram-bullets"><li><span class="gram-eng">I should have been a better student, this way I would have got a better job.</span> <span class="gram-trans">(Eu deveria ter sido um aluno melhor, assim teria conseguido um emprego melhor.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">If she had listened to her husband, she wouldn\'t have had so many problems.</span> <span class="gram-trans">(Se ela tivesse escutado o marido, não teria tantos problemas.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">If I had worked out more, I would have become a fit guy.</span> <span class="gram-trans">(Se eu tivesse malhado mais, teria me tornado um cara em forma.)</span></li></ul><h5 class="gram-subhead">COULD / COULDN\'T HAVE (resultado possível):</h5><ul class="gram-bullets"><li><span class="gram-eng">She could have won the contest!</span> <span class="gram-trans">(Ela poderia ter vencido a competição!)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">They could have been friends, they were so alike!</span> <span class="gram-trans">(Eles poderiam ter sido amigos, eram tão parecidos!)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: depois de SHOULD HAVE / WOULD HAVE / COULD HAVE, sempre use o PAST PARTICIPLE (3ª forma do verbo): - go → went → GONE - be → was → BEEN - do → did → DONE</li></ul><ul class="gram-bullets"><li>Diferença entre os três modais:</li></ul><p>Modal | Significado<br>──────────────|─────────────────────────────────────<br>SHOULD HAVE | "deveria ter" - arrependimento/crítica<br>WOULD HAVE | "teria" - resultado hipotético<br>COULD HAVE | "poderia ter" - capacidade não usada</p><ul class="gram-bullets"><li>Formas contraídas na fala: - should have → should\'ve ("shoulda") - would have → would\'ve ("woulda") - could have → could\'ve ("coulda")</li></ul><ul class="gram-bullets"><li>Esses modais aparecem MUITO em frases com THIRD CONDITIONAL: - If I HAD STUDIED more, I WOULD HAVE PASSED the test.</li></ul><ul class="gram-bullets"><li>ATENÇÃO ao erro comum: ❌ I should of called you. (erro fonético comum) ✔️ I should HAVE called you.</li></ul></div></div>'},
{order:79,badge:'79',topic:'SENTENCES USING INFINITIVES & FOR TO EXPRESS PURPOSE',book:'Green book',ref:'Green book - pg. 79',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Em inglês, quando queremos expressar a FINALIDADE ou o PROPÓSITO de uma<br>ação (ou seja, "PARA QUÊ" algo é feito), usamos duas estruturas<br>principais:</p><p>1) (IN ORDER) + TO + VERB<br>Indica o objetivo da ação por parte do mesmo sujeito.</p><p>2) (IN ORDER) + FOR + NOUN + TO + VERB<br>Indica o objetivo da ação, mas com SUJEITO DIFERENTE entre as duas<br>partes da frase.</p><p>A palavra "IN ORDER" é OPCIONAL, mas torna a frase mais formal.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA 1: (IN ORDER) TO + VERB</h5><p>(In order) + to + verbo + complemento, sujeito + ação principal</p><p>Uso: mesmo sujeito faz as duas ações.</p><h5 class="gram-subhead">ESTRUTURA 2: (IN ORDER) FOR + NOUN + TO + VERB</h5><p>(In order) + for + substantivo/pessoa + to + verbo</p><p>Uso: o sujeito da ação principal é DIFERENTE do sujeito do propósito.</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM (IN ORDER) TO + VERB (mesmo sujeito):</h5><ul class="gram-bullets"><li><span class="gram-eng">In order to be fluent in English, you should study every day.</span> <span class="gram-trans">(Para ser fluente em inglês, você deve estudar todos os dias.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">In order to read a big book, you must start by the smaller ones.</span> <span class="gram-trans">(Para ler um livro grande, você deve começar pelos menores.)</span></li></ul><h5 class="gram-subhead">COM (IN ORDER) FOR + NOUN + TO + VERB (sujeitos diferentes):</h5><ul class="gram-bullets"><li><span class="gram-eng">In order for a company to be big, it must invest in its employees.</span> <span class="gram-trans">(Para uma empresa ser grande, ela deve investir em seus funcionários.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">In order for a person to speak well, they must focus on reading out loud.</span> <span class="gram-trans">(Para uma pessoa falar bem, ela deve focar em ler em voz alta.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE - QUANDO USAR CADA ESTRUTURA:</li></ul><p>Situação | Estrutura<br>──────────────────────────────────|─────────────────────<br>Mesmo sujeito nas duas partes | (in order) TO + verb<br>Sujeitos diferentes | (in order) FOR + noun + to + verb</p><ul class="gram-bullets"><li>"IN ORDER" é OPCIONAL - ambas são corretas: ✔️ I study English to find a better job. ✔️ I study English in order to find a better job. (mais formal)</li></ul><ul class="gram-bullets"><li>Estruturas alternativas para expressar propósito: - so that + sujeito + verbo Ex: I study English SO THAT I CAN find a better job. - so as to + verbo Ex: I study English SO AS TO find a better job.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Comparação rápida: - I work hard to provide for my family. (eu trabalho, eu provejo) - I work hard FOR MY KIDS TO have a good life.</span> <span class="gram-trans">(eu trabalho, meus filhos têm uma boa vida - sujeitos diferentes)</span></li></ul><ul class="gram-bullets"><li>"IN ORDER" é mais comum em INGLÊS ESCRITO/FORMAL. Em conversação cotidiana, geralmente é omitido.</li></ul></div></div>'},
{order:81,badge:'81',topic:'GIVING REASONS (Dando Razões / Justificando)',book:'Green book',ref:'Green book - pg. 81',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Em inglês, há diferentes maneiras de DAR UMA RAZÃO ou JUSTIFICAR algo.<br>A escolha entre uma estrutura e outra depende:</p><ul class="gram-bullets"><li><span class="gram-eng">Da palavra que segue</span> <span class="gram-trans">(substantivo ou oração completa)</span></li><li>Do contexto (positivo, negativo, neutro)</li><li>Do nível de formalidade</li></ul><p>Esta página apresenta três grupos principais de expressões para justificar.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">GRUPO 1 - BECAUSE / SINCE (seguidos de SUJEITO + VERBO):</h5><p>ambos significam a mesma coisa</p><p>... + BECAUSE/SINCE + sujeito + verbo</p><p>Equivalentes em português: "porque" ou "já que"</p><h5 class="gram-subhead">GRUPO 2 - BECAUSE OF / DUE TO (seguidos de SUBSTANTIVO):</h5><p>ambos significam o mesmo, mas DUE TO é mais usado em contextos<br>NEGATIVOS</p><p>... + BECAUSE OF/DUE TO + substantivo</p><p>Equivalentes em português: "por causa de", "devido a"</p><h5 class="gram-subhead">GRUPO 3 - THE REASON THAT/WHY ... IS ...:</h5><p>estrutura formal e educada para apresentar uma razão</p><p>THE REASON THAT/WHY + sujeito + verbo + IS + substantivo</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">1. BECAUSE / SINCE (com sujeito + verbo):</h5><ul class="gram-bullets"><li><span class="gram-eng">She is happy because the ocean is calmer today.</span> <span class="gram-trans">(Ela está feliz porque o oceano está mais calmo hoje.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">You are going to be promoted since you delivered the reports on time.</span> <span class="gram-trans">(Você vai ser promovido já que entregou os relatórios no prazo.)</span></li></ul><ul class="gram-bullets"><li>I will help you since/because you read the book.</li></ul><ul class="gram-bullets"><li>It will be time-consuming because/since it is difficult.</li></ul><h5 class="gram-subhead">2. BECAUSE OF / DUE TO (com substantivo):</h5><ul class="gram-bullets"><li><span class="gram-eng">Due to the bad weather, we cannot go.</span> <span class="gram-trans">(Devido ao mau tempo, não podemos ir.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She is tired because of the training session.</span> <span class="gram-trans">(Ela está cansada por causa da sessão de treino.)</span></li></ul><ul class="gram-bullets"><li>Due to the loud noise, I can\'t hear you.</li></ul><ul class="gram-bullets"><li>I am sad because of the bad food.</li></ul><h5 class="gram-subhead">3. THE REASON THAT/WHY ... IS ... (formal):</h5><ul class="gram-bullets"><li><span class="gram-eng">The reason that/why most people don\'t eat here is the bad service.</span> <span class="gram-trans">(A razão pela qual a maioria das pessoas não come aqui é o mau serviço.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">The difficult course program is the reason that/why there aren\'t many students.</span> <span class="gram-trans">(O programa difícil do curso é a razão pela qual não há muitos alunos.)</span></li></ul><ul class="gram-bullets"><li>The reason why/that I don\'t go to parties is the noise.</li></ul><ul class="gram-bullets"><li>The hot weather is the reason that/why I don\'t go to the beach.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE - O QUE VEM DEPOIS:</li></ul><p>Conector | O que segue<br>────────────────|────────────────────────────<br>BECAUSE | Sujeito + verbo (oração)<br>SINCE | Sujeito + verbo (oração)<br>BECAUSE OF | Substantivo (objeto/nome)<br>DUE TO | Substantivo (objeto/nome)<br>THE REASON WHY | Sujeito + verbo + IS + substantivo</p><ul class="gram-bullets"><li>ERRO COMUM: ❌ I am tired because of I worked hard. ✔️ I am tired because I worked hard. (com oração) ✔️ I am tired because of the hard work. (com substantivo)</li></ul><ul class="gram-bullets"><li>DUE TO é mais formal e usado mais em contextos NEGATIVOS: - Due to the rain, the game was cancelled. (formal) - Because of the rain, we stayed home. (mais casual)</li></ul><ul class="gram-bullets"><li>Sinônimos úteis para JUSTIFICAR: - As → As I was tired, I went to bed. - For → He stayed home, for he was sick. (literário) - Owing to → Owing to the accident, the road was closed.</li></ul></div></div>'},
{order:87,badge:'87',topic:'PAST MODALS FOR CERTAINTY & POSSIBILITY',book:'Green book',ref:'Green book - pg. 87',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Os PAST MODALS são usados para fazer DEDUÇÕES sobre o PASSADO, expressando<br>diferentes graus de CERTEZA, POSSIBILIDADE ou IMPOSSIBILIDADE.</p><p>Esta página apresenta três níveis de confiança:</p><p>1) POSSIBILIDADE → talvez tenha acontecido (não tenho certeza)<br>2) CERTEZA → tenho certeza que aconteceu<br>3) IMPOSSIBILIDADE → tenho certeza que NÃO aconteceu</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA GERAL:</h5><p>MODAL + HAVE + PAST PARTICIPLE</p><h5 class="gram-subhead">MODAIS POR INTENÇÃO:</h5><p>POSSIBILIDADE (~50% certeza):</p><ul class="gram-bullets"><li>MAY HAVE + past participle</li><li>MIGHT HAVE + past participle</li><li>COULD HAVE + past participle</li></ul><p>CERTEZA (~95% certeza):</p><ul class="gram-bullets"><li>MUST HAVE + past participle</li><li>MUST NOT HAVE + past participle</li></ul><p>IMPOSSIBILIDADE (~100% certeza que NÃO aconteceu):</p><ul class="gram-bullets"><li>COULDN\'T HAVE + past participle</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">POSSIBILIDADE (talvez sim, talvez não):</h5><ul class="gram-bullets"><li><span class="gram-eng">He might have studied hard.</span> <span class="gram-trans">(Ele talvez tenha estudado muito.)</span></li><li><span class="gram-eng">He could have been working out.</span> <span class="gram-trans">(Ele podia estar malhando.)</span></li><li><span class="gram-eng">She may have gone to the grocery store.</span> <span class="gram-trans">(Ela talvez tenha ido ao mercado.)</span></li></ul><h5 class="gram-subhead">CERTEZA (alta confiança):</h5><ul class="gram-bullets"><li><span class="gram-eng">He must have forgotten his keys.</span> <span class="gram-trans">(Ele deve ter esquecido as chaves - tenho certeza.)</span></li><li><span class="gram-eng">She must not have eaten the pizza.</span> <span class="gram-trans">(Ela não deve ter comido a pizza.)</span></li></ul><h5 class="gram-subhead">IMPOSSIBILIDADE (certeza que não aconteceu):</h5><ul class="gram-bullets"><li><span class="gram-eng">She couldn\'t have been sleeping, it was 3 pm!</span> <span class="gram-trans">(Ela não pode ter estado dormindo, eram 15h!)</span></li><li><span class="gram-eng">He couldn\'t have gone to the soccer match, his car keys were with me.</span> <span class="gram-trans">(Ele não pode ter ido ao jogo, as chaves do carro estavam comigo.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>ESCALA DE CERTEZA:</li></ul><p>Modal | Nível de certeza<br>──────────────────────|──────────────────────────<br>may/might/could have | ~50% (talvez sim/talvez não)<br>must have | ~95% (quase certo que sim)<br>couldn\'t have | ~100% (certeza que não)<br>must not have | ~95% (quase certo que não)</p><ul class="gram-bullets"><li>APLICAÇÃO PRÁTICA - é como "ser detetive": - The cookies are gone! → Someone must have eaten them. - The window is broken. → A ball might have hit it. - She isn\'t answering. → She could have lost her phone. - I see his car. → He must be at home.</li></ul><ul class="gram-bullets"><li>REGRA-CHAVE: depois de QUALQUER um desses modais, sempre use o PAST PARTICIPLE (não o passado simples!): ❌ He must have went home. ✔️ He must have GONE home.</li></ul><ul class="gram-bullets"><li>Forma contraída na fala: - must have → must\'ve - might have → might\'ve - couldn\'t have → couldn\'t\'ve</li></ul><ul class="gram-bullets"><li>ATENÇÃO ao erro fonético comum: ❌ He must of forgotten. (escrita errada, baseada na pronúncia) ✔️ He must HAVE forgotten.</li></ul></div></div>'},
{order:89,badge:'89',topic:'PAST MODALS - SHOULD/COULD HAVE & WOULD HAVE',book:'Green book',ref:'Green book - pg. 89',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta página apresenta dois usos comuns dos modais no passado para<br>COMENTAR sobre situações passadas:</p><p>1) SHOULD HAVE / COULD HAVE<br>→ Para fazer uma SUGESTÃO sobre algo que aconteceu (ou deveria ter<br>acontecido) no passado.</p><p>2) WOULD HAVE<br>→ Para oferecer uma ALTERNATIVA do que você teria feito no passado.</p><p>Essas estruturas são muito úteis em discussões e críticas construtivas<br>sobre decisões passadas.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">SHOULD HAVE / COULD HAVE (sugestão no passado):</h5><p>"You should have + past participle"<br>"You could have + past participle"<br>= Você deveria ter / Você poderia ter feito X (mas não fez)</p><p>Forma negativa:<br>"You shouldn\'t have + past participle"<br>= Você não deveria ter feito X</p><h5 class="gram-subhead">WOULD HAVE (alternativa pessoal):</h5><p>"I would have + past participle"<br>= Eu teria feito X (no seu lugar)</p><p>Forma negativa:<br>"I wouldn\'t have + past participle"<br>= Eu não teria feito X</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">SHOULD HAVE / COULD HAVE (sugestão no passado):</h5><ul class="gram-bullets"><li><span class="gram-eng">You could have called your sister yesterday.</span> <span class="gram-trans">(Você poderia ter ligado para sua irmã ontem.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She shouldn\'t have talked to her mother like that.</span> <span class="gram-trans">(Ela não deveria ter falado com a mãe daquele jeito.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">You should have arrived earlier.</span> <span class="gram-trans">(Você deveria ter chegado mais cedo.)</span></li></ul><h5 class="gram-subhead">WOULD HAVE (alternativa pessoal):</h5><ul class="gram-bullets"><li><span class="gram-eng">I would have called her sister.</span> <span class="gram-trans">(Eu teria ligado para a irmã dela - no seu lugar.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">I wouldn\'t have gone to that university.</span> <span class="gram-trans">(Eu não teria ido para aquela universidade.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She would have studied harder.</span> <span class="gram-trans">(Ela teria estudado mais.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">Diferença sutil entre SHOULD HAVE e COULD HAVE: - SHOULD HAVE → Recomendação/Crítica (era esperado fazer) "You should have studied for the test." (era o certo a fazer) - COULD HAVE → Possibilidade não realizada (era possível fazer) "You could have studied for the test."</span> <span class="gram-trans">(você tinha a possibilidade)</span></li></ul><ul class="gram-bullets"><li>Quando usar cada um:</li></ul><p>Modal | Contexto<br>───────────────|────────────────────────────────────<br>SHOULD HAVE | Críticas, conselhos retrospectivos<br>COULD HAVE | Sugestões mais leves, possibilidades<br>WOULD HAVE | Alternativas pessoais ("eu faria")</p><ul class="gram-bullets"><li>REGRA-CHAVE: depois desses modais, use SEMPRE PAST PARTICIPLE (3ª forma do verbo): - call → called → CALLED - go → went → GONE - eat → ate → EATEN</li></ul><ul class="gram-bullets"><li>Forma contraída em diálogos: - I would have → I would\'ve ("woulda") - You should have → You should\'ve ("shoulda") - We could have → We could\'ve ("coulda")</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Frase muito útil em discussões/conselhos: - "If I were you, I WOULD HAVE..." (Se eu fosse você, eu teria...) - "You should have known better."</span> <span class="gram-trans">(Você deveria saber melhor.)</span></li></ul><ul class="gram-bullets"><li>Cuidado com erro fonético: ❌ I would of helped. ✔️ I would HAVE helped.</li></ul></div></div>'},
{order:101,badge:'101',topic:'MODAL + BE + PAST PARTICIPLE',book:'Green book',ref:'Green book - pg. 101',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta estrutura combina MODAIS (should, ought to, must, have to) com a<br>VOZ PASSIVA, usando a fórmula:</p><p>MODAL + BE + PAST PARTICIPLE</p><p>Ela é usada para expressar OPINIÕES, NECESSIDADES e OBRIGAÇÕES sobre algo<br>que DEVERIA ou PRECISA SER FEITO, sem mencionar quem deve fazê-lo.</p><p>São apresentados dois grupos:</p><p>1) SHOULD / OUGHT TO + BE + past participle → boa ideia (sugestão)<br>2) MUST / HAVE (GOT) TO + BE + past participle → absolutamente necessário</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA GERAL:</h5><p>SUJEITO + MODAL + BE + PAST PARTICIPLE + COMPLEMENTO</p><h5 class="gram-subhead">SHOULD / OUGHT TO (sugestão / boa ideia):</h5><p>Usado quando achamos que algo seria bom de ser feito.</p><p>"Teachers should be respected."<br>"X ought to be done."</p><h5 class="gram-subhead">MUST / HAVE (GOT) TO (obrigação / necessidade absoluta):</h5><p>Usado quando achamos que algo é absolutamente necessário ou é uma lei.</p><p>"The world must be taken care of."<br>"Schools have to be administered better."</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">1. SHOULD / OUGHT TO (sugestão - boa ideia):</h5><ul class="gram-bullets"><li><span class="gram-eng">Teachers should be respected.</span> <span class="gram-trans">(Professores deveriam ser respeitados.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Funkeiros ought to be prohibited from playing loud music.</span> <span class="gram-trans">(Os "funkeiros" deveriam ser proibidos de tocar música alta.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Students should not be late for class.</span> <span class="gram-trans">(Estudantes não deveriam se atrasar para a aula.)</span></li></ul><h5 class="gram-subhead">2. MUST / HAVE (GOT) TO (obrigação - lei/necessidade):</h5><ul class="gram-bullets"><li><span class="gram-eng">The world must be taken care of by us.</span> <span class="gram-trans">(O mundo precisa ser cuidado por nós.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Schools have to be administered better.</span> <span class="gram-trans">(As escolas têm que ser administradas melhor.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">These rules must be followed.</span> <span class="gram-trans">(Essas regras precisam ser seguidas.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: depois do MODAL, sempre use "BE + PAST PARTICIPLE": ✔️ should BE respected (forma passiva correta) ❌ should respected ❌ should be respect</li></ul><ul class="gram-bullets"><li>Escala de força/obrigação:</li></ul><p>Modal | Significado<br>───────────────|──────────────────────────────────<br>Should | É uma boa ideia / Sugestão<br>Ought to | É uma boa ideia (mais formal)<br>Must | Obrigatório (necessidade alta)<br>Have (got) to | Obrigatório (lei/regra externa)</p><ul class="gram-bullets"><li>Quando usar a voz passiva com modais? - Quando o FOCO está na AÇÃO, não em quem deveria fazê-la - Quando o agente é óbvio, irrelevante ou desconhecido - Em opiniões sobre sociedade e mundo</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Comparação ativa vs passiva: - ATIVA: We should respect teachers. - PASSIVA: Teachers should be respected.</span> <span class="gram-trans">(A versão passiva enfatiza os professores, não "nós")</span></li></ul><ul class="gram-bullets"><li>Outras estruturas com MODAL + BE + past participle: - This task can be done quickly. - The book will be published next year. - The problem might be solved. - The information could be shared.</li></ul></div></div>'},
{order:103,badge:'103',topic:'TAG QUESTIONS (Perguntas Curtas de Confirmação)',book:'Green book',ref:'Green book - pg. 103 e Green book - pg. 108',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>TAG QUESTIONS são pequenas perguntas que adicionamos ao FINAL de uma<br>afirmação quando queremos a CONFIRMAÇÃO ou OPINIÃO de outra pessoa.</p><p>Em português, equivalem ao "NÉ?", "NÃO É?", "NÃO É MESMO?" ou "CERTO?".</p><p>A regra principal é a INVERSÃO:</p><ul class="gram-bullets"><li>Frase AFIRMATIVA → tag question NEGATIVA</li><li>Frase NEGATIVA → tag question AFIRMATIVA</li></ul></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">REGRA BÁSICA - INVERSÃO:</h5><p>Afirmação + tag NEGATIVA<br>Negação + tag AFIRMATIVA</p><h5 class="gram-subhead">ESCOLHA DO AUXILIAR (depende da frase principal):</h5><p>FRASES COM TO BE:<br>afirmação + isn\'t/aren\'t/wasn\'t/weren\'t + sujeito?<br>negação + is/are/was/were + sujeito?</p><p>FRASES COM MODAIS:<br>afirmação + modal negativo + sujeito?<br>negação + modal afirmativo + sujeito?</p><p>SIMPLE PRESENT:<br>afirmação + don\'t/doesn\'t + sujeito?<br>negação + do/does + sujeito?</p><p>SIMPLE PAST:<br>afirmação + didn\'t + sujeito?<br>negação + did + sujeito?</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">SENTENCES COM TO BE:</h5><ul class="gram-bullets"><li><span class="gram-eng">She is a nice teacher, isn\'t she?</span> <span class="gram-trans">(Ela é uma professora legal, né?)</span></li><li><span class="gram-eng">You are not really happy today, are you?</span> <span class="gram-trans">(Você não está realmente feliz hoje, está?)</span></li></ul><h5 class="gram-subhead">SENTENCES COM MODAIS:</h5><ul class="gram-bullets"><li><span class="gram-eng">They should be more polite, shouldn\'t they?</span> <span class="gram-trans">(Eles deveriam ser mais educados, não deveriam?)</span></li><li><span class="gram-eng">You can\'t sing, can you?</span> <span class="gram-trans">(Você não sabe cantar, sabe?)</span></li></ul><h5 class="gram-subhead">COM SIMPLE PRESENT (usar do/does):</h5><ul class="gram-bullets"><li><span class="gram-eng">She teaches English, doesn\'t she?</span> <span class="gram-trans">(Ela ensina inglês, não ensina?)</span></li><li><span class="gram-eng">You don\'t like pizza, do you?</span> <span class="gram-trans">(Você não gosta de pizza, gosta?)</span></li></ul><h5 class="gram-subhead">COM SIMPLE PAST (usar did):</h5><ul class="gram-bullets"><li><span class="gram-eng">She found a new job, didn\'t she?</span> <span class="gram-trans">(Ela conseguiu um novo emprego, não conseguiu?)</span></li><li><span class="gram-eng">She didn\'t pass the exam, did she?</span> <span class="gram-trans">(Ela não passou no exame, passou?)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE - INVERSÃO + AUXILIAR CORRETO:</li></ul><p>Tempo verbal | Auxiliar para tag<br>───────────────────|──────────────────<br>TO BE | is/are/was/were<br>SIMPLE PRESENT | do/does<br>SIMPLE PAST | did<br>PRESENT PERFECT | have/has<br>MODAIS | o próprio modal<br>WILL | will<br>CAN | can</p><ul class="gram-bullets"><li>Tabela rápida de inversão: - is → isn\'t? | isn\'t → is? - can → can\'t? | can\'t → can? - will → won\'t? | won\'t → will? - do → don\'t? | don\'t → do? - have → haven\'t? | haven\'t → have?</li></ul><ul class="gram-bullets"><li><span class="gram-eng">ENTONAÇÃO importa muito: - Tom DESCENDENTE: pedindo CONFIRMAÇÃO (já sabemos a resposta) - Tom ASCENDENTE: pergunta REAL</span> <span class="gram-trans">(não temos certeza)</span></li></ul><ul class="gram-bullets"><li>Casos especiais: - "I am tall, aren\'t I?" (não "amn\'t I?") - "Let\'s go, shall we?" (com "Let\'s") - "Open the door, will you?" (com imperativos) - "Nobody came, did they?" (negativo: nobody, no one, never)</li></ul><ul class="gram-bullets"><li>Para confirmar uma tag question: - "She\'s a teacher, isn\'t she?" - "Yes, she is." (concordando) - "No, she isn\'t." (discordando)</li></ul></div></div>'},
{order:107,badge:'107',topic:'TALKING ABOUT ACCOMPLISHMENTS WITH SIMPLE PAST &',book:'Green book',ref:'Green book - pg. 107',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Para falar de CONQUISTAS e REALIZAÇÕES no passado, usamos os verbos<br>"TO MANAGE" e "TO BE ABLE TO". Ambos significam CONSEGUIR fazer algo,<br>geralmente após algum esforço ou dificuldade.</p><p>A escolha entre SIMPLE PAST ou PRESENT PERFECT depende do tempo da<br>conquista:</p><ul class="gram-bullets"><li>SIMPLE PAST → conquista em um TEMPO DEFINIDO no passado</li><li>PRESENT PERFECT → conquista em um TEMPO INDEFINIDO no passado</li></ul></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM SIMPLE PAST (tempo definido):</h5><p>Sujeito + managed to / was-were able to + verbo + complemento</p><p>Acompanhado por: last year, yesterday, in 2020, this year...</p><h5 class="gram-subhead">COM PRESENT PERFECT (tempo indefinido):</h5><p>Sujeito + have/has managed to + verbo + complemento<br>Sujeito + have/has been able to + verbo + complemento</p><p>Acompanhado por: ever, already, recently, in my life (sem data exata)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM SIMPLE PAST (tempo específico definido):</h5><ul class="gram-bullets"><li><span class="gram-eng">I managed to finish high school last year.</span> <span class="gram-trans">(Eu consegui terminar o ensino médio no ano passado.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She didn\'t manage to pass her exams last semester.</span> <span class="gram-trans">(Ela não conseguiu passar nas provas no semestre passado.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She was able to buy her first car this year.</span> <span class="gram-trans">(Ela conseguiu comprar o primeiro carro este ano.)</span></li></ul><h5 class="gram-subhead">COM PRESENT PERFECT (tempo indefinido / experiência de vida):</h5><ul class="gram-bullets"><li><span class="gram-eng">I have managed to finish high school.</span> <span class="gram-trans">(Eu consegui terminar o ensino médio.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She hasn\'t managed to pass her exams.</span> <span class="gram-trans">(Ela não conseguiu passar nas provas.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She has been able to buy her first car.</span> <span class="gram-trans">(Ela conseguiu comprar seu primeiro carro.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE - QUANDO USAR CADA TEMPO:</li></ul><p>Contexto | Tempo verbal<br>─────────────────────────────────|──────────────────<br>Tempo SABIDO/ESPECÍFICO | Simple Past<br>(last year, in 2010, yesterday) |<br>|<br>Tempo INDEFINIDO/EXPERIÊNCIA | Present Perfect<br>(ever, already, in my life) |</p><ul class="gram-bullets"><li>DIFERENÇA SUTIL entre MANAGE TO e BE ABLE TO: - MANAGE TO → enfatiza ESFORÇO/DIFICULDADE superada "I managed to finish the test." (com esforço) - BE ABLE TO → enfatiza CAPACIDADE "I was able to finish the test." (tinha capacidade)</li></ul><ul class="gram-bullets"><li>EXPRESSÕES TÍPICAS:</li></ul><p>Simple Past: Present Perfect:<br>- last year - ever / never<br>- yesterday - already / just<br>- in 2020 - so far<br>- when I was young - up until now</p><ul class="gram-bullets"><li>ATENÇÃO à conjugação: - MANAGE → MANAGED → MANAGED (regular) - BE ABLE TO → WAS/WERE ABLE TO → HAVE/HAS BEEN ABLE TO</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Exemplos comparativos: - "I managed to finish my book LAST WEEK." (tempo definido = Past) - "I have managed to finish many books THIS YEAR." (período = Perfect) - "Have you ever managed to do that?"</span> <span class="gram-trans">(experiência = Perfect)</span></li></ul></div></div>'},
{order:109,badge:'109',topic:'FUTURE PERFECT (Futuro Perfeito)',book:'Green book',ref:'Green book - pg. 109',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O FUTURE PERFECT é usado para expressar a ideia de que uma ação ESTARÁ<br>COMPLETADA em um momento ESPECÍFICO no futuro.</p><p>Em outras palavras, ele responde à pergunta:<br>"Até quando uma ação será terminada no futuro?"</p><p>A ideia central: numa DATA ou TEMPO FUTURO, uma ação já terá sido<br>concluída.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA BÁSICA:</h5><p>SUJEITO + WILL + HAVE + PAST PARTICIPLE + COMPLEMENTO</p><h5 class="gram-subhead">EXPRESSÕES DE TEMPO TÍPICAS:</h5><ul class="gram-bullets"><li>BY + tempo específico (by 2030, by next month, by Friday)</li><li>BY THE TIME + sujeito + verbo</li><li>IN + período + (from now)</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">By 2035, the world will have become even more advanced in science.</span> <span class="gram-trans">(Até 2035, o mundo terá se tornado ainda mais avançado em ciência.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">By this time next year, I will have finished college.</span> <span class="gram-trans">(A esta altura no próximo ano, eu terei terminado a faculdade.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">In one month, she will have got/gotten her promotion.</span> <span class="gram-trans">(Em um mês, ela terá conseguido a promoção.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">By the end of the year, we will have saved enough money to travel.</span> <span class="gram-trans">(Até o fim do ano, teremos economizado dinheiro suficiente para viajar.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">By Friday, I will have completed the project.</span> <span class="gram-trans">(Até sexta-feira, eu terei completado o projeto.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">REGRA-CHAVE: estrutura sempre WILL + HAVE + PAST PARTICIPLE: ❌ I will finish by Friday. ✔️ I will have finished by Friday.</span> <span class="gram-trans">(a diferença: o "have" mostra que estará completo)</span></li></ul><ul class="gram-bullets"><li>LINHA DO TEMPO:</li></ul><p>AGORA -------&gt; [momento no futuro X] -------&gt;<br>(ação JÁ TERÁ TERMINADO antes de X)</p><ul class="gram-bullets"><li><span class="gram-eng">PALAVRAS-CHAVE para reconhecer o Future Perfect: - BY + tempo específico - BY THE TIME + ação - IN + período de tempo - ALREADY</span> <span class="gram-trans">(já)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Comparação com outros tempos verbais: - Simple Future: I will finish my book. (vou terminar) - Future Perfect: I will have finished my book BY 8 PM.</span> <span class="gram-trans">(até as 20h, já terei terminado)</span></li></ul><ul class="gram-bullets"><li>Como FORMAR o PAST PARTICIPLE: - Verbos regulares: -ED (finish → finished → FINISHED) - Verbos irregulares: 3ª coluna (go → went → GONE)</li></ul><ul class="gram-bullets"><li>Forma contraída: - I will have → I\'ll have - She will have → She\'ll have</li></ul><ul class="gram-bullets"><li>Para perguntas: - Will you have finished by Friday? - By 2030, will we have solved the problem?</li></ul></div></div>'},
{order:1001,badge:'U1',topic:'RELATIVE PRONOUNS AS SUBJECTS AND OBJECTS',book:'Green book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>RELATIVE PRONOUNS (Pronomes Relativos) são palavras que CONECTAM duas<br>orações, adicionando informações sobre PESSOAS ou COISAS sem precisar<br>repeti-las.</p><p>Eles podem funcionar em dois papéis dentro da oração:</p><p>1) COMO SUJEITO da oração relativa<br>"I have a friend WHO speaks five languages." (who é sujeito de "speaks")</p><p>2) COMO OBJETO da oração relativa<br>"I have a friend WHO(M) I trust." (who é objeto de "trust")</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">PRONOMES RELATIVOS:</h5><p>PARA PESSOAS:</p><ul class="gram-bullets"><li><span class="gram-eng">WHO → como SUJEITO</span> <span class="gram-trans">(faz a ação)</span></li><li><span class="gram-eng">WHOM → como OBJETO</span> <span class="gram-trans">(recebe a ação - formal)</span></li><li>THAT → para sujeito OU objeto (mais informal)</li><li>WHOSE → indica posse</li></ul><p>PARA COISAS:</p><ul class="gram-bullets"><li>WHICH → como sujeito OU objeto (formal)</li><li>THAT → como sujeito OU objeto (informal)</li></ul><h5 class="gram-subhead">ESTRUTURA - RELATIVE PRONOUN COMO SUJEITO:</h5><p>Substantivo + PRONOME RELATIVO + verbo + complemento</p><h5 class="gram-subhead">ESTRUTURA - RELATIVE PRONOUN COMO OBJETO:</h5><p>Substantivo + PRONOME RELATIVO + sujeito + verbo + complemento<br>(o objeto vem ANTES da nova oração)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">PRONOMES RELATIVOS COMO SUJEITO (faz a ação):</h5><ul class="gram-bullets"><li><span class="gram-eng">I like people who are honest.</span> <span class="gram-trans">(Gosto de pessoas QUE são honestas.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She married a man who works hard.</span> <span class="gram-trans">(Ela se casou com um homem QUE trabalha duro.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">I bought a car that has low gas mileage.</span> <span class="gram-trans">(Comprei um carro QUE tem baixo consumo.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">The book which is on the table is mine.</span> <span class="gram-trans">(O livro QUE está na mesa é meu.)</span></li></ul><h5 class="gram-subhead">PRONOMES RELATIVOS COMO OBJETO (recebe a ação):</h5><ul class="gram-bullets"><li><span class="gram-eng">I like people who(m) I can trust.</span> <span class="gram-trans">(Gosto de pessoas EM QUEM posso confiar.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She is the teacher that I admire.</span> <span class="gram-trans">(Ela é a professora QUE eu admiro.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">The movie which we watched was great.</span> <span class="gram-trans">(O filme QUE assistimos foi ótimo.)</span></li></ul><h5 class="gram-subhead">COM WHOSE (posse):</h5><ul class="gram-bullets"><li><span class="gram-eng">That\'s the girl whose mother is a doctor.</span> <span class="gram-trans">(Aquela é a garota CUJA mãe é médica.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">I know someone whose dog won a contest.</span> <span class="gram-trans">(Conheço alguém CUJO cachorro ganhou um concurso.)</span></li></ul><h5 class="gram-subhead">DESCREVENDO TIPOS DE PESSOAS (foco da unidade):</h5><ul class="gram-bullets"><li><span class="gram-eng">I like friends who listen to me.</span> <span class="gram-trans">(Gosto de amigos QUE me ouvem.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">I don\'t like people who lie.</span> <span class="gram-trans">(Não gosto de pessoas QUE mentem.)</span></li></ul><ul class="gram-bullets"><li>She prefers friends who are loyal.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE - como saber se é SUJEITO ou OBJETO:</li></ul><h5 class="gram-subhead">Se DEPOIS do relative pronoun vier um VERBO → SUJEITO:</h5><p>"people WHO ARE honest" (who + verbo "are")</p><h5 class="gram-subhead">Se DEPOIS do relative pronoun vier um SUJEITO + VERBO → OBJETO:</h5><p>"people WHO I TRUST" (who + sujeito "I" + verbo "trust")</p><ul class="gram-bullets"><li>OMISSÃO do pronome relativo: Quando o pronome é OBJETO, podemos OMITI-LO em conversação: - "The book THAT I read." = "The book I read." ✔️ - "The person WHO I saw." = "The person I saw." ✔️</li></ul><p>Quando é SUJEITO, NÃO podemos omitir:<br>❌ "I have a friend speaks English." (errado!)<br>✔️ "I have a friend WHO speaks English."</p><ul class="gram-bullets"><li>WHO vs WHOM: - WHO → mais comum, funciona para sujeito e objeto em uso informal - WHOM → tecnicamente correto para OBJETO, mas é formal/raro</li></ul><p>Hoje em dia, quase sempre usa-se WHO ou THAT.</p><ul class="gram-bullets"><li>THAT é o mais VERSÁTIL: Funciona para PESSOAS e COISAS, como SUJEITO e OBJETO: - "The man THAT helped me..." - "The car THAT I bought..."</li></ul><ul class="gram-bullets"><li><span class="gram-eng">WHICH em frases NÃO defining (com vírgulas): - "My car, WHICH is red, is parked outside."</span> <span class="gram-trans">(Aqui não pode usar "that" - apenas "which" funciona)</span></li></ul><ul class="gram-bullets"><li>Cuidado para NÃO repetir o sujeito/objeto: ❌ "I know a man WHO HE works here." (he está sobrando) ✔️ "I know a man WHO works here."</li></ul><ul class="gram-bullets"><li>Padrão útil para DESCREVER PESSOAS: "I (don\'t) like + people + WHO + [característica]" - I like people who are kind. - I don\'t like people who complain a lot.</li></ul></div></div>'},
{order:1002,badge:'U2',topic:'GERUND PHRASES AS SUBJECTS AND OBJECTS',book:'Green book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>GERUND PHRASES (Frases com Gerúndio) são grupos de palavras formados por<br>um verbo terminado em -ING acompanhado de complementos. Eles funcionam<br>como SUBSTANTIVOS em uma frase.</p><p>Como substantivos, podem desempenhar dois papéis principais:</p><p>1) COMO SUJEITO da frase<br>"WORKING NIGHT SHIFTS is exhausting."<br>(Trabalhar em turnos noturnos é exaustivo.)</p><p>2) COMO OBJETO de outros verbos<br>"I love WORKING WITH CHILDREN."<br>(Eu adoro trabalhar com crianças.)</p><p>Esta estrutura é especialmente útil para FALAR DE TRABALHO, ATIVIDADES<br>e PREFERÊNCIAS PROFISSIONAIS.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">COMO SUJEITO (no início da frase):</h5><p>GERUND PHRASE + verbo + complemento</p><p>Exemplo: "Studying English helps me a lot."<br>(sujeito = "Studying English")</p><h5 class="gram-subhead">COMO OBJETO (depois de verbos como love, hate, enjoy, etc.):</h5><p>Sujeito + verbo + GERUND PHRASE</p><h5 class="gram-subhead">VERBOS QUE PEDEM GERÚNDIO COMO OBJETO:</h5><p>love, like, enjoy, hate, dislike, prefer, mind, avoid,<br>finish, keep, stop, consider, suggest, practice</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">GERUND PHRASES COMO SUJEITO:</h5><ul class="gram-bullets"><li><span class="gram-eng">Working night shifts is exhausting.</span> <span class="gram-trans">(Trabalhar em turnos noturnos é exaustivo.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Helping people is rewarding.</span> <span class="gram-trans">(Ajudar pessoas é gratificante.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Learning new languages can be challenging.</span> <span class="gram-trans">(Aprender novos idiomas pode ser desafiador.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Being a teacher requires patience.</span> <span class="gram-trans">(Ser professor exige paciência.)</span></li></ul><h5 class="gram-subhead">GERUND PHRASES COMO OBJETO:</h5><ul class="gram-bullets"><li><span class="gram-eng">I love working with children.</span> <span class="gram-trans">(Adoro trabalhar com crianças.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She enjoys solving difficult problems.</span> <span class="gram-trans">(Ela gosta de resolver problemas difíceis.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">He hates dealing with rude customers.</span> <span class="gram-trans">(Ele odeia lidar com clientes rudes.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">They consider opening a restaurant.</span> <span class="gram-trans">(Eles consideram abrir um restaurante.)</span></li></ul><h5 class="gram-subhead">CONTEXTO PROFISSIONAL (foco da unidade):</h5><ul class="gram-bullets"><li>Working in sales requires good communication skills.</li><li>Being a nurse means having to work weekends.</li><li>Managing a team is challenging but rewarding.</li><li>Teaching English is my passion.</li></ul><h5 class="gram-subhead">COMPARANDO SUJEITO vs OBJETO:</h5><p>SUJEITO:</p><ul class="gram-bullets"><li><span class="gram-eng">"Cooking is fun."</span> <span class="gram-trans">(cozinhar é divertido)</span></li></ul><p>OBJETO:</p><ul class="gram-bullets"><li><span class="gram-eng">"I enjoy cooking."</span> <span class="gram-trans">(eu gosto de cozinhar)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: gerund phrases funcionam como SUBSTANTIVOS: - "Reading is fun." (= a leitura é divertida) - Pode-se substituir por "It" → "It is fun."</li></ul><ul class="gram-bullets"><li>Quando o GERÚNDIO é o sujeito, o verbo principal vai no SINGULAR: ✔️ Reading books IS my hobby. ❌ Reading books ARE my hobby.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">ATENÇÃO: gerund phrases NÃO se confundem com Present Continuous: - "Studying is hard." (gerúndio - sujeito) - "I am studying."</span> <span class="gram-trans">(Present Continuous - ação acontecendo)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">GERÚNDIO vs INFINITIVO como sujeito: Ambos são possíveis, mas o GERÚNDIO é MAIS COMUM: - "Swimming is good exercise." ✔️ (mais natural) - "To swim is good exercise." ✔️</span> <span class="gram-trans">(formal/literário)</span></li></ul><ul class="gram-bullets"><li>OUTROS VERBOS que pedem gerúndio: - admit (admitir): I admit being wrong. - deny (negar): She denies stealing. - finish (terminar): He finished writing. - imagine (imaginar): Imagine living in Paris. - mind (importar-se): Do you mind opening the window? - postpone (adiar): They postponed leaving. - quit (desistir): She quit smoking. - recommend (recomendar): I recommend trying it.</li></ul><ul class="gram-bullets"><li>PALAVRAS DE COMPARAÇÃO podem usar gerúndio também: - "Working from home is BETTER THAN working at the office." - "I prefer reading to watching TV."</li></ul><ul class="gram-bullets"><li>ESTRUTURA TÍPICA para descrever preferências profissionais: - "I would enjoy + gerund + ..." - "I\'d hate + gerund + ..." - "I love + gerund + ..."</li></ul></div></div>'},
{order:1003,badge:'U3',topic:'REQUESTS WITH MODALS, IF CLAUSES, AND GERUNDS',book:'Green book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta unidade apresenta TRÊS ESTRUTURAS para fazer PEDIDOS em inglês,<br>cada uma com nível de FORMALIDADE diferente:</p><p>1) PEDIDOS COM MODAIS (can/could/would)<br>2) PEDIDOS COM IF CLAUSES (Would you mind if...)<br>3) PEDIDOS COM GERÚNDIOS (Would you mind + verbo-ing)</p><p>Saber alternar entre essas estruturas permite adaptar o tom da<br>conversa ao contexto (informal, formal, muito educado).</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA 1 - COM MODAIS:</h5><p>CAN/COULD/WOULD + sujeito + verbo (forma original) ?</p><p>Níveis de formalidade:</p><ul class="gram-bullets"><li>CAN you...? → informal</li><li>COULD you...? → educado</li><li>WOULD you...? → muito polido</li></ul><h5 class="gram-subhead">ESTRUTURA 2 - COM IF CLAUSES (mais formal):</h5><p>WOULD YOU MIND + IF + sujeito + verbo no passado simples ?</p><p>⚠️ ATENÇÃO: usa-se SIMPLE PAST, mas a ação é PRESENTE/FUTURA</p><h5 class="gram-subhead">ESTRUTURA 3 - COM GERÚNDIO:</h5><p>WOULD YOU MIND + verbo + ING ?</p><p>⚠️ ATENÇÃO: o verbo após "mind" vai no -ING</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">1. PEDIDOS COM MODAIS:</h5><ul class="gram-bullets"><li><span class="gram-eng">Can you help me?</span> <span class="gram-trans">(Você pode me ajudar?)</span></li><li><span class="gram-eng">Could you pass the salt, please?</span> <span class="gram-trans">(Você poderia me passar o sal, por favor?)</span></li><li><span class="gram-eng">Would you open the door?</span> <span class="gram-trans">(Você abriria a porta?)</span></li></ul><h5 class="gram-subhead">2. PEDIDOS COM IF CLAUSES (formal/polido):</h5><ul class="gram-bullets"><li><span class="gram-eng">Would you mind if I borrowed your pen?</span> <span class="gram-trans">(Você se importaria se eu pegasse sua caneta emprestada?)</span></li><li><span class="gram-eng">Would you mind if I opened the window?</span> <span class="gram-trans">(Você se importaria se eu abrisse a janela?)</span></li><li><span class="gram-eng">Would you mind if I left early?</span> <span class="gram-trans">(Você se importaria se eu saísse mais cedo?)</span></li></ul><h5 class="gram-subhead">3. PEDIDOS COM GERÚNDIO:</h5><ul class="gram-bullets"><li><span class="gram-eng">Would you mind opening the window?</span> <span class="gram-trans">(Você se importaria de abrir a janela?)</span></li><li><span class="gram-eng">Would you mind closing the door?</span> <span class="gram-trans">(Você se importaria de fechar a porta?)</span></li><li><span class="gram-eng">Would you mind helping me?</span> <span class="gram-trans">(Você se importaria de me ajudar?)</span></li></ul><h5 class="gram-subhead">COMPARANDO AS TRÊS ESTRUTURAS (mesma ideia):</h5><ul class="gram-bullets"><li>Can you open the window? (informal)</li><li>Could you open the window? (educado)</li><li><span class="gram-eng">Would you mind opening the window?</span> <span class="gram-trans">(muito polido - eu peço VOCÊ a fazer)</span></li><li><span class="gram-eng">Would you mind if I opened the window?</span> <span class="gram-trans">(muito polido - EU mesmo faço)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>DIFERENÇA CRUCIAL entre as duas estruturas com "Would you mind":</li></ul><p>Estrutura | Quem faz a ação?<br>───────────────────────────────────|──────────────────<br>Would you mind + V-ING? | A OUTRA pessoa faz<br>Would you mind IF + sujeito + V? | EU mesmo faço</p><ul class="gram-bullets"><li>ATENÇÃO ao tempo verbal em "Would you mind if...": ✔️ Would you mind IF I OPENED the window? (past simple) ❌ Would you mind IF I OPEN the window?</li></ul><p>Embora a ação seja presente, usa-se SIMPLE PAST (é uma regra do<br>inglês para tornar pedidos mais polidos/distantes).</p><ul class="gram-bullets"><li>Como RESPONDER a "Would you mind...?":</li></ul><p>Resposta | Significado<br>──────────────────────|──────────────────────────<br>"No, not at all." | Pode fazer (não me importo)<br>"Of course not." | Pode fazer (claro que não)<br>"Sure, no problem." | Pode fazer (sem problema)<br>"I\'m sorry, but..." | Não pode (educado)</p><p>⚠️ "Yes" significa "Sim, EU ME IMPORTO" = recusa! Cuidado.</p><ul class="gram-bullets"><li>ESCALA DE FORMALIDADE (do menos ao mais formal):</li></ul><p>Can you...? → informal<br>Could you...? → educado<br>Would you...? → mais educado<br>Would you mind + V-ING? → muito polido<br>Would you mind if I + past simple? → extremamente polido</p><ul class="gram-bullets"><li><span class="gram-eng">ESTRUTURA NEGATIVA com gerúndio: - "Would you mind NOT smoking here?"</span> <span class="gram-trans">(Você se importaria de NÃO fumar aqui?)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">ESTRUTURA NEGATIVA com if clause: - "Would you mind if I DIDN\'T come?"</span> <span class="gram-trans">(Você se importaria se eu NÃO viesse?)</span></li></ul><ul class="gram-bullets"><li>PARA RECUSAR EDUCADAMENTE pedidos: - "I\'m afraid I can\'t." - "I\'m sorry, but I\'m busy right now." - "I would, but I can\'t at the moment."</li></ul></div></div>'},
{order:1005,badge:'U5',topic:'NOUN PHRASES CONTAINING RELATIVE CLAUSES & EXPECTATIONS',book:'Green book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta unidade apresenta dois conteúdos importantes para falar de CULTURA<br>e EXPECTATIVAS SOCIAIS, especialmente em contextos de viagens, mudanças<br>internacionais e diferenças culturais:</p><p>1) NOUN PHRASES WITH RELATIVE CLAUSES<br>Estruturas como "It\'s the custom to..." ou "A common practice is..."<br>seguidas de orações relativas para descrever costumes.</p><p>2) EXPECTATIONS (Expectativas)<br>Estruturas como "supposed to", "expected to", "acceptable to" para<br>falar sobre o que se espera ou é aceito em diferentes culturas.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">NOUN PHRASES COM RELATIVE CLAUSES:</h5><p>IT\'S + a/the + substantivo + TO + verbo + complemento</p><p>Exemplos de substantivos comuns:</p><ul class="gram-bullets"><li>the custom (o costume)</li><li><span class="gram-eng">the tradition</span> <span class="gram-trans">(a tradição)</span></li><li><span class="gram-eng">a common practice</span> <span class="gram-trans">(uma prática comum)</span></li></ul><h5 class="gram-subhead">EXPECTATIONS - várias estruturas:</h5><p>1) (NOT) SUPPOSED TO:<br>Sujeito + BE + (NOT) SUPPOSED TO + verbo<br>= É (não é) esperado / Deveria</p><p>2) EXPECTED TO:<br>Sujeito + BE + EXPECTED TO + verbo<br>= É esperado que</p><p>3) (NOT) ACCEPTABLE TO:<br>IT\'S + (NOT) ACCEPTABLE + TO + verbo<br>= É (não é) aceitável</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">NOUN PHRASES COM RELATIVE CLAUSES (costumes):</h5><ul class="gram-bullets"><li><span class="gram-eng">In Japan, it\'s the custom to bow when greeting someone.</span> <span class="gram-trans">(No Japão, é costume curvar-se ao cumprimentar alguém.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">In Brazil, it\'s the tradition to celebrate Carnival.</span> <span class="gram-trans">(No Brasil, é tradição celebrar o Carnaval.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">In many countries, it\'s a common practice to remove shoes before entering a house.</span> <span class="gram-trans">(Em muitos países, é prática comum tirar os sapatos antes de entrar em uma casa.)</span></li></ul><h5 class="gram-subhead">SUPPOSED TO (expectativa):</h5><ul class="gram-bullets"><li><span class="gram-eng">You are supposed to wear a suit at the wedding.</span> <span class="gram-trans">(Você deve usar terno no casamento.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Students are supposed to do their homework.</span> <span class="gram-trans">(Os alunos devem fazer a lição de casa.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">You are NOT supposed to use your phone in class.</span> <span class="gram-trans">(Você não deveria usar o telefone na aula.)</span></li></ul><h5 class="gram-subhead">EXPECTED TO (esperado que):</h5><ul class="gram-bullets"><li><span class="gram-eng">In some cultures, you are expected to arrive on time.</span> <span class="gram-trans">(Em algumas culturas, espera-se que você chegue na hora.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Children are expected to respect their elders.</span> <span class="gram-trans">(Espera-se que as crianças respeitem os mais velhos.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Guests are expected to bring a gift.</span> <span class="gram-trans">(Espera-se que convidados tragam um presente.)</span></li></ul><h5 class="gram-subhead">ACCEPTABLE TO / NOT ACCEPTABLE TO:</h5><ul class="gram-bullets"><li><span class="gram-eng">In Brazil, it\'s acceptable to be a few minutes late.</span> <span class="gram-trans">(No Brasil, é aceitável estar alguns minutos atrasado.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">It\'s NOT acceptable to talk loudly on the bus.</span> <span class="gram-trans">(Não é aceitável falar alto no ônibus.)</span></li></ul><ul class="gram-bullets"><li>In many cultures, it\'s acceptable to ask personal questions.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>RESUMO DAS ESTRUTURAS:</li></ul><p>Estrutura | Significado | Uso<br>─────────────────────|──────────────────────|──────────────<br>It\'s the custom to | É o costume | Tradição<br>Be supposed to | Deveria / É esperado | Expectativa<br>Be expected to | Espera-se que | Expectativa<br>Be acceptable to | É aceitável | Permissão</p><ul class="gram-bullets"><li>SUPPOSED TO tem nuances diferentes: - "You\'re SUPPOSED TO bow." (é o costume - faça isso) - "You\'re NOT SUPPOSED TO smoke here." (proibido por regra)</li></ul><ul class="gram-bullets"><li>PRONÚNCIA de "supposed to": Na fala natural, "supposed to" soa como "supposta" - é normal.</li></ul><ul class="gram-bullets"><li>OUTRAS ESTRUTURAS para expectativas culturais: - "It\'s customary to..." (é costumeiro) - "Tradition says you should..." - "It\'s considered polite to..." - "It\'s considered rude to..."</li></ul><ul class="gram-bullets"><li>CONTEXTOS típicos para usar essas estruturas: - Viagens internacionais - Mudança para outro país - Diferenças culturais - Negócios internacionais - Convites sociais</li></ul><ul class="gram-bullets"><li>FRASES ÚTEIS para comparar culturas: - "In Brazil, we usually... but in the US, people..." - "What\'s considered polite here might be rude there." - "Different cultures have different expectations about..."</li></ul><ul class="gram-bullets"><li>"(NOT) SUPPOSED TO" no PASSADO: - "He WAS supposed to call yesterday." (mas não ligou) - "She WAS NOT supposed to know." (mas descobriu)</li></ul></div></div>'},
{order:1007,badge:'U7',topic:'PREPOSITIONS OF CAUSE & INFINITIVE CLAUSES AND PHRASES',book:'Green book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta unidade aborda como falar sobre CAUSAS de problemas (especialmente<br>ambientais e sociais) e como propor SOLUÇÕES e AÇÕES:</p><p>1) PREPOSITIONS OF CAUSE (Preposições de Causa)<br>Estruturas para explicar a ORIGEM ou MOTIVO de um problema.</p><p>2) INFINITIVE CLAUSES AND PHRASES<br>Estruturas com infinitivo para descrever soluções e propósitos.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">PREPOSITIONS OF CAUSE (Preposições de Causa):</h5><p>Todas vão antes de SUBSTANTIVOS (não orações):</p><ul class="gram-bullets"><li>BECAUSE OF + substantivo</li><li>DUE TO + substantivo</li><li>AS A RESULT OF + substantivo</li><li>OWING TO + substantivo (mais formal)</li><li>THANKS TO + substantivo (causa positiva)</li></ul><h5 class="gram-subhead">INFINITIVE CLAUSES (with TO):</h5><p>Sujeito + verbo + TO + verbo (forma original) + complemento</p><p>Usado para expressar PROPÓSITO/FINALIDADE.</p><h5 class="gram-subhead">INFINITIVE PHRASES (with FOR):</h5><p>FOR + verbo-ING + ... (descreve UTILIDADE)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">PREPOSITIONS OF CAUSE (causa):</h5><ul class="gram-bullets"><li><span class="gram-eng">Climate change is happening because of pollution.</span> <span class="gram-trans">(A mudança climática está acontecendo por causa da poluição.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Many species are extinct due to human activities.</span> <span class="gram-trans">(Muitas espécies estão extintas devido a atividades humanas.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Sea levels are rising as a result of global warming.</span> <span class="gram-trans">(Os níveis do mar estão subindo como resultado do aquecimento global.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">The river is polluted owing to industrial waste.</span> <span class="gram-trans">(O rio está poluído devido a resíduos industriais.)</span></li></ul><h5 class="gram-subhead">INFINITIVE CLAUSES (com TO - propósito):</h5><ul class="gram-bullets"><li><span class="gram-eng">We need to reduce pollution to save the planet.</span> <span class="gram-trans">(Precisamos reduzir a poluição para salvar o planeta.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">People should use public transport to help the environment.</span> <span class="gram-trans">(As pessoas deveriam usar transporte público para ajudar o ambiente.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">We must recycle to protect natural resources.</span> <span class="gram-trans">(Devemos reciclar para proteger os recursos naturais.)</span></li></ul><h5 class="gram-subhead">INFINITIVE PHRASES (com FOR - utilidade):</h5><ul class="gram-bullets"><li><span class="gram-eng">Solar panels are good for generating clean energy.</span> <span class="gram-trans">(Painéis solares são bons para gerar energia limpa.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">This program is designed for reducing waste.</span> <span class="gram-trans">(Este programa foi feito para reduzir o desperdício.)</span></li></ul><ul class="gram-bullets"><li>Bicycles are useful for getting around the city.</li></ul><h5 class="gram-subhead">COMBINANDO CAUSA E SOLUÇÃO:</h5><ul class="gram-bullets"><li>Because of air pollution, we should drive less to reduce emissions.</li><li>Due to deforestation, we need to plant more trees to save forests.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>⚠️ DIFERENÇA CRUCIAL: BECAUSE vs BECAUSE OF</li></ul><p>Estrutura | O que vem depois | Exemplo<br>──────────────|─────────────────────────|──────────────────────────<br>BECAUSE | Sujeito + verbo (oração)| because it was hot<br>BECAUSE OF | Substantivo | because of the heat</p><ul class="gram-bullets"><li>PREPOSIÇÕES DE CAUSA - quando usar cada uma:</li></ul><p>Expressão | Tom/Uso<br>─────────────────|────────────────────────────<br>Because of | Comum, conversacional<br>Due to | Mais formal, escrita<br>As a result of | Resultado direto/claro<br>Owing to | Muito formal<br>Thanks to | Causa POSITIVA</p><ul class="gram-bullets"><li>INFINITIVO DE PROPÓSITO (com TO): - "I exercise TO BE healthy." (para ser saudável) - "She studies TO LEARN." (para aprender)</li></ul><p>Pode ser substituído por "IN ORDER TO" (mais formal):<br>- "I exercise IN ORDER TO be healthy."</p><ul class="gram-bullets"><li>Verbos comuns para propor SOLUÇÕES ambientais/sociais: - reduce (reduzir) - increase (aumentar) - prevent (prevenir) - protect (proteger) - improve (melhorar) - solve (resolver) - eliminate (eliminar)</li></ul><ul class="gram-bullets"><li>Frases típicas para CONTEXTO AMBIENTAL/SOCIAL: - "One way to solve this problem is to..." - "We can prevent this by..." - "Governments should..." - "It\'s important to..."</li></ul><ul class="gram-bullets"><li>ATENÇÃO ao usar FOR + gerúndio: - Para descrever UTILIDADE: "This is FOR cleaning." - Para descrever DURAÇÃO: "FOR three hours." São usos diferentes!</li></ul><ul class="gram-bullets"><li>EM CONTEXTO AMBIENTAL, formação típica: [PROBLEMA] is caused by [CAUSA]. To solve this, we need to [SOLUÇÃO].</li></ul><p>Exemplo:<br>"Pollution is caused by factories. To solve this, we need to<br>use clean energy."</p></div></div>'},
{order:1008,badge:'U8',topic:'BY + GERUND (para descrever MÉTODOS)',book:'Green book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>A estrutura BY + GERUND (verbo + ING) é usada para descrever o MÉTODO ou<br>a MANEIRA como algo é feito.</p><p>É como responder à pergunta "COMO?" - explica o PROCESSO ou TÉCNICA usada<br>para alcançar um resultado.</p><p>Em português, equivale a:</p><ul class="gram-bullets"><li>"Fazendo X..."</li><li>"Ao fazer X..."</li><li>"Através de X..."</li></ul></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA BÁSICA:</h5><p>Oração principal + BY + verbo + ING + complemento</p><p>ou</p><p>BY + verbo + ING + complemento, + oração principal</p><h5 class="gram-subhead">A preposição BY indica o MÉTODO usado:</h5><p>"I learned English BY watching movies."<br>= O método foi assistir filmes</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">DESCREVENDO MÉTODOS DE APRENDIZAGEM (foco da unidade):</h5><ul class="gram-bullets"><li><span class="gram-eng">You can improve your English by watching movies.</span> <span class="gram-trans">(Você pode melhorar seu inglês assistindo filmes.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She learned to cook by watching her grandmother.</span> <span class="gram-trans">(Ela aprendeu a cozinhar observando a avó.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">I memorize vocabulary by writing it many times.</span> <span class="gram-trans">(Eu memorizo vocabulário escrevendo várias vezes.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Students learn best by practicing regularly.</span> <span class="gram-trans">(Estudantes aprendem melhor praticando regularmente.)</span></li></ul><h5 class="gram-subhead">DESCREVENDO COMO FAZER ATIVIDADES:</h5><ul class="gram-bullets"><li><span class="gram-eng">You can lose weight by exercising and eating healthy.</span> <span class="gram-trans">(Você pode perder peso se exercitando e comendo saudável.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">He earned money by selling handmade products.</span> <span class="gram-trans">(Ele ganhou dinheiro vendendo produtos artesanais.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">We can save the environment by reducing plastic use.</span> <span class="gram-trans">(Podemos salvar o ambiente reduzindo o uso de plástico.)</span></li></ul><h5 class="gram-subhead">DESCREVENDO SUCESSO/RESULTADOS:</h5><ul class="gram-bullets"><li><span class="gram-eng">She passed the test by studying hard.</span> <span class="gram-trans">(Ela passou na prova estudando muito.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">They won the game by playing as a team.</span> <span class="gram-trans">(Eles venceram o jogo jogando em equipe.)</span></li></ul><ul class="gram-bullets"><li>You become better at something by doing it every day.</li></ul><h5 class="gram-subhead">EM CONTEXTO PROFISSIONAL:</h5><ul class="gram-bullets"><li><span class="gram-eng">You can advance in your career by networking.</span> <span class="gram-trans">(Você pode avançar na carreira fazendo networking.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Improve your skills by taking online courses.</span> <span class="gram-trans">(Melhore suas habilidades fazendo cursos online.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: após "BY" sempre use o verbo no GERÚNDIO (-ING): ❌ I improved my English by watch movies. ❌ I improved my English by to watch movies. ✔️ I improved my English by WATCHING movies.</li></ul><ul class="gram-bullets"><li>"BY + GERUND" responde à pergunta "HOW?": - "How did you learn English?" - "BY WATCHING movies and BY READING books."</li></ul><ul class="gram-bullets"><li>ATENÇÃO à diferença entre BY e WITH: - BY + método/maneira: "I learned BY practicing." (método) - WITH + instrumento: "I cut it WITH a knife." (instrumento)</li></ul><ul class="gram-bullets"><li>EXPRESSÕES SIMILARES (mas com estruturas diferentes): - "THROUGH practice" (através de prática) - "BY MEANS OF + substantivo" (por meio de - mais formal) - "VIA + substantivo" (via - formal)</li></ul><ul class="gram-bullets"><li>PARA APRENDIZADO DE IDIOMAS, frases úteis: - "You can practice listening by watching movies." - "You improve speaking by talking with native speakers." - "You learn grammar by reading books." - "You build vocabulary by using flashcards."</li></ul><ul class="gram-bullets"><li>OUTRAS FORMAS de expressar método:</li></ul><p>Estrutura | Exemplo<br>─────────────────────|─────────────────────────────────<br>BY + V-ING | I learned by practicing.<br>THROUGH + N | I learned through practice.<br>HOW + S + V | This is how I learned.<br>BY MEANS OF + N | By means of hard work, I succeeded.</p><ul class="gram-bullets"><li><span class="gram-eng">ESTRUTURA NEGATIVA: - "You can\'t pass the test BY NOT STUDYING."</span> <span class="gram-trans">(Você não pode passar na prova não estudando.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Em frases mais longas, pode-se INVERTER a ordem: - "By practicing every day, you\'ll see improvement." - "You\'ll see improvement by practicing every day."</span> <span class="gram-trans">(com vírgula quando "by" começa a frase)</span></li></ul><ul class="gram-bullets"><li>Use BY + GERUND para dar CONSELHOS práticos: - "Improve your health by exercising daily." - "Save money by spending less." - "Reduce stress by meditating."</li></ul></div></div>'},
