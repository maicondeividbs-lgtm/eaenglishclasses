{order:103,badge:'103',topic:'INDIRECT MESSAGES (Mensagens Indiretas)',book:'Red book',ref:'Red book - pg. 103',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Quando queremos pedir a alguém para COMUNICAR algo a uma TERCEIRA PESSOA,<br>usamos as estruturas com TELL e ASK.</p><p>A escolha entre TELL e ASK depende do TIPO de mensagem:</p><ul class="gram-bullets"><li>TELL → para PASSAR UMA INFORMAÇÃO a alguém</li><li>ASK → para PEDIR/SOLICITAR algo a alguém</li></ul></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">USANDO TELL (passar informação):</h5><p>Please, TELL + (pessoa) + (that) + MENSAGEM<br>Could you please TELL + (pessoa) + (that) + MENSAGEM?<br>Would you please TELL + (pessoa) + (that) + MENSAGEM?</p><h5 class="gram-subhead">USANDO ASK (pedir/solicitar):</h5><p>Please, ASK + (pessoa) + TO + verbo<br>Could you ASK + (pessoa) + TO + verbo?<br>Would you ASK + (pessoa) + TO + verbo?</p><h5 class="gram-subhead">NÍVEIS DE FORMALIDADE:</h5><p>PLEASE → educado básico<br>COULD YOU → mais educado<br>WOULD YOU → mais formal/educado</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM TELL (passar informação):</h5><ul class="gram-bullets"><li><span class="gram-eng">Please, tell Mr. Smith that I\'ll be late to the appointment.</span> <span class="gram-trans">(Por favor, diga ao Sr. Smith que vou me atrasar para o compromisso.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Could you please tell Mr. Smith that I\'ll be late to the appointment?</span> <span class="gram-trans">(Você poderia, por favor, dizer ao Sr. Smith que vou me atrasar?)</span></li></ul><ul class="gram-bullets"><li>Would you please tell Mr. Smith that I\'ll be late to the appointment?</li></ul><h5 class="gram-subhead">COM ASK (pedir/solicitar):</h5><ul class="gram-bullets"><li><span class="gram-eng">Please, ask Julia to bring my shirt.</span> <span class="gram-trans">(Por favor, peça à Julia para trazer minha camisa.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Could you ask Julia to bring my shirt?</span> <span class="gram-trans">(Você poderia pedir à Julia para trazer minha camisa?)</span></li></ul><ul class="gram-bullets"><li>Would you ask Julia to bring my shirt?</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA IMPORTANTE: A preposição "TO" é OBRIGATÓRIA ao usar ASK. ❌ Could you ask Julia bring my shirt? ✔️ Could you ask Julia TO bring my shirt?</li></ul><ul class="gram-bullets"><li>A palavra "THAT" depois de TELL é OPCIONAL na conversação: - Tell him (that) I\'m coming. - Tell him I\'m coming.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Diferença essencial entre TELL e ASK: - TELL → comunicar uma informação ("diga a ele que...") - ASK → solicitar uma ação</span> <span class="gram-trans">("peça a ele para...")</span></li></ul><ul class="gram-bullets"><li>Para tornar ainda mais educado em situações formais, comece com: - "Would you mind telling..." - "I was wondering if you could ask..."</li></ul></div></div>'},
{order:1001,badge:'U1',topic:'SUBJECT PRONOUNS (Pronomes Sujeito)',book:'Red book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Os SUBJECT PRONOUNS (Pronomes Sujeito) são palavras usadas para SUBSTITUIR<br>o sujeito de uma frase, evitando repetições de nomes.</p><p>Eles representam quem FAZ a ação do verbo - ou seja, são o SUJEITO da<br>frase, sempre vindo ANTES do verbo.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">TABELA DE SUBJECT PRONOUNS:</h5><p>PESSOA PRONOME SIGNIFICADO<br>─────────────────────────────────────────────<br>1ª pessoa sing. I Eu<br>2ª pessoa YOU Você / Tu<br>3ª pessoa sing. HE Ele (masculino)<br>3ª pessoa sing. SHE Ela (feminino)<br>3ª pessoa sing. IT Isso (objetos, animais)<br>1ª pessoa plur. WE Nós<br>2ª pessoa plur. YOU Vocês<br>3ª pessoa plur. THEY Eles / Elas</p><h5 class="gram-subhead">POSIÇÃO NA FRASE:</h5><p>SUBJECT PRONOUN + VERBO + complemento</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM CADA PRONOME:</h5><ul class="gram-bullets"><li><span class="gram-eng">I am a student.</span> <span class="gram-trans">(Eu sou estudante.)</span></li><li><span class="gram-eng">You are my friend.</span> <span class="gram-trans">(Você é meu amigo.)</span></li><li><span class="gram-eng">He is a doctor.</span> <span class="gram-trans">(Ele é médico.)</span></li><li><span class="gram-eng">She is beautiful.</span> <span class="gram-trans">(Ela é linda.)</span></li><li><span class="gram-eng">It is a nice day.</span> <span class="gram-trans">(É um dia bonito.)</span></li><li><span class="gram-eng">We are happy.</span> <span class="gram-trans">(Nós estamos felizes.)</span></li><li><span class="gram-eng">You are funny.</span> <span class="gram-trans">(Vocês são engraçados.)</span></li><li><span class="gram-eng">They are my parents.</span> <span class="gram-trans">(Eles são meus pais.)</span></li></ul><h5 class="gram-subhead">SUBSTITUINDO NOMES POR PRONOMES:</h5><ul class="gram-bullets"><li>Maria is a teacher. → She is a teacher.</li><li>John and I are friends. → We are friends.</li><li>The book is new. → It is new.</li><li>Tom and Lisa are here. → They are here.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>"I" SEMPRE EM MAIÚSCULO! Mesmo no meio da frase, "I" é sempre escrito em letra maiúscula: - I am happy. - John and I are friends. - Yesterday, I went home.</li></ul><ul class="gram-bullets"><li>YOU serve para SINGULAR e PLURAL: - You (sing.) are my friend. (Você) - You (pl.) are my friends. (Vocês) O contexto define se é singular ou plural.</li></ul><ul class="gram-bullets"><li>IT é usado para: - Objetos: "The book? It\'s on the table." - Animais (quando não específico/conhecido): "Look at that dog! It\'s cute." - Clima/tempo: "It\'s raining." - Datas/horas: "It\'s Monday." / "It\'s 5 o\'clock."</li></ul><ul class="gram-bullets"><li>Quando há vários sujeitos, use WE ou THEY: - You and I → WE - John and Mary → THEY - The boys → THEY</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Não confunda SUBJECT PRONOUNS com OBJECT PRONOUNS: - Subject: I, you, he, she, it, we, they (fazem a ação) - Object: me, you, him, her, it, us, them</span> <span class="gram-trans">(recebem a ação)</span></li></ul><p>Exemplos:<br>- SHE loves HIM. (subject + object)<br>- WE saw THEM. (subject + object)</p><ul class="gram-bullets"><li>Em inglês, é OBRIGATÓRIO incluir o pronome sujeito (diferente do português, onde podemos omiti-lo): ❌ Am happy. ✔️ I am happy.</li></ul></div></div>'},
{order:1002,badge:'U2',topic:'TIME EXPRESSIONS (AT, IN, ON, AROUND, EARLY, LATE,',book:'Red book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta unidade aprofunda as EXPRESSÕES DE TEMPO em inglês, apresentando<br>preposições e advérbios que indicam QUANDO ou DENTRO DE QUAL PERÍODO algo<br>acontece.</p><p>Cada palavra tem um uso específico, e escolher a errada pode mudar o<br>significado completamente.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">PREPOSIÇÕES PARA TEMPO:</h5><p>AT → horários específicos<br>at 7:00, at noon, at midnight, at night</p><p>IN → períodos extensos (mês, ano, estação, parte do dia)<br>in the morning, in May, in 2024, in summer</p><p>ON → dias específicos (datas, dias da semana)<br>on Monday, on July 5th, on weekends</p><p>AROUND → "por volta de" (aproximação)<br>around 8:00, around noon</p><h5 class="gram-subhead">ADVÉRBIOS DE TEMPO:</h5><p>EARLY → cedo<br>LATE → tarde</p><h5 class="gram-subhead">CONECTORES TEMPORAIS:</h5><p>UNTIL → até (limite temporal)<br>BEFORE → antes (de algo)<br>AFTER → depois (de algo)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">AT (horário específico):</h5><ul class="gram-bullets"><li><span class="gram-eng">I wake up at 6:00.</span> <span class="gram-trans">(Acordo às 6:00.)</span></li><li><span class="gram-eng">The class starts at noon.</span> <span class="gram-trans">(A aula começa ao meio-dia.)</span></li></ul><h5 class="gram-subhead">IN (períodos):</h5><ul class="gram-bullets"><li><span class="gram-eng">I study in the morning.</span> <span class="gram-trans">(Estudo de manhã.)</span></li><li>She works in March.</li><li>They got married in 2020.</li></ul><h5 class="gram-subhead">ON (dias):</h5><ul class="gram-bullets"><li><span class="gram-eng">I have class on Monday.</span> <span class="gram-trans">(Tenho aula na segunda-feira.)</span></li><li><span class="gram-eng">We meet on weekends.</span> <span class="gram-trans">(Nos encontramos nos fins de semana.)</span></li></ul><h5 class="gram-subhead">AROUND (aproximação):</h5><ul class="gram-bullets"><li><span class="gram-eng">The party starts around 9:00.</span> <span class="gram-trans">(A festa começa por volta das 9:00.)</span></li><li><span class="gram-eng">She arrives around noon.</span> <span class="gram-trans">(Ela chega por volta do meio-dia.)</span></li></ul><h5 class="gram-subhead">EARLY / LATE:</h5><ul class="gram-bullets"><li><span class="gram-eng">I always arrive early.</span> <span class="gram-trans">(Eu sempre chego cedo.)</span></li><li><span class="gram-eng">He is late for work.</span> <span class="gram-trans">(Ele está atrasado para o trabalho.)</span></li><li><span class="gram-eng">I went to bed late last night.</span> <span class="gram-trans">(Fui dormir tarde ontem.)</span></li></ul><h5 class="gram-subhead">UNTIL (até):</h5><ul class="gram-bullets"><li><span class="gram-eng">I work until 6 PM.</span> <span class="gram-trans">(Trabalho até as 18h.)</span></li><li><span class="gram-eng">She studied until midnight.</span> <span class="gram-trans">(Ela estudou até meia-noite.)</span></li></ul><h5 class="gram-subhead">BEFORE (antes):</h5><ul class="gram-bullets"><li><span class="gram-eng">I have coffee before work.</span> <span class="gram-trans">(Tomo café antes do trabalho.)</span></li><li>Eat something before the class.</li></ul><h5 class="gram-subhead">AFTER (depois):</h5><ul class="gram-bullets"><li><span class="gram-eng">I exercise after work.</span> <span class="gram-trans">(Eu me exercito depois do trabalho.)</span></li><li>She rests after dinner.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>RESUMO RÁPIDO de AT, IN, ON com tempo:</li></ul><p>Preposição | Quando usar | Exemplos<br>────────────|──────────────────────────|─────────────────<br>AT | Horário específico | at 7:00, at noon<br>IN | Período extenso | in May, in 2024<br>ON | Dias e datas | on Monday</p><ul class="gram-bullets"><li>EXCEÇÃO importante: - "at night" (sem "the") - "in the morning/afternoon/evening" (com "the")</li></ul><ul class="gram-bullets"><li>AROUND = APPROXIMATELY: - "around 7:00" significa quase 7:00 (pode ser 6:50 ou 7:10) - É usado quando não sabemos a hora exata</li></ul><ul class="gram-bullets"><li>EARLY e LATE: - Podem ser ADJETIVOS: "an early flight" (um voo cedo) - Ou ADVÉRBIOS: "I arrived late" (cheguei tarde)</li></ul><ul class="gram-bullets"><li>UNTIL vs BY: - UNTIL → algo CONTINUA até um momento "I\'ll wait UNTIL 8 PM." (vou esperar até as 20h) - BY → algo SE COMPLETA até um momento "Finish it BY 8 PM." (termine antes das 20h)</li></ul><ul class="gram-bullets"><li><span class="gram-eng">BEFORE e AFTER podem ser preposições OU conjunções: - PREPOSIÇÃO: "Before lunch" (antes do almoço) - CONJUNÇÃO: "Before I have lunch"</span> <span class="gram-trans">(antes de eu almoçar)</span></li></ul></div></div>'},
{order:1004,badge:'U4',topic:'VERB + TO + VERB / MODAL VERB WOULD',book:'Red book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta unidade aborda dois conteúdos relacionados:</p><p>1) VERB + TO + VERB<br>Alguns verbos em inglês são seguidos por outro verbo no INFINITIVO<br>(TO + verbo). Esta é uma estrutura essencial para expressar planos,<br>intenções e preferências.</p><p>2) MODAL VERB WOULD<br>O modal WOULD é frequentemente usado para fazer CONVITES POLIDOS e<br>expressar PREFERÊNCIAS de forma educada.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA VERB + TO + VERB:</h5><p>Sujeito + verbo1 + TO + verbo2 (forma original)</p><h5 class="gram-subhead">VERBOS COMUNS QUE PEDEM INFINITIVO (to + verb):</h5><p>WANT TO → querer (fazer)<br>NEED TO → precisar (fazer)<br>LIKE TO → gostar de (fazer)<br>LOVE TO → adorar (fazer)<br>HOPE TO → esperar (fazer)<br>PLAN TO → planejar (fazer)<br>HAVE TO → ter que (fazer)<br>DECIDE TO → decidir (fazer)</p><h5 class="gram-subhead">WOULD para PREFERÊNCIAS E CONVITES:</h5><ul class="gram-bullets"><li><span class="gram-eng">Would you like to + verbo + ...?</span> <span class="gram-trans">(Você gostaria de...?)</span></li><li><span class="gram-eng">I would like to + verbo + ...</span> <span class="gram-trans">(Eu gostaria de...)</span></li><li><span class="gram-eng">I\'d like + substantivo</span> <span class="gram-trans">(Eu gostaria de...)</span></li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">VERB + TO + VERB:</h5><ul class="gram-bullets"><li><span class="gram-eng">I want to study English.</span> <span class="gram-trans">(Eu quero estudar inglês.)</span></li><li><span class="gram-eng">She needs to work tomorrow.</span> <span class="gram-trans">(Ela precisa trabalhar amanhã.)</span></li><li><span class="gram-eng">They like to play soccer.</span> <span class="gram-trans">(Eles gostam de jogar futebol.)</span></li><li><span class="gram-eng">He hopes to travel next year.</span> <span class="gram-trans">(Ele espera viajar ano que vem.)</span></li><li>We plan to buy a house.</li></ul><h5 class="gram-subhead">COM WOULD - CONVITES POLIDOS:</h5><ul class="gram-bullets"><li><span class="gram-eng">Would you like to go to the movies?</span> <span class="gram-trans">(Você gostaria de ir ao cinema?)</span></li><li><span class="gram-eng">Would you like to have dinner with us?</span> <span class="gram-trans">(Você gostaria de jantar conosco?)</span></li><li><span class="gram-eng">Would she like to join us?</span> <span class="gram-trans">(Ela gostaria de se juntar a nós?)</span></li></ul><h5 class="gram-subhead">COM WOULD - EXPRESSANDO PREFERÊNCIAS:</h5><ul class="gram-bullets"><li><span class="gram-eng">I would like to learn French.</span> <span class="gram-trans">(Eu gostaria de aprender francês.)</span></li><li><span class="gram-eng">I\'d like a coffee, please.</span> <span class="gram-trans">(Eu gostaria de um café, por favor.)</span></li></ul><h5 class="gram-subhead">RESPOSTAS A CONVITES COM WOULD:</h5><p>- Would you like to dance?<br>- Yes, I would. / Yes, I\'d love to. (aceitando)<br>- No, thank you. / I\'d rather not. (recusando educadamente)</p></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: depois desses verbos, sempre TO + VERBO ORIGINAL: ❌ I want studying. ❌ I want study. ✔️ I want TO STUDY.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Diferença entre LIKE e WOULD LIKE: - LIKE → gosto em geral (preferência permanente) "I LIKE coffee." (gosto de café em geral) - WOULD LIKE → quero agora (desejo no momento) "I WOULD LIKE a coffee."</span> <span class="gram-trans">(gostaria de um café agora)</span></li></ul><ul class="gram-bullets"><li>WOULD = mais POLIDO que WANT: - "I want some water." (mais direto, menos educado) - "I would like some water." (mais educado, especialmente com estranhos)</li></ul><ul class="gram-bullets"><li>Contração de WOULD: - I would → I\'d - You would → You\'d - She would → She\'d - They would → They\'d</li></ul><ul class="gram-bullets"><li>Cuidado com a tradução: - "Would you like..." NÃO é uma pergunta condicional! - É uma forma educada de oferecer ou perguntar sobre desejos.</li></ul><ul class="gram-bullets"><li>Alguns verbos podem ser seguidos por TO+VERBO ou VERBO-ING: - I LIKE TO READ. ✔️ - I LIKE READING. ✔️ (significados muito parecidos)</li></ul><p>Mas alguns SÓ aceitam infinitivo:<br>- I WANT TO STUDY. ✔️<br>- I WANT STUDYING. ❌</p></div></div>'},
{order:1010,badge:'U10',topic:'PRESENT PERFECT - ALREADY, YET, EVER, NEVER, FOR, SINCE',book:'Red book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O PRESENT PERFECT vem acompanhado de MARCADORES TEMPORAIS específicos<br>que ajudam a definir QUANDO ou QUANTAS VEZES algo aconteceu, sem dar<br>um tempo exato.</p><p>Cada marcador é usado em situações diferentes:</p><ul class="gram-bullets"><li>ALREADY → "já" (algo feito ANTES do esperado)</li><li>YET → "ainda" (em negativas e perguntas)</li><li>EVER → "alguma vez" (em perguntas)</li><li>NEVER → "nunca"</li><li><span class="gram-eng">FOR → "por/há"</span> <span class="gram-trans">(duração)</span></li><li><span class="gram-eng">SINCE → "desde"</span> <span class="gram-trans">(ponto de início)</span></li></ul></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ALREADY (já):</h5><p>Sujeito + HAVE/HAS + ALREADY + past participle</p><ul class="gram-bullets"><li>Usado em afirmativas</li><li>Vai entre o auxiliar e o verbo</li></ul><h5 class="gram-subhead">YET (ainda / já?):</h5><ul class="gram-bullets"><li>Em NEGATIVAS: HAVEN\'T/HASN\'T + past participle + YET</li><li>Em INTERROGATIVAS: HAVE/HAS + sujeito + past participle + YET?</li><li>Sempre vai no FIM da frase</li></ul><h5 class="gram-subhead">EVER (alguma vez):</h5><p>HAVE/HAS + sujeito + EVER + past participle?</p><ul class="gram-bullets"><li>Usado quase exclusivamente em perguntas</li></ul><h5 class="gram-subhead">NEVER (nunca):</h5><p>Sujeito + HAVE/HAS + NEVER + past participle</p><ul class="gram-bullets"><li>Tem sentido negativo (substitui "not")</li></ul><h5 class="gram-subhead">FOR (por / há - DURAÇÃO):</h5><p>... + HAVE/HAS + past participle + FOR + tempo</p><ul class="gram-bullets"><li>Indica DURAÇÃO total</li></ul><h5 class="gram-subhead">SINCE (desde - PONTO INICIAL):</h5><p>... + HAVE/HAS + past participle + SINCE + ponto no tempo</p><ul class="gram-bullets"><li>Indica PONTO ESPECÍFICO de início</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">ALREADY (já - antes do esperado):</h5><ul class="gram-bullets"><li><span class="gram-eng">I have already finished my homework.</span> <span class="gram-trans">(Eu já terminei minha lição.)</span></li><li>She has already eaten dinner.</li><li>We have already seen that movie.</li></ul><h5 class="gram-subhead">YET (em negativas e perguntas):</h5><ul class="gram-bullets"><li><span class="gram-eng">I haven\'t finished my homework yet.</span> <span class="gram-trans">(Eu ainda não terminei minha lição.)</span></li><li><span class="gram-eng">Has she arrived yet?</span> <span class="gram-trans">(Ela já chegou?)</span></li><li>They haven\'t called yet.</li></ul><h5 class="gram-subhead">EVER (em perguntas):</h5><ul class="gram-bullets"><li><span class="gram-eng">Have you ever been to Japan?</span> <span class="gram-trans">(Você já esteve no Japão alguma vez?)</span></li><li>Has he ever tried sushi?</li><li>Have they ever met your parents?</li></ul><h5 class="gram-subhead">NEVER (nunca):</h5><ul class="gram-bullets"><li><span class="gram-eng">I have never been to Japan.</span> <span class="gram-trans">(Eu nunca estive no Japão.)</span></li><li>She has never tried sushi.</li><li>We have never met him.</li></ul><h5 class="gram-subhead">FOR (duração):</h5><ul class="gram-bullets"><li><span class="gram-eng">I have lived here for 10 years.</span> <span class="gram-trans">(Moro aqui há 10 anos.)</span></li><li>She has worked at this company for 5 years.</li><li>They have been married for a long time.</li></ul><h5 class="gram-subhead">SINCE (ponto inicial):</h5><ul class="gram-bullets"><li><span class="gram-eng">I have lived here since 2014.</span> <span class="gram-trans">(Moro aqui desde 2014.)</span></li><li>She has worked here since January.</li><li>We have been friends since college.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>RESUMO RÁPIDO:</li></ul><p>Marcador | Posição típica | Tipo de frase<br>──────────|──────────────────────────|──────────────<br>ALREADY | entre have/has e o verbo | afirmativa<br>YET | fim da frase | negativa/pergunta<br>EVER | antes do past participle | pergunta<br>NEVER | antes do past participle | substitui negação<br>FOR | depois do verbo + tempo | qualquer<br>SINCE | depois do verbo + tempo | qualquer</p><ul class="gram-bullets"><li>FOR vs SINCE - a maior dificuldade: - FOR + DURAÇÃO (quanto tempo) for 2 hours, for 10 years, for a long time - SINCE + PONTO ESPECÍFICO since 2010, since Monday, since I was 5</li></ul><ul class="gram-bullets"><li>NEVER já é NEGATIVO! Não use "not" junto: ❌ I haven\'t never been there. ✔️ I have never been there.</li></ul><ul class="gram-bullets"><li>EVER em afirmativas? Raramente usado - geralmente só em superlativos: - "It\'s the best movie I\'ve ever seen."</li></ul><ul class="gram-bullets"><li>ALREADY pode ir no FINAL para ênfase: - "I have finished already!" - "I have already finished." (mais neutro)</li></ul><ul class="gram-bullets"><li>Em INGLÊS AMERICANO, às vezes usa-se Simple Past onde British usa Present Perfect: - American: "Did you finish yet?" - British: "Have you finished yet?"</li></ul></div></div>'},
{order:1012,badge:'U12',topic:'ADJECTIVE + INFINITIVE / NOUN + INFINITIVE',book:'Red book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Em inglês, é muito comum usar a estrutura ADJETIVO + INFINITIVO (to + verb)<br>ou SUBSTANTIVO + INFINITIVO para fazer recomendações, dar conselhos e<br>descrever ações necessárias.</p><p>Essas estruturas são especialmente úteis para falar sobre SAÚDE, BEM-ESTAR<br>e CONSELHOS em geral.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ADJECTIVE + INFINITIVE (it\'s + adjective + to + verb):</h5><p>IT\'S + adjetivo + TO + verbo</p><p>Estrutura impessoal para dar conselhos genéricos.</p><h5 class="gram-subhead">NOUN + INFINITIVE (it\'s + a + noun + to + verb):</h5><p>IT\'S + A/AN + substantivo + TO + verbo</p><p>Estrutura para descrever ações como sendo algo específico<br>(uma boa ideia, uma péssima ideia, etc.).</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM ADJECTIVE + INFINITIVE:</h5><ul class="gram-bullets"><li><span class="gram-eng">It\'s important to get rest.</span> <span class="gram-trans">(É importante descansar.)</span></li><li><span class="gram-eng">It\'s necessary to drink water.</span> <span class="gram-trans">(É necessário beber água.)</span></li><li><span class="gram-eng">It\'s easy to learn English.</span> <span class="gram-trans">(É fácil aprender inglês.)</span></li><li><span class="gram-eng">It\'s difficult to wake up early.</span> <span class="gram-trans">(É difícil acordar cedo.)</span></li><li><span class="gram-eng">It\'s healthy to exercise daily.</span> <span class="gram-trans">(É saudável se exercitar todos os dias.)</span></li></ul><h5 class="gram-subhead">COM NOUN + INFINITIVE:</h5><ul class="gram-bullets"><li><span class="gram-eng">It\'s a good idea to take medicine when you\'re sick.</span> <span class="gram-trans">(É uma boa ideia tomar remédio quando você está doente.)</span></li><li><span class="gram-eng">It\'s a bad habit to eat junk food.</span> <span class="gram-trans">(É um péssimo hábito comer porcaria.)</span></li><li><span class="gram-eng">It\'s a great way to relax.</span> <span class="gram-trans">(É uma ótima forma de relaxar.)</span></li><li><span class="gram-eng">It\'s a good plan to save money.</span> <span class="gram-trans">(É um bom plano economizar dinheiro.)</span></li></ul><h5 class="gram-subhead">EM CONTEXTO DE SAÚDE (uso típico desta unidade):</h5><ul class="gram-bullets"><li>It\'s important to see a doctor.</li><li>It\'s necessary to take your vitamins.</li><li>It\'s a good idea to drink lots of water.</li><li>It\'s helpful to rest when you\'re tired.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>ADJETIVOS COMUNS para esta estrutura: - important (importante) - necessary (necessário) - easy (fácil) / difficult, hard (difícil) - good / bad - healthy / unhealthy - useful (útil) - dangerous (perigoso) - safe (seguro) - common (comum)</li></ul><ul class="gram-bullets"><li>SUBSTANTIVOS COMUNS: - a good/bad idea - a good/bad habit - a great way - a smart move - a wise decision - a mistake</li></ul><ul class="gram-bullets"><li>ESTRUTURA mais formal/educativa: A estrutura "IT\'S + adjective/noun + TO" é mais NEUTRA e IMPESSOAL do que dizer "YOU SHOULD" ou "YOU MUST": - "You should eat vegetables." (direto) - "It\'s healthy to eat vegetables." (impessoal/conselho geral)</li></ul><ul class="gram-bullets"><li>Diferença com a estrutura "FOR + alguém": - "It\'s important to study." (genérico) - "It\'s important FOR ME to study." (específico para mim) - "It\'s important FOR US to be healthy."</li></ul><ul class="gram-bullets"><li>POSIÇÃO do TO: ✔️ It\'s important TO STUDY hard. ❌ It\'s important STUDYING hard.</li></ul><p>Nesta estrutura específica, sempre INFINITIVO, não gerúndio.</p></div></div>'},
{order:1012,badge:'U12',topic:'MODAL VERBS - COULD AND MAY FOR REQUESTS',book:'Red book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Os modais COULD e MAY são usados para fazer PEDIDOS EDUCADOS em inglês.</p><p>Ambos são versões mais polidas do CAN (que estudamos no nível Intro).<br>A escolha entre um e outro depende do nível de FORMALIDADE desejado e<br>do contexto.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">COULD (educado / polido):</h5><p>COULD + sujeito + verbo (forma original) ?</p><p>Pedindo permissão ou favor.</p><h5 class="gram-subhead">MAY (mais formal / muito polido):</h5><p>MAY + sujeito + verbo (forma original) ?</p><p>Especialmente usado em ambientes formais (lojas, hotéis, escritórios).</p><h5 class="gram-subhead">NÍVEL DE FORMALIDADE (do mais informal ao mais formal):</h5><p>CAN → CAN you help me? (casual)<br>COULD → COULD you help me? (educado)<br>MAY → MAY I help you? (muito formal)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">PEDIDOS COM COULD:</h5><ul class="gram-bullets"><li><span class="gram-eng">Could you help me, please?</span> <span class="gram-trans">(Você poderia me ajudar, por favor?)</span></li><li><span class="gram-eng">Could I borrow your pen?</span> <span class="gram-trans">(Eu poderia pegar emprestada sua caneta?)</span></li><li><span class="gram-eng">Could you open the window?</span> <span class="gram-trans">(Você poderia abrir a janela?)</span></li><li><span class="gram-eng">Could she come in?</span> <span class="gram-trans">(Ela poderia entrar?)</span></li></ul><h5 class="gram-subhead">PEDIDOS COM MAY (formais):</h5><ul class="gram-bullets"><li><span class="gram-eng">May I help you?</span> <span class="gram-trans">(Posso ajudá-lo? - clássico em lojas)</span></li><li><span class="gram-eng">May I come in?</span> <span class="gram-trans">(Posso entrar? - muito formal)</span></li><li><span class="gram-eng">May I ask a question?</span> <span class="gram-trans">(Posso fazer uma pergunta?)</span></li><li><span class="gram-eng">May I see your ID, please?</span> <span class="gram-trans">(Posso ver seu documento, por favor?)</span></li></ul><h5 class="gram-subhead">COMPARANDO OS TRÊS:</h5><ul class="gram-bullets"><li>Can you pass the salt? (informal - entre amigos)</li><li>Could you pass the salt? (educado - mais polido)</li><li>May I have the salt? (formal - jantar elegante)</li></ul><h5 class="gram-subhead">RESPOSTAS POLIDAS:</h5><p>- Could you help me?<br>- Of course! / Sure! / Certainly! (positivas)<br>- I\'m sorry, I can\'t. (negativa educada)</p><p>- May I help you?<br>- Yes, please. / No, thank you, I\'m just looking.</p></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: depois de COULD ou MAY, sempre o verbo na FORMA ORIGINAL: ❌ Could you helps me? ❌ Could you to help me? ✔️ Could you HELP me?</li></ul><ul class="gram-bullets"><li>Quando usar cada um:</li></ul><p>Contexto | Modal recomendado<br>───────────────────────────────|──────────────────<br>Amigos, família, casual | CAN<br>Pessoas que conhecemos pouco | COULD<br>Ambientes formais (loja, banco)| MAY<br>Pedindo permissão a superiores | MAY ou COULD</p><ul class="gram-bullets"><li>PEDINDO PERMISSÃO vs PEDINDO FAVOR: - Permissão: "Could/May I + verbo?" (eu posso?) "Could I leave early?" - Favor: "Could you + verbo?" (você poderia?) "Could you help me?"</li></ul><ul class="gram-bullets"><li>PLEASE torna o pedido ainda mais educado: - Could you help me, please? - May I have a coffee, please?</li></ul><ul class="gram-bullets"><li>MIGHT é uma versão ainda MAIS polida de MAY, mas é raramente usada em pedidos modernos. Soa muito antiquado.</li></ul><ul class="gram-bullets"><li>Para FORMA NEGATIVA (recusando): - I\'m sorry, I can\'t. - I\'m afraid not. - No, you may not. (muito formal/firme)</li></ul></div></div>'},
{order:1013,badge:'U13',topic:'SO, TOO, NEITHER, EITHER',book:'Red book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Em inglês, há quatro palavras importantes para EXPRESSAR CONCORDÂNCIA<br>com o que outra pessoa diz:</p><ul class="gram-bullets"><li><span class="gram-eng">SO → "também"</span> <span class="gram-trans">(concordando com afirmação POSITIVA - forma invertida)</span></li><li><span class="gram-eng">TOO → "também"</span> <span class="gram-trans">(concordando com afirmação POSITIVA - forma normal)</span></li><li><span class="gram-eng">NEITHER → "também não"</span> <span class="gram-trans">(concordando com afirmação NEGATIVA - inversão)</span></li><li><span class="gram-eng">EITHER → "também não"</span> <span class="gram-trans">(concordando com afirmação NEGATIVA - normal)</span></li></ul><p>A escolha depende se a frase é POSITIVA ou NEGATIVA e da estrutura usada.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM AFIRMAÇÃO POSITIVA:</h5><p>1) SO + auxiliar + sujeito<br>"I like coffee." → "So do I."</p><p>2) Sujeito + auxiliar + TOO<br>"I like coffee." → "I do too."</p><h5 class="gram-subhead">COM AFIRMAÇÃO NEGATIVA:</h5><p>1) NEITHER + auxiliar (positivo) + sujeito<br>"I don\'t like tea." → "Neither do I."</p><p>2) Sujeito + auxiliar (negativo) + EITHER<br>"I don\'t like tea." → "I don\'t either."</p><h5 class="gram-subhead">ESCOLHA DO AUXILIAR:</h5><ul class="gram-bullets"><li>Verbos normais → DO / DOES / DID</li><li>TO BE → AM / IS / ARE / WAS / WERE</li><li>Modais → o próprio modal (CAN, WILL, SHOULD...)</li><li>Perfect → HAVE / HAS / HAD</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM SO (concordando positivamente - invertido):</h5><ul class="gram-bullets"><li><span class="gram-eng">A: I love pizza. B: So do I.</span> <span class="gram-trans">(eu também)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">A: She is tired. B: So am I.</span> <span class="gram-trans">(eu também estou)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">A: They can swim. B: So can I.</span> <span class="gram-trans">(eu também posso)</span></li></ul><ul class="gram-bullets"><li>A: He has been to Paris. B: So have I.</li></ul><h5 class="gram-subhead">COM TOO (concordando positivamente - normal):</h5><ul class="gram-bullets"><li>A: I love pizza. B: I do too.</li></ul><ul class="gram-bullets"><li>A: She is tired. B: I am too.</li></ul><ul class="gram-bullets"><li>A: They can swim. B: I can too.</li></ul><h5 class="gram-subhead">COM NEITHER (concordando negativamente - invertido):</h5><ul class="gram-bullets"><li><span class="gram-eng">A: I don\'t like coffee. B: Neither do I.</span> <span class="gram-trans">(eu também não)</span></li></ul><ul class="gram-bullets"><li>A: She isn\'t tired. B: Neither am I.</li></ul><ul class="gram-bullets"><li>A: They can\'t swim. B: Neither can I.</li></ul><h5 class="gram-subhead">COM EITHER (concordando negativamente - normal):</h5><ul class="gram-bullets"><li>A: I don\'t like coffee. B: I don\'t either.</li></ul><ul class="gram-bullets"><li>A: She isn\'t tired. B: I\'m not either.</li></ul><ul class="gram-bullets"><li>A: They can\'t swim. B: I can\'t either.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>TABELA RESUMO:</li></ul><p>Frase original | Concordando com | Concordando com<br>| inversão (SO/NEITHER) | TOO/EITHER<br>─────────────────|───────────────────|──────────────────<br>Positiva (+) | So do I. | I do too.<br>Negativa (-) | Neither do I. | I don\'t either.</p><ul class="gram-bullets"><li>REGRA-CHAVE: o auxiliar usado deve ser o MESMO da frase original: - A: I CAN swim. → B: So CAN I. (modal "can") - A: I AM happy. → B: So AM I. (verbo "to be") - A: I HAVE eaten. → B: So HAVE I. (Present Perfect) - A: I WORK hard. → B: So DO I. (Simple Present → DO)</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Forma SUPER CASUAL (muito comum em conversação): - "Me too." (em vez de "So do I") - "Me neither."</span> <span class="gram-trans">(em vez de "Neither do I")</span></li></ul><ul class="gram-bullets"><li>ATENÇÃO à mudança do verbo: - "I don\'t like coffee." → "I don\'t either." (mantém "don\'t") - "I don\'t like coffee." → "Neither do I." (vira positivo)</li></ul><ul class="gram-bullets"><li>DISCORDANDO: Para discordar de uma afirmação: - A: I like pizza. → B: I don\'t. - A: I don\'t like pizza. → B: I do. - A: She is happy. → B: I\'m not.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">EITHER tem outros usos importantes: - Either... or (ou... ou): "Either you stay or I leave." - "Either of them"</span> <span class="gram-trans">(qualquer um dos dois)</span></li></ul></div></div>'},
{order:1015,badge:'U15',topic:'FUTURE WITH PRESENT CONTINUOUS',book:'Red book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Em inglês, podemos usar o PRESENT CONTINUOUS (forma do -ING) para falar<br>do FUTURO! Isso parece confuso, mas é muito comum e natural.</p><p>Usamos essa estrutura quando temos um PLANO FUTURO ARRANJADO - algo que<br>já marcamos com antecedência, especialmente compromissos sociais e<br>arranjos pessoais.</p><p>Em português, equivale a "Eu vou + verbo" ou "Eu estou + verbo + andamento".</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA (igual ao Present Continuous):</h5><p>SUJEITO + BE (am/is/are) + VERBO + ING + EXPRESSÃO DE TEMPO FUTURO</p><h5 class="gram-subhead">CARACTERÍSTICAS DESSE USO:</h5><ul class="gram-bullets"><li>Geralmente acompanhado de expressão de TEMPO FUTURO</li><li>Indica algo PLANEJADO/ARRANJADO</li><li>Mais comum com verbos de ações sociais e movimentos</li></ul><h5 class="gram-subhead">EXPRESSÕES DE TEMPO COMUNS:</h5><ul class="gram-bullets"><li>tonight, tomorrow, next week, next month</li><li>later, this evening, this weekend</li><li>on Friday, on Monday, in two days</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">PLANOS PESSOAIS:</h5><ul class="gram-bullets"><li><span class="gram-eng">I\'m meeting my friends tomorrow.</span> <span class="gram-trans">(Vou encontrar meus amigos amanhã.)</span></li><li><span class="gram-eng">She\'s flying to Italy next week.</span> <span class="gram-trans">(Ela vai voar para a Itália na próxima semana.)</span></li><li><span class="gram-eng">We\'re having dinner at 7 PM.</span> <span class="gram-trans">(Vamos jantar às 19h.)</span></li></ul><h5 class="gram-subhead">COMPROMISSOS:</h5><ul class="gram-bullets"><li><span class="gram-eng">He\'s working late tonight.</span> <span class="gram-trans">(Ele vai trabalhar até tarde hoje à noite.)</span></li><li><span class="gram-eng">They\'re getting married in June.</span> <span class="gram-trans">(Eles vão se casar em junho.)</span></li><li><span class="gram-eng">I\'m seeing the doctor on Friday.</span> <span class="gram-trans">(Vou ao médico na sexta-feira.)</span></li></ul><h5 class="gram-subhead">PERGUNTAS:</h5><ul class="gram-bullets"><li><span class="gram-eng">What are you doing this weekend?</span> <span class="gram-trans">(O que você vai fazer este fim de semana?)</span></li><li><span class="gram-eng">Where is she going tomorrow?</span> <span class="gram-trans">(Aonde ela vai amanhã?)</span></li><li><span class="gram-eng">Are you coming to the party?</span> <span class="gram-trans">(Você vai à festa?)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>COMPARAÇÃO entre as 3 formas de FUTURO em inglês:</li></ul><p>Estrutura | Quando usar<br>─────────────────────|──────────────────────────────────<br>Present Continuous | Plano arranjado/marcado<br>(am/is/are + ing) | Ex: "I\'m meeting John at 3."<br>|<br>Be going to + verb | Intenção/decisão prévia<br>| Ex: "I\'m going to study tonight."<br>|<br>Will + verb | Decisão no momento, previsão<br>| Ex: "I\'ll help you."</p><ul class="gram-bullets"><li>DIFERENÇA SUTIL com BE GOING TO: - "I\'m having lunch with Tom tomorrow." → Já combinamos, há um arranjo (Present Continuous) - "I\'m going to have lunch with Tom tomorrow." → Tenho intenção, mas não necessariamente combinado (Be going to)</li></ul><ul class="gram-bullets"><li>Como SABER que é FUTURO e não PRESENTE? Pelo CONTEXTO e pela EXPRESSÃO DE TEMPO: - "I\'m working." → presente (acontecendo agora) - "I\'m working tomorrow." → futuro (planejado)</li></ul><ul class="gram-bullets"><li>VERBOS típicos para usar essa estrutura no futuro: - meeting (encontrando) - going (indo) - flying (voando) - having dinner/lunch (jantando/almoçando) - seeing (encontrando, visitando) - leaving (saindo) - arriving (chegando)</li></ul><ul class="gram-bullets"><li>Cuidado: nem todos os verbos funcionam bem com esse uso: - ❌ "I\'m knowing the answer tomorrow." (verbos de estado não funcionam) - ✔️ "I\'ll know the answer tomorrow."</li></ul></div></div>'},
{order:1016,badge:'U16',topic:'DESCRIBING CHANGES & VERB + INFINITIVE',book:'Red book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta unidade ensina como DESCREVER MUDANÇAS na vida das pessoas, usando<br>uma combinação de tempos verbais:</p><ul class="gram-bullets"><li>PRESENT TENSE → como você é AGORA</li><li>PAST TENSE → como você ERA</li><li><span class="gram-eng">PRESENT PERFECT → o que MUDOU</span> <span class="gram-trans">(conexão passado/presente)</span></li><li>COMPARATIVES → comparações entre antes e agora</li></ul><p>Também aborda VERB + INFINITIVE, usado para falar de PLANOS e ESPERANÇAS<br>para o FUTURO.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">DESCREVENDO MUDANÇAS:</h5><p>1) PRESENT TENSE (agora):<br>Sujeito + verbo + complemento<br>"I work at a bank."</p><p>2) PAST TENSE (antes):<br>Sujeito + verbo no passado + complemento<br>"I worked at a school."</p><p>3) PRESENT PERFECT (mudança):<br>Sujeito + HAVE/HAS + past participle<br>"I have changed jobs."</p><p>4) COMPARATIVOS:<br>"I am more confident than before."</p><h5 class="gram-subhead">VERB + INFINITIVE (planos futuros):</h5><p>Sujeito + verbo + TO + verbo (forma original)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">DESCREVENDO MUDANÇAS (uso combinado de tempos):</h5><ul class="gram-bullets"><li><span class="gram-eng">I used to be very shy, but now I\'m more outgoing.</span> <span class="gram-trans">(Eu era muito tímido, mas agora sou mais extrovertido.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">I lived in a small town, but I have moved to a big city.</span> <span class="gram-trans">(Eu morava em uma cidade pequena, mas me mudei para uma cidade grande.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She was lazy in school, but now she works very hard.</span> <span class="gram-trans">(Ela era preguiçosa na escola, mas agora trabalha muito.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">He has become more confident over the years.</span> <span class="gram-trans">(Ele se tornou mais confiante ao longo dos anos.)</span></li></ul><h5 class="gram-subhead">COMPARANDO ANTES E AGORA:</h5><ul class="gram-bullets"><li><span class="gram-eng">I am more confident now than I was before.</span> <span class="gram-trans">(Sou mais confiante agora do que antes.)</span></li></ul><ul class="gram-bullets"><li>She is taller than her sister.</li></ul><ul class="gram-bullets"><li>Life is busier than it used to be.</li></ul><h5 class="gram-subhead">VERB + INFINITIVE (planos e esperanças):</h5><ul class="gram-bullets"><li><span class="gram-eng">I hope to travel the world.</span> <span class="gram-trans">(Espero viajar pelo mundo.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She plans to study abroad.</span> <span class="gram-trans">(Ela planeja estudar fora.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">They want to buy a house.</span> <span class="gram-trans">(Eles querem comprar uma casa.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">He\'s going to learn Spanish.</span> <span class="gram-trans">(Ele vai aprender espanhol.)</span></li></ul><h5 class="gram-subhead">COMBINANDO TUDO (descrição completa de mudança):</h5><p>"I used to live in a small town, but I moved to a big city.<br>Life has changed a lot. I\'m busier now, but I\'m also happier.<br>In the future, I hope to travel to many countries."</p></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>VERBOS comuns que pedem INFINITIVO (to + verb): - want to (querer) - hope to (esperar) - plan to (planejar) - decide to (decidir) - need to (precisar) - try to (tentar) - learn to (aprender a) - promise to (prometer) - would like to (gostaria de)</li></ul><ul class="gram-bullets"><li>PARA DESCREVER MUDANÇAS, use uma COMBINAÇÃO de tempos: - Past tense → para descrever a situação anterior - Present tense → para descrever a situação atual - Present Perfect → para destacar a mudança em si - Used to → para hábitos do passado</li></ul><ul class="gram-bullets"><li>PALAVRAS-CHAVE para destacar mudanças: - now (agora) - then (naquela época) - before (antes) - these days (atualmente) - in the past (no passado) - nowadays (hoje em dia)</li></ul><ul class="gram-bullets"><li>EXPRESSÕES úteis para falar de PLANOS FUTUROS: - In the future, I want to... - One day, I hope to... - Someday, I\'d like to... - I\'m planning to...</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Note a diferença sutil: - "I worked at a bank for 5 years." (não trabalho mais lá) - "I have worked at a bank for 5 years."</span> <span class="gram-trans">(ainda trabalho lá)</span></li></ul></div></div>'},
{order:9999,badge:'—',topic:'PRESENT PERFECT (Presente Perfeito)',book:'Red book',ref:'Present Perfect (Red book, Blue book)',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O PRESENT PERFECT é um tempo verbal utilizado para falar de:</p><p>1) Ações do passado que AINDA TÊM RELEVÂNCIA no presente<br>2) Ações em um TEMPO INDEFINIDO no passado<br>3) Ações RECENTEMENTE CONCLUÍDAS</p><p>Este tempo verbal é uma das maiores dificuldades para falantes nativos<br>de português, pois não tem um equivalente exato. Ele "conecta" o passado<br>ao presente.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><p>SUJEITO + HAVE/HAS + PAST PARTICIPLE + COMPLEMENTO</p><h5 class="gram-subhead">NEGATIVA:</h5><p>SUJEITO + HAVE/HAS + NOT + PAST PARTICIPLE + COMPLEMENTO</p><h5 class="gram-subhead">INTERROGATIVA:</h5><p>HAVE/HAS + SUJEITO + PAST PARTICIPLE + COMPLEMENTO ?</p><h5 class="gram-subhead">USO DE HAVE / HAS:</h5><p>I, YOU, WE, THEY → HAVE<br>HE, SHE, IT → HAS</p><h5 class="gram-subhead">PAST PARTICIPLE (3ª forma do verbo):</h5><ul class="gram-bullets"><li><span class="gram-eng">Verbos regulares: VERBO + ED</span> <span class="gram-trans">(work → worked → WORKED)</span></li><li><span class="gram-eng">Verbos irregulares: 3ª coluna</span> <span class="gram-trans">(eat → ate → EATEN | drink → drank → DRUNK | see → saw → SEEN)</span></li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">Maria has drunk a lot of water.</span> <span class="gram-trans">(Maria bebeu muita água. - Sem tempo definido)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">I have just bought a new apartment.</span> <span class="gram-trans">(Acabei de comprar um novo apartamento. - Ação recente)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">They have visited Italy three times.</span> <span class="gram-trans">(Eles visitaram a Itália três vezes.)</span></li></ul><h5 class="gram-subhead">NEGATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">She hasn\'t finished her homework yet.</span> <span class="gram-trans">(Ela não terminou sua lição de casa ainda.)</span></li></ul><ul class="gram-bullets"><li>I haven\'t eaten breakfast today.</li><li>We haven\'t seen that movie.</li></ul><h5 class="gram-subhead">INTERROGATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">Have you ever eaten Japanese food?</span> <span class="gram-trans">(Você já comeu comida japonesa?)</span></li></ul><ul class="gram-bullets"><li>Has she finished the test?</li><li>Have they arrived yet?</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>PALAVRAS-CHAVE comuns com Present Perfect: - EVER (alguma vez) - usado em perguntas "Have you ever traveled to Japan?" - NEVER (nunca) "I have never been to Japan." - ALREADY (já) - antes do esperado "She has already finished." - YET (ainda) - usado em negativas e perguntas "Have you finished YET?" / "I haven\'t finished YET." - JUST (acabou de) "I have just arrived." - FOR (por) - duração "I have lived here for 10 years." - SINCE (desde) - ponto de início "I have known her since 2010."</li></ul><ul class="gram-bullets"><li><span class="gram-eng">PRESENT PERFECT vs SIMPLE PAST - DIFERENÇA CRUCIAL: - SIMPLE PAST → ação terminada em tempo DEFINIDO "I visited Paris LAST YEAR." (sabemos quando) - PRESENT PERFECT → ação em tempo INDEFINIDO ou ainda relevante "I have visited Paris."</span> <span class="gram-trans">(não sabemos quando, ou ainda relevante)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">EXEMPLO PRÁTICO: - "I lost my keys." (passado - mas talvez já achei) - "I have lost my keys."</span> <span class="gram-trans">(perdi e ainda não achei - relevante agora)</span></li></ul><ul class="gram-bullets"><li>Forma contraída comum: - I have → I\'ve - She has → She\'s - They have → They\'ve - I have not → I haven\'t - She has not → She hasn\'t</li></ul><ul class="gram-bullets"><li>ATENÇÃO ao PAST PARTICIPLE de verbos irregulares - é necessário memorizá-los: - be → was/were → BEEN - go → went → GONE - do → did → DONE - have → had → HAD - eat → ate → EATEN - see → saw → SEEN - write → wrote → WRITTEN - speak → spoke → SPOKEN</li></ul></div></div>'}
],

{order:5,badge:'5',topic:'USED TO (Hábitos do Passado)',book:'Blue book',ref:'Blue book - pg. 5',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>A estrutura "USED TO" refere-se a AÇÕES OU ESTADOS DO PASSADO que eram<br>frequentemente realizados (quase como hábitos) ou que eram verdadeiros<br>naquele momento, mas NÃO SÃO MAIS verdadeiros hoje.</p><p>Em português, equivale à expressão "COSTUMAVA" ou "EU TINHA O HÁBITO DE".</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><p>SUJEITO + USED TO + VERBO (forma original) + COMPLEMENTO</p><h5 class="gram-subhead">NEGATIVA:</h5><p>SUJEITO + DIDN\'T + USE TO + VERBO + COMPLEMENTO<br>SUJEITO + NEVER + USED TO + VERBO + COMPLEMENTO</p><h5 class="gram-subhead">INTERROGATIVA:</h5><p>DID + SUJEITO + USE TO + VERBO + COMPLEMENTO ?</p><h5 class="gram-subhead">ATENÇÃO À ESCRITA:</h5><ul class="gram-bullets"><li>Forma AFIRMATIVA: USED TO (com -D)</li><li>Forma NEGATIVA e INTERROGATIVA com DIDN\'T/DID: USE TO (SEM -D)</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">I used to play soccer when I was younger.</span> <span class="gram-trans">(Eu costumava jogar futebol quando era mais novo.)</span></li><li><span class="gram-eng">She used to be very quiet in our school time.</span> <span class="gram-trans">(Ela costumava ser muito quieta no tempo da escola.)</span></li><li>We used to live in a small town.</li></ul><h5 class="gram-subhead">NEGATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">She didn\'t use to play video games with her brother.</span> <span class="gram-trans">(Ela não costumava jogar videogame com o irmão.)</span></li><li><span class="gram-eng">I never used to be talkative with strangers.</span> <span class="gram-trans">(Eu nunca costumava ser conversador com estranhos.)</span></li><li>He didn\'t use to eat meat.</li></ul><h5 class="gram-subhead">INTERROGATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">Did you use to eat a lot of pasta back in Italy?</span> <span class="gram-trans">(Você costumava comer muita massa na Itália?)</span></li><li><span class="gram-eng">Did they use to play together in the past?</span> <span class="gram-trans">(Eles costumavam brincar juntos no passado?)</span></li><li>Did she use to live here?</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>ATENÇÃO À ORTOGRAFIA - é a "armadilha" clássica deste tópico: ✔️ AFIRMATIVA: I USED TO play. ✔️ NEGATIVA: I DIDN\'T USE TO play. ✔️ PERGUNTA: DID you USE TO play?</li></ul><p>Quando há DID/DIDN\'T, perde-se o -D de "used".</p><ul class="gram-bullets"><li>USED TO funciona com VERBOS DE AÇÃO e VERBOS DE ESTADO: - I used to PLAY soccer. (ação) - She used to BE quiet. (estado)</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Implícita SEMPRE a ideia de "NÃO MAIS": - I used to smoke.</span> <span class="gram-trans">(Antes eu fumava - agora não fumo mais.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Não confunda com: - I\'M USED TO + verbo-ing (Estou acostumado a + verbo) Ex.: I\'m used to waking up early.</span> <span class="gram-trans">(Estou acostumado a acordar cedo.)</span></li></ul></div></div>'},
{order:11,badge:'11',topic:'INDIRECT QUESTIONS (Perguntas Indiretas)',book:'Blue book',ref:'Blue book - pg. 11',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Uma INDIRECT QUESTION (Pergunta Indireta) acontece quando começamos uma<br>pergunta com uma INTRODUÇÃO educada, em vez de fazer a pergunta diretamente.</p><p>Esta estrutura é considerada MAIS POLIDA e EDUCADA, sendo muito usada em<br>situações formais ou quando falamos com estranhos.</p><p>A principal característica é que a ORDEM das palavras MUDA - não é mais a<br>ordem típica de uma pergunta, mas sim de uma AFIRMAÇÃO.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">INTRODUÇÕES COMUNS:</h5><ul class="gram-bullets"><li>Could you tell me...?</li><li>Can you tell me...?</li><li>Do you know...?</li><li>I wonder...</li></ul><h5 class="gram-subhead">TRÊS REGRAS PRINCIPAIS:</h5><p>1) COM VERBO TO BE (is/are):<br>O verbo TO BE vai para o FINAL da frase.</p><p>Direta: Where IS the nearest hospital?<br>Indireta: Do you know where the nearest hospital IS?</p><p>2) COM DO/DOES:<br>DROPAMOS o do/does e adicionamos -s ao verbo (se for 3ª pessoa).</p><p>Direta: Where DOES she live?<br>Indireta: Do you know where she lives? (sem "does")</p><p>3) COM CAN/COULD/WILL:<br>INVERTEMOS as posições - o modal vem DEPOIS do sujeito.</p><p>Direta: Where CAN I find a restroom?<br>Indireta: Do you know where I CAN find a restroom?</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">INDIRECT QUESTIONS COM TO BE:</h5><ul class="gram-bullets"><li>Direta: Where is the nearest hospital? Indireta: Do you know where the nearest hospital IS?</li></ul><ul class="gram-bullets"><li>Direta: Who is that man? Indireta: Could you tell me who that man IS?</li></ul><h5 class="gram-subhead">INDIRECT QUESTIONS COM DO/DOES:</h5><ul class="gram-bullets"><li><span class="gram-eng">Direta: Where does she live? Indireta: Do you know where she LIVES?</span> <span class="gram-trans">(Note: sumiu o "does" e voltou o -s do verbo "lives")</span></li></ul><ul class="gram-bullets"><li>Direta: What do you want? Indireta: Can you tell me what you WANT?</li></ul><h5 class="gram-subhead">INDIRECT QUESTIONS COM CAN:</h5><ul class="gram-bullets"><li>Direta: Where can I find a restroom? Indireta: Do you know where I CAN find a restroom?</li></ul><ul class="gram-bullets"><li>Direta: When can we meet? Indireta: Could you tell me when we CAN meet?</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>Indirect questions são MUITO MAIS EDUCADAS - use-as quando quiser ser formal ou ao falar com pessoas desconhecidas.</li></ul><ul class="gram-bullets"><li>REGRA-CHAVE: A ordem dentro da pergunta indireta é a mesma de uma AFIRMAÇÃO (sujeito + verbo).</li></ul><ul class="gram-bullets"><li>Para perguntas SIM/NÃO em indirect questions, use IF ou WHETHER: - Direta: Does she like coffee? - Indireta: Do you know if/whether she likes coffee?</li></ul><ul class="gram-bullets"><li>Embora o INÍCIO seja uma pergunta ("Do you know..."), o que segue NÃO é uma pergunta, então NÃO há inversão.</li></ul></div></div>'},
{order:17,badge:'17',topic:'EVALUATIONS & COMPARISONS',book:'Blue book',ref:'Blue book - pg. 17',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta página apresenta diversas formas de fazer AVALIAÇÕES e COMPARAÇÕES<br>em inglês, usando estruturas específicas com:</p><ul class="gram-bullets"><li>ENOUGH / TOO → para dizer se algo é suficiente ou excessivo</li><li><span class="gram-eng">AS + ADJ + AS → para comparações de IGUALDADE</span> <span class="gram-trans">(tão...quanto)</span></li></ul><p>Cada estrutura tem sua posição específica em relação aos adjetivos e<br>substantivos.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ADJECTIVE + ENOUGH (suficientemente):</h5><p>ADJETIVO + ENOUGH<br>"Adjetivo o bastante"</p><h5 class="gram-subhead">TOO + ADJECTIVE (excessivo - sentido negativo):</h5><p>TOO + ADJETIVO<br>"Adjetivo demais"</p><h5 class="gram-subhead">ENOUGH + NOUN (substantivos suficientes):</h5><p>ENOUGH + SUBSTANTIVO<br>"Substantivo suficiente"</p><h5 class="gram-subhead">TOO MUCH / TOO MANY + NOUN:</h5><p>TOO MUCH + substantivo INCONTÁVEL<br>TOO MANY + substantivo CONTÁVEL</p><h5 class="gram-subhead">AS + ADJECTIVE + AS (tão...quanto):</h5><p>Para comparações de IGUALDADE.</p><h5 class="gram-subhead">AS MANY/MUCH + NOUN + AS:</h5><p>AS MANY + contável + AS<br>AS MUCH + incontável + AS</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">ADJECTIVE + ENOUGH:</h5><ul class="gram-bullets"><li><span class="gram-eng">My house isn\'t big enough.</span> <span class="gram-trans">(Minha casa não é grande o suficiente.)</span></li><li>She is tall enough to be a model.</li></ul><h5 class="gram-subhead">TOO + ADJECTIVE:</h5><ul class="gram-bullets"><li><span class="gram-eng">My house is too big.</span> <span class="gram-trans">(Minha casa é grande demais.)</span></li><li>The soup is too hot to eat.</li></ul><h5 class="gram-subhead">ENOUGH + NOUN:</h5><ul class="gram-bullets"><li><span class="gram-eng">My house has enough windows.</span> <span class="gram-trans">(Minha casa tem janelas suficientes.)</span></li><li>I have enough money for the trip.</li></ul><h5 class="gram-subhead">TOO MUCH / TOO MANY:</h5><ul class="gram-bullets"><li><span class="gram-eng">There are too many cars in my city.</span> <span class="gram-trans">(Há carros demais na minha cidade.)</span></li><li><span class="gram-eng">There is too much noise in my city.</span> <span class="gram-trans">(Há barulho demais na minha cidade.)</span></li></ul><h5 class="gram-subhead">AS + ADJECTIVE + AS (igualdade):</h5><ul class="gram-bullets"><li><span class="gram-eng">My house is as big as your house.</span> <span class="gram-trans">(Minha casa é tão grande quanto a sua.)</span></li><li><span class="gram-eng">Brazil isn\'t as rich as the US.</span> <span class="gram-trans">(O Brasil não é tão rico quanto os EUA.)</span></li></ul><h5 class="gram-subhead">AS MANY/MUCH + NOUN + AS:</h5><ul class="gram-bullets"><li><span class="gram-eng">I have as many cars as you have.</span> <span class="gram-trans">(Tenho tantos carros quanto você.)</span></li><li><span class="gram-eng">She has as much happiness as you.</span> <span class="gram-trans">(Ela tem tanta felicidade quanto você.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>POSIÇÃO de "ENOUGH": - Com ADJETIVO: vem DEPOIS (big enough) - Com SUBSTANTIVO: vem ANTES (enough money)</li></ul><ul class="gram-bullets"><li><span class="gram-eng">TOO vs VERY: - VERY = muito (neutro): The coffee is VERY hot. (gostoso) - TOO = demais (negativo): The coffee is TOO hot.</span> <span class="gram-trans">(não consigo beber)</span></li></ul><ul class="gram-bullets"><li>Para a forma negativa de "as...as", basta adicionar NOT: - I\'m not as tall as my brother.</li></ul><ul class="gram-bullets"><li>MUCH vs MANY: - MANY → contáveis (people, books, cars) - MUCH → incontáveis (water, money, time)</li></ul></div></div>'},
{order:20,badge:'20',topic:'WISHES (Desejos)',book:'Blue book',ref:'Blue book - pg. 20',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>A estrutura WISH é usada para expressar DESEJOS, geralmente sobre situações<br>que NÃO SÃO verdadeiras no presente - coisas que gostaríamos que fossem<br>diferentes.</p><p>O detalhe importante é que, mesmo falando do PRESENTE, usamos o SIMPLE<br>PAST após "wish" (no inglês isso se chama "subjuntivo").</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA BÁSICA:</h5><p>SUJEITO + WISH + SUJEITO + VERBO NO SIMPLE PAST + COMPLEMENTO</p><h5 class="gram-subhead">TRANSFORMAÇÕES NECESSÁRIAS:</h5><ul class="gram-bullets"><li><span class="gram-eng">Verbo TO BE → WERE</span> <span class="gram-trans">(para TODOS os pronomes)</span></li><li>Verbo CAN → COULD</li><li>Verbo WILL → WOULD</li><li>Verbos normais → SIMPLE PAST</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">DESEJO REAL → DESEJO COM WISH:</h5><ul class="gram-bullets"><li><span class="gram-eng">To drink more coffee → I wish I drank more coffee.</span> <span class="gram-trans">(Queria beber mais café.)</span></li></ul><ul class="gram-bullets"><li>To have more friends → I wish I had more friends. (Queria ter mais amigos.)</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Can play the guitar → I wish I could play the guitar.</span> <span class="gram-trans">(Queria saber tocar violão.)</span></li></ul><ul class="gram-bullets"><li>To be happier → I wish I were happier. (Queria ser mais feliz.)</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Will go to Italy → I wish I would go to Italy.</span> <span class="gram-trans">(Queria poder ir à Itália.)</span></li></ul><ul class="gram-bullets"><li>I am talented → I wish I were talented. (Queria ser talentoso.)</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRAS-CHAVE para lembrar: WILL → WOULD CAN → COULD BE → WERE (sempre WERE, mesmo com I, he, she, it)</li></ul><ul class="gram-bullets"><li><span class="gram-eng">A estrutura WISH expressa que a realidade é o OPOSTO do desejo: - I wish I were rich. (Significa: eu NÃO sou rico) - I wish I had a car.</span> <span class="gram-trans">(Significa: eu NÃO tenho um carro)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Embora "I was" seja comum no inglês falado informal, em estruturas formais com WISH usa-se WERE para todos os sujeitos: ✔️ I wish I WERE rich. (formal/correto) ✔️ I wish I WAS rich.</span> <span class="gram-trans">(informal/aceitável)</span></li></ul><ul class="gram-bullets"><li>Não confunda WISH com WANT: - WANT → desejo possível/real ("I want a coffee.") - WISH → desejo hipotético/irreal ("I wish I could fly.")</li></ul></div></div>'},
{order:31,badge:'31',topic:'SIMPLE FUTURE - WILL vs BE GOING TO',book:'Blue book',ref:'Blue book - pg. 31',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>No inglês temos duas formas principais para expressar o FUTURO, e a escolha<br>entre elas depende do TIPO DE FUTURO que queremos expressar:</p><p>1) WILL + VERB<br>Usado para ações futuras das quais NÃO temos certeza, decisões TOMADAS<br>NO MOMENTO da fala, previsões e promessas espontâneas.</p><p>2) BE + GOING TO + VERB<br>Usado para PLANOS FUTUROS já decididos, sobre os quais temos certeza<br>total - já planejamos antes do momento da fala.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">WILL (futuro incerto/decidido na hora):</h5><p>SUJEITO + WILL + VERBO (forma original)</p><p>Acompanhado por: I guess, maybe, I think, probably</p><h5 class="gram-subhead">BE GOING TO (futuro planejado):</h5><p>SUJEITO + AM/IS/ARE + GOING TO + VERBO (forma original)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">USANDO WILL (incerteza ou decisão imediata):</h5><p>👉 Maybe I will go to class tomorrow.<br>(Talvez eu vá à aula amanhã.)</p><p>👉 Probably she\'ll come to my party this Sunday.<br>(Provavelmente ela vai vir à minha festa no domingo.)</p><p>👉 I think it will rain later.<br>👉 I guess we\'ll see each other soon.</p><h5 class="gram-subhead">USANDO BE + GOING TO (planos certos):</h5><p>👉 She is going to study really hard for her test! I believe in her.<br>(Ela vai estudar muito para a prova! Eu acredito nela.)</p><p>👉 They are going to move! The situation in their house is unbearable.<br>(Eles vão se mudar! A situação na casa deles é insuportável.)</p><p>👉 I am going to travel next month.<br>👉 We are going to buy a new car.</p></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA PRÁTICA DE OURO: - PLANEJOU ANTES? → BE GOING TO - DECIDIU AGORA OU É INCERTO? → WILL</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Exemplos práticos da diferença: - Phone rings → "I\'ll get it!" (decisão imediata → WILL) - "What are your weekend plans?" → "I\'m going to visit my parents."</span> <span class="gram-trans">(plano já feito → GOING TO)</span></li></ul><ul class="gram-bullets"><li>WILL forma contrações comuns: - I will → I\'ll - You will → You\'ll - She will → She\'ll - We will → We\'ll</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Para PREVISÕES (sobre o futuro em geral), ambos podem ser usados: - It will rain tomorrow. - It\'s going to rain tomorrow.</span> <span class="gram-trans">(mas BE GOING TO tem mais força quando há "evidência" visível)</span></li></ul></div></div>'},
{order:33,badge:'33',topic:'MODAL VERBS - NECESSITY, OBLIGATION & ADVICE',book:'Blue book',ref:'Blue book - pg. 33',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Os MODAL VERBS (verbos modais) são verbos especiais usados para expressar<br>diferentes ideias e sentimentos, como:</p><ul class="gram-bullets"><li><span class="gram-eng">OBRIGAÇÕES</span> <span class="gram-trans">(algo que VOCÊ TEM que fazer)</span></li><li><span class="gram-eng">NECESSIDADE</span> <span class="gram-trans">(algo que é PRECISO fazer)</span></li><li><span class="gram-eng">SUGESTÕES e CONSELHOS</span> <span class="gram-trans">(recomendações)</span></li></ul><p>Cada modal tem um nível diferente de FORÇA (do mais obrigatório ao mais<br>sugestivo).</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA GERAL:</h5><p>SUJEITO + MODAL + VERBO (forma original)</p><h5 class="gram-subhead">MODALS PARA NECESSIDADE/OBRIGAÇÃO:</h5><p>MUST → forte obrigação (deve, tem que - quase uma lei)<br>HAVE TO → obrigação externa (tem que - por regra)<br>NEED TO → necessidade<br>DON\'T HAVE TO → não há obrigação (oposto de "have to")</p><h5 class="gram-subhead">MODALS PARA SUGESTÕES/CONSELHOS:</h5><p>HAD BETTER → seria melhor (conselho forte)<br>OUGHT TO → deveria (conselho formal)<br>SHOULD → deveria (sugestão comum)<br>SHOULDN\'T → não deveria (sugestão negativa)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">MODALS DE OBRIGAÇÃO/NECESSIDADE:</h5><ul class="gram-bullets"><li><span class="gram-eng">You must take your passport with you.</span> <span class="gram-trans">(Você precisa levar seu passaporte com você.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">You need to remember to book your flight earlier.</span> <span class="gram-trans">(Você precisa se lembrar de reservar seu voo antes.)</span></li></ul><ul class="gram-bullets"><li>I have to study for the test tomorrow.</li><li>You don\'t have to come if you don\'t want to.</li></ul><h5 class="gram-subhead">MODALS DE SUGESTÃO/CONSELHO:</h5><ul class="gram-bullets"><li><span class="gram-eng">You\'d better take your travel insurance.</span> <span class="gram-trans">(Seria melhor você levar seu seguro viagem.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">You ought to study more for your test.</span> <span class="gram-trans">(Você deveria estudar mais para a prova.)</span></li></ul><ul class="gram-bullets"><li>You should drink more water.</li><li>You shouldn\'t eat so much sugar.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: Após qualquer modal, o verbo principal SEMPRE fica na sua FORMA ORIGINAL, sem -S, -ED ou -ING: ❌ She must studies hard. ✔️ She must study hard.</li></ul><ul class="gram-bullets"><li>Diferença sutil de força (do mais forte ao mais leve): MUST &gt; HAVE TO &gt; SHOULD &gt; OUGHT TO &gt; HAD BETTER</li></ul><ul class="gram-bullets"><li><span class="gram-eng">MUST vs HAVE TO: - MUST → obrigação que o falante considera importante - HAVE TO → obrigação externa</span> <span class="gram-trans">(regra, lei, situação)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">"HAD BETTER" geralmente carrega um aviso ou consequência implícita: - You\'d better study.</span> <span class="gram-trans">(...senão pode ir mal na prova.)</span></li></ul><ul class="gram-bullets"><li>Forma contraída: - I had better = I\'d better - You should not = You shouldn\'t - I would = I\'d</li></ul></div></div>'},
