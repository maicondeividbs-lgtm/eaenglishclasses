{order:5,badge:"5",topic:"Used to",book:"Blue book",ref:"Blue book - pg. 5",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>USED TO é usado para falar de HÁBITOS ou ESTADOS do passado que já<br>NÃO ACONTECEM mais. Sempre se refere a algo que mudou.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA</h5><p>SUJEITO + USED TO + VERBO (forma original)</p><h5 class=\"gram-subhead\">NEGATIVA</h5><p>SUJEITO + DIDN'T USE TO + VERBO</p><h5 class=\"gram-subhead\">INTERROGATIVA</h5><p>DID + SUJEITO + USE TO + VERBO?</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I used to play soccer every day.</span> <span class=\"gram-trans\">(Eu costumava jogar futebol todo dia.)</span></li><li><span class=\"gram-eng\">She used to live in Paris.</span> <span class=\"gram-trans\">(Ela morava em Paris.)</span></li><li><span class=\"gram-eng\">He didn't use to like vegetables.</span> <span class=\"gram-trans\">(Ele não gostava de vegetais.)</span></li><li><span class=\"gram-eng\">Did you use to have long hair?</span> <span class=\"gram-trans\">(Você costumava ter cabelo longo?)</span></li><li><span class=\"gram-eng\">We used to be best friends.</span> <span class=\"gram-trans\">(Costumávamos ser melhores amigos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Negativa/pergunta: USE TO (sem -d), porque o DID já marca o passado.</li><li>Implica que a situação MUDOU — hoje não é mais assim.</li></ul></div></div>"},
{order:11,badge:"11",topic:"Indirect Questions",book:"Blue book",ref:"Blue book - pg. 11",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As perguntas indiretas são uma forma mais EDUCADA de perguntar. A<br>estrutura muda: depois da introdução, a ordem se torna AFIRMATIVA<br>(sujeito + verbo).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>Introdução + WH-word/IF + sujeito + verbo</p><h5 class=\"gram-subhead\">INTRODUÇÕES COMUNS</h5><p>Could you tell me ... ?<br>Do you know ... ?<br>Can you tell me ... ?</p><h5 class=\"gram-subhead\">ATENÇÃO: SEM auxiliar DO/DOES/DID depois da introdução.</h5></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Direct:   Where is the bank?</li></ul><p>Indirect: Could you tell me where the bank is?</p><ul class=\"gram-bullets\"><li>Direct:   What time does the store open?</li></ul><p>Indirect: Do you know what time the store opens?</p><ul class=\"gram-bullets\"><li>Direct:   Is there a hotel nearby?</li></ul><p>Indirect: Can you tell me if there's a hotel nearby?</p></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use IF (ou WHETHER) para perguntas Yes/No: &quot;Do you know if she's home?&quot;</li><li>A ordem volta a ser AFIRMATIVA: ❌ &quot;where is the bank&quot; → ✔️ &quot;where the bank is&quot;.</li></ul></div></div>"},
{order:17,badge:"17",topic:"Evaluations & Comparisons",book:"Blue book",ref:"Blue book - pg. 17",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para avaliar e comparar coisas, usamos estruturas como TOO + adjetivo<br>(em excesso), NOT + adjetivo + ENOUGH (insuficiente) e AS...AS (igualdade).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">TOO + adjetivo</h5><p>&quot;It's too expensive.&quot; (caro demais)</p><h5 class=\"gram-subhead\">NOT + adjetivo + ENOUGH</h5><p>&quot;It's not big enough.&quot; (não é grande o bastante)</p><h5 class=\"gram-subhead\">AS + adjetivo + AS</h5><p>&quot;She is as tall as her brother.&quot; (tão alta quanto)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">This coffee is too hot to drink.</span> <span class=\"gram-trans\">(Este café está quente demais para beber.)</span></li><li><span class=\"gram-eng\">The room isn't big enough for us.</span> <span class=\"gram-trans\">(O quarto não é grande o suficiente para nós.)</span></li><li><span class=\"gram-eng\">My phone is as good as yours.</span> <span class=\"gram-trans\">(Meu celular é tão bom quanto o seu.)</span></li><li><span class=\"gram-eng\">He's not old enough to drive.</span> <span class=\"gram-trans\">(Ele não tem idade suficiente para dirigir.)</span></li><li><span class=\"gram-eng\">This bag is too heavy.</span> <span class=\"gram-trans\">(Esta bolsa é pesada demais.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>TOO tem sentido NEGATIVO (em excesso, problema).</li><li>ENOUGH vem DEPOIS do adjetivo: &quot;tall enough&quot; — nunca &quot;enough tall&quot;.</li></ul></div></div>"},
{order:20,badge:"20",topic:"Wishes",book:"Blue book",ref:"Blue book - pg. 20",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>A estrutura WISH expressa DESEJOS sobre situações que NÃO SÃO<br>verdadeiras no presente. Apesar de falar do presente, usa-se o passado<br>após &quot;wish&quot;.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>SUJEITO + WISH + sujeito + verbo no PASSADO</p><h5 class=\"gram-subhead\">MUDANÇAS</h5><p>am/is/are → WERE (para todos)<br>can       → COULD<br>will      → WOULD</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I wish I had more time.</span> <span class=\"gram-trans\">(Queria ter mais tempo.)</span></li><li><span class=\"gram-eng\">She wishes she were taller.</span> <span class=\"gram-trans\">(Ela queria ser mais alta.)</span></li><li><span class=\"gram-eng\">I wish I could speak Japanese.</span> <span class=\"gram-trans\">(Queria saber falar japonês.)</span></li><li><span class=\"gram-eng\">They wish they lived in the city.</span> <span class=\"gram-trans\">(Eles queriam morar na cidade.)</span></li><li><span class=\"gram-eng\">I wish it would stop raining.</span> <span class=\"gram-trans\">(Queria que parasse de chover.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>WISH expressa que a realidade é o OPOSTO: &quot;I wish I were rich&quot; = não sou rico.</li><li>Use WERE para TODOS os sujeitos depois de wish (formal correto).</li></ul></div></div>"},
{order:25,badge:"25",topic:"Sequence Adverbs (Advérbios de Sequência)",book:"Blue book",ref:"Blue book - pg. 25 (Unit 4 - Have you ever tried it?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Sequence Adverbs (First, Then, Next, After that, Finally) organizam ações em ordem cronológica. São usados para descrever processos, receitas, rotinas e narrar passo a passo.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><p>First, ... + Then/Next/After that, ... + Finally, ...</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">First, wash the vegetables.</span> <span class=\"gram-trans\">(Primeiro, lave os vegetais.)</span></li><li><span class=\"gram-eng\">Then, cut them into small pieces.</span> <span class=\"gram-trans\">(Depois, corte em pedaços pequenos.)</span></li><li><span class=\"gram-eng\">Next, heat the oil in a pan.</span> <span class=\"gram-trans\">(Em seguida, esquente o óleo.)</span></li><li><span class=\"gram-eng\">After that, add the vegetables.</span> <span class=\"gram-trans\">(Depois disso, adicione os vegetais.)</span></li><li><span class=\"gram-eng\">Finally, serve with rice.</span> <span class=\"gram-trans\">(Por fim, sirva com arroz.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><p>Use vírgula após o advérbio quando ele iniciar a frase. FIRST e FINALLY marcam início e fim da sequência.</p></div></div>"},
{order:31,badge:"31",topic:"Simple Future - Will vs be going to",book:"Blue book",ref:"Blue book - pg. 31",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O futuro em inglês pode ser expresso com WILL ou BE GOING TO. WILL<br>serve para decisões espontâneas e previsões; BE GOING TO para planos<br>já decididos.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">WILL</h5><p>SUJEITO + WILL + VERBO (forma original)<br>→ Decisão na hora, previsão, promessa.</p><h5 class=\"gram-subhead\">BE GOING TO</h5><p>SUJEITO + AM/IS/ARE + GOING TO + VERBO<br>→ Plano já decidido antes da fala.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I'm thirsty. I'll get some water.</span> <span class=\"gram-trans\">(WILL — decisão agora)</span></li><li><span class=\"gram-eng\">Don't worry, I'll help you.</span> <span class=\"gram-trans\">(WILL — promessa)</span></li><li><span class=\"gram-eng\">I'm going to travel next month.</span> <span class=\"gram-trans\">(GOING TO — plano)</span></li><li><span class=\"gram-eng\">She's going to study medicine.</span> <span class=\"gram-trans\">(GOING TO — plano)</span></li><li><span class=\"gram-eng\">It will probably rain tomorrow.</span> <span class=\"gram-trans\">(WILL — previsão)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Decisão NA HORA = WILL | Plano ANTES = GOING TO.</li><li>Para previsões com base em evidência, prefira BE GOING TO (&quot;Look at those clouds — it's going to rain&quot;).</li></ul></div></div>"},
{order:33,badge:"33",topic:"Modals - Necessity, Obligation, Advice",book:"Blue book",ref:"Blue book - pg. 33",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Diferentes modais expressam diferentes níveis de necessidade e<br>conselho: MUST e HAVE TO são fortes (obrigação); SHOULD é mais leve<br>(conselho); NEED TO está no meio (necessidade).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">OBRIGAÇÃO FORTE</h5><p>MUST / HAVE TO + verbo</p><h5 class=\"gram-subhead\">NECESSIDADE</h5><p>NEED TO + verbo</p><h5 class=\"gram-subhead\">CONSELHO</h5><p>SHOULD / OUGHT TO + verbo</p><h5 class=\"gram-subhead\">FALTA DE NECESSIDADE</h5><p>DON'T HAVE TO / DON'T NEED TO</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">You must wear a seatbelt.</span> <span class=\"gram-trans\">(Você deve usar cinto.)</span></li><li><span class=\"gram-eng\">I have to study tonight.</span> <span class=\"gram-trans\">(Tenho que estudar hoje à noite.)</span></li><li><span class=\"gram-eng\">You should drink more water.</span> <span class=\"gram-trans\">(Você deveria beber mais água.)</span></li><li><span class=\"gram-eng\">She needs to call the doctor.</span> <span class=\"gram-trans\">(Ela precisa ligar para o médico.)</span></li><li><span class=\"gram-eng\">You don't have to come if you're busy.</span> <span class=\"gram-trans\">(Não precisa vir se estiver ocupado.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>MUSTN'T = proibido | DON'T HAVE TO = não é necessário (mas pode).</li><li>SHOULD é mais suave — sugere, não obriga.</li></ul></div></div>"},
{order:37,badge:"37",topic:"Two-Part Verbs / Phrasal Verbs",book:"Blue book",ref:"Blue book - pg. 37 (Unit 6 - Sure! I'll do it.)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Phrasal Verbs são combinações de verbo + partícula (preposição/advérbio) que formam um novo significado. Podem ser separáveis (objeto pode vir no meio) ou inseparáveis.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><p>Verbo + partícula (+ objeto) | Verbo + objeto + partícula (separáveis)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Turn on the lights. / Turn the lights on.</span> <span class=\"gram-trans\">(Acenda as luzes.)</span></li><li><span class=\"gram-eng\">I picked up my sister at school.</span> <span class=\"gram-trans\">(Busquei minha irmã na escola.)</span></li><li><span class=\"gram-eng\">Please put away your toys.</span> <span class=\"gram-trans\">(Por favor, guarde seus brinquedos.)</span></li><li>She looks after her grandmother. (Ela cuida da avó.) [inseparável]</li><li><span class=\"gram-eng\">I ran into an old friend yesterday.</span> <span class=\"gram-trans\">(Encontrei um velho amigo.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><p>Com pronomes (it, them, him), o phrasal verb separável é SEMPRE separado: 'Turn it on' (✓), 'Turn on it' (✗).</p></div></div>"},
{order:39,badge:"39",topic:"Requests Com Modais & Would You Mind",book:"Blue book",ref:"Blue book - pg. 39",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para fazer pedidos educados em inglês, usamos modais como COULD,<br>WOULD e a expressão WOULD YOU MIND (que pede com -ING).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">COM MODAIS</h5><p>Could you + verbo + ...?<br>Would you + verbo + ...?</p><h5 class=\"gram-subhead\">WOULD YOU MIND + verbo-ING</h5><p>Pergunta literalmente &quot;você se importaria de...?&quot;</p><h5 class=\"gram-subhead\">RESPOSTAS</h5><p>Aceitar: Sure. / Of course. / No, not at all.<br>Recusar: Sorry, I can't.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Could you open the window, please?</span> <span class=\"gram-trans\">(Você poderia abrir a janela?)</span></li><li><span class=\"gram-eng\">Would you help me with this?</span> <span class=\"gram-trans\">(Você me ajudaria com isto?)</span></li><li><span class=\"gram-eng\">Would you mind closing the door?</span> <span class=\"gram-trans\">(Se importaria de fechar a porta?)</span></li><li><span class=\"gram-eng\">Would you mind waiting a moment?</span> <span class=\"gram-trans\">(Se importaria de esperar um momento?)</span></li><li><span class=\"gram-eng\">Could you tell me the time?</span> <span class=\"gram-trans\">(Poderia me dizer as horas?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Após WOULD YOU MIND vem verbo + ING: ❌ &quot;to close&quot; / ✔️ &quot;closing&quot;.</li><li>A resposta &quot;No&quot; a &quot;Would you mind...?&quot; significa SIM, eu faço (não me importo).</li></ul></div></div>"},
{order:45,badge:"45",topic:"Infinitives and Gerunds",book:"Blue book",ref:"Blue book - pg. 45",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Alguns verbos são seguidos por INFINITIVO (to + verbo); outros por<br>GERÚNDIO (verbo-ING). É preciso memorizar quais verbos pedem qual forma.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">VERBOS + INFINITIVO (to + verbo)</h5><p>want, plan, decide, hope, learn, would like, need</p><h5 class=\"gram-subhead\">VERBOS + GERÚNDIO (-ING)</h5><p>enjoy, like, love, hate, finish, avoid, mind</p><h5 class=\"gram-subhead\">AMBOS POSSÍVEIS</h5><p>start, begin, prefer, continue</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>I want to learn French.            (Quero aprender francês.) — INF</li><li>She enjoys reading at night.       (Ela gosta de ler à noite.) — ING</li><li>They decided to move abroad.       (Decidiram se mudar para fora.) — INF</li><li>He finished doing his homework.    (Ele terminou o dever.) — ING</li><li>I love to dance / I love dancing.  (Amo dançar.) — AMBOS</li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de PREPOSIÇÃO sempre usa -ING: &quot;good at swimming&quot;, &quot;before leaving&quot;.</li><li>ENJOY sempre pede -ING: ❌ &quot;enjoy to read&quot; / ✔️ &quot;enjoy reading&quot;.</li></ul></div></div>"},
{order:47,badge:"47",topic:"Imperatives, Infinitives and Suggestions",book:"Blue book",ref:"Blue book - pg. 47 (Unit 7 - What do you use this for?)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para dar conselhos e sugestões existem várias estruturas: imperativos (ordens diretas), infinitivos (try to, need to) e fórmulas de sugestão (Why don't you...?, How about...?, Let's...).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><p>Verbo (imperativo) | Try/Need + TO + verbo | Why don't you + verbo? | How about + verbo-ING? | Let's + verbo</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Drink more water. (Beba mais água.) [imperativo]</li><li><span class=\"gram-eng\">You need to rest.</span> <span class=\"gram-trans\">(Você precisa descansar.)</span></li><li><span class=\"gram-eng\">Why don't you see a doctor?</span> <span class=\"gram-trans\">(Por que você não vai a um médico?)</span></li><li><span class=\"gram-eng\">How about taking a vacation?</span> <span class=\"gram-trans\">(Que tal tirar férias?)</span></li><li><span class=\"gram-eng\">Let's go to the beach.</span> <span class=\"gram-trans\">(Vamos à praia.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><p>Imperativo é direto (ordem ou conselho forte). 'Why don't you' e 'How about' suavizam sugestões. 'Let's' inclui o falante.</p></div></div>"},
{order:51,badge:"51",topic:"Relative Clauses of Time (Orações Relativas de Tempo)",book:"Blue book",ref:"Blue book - pg. 51 (Unit 8 - Time to celebrate!)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Orações relativas com WHEN descrevem ou definem períodos de tempo. Conectam duas ideias relacionadas a um momento específico.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><p>Substantivo de tempo + WHEN + sujeito + verbo</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I remember the day when we met.</span> <span class=\"gram-trans\">(Lembro do dia em que nos conhecemos.)</span></li><li><span class=\"gram-eng\">Summer is the season when I feel happiest.</span> <span class=\"gram-trans\">(Verão é a estação em que me sinto mais feliz.)</span></li><li><span class=\"gram-eng\">That was the year when I moved to Brazil.</span> <span class=\"gram-trans\">(Foi o ano em que me mudei para o Brasil.)</span></li><li><span class=\"gram-eng\">I'll never forget the moment when she said yes.</span> <span class=\"gram-trans\">(Nunca esquecerei o momento em que ela disse sim.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><p>WHEN pode ser substituído por THAT ou omitido em alguns contextos. Usado com palavras como day, year, time, moment, season.</p></div></div>"},
{order:54,badge:"54",topic:"Adverbial Clause of Time",book:"Blue book",ref:"Blue book - pg. 54",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As orações adverbiais de tempo indicam QUANDO algo acontece. São<br>introduzidas por conjunções como WHEN, BEFORE, AFTER, AS SOON AS, WHILE.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">CONJUNÇÕES PRINCIPAIS</h5><p>WHEN (quando)<br>BEFORE (antes de)<br>AFTER (depois de)<br>AS SOON AS (assim que)<br>WHILE (enquanto)<br>UNTIL (até que)</p><h5 class=\"gram-subhead\">FÓRMULA</h5><p>[oração principal] + conjunção + [oração de tempo]</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Call me when you arrive.</span> <span class=\"gram-trans\">(Me ligue quando chegar.)</span></li><li><span class=\"gram-eng\">I'll go home after I finish work.</span> <span class=\"gram-trans\">(Vou para casa depois que terminar o trabalho.)</span></li><li><span class=\"gram-eng\">She always reads before she goes to bed.</span> <span class=\"gram-trans\">(Ela sempre lê antes de dormir.)</span></li><li><span class=\"gram-eng\">I'll call you as soon as I know.</span> <span class=\"gram-trans\">(Te ligo assim que souber.)</span></li><li><span class=\"gram-eng\">He watched TV while I was cooking.</span> <span class=\"gram-trans\">(Ele viu TV enquanto eu cozinhava.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Quando a oração de tempo se refere ao FUTURO, use PRESENT (não future): ❌ &quot;when you will arrive&quot; / ✔️ &quot;when you arrive&quot;.</li></ul></div></div>"},
{order:59,badge:"59",topic:"Time Contrasts & Might",book:"Blue book",ref:"Blue book - pg. 59",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para comparar PRESENTE e PASSADO usamos contrastes (in the past / today).<br>MIGHT serve para falar de POSSIBILIDADES no futuro — algo que pode ou<br>não acontecer.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">CONTRASTES DE TEMPO</h5><p>In the past, ... | Today, ... | Nowadays, ...<br>100 years ago, ... | These days, ...</p><h5 class=\"gram-subhead\">MIGHT (possibilidade)</h5><p>SUJEITO + MIGHT + VERBO (forma original)<br>→ Não muda com he/she/it.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">In the past, people used to travel by ship.</span> <span class=\"gram-trans\">(No passado, viajava-se de navio.)</span></li><li><span class=\"gram-eng\">Today, most people fly.</span> <span class=\"gram-trans\">(Hoje, a maioria voa.)</span></li><li><span class=\"gram-eng\">I might go to the party tonight.</span> <span class=\"gram-trans\">(Talvez eu vá à festa hoje.)</span></li><li><span class=\"gram-eng\">She might not come.</span> <span class=\"gram-trans\">(Ela talvez não venha.)</span></li><li><span class=\"gram-eng\">It might rain later.</span> <span class=\"gram-trans\">(Pode chover mais tarde.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>MIGHT sempre seguido de VERBO ORIGINAL: ❌ &quot;might to go&quot; / ✔️ &quot;might go&quot;.</li><li>MIGHT NOT não tem contração: dizemos &quot;might not&quot;, nunca &quot;mightn't&quot;.</li></ul></div></div>"},
{order:61,badge:"61",topic:"First Conditional",book:"Blue book",ref:"Blue book - pg. 61",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O FIRST CONDITIONAL fala de situações REAIS e POSSÍVEIS no futuro.<br>Tem duas partes: a condição (IF + presente) e o resultado (WILL).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>IF + sujeito + verbo no PRESENTE, sujeito + WILL + verbo</p><p>Ou invertido:<br>Sujeito + WILL + verbo + IF + sujeito + verbo no PRESENTE.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">If it rains, I will stay home.</span> <span class=\"gram-trans\">(Se chover, ficarei em casa.)</span></li><li><span class=\"gram-eng\">If you study, you'll pass the exam.</span> <span class=\"gram-trans\">(Se você estudar, passará na prova.)</span></li><li><span class=\"gram-eng\">She'll be happy if you call her.</span> <span class=\"gram-trans\">(Ela ficará feliz se você ligar.)</span></li><li><span class=\"gram-eng\">If I have time, I'll help you.</span> <span class=\"gram-trans\">(Se eu tiver tempo, te ajudarei.)</span></li><li><span class=\"gram-eng\">What will you do if it snows tomorrow?</span> <span class=\"gram-trans\">(O que fará se nevar amanhã?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>NUNCA use WILL na parte do IF: ❌ &quot;If it will rain&quot; / ✔️ &quot;If it rains&quot;.</li><li>Quando a frase começa com IF, use vírgula antes da segunda parte.</li></ul></div></div>"},
{order:65,badge:"65",topic:"Gerunds, so & Neither",book:"Blue book",ref:"Blue book - pg. 65",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>GERUNDS são verbos com -ING usados como substantivos. SO e NEITHER<br>expressam concordância: SO para afirmativas, NEITHER para negativas.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">GERUND COMO SUBSTANTIVO</h5><p>Verbo + ING no início da frase ou após preposição.<br>&quot;Swimming is fun.&quot; / &quot;I'm good at swimming.&quot;</p><h5 class=\"gram-subhead\">CONCORDÂNCIA</h5><p>Afirmativa: SO + verbo auxiliar + sujeito<br>Negativa:   NEITHER + verbo auxiliar + sujeito</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Swimming is great exercise.</span> <span class=\"gram-trans\">(Nadar é um ótimo exercício.)</span></li><li><span class=\"gram-eng\">I love cooking.</span> <span class=\"gram-trans\">(Adoro cozinhar.)</span></li><li><span class=\"gram-eng\">A: I like coffee.  B: So do I.</span> <span class=\"gram-trans\">(Eu também.)</span></li><li><span class=\"gram-eng\">A: I'm tired.      B: So am I.</span> <span class=\"gram-trans\">(Eu também.)</span></li><li><span class=\"gram-eng\">A: I don't like fish. B: Neither do I.</span> <span class=\"gram-trans\">(Nem eu.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Após &quot;so&quot; e &quot;neither&quot;, inverte sujeito e verbo: &quot;So do I&quot;, &quot;Neither am I&quot;.</li><li>O auxiliar deve combinar com o verbo da primeira frase (do/am/can/etc.).</li></ul></div></div>"},
{order:68,badge:"68",topic:"Clauses with Because (Orações com Because)",book:"Blue book",ref:"Blue book - pg. 68 (Unit 10 - I like working with people.)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>BECAUSE introduz a CAUSA ou RAZÃO de algo. Conecta duas orações: a consequência (oração principal) e a causa (após because).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><p>Oração principal + BECAUSE + sujeito + verbo + complemento</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I stayed home because I was sick.</span> <span class=\"gram-trans\">(Fiquei em casa porque estava doente.)</span></li><li><span class=\"gram-eng\">She's tired because she worked all night.</span> <span class=\"gram-trans\">(Ela está cansada porque trabalhou a noite toda.)</span></li><li><span class=\"gram-eng\">We canceled the trip because it was raining.</span> <span class=\"gram-trans\">(Cancelamos a viagem porque estava chovendo.)</span></li><li><span class=\"gram-eng\">He's learning English because he wants to travel.</span> <span class=\"gram-trans\">(Ele está aprendendo inglês porque quer viajar.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><p>BECAUSE + ORAÇÃO (sujeito + verbo). BECAUSE OF + SUBSTANTIVO. Não confunda os dois.</p></div></div>"},
{order:73,badge:"73",topic:"Passive Voice No Simple Past",book:"Blue book",ref:"Blue book - pg. 73",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>A voz passiva inverte o foco: em vez de quem PRATICA a ação, focamos<br>em quem RECEBE a ação. No passado, usamos WAS/WERE + particípio passado.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ATIVA:    Sujeito + verbo + objeto</h5><p>PASSIVA: Objeto + WAS/WERE + past participle + (BY + agente)</p><h5 class=\"gram-subhead\">FÓRMULA</h5><p>WAS/WERE + past participle (3ª coluna do verbo)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The book was written in 1990.</span> <span class=\"gram-trans\">(O livro foi escrito em 1990.)</span></li><li><span class=\"gram-eng\">These houses were built last year.</span> <span class=\"gram-trans\">(Estas casas foram construídas ano passado.)</span></li><li><span class=\"gram-eng\">The Mona Lisa was painted by Da Vinci.</span> <span class=\"gram-trans\">(A Mona Lisa foi pintada por Da Vinci.)</span></li><li><span class=\"gram-eng\">The thieves were arrested by the police.</span> <span class=\"gram-trans\">(Os ladrões foram presos pela polícia.)</span></li><li><span class=\"gram-eng\">The cake was eaten by the kids.</span> <span class=\"gram-trans\">(O bolo foi comido pelas crianças.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use BY apenas se for IMPORTANTE saber quem fez: &quot;The window was broken.&quot; (sem by).</li><li>Use o particípio passado (3ª coluna): write → wrote → WRITTEN.</li></ul></div></div>"},
{order:75,badge:"75",topic:"Passive Voice Without By (Voz Passiva sem By)",book:"Blue book",ref:"Blue book - pg. 75 (Unit 11 - It's really worth seeing!)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>A voz passiva sem BY é usada quando o agente (quem realiza a ação) é desconhecido, óbvio ou irrelevante. O foco fica na ação ou no resultado.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><p>Sujeito + BE (conjugado) + past participle</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">English is spoken in many countries.</span> <span class=\"gram-trans\">(Inglês é falado em muitos países.)</span></li><li><span class=\"gram-eng\">The Eiffel Tower was built in 1889.</span> <span class=\"gram-trans\">(A Torre Eiffel foi construída em 1889.)</span></li><li><span class=\"gram-eng\">Cars are made in Japan.</span> <span class=\"gram-trans\">(Carros são feitos no Japão.)</span></li><li><span class=\"gram-eng\">My wallet was stolen yesterday.</span> <span class=\"gram-trans\">(Minha carteira foi roubada ontem.)</span></li><li><span class=\"gram-eng\">Breakfast is served at 7 a.m.</span> <span class=\"gram-trans\">(O café da manhã é servido às 7h.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><p>Omitimos BY + agente quando: não sabemos quem fez, é óbvio, ou não importa. O importante é a AÇÃO/RESULTADO.</p></div></div>"},
{order:79,badge:"79",topic:"Past Continuous",book:"Blue book",ref:"Blue book - pg. 79",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O PAST CONTINUOUS expressa ações que estavam EM PROGRESSO em um<br>momento do passado. Muito usado para descrever cenário e interrupções.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">AFIRMATIVA</h5><p>SUJEITO + WAS/WERE + VERBO-ING</p><h5 class=\"gram-subhead\">NEGATIVA</h5><p>SUJEITO + WASN'T/WEREN'T + VERBO-ING</p><h5 class=\"gram-subhead\">INTERROGATIVA</h5><p>WAS/WERE + SUJEITO + VERBO-ING?</p><h5 class=\"gram-subhead\">COMUM COM &quot;WHEN&quot; (interrupção)</h5><p>I was sleeping when the phone rang.</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I was studying at 8 p.m. last night.</span> <span class=\"gram-trans\">(Eu estava estudando ontem às 20h.)</span></li><li><span class=\"gram-eng\">She was cooking when I arrived.</span> <span class=\"gram-trans\">(Ela estava cozinhando quando cheguei.)</span></li><li><span class=\"gram-eng\">They weren't watching TV.</span> <span class=\"gram-trans\">(Eles não estavam assistindo TV.)</span></li><li><span class=\"gram-eng\">What were you doing yesterday at noon?</span> <span class=\"gram-trans\">(O que você estava fazendo ontem ao meio-dia?)</span></li><li><span class=\"gram-eng\">It was raining all morning.</span> <span class=\"gram-trans\">(Estava chovendo a manhã toda.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Past Continuous + WHEN + Simple Past: a ação contínua é INTERROMPIDA.</li><li>Use WAS para singular (I, he, she, it); WERE para plural + you.</li></ul></div></div>"},
{order:81,badge:"81",topic:"Present Perfect Continuous",book:"Blue book",ref:"Blue book - pg. 81",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O PRESENT PERFECT CONTINUOUS indica uma ação que COMEÇOU no passado<br>e CONTINUA até agora — com ênfase na DURAÇÃO.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>SUJEITO + HAVE/HAS + BEEN + VERBO-ING</p><h5 class=\"gram-subhead\">MARCADORES DE TEMPO</h5><p>FOR + período (for two hours)<br>SINCE + ponto no tempo (since 2020)<br>ALL DAY, ALL MORNING, LATELY</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I have been studying English for three years.</span> <span class=\"gram-trans\">(Estudo inglês há 3 anos.)</span></li><li><span class=\"gram-eng\">She has been working since 8 a.m.</span> <span class=\"gram-trans\">(Ela trabalha desde as 8h.)</span></li><li><span class=\"gram-eng\">They have been waiting for an hour.</span> <span class=\"gram-trans\">(Eles estão esperando há uma hora.)</span></li><li><span class=\"gram-eng\">It has been raining all day.</span> <span class=\"gram-trans\">(Está chovendo o dia todo.)</span></li><li><span class=\"gram-eng\">What have you been doing lately?</span> <span class=\"gram-trans\">(O que você tem feito ultimamente?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>FOR + duração (&quot;for 3 hours&quot;) | SINCE + ponto inicial (&quot;since Monday&quot;).</li><li>Foco é na DURAÇÃO contínua; ação ainda está acontecendo ou acabou de parar.</li></ul></div></div>"},
{order:87,badge:"87",topic:"Participles as Adjectives",book:"Blue book",ref:"Blue book - pg. 87 (Unit 13 - That's entertainment!)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Particípios podem funcionar como ADJETIVOS. -ING descreve a CAUSA do<br>sentimento (a característica do objeto/situação); -ED descreve o<br>SENTIMENTO de quem experimenta.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">-ING → CAUSA (característica do objeto/situação)</h5><p>&quot;The movie is boring.&quot; (O filme é entediante.)<br>&quot;The book is interesting.&quot; (O livro é interessante.)</p><h5 class=\"gram-subhead\">-ED → SENTIMENTO (como a pessoa se sente)</h5><p>&quot;I am bored.&quot; (Estou entediado.)<br>&quot;She is interested.&quot; (Ela está interessada.)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The movie was boring. I was bored.</span> <span class=\"gram-trans\">(Filme chato. Fiquei entediado.)</span></li><li><span class=\"gram-eng\">It's an interesting book. I'm interested.</span> <span class=\"gram-trans\">(Livro interessante. Estou interessado.)</span></li><li><span class=\"gram-eng\">The news was shocking. We were shocked.</span> <span class=\"gram-trans\">(A notícia foi chocante. Ficamos chocados.)</span></li><li><span class=\"gram-eng\">A tiring day. I'm exhausted.</span> <span class=\"gram-trans\">(Um dia cansativo. Estou exausto.)</span></li><li><span class=\"gram-eng\">A surprising result. We're surprised.</span> <span class=\"gram-trans\">(Um resultado surpreendente. Estamos surpresos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>-ING = característica do OBJETO/causa.  -ED = como VOCÊ se sente.</li><li>&quot;I'm boring&quot; (sou chato) ≠ &quot;I'm bored&quot; (estou entediado) — cuidado!</li></ul></div></div>"},
{order:89,badge:"89",topic:"Relative Pronouns - Who, Which, That",book:"Blue book",ref:"Blue book - pg. 89 (Unit 13 - That's entertainment!)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Pronomes relativos (WHO, WHICH, THAT) introduzem orações que dão<br>informações sobre substantivos. WHO é para pessoas, WHICH para coisas<br>e animais, THAT serve para ambos (mais informal).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">WHO → para PESSOAS</h5><p>&quot;The man WHO lives next door is a doctor.&quot;</p><h5 class=\"gram-subhead\">WHICH → para COISAS e ANIMAIS</h5><p>&quot;The book WHICH I bought is great.&quot;</p><h5 class=\"gram-subhead\">THAT → para PESSOAS, COISAS e ANIMAIS (mais informal)</h5><p>&quot;The movie THAT we watched was boring.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">People who exercise live longer.</span> <span class=\"gram-trans\">(Pessoas que se exercitam vivem mais.)</span></li><li><span class=\"gram-eng\">The car which is parked outside is mine.</span> <span class=\"gram-trans\">(O carro que está estacionado lá é meu.)</span></li><li><span class=\"gram-eng\">The actor that won the Oscar is here.</span> <span class=\"gram-trans\">(O ator que ganhou o Oscar está aqui.)</span></li><li><span class=\"gram-eng\">I love songs that have good lyrics.</span> <span class=\"gram-trans\">(Adoro músicas que têm boas letras.)</span></li><li><span class=\"gram-eng\">She's the woman who taught me English.</span> <span class=\"gram-trans\">(Ela é a mulher que me ensinou inglês.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Na conversa, THAT é usado bem mais que WHO/WHICH.</li><li>WHO sempre se refere a pessoas; WHICH NUNCA se refere a pessoas.</li></ul></div></div>"},
{order:93,badge:"93",topic:"Modals and Adverbs",book:"Blue book",ref:"Blue book - pg. 93 (Unit 14 - Now I get it!)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Modais expressam diferentes níveis de certeza, permissão e obrigação.<br>Advérbios (always, never, definitely, probably, maybe) reforçam ou<br>atenuam a intensidade da afirmação.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">MODAIS COMUNS</h5><p>must, have to, should, can, may, might, could</p><h5 class=\"gram-subhead\">ADVÉRBIOS QUE INTENSIFICAM/ATENUAM</h5><p>definitely, certainly, probably, maybe, perhaps<br>always, usually, often, sometimes, rarely, never</p><h5 class=\"gram-subhead\">FÓRMULA</h5><p>SUJEITO + MODAL + (ADVÉRBIO) + VERBO (forma base)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">You should definitely visit Rio.</span> <span class=\"gram-trans\">(Você definitivamente deveria visitar o Rio.)</span></li><li><span class=\"gram-eng\">She might probably arrive late.</span> <span class=\"gram-trans\">(Ela provavelmente chegará tarde.)</span></li><li><span class=\"gram-eng\">I can usually finish on time.</span> <span class=\"gram-trans\">(Geralmente consigo terminar no prazo.)</span></li><li><span class=\"gram-eng\">They must certainly know the answer.</span> <span class=\"gram-trans\">(Eles certamente sabem a resposta.)</span></li><li><span class=\"gram-eng\">Maybe we could go tomorrow.</span> <span class=\"gram-trans\">(Talvez pudéssemos ir amanhã.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>DEFINITELY/CERTAINLY = certeza alta. PROBABLY = certeza média. MAYBE/PERHAPS = baixa.</li><li>A posição típica: SUJEITO + MODAL + ADVÉRBIO + VERBO.</li></ul></div></div>"},
{order:95,badge:"95",topic:"Permission, Obligation, and Prohibition",book:"Blue book",ref:"Blue book - pg. 95 (Unit 14 - Now I get it!)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para expressar PERMISSÃO, OBRIGAÇÃO e PROIBIÇÃO usamos modais<br>específicos. A escolha do modal indica quão forte é a regra e de onde<br>ela vem (interna, externa, social).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PERMISSÃO</h5><p>can / be allowed to / may<br>&quot;You can use my phone.&quot; / &quot;Students are allowed to leave.&quot;</p><h5 class=\"gram-subhead\">OBRIGAÇÃO</h5><p>must (forte/regra) / have to (externa) / should (conselho)<br>&quot;You must wear a seatbelt.&quot; / &quot;I have to work tomorrow.&quot;</p><h5 class=\"gram-subhead\">PROIBIÇÃO</h5><p>must not / can't / be not allowed to<br>&quot;You must not smoke here.&quot; / &quot;Children aren't allowed to enter.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">You must wear a seatbelt.</span> <span class=\"gram-trans\">(Você deve usar cinto.)</span></li><li><span class=\"gram-eng\">Students are not allowed to use phones.</span> <span class=\"gram-trans\">(Alunos não podem usar celular.)</span></li><li><span class=\"gram-eng\">I have to wake up early tomorrow.</span> <span class=\"gram-trans\">(Tenho que acordar cedo amanhã.)</span></li><li><span class=\"gram-eng\">Visitors may enter after 9 a.m.</span> <span class=\"gram-trans\">(Visitantes podem entrar após 9h.)</span></li><li><span class=\"gram-eng\">You can't park here.</span> <span class=\"gram-trans\">(Você não pode estacionar aqui.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>MUST = obrigação forte/regra interna. HAVE TO = obrigação externa.</li><li>BE ALLOWED TO = ter permissão (formal). CAN = ter permissão (informal).</li></ul></div></div>"},
{order:101,badge:"101",topic:"Second Conditional",book:"Blue book",ref:"Blue book - pg. 101",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O SECOND CONDITIONAL fala de situações HIPOTÉTICAS ou IRREAIS no<br>presente/futuro. Falamos sobre &quot;o que faríamos se...&quot;.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>IF + sujeito + verbo no PASSADO, sujeito + WOULD + verbo</p><h5 class=\"gram-subhead\">ATENÇÃO</h5><p>Com TO BE, usar WERE para todos os sujeitos.<br>&quot;If I WERE rich...&quot; (não &quot;if I was&quot;)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">If I had more money, I would travel the world.</span> <span class=\"gram-trans\">(Se tivesse mais dinheiro, viajaria.)</span></li><li><span class=\"gram-eng\">If she were taller, she would play basketball.</span> <span class=\"gram-trans\">(Se ela fosse mais alta, jogaria basquete.)</span></li><li><span class=\"gram-eng\">What would you do if you won the lottery?</span> <span class=\"gram-trans\">(O que faria se ganhasse na loteria?)</span></li><li><span class=\"gram-eng\">I would help you if I could.</span> <span class=\"gram-trans\">(Eu te ajudaria se pudesse.)</span></li><li><span class=\"gram-eng\">If they lived here, we'd see them more.</span> <span class=\"gram-trans\">(Se morassem aqui, os veríamos mais.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Situação IRREAL/HIPOTÉTICA — diferente do First Conditional (situação possível).</li><li>A contração de WOULD é 'D: I'd, she'd, we'd.</li></ul></div></div>"},
{order:101,badge:"101",topic:"Third Conditional (Condicional Tipo 3)",book:"Blue book",ref:"Blue book - pg. 101 (Unit 15 - I wouldn't have done that.)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O Third Conditional expressa situações IRREAIS do PASSADO — algo que não aconteceu, mas imaginamos as consequências hipotéticas se tivesse acontecido. É usado para arrependimentos e especulações sobre o passado.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><p>IF + sujeito + had + past participle, sujeito + would have + past participle</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">If I had studied more, I would have passed the test.</span> <span class=\"gram-trans\">(Se eu tivesse estudado mais, teria passado na prova.)</span></li><li><span class=\"gram-eng\">She would have come if you had invited her.</span> <span class=\"gram-trans\">(Ela teria vindo se você a tivesse convidado.)</span></li><li><span class=\"gram-eng\">If we hadn't missed the bus, we wouldn't have been late.</span> <span class=\"gram-trans\">(Se não tivéssemos perdido o ônibus, não teríamos nos atrasado.)</span></li><li><span class=\"gram-eng\">I would have helped you if I had known.</span> <span class=\"gram-trans\">(Eu teria ajudado se tivesse sabido.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><p>Use para situações 100% impossíveis (já passaram). Could have / might have também aparecem na oração principal para variar o sentido.</p></div></div>"},
{order:103,badge:"103",topic:"Past Modals - Should have / would have",book:"Blue book",ref:"Blue book - pg. 103",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Os past modals expressam ARREPENDIMENTO ou CRÍTICA sobre o passado:<br>o que deveríamos ter feito (mas não fizemos).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">SHOULD HAVE + past participle</h5><p>→ Conselho/arrependimento sobre o passado.</p><h5 class=\"gram-subhead\">WOULD HAVE + past participle</h5><p>→ Resultado hipotético no passado.</p><h5 class=\"gram-subhead\">NEGATIVAS</h5><p>shouldn't have / wouldn't have</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">You should have studied more.</span> <span class=\"gram-trans\">(Você devia ter estudado mais.)</span></li><li><span class=\"gram-eng\">I shouldn't have eaten so much.</span> <span class=\"gram-trans\">(Eu não deveria ter comido tanto.)</span></li><li><span class=\"gram-eng\">She would have come if you'd invited her.</span> <span class=\"gram-trans\">(Ela teria vindo se você a tivesse convidado.)</span></li><li><span class=\"gram-eng\">We should have left earlier.</span> <span class=\"gram-trans\">(Devíamos ter saído mais cedo.)</span></li><li><span class=\"gram-eng\">He wouldn't have failed if he had practiced.</span> <span class=\"gram-trans\">(Ele não teria reprovado se tivesse praticado.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;Should have&quot; indica que NÃO aconteceu (arrependimento).</li><li>Pronúncia comum: &quot;should have&quot; → /ʃʊdəv/, soa como &quot;shoulda&quot;.</li></ul></div></div>"},
{order:107,badge:"107",topic:"Reported Speech with Requests",book:"Blue book",ref:"Blue book - pg. 107",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para relatar PEDIDOS feitos por outra pessoa, usamos a estrutura<br>ASK/TELL + alguém + TO + verbo. O pedido vira indireto.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>SUJEITO + ASKED/TOLD + alguém + TO + verbo<br>→ Pedido negativo: + NOT TO + verbo</p><h5 class=\"gram-subhead\">Direct: &quot;Please call me.&quot; (pedido direto)</h5><h5 class=\"gram-subhead\">Reported: She asked me to call her.</h5></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Direct:  &quot;Open the door.&quot;</li></ul><p>Reported: He told me to open the door.</p><ul class=\"gram-bullets\"><li>Direct:  &quot;Please don't be late.&quot;</li></ul><p>Reported: She asked me not to be late.</p><ul class=\"gram-bullets\"><li>Direct:  &quot;Bring your book.&quot;</li></ul><p>Reported: The teacher told us to bring our books.</p><ul class=\"gram-bullets\"><li>Direct:  &quot;Could you help me?&quot;</li></ul><p>Reported: She asked me to help her.</p></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>ASK soa mais educado; TELL é mais direto.</li><li>Pedido NEGATIVO: ASK/TELL + alguém + NOT TO + verbo.</li></ul></div></div>"},
{order:109,badge:"109",topic:"Reported Speech",book:"Blue book",ref:"Blue book - pg. 109",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O REPORTED SPEECH (discurso indireto) relata o que alguém disse, sem<br>usar aspas. Geralmente o tempo verbal &quot;recua&quot; um passo no passado.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>SUJEITO + SAID/TOLD (alguém) + (THAT) + frase</p><h5 class=\"gram-subhead\">MUDANÇAS DE TEMPO</h5><p>Present Simple → Past Simple<br>Present Cont. → Past Continuous<br>Will → Would<br>Can → Could</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Direct:   &quot;I am tired.&quot;</li></ul><p>Reported: He said (that) he was tired.</p><ul class=\"gram-bullets\"><li>Direct:   &quot;I will help you.&quot;</li></ul><p>Reported: She said she would help me.</p><ul class=\"gram-bullets\"><li>Direct:   &quot;We can do it.&quot;</li></ul><p>Reported: They told us they could do it.</p><ul class=\"gram-bullets\"><li>Direct:   &quot;I'm studying now.&quot;</li></ul><p>Reported: He said he was studying then.</p></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Pronomes também mudam: I → he/she, my → his/her, etc.</li><li>SAY não pede pessoa; TELL precisa: &quot;He said that...&quot; / &quot;He told me that...&quot;.</li></ul></div></div>"},

{order:3,badge:"3",topic:"Relative Pronouns as Subjects and Objects",book:"Green book",ref:"Green book - pg. 03 (Unit 1 - That's my kind of friend!)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>WHO/WHICH/THAT introduzem orações relativas que dão mais informação sobre pessoas (who) ou coisas (which). Podem funcionar como SUJEITO ou OBJETO da oração relativa.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><p>Como sujeito: substantivo + WHO/WHICH/THAT + verbo | Como objeto: substantivo + (WHO(M)/WHICH/THAT) + sujeito + verbo</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The woman who lives next door is a doctor.</span> <span class=\"gram-trans\">(sujeito)</span></li><li><span class=\"gram-eng\">The book that I read was great.</span> <span class=\"gram-trans\">(objeto — that pode ser omitido)</span></li><li><span class=\"gram-eng\">He's the man who called yesterday.</span> <span class=\"gram-trans\">(sujeito)</span></li><li><span class=\"gram-eng\">The movie which we watched was boring.</span> <span class=\"gram-trans\">(objeto)</span></li><li><span class=\"gram-eng\">I like people who are honest.</span> <span class=\"gram-trans\">(sujeito)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><p>WHO = pessoas. WHICH = coisas. THAT = ambos. Como OBJETO, o pronome relativo pode ser OMITIDO.</p></div></div>"},
{order:6,badge:"6",topic:"It Clauses with When",book:"Green book",ref:"Green book - pg. 6",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As IT-clauses com WHEN expressam REAÇÕES ou OPINIÕES a respeito de<br>certas situações. O sujeito é &quot;it&quot; — apontando para a situação como um todo.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>IT + verbo + adjetivo + WHEN + sujeito + verbo</p><h5 class=\"gram-subhead\">EXEMPLOS DE COMEÇO</h5><p>It's annoying when...<br>It bothers me when...<br>It makes me angry when...</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">It's annoying when people are late.</span> <span class=\"gram-trans\">(É chato quando as pessoas se atrasam.)</span></li><li><span class=\"gram-eng\">It bothers me when someone interrupts.</span> <span class=\"gram-trans\">(Me incomoda quando alguém interrompe.)</span></li><li><span class=\"gram-eng\">It makes me happy when I see my friends.</span> <span class=\"gram-trans\">(Me faz feliz quando vejo meus amigos.)</span></li><li><span class=\"gram-eng\">I hate it when the train is delayed.</span> <span class=\"gram-trans\">(Odeio quando o trem atrasa.)</span></li><li><span class=\"gram-eng\">It's nice when everyone helps.</span> <span class=\"gram-trans\">(É bom quando todos ajudam.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Frase começa com IT (sujeito vazio), e a situação real vem após WHEN.</li><li>&quot;I hate it when...&quot; sempre com IT — não dizemos &quot;I hate when&quot;.</li></ul></div></div>"},
{order:9,badge:"9",topic:"Gerund Phrases as Subjects and Objects",book:"Green book",ref:"Green book - pg. 09 (Unit 2 - Working 9 to 5)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Frases iniciadas com gerúndio (-ING) funcionam como SUJEITO ou OBJETO da frase, tratando uma ação como conceito ou ideia abstrata.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><p>Verbo-ING + complemento → no início da frase = sujeito; após verbo = objeto</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Learning English takes time. (Aprender inglês leva tempo.) [sujeito]</li><li>I enjoy traveling to new places. (Gosto de viajar.) [objeto]</li><li>Smoking is bad for your health. (Fumar faz mal.) [sujeito]</li><li>She loves cooking Italian food. (Ela adora cozinhar comida italiana.) [objeto]</li><li>Reading every day improves your vocabulary. [sujeito]</li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><p>Gerúndio como SUJEITO leva o verbo no SINGULAR. Após PREPOSIÇÕES, sempre use -ING (good at swimming, interested in learning).</p></div></div>"},
{order:9,badge:"9",topic:"Gerunds",book:"Green book",ref:"Green book - pg. 9",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O GERUND é o verbo + ING usado como SUBSTANTIVO. Pode ser o sujeito<br>da frase, objeto, ou aparecer após preposições.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">USOS PRINCIPAIS</h5><ul class=\"gram-bullets\"><li>Como SUJEITO: &quot;Reading is fun.&quot;</li><li>Após PREPOSIÇÃO: &quot;I'm good at cooking.&quot;</li><li>Após VERBOS específicos: &quot;She enjoys swimming.&quot;</li></ul><h5 class=\"gram-subhead\">VERBOS QUE PEDEM GERUND</h5><p>enjoy, finish, avoid, mind, suggest, keep, consider</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Smoking is bad for your health.</span> <span class=\"gram-trans\">(Fumar faz mal à saúde.)</span></li><li><span class=\"gram-eng\">I enjoy listening to music.</span> <span class=\"gram-trans\">(Gosto de ouvir música.)</span></li><li><span class=\"gram-eng\">He's interested in learning Spanish.</span> <span class=\"gram-trans\">(Ele se interessa em aprender espanhol.)</span></li><li><span class=\"gram-eng\">She finished writing her report.</span> <span class=\"gram-trans\">(Ela terminou de escrever o relatório.)</span></li><li><span class=\"gram-eng\">Thanks for helping me.</span> <span class=\"gram-trans\">(Obrigado por me ajudar.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Após qualquer PREPOSIÇÃO, sempre use -ING: &quot;before going&quot;, &quot;after eating&quot;.</li><li>Como sujeito, o gerund parece singular: &quot;Reading IS fun&quot; (não &quot;are fun&quot;).</li></ul></div></div>"},
{order:11,badge:"11",topic:"Comparisons (Avançado)",book:"Green book",ref:"Green book - pg. 11",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Além dos comparativos básicos, existem formas mais sofisticadas para<br>comparar coisas: ...AS ...AS (igualdade), THE SAME (idêntico), DIFFERENT FROM<br>(diferente).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">IGUALDADE</h5><p>AS + adjetivo + AS  →  &quot;as tall as&quot;</p><h5 class=\"gram-subhead\">IDENTIDADE</h5><p>THE SAME (AS)  →  &quot;the same as my brother&quot;</p><h5 class=\"gram-subhead\">DIFERENÇA</h5><p>DIFFERENT FROM  →  &quot;different from yours&quot;</p><h5 class=\"gram-subhead\">SIMILARIDADE</h5><p>SIMILAR TO  →  &quot;similar to mine&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">My phone is as expensive as yours.</span> <span class=\"gram-trans\">(Meu celular é tão caro quanto o seu.)</span></li><li><span class=\"gram-eng\">This house is the same as that one.</span> <span class=\"gram-trans\">(Esta casa é igual àquela.)</span></li><li>Brazilian Portuguese is different from European Portuguese.</li><li><span class=\"gram-eng\">Her style is similar to mine.</span> <span class=\"gram-trans\">(O estilo dela é parecido com o meu.)</span></li><li><span class=\"gram-eng\">He isn't as old as he looks.</span> <span class=\"gram-trans\">(Ele não é tão velho quanto parece.)</span></li></ul>
