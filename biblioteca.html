 o jantar é servido tarde da noite.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: Use voz passiva SEM "by" quando o agente não importa ou é óbvio. Use voz passiva COM "by" quando o agente é relevante:</li></ul><p>- "Brazil is known for soccer." (sem by - agente irrelevante)<br>- "The Mona Lisa was painted BY Leonardo da Vinci." (com by - agente importante)</p><ul class="gram-bullets"><li>ESTRUTURA RÁPIDA - Simple Present Passive: - Singular: IS + past participle → "Coffee IS GROWN." - Plural: ARE + past participle → "Coffees ARE GROWN."</li></ul><ul class="gram-bullets"><li>COMPARAÇÃO ATIVA vs PASSIVA:</li></ul><p>ATIVA: PASSIVA:<br>"People speak English." → "English is spoken."<br>"Brazil grows coffee." → "Coffee is grown in Brazil."<br>"They make cars here." → "Cars are made here."</p><ul class="gram-bullets"><li>PAST PARTICIPLE comum em descrições de lugares: - located (localizado) - found (encontrado) - known (conhecido) - made (feito) - grown (cultivado) - produced (produzido) - spoken (falado) - visited (visitado) - sold (vendido)</li></ul><ul class="gram-bullets"><li>EM CIÊNCIA e EDUCAÇÃO, a voz passiva é EXTREMAMENTE comum: - "Water is composed of hydrogen and oxygen." - "Photosynthesis is performed by plants." - "The Earth is rotated around the Sun." (informalmente)</li></ul><ul class="gram-bullets"><li>EM RECEITAS E INSTRUÇÕES também é comum: - "Eggs are beaten." - "Sugar is added." - "The mixture is poured into the pan."</li></ul></div></div>'},
{order:1013,badge:'U13',topic:'PARTICIPLES AS ADJECTIVES & RELATIVE PRONOUNS',book:'Blue book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta unidade apresenta dois conteúdos importantes para descrições mais<br>ricas e detalhadas:</p><p>1) PARTICIPLES AS ADJECTIVES (Particípios como Adjetivos)<br>Verbos terminados em -ING ou -ED podem funcionar como ADJETIVOS,<br>descrevendo características de pessoas e coisas.</p><p>2) RELATIVE PRONOUNS (Pronomes Relativos)<br>Palavras usadas para conectar duas orações, evitando repetições.<br>Os principais são: WHO, THAT, WHICH.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">PARTICIPLES AS ADJECTIVES:</h5><p>1) -ING ADJECTIVES (descrevem a fonte/causa do sentimento):<br>"The movie is BORING." (o filme causa tédio)<br>"The book is INTERESTING." (o livro causa interesse)</p><p>2) -ED ADJECTIVES (descrevem como a pessoa SE SENTE):<br>"I am BORED." (estou entediado)<br>"She is INTERESTED." (ela está interessada)</p><h5 class="gram-subhead">RELATIVE PRONOUNS:</h5><p>WHO → para PESSOAS<br>"The man WHO called is my uncle."</p><p>THAT → para PESSOAS ou COISAS (mais comum em conversação)<br>"The book THAT I read was great."</p><p>WHICH → para COISAS (mais formal)<br>"The movie WHICH won the Oscar..."</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">PARTICIPLES AS ADJECTIVES:</h5><p>-ING (causa do sentimento):</p><ul class="gram-bullets"><li><span class="gram-eng">The movie is exciting.</span> <span class="gram-trans">(O filme é emocionante.)</span></li><li><span class="gram-eng">The lecture was boring.</span> <span class="gram-trans">(A aula foi entediante.)</span></li><li><span class="gram-eng">This book is fascinating.</span> <span class="gram-trans">(Este livro é fascinante.)</span></li></ul><p>-ED (sentimento causado):</p><ul class="gram-bullets"><li><span class="gram-eng">I am excited about the movie.</span> <span class="gram-trans">(Estou animado com o filme.)</span></li><li><span class="gram-eng">The students were bored.</span> <span class="gram-trans">(Os alunos estavam entediados.)</span></li><li><span class="gram-eng">She is fascinated by history.</span> <span class="gram-trans">(Ela está fascinada por história.)</span></li></ul><h5 class="gram-subhead">COMPARAÇÃO -ING vs -ED:</h5><ul class="gram-bullets"><li>The movie is INTERESTING. (descreve o filme)</li><li><span class="gram-eng">I am INTERESTED in the movie.</span> <span class="gram-trans">(descreve como me sinto)</span></li></ul><ul class="gram-bullets"><li>The work is TIRING. (descreve o trabalho)</li><li><span class="gram-eng">I am TIRED from the work.</span> <span class="gram-trans">(descreve como me sinto)</span></li></ul><h5 class="gram-subhead">RELATIVE PRONOUNS:</h5><p>WHO (para pessoas):</p><ul class="gram-bullets"><li><span class="gram-eng">The actor who played Iron Man is Robert Downey Jr.</span> <span class="gram-trans">(O ator que interpretou o Homem de Ferro é o Robert Downey Jr.)</span></li><li>The director who made this movie is famous.</li></ul><p>THAT (versátil - pessoas ou coisas):</p><ul class="gram-bullets"><li>The movie that I watched yesterday was amazing.</li><li>The actor that won the Oscar gave a great speech.</li></ul><p>WHICH (para coisas - mais formal):</p><ul class="gram-bullets"><li>The film, which received many awards, was directed by Spielberg.</li><li>The book, which I read last week, is a bestseller.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE para PARTICIPLES como ADJETIVOS:</li></ul><p>Forma | Descreve | Exemplos<br>──────|───────────────────────|────────────────────────<br>-ING | A causa/fonte | a boring movie, an exciting book<br>-ED | O sentimento da pessoa| I\'m bored, I\'m excited</p><ul class="gram-bullets"><li>PARES COMUNS de adjetivos:</li></ul><p>-ING | -ED<br>───────────────────|────────────────────<br>boring | bored<br>interesting | interested<br>exciting | excited<br>amazing | amazed<br>surprising | surprised<br>tiring | tired<br>confusing | confused<br>embarrassing | embarrassed<br>shocking | shocked<br>exhausting | exhausted</p><ul class="gram-bullets"><li><span class="gram-eng">CUIDADO COM CONFUSÃO COMUM: ❌ "I am boring." (significa: eu sou uma pessoa chata) ✔️ "I am bored."</span> <span class="gram-trans">(significa: estou entediado)</span></li></ul><ul class="gram-bullets"><li>RELATIVE PRONOUNS - quando usar cada um:</li></ul><p>Pronome | Para | Quando usar<br>────────|─────────────────|──────────────────────────────<br>WHO | Pessoas | Definindo a pessoa<br>THAT | Pessoas/Coisas | Em conversação informal<br>WHICH | Coisas | Em contextos formais</p><ul class="gram-bullets"><li><span class="gram-eng">THAT vs WHICH - diferença importante: - "The book THAT I read was good." (defining - sem vírgulas) - "The book, WHICH I read last week, was good."</span> <span class="gram-trans">(non-defining - com vírgulas)</span></li></ul></div></div>'},
{order:1014,badge:'U14',topic:'MODALS & ADVERBS OF POSSIBILITY / PERMISSION,',book:'Blue book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta unidade aborda dois conjuntos de palavras essenciais:</p><p>1) MODAIS E ADVÉRBIOS DE POSSIBILIDADE<br>Para expressar diferentes níveis de CERTEZA sobre algo.</p><p>2) MODAIS PARA PERMISSÃO, OBRIGAÇÃO E PROIBIÇÃO<br>Para falar sobre o que é PERMITIDO, OBRIGATÓRIO ou PROIBIDO em<br>diferentes contextos culturais.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">MODAIS DE POSSIBILIDADE (escala de certeza):</h5><p>MIGHT → talvez (pouco provável)<br>MAY → talvez (mais formal)<br>COULD → pode ser (possibilidade)<br>MUST → deve ser (alta certeza)</p><p>Estrutura: SUJEITO + MODAL + verbo (forma original)</p><h5 class="gram-subhead">ADVÉRBIOS DE POSSIBILIDADE:</h5><p>MAYBE → talvez (no início da frase)<br>PERHAPS → talvez (mais formal)<br>PROBABLY → provavelmente<br>DEFINITELY → definitivamente / com certeza</p><p>Estrutura típica: Sujeito + advérbio + verbo<br>ou: Maybe/Perhaps + frase</p><h5 class="gram-subhead">MODAIS DE PERMISSÃO/OBRIGAÇÃO/PROIBIÇÃO:</h5><p>PERMISSÃO:</p><ul class="gram-bullets"><li>CAN / COULD / MAY → poder</li><li>BE ALLOWED TO → ser permitido a</li></ul><p>OBRIGAÇÃO:</p><ul class="gram-bullets"><li><span class="gram-eng">MUST → dever</span> <span class="gram-trans">(obrigação forte)</span></li><li><span class="gram-eng">HAVE TO → ter que</span> <span class="gram-trans">(obrigação externa)</span></li><li>SHOULD → deveria</li></ul><p>PROIBIÇÃO:</p><ul class="gram-bullets"><li>CAN\'T / CANNOT</li><li><span class="gram-eng">MUSTN\'T → não deve</span> <span class="gram-trans">(proibição)</span></li><li>NOT ALLOWED TO → não permitido</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">MODAIS DE POSSIBILIDADE:</h5><ul class="gram-bullets"><li><span class="gram-eng">He might be at home.</span> <span class="gram-trans">(Ele pode estar em casa.)</span></li><li><span class="gram-eng">She may know the answer.</span> <span class="gram-trans">(Ela talvez saiba a resposta.)</span></li><li><span class="gram-eng">They could be late.</span> <span class="gram-trans">(Eles podem estar atrasados.)</span></li><li><span class="gram-eng">He must be tired.</span> <span class="gram-trans">(Ele deve estar cansado - alta certeza.)</span></li></ul><h5 class="gram-subhead">ADVÉRBIOS DE POSSIBILIDADE:</h5><ul class="gram-bullets"><li><span class="gram-eng">Maybe she\'s busy.</span> <span class="gram-trans">(Talvez ela esteja ocupada.)</span></li><li><span class="gram-eng">Perhaps he forgot.</span> <span class="gram-trans">(Talvez ele tenha esquecido.)</span></li><li><span class="gram-eng">She\'s probably at work.</span> <span class="gram-trans">(Ela provavelmente está no trabalho.)</span></li><li><span class="gram-eng">He definitely loves her.</span> <span class="gram-trans">(Ele definitivamente a ama.)</span></li></ul><h5 class="gram-subhead">PERMISSÃO (cultural - acceptable behaviors):</h5><ul class="gram-bullets"><li>In Japan, you can take off your shoes inside.</li><li>In many countries, you may drink in public.</li><li>Children are allowed to play here.</li></ul><h5 class="gram-subhead">OBRIGAÇÃO:</h5><ul class="gram-bullets"><li><span class="gram-eng">You must wear a uniform at school.</span> <span class="gram-trans">(Você deve usar uniforme na escola.)</span></li><li><span class="gram-eng">Drivers have to follow traffic laws.</span> <span class="gram-trans">(Motoristas têm que seguir as leis de trânsito.)</span></li><li><span class="gram-eng">You should respect your elders.</span> <span class="gram-trans">(Você deveria respeitar os mais velhos.)</span></li></ul><h5 class="gram-subhead">PROIBIÇÃO:</h5><ul class="gram-bullets"><li><span class="gram-eng">You can\'t smoke here.</span> <span class="gram-trans">(Você não pode fumar aqui.)</span></li><li><span class="gram-eng">Children mustn\'t play with knives.</span> <span class="gram-trans">(Crianças não devem brincar com facas.)</span></li><li><span class="gram-eng">Visitors are not allowed to take photos.</span> <span class="gram-trans">(Visitantes não estão autorizados a tirar fotos.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>ESCALA DE CERTEZA (do menor para o maior):</li></ul><p>Não tenho certeza → Tenho certeza<br>─────────────────────────────────<br>might / may / could<br>perhaps / maybe<br>probably<br>definitely<br>must (positivo) / can\'t (negativo)</p><ul class="gram-bullets"><li>POSIÇÃO dos advérbios: - MAYBE/PERHAPS → geralmente no INÍCIO da frase "Maybe she\'s tired." - PROBABLY/DEFINITELY → no MEIO da frase "She\'s probably tired."</li></ul><ul class="gram-bullets"><li>DIFERENÇA cultural entre MUST e HAVE TO: - MUST → obrigação que VEM DE DENTRO (você acha importante) "I must study tonight." - HAVE TO → obrigação que VEM DE FORA (regra, lei) "I have to wear a uniform."</li></ul><ul class="gram-bullets"><li>PROIBIÇÃO: CAN\'T vs MUSTN\'T: - CAN\'T → não é permitido / não é possível - MUSTN\'T → é absolutamente proibido (forte) - DON\'T HAVE TO → NÃO É a mesma coisa! Significa "não é obrigatório"</li></ul><ul class="gram-bullets"><li>⚠️ DIFERENÇA IMPORTANTE: - MUSTN\'T = proibido (você não pode fazer) - DON\'T HAVE TO = não é necessário (mas pode fazer se quiser)</li></ul><p>Exemplo:<br>- "You mustn\'t smoke here." (proibido)<br>- "You don\'t have to come." (não precisa, mas pode)</p><ul class="gram-bullets"><li><span class="gram-eng">Em contextos CULTURAIS (foco da unidade), use: - "It\'s acceptable to..." (é aceitável) - "It\'s not acceptable to..." (não é aceitável) - "It\'s customary to..." (é costume) - "People are expected to..."</span> <span class="gram-trans">(espera-se que as pessoas)</span></li></ul></div></div>'},
{order:1015,badge:'U15',topic:'THIRD CONDITIONAL (Terceiro Condicional)',book:'Blue book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O THIRD CONDITIONAL é o "condicional irreal do PASSADO". Ele é usado para<br>falar sobre situações HIPOTÉTICAS do passado - coisas que NÃO aconteceram,<br>mas que IMAGINAMOS como teria sido SE tivessem acontecido.</p><p>É comum usá-lo para:</p><ul class="gram-bullets"><li>Expressar ARREPENDIMENTOS sobre o passado</li><li>Imaginar resultados DIFERENTES</li><li>Fazer ESPECULAÇÕES sobre o que poderia ter acontecido</li></ul><p>Em português, equivale a: "Se eu TIVESSE feito X, eu TERIA feito Y."</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA BÁSICA:</h5><p>IF + PAST PERFECT, + WOULD HAVE / COULD HAVE / MIGHT HAVE + PAST PARTICIPLE</p><h5 class="gram-subhead">DETALHES DAS PARTES:</h5><p>1) CLÁUSULA "IF" (condição irreal no passado):<br>IF + sujeito + HAD + past participle</p><p>2) CLÁUSULA RESULTADO (consequência hipotética):<br>Sujeito + WOULD/COULD/MIGHT + HAVE + past participle</p><h5 class="gram-subhead">MODAIS NA CLÁUSULA RESULTADO:</h5><p>WOULD HAVE → resultado mais provável (teria)<br>COULD HAVE → resultado possível (poderia ter)<br>MIGHT HAVE → resultado talvez possível (talvez tivesse)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">EXPRESSANDO ARREPENDIMENTOS:</h5><ul class="gram-bullets"><li><span class="gram-eng">If I had studied more, I would have passed the test.</span> <span class="gram-trans">(Se eu tivesse estudado mais, teria passado na prova.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">If she had left earlier, she wouldn\'t have missed the bus.</span> <span class="gram-trans">(Se ela tivesse saído mais cedo, não teria perdido o ônibus.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">If we had saved money, we could have bought a house.</span> <span class="gram-trans">(Se tivéssemos economizado dinheiro, poderíamos ter comprado uma casa.)</span></li></ul><h5 class="gram-subhead">ESPECULAÇÕES SOBRE O PASSADO:</h5><ul class="gram-bullets"><li>If they had taken a taxi, they would have arrived on time.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">If he had asked for help, things might have been different.</span> <span class="gram-trans">(Se ele tivesse pedido ajuda, as coisas talvez tivessem sido diferentes.)</span></li></ul><ul class="gram-bullets"><li>If you had called me, I would have helped you.</li></ul><h5 class="gram-subhead">COM SITUAÇÕES HIPOTÉTICAS NEGATIVAS:</h5><ul class="gram-bullets"><li><span class="gram-eng">If I hadn\'t gone to the party, I wouldn\'t have met her.</span> <span class="gram-trans">(Se eu não tivesse ido à festa, não teria conhecido ela.)</span></li></ul><ul class="gram-bullets"><li>If she hadn\'t been sick, she would have come.</li></ul><ul class="gram-bullets"><li>If they hadn\'t moved, they would still be here.</li></ul><h5 class="gram-subhead">COMPARANDO 1ST, 2ND e 3RD CONDITIONAL:</h5><p>1ST CONDITIONAL (futuro real):<br>"If it rains, I will stay home."<br>(Se chover, vou ficar em casa - pode acontecer.)</p><p>2ND CONDITIONAL (presente/futuro irreal):<br>"If I had money, I would travel."<br>(Se eu tivesse dinheiro, viajaria - não tenho.)</p><p>3RD CONDITIONAL (passado irreal):<br>"If I had had money, I would have traveled."<br>(Se eu tivesse tido dinheiro, teria viajado - não tive.)</p></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE - tempos verbais corretos:</li></ul><p>Parte | Tempo verbal | Exemplo<br>──────────────|───────────────────────────|──────────────────<br>Cláusula IF | Past Perfect | If I HAD STUDIED<br>Cláusula | Would/Could/Might have + | I WOULD HAVE<br>RESULTADO | past participle | PASSED</p><ul class="gram-bullets"><li>ATENÇÃO ao "HAD" duplicado quando o verbo principal é "have": ✔️ "If I had had time..." (se eu tivesse tido tempo) (had = auxiliar + had = past participle de "have")</li></ul><ul class="gram-bullets"><li>Forma contraída: - I had → I\'d - I would have → I would\'ve / I\'d have</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Como SE INDICA arrependimento? Frases comuns: - "If only I had studied more!" (se eu ao menos tivesse estudado!) - "I wish I had told her."</span> <span class="gram-trans">(eu queria ter contado a ela)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">ORDEM das cláusulas pode ser invertida: - "If I had known, I would have called." (IF primeiro) - "I would have called if I had known."</span> <span class="gram-trans">(resultado primeiro - sem vírgula)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">ERRO COMUM: ❌ "If I would have studied, I would have passed." ✔️ "If I HAD STUDIED, I would have passed."</span> <span class="gram-trans">(Não use "would have" na cláusula IF!)</span></li></ul><ul class="gram-bullets"><li>ATALHO MNEMÔNICO: - 1st = real → present + will - 2nd = irreal presente → past + would - 3rd = irreal passado → past perfect + would have</li></ul></div></div>'}
],

{order:6,badge:'6',topic:'IT CLAUSES WITH WHEN',book:'Green book',ref:'Green book - pg. 6 e Green book - pg. 06',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>As IT CLAUSES WITH WHEN são estruturas usadas para expressar REAÇÕES,<br>EMOÇÕES e OPINIÕES sobre situações específicas. Elas são fundamentais<br>para falar sobre o que nos AGRADA, IRRITA, MAGOA ou DIVERTE.</p><p>Existem três estruturas principais nesta página:</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA 1: SUJEITO + VERBO + IT + WHEN</h5><p>(Sujeito faz uma ação para o "it" - a situação descrita)</p><p>sujeito + verbo + IT + WHEN + sujeito + verbo</p><p>Ex: I hate it when she screams.</p><h5 class="gram-subhead">ESTRUTURA 2: IT + VERBO + OBJETO + WHEN</h5><p>(A situação afeta o objeto/pessoa)</p><p>IT + verbo + me/us/her/him + WHEN + sujeito + verbo</p><p>Ex: It bothers me when she screams.</p><h5 class="gram-subhead">ESTRUTURA 3: IT + VERBO + ME + WHEN</h5><p>(Indica como uma situação faz o falante se sentir)</p><p>IT + verbo + ME + WHEN + sujeito + verbo</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA "SUJEITO + VERBO + IT + WHEN":</h5><ul class="gram-bullets"><li><span class="gram-eng">She likes it when her husband helps her.</span> <span class="gram-trans">(Ela gosta quando o marido a ajuda.)</span></li><li><span class="gram-eng">They hate it when their boss screams at them.</span> <span class="gram-trans">(Eles odeiam quando o chefe grita com eles.)</span></li><li>I hate it when people are rude.</li><li>I find it funny when I see people running.</li><li>I can\'t stand it when people are unfair.</li></ul><h5 class="gram-subhead">ESTRUTURA "IT + VERBO + OBJETO + WHEN":</h5><ul class="gram-bullets"><li><span class="gram-eng">It annoys me when she is not polite with her friends.</span> <span class="gram-trans">(Me irrita quando ela não é educada com as amigas.)</span></li><li><span class="gram-eng">It bothers her when John doesn\'t help with the housework.</span> <span class="gram-trans">(A incomoda quando o John não ajuda nas tarefas de casa.)</span></li></ul><h5 class="gram-subhead">ESTRUTURA "IT + VERBO + ME + WHEN":</h5><ul class="gram-bullets"><li><span class="gram-eng">It makes me happy when my friends help me.</span> <span class="gram-trans">(Me deixa feliz quando meus amigos me ajudam.)</span></li><li><span class="gram-eng">It upsets me when she screams at me.</span> <span class="gram-trans">(Me chateia quando ela grita comigo.)</span></li><li><span class="gram-eng">It irritates me when the room is messy.</span> <span class="gram-trans">(Me irrita quando o quarto está bagunçado.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>Verbos comuns em ESTRUTURA 1 (subject + verb + it + when): - like, hate, love, enjoy, dislike, can\'t stand, find (funny/strange)</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Verbos comuns em ESTRUTURA 2 e 3 (it + verb + me + when): - bother, annoy, irritate, upset, frustrate, please, amuse - make + adjetivo</span> <span class="gram-trans">(make me happy, make me sad, make me angry)</span></li></ul><ul class="gram-bullets"><li>REGRA-CHAVE: o "IT" não pode ser omitido nessas estruturas: ❌ I hate when she screams. ✔️ I hate IT when she screams.</li></ul><ul class="gram-bullets"><li>Essas estruturas são muito úteis para expressar PERSONALIDADE e PREFERÊNCIAS em uma conversa - aparecem frequentemente em pequenas conversas (small talk).</li></ul></div></div>'},
{order:9,badge:'9',topic:'GERUNDS (Gerúndios)',book:'Green book',ref:'Green book - pg. 9',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>GERUNDS (gerúndios) são formados adicionando -ING ao final de um verbo,<br>transformando-o em uma forma que funciona como SUBSTANTIVO.</p><p>Os gerúndios são usados em três situações principais:</p><p>1) Quando o verbo é o SUJEITO da frase<br>2) Após PREPOSIÇÕES (at, on, before, after, etc.)<br>3) Após CERTOS VERBOS (love, enjoy, avoid, like, hate, etc.)</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">USO 1 - GERÚNDIO COMO SUJEITO:</h5><p>VERBO + ING + verbo (resto da frase)</p><h5 class="gram-subhead">USO 2 - APÓS PREPOSIÇÕES:</h5><p>Sujeito + verbo + preposição + VERBO + ING</p><h5 class="gram-subhead">USO 3 - APÓS CERTOS VERBOS:</h5><p>Sujeito + verbo (love/enjoy/avoid/like/hate...) + VERBO + ING</p><h5 class="gram-subhead">VERBOS COMUNS QUE PEDEM GERÚNDIO:</h5><p>love, like, enjoy, hate, dislike, avoid, finish, keep,<br>stop, mind, suggest, consider, practice</p><h5 class="gram-subhead">PREPOSIÇÕES COMUNS QUE PEDEM GERÚNDIO:</h5><p>at, in, on, of, for, about, after, before, without, by, with</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">GERÚNDIO COMO SUJEITO DA FRASE:</h5><ul class="gram-bullets"><li><span class="gram-eng">Working as a teacher might be stressing.</span> <span class="gram-trans">(Trabalhar como professor pode ser estressante.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Being tired every day is concerning.</span> <span class="gram-trans">(Estar cansado todos os dias é preocupante.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Having too much to do is tiring.</span> <span class="gram-trans">(Ter muita coisa para fazer é cansativo.)</span></li></ul><h5 class="gram-subhead">GERÚNDIO APÓS PREPOSIÇÕES:</h5><ul class="gram-bullets"><li><span class="gram-eng">He is good at playing golf.</span> <span class="gram-trans">(Ele é bom em jogar golfe.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">He never plays after having a shower.</span> <span class="gram-trans">(Ele nunca brinca depois de tomar banho.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">He never eats before praying.</span> <span class="gram-trans">(Ele nunca come antes de rezar.)</span></li></ul><h5 class="gram-subhead">GERÚNDIO APÓS CERTOS VERBOS:</h5><ul class="gram-bullets"><li><span class="gram-eng">He enjoyed talking to you.</span> <span class="gram-trans">(Ele gostou de conversar com você.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She avoids eating chocolate on weekends.</span> <span class="gram-trans">(Ela evita comer chocolate nos fins de semana.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">They like being alone.</span> <span class="gram-trans">(Eles gostam de ficar sozinhos.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: APÓS PREPOSIÇÃO, sempre use GERÚNDIO, não INFINITIVO: ❌ I am good at to play soccer. ✔️ I am good at PLAYING soccer.</li></ul><ul class="gram-bullets"><li>Diferença entre VERBOS QUE PEDEM GERÚNDIO vs INFINITIVO: - Pedem GERÚNDIO: enjoy, avoid, finish, keep "I enjoy READING." - Pedem INFINITIVO: want, decide, hope, plan "I want TO READ."</li></ul><ul class="gram-bullets"><li>Alguns verbos aceitam AMBOS (com diferença sutil ou nenhuma): - like, love, hate, prefer, start, begin "I like reading." = "I like to read."</li></ul><ul class="gram-bullets"><li>Cuidado com a ortografia ao formar o gerúndio: - run → running (dobra a consoante) - take → taking (tira o E) - study → studying (mantém o Y) - lie → lying (Y vira I)</li></ul></div></div>'},
{order:11,badge:'11',topic:'COMPARISONS (Comparações Avançadas)',book:'Green book',ref:'Green book - pg. 11',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Em níveis mais avançados, fazemos COMPARAÇÕES usando diferentes tipos de<br>palavras na estrutura: ADJETIVOS, VERBOS, SUBSTANTIVOS e até PARTICÍPIOS<br>PASSADOS.</p><p>Cada tipo de palavra usa uma estrutura comparativa específica.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM ADJETIVOS (descrevem QUALIDADES):</h5><p>X + IS (NOT) + AS + adjetivo + AS + Y<br>X + IS + MORE/LESS + adjetivo + THAN + Y</p><h5 class="gram-subhead">COM VERBOS (descrevem AÇÕES):</h5><p>X + verbo + MORE/LESS + THAN + Y<br>X + verbo + AS MUCH AS + Y<br>X + NEGATIVO + verbo + AS MUCH AS + Y</p><h5 class="gram-subhead">COM SUBSTANTIVOS (coisas que possuímos):</h5><p>X + HAS + A/AN + adjetivo comparativo + substantivo + THAN + Y</p><h5 class="gram-subhead">COM PARTICÍPIOS PASSADOS (verbos no passado):</h5><p>X + IS (NOT) + AS + WELL + past participle + AS + Y<br>X + IS + MORE/LESS WELL + past participle + THAN + Y</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM ADJETIVOS (qualidades):</h5><ul class="gram-bullets"><li><span class="gram-eng">She is as beautiful as him.</span> <span class="gram-trans">(Ela é tão bonita quanto ele.)</span></li><li><span class="gram-eng">She isn\'t as beautiful as him.</span> <span class="gram-trans">(Ela não é tão bonita quanto ele.)</span></li><li><span class="gram-eng">She is more/less beautiful than him.</span> <span class="gram-trans">(Ela é mais/menos bonita do que ele.)</span></li></ul><h5 class="gram-subhead">COM VERBOS (ações):</h5><ul class="gram-bullets"><li><span class="gram-eng">She plays more/less than him.</span> <span class="gram-trans">(Ela brinca mais/menos do que ele.)</span></li><li><span class="gram-eng">She plays as much as him.</span> <span class="gram-trans">(Ela brinca tanto quanto ele.)</span></li><li><span class="gram-eng">She doesn\'t play as much as him.</span> <span class="gram-trans">(Ela não brinca tanto quanto ele.)</span></li></ul><h5 class="gram-subhead">COM SUBSTANTIVOS (coisas):</h5><ul class="gram-bullets"><li><span class="gram-eng">She has a better/worse job than him.</span> <span class="gram-trans">(Ela tem um trabalho melhor/pior do que ele.)</span></li><li><span class="gram-eng">He has more friends than her.</span> <span class="gram-trans">(Ele tem mais amigos do que ela.)</span></li></ul><h5 class="gram-subhead">COM PARTICÍPIOS PASSADOS:</h5><ul class="gram-bullets"><li><span class="gram-eng">His job is as well seen as mine.</span> <span class="gram-trans">(O trabalho dele é tão bem visto quanto o meu.)</span></li><li><span class="gram-eng">Her job isn\'t as well seen as mine.</span> <span class="gram-trans">(O trabalho dela não é tão bem visto quanto o meu.)</span></li><li>Her job is more/less well seen than mine.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>Estrutura de IGUALDADE: AS + adjetivo + AS - "tão...quanto" em português - As tall as / As big as / As smart as</li></ul><ul class="gram-bullets"><li>Estrutura de DESIGUALDADE: - MORE/LESS + adjetivo + THAN - "mais/menos...que" em português</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Lembre-se das diferenças entre adjetivos curtos e longos: - bigger than (não "more big than") - more expensive than</span> <span class="gram-trans">(não "expensiver than")</span></li></ul><ul class="gram-bullets"><li>Para comparar AÇÕES, use o verbo seguido de: - more/less than - as much as Ex: She studies more than her brother.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Comparativos irregulares: - good → better than → as good as - bad → worse than → as bad as - well → better → as well as</span> <span class="gram-trans">(advérbio)</span></li></ul></div></div>'},
{order:20,badge:'20',topic:'INDIRECT REQUESTS (Pedidos Indiretos)',book:'Green book',ref:'Green book - pg. 20',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Usamos INDIRECT REQUESTS quando queremos que alguém passe uma mensagem<br>para UMA TERCEIRA PESSOA, em vez de falar diretamente com ela.</p><p>Existem 4 tipos principais de pedidos indiretos, e a estrutura muda<br>conforme o tipo de mensagem:</p><p>1) STATEMENTS (passar informações)<br>2) IMPERATIVES (passar ordens/pedidos)<br>3) YES/NO QUESTIONS (passar perguntas de sim/não)<br>4) WH-QUESTIONS (passar perguntas com WH)</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">1. STATEMENTS (passar uma informação):</h5><p>Can/Could you TELL + (pessoa) + (THAT) + mensagem</p><h5 class="gram-subhead">2. IMPERATIVES (passar uma ordem ou pedido):</h5><p>Can/Could you TELL + (pessoa) + (NOT) + TO + verbo<br>Can/Could you ASK + (pessoa) + (NOT) + TO + verbo</p><h5 class="gram-subhead">3. YES/NO QUESTIONS (perguntas SIM/NÃO):</h5><p>Can/Could you ASK + (pessoa) + IF/WHETHER + sujeito + verbo</p><h5 class="gram-subhead">4. WH-QUESTIONS (perguntas com WH):</h5><p>Can/Could you ASK + (pessoa) + wh-word + sujeito + verbo</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">1. STATEMENTS (informações):</h5><ul class="gram-bullets"><li><span class="gram-eng">Can you tell Lucas (that) he forgot his shirt?</span> <span class="gram-trans">(Você pode dizer ao Lucas que ele esqueceu a camisa?)</span></li><li><span class="gram-eng">Could you tell Ana (that) she will be late to class?</span> <span class="gram-trans">(Você poderia dizer à Ana que ela vai chegar tarde na aula?)</span></li></ul><h5 class="gram-subhead">2. IMPERATIVES (ordens/pedidos):</h5><ul class="gram-bullets"><li><span class="gram-eng">Can you tell Marco to bring me my shirt?</span> <span class="gram-trans">(Você pode dizer ao Marco para me trazer minha camisa?)</span></li><li><span class="gram-eng">Could you ask Maria not to open the windows?</span> <span class="gram-trans">(Você poderia pedir à Maria para não abrir as janelas?)</span></li></ul><h5 class="gram-subhead">3. YES/NO QUESTIONS (perguntas sim/não):</h5><ul class="gram-bullets"><li><span class="gram-eng">Can you ask Maria if she can play the guitar?</span> <span class="gram-trans">(Você pode perguntar à Maria se ela sabe tocar violão?)</span></li><li><span class="gram-eng">Could you ask Lucas if he will help me?</span> <span class="gram-trans">(Você poderia perguntar ao Lucas se ele vai me ajudar?)</span></li><li>Could you ask Dana if she cooks well?</li></ul><h5 class="gram-subhead">4. WH-QUESTIONS (perguntas com WH):</h5><ul class="gram-bullets"><li><span class="gram-eng">Can you ask Maria where she studies?</span> <span class="gram-trans">(Você pode perguntar à Maria onde ela estuda?)</span></li><li><span class="gram-eng">Can you ask Paulo how he can play the guitar?</span> <span class="gram-trans">(Você pode perguntar ao Paulo como ele sabe tocar violão?)</span></li><li>Could you ask Pedro where he will move to?</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: nas perguntas indiretas, a estrutura interna é a de uma AFIRMAÇÃO, não de uma pergunta: ❌ Can you ask her where DOES she live? ✔️ Can you ask her where she LIVES?</li></ul><ul class="gram-bullets"><li>Diferença entre TELL e ASK em pedidos indiretos: - TELL → passar uma INFORMAÇÃO ou DAR uma ordem - ASK → passar uma PERGUNTA ou SOLICITAR algo</li></ul><ul class="gram-bullets"><li>IF vs WHETHER (ambos significam "se" para yes/no questions): - Both work: "Ask him if he likes coffee." - Both work: "Ask him whether he likes coffee." - WHETHER é mais formal</li></ul><ul class="gram-bullets"><li>Lembre-se: na forma negativa imperativa, "NOT" vem antes de "TO": ✔️ Tell him NOT TO be late. ❌ Tell him to not be late.</li></ul></div></div>'},
{order:25,badge:'25',topic:'PAST PERFECT (Passado Perfeito)',book:'Green book',ref:'Green book - pg. 25',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O PAST PERFECT TENSE é usado para expressar que uma ação aconteceu ANTES<br>de OUTRA AÇÃO no passado. Ou seja, é o "passado do passado".</p><p>Esse tempo verbal é SEMPRE usado em CONTRASTE com o Simple Past - é<br>preciso haver duas ações no passado, e o Past Perfect indica qual delas<br>ocorreu PRIMEIRO.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><p>SUJEITO + HAD + PAST PARTICIPLE + COMPLEMENTO</p><h5 class="gram-subhead">NEGATIVA:</h5><p>SUJEITO + HAD NOT (HADN\'T) + PAST PARTICIPLE + COMPLEMENTO</p><h5 class="gram-subhead">HAD é igual para TODOS os pronomes:</h5><p>I, YOU, HE, SHE, IT, WE, THEY + HAD</p><h5 class="gram-subhead">LINHA DO TEMPO:</h5><p>[Ação 1 mais antiga - Past Perfect] -&gt; [Ação 2 mais recente - Simple Past]<br>"had + past participle" "verbo no passado"</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">FRASES COMPLETAS (Past Perfect + Simple Past):</h5><ul class="gram-bullets"><li><span class="gram-eng">Before I started doing my homework, I had had a terrible headache.</span> <span class="gram-trans">(Antes de começar a fazer minha lição, eu tive uma dor de cabeça terrível.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">When she opened the car she remembered that she hadn\'t brushed her teeth that morning.</span> <span class="gram-trans">(Quando ela abriu o carro, ela lembrou que não tinha escovado os dentes naquela manhã.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">When he opened the door he remembered that he had worked there before.</span> <span class="gram-trans">(Quando ele abriu a porta, lembrou que tinha trabalhado lá antes.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">When I opened my book, someone had torn it up.</span> <span class="gram-trans">(Quando eu abri meu livro, alguém o tinha rasgado.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA DE OURO: Past Perfect indica a ação MAIS ANTIGA das duas. Ação 1 (mais antiga) = HAD + past participle Ação 2 (mais recente) = Simple Past</li></ul><ul class="gram-bullets"><li>PALAVRAS-CHAVE comuns com Past Perfect: - BEFORE → indica ação posterior - AFTER → indica ação anterior - WHEN → ponto de referência - ALREADY → "já" - JUST → recentemente</li></ul><ul class="gram-bullets"><li>Past Participle = 3ª forma dos verbos: - work → worked → WORKED - eat → ate → EATEN - see → saw → SEEN - go → went → GONE - write → wrote → WRITTEN</li></ul><ul class="gram-bullets"><li>Forma contraída: HAD → \'D - I had been → I\'d been - She had eaten → She\'d eaten</li></ul><ul class="gram-bullets"><li>ATENÇÃO: HAD aqui é o auxiliar, não o verbo "ter": - I had had a terrible day. (Eu tinha tido um dia terrível.) - had (auxiliar) + had (past participle de "have")</li></ul><ul class="gram-bullets"><li>Esse tempo é muito usado em narrativas para esclarecer a SEQUÊNCIA temporal de eventos.</li></ul></div></div>'},
{order:39,badge:'39',topic:'DESCRIBING PROBLEMS (Descrevendo Problemas)',book:'Green book',ref:'Green book - pg. 39',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Para descrever PROBLEMAS DOMÉSTICOS, defeitos em objetos ou situações<br>que precisam de reparo, usamos três estruturas específicas em inglês:</p><p>1) NEED + VERB(-ING)<br>Indica que algo PRECISA de alguma ação.</p><p>2) NEED + TO BE + PAST PARTICIPLE<br>Indica que algo PRECISA SER feito (forma passiva).</p><p>3) KEEP + VERB(-ING)<br>Indica um PROBLEMA RECORRENTE - algo que não para de acontecer.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA 1 - NEED + VERB (-ING):</h5><p>Sujeito + need(s) + verb-ing</p><h5 class="gram-subhead">ESTRUTURA 2 - NEED + TO BE + PAST PARTICIPLE:</h5><p>Sujeito + need(s) + to be + past participle</p><h5 class="gram-subhead">ESTRUTURA 3 - KEEP + VERB (-ING):</h5><p>Sujeito + keep(s) + verb-ing<br>(problema recorrente)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">NEED + VERB (-ING) - algo precisa de alguma ação:</h5><ul class="gram-bullets"><li><span class="gram-eng">The house needs cleaning.</span> <span class="gram-trans">(A casa precisa ser limpa.)</span></li><li><span class="gram-eng">The bathroom needs washing.</span> <span class="gram-trans">(O banheiro precisa ser lavado.)</span></li><li><span class="gram-eng">The sink needs fixing.</span> <span class="gram-trans">(A pia precisa de conserto.)</span></li></ul><h5 class="gram-subhead">NEED + TO BE + PAST PARTICIPLE - voz passiva:</h5><ul class="gram-bullets"><li><span class="gram-eng">The book needs to be written.</span> <span class="gram-trans">(O livro precisa ser escrito.)</span></li><li><span class="gram-eng">The car needs to be fixed.</span> <span class="gram-trans">(O carro precisa ser consertado.)</span></li><li><span class="gram-eng">The house needs to be cleaned.</span> <span class="gram-trans">(A casa precisa ser limpa.)</span></li></ul><h5 class="gram-subhead">KEEP + VERB (-ING) - problema recorrente:</h5><ul class="gram-bullets"><li><span class="gram-eng">The sink keeps leaking.</span> <span class="gram-trans">(A pia não para de vazar.)</span></li><li><span class="gram-eng">The car keeps making noise.</span> <span class="gram-trans">(O carro fica fazendo barulho.)</span></li><li><span class="gram-eng">The glass keeps breaking.</span> <span class="gram-trans">(O copo continua quebrando.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">As duas primeiras estruturas (NEED) significam ESSENCIALMENTE A MESMA COISA - são apenas formas diferentes de expressar a mesma ideia: - The car needs fixing. - The car needs to be fixed.</span> <span class="gram-trans">(ambas: "o carro precisa ser consertado")</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">KEEP + VERB(-ING) sempre carrega uma ideia de FRUSTRAÇÃO ou IRRITAÇÃO com um problema que se repete: - My computer keeps freezing!</span> <span class="gram-trans">(O computador não para de travar!)</span></li></ul><ul class="gram-bullets"><li>Outros verbos úteis para descrever problemas: - is broken / are broken (está/estão quebrado/s) - doesn\'t work / don\'t work - is leaking / are leaking - is making strange noises</li></ul><ul class="gram-bullets"><li>Outras estruturas comuns para o mesmo contexto: - There\'s something wrong with... - The X isn\'t working properly. - The X is out of order.</li></ul></div></div>'},
{order:45,badge:'45',topic:'PASSIVE WITH CONTINUOUS AND PERFECT TENSES',book:'Green book',ref:'Green book - pg. 45',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>A VOZ PASSIVA dá ÊNFASE À AÇÃO, não a quem a realiza. Quando usada com<br>tempos verbais COMPOSTOS (Continuous e Perfect), expressa nuances<br>específicas sobre QUANDO a ação acontece.</p><p>Esta página apresenta DOIS usos avançados da voz passiva:</p><p>1) PASSIVE COM CONTINUOUS TENSE<br>Enfatiza ações ACONTECENDO NO MOMENTO.</p><p>2) PASSIVE COM PERFECT TENSE<br>Enfatiza ações RECENTEMENTE TERMINADAS.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">PASSIVE NO PRESENT CONTINUOUS:</h5><p>SUJEITO + IS/ARE + BEING + PAST PARTICIPLE<br>(algo está acontecendo agora)</p><h5 class="gram-subhead">PASSIVE NO PRESENT PERFECT:</h5><p>SUJEITO + HAVE/HAS + BEEN + PAST PARTICIPLE<br>(algo foi recentemente feito)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">PASSIVE COM CONTINUOUS TENSE (ação no momento):</h5><ul class="gram-bullets"><li><span class="gram-eng">Many people are being influenced by the internet.</span> <span class="gram-trans">(Muitas pessoas estão sendo influenciadas pela internet.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Many rivers are being polluted due to industrial action.</span> <span class="gram-trans">(Muitos rios estão sendo poluídos devido à ação industrial.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">My friends are being fooled by the dishonest landlord.</span> <span class="gram-trans">(Meus amigos estão sendo enganados pelo locador desonesto.)</span></li></ul><h5 class="gram-subhead">PASSIVE COM PERFECT TENSE (recentemente terminado):</h5><ul class="gram-bullets"><li><span class="gram-eng">My mind has been changed due to that man\'s advice.</span> <span class="gram-trans">(Minha cabeça foi mudada por causa do conselho daquele homem.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">The planet has been contaminated as a result of human actions.</span> <span class="gram-trans">(O planeta foi contaminado como resultado das ações humanas.)</span></li></ul><ul class="gram-bullets"><li>Many decisions have been made in this meeting.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>RESUMO das estruturas:</li></ul><p>Tempo verbal | Estrutura passiva<br>-----------------------|------------------------------<br>Simple Past | was/were + past participle<br>Present Continuous | is/are + BEING + past participle<br>Present Perfect | have/has + BEEN + past participle</p><ul class="gram-bullets"><li>ATENÇÃO ao "BEING" vs "BEEN": - BEING → no contínuo (está sendo feito agora) - BEEN → no perfeito (foi feito recentemente)</li></ul><ul class="gram-bullets"><li>Quando usar PASSIVE com tempos compostos? - Quando o foco está na AÇÃO ou no OBJETO afetado - Quando o agente é desconhecido ou irrelevante - Em textos formais, jornalísticos e científicos</li></ul><ul class="gram-bullets"><li>Exemplo de transformação: - Ativa: The company is building a new bridge. Passiva: A new bridge is being built (by the company).</li></ul><p>- Ativa: They have completed the report.<br>Passiva: The report has been completed.</p></div></div>'},
{order:47,badge:'47',topic:'INFINITIVES (Infinitivos)',book:'Green book',ref:'Green book - pg. 47',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O INFINITIVO é a forma "ORIGINAL" do verbo - sua forma não conjugada.<br>Em inglês, o infinitivo é criado adicionando "TO" antes do verbo.</p><p>Exemplos:<br>- to be (ser/estar)<br>- to play (jogar)<br>- to study (estudar)</p><p>Esta página apresenta uma estrutura específica usando infinitivos para<br>explicar MANEIRAS de fazer algo - "uma forma de", "outra forma de".</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA PRINCIPAL:</h5><p>(ONE WAY / ANOTHER WAY / THE BEST WAY) + INFINITIVO + IS/ARE + INFINITIVO</p><h5 class="gram-subhead">EXPRESSÕES INICIAIS COMUNS:</h5><ul class="gram-bullets"><li>One way to + verbo</li><li>Another way to + verbo</li><li>The best way to + verbo</li><li>A good way to + verbo</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">The best way to save the world is to raise people\'s awareness.</span> <span class="gram-trans">(A melhor forma de salvar o mundo é elevar a consciência das pessoas.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Another way to be a successful businessman is to take a marketing course.</span> <span class="gram-trans">(Outra forma de ser um empresário de sucesso é fazer um curso de marketing.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">One way to learn English is to watch movies in English.</span> <span class="gram-trans">(Uma forma de aprender inglês é assistir filmes em inglês.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">A good way to stay healthy is to exercise regularly.</span> <span class="gram-trans">(Um bom jeito de ficar saudável é se exercitar regularmente.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">The best way to make friends is to be kind.</span> <span class="gram-trans">(A melhor maneira de fazer amigos é ser gentil.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: Não confunda essa estrutura com gerúndios. Use sempre INFINITIVO (to + verb): ✔️ The best way to learn IS TO PRACTICE. ❌ The best way to learn IS PRACTICING.</li></ul><p>(Embora gerundios também sejam aceitos: "The best way to learn is<br>practicing." - mas a estrutura com infinitivos é mais formal.)</p><ul class="gram-bullets"><li>A primeira parte da estrutura DESCREVE A AÇÃO; a segunda parte é a SOLUÇÃO ou MÉTODO sugerido: - Primeira parte: "One way to lose weight" - Segunda parte: "is to exercise regularly"</li></ul><ul class="gram-bullets"><li>Variações úteis: - One thing to do is... - The most important thing to do is... - The first step is...</li></ul><ul class="gram-bullets"><li>Não confunda INFINITIVO com infinitivo SEM "to" (bare infinitive), que é usado após MODAIS: - I want TO go. (infinitivo completo) - I can go. (bare infinitive - sem "to")</li></ul></div></div>'},
{order:51,badge:'51',topic:'WOULD RATHER & WOULD PREFER',book:'Green book',ref:'Green book - pg. 51',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>WOULD RATHER e WOULD PREFER significam EXATAMENTE A MESMA COISA: ambas<br>expressam PREFERÊNCIAS, indicando o que alguém preferiria fazer entre<br>opções.</p><p>A DIFERENÇA está apenas na ESTRUTURA: cada uma é seguida por uma forma<br>verbal diferente.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">WOULD RATHER + (NOT) + VERBO (forma original):</h5><p>Sujeito + WOULD RATHER + (not) + base form of verb</p><h5 class="gram-subhead">WOULD PREFER + (NOT) + TO + VERBO:</h5><p>Sujeito + WOULD PREFER + (not) + TO + verb</p><h5 class="gram-subhead">FORMA INTERROGATIVA:</h5><p>WOULD + sujeito + RATHER + verbo (forma original) ?<br>WOULD + sujeito + PREFER + TO + verbo ?</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM WOULD RATHER (+ verbo original):</h5><ul class="gram-bullets"><li><span class="gram-eng">I would rather be a teacher.</span> <span class="gram-trans">(Eu preferiria ser um professor.)</span></li><li><span class="gram-eng">I would rather play soccer after class.</span> <span class="gram-trans">(Eu preferiria jogar futebol depois da aula.)</span></li><li><span class="gram-eng">I would rather see the Star Wars movie.</span> <span class="gram-trans">(Eu preferiria ver o filme Star Wars.)</span></li></ul><h5 class="gram-subhead">COM WOULD PREFER (+ TO + verbo):</h5><ul class="gram-bullets"><li><span class="gram-eng">I would prefer to be a teacher.</span> <span class="gram-trans">(Eu preferiria ser um professor.)</span></li><li><span class="gram-eng">I would prefer to play soccer after class.</span> <span class="gram-trans">(Eu preferiria jogar futebol depois da aula.)</span></li><li>I would prefer to see the Star Wars movie.</li></ul><h5 class="gram-subhead">INTERROGATIVAS:</h5><ul class="gram-bullets"><li>Would you rather + verbo? - Would you rather eat pizza or burger?</li></ul><ul class="gram-bullets"><li>Would you prefer + to + verbo? - Would you prefer to eat pizza or burger?</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>ATENÇÃO À ESTRUTURA - é onde os alunos costumam errar: ✔️ I would rather GO. (verbo original) ❌ I would rather to go.</li></ul><p>✔️ I would prefer TO GO. (com "to")<br>❌ I would prefer go.</p><ul class="gram-bullets"><li>Forma contraída comum: - I would rather → I\'d rather - I would prefer → I\'d prefer</li></ul><ul class="gram-bullets"><li>Para fazer escolhas entre DUAS opções, use THAN com would rather: - I would rather drink coffee THAN tea. - I would rather go home THAN stay here.</li></ul><ul class="gram-bullets"><li>Para Would prefer com duas opções, use RATHER THAN: - I would prefer to drink coffee rather than tea.</li></ul><ul class="gram-bullets"><li>Forma negativa: - I would rather NOT go to the party. - I would prefer NOT TO go to the party.</li></ul></div></div>'},
{order:59,badge:'59',topic:'GET OR HAVE SOMETHING DONE',book:'Green book',ref:'Green book - pg. 59',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>A estrutura GET ou HAVE SOMETHING DONE é usada quando OUTRA PESSOA realiza<br>um serviço PARA NÓS, ou seja, quando MANDAMOS, CONTRATAMOS ou PEDIMOS para<br>alguém fazer algo em nosso lugar.</p><p>Esta estrutura é conhecida como CAUSATIVE FORM e enfatiza o RESULTADO da<br>ação, não quem a executou.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA BÁSICA:</h5><p>SUJEITO + HAVE/GET + OBJETO + PAST PARTICIPLE + (BY/AT + agente)</p><h5 class="gram-subhead">HAVE vs GET:</h5><p>HAVE → mais formal, neutro<br>GET → mais informal, conversacional<br>(significam a mesma coisa)</p><h5 class="gram-subhead">EM DIFERENTES TEMPOS VERBAIS:</h5><p>Present: He has his computer fixed.<br>Past: He had his computer fixed.<br>Continuous: He is having his computer fixed.<br>Future: He will have his computer fixed.</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">TRANSFORMANDO FRASES NORMAIS PARA A ESTRUTURA CAUSATIVE:</h5><ul class="gram-bullets"><li><span class="gram-eng">He is fixing his computer. → He is having his computer fixed by an IT worker.</span> <span class="gram-trans">(Ele está mandando consertar o computador por um técnico de TI.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">He cleaned his house. → He had his house cleaned by his mother.</span> <span class="gram-trans">(Ele mandou limpar a casa por sua mãe.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">He does the dishes every day. → He has the dishes done every day by his little brother.</span> <span class="gram-trans">(Ele manda lavar a louça todos os dias pelo irmão mais novo.)</span></li></ul><h5 class="gram-subhead">MAIS EXEMPLOS PRÁTICOS:</h5><ul class="gram-bullets"><li><span class="gram-eng">I had my hair cut yesterday.</span> <span class="gram-trans">(Mandei cortar meu cabelo ontem.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She gets her nails done every month.</span> <span class="gram-trans">(Ela manda fazer as unhas todo mês.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">We had our car washed at the gas station.</span> <span class="gram-trans">(Mandamos lavar nosso carro no posto de gasolina.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">He is getting his teeth cleaned at the dentist.</span> <span class="gram-trans">(Ele está mandando limpar os dentes no dentista.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">REGRA-CHAVE: o foco da frase é o RESULTADO da ação - quem fez é secundário ou nem é mencionado: - I had my car fixed.</span> <span class="gram-trans">(Não importa quem fez, o importante é que foi feito.)</span></li></ul><ul class="gram-bullets"><li>A diferença entre fazer e MANDAR FAZER: - I cut my hair. (Eu mesmo cortei meu cabelo.) - I had my hair cut. (Eu mandei cortar - foi outra pessoa.) - I got my hair cut. (mesma coisa, mais informal)</li></ul><ul class="gram-bullets"><li>Use "by + agente" para mencionar quem fez: - I had my house painted BY a professional.</li></ul><ul class="gram-bullets"><li>Use "at + lugar" para o local: - I got my hair cut AT a salon.</li></ul><ul class="gram-bullets"><li>ATENÇÃO À ORDEM da estrutura: ❌ I had cut my hair. (significado diferente!) ✔️ I had my hair cut. (causativo correto)</li></ul><ul class="gram-bullets"><li>Estrutura comum em serviços do dia a dia: - get/have something repaired, cleaned, painted, fixed, washed, delivered, installed, designed, made, built, photographed</li></ul></div></div>'},
{order:61,badge:'61',topic:'MAKING SUGGESTIONS (Fazendo Sugestões)',book:'Green book',ref:'Green book - pg. 61',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Para FAZER SUGESTÕES de forma educada e variada em inglês, existem<br>diversas estruturas, cada uma com uma forma verbal específica após ela.</p><p>Saber utilizar essas estruturas é essencial para soar natural em<br>conversas e dar conselhos sem soar autoritário.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">MAYBE YOU COULD + BASE VERB:</h5><p>Maybe you could + verbo (forma original)</p><h5 class="gram-subhead">HAVE YOU THOUGHT ABOUT + GERUND:</h5><p>Have you thought about + verbo-ing?</p><h5 class="gram-subhead">WHY DON\'T YOU + BASE VERB:</h5><p>Why don\'t you + verbo (forma original)?</p><h5 class="gram-subhead">ONE OPTION IS / IT MIGHT BE A GOOD IDEA + INFINITIVE:</h5><p>One option is to + verbo<br>It might be a good idea to + verbo</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">"MAYBE YOU COULD..." (Talvez você pudesse):</h5><ul class="gram-bullets"><li><span class="gram-eng">Maybe you could take some medications.</span> <span class="gram-trans">(Talvez você pudesse tomar alguns medicamentos.)</span></li><li>Maybe you could ask your boss for a day off.</li></ul><h5 class="gram-subhead">"HAVE YOU THOUGHT ABOUT...?" (Você já pensou em...?):</h5><ul class="gram-bullets"><li><span class="gram-eng">Have you thought about taking some time off?</span> <span class="gram-trans">(Você já pensou em tirar uma folga?)</span></li><li>Have you thought about changing your job?</li></ul><h5 class="gram-subhead">"WHY DON\'T YOU...?" (Por que você não...?):</h5><ul class="gram-bullets"><li><span class="gram-eng">Why don\'t you talk to your mother about it?</span> <span class="gram-trans">(Por que você não fala com sua mãe sobre isso?)</span></li><li>Why don\'t you go see a doctor?</li><li>Why don\'t you try something new?</li></ul><h5 class="gram-subhead">"ONE OPTION IS..." / "IT MIGHT BE A GOOD IDEA...":</h5><ul class="gram-bullets"><li><span class="gram-eng">One option is to move to a different city.</span> <span class="gram-trans">(Uma opção é mudar para uma cidade diferente.)</span></li><li><span class="gram-eng">It might be a good idea to stay calm.</span> <span class="gram-trans">(Pode ser uma boa ideia ficar calmo.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE - PRESTE ATENÇÃO À FORMA DO VERBO após cada estrutura:</li></ul><p>Estrutura | Forma do verbo<br>─────────────────────────────────|─────────────────<br>Maybe you could ___ | Forma original<br>Have you thought about ___ | Gerúndio (-ing)<br>Why don\'t you ___ | Forma original<br>One option is to ___ | Infinitivo (to + v)<br>It might be a good idea to ___ | Infinitivo (to + v)</p><ul class="gram-bullets"><li>Estas estruturas variam em FORMALIDADE: - Mais informal: Why don\'t you... - Mais formal: It might be a good idea to... - Educado: Have you thought about...</li></ul><ul class="gram-bullets"><li>Outras estruturas úteis para sugestões: - How about + verbo-ing? (How about going to the cinema?) - What about + verbo-ing? (What about trying this?) - You should + verbo (You should try this) - I suggest + verbo-ing (I suggest taking a break) - Let\'s + verbo (Let\'s go for a walk)</li></ul></div></div>'},
{order:65,badge:'65',topic:'REFERRING TO TIME IN THE PAST',book:'Green book',ref:'Green book - pg. 65',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Em inglês, existem diversas EXPRESSÕES DE TEMPO específicas para se<br>referir a momentos no passado. Cada uma tem um uso particular:</p><ul class="gram-bullets"><li>DURING / IN → ponto específico no passado</li><li>AGO → quanto tempo se passou</li><li>FROM... TO → período de tempo determinado</li><li>SINCE → ponto inicial no passado</li><li>FOR → duração total de tempo</li></ul><p>Saber escolher a expressão correta é fundamental para soar natural.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">DURING / IN (ponto específico no passado):</h5><p>"Durante" um período/ano/era<br>DURING/IN + período/ano</p><h5 class="gram-subhead">AGO (quanto tempo se passou):</h5><p>Indica o tempo decorrido desde algo<br>número + período + AGO</p><h5 class="gram-subhead">FROM... TO... (período de tempo determinado):</h5><p>"De um ponto a outro"<br>FROM + início + TO + fim</p><h5 class="gram-subhead">SINCE (ponto inicial no passado):</h5><p>"Desde" um ponto específico<br>SINCE + ponto no tempo (data, ano, momento específico)<br>⚠️ Usado com Present Perfect</p><h5 class="gram-subhead">FOR (duração total de tempo):</h5><p>"Por" um período de tempo<br>FOR + duração (anos, meses, horas)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">DURING / IN (ponto específico):</h5><ul class="gram-bullets"><li><span class="gram-eng">During 2022, the world was going through a tough period.</span> <span class="gram-trans">(Durante 2022, o mundo passou por um período difícil.)</span></li><li><span class="gram-eng">In 2022, the world was going through a tough period.</span> <span class="gram-trans">(Em 2022, o mundo passou por um período difícil.)</span></li></ul><h5 class="gram-subhead">AGO (quanto tempo se passou):</h5><ul class="gram-bullets"><li><span class="gram-eng">25 years ago, my city was totally different from now.</span> <span class="gram-trans">(25 anos atrás, minha cidade era totalmente diferente de agora.)</span></li><li><span class="gram-eng">I got married 5 years ago.</span> <span class="gram-trans">(Eu me casei 5 anos atrás.)</span></li></ul><h5 class="gram-subhead">FROM... TO... (período determinado):</h5><ul class="gram-bullets"><li><span class="gram-eng">From 1998 to 1999, rock was in its best moment.</span> <span class="gram-trans">(De 1998 a 1999, o rock estava em seu melhor momento.)</span></li><li><span class="gram-eng">I worked for that company from 2002 to 2004.</span> <span class="gram-trans">(Trabalhei naquela empresa de 2002 a 2004.)</span></li></ul><h5 class="gram-subhead">SINCE (ponto inicial):</h5><ul class="gram-bullets"><li><span class="gram-eng">We have been married since 2010.</span> <span class="gram-trans">(Estamos casados desde 2010.)</span></li><li><span class="gram-eng">I\'ve worked as a salesperson since my twenties.</span> <span class="gram-trans">(Trabalho como vendedor desde meus vinte e poucos anos.)</span></li></ul><h5 class="gram-subhead">FOR (duração total):</h5><ul class="gram-bullets"><li><span class="gram-eng">I have lived in São Paulo for ten years.</span> <span class="gram-trans">(Eu moro em São Paulo há dez anos.)</span></li><li><span class="gram-eng">I\'ve been studying English for five months.</span> <span class="gram-trans">(Estudo inglês há cinco meses.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>SINCE vs FOR - a diferença mais importante: - SINCE → PONTO no tempo (since 2010, since Monday, since I was 5) - FOR → DURAÇÃO (for 10 years, for 5 months, for a long time)</li></ul><ul class="gram-bullets"><li>AGO sempre vem DEPOIS do tempo, nunca antes: ❌ Ago 5 years. ✔️ 5 years ago.</li></ul><ul class="gram-bullets"><li>SINCE e FOR são tipicamente usados com PRESENT PERFECT: - I have lived here for 10 years. - I have known her since 2015.</li></ul><ul class="gram-bullets"><li>IN é usado para anos, meses, séculos, estações: - in 2020, in March, in the 20th century, in winter</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Não confunda: - I lived there for 10 years. (Já não moro mais) - I have lived there for 10 years.</span> <span class="gram-trans">(Ainda moro lá)</span></li></ul></div></div>'},
{order:67,badge:'67',topic:'MAKING PREDICTIONS WITH WILL',book:'Green book',ref:'Green book - pg. 67',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O modal verb WILL é usado para fazer PREVISÕES sobre o FUTURO, e pode<br>ser combinado com diferentes estruturas para indicar nuances específicas:</p><p>1) WILL + BASE VERB → previsão simples<br>2) WILL + BE + VERB(-ING) → ação contínua no futuro<br>3) WILL + HAVE + PARTICIPLE → ação completada até um certo momento</p><p>Cada uma dessas estruturas é usada conforme a complexidade da previsão.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">WILL + BASE VERB (previsão simples):</h5><p>SUJEITO + WILL + verbo (forma original)<br>Uso: previsões gerais sobre o futuro</p><h5 class="gram-subhead">WILL + BE + VERB(-ING) (ação contínua no futuro):</h5><p>SUJEITO + WILL + BE + verbo-ing<br>Uso: ações que estarão em andamento no futuro</p><h5 class="gram-subhead">WILL + HAVE + PAST PARTICIPLE (ação completada):</h5><p>SUJEITO + WILL + HAVE + past participle<br>Uso: ações que terão sido concluídas até certo momento futuro<br>(Future Perfect)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">WILL + BASE VERB (previsão simples):</h5><ul class="gram-bullets"><li><span class="gram-eng">In the future, I will work at a different company.</span> <span class="gram-trans">(No futuro, vou trabalhar em uma empresa diferente.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">In a few years, humans will live for 150 years.</span> <span class="gram-trans">(Em alguns anos, humanos viverão até os 150 anos.)</span></li></ul><h5 class="gram-subhead">WILL + BE + VERB(-ING) (ação contínua no futuro):</h5><ul class="gram-bullets"><li><span class="gram-eng">Soon, we will be working in different countries.</span> <span class="gram-trans">(Em breve, estaremos trabalhando em diferentes países.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">In the future, humans will be using flying cars.</span> <span class="gram-trans">(No futuro, humanos estarão usando carros voadores.)</span></li></ul><h5 class="gram-subhead">WILL + HAVE + PAST PARTICIPLE (ação completada):</h5><ul class="gram-bullets"><li><span class="gram-eng">By 2100, humans will have achieved many scientific discoveries.</span> <span class="gram-trans">(Até 2100, humanos terão alcançado muitas descobertas científicas.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">In 10 years, we will have finished our cycle at this company.</span> <span class="gram-trans">(Em 10 anos, teremos terminado nosso ciclo nesta empresa.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>AS TRÊS ESTRUTURAS - QUANDO USAR CADA UMA:</li></ul><p>Estrutura | Quando usar<br>─────────────────────────|──────────────────────────────────<br>Will + base verb | Previsão simples<br>Will + be + verb-ing | Ação acontecendo num momento futuro<br>Will + have + p. part. | Ação que JÁ terá terminado no futuro</p><ul class="gram-bullets"><li><span class="gram-eng">EXEMPLO PRÁTICO mostrando as três: - Tomorrow at 8 PM, I will eat dinner. (Vou jantar - previsão simples) - Tomorrow at 8 PM, I will be eating dinner. (Estarei jantando - ação acontecendo no momento) - Tomorrow at 8 PM, I will have eaten dinner.</span> <span class="gram-trans">(Já terei jantado - ação completada antes desse momento)</span></li></ul><ul class="gram-bullets"><li>EXPRESSÕES típicas com cada estrutura: - Will: someday, in the future, in a few years, tomorrow - Will be -ing: at this time tomorrow, in a few minutes - Will have + p.p.: by 2030, by then, by this time next year</li></ul><ul class="gram-bullets"><li>Contrações importantes: - I will → I\'ll - She will → She\'ll - They will not → They won\'t</li></ul></div></div>'},
{order:73,badge:'73',topic:'TIME CLAUSES (Orações Temporais com Past Perfect)',book:'Green book',ref:'Green book - pg. 73',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>As TIME CLAUSES (Orações Temporais) são usadas para conectar duas ações<br>no PASSADO, esclarecendo a SEQUÊNCIA TEMPORAL entre elas.</p><p>Esta página apresenta dois grupos de conectores:</p><p>1) CONECTORES PARA AÇÕES QUE OCORREM ANTES (com Past Perfect):<br>BEFORE, UNTIL, BY THE TIME</p><p>2) CONECTORES PARA AÇÕES AO MESMO TEMPO (Simple Past):<br>ONCE, THE MOMENT, AS SOON AS</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">AÇÕES ANTERIORES (use PAST PERFECT):</h5><p>BEFORE / UNTIL / BY THE TIME + Simple Past, + Past Perfect<br>ou<br>Past Perfect + BEFORE / UNTIL / BY THE TIME + Simple Past</p><h5 class="gram-subhead">AÇÕES SIMULTÂNEAS / SUCESSIVAS (Simple Past + Simple Past):</h5><p>ONCE / THE MOMENT / AS SOON AS + Simple Past, + Simple Past</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM BEFORE, UNTIL, BY THE TIME (Past Perfect):</h5><ul class="gram-bullets"><li><span class="gram-eng">Until I spoke with her, I had never heard such a beautiful voice.</span> <span class="gram-trans">(Até eu falar com ela, eu nunca tinha ouvido uma voz tão linda.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">By the time I arrived home, my wife had already cooked dinner.</span> <span class="gram-trans">(Quando eu cheguei em casa, minha esposa já tinha cozinhado o jantar.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Before her mother called her, she had already washed the dishes.</span> <span class="gram-trans">(Antes da mãe dela ligar, ela já tinha lavado a louça.)</span></li></ul><h5 class="gram-subhead">COM ONCE, THE MOMENT, AS SOON AS (Simple Past):</h5><ul class="gram-bullets"><li><span class="gram-eng">The moment she looked at me, I fell in love.</span> <span class="gram-trans">(No momento em que ela olhou para mim, eu me apaixonei.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">As soon as I arrived home, my dog barked at me.</span> <span class="gram-trans">(Assim que cheguei em casa, meu cachorro latiu para mim.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Once she started working as a teacher, she felt whole for the first time in her life.</span> <span class="gram-trans">(Uma vez que ela começou a trabalhar como professora, ela se sentiu completa pela primeira vez na vida.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: Conectores DIFERENTES exigem TEMPOS VERBAIS DIFERENTES:</li></ul><p>Conector | Tempo verbal típico<br>───────────────|────────────────────────────<br>BEFORE | Past Perfect + Simple Past<br>UNTIL | Past Perfect + Simple Past<br>BY THE TIME | Past Perfect + Simple Past<br>ONCE | Simple Past + Simple Past<br>THE MOMENT | Simple Past + Simple Past<br>AS SOON AS | Simple Past + Simple Past</p><ul class="gram-bullets"><li><span class="gram-eng">Diferença sutil dos conectores ANTERIORES: - BEFORE → "antes de" (ordem cronológica) - UNTIL → "até que" (limite temporal) - BY THE TIME → "quando"</span> <span class="gram-trans">(quando algo aconteceu, outro já tinha)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Diferença dos conectores SIMULTÂNEOS: - ONCE → "uma vez que" (causa e efeito) - THE MOMENT → "no momento em que" (instantaneidade) - AS SOON AS → "assim que"</span> <span class="gram-trans">(rápida sucessão)</span></li></ul><ul class="gram-bullets"><li>Use VÍRGULA quando a oração temporal vem primeiro: - Before she arrived, we had cleaned the house. - We had cleaned the house before she arrived.</li></ul></div></div>'},
