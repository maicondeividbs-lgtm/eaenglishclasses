I used to live in that small town.</p>'},{page:81,topic:'COMPLAINING & RELATIVE PRONOUNS IN ENGLISH',book:'Passages 1',html:'<p><strong>COMPLAINING & RELATIVE PRONOUNS IN ENGLISH</strong></p><p><strong>USING THE PRONOUN \'ME\'</strong></p><p><em>Whenever you use \'me\' as part of a complain in English, remember to use the relative pronoun \'that\'.</em></p><p>▸ Something that irritates me is people who/that are rude to servers.<br>▸ One thing that bugs me is the traffic jam.<br>▸ Two thing that make me fell sad are the economical & social situation of that country.</p><p><em>But, when you use \'I\' the relative pronoun \'that\' is optional.</em></p><p>▸ The restaurant (that) I was in was very dirty.<br>▸ Something (that) I hate is the traffic jam.<br>▸ One thing (that) I can\'t stand is people who/that chew out loud.</p><p>Remember!</p><p>THAT - Can be used for people & thigs.<br>WHO - Used only for people.<br>WHICH - Used only for things.<br>WHEN - Used for events or situations.</p>'},{page:85,topic:'Page 85',book:'Passages 1',html:'<p>🔹 Indirect Questions — perguntas indiretas</p><p>Usamos indirect questions para soar mais educado ou mais formal.<br>Elas não invertem o verbo e o sujeito, como as perguntas diretas.<br>Geralmente começam com frases como:<br>👉 I wonder…, Could you tell me…, Do you know…, Is beyond me…</p><p>🗣 Estrutura</p><p>Direta: auxiliar + sujeito + verbo<br>Indireta: sujeito + verbo (ordem de afirmação)</p><p>❌ Why can you play the guitar?<br>✅ I wonder why <strong>you can</strong▸ play the guitar.<br>✅ Why <strong>you can</strong▸ play the guitar is beyond me.</p><p>❓Com perguntas sem WH- (yes/no questions)</p><p>Se a pergunta começa com do/does/did/will, usamos if ou whether. Se o auxiliar for do/does ou did, remova-os.</p><p>❌ Do you like chocolate?<br>✅ I wonder if/whether you like chocolate.</p><p>❌ Will you help me?<br>✅ Could you tell me whether you will help me?</p>'},{page:88,topic:'Page 88',book:'Passages 1',html:'<p>Relative clauses are sentences used to give more information about a person/noun. (Who, that, where)</p><p>▸ My friend is someone who likes to play videogame;</p><p>▸ I hate people that cannot help one another;</p><p>▸ She lives with people who are really annoying;</p><p>▸ My job has many people who are always absent.</p><p>OBS.: When the relative clause referes to the subject of the sentence, it cannot be omitted.</p><p><br>Noun clauses are used to give more information about a verb or adjective (They are used as object of the verb) and more commonly are started with the relative pronoun \'when\'.</p><p>▸ It bothers me when a friend doesn\'t help me when I need (The relative clause is giving more information about the verb \'bother\').</p><p>▸ The thing I hate is when people offend one another (It is giving more information about the verb \'hate\').</p><p>▸ It is really hard when someone is mean to us; (It is giving more information about the adjective \'hard\').</p><p>▸ She gets really stressed when her parents scream at her. (It is giving more information about the phrase \'gets stressed\');</p>'},{page:89,topic:'PRESENT UNREAL CONDITIONALS',book:'Passages 1',html:'<p><strong>PRESENT UNREAL CONDITIONALS</strong></p><p>_The subjunctive is a verb mood used to talk about hypothetical situations. To use it correctly it is important to replace some structures we normally use:</p><p>▸ Replace the different conjugations of the verb to be for \'were\'<br>▸ Replace \'will\' with \'would\'.</p><p><strong>Unless</strong></p><p><em>It is used to express a condition that would change the speakers decision</em></p><p>▸ I would go to the gym unless it were raining really strongly.<br>▸ She would go out you unless her parents said no.</p><p><br><strong>Only if</strong></p><p><em>It is used when a condition needs to be met in order for certain situation to happen</em></p><p>▸ I would play with you only if you knew how to play soccer;<br>▸ They would eat the pizza only if it had no cheese.</p><p><br><strong>Even if</strong></p><p><em>Represents a very contrary situation that wouldn\'t impact the speakers decision</em></p><p>▸ I wouldn\'t apply to college this semester even if I knew I would certainly be accepted;<br>▸ He wouldn\'t obey his parents even if they gave him the best gift ever.</p>'},{page:93,topic:'WISHES AND REGRETS',book:'Passages 1',html:'<p><strong>WISHES AND REGRETS</strong></p><p>To express something you wish in the present use: wish + simple past / past continuous.</p><p><strong>REMEMBER:</strong▸ Can (Could); Will (Would); To be (Were)</p><p>▸ I wish I had a better car;<br>▸ I wish I were richer;<br>▸ I wish I could afford a better car;</p><p><br>To express a regret about the past, use wish + past perfect (Had + past participle)</p><p>▸ I wish I had studied more;<br>▸ I wish I had been a better son;<br>▸ I wish I had driven slowly.</p><p>To express a regret and give a different outcome, use If + past perfect, could / would + have + past participle.</p><p>▸ If I had studied more, I could have become a doctor now;<br>▸ If she had been more patient, she would have got the job;</p>'},{page:97,topic:'FUTURE PERFECT & FUTURE PERFECT CONTINUOUS',book:'Passages 1',html:'<p><strong>FUTURE PERFECT & FUTURE PERFECT CONTINUOUS</strong></p><p><em>The future perfect is used to express the idea that an action will be completed by a specific time into the future. It is forme by using the following structure: will + have + past participle.</em></p><p>▸ By 2035, the world will have become even more advanced in science.<br>▸ By this time next year, I will have finished college.<br>▸ In one month, she will have got/gotten her promotion.</p><p><em>The future perfect continuous is used to express the duration of an action into a specific point into the future. Will + have + been + verb (ing)</em></p><p>▸ By around 6 pm, he will have been studying for 4 hours.<br>▸ In one hour, I will have been waiting for the doctor for around 5 hours.<br>▸ By 2027, she will have been studying English for five years.</p>'},{page:101,topic:'Mixed Conditionals',book:'Passages 1',html:'<p><strong>Mixed Conditionals</strong></p><p><em>Mixed conditionals are used to talk a hypothetical past situation that could have an impact into the present moment. It is formed by using:</em></p><p><strong>IF + YOU, HE,... + HAD/HADN\'T + PAST PARTICIPLE, + YOU, HE, SHE + WOULD/WOULDN\'T + BASE VERB</strong></p><p>▸ If you had been more engaged with the classes, you would be a millionaire today.<br>▸ If she hadn\'t quit her previous job, she would be in a higher position.<br>▸ If they had taken their passport with them, they wouldn\'t be in trouble now.</p><p>TIP: Don\'t forget the comma (,) to separate both clauses.</p>'}],'special':[{page:0,topic:'AFIRMATIVA: SUJEITO + HAVE/HAS + PAST PARTICIPLE',book:'Special',html:'<p>PRESENT PERFECT - UTILIZADO PARA FALAR DE AÇÕES DO PASSADO QUE AINDA TEM RELEVÂNCIA NO PRESENTE, AÇÕES EM UM TEMPO INDEFINIDO NO PASSADO E/OU AÇÕES QUE FORAM CONCLUÍDAS RECENTEMENTE.</p><p><strong>AFIRMATIVA: SUJEITO + HAVE/HAS + PAST PARTICIPLE</strong></p><p><em>MARIA HAS DRUNK A LOT OF WATER (Sem tempo definido)</em></p><p><em>I HAVE JUST BOUGHT A NEW APARTMENT (Ação recentemente concluída)</em></p><p><strong>NEGATIVA: SUJEITO + HAVE/HAS + NOT + PAST PARTICIPLE</strong></p><p><em>SHE HASN\'T FINISHED HER HOMEWORK YET</em></p><p><strong>INTERROGATIVA: HAVE/HAS + SUJEITO + PAST PARTICIPLE</strong></p><p><em>HAVE YOU EVER EATEN JAPANESE FOOD?</em></p>'}]};

let currentLevel = 'intro';
let currentView = 'curriculum';

function setLevel(lvl, btn) {
  currentLevel = lvl;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['curriculum','worksheets','examples'].forEach(v => {
    document.getElementById('view-' + v).style.display = v === view ? '' : 'none';
  });
  render();
}

function render() {
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
  if (currentView === 'curriculum') renderCurriculum(search);
  else if (currentView === 'worksheets') renderWorksheets();
  else if (currentView === 'examples') renderExamples(search);
}

function renderCurriculum(search) {
  const units = curriculum[currentLevel] || [];
  const filtered = search ? units.filter(u =>
    u.t.toLowerCase().includes(search) || u.g.toLowerCase().includes(search) || u.v.toLowerCase().includes(search)
  ) : units;

  document.getElementById('view-curriculum').innerHTML = '<table class="curr-table"><thead><tr><th>U.</th><th>Unidade</th><th>Vocabulário</th><th>Gramática</th><th>Objetivo</th><th>Writing</th></tr></thead><tbody>' +
    filtered.map(u => '<tr><td>' + u.u + '</td><td style="font-weight:700;color:var(--navy)">' + u.t + '</td><td>' + u.v + '</td><td><span class="grammar-chip">' + u.g + '</span></td><td style="color:var(--g500)">' + u.o + '</td><td style="color:var(--g400);font-style:italic;font-size:12px">' + u.w + '</td></tr>'
    ).join('') + '</tbody></table>';
}

function renderWorksheets() {
  const levelKey = {'intro':'intro','lvl1':'level1','lvl2':'level2','lvl3':'level3'}[currentLevel];
  const div = document.getElementById('view-worksheets');
  let cards = '';
  for (let i = 1; i <= 16; i++) {
    const path = STORAGE + '/' + levelKey + '/unit-' + String(i).padStart(2,'0') + '.pdf';
    const levelNames = {'intro':'Intro','lvl1':'Level 1','lvl2':'Level 2','lvl3':'Level 3'};
    cards += '<div class="ws-card"><div class="ws-unit">' + i + '</div><div class="ws-label">Unit ' + i + ' • ' + (levelNames[currentLevel]||'') + '</div><a href="' + path + '" target="_blank" class="ws-dl">📥 Download PDF</a></div>';
  }
  div.innerHTML = '<p style="font-size:14px;color:var(--g500);margin-bottom:20px">Worksheets originais da EA English Classes — um PDF por unidade.</p><div class="ws-grid">' + cards + '</div>';
}

function renderExamples(search) {
  const items = examples[currentLevel] || [];
  const filtered = (search ? items.filter(ex =>
    ex.topic.toLowerCase().includes(search) || ex.html.toLowerCase().includes(search)
  ) : items).sort((a,b) => a.page - b.page);

  const div = document.getElementById('view-examples');
  if (!filtered.length) {
    div.innerHTML = '<div style="text-align:center;padding:48px;color:var(--g400)"><p style="font-size:48px;margin-bottom:12px;opacity:0.3">💡</p><p>Nenhum exemplo encontrado' + (search ? ' para "' + search + '"' : ' para este nível') + '.</p></div>';
    return;
  }

  div.innerHTML = '<p style="font-size:14px;color:var(--g500);margin-bottom:20px">Explicações gramaticais em português — clique para expandir.</p><div class="ex-grid">' +
    filtered.map((ex, idx) => {
      const preview = ex.html.replace(/<[^>]*>/g, '').substring(0, 120);
      return '<div class="ex-card" onclick="showExample(' + idx + ')"><div class="ex-header"><div class="ex-page-num">' + ex.page + '</div><div class="ex-header-text"><div class="ex-topic">' + ex.topic + '</div><div class="ex-book-label">' + ex.book + ' — Página ' + ex.page + '</div></div></div><div class="ex-preview">' + preview + '...</div><div class="ex-footer">Clique para ver completo →</div></div>';
    }).join('') + '</div>';
}

function showExample(idx) {
  const items = examples[currentLevel] || [];
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const filtered = search ? items.filter(ex =>
    ex.topic.toLowerCase().includes(search) || ex.html.toLowerCase().includes(search)
  ) : items;

  const ex = filtered[idx];
  if (!ex) return;

  document.getElementById('exModalTitle').textContent = ex.topic;
  document.getElementById('exModalMeta').innerHTML = '<span style="background:var(--navy);color:#fff;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:700;margin-right:8px">Página ' + ex.page + '</span> ' + ex.book;
  document.getElementById('exModalContent').innerHTML = ex.html;
  document.getElementById('exModal').classList.add('open');
}

render();
</script>
