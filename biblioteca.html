  // Monta o corpo + rodapé com marca EA (para o PNG ficar elegante)
  const watermark =
    '<div class="modal-watermark">' +
      '<div class="modal-watermark-brand">' +
        '<span class="modal-watermark-mark">EA</span>' +
        '<div>' +
          '<div class="modal-watermark-name">EA English Classes</div>' +
          '<div class="modal-watermark-sub">Biblioteca Pedagógica</div>' +
        '</div>' +
      '</div>' +
      '<div class="modal-watermark-sub">eaenglishclasses.com</div>' +
    '</div>';
  document.getElementById('gramBody').innerHTML = ex.html + watermark;

  // Color the modal head by level
  const head = document.getElementById('gramHead');
  const colors = {
    intro: ['#fbbf24', '#f59a1e'],
    lvl1: ['#f87171', '#dc2626'],
    lvl2: ['#60a5fa', '#2563eb'],
    lvl3: ['#6ee7b7', '#059669']
  };
  const [c1, c2] = colors[currentLevel] || ['#3b82f6', '#1d4ed8'];
  head.style.background = 'linear-gradient(135deg, ' + c2 + ' 0%, ' + c1 + ' 100%)';
  // Setar cor de destaque para subheads e bullets dentro do modal
  document.getElementById('gramBody').style.setProperty('--lvl-color-modal', c2);
  // Resetar estado do botão de download
  const dlBtn = document.getElementById('gramDownloadBtn');
  if (dlBtn) {
    dlBtn.disabled = false;
    dlBtn.classList.remove('is-loading', 'is-success');
    const lbl = dlBtn.querySelector('.modal-download-label');
    if (lbl) lbl.textContent = 'Baixar';
  }
  document.getElementById('gramModal').classList.add('open');
}

// Slugify para nome de arquivo: remove acentos/símbolos
function slugify(s) {
  return (s || 'card')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '')
    .slice(0, 60);
}

// Baixa o card de gramática atual como imagem PNG
async function downloadGramAsPNG() {
  if (typeof html2canvas === 'undefined') {
    showToast('Aguarde, carregando biblioteca...');
    return;
  }
  const ex = window._currentGramEx;
  if (!ex) return;

  const dlBtn = document.getElementById('gramDownloadBtn');
  const lbl = dlBtn.querySelector('.modal-download-label');
  // Feedback: estado "gerando"
  dlBtn.disabled = true;
  dlBtn.classList.add('is-loading');
  dlBtn.classList.remove('is-success');
  if (lbl) lbl.textContent = 'Gerando…';

  // Elemento a capturar: o modal-box inteiro
  const modalBox = document.querySelector('#gramModal .modal-box');
  const modalBody = document.getElementById('gramBody');

  // Salvar estados a restaurar depois
  const closeBtn = document.getElementById('gramCloseBtn');
  const prevBodyMaxH = modalBody.style.maxHeight;
  const prevBodyOverflow = modalBody.style.overflowY;
  const prevBoxMaxH = modalBox.style.maxHeight;
  const prevBoxHeight = modalBox.style.height;
  const dlPrevDisplay = dlBtn.style.display;
  const closePrevDisplay = closeBtn.style.display;

  // Para a captura: esconder botões e expandir o corpo
  dlBtn.style.display = 'none';
  closeBtn.style.display = 'none';
  modalBody.style.maxHeight = 'none';
  modalBody.style.overflowY = 'visible';
  modalBox.style.maxHeight = 'none';
  modalBox.style.height = 'auto';

  try {
    // Pequena pausa para o layout reagir
    await new Promise(r => setTimeout(r, 60));

    const canvas = await html2canvas(modalBox, {
      backgroundColor: '#ffffff',
      scale: 2,            // 2x para alta resolução
      useCORS: true,
      logging: false,
      windowWidth: modalBox.scrollWidth,
      windowHeight: modalBox.scrollHeight
    });

    // Gerar nome de arquivo
    const topic = (ex.topic || 'card').replace(/<[^>]+>/g, '');
    const levelTag = window._currentGramLevel || '';
    const filename = 'gramatica-' + slugify(topic) + (levelTag ? '-' + slugify(levelTag) : '') + '.png';

    // Baixar
    const link = document.createElement('a');
    link.download = filename;
    link.href = canvas.toDataURL('image/png');
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    // Feedback: sucesso
    dlBtn.classList.remove('is-loading');
    dlBtn.classList.add('is-success');
    if (lbl) lbl.textContent = 'Baixado ✓';
    setTimeout(() => {
      dlBtn.classList.remove('is-success');
      dlBtn.disabled = false;
      if (lbl) lbl.textContent = 'Baixar';
    }, 2200);
  } catch (err) {
    console.error('Erro ao gerar PNG:', err);
    dlBtn.classList.remove('is-loading');
    if (lbl) lbl.textContent = 'Erro — tentar de novo';
    dlBtn.disabled = false;
    showToast('Não foi possível gerar a imagem.');
  } finally {
    // Restaurar estados
    dlBtn.style.display = dlPrevDisplay;
    closeBtn.style.display = closePrevDisplay;
    modalBody.style.maxHeight = prevBodyMaxH;
    modalBody.style.overflowY = prevBodyOverflow;
    modalBox.style.maxHeight = prevBoxMaxH;
    modalBox.style.height = prevBoxHeight;
  }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'bib-toast';
  t.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' + msg;
  document.body.appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity 0.3s, transform 0.3s';
    t.style.opacity = '0';
    t.style.transform = 'translateY(10px)';
    setTimeout(() => t.remove(), 320);
  }, 2400);
}

function escapeHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ═══ EVENT DELEGATION ═══
document.addEventListener('click', (e) => {
  // Journey level
  const jStep = e.target.closest('.j-step');
  if (jStep) { setLevel(jStep.dataset.level); return; }
  // Tab
  const tab = e.target.closest('.bib-tab');
  if (tab) { setView(tab.dataset.view); return; }
  // Carrossel currículo: prev
  if (e.target.closest('[data-cur-prev]')) { goCarousel(curCarouselState.index - 1); return; }
  // Carrossel currículo: next
  if (e.target.closest('[data-cur-next]')) { goCarousel(curCarouselState.index + 1); return; }
  // Carrossel currículo: dot (ir direto)
  const curDot = e.target.closest('[data-cur-go]');
  if (curDot) { goCarousel(parseInt(curDot.dataset.curGo, 10)); return; }
  // Copy worksheet link
  const copyBtn = e.target.closest('[data-copy]');
  if (copyBtn) {
    navigator.clipboard.writeText(copyBtn.dataset.copy)
      .then(() => showToast('Link copiado!'))
      .catch(() => showToast('Erro ao copiar.'));
    return;
  }
  // Gram card
  const gramCard = e.target.closest('[data-gram-idx]');
  if (gramCard) { openGram(parseInt(gramCard.dataset.gramIdx)); return; }
  // Modal download (gerar PNG)
  if (e.target.closest('#gramDownloadBtn')) {
    downloadGramAsPNG();
    return;
  }
  // Modal close
  if (e.target.closest('#gramCloseBtn')) {
    document.getElementById('gramModal').classList.remove('open');
    return;
  }
  // Click outside modal box
  if (e.target.id === 'gramModal') {
    document.getElementById('gramModal').classList.remove('open');
  }
});

// Search input
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(window._searchTimer);
  window._searchTimer = setTimeout(render, 180);
});

// Escape to close modal + setas no carrossel
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') document.getElementById('gramModal').classList.remove('open');
  // Setas só navegam o carrossel quando estamos na aba Currículo e modal fechado
  const modalOpen = document.getElementById('gramModal').classList.contains('open');
  const searchFocused = document.activeElement && document.activeElement.id === 'searchInput';
  if (!modalOpen && !searchFocused && currentView === 'curriculum') {
    if (e.key === 'ArrowLeft') { goCarousel(curCarouselState.index - 1); }
    else if (e.key === 'ArrowRight') { goCarousel(curCarouselState.index + 1); }
  }
});

render();
</script>
