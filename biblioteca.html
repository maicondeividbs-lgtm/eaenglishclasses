{"order": 37, "badge": "37", "topic": "Adverbs of Frequency", "book": "Interchange 1", "ref": "Interchange 1 - pg. 37 (Unit 6)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Advérbios de frequência (always, usually, sometimes, never...) dizem com que frequência uma ação ocorre. Vêm geralmente ANTES do verbo principal.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Escala (100% → 0%)</h5><p>always &gt; usually &gt; often &gt; sometimes &gt; hardly ever &gt; never<br>&quot;I often watch TV after dinner.&quot;</p><h5 class=\"gram-subhead\">Posição</h5><p>antes do verbo principal<br>&quot;She hardly ever watches TV.&quot;</p><h5 class=\"gram-subhead\">Frequência exata</h5><p>vai no fim da frase<br>&quot;I go jogging once a week.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I always exercise before class.</span> <span class=\"gram-trans\">(Eu sempre me exercito antes da aula.)</span></li><li><span class=\"gram-eng\">She hardly ever watches TV.</span> <span class=\"gram-trans\">(Ela quase nunca assiste TV.)</span></li><li><span class=\"gram-eng\">I go jogging once a week.</span> <span class=\"gram-trans\">(Eu corro uma vez por semana.)</span></li><li><span class=\"gram-eng\">He never watches TV.</span> <span class=\"gram-trans\">(Ele nunca assiste TV.)</span></li><li><span class=\"gram-eng\">Sometimes I watch TV before bed.</span> <span class=\"gram-trans\">(Às vezes assisto TV antes de dormir.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Com o verbo &quot;be&quot; o advérbio vem DEPOIS: &quot;She is always late&quot;.</li><li>&quot;Usually&quot; e &quot;sometimes&quot; também podem abrir a frase.</li></ul></div></div>"},
{"order": 40, "badge": "40", "topic": "Questions with How; Short Answers", "book": "Interchange 1", "ref": "Interchange 1 - pg. 40 (Unit 6)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Perguntas com &quot;how + advérbio/adjetivo&quot; pedem informação sobre frequência, duração, habilidade ou qualidade.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">How often (frequência)</h5><p>How often + do + sujeito + verbo?<br>&quot;How often do you work out?&quot;</p><h5 class=\"gram-subhead\">How long (duração)</h5><p>How long + do + sujeito + verbo?<br>&quot;How long do you spend at the gym?&quot;</p><h5 class=\"gram-subhead\">How well / How good</h5><p>quão bem (ação) / quão bom (be + at)<br>&quot;How well do you play tennis?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">How often do you go to the beach?</span> <span class=\"gram-trans\">(Com que frequência você vai à praia?)</span></li><li><span class=\"gram-eng\">How long do you spend online?</span> <span class=\"gram-trans\">(Quanto tempo você passa online?)</span></li><li><span class=\"gram-eng\">How good are you at sports? — Pretty good.</span> <span class=\"gram-trans\">(Você é bom em esportes? — Bem bom.)</span></li><li><span class=\"gram-eng\">How well do you swim? — Not very well.</span> <span class=\"gram-trans\">(Quão bem você nada? — Não muito bem.)</span></li><li><span class=\"gram-eng\">How often do you lift weights? — About three times a week.</span> <span class=\"gram-trans\">(Com que frequência você malha? — Umas três vezes por semana.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;How well&quot; pergunta sobre a ação (verbo): &quot;How well do you cook?&quot;.</li><li>&quot;How good&quot; usa be + at: &quot;How good are you at cooking?&quot;.</li></ul></div></div>"},
{"order": 45, "badge": "45", "topic": "Simple Past", "book": "Interchange 1", "ref": "Interchange 1 - pg. 45 (Unit 7)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O passado simples descreve ações concluídas. Verbos regulares ganham -ed; os irregulares têm forma própria. Em perguntas e negativas usa-se &quot;did&quot;.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Afirmativa</h5><p>verbo + -ed (regular) / forma própria (irregular)<br>&quot;I worked all day. / I went to the movies.&quot;</p><h5 class=\"gram-subhead\">Pergunta</h5><p>Did + sujeito + verbo base?<br>&quot;Did you work on Saturday?&quot;</p><h5 class=\"gram-subhead\">Negativa</h5><p>didn't + verbo base<br>&quot;I didn't work at all.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">She danced with some friends.</span> <span class=\"gram-trans\">(Ela dançou com alguns amigos.)</span></li><li><span class=\"gram-eng\">Did you go anywhere last weekend? — Yes, I did.</span> <span class=\"gram-trans\">(Você foi a algum lugar no fim de semana? — Fui.)</span></li><li><span class=\"gram-eng\">I bought a new phone.</span> <span class=\"gram-trans\">(Eu comprei um celular novo.)</span></li><li><span class=\"gram-eng\">He stayed home and studied.</span> <span class=\"gram-trans\">(Ele ficou em casa e estudou.)</span></li><li><span class=\"gram-eng\">I didn't spend any money.</span> <span class=\"gram-trans\">(Eu não gastei dinheiro nenhum.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de did/didn't o verbo volta à forma BASE: &quot;Did you go?&quot; (não &quot;Did you went?&quot;).</li><li>Decore os irregulares: go→went, have→had, buy→bought, see→saw, do→did.</li></ul></div></div>"},
{"order": 47, "badge": "47", "topic": "Past of Be", "book": "Interchange 1", "ref": "Interchange 1 - pg. 47 (Unit 7)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O passado do verbo &quot;be&quot; tem só duas formas: was (I/he/she/it) e were (you/we/they). Usa-se para estados e situações no passado.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Afirmativa</h5><p>I/He/She/It was; You/We/They were<br>&quot;I was away for a week.&quot;</p><h5 class=\"gram-subhead\">Pergunta</h5><p>Was/Were + sujeito?<br>&quot;Were you in California?&quot;</p><h5 class=\"gram-subhead\">Negativa</h5><p>wasn't / weren't<br>&quot;No, it wasn't.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Was the weather OK? — No, it wasn't.</span> <span class=\"gram-trans\">(O tempo estava bom? — Não estava.)</span></li><li><span class=\"gram-eng\">Were your parents there? — No, they weren't.</span> <span class=\"gram-trans\">(Seus pais estavam lá? — Não estavam.)</span></li><li><span class=\"gram-eng\">It was excellent!</span> <span class=\"gram-trans\">(Foi excelente!)</span></li><li><span class=\"gram-eng\">How long were you away?</span> <span class=\"gram-trans\">(Por quanto tempo você ficou fora?)</span></li><li><span class=\"gram-eng\">I was there on business.</span> <span class=\"gram-trans\">(Eu estava lá a trabalho.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;Be&quot; é o único verbo que NÃO usa &quot;did&quot; no passado.</li><li>Pergunta-se invertendo: &quot;Were you...?&quot; (não &quot;Did you were...?&quot;).</li></ul></div></div>"},
{"order": 51, "badge": "51", "topic": "There Is, There Are; One, Any, Some", "book": "Interchange 1", "ref": "Interchange 1 - pg. 51 (Unit 8)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>&quot;There is/are&quot; indica existência (há/existe). Usa-se one para retomar um lugar no singular, e some/any para quantidades indefinidas no plural.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Singular</h5><p>Is there a...? — Yes, there is. / No, there isn't.<br>&quot;Is there a laundromat near here?&quot;</p><h5 class=\"gram-subhead\">Plural</h5><p>Are there any...? — Yes, there are some.<br>&quot;Are there any grocery stores?&quot;</p><h5 class=\"gram-subhead\">Negativa plural</h5><p>No, there aren't any.<br>&quot;No, there aren't any around here.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Is there a gym around here? — Yes, there is.</span> <span class=\"gram-trans\">(Tem uma academia por aqui? — Tem.)</span></li><li><span class=\"gram-eng\">Are there any restaurants on Main Street?</span> <span class=\"gram-trans\">(Tem algum restaurante na Main Street?)</span></li><li><span class=\"gram-eng\">There's one next to the library.</span> <span class=\"gram-trans\">(Tem um do lado da biblioteca.)</span></li><li><span class=\"gram-eng\">There are some nice stores on Third Avenue.</span> <span class=\"gram-trans\">(Tem umas lojas legais na Third Avenue.)</span></li><li><span class=\"gram-eng\">No, there aren't any around here.</span> <span class=\"gram-trans\">(Não, não tem nenhum por aqui.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use &quot;any&quot; em perguntas e negativas; &quot;some&quot; em afirmativas.</li><li>&quot;There's&quot; = there is (singular). No plural não há contração comum: &quot;there are&quot;.</li></ul></div></div>"},
{"order": 54, "badge": "54", "topic": "Quantifiers; How Many and How Much", "book": "Interchange 1", "ref": "Interchange 1 - pg. 54 (Unit 8)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Substantivos contáveis (têm plural) usam many/how many; incontáveis (massa, abstratos) usam much/how much. Os quantificadores mudam de acordo com isso.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Contáveis</h5><p>many, a few, aren't many, aren't any, none<br>&quot;How many restaurants are there?&quot;</p><h5 class=\"gram-subhead\">Incontáveis</h5><p>much, a little, isn't much, isn't any, none<br>&quot;How much crime is there?&quot;</p><h5 class=\"gram-subhead\">Para os dois</h5><p>a lot (of)<br>&quot;There's a lot of traffic.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">How many drugstores are there? — There are a few.</span> <span class=\"gram-trans\">(Quantas farmácias tem? — Algumas.)</span></li><li><span class=\"gram-eng\">Is there much pollution? — No, there isn't much.</span> <span class=\"gram-trans\">(Tem muita poluição? — Não muita.)</span></li><li><span class=\"gram-eng\">Are there many parks? — No, there aren't any.</span> <span class=\"gram-trans\">(Tem muitos parques? — Não, nenhum.)</span></li><li><span class=\"gram-eng\">How much traffic is there?</span> <span class=\"gram-trans\">(Quanto trânsito tem?)</span></li><li><span class=\"gram-eng\">There's a little crime.</span> <span class=\"gram-trans\">(Tem um pouco de crime.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;How many&quot; para o que se conta (cars, stores); &quot;How much&quot; para o que não se conta (traffic, noise).</li><li>&quot;A few&quot; = contáveis; &quot;a little&quot; = incontáveis.</li></ul></div></div>"},
{"order": 59, "badge": "59", "topic": "Describing People", "book": "Interchange 1", "ref": "Interchange 1 - pg. 59 (Unit 9)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para descrever aparência usamos perguntas específicas sobre aparência geral, altura, cabelo e idade, cada uma com sua estrutura própria.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Aparência geral</h5><p>What does she look like? — She's tall, with brown hair.<br>&quot;What does she look like?&quot;</p><h5 class=\"gram-subhead\">Altura</h5><p>How tall is he? — He's 1 meter 78. / medium height.<br>&quot;How tall is he?&quot;</p><h5 class=\"gram-subhead\">Idade</h5><p>How old is she? — She's in her thirties.<br>&quot;How old is she?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">What does he look like?</span> <span class=\"gram-trans\">(Como ele é fisicamente?)</span></li><li><span class=\"gram-eng\">How long is her hair? — It's pretty short.</span> <span class=\"gram-trans\">(Quão comprido é o cabelo dela? — Bem curto.)</span></li><li><span class=\"gram-eng\">What color is his hair? — It's dark brown.</span> <span class=\"gram-trans\">(De que cor é o cabelo dele? — Castanho-escuro.)</span></li><li><span class=\"gram-eng\">He's in his twenties.</span> <span class=\"gram-trans\">(Ele tem uns vinte e poucos anos.)</span></li><li><span class=\"gram-eng\">She's about 32.</span> <span class=\"gram-trans\">(Ela tem uns 32.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;What does she look like?&quot; (como ela é?) ≠ &quot;What does she like?&quot; (do que ela gosta?).</li><li>&quot;She's in her thirties&quot; = ela tem entre 30 e 39 anos.</li></ul></div></div>"},
{"order": 62, "badge": "62", "topic": "Modifiers with Present Participles and Prepositions", "book": "Interchange 1", "ref": "Interchange 1 - pg. 62 (Unit 9)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para identificar pessoas usamos modificadores DEPOIS do substantivo: com particípio presente (-ing) para ações, ou com preposição para localização/características.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Particípio (-ing)</h5><p>the + man/one + verbo-ing<br>&quot;He's the man wearing a blue shirt.&quot;</p><h5 class=\"gram-subhead\">Preposição</h5><p>the + woman/one + with/in/next to...<br>&quot;She's the woman with long black hair.&quot;</p><h5 class=\"gram-subhead\">Padrão</h5><p>the (+ adjetivo) + substantivo + -ing / preposição<br>&quot;She's the tall one in jeans.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">He's the one talking to Brooke.</span> <span class=\"gram-trans\">(Ele é o que está falando com a Brooke.)</span></li><li><span class=\"gram-eng\">Kyle is the tall guy wearing a yellow shirt.</span> <span class=\"gram-trans\">(O Kyle é o cara alto de camisa amarela.)</span></li><li><span class=\"gram-eng\">She's the tall one in jeans.</span> <span class=\"gram-trans\">(Ela é a alta de jeans.)</span></li><li><span class=\"gram-eng\">They're the people next to the window.</span> <span class=\"gram-trans\">(Eles são as pessoas perto da janela.)</span></li><li><span class=\"gram-eng\">J.P. is the boy playing a video game.</span> <span class=\"gram-trans\">(O J.P. é o menino jogando videogame.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>O modificador vem DEPOIS do substantivo: &quot;the man wearing a hat&quot; = o homem que usa chapéu.</li><li>Não precisa de &quot;who is&quot; — o -ing já dá a ideia de &quot;que está fazendo&quot;.</li></ul></div></div>"},
{"order": 65, "badge": "65", "topic": "Present Perfect; Already, Yet", "book": "Interchange 1", "ref": "Interchange 1 - pg. 65 (Unit 10)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O present perfect (have/has + particípio) liga passado e presente — experiências e ações sem tempo definido. &quot;Already&quot; (afirmativas) e &quot;yet&quot; (negativas/perguntas) marcam se algo já aconteceu.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Forma</h5><p>have/has + particípio passado<br>&quot;Have you been to a jazz club?&quot;</p><h5 class=\"gram-subhead\">already (já)</h5><p>em afirmativas, no meio da frase<br>&quot;Yes, they've already eaten.&quot;</p><h5 class=\"gram-subhead\">yet (ainda)</h5><p>em negativas/perguntas, no fim<br>&quot;No, they haven't eaten yet.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Have you been to a jazz club? — Yes, I've been to several.</span> <span class=\"gram-trans\">(Você já foi a um clube de jazz? — Já fui a vários.)</span></li><li><span class=\"gram-eng\">Has Carlos visited the theme parks? — No, he hasn't.</span> <span class=\"gram-trans\">(O Carlos visitou os parques? — Não visitou.)</span></li><li><span class=\"gram-eng\">I've already made dinner twice this week.</span> <span class=\"gram-trans\">(Eu já fiz o jantar duas vezes esta semana.)</span></li><li><span class=\"gram-eng\">I haven't gone to any parties yet.</span> <span class=\"gram-trans\">(Eu ainda não fui a nenhuma festa.)</span></li><li><span class=\"gram-eng\">Have you played any sports this month?</span> <span class=\"gram-trans\">(Você praticou algum esporte este mês?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Os particípios irregulares são a armadilha: be→been, go→gone, see→seen, do→done, eat→eaten.</li><li>&quot;Already&quot; vai no meio da frase; &quot;yet&quot; vai no fim.</li></ul></div></div>"},
{"order": 66, "badge": "66", "topic": "Present Perfect vs. Simple Past", "book": "Interchange 1", "ref": "Interchange 1 - pg. 66 (Unit 10)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Use o present perfect para tempo indefinido (experiência: já fez alguma vez). Use o passado simples para um momento específico no passado (quando? onde?).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Present perfect (indefinido)</h5><p>have/has + particípio — experiência geral<br>&quot;Have you ever eaten Cuban food?&quot;</p><h5 class=\"gram-subhead\">Simple past (momento definido)</h5><p>verbo no passado — quando isso aconteceu<br>&quot;I ate Cuban food when I lived in Miami.&quot;</p><h5 class=\"gram-subhead\">Marcadores definidos</h5><p>last week, yesterday, when I... → passado simples<br>&quot;I saw an alligator last week.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Have you ever seen an alligator? — Yes, I have.</span> <span class=\"gram-trans\">(Você já viu um jacaré? — Já vi.)</span></li><li><span class=\"gram-eng\">I saw a big alligator last week.</span> <span class=\"gram-trans\">(Eu vi um jacaré grande semana passada.)</span></li><li><span class=\"gram-eng\">I've never tried it.</span> <span class=\"gram-trans\">(Eu nunca experimentei isso.)</span></li><li><span class=\"gram-eng\">I didn't go to the park last week.</span> <span class=\"gram-trans\">(Eu não fui ao parque semana passada.)</span></li><li><span class=\"gram-eng\">No, I never tried it when I lived there.</span> <span class=\"gram-trans\">(Não, nunca experimentei quando morava lá.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Se há referência de tempo concreta (last week, in 2010, yesterday), use o passado simples.</li><li>&quot;ever&quot; e &quot;never&quot; combinam com o present perfect, não com o passado simples.</li></ul></div></div>"},
{"order": 67, "badge": "67", "topic": "For and Since", "book": "Interchange 1", "ref": "Interchange 1 - pg. 67 (Unit 10)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>For e since marcam tempo. &quot;For&quot; indica a duração (quanto tempo). &quot;Since&quot; indica o ponto de início (desde quando). Muito usados com o present perfect.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">for</h5><p>+ período de tempo (quanto tempo)<br>&quot;I've lived here for three years.&quot;</p><h5 class=\"gram-subhead\">since</h5><p>+ momento de início (desde quando)<br>&quot;I've worked here since last year.&quot;</p><h5 class=\"gram-subhead\">Pergunta</h5><p>How long + have + sujeito + particípio?<br>&quot;How long have you lived in Orlando?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I've been a college student for almost four years.</span> <span class=\"gram-trans\">(Sou universitário há quase quatro anos.)</span></li><li><span class=\"gram-eng\">My parents have been on vacation since Monday.</span> <span class=\"gram-trans\">(Meus pais estão de férias desde segunda.)</span></li><li><span class=\"gram-eng\">Alex and Brianna have been best friends since high school.</span> <span class=\"gram-trans\">(Alex e Brianna são melhores amigos desde o ensino médio.)</span></li><li><span class=\"gram-eng\">I haven't gone to a party for a long time.</span> <span class=\"gram-trans\">(Faz muito tempo que não vou a uma festa.)</span></li><li><span class=\"gram-eng\">Hiroshi has been at work since 6:00 a.m.</span> <span class=\"gram-trans\">(O Hiroshi está no trabalho desde as 6h.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;for&quot; + duração (two weeks, a long time); &quot;since&quot; + marco no tempo (2009, Monday).</li><li>Em português &quot;há/faz&quot; pode virar for ou since — pense se é período ou ponto de partida.</li></ul></div></div>"},
{"order": 73, "badge": "73", "topic": "Adverbs Before Adjectives; Conjunctions", "book": "Interchange 1", "ref": "Interchange 1 - pg. 73 (Unit 11)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Advérbios de intensidade (too, very, pretty, fairly...) vêm ANTES do adjetivo para graduá-lo. Conjunções (and, but, though, however) ligam ideias positivas e negativas.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Advérbio + adjetivo</h5><p>too / very / really / pretty / fairly + adjetivo<br>&quot;It's not very big. / too crowded.&quot;</p><h5 class=\"gram-subhead\">and / but</h5><p>adiciona ideia parecida / faz contraste<br>&quot;It's a big city, but it's not too big.&quot;</p><h5 class=\"gram-subhead\">though / however</h5><p>contraste (though no fim; however abre/separa)<br>&quot;It's not too big, though.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Punta Cana is really nice.</span> <span class=\"gram-trans\">(Punta Cana é bem legal.)</span></li><li><span class=\"gram-eng\">New York is too noisy for me.</span> <span class=\"gram-trans\">(Nova York é barulhenta demais pra mim.)</span></li><li><span class=\"gram-eng\">Kyoto is very nice, and everyone is extremely friendly.</span> <span class=\"gram-trans\">(Kyoto é muito legal, e todos são extremamente simpáticos.)</span></li><li><span class=\"gram-eng\">The weather is nice. Summers get pretty hot, however.</span> <span class=\"gram-trans\">(O tempo é bom. Os verões ficam bem quentes, no entanto.)</span></li><li><span class=\"gram-eng\">It's an amazing city, and I love to go there.</span> <span class=\"gram-trans\">(É uma cidade incrível, e adoro ir lá.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;too&quot; tem sentido NEGATIVO (demais, em excesso): &quot;too expensive&quot; = caro demais.</li><li>&quot;though&quot; geralmente vem no fim da frase; &quot;however&quot; abre ou separa a ideia.</li></ul></div></div>"},
{"order": 75, "badge": "75", "topic": "Modal Verbs Can and Should", "book": "Interchange 1", "ref": "Interchange 1 - pg. 75 (Unit 11)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>&quot;Can&quot; expressa possibilidade (o que dá para fazer); &quot;should&quot; dá conselho ou recomendação. As negativas são can't e shouldn't.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">can / can't</h5><p>possibilidade<br>&quot;You can walk around the historic center.&quot;</p><h5 class=\"gram-subhead\">should / shouldn't</h5><p>conselho/recomendação<br>&quot;You should visit the museum.&quot;</p><h5 class=\"gram-subhead\">Forma</h5><p>modal + verbo base (sem &quot;to&quot;, sem -s)<br>&quot;She can go anytime.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">You can't miss the street food.</span> <span class=\"gram-trans\">(Você não pode perder a comida de rua.)</span></li><li><span class=\"gram-eng\">You should go to Morocco.</span> <span class=\"gram-trans\">(Você deveria ir ao Marrocos.)</span></li><li><span class=\"gram-eng\">You shouldn't miss the Grand Bazaar.</span> <span class=\"gram-trans\">(Você não deve perder o Grand Bazaar.)</span></li><li><span class=\"gram-eng\">Can I rent a car?</span> <span class=\"gram-trans\">(Posso/dá pra alugar um carro?)</span></li><li><span class=\"gram-eng\">You should definitely use the subway.</span> <span class=\"gram-trans\">(Você deveria com certeza usar o metrô.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de modal, o verbo fica na forma base: &quot;She can go&quot; (não &quot;can goes&quot; nem &quot;can to go&quot;).</li><li>&quot;You can't miss it&quot; = é imperdível (uso idiomático, não uma proibição literal).</li></ul></div></div>"},
{"order": 79, "badge": "79", "topic": "Adjective + Infinitive; Noun + Infinitive", "book": "Interchange 1", "ref": "Interchange 1 - pg. 79 (Unit 12)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para dar conselhos e opiniões usamos &quot;It's + adjetivo + to + verbo&quot; ou &quot;It's + substantivo + to + verbo&quot;. O infinitivo (to + verbo) completa a ideia.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">It's + adjetivo + to + verbo</h5><p>important, helpful, easy...<br>&quot;It's important to get some rest.&quot;</p><h5 class=\"gram-subhead\">It's + substantivo + to + verbo</h5><p>a good idea, a bad idea...<br>&quot;It's a good idea to take vitamin C.&quot;</p><h5 class=\"gram-subhead\">Uso</h5><p>dar conselho geral<br>&quot;It's sometimes helpful to drink garlic tea.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">It's important to get some rest.</span> <span class=\"gram-trans\">(É importante descansar.)</span></li><li><span class=\"gram-eng\">It's sometimes helpful to drink garlic tea.</span> <span class=\"gram-trans\">(Às vezes ajuda tomar chá de alho.)</span></li><li><span class=\"gram-eng\">It's a good idea to put a heating pad on it.</span> <span class=\"gram-trans\">(É uma boa ideia colocar uma bolsa térmica.)</span></li><li><span class=\"gram-eng\">It's important to see a doctor.</span> <span class=\"gram-trans\">(É importante ir ao médico.)</span></li><li><span class=\"gram-eng\">For an earache, it's a good idea to see a doctor.</span> <span class=\"gram-trans\">(Para dor de ouvido, é uma boa ideia ir ao médico.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Sempre &quot;to + verbo&quot; depois do adjetivo/substantivo: &quot;important TO get&quot; (não &quot;important getting&quot;).</li><li>Na fala, esse &quot;to&quot; costuma reduzir para o som /ta/.</li></ul></div></div>"},
{"order": 81, "badge": "81", "topic": "Modal Verbs Can, Could, and May for Requests; Suggestions", "book": "Interchange 1", "ref": "Interchange 1 - pg. 81 (Unit 12)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Can, could e may fazem pedidos (could/may são mais formais). Para sugestões usamos suggest, should, could ou &quot;Why don't you...?&quot;.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Pedido</h5><p>Can/Could/May + I + verbo?<br>&quot;Could I have something for a cough?&quot;</p><h5 class=\"gram-subhead\">Sugestão com modal</h5><p>You could / You should + verbo<br>&quot;You should get a heating pad.&quot;</p><h5 class=\"gram-subhead\">Sugestão informal</h5><p>Why don't you + verbo?<br>&quot;Why don't you try these pills?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">May I help you?</span> <span class=\"gram-trans\">(Posso ajudar?)</span></li><li><span class=\"gram-eng\">Can I have a bag of cough drops?</span> <span class=\"gram-trans\">(Posso levar um pacote de pastilhas?)</span></li><li><span class=\"gram-eng\">What do you suggest for a backache?</span> <span class=\"gram-trans\">(O que você sugere para dor nas costas?)</span></li><li><span class=\"gram-eng\">You could try this new cream.</span> <span class=\"gram-trans\">(Você poderia experimentar esse creme novo.)</span></li><li><span class=\"gram-eng\">Why don't you try this lotion?</span> <span class=\"gram-trans\">(Por que você não experimenta esta loção?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;May&quot; e &quot;could&quot; soam mais educados que &quot;can&quot; num pedido.</li><li>&quot;Why don't you...?&quot; não é pergunta de verdade — é uma sugestão (= que tal...?).</li></ul></div></div>"},
{"order": 87, "badge": "87", "topic": "So, Too, Neither, Either", "book": "Interchange 1", "ref": "Interchange 1 - pg. 87 (Unit 13)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usados para concordar com alguém. &quot;So/too&quot; concordam com frases AFIRMATIVAS; &quot;neither/either&quot; concordam com frases NEGATIVAS.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Concordar (afirmativa)</h5><p>So + auxiliar + I  /  I + auxiliar + too<br>&quot;So am I. / I am, too.&quot;</p><h5 class=\"gram-subhead\">Concordar (negativa)</h5><p>Neither + auxiliar + I  /  I + auxiliar negativo + either<br>&quot;Neither am I. / I'm not either.&quot;</p><h5 class=\"gram-subhead\">O auxiliar</h5><p>combina com o verbo da frase original (am, do, can...)<br>&quot;So do I. / So can I.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I like Japanese food. — So do I.</span> <span class=\"gram-trans\">(Gosto de comida japonesa. — Eu também.)</span></li><li><span class=\"gram-eng\">I can eat spicy food. — So can I.</span> <span class=\"gram-trans\">(Consigo comer comida apimentada. — Eu também.)</span></li><li><span class=\"gram-eng\">I'm not in the mood for Indian food. — Neither am I.</span> <span class=\"gram-trans\">(Não estou a fim de comida indiana. — Nem eu.)</span></li><li><span class=\"gram-eng\">I don't like salty food. — I don't either.</span> <span class=\"gram-trans\">(Não gosto de comida salgada. — Eu também não.)</span></li><li><span class=\"gram-eng\">I'm crazy about Italian food. — So am I.</span> <span class=\"gram-trans\">(Sou louco por comida italiana. — Eu também.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de &quot;So&quot; e &quot;Neither&quot; o verbo INVERTE com o sujeito: &quot;So do I&quot;, &quot;Neither am I&quot;.</li><li>O auxiliar tem que combinar: be→am/is, like→do, can→can.</li></ul></div></div>"},
{"order": 89, "badge": "89", "topic": "Modal Verbs Would and Will for Requests", "book": "Interchange 1", "ref": "Interchange 1 - pg. 89 (Unit 13)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Em pedidos num restaurante, &quot;would&quot; pergunta o que a pessoa deseja e &quot;will&quot; anuncia a escolha. As contrações são 'd (would) e 'll (will).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Pergunta com would</h5><p>What would you like? / Would you like...?<br>&quot;What would you like to drink?&quot;</p><h5 class=\"gram-subhead\">Pedido com would</h5><p>I'd like + substantivo (= I would like)<br>&quot;I'd like onion soup, please.&quot;</p><h5 class=\"gram-subhead\">Decisão na hora com will</h5><p>I'll have + substantivo (= I will have)<br>&quot;I'll have the soup of the day.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">What would you like to drink?</span> <span class=\"gram-trans\">(O que você gostaria de beber?)</span></li><li><span class=\"gram-eng\">I'd like onion soup, please.</span> <span class=\"gram-trans\">(Eu gostaria de sopa de cebola, por favor.)</span></li><li><span class=\"gram-eng\">I'll have the soup of the day.</span> <span class=\"gram-trans\">(Vou querer a sopa do dia.)</span></li><li><span class=\"gram-eng\">Would you like anything else? — That's all, thanks.</span> <span class=\"gram-trans\">(Mais alguma coisa? — Só isso, obrigado.)</span></li><li><span class=\"gram-eng\">I'll have mint chocolate chip, please.</span> <span class=\"gram-trans\">(Vou querer menta com gotas de chocolate.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;I'd like&quot; (gostaria) é mais educado que &quot;I want&quot; (quero).</li><li>&quot;I'll have&quot; = &quot;vou querer&quot;, uma decisão tomada na hora do pedido.</li></ul></div></div>"},
{"order": 93, "badge": "93", "topic": "Comparisons with Adjectives", "book": "Interchange 1", "ref": "Interchange 1 - pg. 93 (Unit 14)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O comparativo compara duas coisas (-er/more + than); o superlativo destaca uma entre todas (the -est / the most). A escolha depende do tamanho do adjetivo.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Comparativo curto</h5><p>adjetivo + -er + than<br>&quot;Australia is larger than Mexico.&quot;</p><h5 class=\"gram-subhead\">Superlativo curto</h5><p>the + adjetivo + -est<br>&quot;Russia is the largest country.&quot;</p><h5 class=\"gram-subhead\">Longos (2+ sílabas)</h5><p>more + adj + than / the most + adj<br>&quot;the most crowded / more expensive than&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Which country is larger, Australia or Mexico?</span> <span class=\"gram-trans\">(Qual país é maior, Austrália ou México?)</span></li><li><span class=\"gram-eng\">Malta is more crowded than England.</span> <span class=\"gram-trans\">(Malta é mais populosa que a Inglaterra.)</span></li><li><span class=\"gram-eng\">Which city is the most expensive?</span> <span class=\"gram-trans\">(Qual cidade é a mais cara?)</span></li><li><span class=\"gram-eng\">The Nile is the longest river in the world.</span> <span class=\"gram-trans\">(O Nilo é o rio mais longo do mundo.)</span></li><li><span class=\"gram-eng\">Russia is the largest country.</span> <span class=\"gram-trans\">(A Rússia é o maior país.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Irregulares fogem da regra: good→better→the best; bad→worse→the worst.</li><li>Não misture: é &quot;more expensive&quot;, nunca &quot;expensiver&quot; nem &quot;more expensiver&quot;.</li></ul></div></div>"},
{"order": 96, "badge": "96", "topic": "Questions with How", "book": "Interchange 1", "ref": "Interchange 1 - pg. 96 (Unit 14)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Perguntas com &quot;how + adjetivo&quot; pedem medidas e dimensões: temperatura, distância, tamanho, altura, comprimento, profundidade.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Forma</h5><p>How + adjetivo + be + sujeito?<br>&quot;How high is Mount Everest?&quot;</p><h5 class=\"gram-subhead\">Resposta</h5><p>It's + medida (+ adjetivo)<br>&quot;It's 8,848 meters high.&quot;</p><h5 class=\"gram-subhead\">Adjetivos</h5><p>cold, hot, far, big, high, long, deep<br>&quot;How far is Toronto from Fairbanks?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">How high is Niagara Falls? — It's 52 meters high.</span> <span class=\"gram-trans\">(Qual a altura das Cataratas do Niágara? — 52 metros.)</span></li><li><span class=\"gram-eng\">How long is the Nile? — It's 6,670 kilometers long.</span> <span class=\"gram-trans\">(Qual o comprimento do Nilo? — 6.670 km.)</span></li><li><span class=\"gram-eng\">How far is Osaka from Tokyo? — About 400 kilometers.</span> <span class=\"gram-trans\">(Qual a distância de Osaka a Tóquio? — Uns 400 km.)</span></li><li><span class=\"gram-eng\">How deep is the Grand Canyon?</span> <span class=\"gram-trans\">(Qual a profundidade do Grand Canyon?)</span></li><li><span class=\"gram-eng\">How hot is it in the summer?</span> <span class=\"gram-trans\">(Quão quente fica no verão?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Na resposta, o adjetivo vem DEPOIS da medida: &quot;It's 52 meters high&quot;.</li><li>&quot;How far&quot; = distância; &quot;How long&quot; pode ser comprimento OU duração.</li></ul></div></div>"},
{"order": 101, "badge": "101", "topic": "Future with Present Continuous and Be Going to", "book": "Interchange 1", "ref": "Interchange 1 - pg. 101 (Unit 15)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para falar do futuro próximo, usamos o presente contínuo (planos já combinados) ou &quot;be going to&quot; (intenções e planos). Ambos vêm com expressões de tempo futuras.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Presente contínuo (futuro)</h5><p>be + verbo-ing<br>&quot;What are you doing tonight?&quot;</p><h5 class=\"gram-subhead\">be going to</h5><p>be going to + verbo base<br>&quot;She's going to see a play.&quot;</p><h5 class=\"gram-subhead\">Expressões de tempo</h5><p>tonight, tomorrow, on Friday, this weekend, next week<br>&quot;Are you doing anything tomorrow?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">What are you doing tonight? — I'm going to a party.</span> <span class=\"gram-trans\">(O que você vai fazer hoje à noite? — Vou a uma festa.)</span></li><li><span class=\"gram-eng\">She's going to see a play.</span> <span class=\"gram-trans\">(Ela vai ver uma peça.)</span></li><li><span class=\"gram-eng\">Are they going to see the photo exhibit? — Yes, they are.</span> <span class=\"gram-trans\">(Eles vão ver a exposição? — Vão.)</span></li><li><span class=\"gram-eng\">Are you doing anything tomorrow?</span> <span class=\"gram-trans\">(Você vai fazer algo amanhã?)</span></li><li><span class=\"gram-eng\">We're going to have a barbecue on Sunday.</span> <span class=\"gram-trans\">(Vamos fazer um churrasco no domingo.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;going to + verbo&quot; é planejamento; não confunda com movimento (&quot;I'm going to the party&quot; = indo).</li><li>Na fala informal, &quot;going to&quot; vira &quot;gonna&quot;.</li></ul></div></div>"},
{"order": 103, "badge": "103", "topic": "Formal and Informal Messages with Tell and Ask", "book": "Interchange 1", "ref": "Interchange 1 - pg. 103 (Unit 15)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para transmitir recados usamos &quot;tell&quot; (com afirmações) e &quot;ask&quot; (com pedidos). A formalidade aumenta de &quot;Please tell...&quot; para &quot;Could/Would you tell...?&quot;.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Recado com afirmação (tell)</h5><p>tell + pessoa + (that) + frase<br>&quot;Could you tell him that I'm going to miss class?&quot;</p><h5 class=\"gram-subhead\">Recado com pedido (ask)</h5><p>ask + pessoa + to + verbo<br>&quot;Could you ask her to take a picture?&quot;</p><h5 class=\"gram-subhead\">Escala de formalidade</h5><p>Please tell... &lt; Could you... &lt; Would you...<br>&quot;Would you tell him that...?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Please tell Haru that the barbecue is on Saturday.</span> <span class=\"gram-trans\">(Por favor, diga ao Haru que o churrasco é no sábado.)</span></li><li><span class=\"gram-eng\">Could you tell Mia that the dance performance is tonight?</span> <span class=\"gram-trans\">(Você poderia avisar a Mia que a apresentação é hoje?)</span></li><li><span class=\"gram-eng\">Would you ask Maika to meet me at the stadium?</span> <span class=\"gram-trans\">(Você poderia pedir à Maika para me encontrar no estádio?)</span></li><li><span class=\"gram-eng\">Could you ask Caitlin to call me at 4:00?</span> <span class=\"gram-trans\">(Você poderia pedir à Caitlin que me ligue às 16h?)</span></li><li><span class=\"gram-eng\">Please ask Garrett to bring the tickets.</span> <span class=\"gram-trans\">(Por favor, peça ao Garrett que traga os ingressos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;tell + pessoa + (that) + frase&quot; para INFORMAR; &quot;ask + pessoa + to + verbo&quot; para PEDIR.</li><li>Não troque: &quot;ask him to call&quot; (pedir) ≠ &quot;tell him that...&quot; (avisar).</li></ul></div></div>"},
{"order": 107, "badge": "107", "topic": "Describing Changes", "book": "Interchange 1", "ref": "Interchange 1 - pg. 107 (Unit 16)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para descrever mudanças na vida combinamos vários tempos: presente, passado, present perfect e o comparativo — cada um para um tipo de mudança.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Presente (situação atual)</h5><p>I'm not... anymore / I ... now<br>&quot;I wear contacts now.&quot;</p><h5 class=\"gram-subhead\">Passado (evento concluído)</h5><p>verbo no passado<br>&quot;I majored in business. / I got engaged.&quot;</p><h5 class=\"gram-subhead\">Present perfect / comparativo</h5><p>have + particípio / adjetivo + -er<br>&quot;I've bought a new apartment. / My hair is longer now.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I've just started a new job.</span> <span class=\"gram-trans\">(Acabei de começar um emprego novo.)</span></li><li><span class=\"gram-eng\">I'm not in high school anymore.</span> <span class=\"gram-trans\">(Não estou mais no ensino médio.)</span></li><li><span class=\"gram-eng\">I got married.</span> <span class=\"gram-trans\">(Eu me casei.)</span></li><li><span class=\"gram-eng\">My life is easier now.</span> <span class=\"gram-trans\">(Minha vida está mais fácil agora.)</span></li><li><span class=\"gram-eng\">It's less noisy than downtown.</span> <span class=\"gram-trans\">(É menos barulhento que o centro.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;anymore&quot; aparece no fim de frases negativas: &quot;I don't live there anymore&quot;.</li><li>O comparativo mostra mudança: longer, easier, less noisy (mais comprido, mais fácil, menos barulhento).</li></ul></div></div>"},
{"order": 109, "badge": "109", "topic": "Verb + Infinitive", "book": "Interchange 1", "ref": "Interchange 1 - pg. 109 (Unit 16)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Vários verbos que falam de planos e desejos são seguidos por um infinitivo (to + verbo): plan, want, hope, would like, would love.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Verbo + to + verbo</h5><p>plan/want/hope + to + verbo base<br>&quot;I plan to take guitar lessons.&quot;</p><h5 class=\"gram-subhead\">Afirmativa / negativa</h5><p>I want to... / I don't want to...<br>&quot;I don't want to learn to dance.&quot;</p><h5 class=\"gram-subhead\">Desejo educado</h5><p>would like to / would love to<br>&quot;I'd love to play the guitar.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I'm going to take a trip to the Caribbean.</span> <span class=\"gram-trans\">(Vou fazer uma viagem ao Caribe.)</span></li><li><span class=\"gram-eng\">I hope to get a new job.</span> <span class=\"gram-trans\">(Espero conseguir um emprego novo.)</span></li><li><span class=\"gram-eng\">I'd like to travel around the United States.</span> <span class=\"gram-trans\">(Eu gostaria de viajar pelos EUA.)</span></li><li><span class=\"gram-eng\">I don't plan to take guitar lessons.</span> <span class=\"gram-trans\">(Não pretendo fazer aulas de violão.)</span></li><li><span class=\"gram-eng\">I'd love to play the guitar.</span> <span class=\"gram-trans\">(Eu adoraria tocar violão.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Esses verbos exigem o &quot;to&quot;: want TO learn, hope TO get (nunca &quot;want learn&quot;).</li><li>&quot;would like to&quot; = vontade educada; &quot;be going to&quot; = plano mais concreto.</li></ul></div></div>"}

{"order": 3, "badge": "3", "topic": "Past Tense", "book": "Interchange 2", "ref": "Interchange 2 - pg. 03 (Unit 1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O passado simples descreve ações e situações concluídas. Em perguntas e negativas com a maioria dos verbos usa-se did/didn't; já o verbo &quot;be&quot; usa was/were direto.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Verbo be no passado</h5><p>was / were<br>&quot;Where were you born? — I was born in Argentina.&quot;</p><h5 class=\"gram-subhead\">Pergunta (outros verbos)</h5><p>Did + sujeito + verbo base?<br>&quot;When did you move to Los Angeles?&quot;</p><h5 class=\"gram-subhead\">Negativa</h5><p>didn't + verbo base<br>&quot;I didn't speak English.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Where were you born? — I was born in Córdoba.</span> <span class=\"gram-trans\">(Onde você nasceu? — Nasci em Córdoba.)</span></li><li><span class=\"gram-eng\">When did you move here? — I moved here 10 years ago.</span> <span class=\"gram-trans\">(Quando você se mudou pra cá? — Há 10 anos.)</span></li><li><span class=\"gram-eng\">Did you take English classes? — Yes, I did.</span> <span class=\"gram-trans\">(Você fez aulas de inglês? — Fiz.)</span></li><li><span class=\"gram-eng\">My aunt taught me at home.</span> <span class=\"gram-trans\">(Minha tia me ensinou em casa.)</span></li><li><span class=\"gram-eng\">Did you grow up there? — No, I grew up in Canada.</span> <span class=\"gram-trans\">(Você cresceu lá? — Não, cresci no Canadá.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;Be&quot; não usa &quot;did&quot;: é &quot;Where were you born?&quot; (não &quot;Did you were born?&quot;).</li><li>Decore os irregulares: take→took, teach→taught, grow→grew (move é regular: moved).</li></ul></div></div>"},
{"order": 5, "badge": "5", "topic": "Used to", "book": "Interchange 2", "ref": "Interchange 2 - pg. 05 (Unit 1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>&quot;Used to&quot; fala de algo que era habitual ou verdadeiro no passado, mas não é mais. Em perguntas e negativas vira &quot;use to&quot; (sem o -d).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Afirmativa</h5><p>used to + verbo base<br>&quot;I used to play baseball.&quot;</p><h5 class=\"gram-subhead\">Negativa</h5><p>didn't use to + verbo base<br>&quot;I didn't use to be a good student.&quot;</p><h5 class=\"gram-subhead\">Pergunta</h5><p>Did + sujeito + use to + verbo?<br>&quot;Did you use to collect things?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Did you use to have pets? — Yes, I used to have a cat.</span> <span class=\"gram-trans\">(Você costumava ter animais? — Sim, eu tinha um gato.)</span></li><li><span class=\"gram-eng\">I never used to play sports, but now I like to keep fit.</span> <span class=\"gram-trans\">(Eu nunca praticava esportes, mas agora gosto de me manter em forma.)</span></li><li><span class=\"gram-eng\">I used to wear my hair much longer.</span> <span class=\"gram-trans\">(Eu costumava usar o cabelo bem mais comprido.)</span></li><li><span class=\"gram-eng\">I didn't use to like studying, but now I love it.</span> <span class=\"gram-trans\">(Eu não gostava de estudar, mas agora adoro.)</span></li><li><span class=\"gram-eng\">We didn't use to play during the week.</span> <span class=\"gram-trans\">(A gente não brincava durante a semana.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Na negativa e na pergunta perde o -d: &quot;didn't USE to&quot;, &quot;Did you USE to...?&quot;.</li><li>Só existe no passado — não há &quot;use to&quot; para o presente.</li></ul></div></div>"},
{"order": 9, "badge": "9", "topic": "Expressions of Quantity", "book": "Interchange 2", "ref": "Interchange 2 - pg. 09 (Unit 2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Expressões de quantidade mudam conforme o substantivo seja contável (carros) ou incontável (poluição). Usadas para falar de excesso, falta ou necessidade.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Contáveis</h5><p>too many / fewer / not enough<br>&quot;There are too many cars. / fewer cars.&quot;</p><h5 class=\"gram-subhead\">Incontáveis</h5><p>too much / less / not enough<br>&quot;There is too much pollution. / less pollution.&quot;</p><h5 class=\"gram-subhead\">Para os dois</h5><p>more / enough<br>&quot;We need more streetlights.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">There are too many cars.</span> <span class=\"gram-trans\">(Há carros demais.)</span></li><li><span class=\"gram-eng\">There should be less pollution.</span> <span class=\"gram-trans\">(Deveria haver menos poluição.)</span></li><li><span class=\"gram-eng\">We need more public transportation.</span> <span class=\"gram-trans\">(Precisamos de mais transporte público.)</span></li><li><span class=\"gram-eng\">There aren't enough police officers.</span> <span class=\"gram-trans\">(Não há policiais suficientes.)</span></li><li><span class=\"gram-eng\">There isn't enough parking.</span> <span class=\"gram-trans\">(Não há vagas de estacionamento suficientes.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>too many/fewer = contáveis; too much/less = incontáveis.</li><li>&quot;enough&quot; vem ANTES do substantivo: &quot;enough parking&quot; (não &quot;parking enough&quot;).</li></ul></div></div>"},
{"order": 11, "badge": "11", "topic": "Indirect Questions from Wh-Questions", "book": "Interchange 2", "ref": "Interchange 2 - pg. 11 (Unit 2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Perguntas indiretas são mais educadas. Começam com &quot;Could you tell me...&quot; ou &quot;Do you know...&quot;, e a ordem vira de afirmativa (sem inversão, sem do/does).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Com be</h5><p>o verbo be vai para o fim<br>&quot;Could you tell me where the nearest ATM is?&quot;</p><h5 class=\"gram-subhead\">Com do/does</h5><p>o auxiliar some e o verbo recebe -s<br>&quot;Do you know what time the bookstore opens?&quot;</p><h5 class=\"gram-subhead\">Com can</h5><p>mantém a ordem afirmativa<br>&quot;Do you know where I can catch the bus?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Could you tell me where the restrooms are?</span> <span class=\"gram-trans\">(Você poderia me dizer onde ficam os banheiros?)</span></li><li><span class=\"gram-eng\">Do you know what time the post office opens?</span> <span class=\"gram-trans\">(Você sabe que horas abre o correio?)</span></li><li><span class=\"gram-eng\">Do you know where I can rent a car?</span> <span class=\"gram-trans\">(Você sabe onde posso alugar um carro?)</span></li><li><span class=\"gram-eng\">Can you tell me how much a city tour costs?</span> <span class=\"gram-trans\">(Você pode me dizer quanto custa um city tour?)</span></li><li><span class=\"gram-eng\">Do you know where the nearest Wi-Fi hotspot is?</span> <span class=\"gram-trans\">(Você sabe onde fica o Wi-Fi mais próximo?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>A armadilha é a ordem: NÃO se inverte o verbo. É &quot;where the ATM is&quot; (não &quot;where is the ATM&quot;).</li><li>O do/does desaparece: &quot;what time it opens&quot; (não &quot;what time does it open&quot;).</li></ul></div></div>"},
{"order": 17, "badge": "17", "topic": "Evaluations and Comparisons", "book": "Interchange 2", "ref": "Interchange 2 - pg. 17 (Unit 3)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para avaliar (suficiente, demais) e comparar coisas semelhantes usamos enough, too e a estrutura as ... as. Funcionam com adjetivos e com substantivos.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Avaliação com adjetivo</h5><p>(not) + adjetivo + enough / too + adjetivo<br>&quot;isn't big enough / too hot.&quot;</p><h5 class=\"gram-subhead\">Avaliação com substantivo</h5><p>(not) enough / too much/many + substantivo<br>&quot;There aren't enough windows.&quot;</p><h5 class=\"gram-subhead\">Comparação de igualdade</h5><p>as + adjetivo/many/much + as<br>&quot;just as convenient as the old one.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Our apartment isn't big enough for our family.</span> <span class=\"gram-trans\">(Nosso apartamento não é grande o suficiente para a família.)</span></li><li><span class=\"gram-eng\">This apartment is too hot.</span> <span class=\"gram-trans\">(Este apartamento é quente demais.)</span></li><li><span class=\"gram-eng\">The location is just as convenient as the old one.</span> <span class=\"gram-trans\">(A localização é tão conveniente quanto a antiga.)</span></li><li><span class=\"gram-eng\">We don't have as many bedrooms as we used to.</span> <span class=\"gram-trans\">(Não temos tantos quartos quanto tínhamos.)</span></li><li><span class=\"gram-eng\">The neighbors make too much noise.</span> <span class=\"gram-trans\">(Os vizinhos fazem barulho demais.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;enough&quot; vem DEPOIS do adjetivo (&quot;big enough&quot;) mas ANTES do substantivo (&quot;enough windows&quot;).</li><li>Use &quot;as many ... as&quot; para contáveis e &quot;as much ... as&quot; para incontáveis.</li></ul></div></div>"},
{"order": 20, "badge": "20", "topic": "Wish", "book": "Interchange 2", "ref": "Interchange 2 - pg. 20 (Unit 3)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>&quot;Wish + passado&quot; expressa desejos sobre o presente — coisas que gostaríamos que fossem diferentes agora. O verbo vai para o passado mesmo falando do presente.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Forma geral</h5><p>wish + sujeito + passado simples<br>&quot;I wish I had my own apartment.&quot;</p><h5 class=\"gram-subhead\">Com o verbo be</h5><p>usa-se &quot;were&quot; para todos os pronomes<br>&quot;I wish it were easier.&quot;</p><h5 class=\"gram-subhead\">can → could / won't → would</h5><p>I wish I could... / I wish they would...<br>&quot;I wish I could move out.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I wish I didn't live with my parents.</span> <span class=\"gram-trans\">(Eu queria não morar com meus pais.)</span></li><li><span class=\"gram-eng\">I wish I had my own apartment.</span> <span class=\"gram-trans\">(Eu queria ter meu próprio apartamento.)</span></li><li><span class=\"gram-eng\">I wish it weren't so difficult.</span> <span class=\"gram-trans\">(Eu queria que não fosse tão difícil.)</span></li><li><span class=\"gram-eng\">I wish I could move out.</span> <span class=\"gram-trans\">(Eu queria poder me mudar.)</span></li><li><span class=\"gram-eng\">I wish they would stop worrying about me.</span> <span class=\"gram-trans\">(Eu queria que parassem de se preocupar comigo.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Mesmo falando do presente, o verbo após &quot;wish&quot; fica no PASSADO.</li><li>Com o verbo be, o formal correto é &quot;were&quot; para todos: &quot;I wish I were rich&quot;.</li></ul></div></div>"},
{"order": 23, "badge": "23", "topic": "Simple Past vs. Present Perfect", "book": "Interchange 2", "ref": "Interchange 2 - pg. 23 (Unit 4)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Use o passado simples para experiências num momento definido do passado. Use o present perfect para experiências dentro de um período até o presente (sem dizer quando).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Present perfect (indefinido)</h5><p>Have you ever + particípio?<br>&quot;Have you ever eaten frog legs?&quot;</p><h5 class=\"gram-subhead\">Simple past (momento definido)</h5><p>verbo no passado + last night, last month...<br>&quot;I tried them last month.&quot;</p><h5 class=\"gram-subhead\">Resposta misturando os dois</h5><p>Yes, I have. / No, I haven't. + passado<br>&quot;No, I haven't. But I ate at a Thai restaurant last night.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Have you ever eaten frog legs? — Yes, I have.</span> <span class=\"gram-trans\">(Você já comeu coxa de rã? — Já.)</span></li><li><span class=\"gram-eng\">I tried them last month.</span> <span class=\"gram-trans\">(Eu experimentei mês passado.)</span></li><li><span class=\"gram-eng\">Have you ever been to a Vietnamese restaurant? — No, I haven't.</span> <span class=\"gram-trans\">(Você já foi a um restaurante vietnamita? — Não.)</span></li><li><span class=\"gram-eng\">Did you go alone? — No, I went with some friends.</span> <span class=\"gram-trans\">(Você foi sozinho? — Não, fui com amigos.)</span></li><li><span class=\"gram-eng\">I ate a huge breakfast.</span> <span class=\"gram-trans\">(Eu tomei um café da manhã enorme.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Pergunta geral de experiência = present perfect (&quot;Have you ever...?&quot;).</li><li>Assim que aparece QUANDO (last night), troque para o passado simples (&quot;I ate...&quot;).</li></ul></div></div>"},
