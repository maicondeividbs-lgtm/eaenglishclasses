</div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use FROM com different: ❌ &quot;different than&quot; (informal) / ✔️ &quot;different from&quot;.</li><li>&quot;Like&quot; também serve para similaridade: &quot;He looks like his father&quot;.</li></ul></div></div>"},
{order:17,badge:"17",topic:"Requests with Modals, If Clauses and Gerunds",book:"Green book",ref:"Green book - pg. 17 (Unit 3 - Lend a hand.)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Três formas educadas de fazer pedidos: modais (Could/Would you...), cláusulas if (If you could...), e gerúndios (Would you mind -ing).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><p>Could/Would you + verbo? | If you could + verbo... | Would you mind + verbo-ING?</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Could you close the window, please?</span> <span class=\"gram-trans\">(Você poderia fechar a janela?)</span></li><li><span class=\"gram-eng\">Would you mind helping me with this?</span> <span class=\"gram-trans\">(Você se importaria de me ajudar?)</span></li><li><span class=\"gram-eng\">If you could call back later, that would be great.</span> <span class=\"gram-trans\">(Se pudesse ligar depois, seria ótimo.)</span></li><li><span class=\"gram-eng\">Would you mind not smoking here?</span> <span class=\"gram-trans\">(Você se importaria de não fumar aqui?)</span></li><li><span class=\"gram-eng\">Could you possibly explain that again?</span> <span class=\"gram-trans\">(Você poderia explicar de novo?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><p>Após 'Would you mind', SEMPRE use -ING. Responder 'No' a 'Would you mind...?' significa SIM, eu faço (não me importo).</p></div></div>"},
{order:20,badge:"20",topic:"Indirect Requests",book:"Green book",ref:"Green book - pg. 20",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As INDIRECT REQUESTS (pedidos indiretos) são uma forma EDUCADA de<br>pedir algo, usando introduções e mudando a estrutura da pergunta.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>Could you tell me + WH-word/IF + sujeito + verbo?<br>Do you know + WH-word/IF + sujeito + verbo?</p><h5 class=\"gram-subhead\">Importante: SEM auxiliar DO/DOES/DID depois da introdução.</h5></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Direct:   Where does Maria live?</li></ul><p>Indirect: Could you tell me where Maria lives?</p><ul class=\"gram-bullets\"><li>Direct:   What time is the meeting?</li></ul><p>Indirect: Do you know what time the meeting is?</p><ul class=\"gram-bullets\"><li>Direct:   Did he call?</li></ul><p>Indirect: Can you tell me if he called?</p><ul class=\"gram-bullets\"><li>Direct:   How much does this cost?</li></ul><p>Indirect: Could you tell me how much this costs?</p></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Mais educado que perguntas diretas — ótimo em situações formais.</li><li>Ordem volta para AFIRMATIVA: ❌ &quot;where does Maria live&quot; → ✔️ &quot;where Maria lives&quot;.</li></ul></div></div>"},
{order:25,badge:"25",topic:"Past Perfect",book:"Green book",ref:"Green book - pg. 25",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O PAST PERFECT é o &quot;passado do passado&quot;. Indica uma ação que aconteceu<br>ANTES de outra ação no passado.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>SUJEITO + HAD + past participle</p><h5 class=\"gram-subhead\">USO TÍPICO</h5><p>Conta dois eventos passados — o mais antigo fica no Past Perfect,<br>o mais recente fica no Simple Past.</p><p>&quot;When I arrived, she HAD already LEFT.&quot;<br>(Past Simple)         (Past Perfect — antes)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">When I got home, my family had already eaten.</span> <span class=\"gram-trans\">(Quando cheguei, minha família já tinha comido.)</span></li><li><span class=\"gram-eng\">She had finished her work before lunch.</span> <span class=\"gram-trans\">(Ela tinha terminado o trabalho antes do almoço.)</span></li><li><span class=\"gram-eng\">I had never seen snow until last winter.</span> <span class=\"gram-trans\">(Eu nunca tinha visto neve até o último inverno.)</span></li><li><span class=\"gram-eng\">They had left when we arrived.</span> <span class=\"gram-trans\">(Eles já tinham saído quando chegamos.)</span></li><li><span class=\"gram-eng\">He told me he had visited Paris before.</span> <span class=\"gram-trans\">(Ele me disse que já tinha visitado Paris.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Marcadores comuns: already, just, never, before, by the time.</li><li>Past Perfect SEMPRE acompanha outro evento no passado para fazer sentido.</li></ul></div></div>"},
{order:33,badge:"33",topic:"Expectations - Supposed to / expected to",book:"Green book",ref:"Green book - pg. 33 (Unit 5 - Expanding your horizons)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Expressões como BE SUPPOSED TO, BE EXPECTED TO e HAVE TO expressam expectativas sociais, regras culturais e obrigações esperadas em determinada situação.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><p>Sujeito + BE SUPPOSED TO + verbo | Sujeito + BE EXPECTED TO + verbo</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">You're supposed to take off your shoes before entering.</span> <span class=\"gram-trans\">(Você deve tirar os sapatos.)</span></li><li><span class=\"gram-eng\">Guests are expected to bring a gift.</span> <span class=\"gram-trans\">(Convidados devem trazer um presente.)</span></li><li><span class=\"gram-eng\">Children aren't supposed to drink coffee.</span> <span class=\"gram-trans\">(Crianças não devem tomar café.)</span></li><li><span class=\"gram-eng\">Are we supposed to tip the waiter here?</span> <span class=\"gram-trans\">(Devemos dar gorjeta aqui?)</span></li><li><span class=\"gram-eng\">You're expected to dress formally for the event.</span> <span class=\"gram-trans\">(Espera-se que você se vista formalmente.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><p>BE SUPPOSED TO = expectativa social/regra cultural. NOT SUPPOSED TO = socialmente proibido (mais leve que MUST NOT).</p></div></div>"},
{order:39,badge:"39",topic:"Describing Problems",book:"Green book",ref:"Green book - pg. 39",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para descrever problemas mecânicos, elétricos ou em objetos, usamos<br>estruturas específicas com particípios passados e adjetivos como BROKEN,<br>DAMAGED, NOT WORKING.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ESTRUTURAS COMUNS</h5><ul class=\"gram-bullets\"><li>The X is broken / damaged / cracked / leaking.</li><li>The X doesn't work / isn't working.</li><li>There is something wrong with the X.</li><li>The X needs to be repaired / replaced / fixed.</li></ul><h5 class=\"gram-subhead\">PARTICÍPIOS COMO ADJETIVOS</h5><p>broken, cracked, scratched, stained, torn</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The window is broken.</span> <span class=\"gram-trans\">(A janela está quebrada.)</span></li><li><span class=\"gram-eng\">My phone isn't working.</span> <span class=\"gram-trans\">(Meu celular não está funcionando.)</span></li><li><span class=\"gram-eng\">There's something wrong with the fridge.</span> <span class=\"gram-trans\">(Há algo errado com a geladeira.)</span></li><li><span class=\"gram-eng\">The chair is damaged.</span> <span class=\"gram-trans\">(A cadeira está danificada.)</span></li><li><span class=\"gram-eng\">The pipe is leaking water.</span> <span class=\"gram-trans\">(O cano está vazando água.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Verbo + ING para problema ATIVO (leaking, dripping).</li><li>Particípio passado para ESTADO (broken, damaged).</li></ul></div></div>"},
{order:45,badge:"45",topic:"Passive Com Continuous & Perfect",book:"Green book",ref:"Green book - pg. 45",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>A voz passiva pode ser usada em outros tempos verbais. Aqui estudamos<br>a passiva em PRESENT CONTINUOUS (sendo feito agora) e PRESENT PERFECT<br>(já foi feito).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PRESENT CONTINUOUS PASSIVE</h5><p>SUJEITO + IS/ARE + BEING + past participle</p><h5 class=\"gram-subhead\">PRESENT PERFECT PASSIVE</h5><p>SUJEITO + HAS/HAVE + BEEN + past participle</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The street is being repaired right now.</span> <span class=\"gram-trans\">(A rua está sendo consertada agora.)</span></li><li><span class=\"gram-eng\">New houses are being built downtown.</span> <span class=\"gram-trans\">(Novas casas estão sendo construídas.)</span></li><li><span class=\"gram-eng\">The project has been finished.</span> <span class=\"gram-trans\">(O projeto foi finalizado.)</span></li><li><span class=\"gram-eng\">Three movies have been made about him.</span> <span class=\"gram-trans\">(Três filmes foram feitos sobre ele.)</span></li><li><span class=\"gram-eng\">The car is being washed.</span> <span class=\"gram-trans\">(O carro está sendo lavado.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Continuous passiva = ação em PROGRESSO: &quot;is being done&quot;.</li><li>Perfect passiva = ação CONCLUÍDA com efeito atual: &quot;has been done&quot;.</li></ul></div></div>"},
{order:47,badge:"47",topic:"Infinitives",book:"Green book",ref:"Green book - pg. 47",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O INFINITIVE (to + verbo) tem muitos usos: explicar um propósito,<br>seguir certos verbos e adjetivos, e expressar opiniões.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PROPÓSITO (&quot;para&quot;)</h5><p>&quot;I came here TO STUDY.&quot;</p><h5 class=\"gram-subhead\">DEPOIS DE CERTOS VERBOS</h5><p>want, need, plan, decide, hope, would like + TO + verbo</p><h5 class=\"gram-subhead\">DEPOIS DE ADJETIVOS</h5><p>&quot;It's important to be on time.&quot;<br>&quot;I'm happy to help.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I want to learn Japanese.</span> <span class=\"gram-trans\">(Quero aprender japonês.)</span></li><li><span class=\"gram-eng\">She came here to find a job.</span> <span class=\"gram-trans\">(Ela veio aqui para encontrar emprego.)</span></li><li><span class=\"gram-eng\">It's nice to meet you.</span> <span class=\"gram-trans\">(É bom te conhecer.)</span></li><li><span class=\"gram-eng\">They decided to move abroad.</span> <span class=\"gram-trans\">(Eles decidiram se mudar para fora.)</span></li><li><span class=\"gram-eng\">It's important to exercise daily.</span> <span class=\"gram-trans\">(É importante se exercitar todos os dias.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Sempre &quot;TO + verbo na forma original&quot;: ❌ &quot;to studying&quot; / ✔️ &quot;to study&quot;.</li><li>Usado para expressar PROPÓSITO: &quot;I'm calling TO ask a question&quot;.</li></ul></div></div>"},
{order:51,badge:"51",topic:"Would Rather & Would Prefer",book:"Green book",ref:"Green book - pg. 51",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>WOULD RATHER e WOULD PREFER expressam PREFERÊNCIAS. A diferença<br>está apenas na estrutura: rather pede verbo original; prefer pede TO + verbo<br>ou substantivo.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">WOULD RATHER + verbo (forma original)</h5><p>&quot;I'd rather stay home.&quot;</p><h5 class=\"gram-subhead\">WOULD PREFER + TO + verbo / + substantivo</h5><p>&quot;I'd prefer to stay home.&quot;<br>&quot;I'd prefer tea.&quot;</p><h5 class=\"gram-subhead\">COMPARANDO</h5><p>would rather X THAN Y<br>would prefer X TO Y</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I'd rather watch a movie than read a book.</span> <span class=\"gram-trans\">(Prefiro ver um filme a ler um livro.)</span></li><li><span class=\"gram-eng\">She'd prefer to eat at home tonight.</span> <span class=\"gram-trans\">(Ela preferiria comer em casa hoje.)</span></li><li><span class=\"gram-eng\">Would you rather have tea or coffee?</span> <span class=\"gram-trans\">(Você prefere chá ou café?)</span></li><li><span class=\"gram-eng\">I'd prefer coffee to tea.</span> <span class=\"gram-trans\">(Prefiro café a chá.)</span></li><li><span class=\"gram-eng\">We'd rather not go out tonight.</span> <span class=\"gram-trans\">(Preferimos não sair hoje.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>WOULD RATHER NOT (não preferiria) — sem o &quot;to&quot;: &quot;I'd rather not say&quot;.</li><li>Contrações: I'd, you'd, she'd... — comuns no inglês falado.</li></ul></div></div>"},
{order:53,badge:"53",topic:"By + Gerund (Métodos e Meios)",book:"Green book",ref:"Green book - pg. 53 (Unit 8 - Never stop learning.)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>BY + verbo-ING explica O MÉTODO ou MEIO usado para conseguir algo. Responde à pergunta 'COMO?'.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><p>Sujeito + verbo + BY + verbo-ING + complemento</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">You can improve your English by reading every day.</span> <span class=\"gram-trans\">(...lendo todos os dias.)</span></li><li><span class=\"gram-eng\">She lost weight by exercising regularly.</span> <span class=\"gram-trans\">(...se exercitando regularmente.)</span></li><li><span class=\"gram-eng\">We saved money by cooking at home.</span> <span class=\"gram-trans\">(...cozinhando em casa.)</span></li><li><span class=\"gram-eng\">He learned to play guitar by watching videos.</span> <span class=\"gram-trans\">(...assistindo vídeos.)</span></li><li><span class=\"gram-eng\">You succeed by working hard and never giving up.</span> <span class=\"gram-trans\">(...trabalhando duro.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><p>Após BY (método/meio), SEMPRE use verbo + ING. Diferente de WITH (instrumento físico): 'cut it with a knife'.</p></div></div>"},
{order:59,badge:"59",topic:"Get or Have Something Done",book:"Green book",ref:"Green book - pg. 59",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Esta estrutura indica que ALGUÉM faz algo POR VOCÊ — você não faz<br>pessoalmente, mas paga ou pede a um profissional.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>SUJEITO + HAVE/GET + OBJETO + past participle</p><h5 class=\"gram-subhead\">COMPARAÇÃO</h5><p>&quot;I cut my hair.&quot; (eu mesmo cortei)<br>&quot;I had/got my hair cut.&quot; (alguém cortou pra mim)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I had my car washed yesterday.</span> <span class=\"gram-trans\">(Mandei lavar o carro ontem.)</span></li><li><span class=\"gram-eng\">She gets her nails done every week.</span> <span class=\"gram-trans\">(Ela faz as unhas toda semana.)</span></li><li><span class=\"gram-eng\">They had their house painted last month.</span> <span class=\"gram-trans\">(Pintaram a casa deles mês passado.)</span></li><li><span class=\"gram-eng\">I need to get my phone fixed.</span> <span class=\"gram-trans\">(Preciso mandar consertar o celular.)</span></li><li><span class=\"gram-eng\">He had his hair cut at the new salon.</span> <span class=\"gram-trans\">(Ele cortou o cabelo no salão novo.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>HAVE = mais formal | GET = mais informal — significado igual.</li><li>Atenção à ordem: HAVE/GET + OBJETO + PAST PARTICIPLE.</li></ul></div></div>"},
{order:61,badge:"61",topic:"Making Suggestions",book:"Green book",ref:"Green book - pg. 61",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para SUGERIR algo educadamente, existem várias estruturas. A<br>escolha depende de quão direto/educado se quer ser.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ESTRUTURAS COMUNS</h5><ul class=\"gram-bullets\"><li>Why don't we + verbo?</li><li>How about + verbo-ING?</li><li>What about + verbo-ING?</li><li>Let's + verbo</li><li>We could + verbo</li><li>You should + verbo</li></ul></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Why don't we go to the movies?</span> <span class=\"gram-trans\">(Por que não vamos ao cinema?)</span></li><li><span class=\"gram-eng\">How about ordering pizza?</span> <span class=\"gram-trans\">(Que tal pedir pizza?)</span></li><li><span class=\"gram-eng\">What about taking a walk?</span> <span class=\"gram-trans\">(Que tal dar uma volta?)</span></li><li><span class=\"gram-eng\">Let's try that new restaurant.</span> <span class=\"gram-trans\">(Vamos experimentar aquele restaurante.)</span></li><li><span class=\"gram-eng\">You could call her tonight.</span> <span class=\"gram-trans\">(Você poderia ligar para ela hoje.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Após HOW ABOUT / WHAT ABOUT, sempre verbo + ING.</li><li>Após WHY DON'T WE / LET'S / COULD, verbo na forma original.</li></ul></div></div>"},
{order:65,badge:"65",topic:"Referring to Time in the Past",book:"Green book",ref:"Green book - pg. 65",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para falar de tempo no passado, usamos várias expressões: AGO, IN<br>(período), DURING, FOR, FROM...TO, BY. Cada uma tem um uso específico.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">PRINCIPAIS EXPRESSÕES</h5><p>AGO        → tempo atrás (two years ago)<br>IN         → década/século (in the 90s)<br>DURING    → durante um período<br>FOR        → duração (for two hours)<br>FROM...TO  → intervalo (from 2010 to 2015)<br>BY         → não mais tarde que (by 2020)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I moved here two years ago.</span> <span class=\"gram-trans\">(Mudei para cá há dois anos.)</span></li><li><span class=\"gram-eng\">My grandparents were born in the 1950s.</span> <span class=\"gram-trans\">(Meus avós nasceram nos anos 50.)</span></li><li><span class=\"gram-eng\">I lived in London during the summer.</span> <span class=\"gram-trans\">(Morei em Londres durante o verão.)</span></li><li><span class=\"gram-eng\">She studied medicine for six years.</span> <span class=\"gram-trans\">(Ela estudou medicina por seis anos.)</span></li><li><span class=\"gram-eng\">They lived there from 2010 to 2015.</span> <span class=\"gram-trans\">(Moraram lá de 2010 a 2015.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>AGO vai depois do tempo: &quot;two years AGO&quot; (não &quot;ago two years&quot;).</li><li>FOR mostra DURAÇÃO (&quot;for 3 hours&quot;) | DURING mostra EVENTO (&quot;during the war&quot;).</li></ul></div></div>"},
{order:67,badge:"67",topic:"Future Continuous",book:"Green book",ref:"Green book - pg. 67 (Unit 10 - A matter of time)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O Future Continuous indica uma ação que estará EM PROGRESSO em um momento específico no futuro. Enfatiza a duração da ação naquele momento.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><p>Sujeito + WILL BE + verbo-ING</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">This time tomorrow, I'll be flying to Paris.</span> <span class=\"gram-trans\">(A esta hora amanhã, estarei voando para Paris.)</span></li><li><span class=\"gram-eng\">She'll be working at 8 p.m. tonight.</span> <span class=\"gram-trans\">(Ela estará trabalhando às 20h.)</span></li><li><span class=\"gram-eng\">Will you be using the car tonight?</span> <span class=\"gram-trans\">(Você vai estar usando o carro hoje à noite?)</span></li><li><span class=\"gram-eng\">Don't call at 7 — we'll be having dinner.</span> <span class=\"gram-trans\">(Não ligue às 7 — estaremos jantando.)</span></li><li><span class=\"gram-eng\">In a year, I'll be studying abroad.</span> <span class=\"gram-trans\">(Em um ano, estarei estudando fora.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><p>Diferença do WILL simples: WILL = ação pontual no futuro. WILL BE + ING = ação EM ANDAMENTO no futuro.</p></div></div>"},
{order:67,badge:"67",topic:"Predictions with Will",book:"Green book",ref:"Green book - pg. 67",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos WILL para fazer PREVISÕES sobre o futuro — afirmações sobre o<br>que acreditamos que vai acontecer, geralmente com base em opinião.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>SUJEITO + WILL + VERBO (forma original)<br>SUJEITO + WON'T + VERBO</p><h5 class=\"gram-subhead\">ADVÉRBIOS COMUNS</h5><p>probably, definitely, certainly, maybe<br>&quot;She will probably win.&quot;<br>&quot;They probably won't come.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">In 50 years, cars will fly.</span> <span class=\"gram-trans\">(Em 50 anos, carros voarão.)</span></li><li><span class=\"gram-eng\">I think she'll be a great doctor.</span> <span class=\"gram-trans\">(Acho que ela será uma ótima médica.)</span></li><li><span class=\"gram-eng\">People probably won't use cash in the future.</span> <span class=\"gram-trans\">(As pessoas provavelmente não usarão dinheiro.)</span></li><li><span class=\"gram-eng\">Will robots replace teachers?</span> <span class=\"gram-trans\">(Robôs substituirão professores?)</span></li><li><span class=\"gram-eng\">Technology will definitely improve our lives.</span> <span class=\"gram-trans\">(A tecnologia definitivamente melhorará nossas vidas.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;Will probably&quot; (afirmativa) | &quot;Probably won't&quot; (negativa) — atenção à ordem.</li><li>A contração 'll é muito usada: I'll, she'll, they'll.</li></ul></div></div>"},
{order:73,badge:"73",topic:"Time Clauses (Past Perfect)",book:"Green book",ref:"Green book - pg. 73",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As time clauses no passado usam o PAST PERFECT (HAD + past participle)<br>para mostrar QUAL ação aconteceu PRIMEIRO entre duas ações passadas.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>AFTER + Past Perfect, Past Simple<br>BEFORE + Past Simple, Past Perfect<br>BY THE TIME + Past Simple, Past Perfect</p><h5 class=\"gram-subhead\">A ação no Past Perfect (HAD + p.p.) é a MAIS ANTIGA.</h5></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">After I had finished my homework, I went out.</span> <span class=\"gram-trans\">(Depois que terminei o dever, saí.)</span></li><li><span class=\"gram-eng\">By the time we arrived, the movie had started.</span> <span class=\"gram-trans\">(Quando chegamos, o filme já tinha começado.)</span></li><li><span class=\"gram-eng\">Before she came, I had cleaned the house.</span> <span class=\"gram-trans\">(Antes dela vir, eu tinha limpado a casa.)</span></li><li><span class=\"gram-eng\">They had eaten by the time we got there.</span> <span class=\"gram-trans\">(Eles já tinham comido quando chegamos.)</span></li><li><span class=\"gram-eng\">After he had left, I realized my mistake.</span> <span class=\"gram-trans\">(Depois que ele saiu, percebi meu erro.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>PAST PERFECT (HAD + p.p.) = ação ANTERIOR | PAST SIMPLE = ação POSTERIOR.</li><li>Frases comuns: &quot;by the time&quot;, &quot;after&quot;, &quot;before&quot;.</li></ul></div></div>"},
{order:75,badge:"75",topic:"Modal Verbs with the Past Tense",book:"Green book",ref:"Green book - pg. 75",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para falar sobre o passado com modais, usamos a estrutura<br>MODAL + HAVE + past participle. Cada modal traz um significado diferente.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ESTRUTURAS</h5><p>COULD HAVE + p.p. → era possível (mas não aconteceu)<br>MAY/MIGHT HAVE + p.p. → talvez tenha acontecido<br>MUST HAVE + p.p. → certamente aconteceu (dedução)<br>SHOULD HAVE + p.p. → era recomendável (mas não fez)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I could have called you, but I forgot.</span> <span class=\"gram-trans\">(Eu poderia ter te ligado, mas esqueci.)</span></li><li><span class=\"gram-eng\">She might have left already.</span> <span class=\"gram-trans\">(Ela talvez já tenha saído.)</span></li><li><span class=\"gram-eng\">You must have been tired after the trip.</span> <span class=\"gram-trans\">(Você deve ter ficado cansado depois da viagem.)</span></li><li><span class=\"gram-eng\">He should have studied more for the test.</span> <span class=\"gram-trans\">(Ele devia ter estudado mais para a prova.)</span></li><li><span class=\"gram-eng\">They may have missed the bus.</span> <span class=\"gram-trans\">(Eles podem ter perdido o ônibus.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Sempre: MODAL + HAVE + past participle (3ª coluna).</li><li>MUST HAVE = alta certeza | MIGHT HAVE = possibilidade pequena.</li></ul></div></div>"},
{order:79,badge:"79",topic:"Infinitive Clauses - Purpose (to + verbo)",book:"Green book",ref:"Green book - pg. 79 (Unit 12 - Keys to success)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>INFINITIVE CLAUSES (TO + verbo) expressam PROPÓSITO ou OBJETIVO de<br>uma ação. Respondem à pergunta &quot;para quê?&quot;. Também podem ser<br>expandidas com IN ORDER TO ou SO AS TO em contextos mais formais.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">TO + VERBO (propósito)</h5><p>&quot;I went there TO study English.&quot; (Fui lá para estudar inglês.)</p><h5 class=\"gram-subhead\">FORMAS MAIS FORMAIS</h5><p>IN ORDER TO + verbo / SO AS TO + verbo<br>&quot;She works hard IN ORDER TO support her family.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I went there to study English.</span> <span class=\"gram-trans\">(Fui lá para estudar inglês.)</span></li><li><span class=\"gram-eng\">She works hard to support her family.</span> <span class=\"gram-trans\">(Ela trabalha duro para sustentar a família.)</span></li><li><span class=\"gram-eng\">He saves money to travel abroad.</span> <span class=\"gram-trans\">(Ele economiza para viajar.)</span></li><li><span class=\"gram-eng\">We exercise to stay healthy.</span> <span class=\"gram-trans\">(Nos exercitamos para ficar saudáveis.)</span></li><li><span class=\"gram-eng\">I'm calling to make an appointment.</span> <span class=\"gram-trans\">(Estou ligando para marcar uma consulta.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>TO + verbo expressa &quot;para&quot; (propósito) — é o uso mais comum no dia a dia.</li><li>IN ORDER TO e SO AS TO são mais formais; comuns em textos escritos.</li></ul></div></div>"},
{order:79,badge:"79",topic:"Infinitives & for (Purpose)",book:"Green book",ref:"Green book - pg. 79",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para indicar o PROPÓSITO ou razão de uma ação, usamos TO + verbo ou<br>FOR + substantivo/-ING. Significa &quot;para&quot; em português.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">TO + verbo (forma original)</h5><p>&quot;I went to the store TO BUY milk.&quot;</p><h5 class=\"gram-subhead\">FOR + substantivo</h5><p>&quot;I went to the store FOR MILK.&quot;</p><h5 class=\"gram-subhead\">FOR + verbo-ING (uso/função)</h5><p>&quot;A pan is used FOR COOKING.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I came here to learn English.</span> <span class=\"gram-trans\">(Vim aqui para aprender inglês.)</span></li><li><span class=\"gram-eng\">She studies hard to pass the exam.</span> <span class=\"gram-trans\">(Ela estuda muito para passar na prova.)</span></li><li><span class=\"gram-eng\">I went out for some fresh air.</span> <span class=\"gram-trans\">(Saí para tomar ar fresco.)</span></li><li><span class=\"gram-eng\">This tool is used for cutting wood.</span> <span class=\"gram-trans\">(Esta ferramenta é usada para cortar madeira.)</span></li><li><span class=\"gram-eng\">He saved money to buy a new car.</span> <span class=\"gram-trans\">(Ele economizou para comprar um carro novo.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>TO + verbo (ação) | FOR + substantivo/-ING (objeto ou função).</li><li>❌ &quot;I came for to learn&quot; / ✔️ &quot;I came to learn&quot;.</li></ul></div></div>"},
{order:81,badge:"81",topic:"Giving Reasons",book:"Green book",ref:"Green book - pg. 81",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para DAR RAZÕES (explicar o porquê), usamos conjunções como BECAUSE,<br>SINCE, AS e DUE TO. A escolha depende do estilo e da estrutura.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">COM ORAÇÃO (sujeito + verbo)</h5><p>BECAUSE / SINCE / AS + sujeito + verbo<br>&quot;I'm tired BECAUSE I didn't sleep.&quot;</p><h5 class=\"gram-subhead\">COM SUBSTANTIVO</h5><p>BECAUSE OF / DUE TO + substantivo<br>&quot;We canceled BECAUSE OF the rain.&quot;</p><h5 class=\"gram-subhead\">FOR + -ING (uso formal)</h5><p>&quot;She was praised for helping.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I stayed home because it was raining.</span> <span class=\"gram-trans\">(Fiquei em casa porque chovia.)</span></li><li><span class=\"gram-eng\">Since she's sick, she's resting.</span> <span class=\"gram-trans\">(Como ela está doente, está descansando.)</span></li><li><span class=\"gram-eng\">The flight was delayed due to the storm.</span> <span class=\"gram-trans\">(O voo atrasou devido à tempestade.)</span></li><li><span class=\"gram-eng\">We left early because of the traffic.</span> <span class=\"gram-trans\">(Saímos cedo por causa do trânsito.)</span></li><li><span class=\"gram-eng\">He's famous for inventing the lightbulb.</span> <span class=\"gram-trans\">(Ele é famoso por inventar a lâmpada.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>BECAUSE + ORAÇÃO (&quot;because it rained&quot;) | BECAUSE OF + SUBSTANTIVO (&quot;because of the rain&quot;).</li><li>DUE TO é mais formal — comum em textos escritos.</li></ul></div></div>"},
{order:81,badge:"81",topic:"Giving Reasons - Because of / due to / thanks to",book:"Green book",ref:"Green book - pg. 81 (Unit 12 - Keys to success)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para expressar CAUSA usamos diferentes estruturas. BECAUSE OF, DUE TO<br>e THANKS TO são seguidos por SUBSTANTIVO. BECAUSE e SINCE são seguidos<br>por uma ORAÇÃO (sujeito + verbo).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">+ SUBSTANTIVO</h5><p>BECAUSE OF / DUE TO / THANKS TO / FOR / THE REASON FOR<br>&quot;The flight was canceled because of the storm.&quot;</p><h5 class=\"gram-subhead\">+ ORAÇÃO (sujeito + verbo)</h5><p>BECAUSE / SINCE<br>&quot;The flight was canceled because there was a storm.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The flight was canceled because of the storm.</span> <span class=\"gram-trans\">(Voo cancelado por causa da tempestade.)</span></li><li><span class=\"gram-eng\">Thanks to her help, I finished on time.</span> <span class=\"gram-trans\">(Graças à sua ajuda, terminei no prazo.)</span></li><li><span class=\"gram-eng\">Due to the traffic, we arrived late.</span> <span class=\"gram-trans\">(Devido ao trânsito, chegamos atrasados.)</span></li><li><span class=\"gram-eng\">Since it was raining, we stayed home.</span> <span class=\"gram-trans\">(Como estava chovendo, ficamos em casa.)</span></li><li><span class=\"gram-eng\">He's tired because he worked all night.</span> <span class=\"gram-trans\">(Ele está cansado porque trabalhou a noite toda.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>BECAUSE OF + SUBSTANTIVO.  BECAUSE + ORAÇÃO (sujeito + verbo).</li><li>DUE TO é mais formal que BECAUSE OF — comum em contextos escritos e profissionais.</li></ul></div></div>"},
{order:87,badge:"87",topic:"Past Modals - Certainty & possibility",book:"Green book",ref:"Green book - pg. 87",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para fazer DEDUÇÕES sobre o passado — coisas que provavelmente<br>aconteceram — usamos modais + have + particípio passado.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">ESCALA DE CERTEZA NO PASSADO</h5><p>100%  must have + p.p. (deve ter — alta certeza)<br>50%  may/might have + p.p. (talvez tenha)<br>50%  could have + p.p. (poderia ter)<br>0%  can't / couldn't have + p.p. (não pode ter)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">She must have studied a lot to pass.</span> <span class=\"gram-trans\">(Ela deve ter estudado muito.)</span></li><li><span class=\"gram-eng\">He may have forgotten our meeting.</span> <span class=\"gram-trans\">(Ele pode ter esquecido nossa reunião.)</span></li><li><span class=\"gram-eng\">They might have taken a different route.</span> <span class=\"gram-trans\">(Talvez tenham pegado outra rota.)</span></li><li><span class=\"gram-eng\">You couldn't have seen her — she's abroad.</span> <span class=\"gram-trans\">(Você não pode tê-la visto — está fora.)</span></li><li><span class=\"gram-eng\">I could have been there in 10 minutes.</span> <span class=\"gram-trans\">(Eu poderia ter estado lá em 10 minutos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>MUST HAVE = dedução com certeza | MIGHT/MAY HAVE = possibilidade.</li><li>CAN'T HAVE / COULDN'T HAVE = impossível que tenha acontecido.</li></ul></div></div>"},
{order:89,badge:"89",topic:"Past Modals - Should/could/would have",book:"Green book",ref:"Green book - pg. 89",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Estes past modals expressam JULGAMENTO, ARREPENDIMENTO ou ALTERNATIVAS<br>sobre coisas no passado.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">SIGNIFICADOS</h5><p>SHOULD HAVE + p.p. → devia ter (não fez = arrependimento/crítica)<br>COULD HAVE + p.p. → poderia ter (era possível)<br>WOULD HAVE + p.p. → teria (em condicional)</p><h5 class=\"gram-subhead\">FÓRMULA</h5><p>SUJEITO + MODAL + HAVE + past participle</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I should have studied more.</span> <span class=\"gram-trans\">(Eu devia ter estudado mais.)</span></li><li><span class=\"gram-eng\">You could have called me earlier.</span> <span class=\"gram-trans\">(Você poderia ter me ligado mais cedo.)</span></li><li><span class=\"gram-eng\">She would have come if she'd known.</span> <span class=\"gram-trans\">(Ela teria vindo se soubesse.)</span></li><li><span class=\"gram-eng\">We shouldn't have eaten so much.</span> <span class=\"gram-trans\">(Não devíamos ter comido tanto.)</span></li><li><span class=\"gram-eng\">He could have done better.</span> <span class=\"gram-trans\">(Ele poderia ter feito melhor.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Todas as estruturas indicam algo que NÃO aconteceu na realidade.</li><li>Pronúncia comum: &quot;should've&quot;, &quot;could've&quot;, &quot;would've&quot; — soam como &quot;shoulda&quot;.</li></ul></div></div>"},
{order:96,badge:"96",topic:"Defining and Non-Defining Relative Clauses",book:"Green book",ref:"Green book - pg. 96 (Unit 14 - Creative careers)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>DEFINING clauses dão informação ESSENCIAL (sem vírgulas) — identificam de qual pessoa/coisa falamos. NON-DEFINING clauses dão informação EXTRA (com vírgulas) — podem ser removidas sem prejudicar o sentido.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><p>Defining: substantivo + WHO/WHICH/THAT + ... (sem vírgula) | Non-defining: substantivo, WHO/WHICH (não THAT), ... ,</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The book that I bought is great.</span> <span class=\"gram-trans\">(defining — essencial)</span></li><li><span class=\"gram-eng\">My brother, who lives in London, is a doctor.</span> <span class=\"gram-trans\">(non-defining — informação extra)</span></li><li><span class=\"gram-eng\">Paris, which is the capital of France, is beautiful.</span> <span class=\"gram-trans\">(non-defining)</span></li><li><span class=\"gram-eng\">The man who called you is my uncle.</span> <span class=\"gram-trans\">(defining)</span></li><li><span class=\"gram-eng\">Shakespeare, who wrote Hamlet, lived in the 16th century.</span> <span class=\"gram-trans\">(non-defining)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><p>Non-defining NÃO usa THAT — apenas WHO/WHICH. Sempre entre vírgulas. Se você pode remover a oração sem perder o sentido, ela é non-defining.</p></div></div>"},
{order:101,badge:"101",topic:"Modal + Be + Past Participle",book:"Green book",ref:"Green book - pg. 101",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>A estrutura MODAL + BE + past participle é a PASSIVA com modais.<br>Indica que algo PODE/DEVE/PRECISA ser feito, mas sem mencionar quem<br>faz.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>SUJEITO + MODAL + BE + past participle</p><h5 class=\"gram-subhead\">MODAIS COMUNS</h5><p>should be done | must be done | can be done<br>may be done | might be done | needs to be done</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">This report must be finished by Friday.</span> <span class=\"gram-trans\">(Este relatório deve ser finalizado até sexta.)</span></li><li><span class=\"gram-eng\">The problem can be solved easily.</span> <span class=\"gram-trans\">(O problema pode ser resolvido facilmente.)</span></li><li><span class=\"gram-eng\">Phones should be turned off in class.</span> <span class=\"gram-trans\">(Celulares devem ser desligados na aula.)</span></li><li><span class=\"gram-eng\">The car needs to be repaired.</span> <span class=\"gram-trans\">(O carro precisa ser consertado.)</span></li><li><span class=\"gram-eng\">Recycling should be encouraged.</span> <span class=\"gram-trans\">(A reciclagem deve ser incentivada.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Foco está no OBJETO da ação, não em quem faz.</li><li>Comum em regras, manuais e instruções: &quot;Form must be signed&quot;.</li></ul></div></div>"},
{order:103,badge:"103",topic:"Tag Questions",book:"Green book",ref:"Green book - pg. 103 e 108",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>As TAG QUESTIONS são pequenas perguntas no FIM da frase. Servem para<br>confirmar uma informação ou pedir concordância. Equivalem a &quot;não é?&quot;,<br>&quot;né?&quot; em português.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">REGRA-CHAVE</h5><p>Afirmação +  pergunta NEGATIVA<br>Negação   +  pergunta AFIRMATIVA</p><h5 class=\"gram-subhead\">FÓRMULA</h5><p>Frase, + verbo auxiliar (oposto) + pronome?</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">You're a teacher, aren't you?</span> <span class=\"gram-trans\">(Você é professor, não é?)</span></li><li><span class=\"gram-eng\">She doesn't like fish, does she?</span> <span class=\"gram-trans\">(Ela não gosta de peixe, gosta?)</span></li><li><span class=\"gram-eng\">They went home, didn't they?</span> <span class=\"gram-trans\">(Eles foram para casa, não foram?)</span></li><li><span class=\"gram-eng\">You can swim, can't you?</span> <span class=\"gram-trans\">(Você sabe nadar, não sabe?)</span></li><li><span class=\"gram-eng\">It's hot today, isn't it?</span> <span class=\"gram-trans\">(Está calor hoje, não está?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use o MESMO AUXILIAR da frase principal: is → isn't, can → can't, do → don't.</li><li>&quot;I am&quot; tem tag especial: &quot;I'm late, aren't I?&quot; (não &quot;amn't I&quot;).</li></ul></div></div>"},
{order:107,badge:"107",topic:"Accomplishments (Past vs Present Perfect)",book:"Green book",ref:"Green book - pg. 107",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Ao falar sobre realizações, usamos SIMPLE PAST se a ação tem tempo<br>ESPECÍFICO; usamos PRESENT PERFECT se o tempo é INDEFINIDO ou os efeitos<br>continuam no presente.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">SIMPLE PAST (tempo específico)</h5><p>&quot;I traveled to Japan IN 2020.&quot;</p><h5 class=\"gram-subhead\">PRESENT PERFECT (tempo indefinido)</h5><p>&quot;I have traveled to Japan.&quot; (sem tempo)<br>&quot;I have already finished my work.&quot;</p><h5 class=\"gram-subhead\">MARCADORES</h5><p>Past: yesterday, last year, in 2020, ago<br>Perfect: ever, never, already, yet, just</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I graduated from college last year.</span> <span class=\"gram-trans\">(Past — tempo específico)</span></li><li><span class=\"gram-eng\">I've graduated from college.</span> <span class=\"gram-trans\">(Perfect — sem tempo)</span></li><li><span class=\"gram-eng\">She has run three marathons.</span> <span class=\"gram-trans\">(Perfect — experiência)</span></li><li><span class=\"gram-eng\">They visited Brazil in 2018.</span> <span class=\"gram-trans\">(Past — tempo específico)</span></li><li><span class=\"gram-eng\">Have you ever climbed a mountain?</span> <span class=\"gram-trans\">(Perfect — experiência geral)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Tempo específico (last week, in 2020) → SIMPLE PAST.</li><li>Sem tempo específico ou experiência geral → PRESENT PERFECT.</li></ul></div></div>"},
{order:109,badge:"109",topic:"Future Perfect",book:"Green book",ref:"Green book - pg. 109",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O FUTURE PERFECT indica uma ação que ESTARÁ COMPLETA em um momento<br>específico no futuro. Responde: &quot;até quando algo terá terminado?&quot;.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">FÓRMULA</h5><p>SUJEITO + WILL HAVE + past participle</p><h5 class=\"gram-subhead\">MARCADORES COMUNS</h5><p>BY + tempo (by Friday, by 2030)<br>BY THE TIME + frase<br>IN + período + (from now)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">By 2030, technology will have changed a lot.</span> <span class=\"gram-trans\">(Até 2030, a tecnologia terá mudado muito.)</span></li><li><span class=\"gram-eng\">I will have finished college by next year.</span> <span class=\"gram-trans\">(Vou ter terminado a faculdade até ano que vem.)</span></li><li><span class=\"gram-eng\">By the time you arrive, we'll have eaten.</span> <span class=\"gram-trans\">(Quando você chegar, já teremos comido.)</span></li><li><span class=\"gram-eng\">She will have saved enough money in 6 months.</span> <span class=\"gram-trans\">(Ela terá juntado dinheiro em 6 meses.)</span></li><li><span class=\"gram-eng\">Will you have completed the project by Friday?</span> <span class=\"gram-trans\">(Você terá completado o projeto até sexta?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Sempre WILL + HAVE + past participle — três partes obrigatórias.</li><li>Marcador típico: &quot;BY + tempo&quot; (by 2030, by Friday).</li></ul></div></div>"},
{order:109,badge:"109",topic:"Goals with Future Perfect and Would Like to Have + Past Participle",book:"Green book",ref:"Green book - pg. 109 (Unit 16 - Reaching your goals)",html:"<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para falar de OBJETIVOS de vida e conquistas planejadas até um momento no futuro, usamos Future Perfect (WILL HAVE + past participle) e WOULD LIKE TO HAVE + past participle (desejo/meta).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><p>WILL HAVE + past participle (terei feito) | WOULD LIKE TO HAVE + past participle (gostaria de ter feito)</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">By 30, I will have finished my master's degree.</span> <span class=\"gram-trans\">(Aos 30, terei concluído meu mestrado.)</span></li><li><span class=\"gram-eng\">I'd like to have traveled to 20 countries by then.</span> <span class=\"gram-trans\">(Gostaria de ter viajado para 20 países até lá.)</span></li><li><span class=\"gram-eng\">She hopes to have started her own business by next year.</span> <span class=\"gram-trans\">(Ela espera ter aberto seu negócio até o ano que vem.)</span></li><li><span class=\"gram-eng\">In ten years, we'll have built our dream house.</span> <span class=\"gram-trans\">(Em dez anos, teremos construído nossa casa.)</span></li><li><span class=\"gram-eng\">I'd like to have learned three languages by 40.</span> <span class=\"gram-trans\">(Gostaria de ter aprendido três línguas até os 40.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><p>Marcador típico: 'BY + tempo futuro' (by 2030, by then, by next year). WOULD LIKE TO HAVE = desejo de realização até um ponto.</p></div></div>"},
  ],
};
</script>
<script>
let currentLevel = 'intro';
let currentView = 'curriculum';
let scrollObserver = null;
const LEVEL_NAMES = { intro: 'Intro', lvl1: 'Level 1', lvl2: 'Level 2', lvl3: 'Level 3' };
const LEVEL_BOOK_TAGS = { intro: 'Interchange Intro', lvl1: 'Interchange 1 (Red)', lvl2: 'Interchange 2 (Blue)', lvl3: 'Interchange 3 (Green)' };
const LEVEL_BOOK_IMG = { intro: 'img/books/interchange-intro.jpg', lvl1: 'img/books/interchange-1.jpg', lvl2: 'img/books/interchange-2.jpg', lvl3: 'img/books/interchange-3.jpg' };
const WS_KEYS = { intro: 'intro', lvl1: 'level1', lvl2: 'level2', lvl3: 'level3' };
let curCarouselState = { index: 0, total: 0 };

function setLevel(level) {
  currentLevel = level;
  document.querySelectorAll('.j-step').forEach(s => s.classList.toggle('active', s.dataset.level === level));
  render();
}
function setView(view) {
  currentView = view;
  document.querySelectorAll('.bib-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  document.querySelectorAll('.bib-view').forEach(v => v.classList.remove('active'));
  document.getElementById('v-' + view).classList.add('active');
  render();
}

function setupObserver() {
  if (scrollObserver) scrollObserver.disconnect();
  scrollObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
        scrollObserver.unobserve(entry.target);
      }
    });
  }, { rootMargin: '0px 0px -8% 0px', threshold: 0.08 });
  document.querySelectorAll('.ws-card, .gram-item').forEach(el => scrollObserver.observe(el));
}

function render() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  if (currentView === 'curriculum') renderCurriculum(search);
  else if (currentView === 'worksheets') renderWorksheets();
  else renderExamples(search);
  // Small delay so DOM is ready
  setTimeout(setupObserver, 30);
}

// === CURRICULUM: carrossel horizontal com zigzag ===
function renderCurriculum(search) {
  const items = curriculum[currentLevel] || [];
  const filtered = search
    ? items.filter(u => (u.u + ' ' + u.t + ' ' + u.v + ' ' + u.g + ' ' + u.o + ' ' + u.w).toLowerCase().includes(search))
    : items;
  const div = document.getElementById('v-curriculum');

  if (!filtered.length) {
    div.innerHTML = emptyState('📋', 'Nenhuma unidade encontrada com esses termos.');
    return;
  }

  const intro = '<div class="view-intro">' +
    '<div class="view-intro-eyebrow">' + LEVEL_BOOK_TAGS[currentLevel] + '</div>' +
    '<h2>16 unidades, uma <em>jornada</em></h2>' +
    '<p>Acompanhe a progressão do livro unidade por unidade — vocabulário, gramática, objetivos comunicativos e a writing prevista para cada uma. Use as setas, os pontos abaixo ou arraste para navegar.</p>' +
  '</div>';

  const bookImg = LEVEL_BOOK_IMG[currentLevel] || LEVEL_BOOK_IMG.intro;
  const bookAlt = LEVEL_BOOK_TAGS[currentLevel] || '';

  const slidesHtml = filtered.map(u => {
    return '<div class="cur-slide">' +
      '<div class="cur-row">' +
        '<div class="cur-row-img">' +
          '<div class="cur-book-stage">' +
            '<img src="' + bookImg + '" alt="' + escapeHtml(bookAlt) + '" loading="lazy">' +
            '<div class="cur-unit-badge">' +
              '<span class="cur-unit-badge-label">Unit</span>' +
              '<span class="cur-unit-badge-num">' + String(u.u).padStart(2,'0') + '</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="cur-row-info">' +
          '<div class="cur-info-head">' +
            '<span class="cur-unit-tag">Unidade ' + u.u + ' de ' + items.length + '</span>' +
            '<h3 class="cur-title">' + escapeHtml(u.t) + '</h3>' +
          '</div>' +
          '<div class="cur-meta-row">' +
            '<div class="cur-meta-item"><span class="cur-meta-icon voc">V</span><div class="cur-meta-text"><strong>Vocabulário</strong>' + escapeHtml(u.v) + '</div></div>' +
            '<div class="cur-meta-item"><span class="cur-meta-icon gra">G</span><div class="cur-meta-text"><strong>Gramática</strong>' + escapeHtml(u.g) + '</div></div>' +
            '<div class="cur-meta-item"><span class="cur-meta-icon obj">O</span><div class="cur-meta-text"><strong>Objetivos</strong>' + escapeHtml(u.o) + '</div></div>' +
            (u.w ? '<div class="cur-meta-item"><span class="cur-meta-icon wri">W</span><div class="cur-meta-text"><strong>Writing</strong>' + escapeHtml(u.w) + '</div></div>' : '') +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  const dotsHtml = filtered.map((u, i) =>
    '<button class="cur-dot' + (i === 0 ? ' active' : '') + '" data-cur-go="' + i + '" type="button" aria-label="Ir para unidade ' + u.u + '"></button>'
  ).join('');

  div.innerHTML = intro +
    '<div class="cur-carousel" data-level="' + currentLevel + '">' +
      '<div class="cur-viewport">' +
        '<div class="cur-track">' + slidesHtml + '</div>' +
      '</div>' +
      '<button class="cur-nav cur-nav-prev" type="button" aria-label="Unidade anterior" data-cur-prev>' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>' +
      '</button>' +
      '<button class="cur-nav cur-nav-next" type="button" aria-label="Próxima unidade" data-cur-next>' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>' +
      '</button>' +
      '<div class="cur-progress">' +
        '<div class="cur-progress-info">' +
          '<span>Unit <strong id="curProgressNow">1</strong></span>' +
          '<span class="cur-progress-sep"></span>' +
          '<span>de ' + filtered.length + '</span>' +
        '</div>' +
        '<div class="cur-dots">' + dotsHtml + '</div>' +
      '</div>' +
    '</div>';

  curCarouselState = { index: 0, total: filtered.length };
  updateCarousel();
  attachCarouselSwipe();
}

function updateCarousel() {
  const track = document.querySelector('.cur-track');
  if (!track) return;
  const { index, total } = curCarouselState;
  track.style.transform = 'translateX(-' + (index * 100) + '%)';

  document.querySelectorAll('.cur-dot').forEach((d, i) => d.classList.toggle('active', i === index));
  const prev = document.querySelector('[data-cur-prev]');
  const next = document.querySelector('[data-cur-next]');
  if (prev) prev.disabled = index === 0;
  if (next) next.disabled = index >= total - 1;
  const progress = document.getElementById('curProgressNow');
  if (progress) progress.textContent = index + 1;
}

function goCarousel(idx) {
  const { total } = curCarouselState;
  if (idx < 0) idx = 0;
  if (idx >= total) idx = total - 1;
  curCarouselState.index = idx;
  updateCarousel();
}

function attachCarouselSwipe() {
  const viewport = document.querySelector('.cur-viewport');
  if (!viewport) return;
  let startX = 0, startY = 0, deltaX = 0, deltaY = 0, swiping = false;

  viewport.addEventListener('touchstart', (e) => {
    if (!e.touches[0]) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    deltaX = 0; deltaY = 0; swiping = true;
  }, { passive: true });

  viewport.addEventListener('touchmove', (e) => {
    if (!swiping || !e.touches[0]) return;
    deltaX = e.touches[0].clientX - startX;
    deltaY = e.touches[0].clientY - startY;
  }, { passive: true });

  viewport.addEventListener('touchend', () => {
    if (!swiping) return;
    swiping = false;
    // só conta como swipe se foi mais horizontal que vertical e passou de 50px
    if (Math.abs(deltaX) > 50 && Math.abs(deltaX) > Math.abs(deltaY)) {
      if (deltaX < 0) goCarousel(curCarouselState.index + 1);
      else goCarousel(curCarouselState.index - 1);
    }
  });
}

// === WORKSHEETS: grade timeline ===
function renderWorksheets() {
  const levelKey = WS_KEYS[currentLevel] || 'intro';
  const levelName = LEVEL_NAMES[currentLevel] || '';
  const div = document.getElementById('v-worksheets');

  const intro = '<div class="view-intro">' +
    '<div class="view-intro-eyebrow">' + LEVEL_BOOK_TAGS[currentLevel] + '</div>' +
    '<h2>Worksheets <em>completos</em> — Units 1 a 16</h2>' +
    '<p>Baixe ou copie o link de cada worksheet. Use diretamente em aula ou envie para seus alunos.</p>' +
  '</div>';

  let cards = '';
  for (let i = 1; i <= 16; i++) {
    const path = STORAGE + '/' + levelKey + '/unit-' + String(i).padStart(2,'0') + '.pdf';
    cards += '<div class="ws-card" data-level="' + currentLevel + '">' +
      '<div class="ws-num-wrap">' + i + '</div>' +
      '<div class="ws-label">Unit ' + i + ' · ' + levelName + '</div>' +
      '<div class="ws-actions">' +
        '<a href="' + path + '" target="_blank" rel="noopener" class="ws-btn ws-dl">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
          'Baixar' +
        '</a>' +
        '<button class="ws-btn ws-copy" data-copy="' + path + '" type="button">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
          'Copiar' +
        '</button>' +
      '</div>' +
    '</div>';
  }

  div.innerHTML = intro + '<div class="ws-timeline">' + cards + '</div>';
}

// === EXAMPLES: timeline vertical com cards ===
function renderExamples(search) {
  const items = examples[currentLevel] || [];
  let filtered = search
    ? items.filter(ex => (ex.topic + ' ' + ex.html).toLowerCase().includes(search))
    : items;
  filtered = [...filtered].sort((a,b) => (a.order||0) - (b.order||0));
  const div = document.getElementById('v-examples');

  if (!filtered.length) {
    div.innerHTML = emptyState('💡', 'Nenhum exemplo de gramática encontrado.');
    return;
  }

  const intro = '<div class="view-intro">' +
    '<div class="view-intro-eyebrow">' + LEVEL_BOOK_TAGS[currentLevel] + '</div>' +
    '<h2>Explicações <em>gramaticais</em> por página</h2>' +
    '<p>Clique em cada conceito para ver a explicação completa com exemplos em português e inglês.</p>' +
  '</div>';

  const itemsHtml = filtered.map((ex, idx) => {
    const topic = (ex.topic || 'Conceito').replace(/<[^>]+>/g, '').slice(0, 100);
    const badge = ex.badge || (ex.page ? String(ex.page) : '—');
    const isUnit = /^U\d+/.test(badge);
    const isSpecial = badge === '★' || badge === '—';
    let label, numText;
    if (isSpecial) {
      label = 'RES';
      numText = '★';
    } else if (isUnit) {
      label = 'UNIT';
      numText = badge.replace(/^U/, '');
    } else {
      label = 'PÁG';
      numText = badge;
    }
    return '<div class="gram-item">' +
      '<div class="gram-card" data-gram-idx="' + idx + '">' +
        '<div class="gram-page-badge"><div class="gram-page-label">' + label + '</div><div class="gram-page-num">' + escapeHtml(numText) + '</div></div>' +
        '<div class="gram-card-body">' +
          '<div class="gram-topic">' + escapeHtml(topic) + '</div>' +
          '<div class="gram-book-tag">' + escapeHtml(ex.book || LEVEL_NAMES[currentLevel]) + '</div>' +
        '</div>' +
        '<div class="gram-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>' +
      '</div>' +
    '</div>';
  }).join('');

  div.innerHTML = intro + '<div class="gram-timeline" data-level="' + currentLevel + '">' + itemsHtml + '</div>';
  window._filteredExamples = filtered;
}

function emptyState(icon, msg) {
  return '<div class="bib-empty"><div class="bib-empty-icon">' + icon + '</div><p>' + msg + '</p></div>';
}

function openGram(idx) {
  const ex = window._filteredExamples[idx];
  if (!ex) return;
  window._currentGramEx = ex;
  window._currentGramLevel = currentLevel;
  const topic = (ex.topic || '').replace(/<[^>]+>/g, '');
  document.getElementById('gramTitle').textContent = topic;
  // Texto da meta: prefere ref ("Intro - pg. 3"), senão monta a partir do badge
  let metaText;
  if (ex.ref) {
    metaText = ex.ref;
  } else {
    const badge = ex.badge || ex.page || '';
    const isUnit = /^U\d+/.test(String(badge));
    const isSpecial = badge === '★' || badge === '—';
    let prefix;
    if (isSpecial) prefix = 'Resumo';
    else if (isUnit) prefix = 'Unit ' + String(badge).replace(/^U/, '');
    else prefix = 'Página ' + badge;
    metaText = prefix + ' · ' + (ex.book || LEVEL_NAMES[currentLevel]);
  }
  document.getElementById('gramMeta').innerHTML =
    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>' +
    '<span>' + escapeHtml(metaText) + '</span>';
