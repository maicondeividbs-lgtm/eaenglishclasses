{"order": 25, "badge": "25", "topic": "Sequence Adverbs", "book": "Interchange 2", "ref": "Interchange 2 - pg. 25 (Unit 4)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Advérbios de sequência organizam os passos de um processo (receita, instruções) em ordem: primeiro, depois, em seguida, por fim.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Ordem</h5><p>First → Then → Next → After that → Finally<br>&quot;First, boil the macaroni.&quot;</p><h5 class=\"gram-subhead\">Posição</h5><p>no início da frase, seguidos de vírgula<br>&quot;Then melt the butter.&quot;</p><h5 class=\"gram-subhead\">Função</h5><p>cada um introduz um passo novo<br>&quot;Finally, bake for 20 minutes.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">First, boil the macaroni in a large pot.</span> <span class=\"gram-trans\">(Primeiro, ferva o macarrão numa panela grande.)</span></li><li><span class=\"gram-eng\">Then melt the butter on medium heat.</span> <span class=\"gram-trans\">(Depois, derreta a manteiga em fogo médio.)</span></li><li><span class=\"gram-eng\">Next, add the cheese.</span> <span class=\"gram-trans\">(Em seguida, adicione o queijo.)</span></li><li><span class=\"gram-eng\">After that, add the cooked macaroni.</span> <span class=\"gram-trans\">(Depois disso, adicione o macarrão cozido.)</span></li><li><span class=\"gram-eng\">Finally, bake for 20 minutes.</span> <span class=\"gram-trans\">(Por fim, asse por 20 minutos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;First&quot; abre a sequência e &quot;Finally&quot; a encerra.</li><li>Não confunda &quot;then&quot; (depois, na sequência) com &quot;than&quot; (do que, em comparações).</li></ul></div></div>"},
{"order": 31, "badge": "31", "topic": "Future with Be Going to and Will", "book": "Interchange 2", "ref": "Interchange 2 - pg. 31 (Unit 5)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Use &quot;be going to&quot; para planos já decididos. Use &quot;will&quot; para planos possíveis ou decisões ainda não tomadas (geralmente com guess, think, maybe, probably).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">be going to (decidido)</h5><p>be going to + verbo<br>&quot;I'm going to relax at the beach.&quot;</p><h5 class=\"gram-subhead\">will (possível/incerto)</h5><p>will + verbo<br>&quot;I guess I'll just stay home.&quot;</p><h5 class=\"gram-subhead\">Marcadores de incerteza</h5><p>maybe, probably, I guess, I think<br>&quot;Maybe I'll take a course.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">What are you going to do? — I'm going to relax at the beach.</span> <span class=\"gram-trans\">(O que você vai fazer? — Vou relaxar na praia.)</span></li><li><span class=\"gram-eng\">We're going to go surfing every day.</span> <span class=\"gram-trans\">(Vamos surfar todo dia.)</span></li><li><span class=\"gram-eng\">I'm not sure. I guess I'll just stay home.</span> <span class=\"gram-trans\">(Não sei. Acho que vou só ficar em casa.)</span></li><li><span class=\"gram-eng\">Maybe I'll take a course.</span> <span class=\"gram-trans\">(Talvez eu faça um curso.)</span></li><li><span class=\"gram-eng\">I probably won't go anywhere.</span> <span class=\"gram-trans\">(Provavelmente não vou a lugar nenhum.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Decisão já tomada = &quot;going to&quot;; possibilidade em aberto = &quot;will&quot; (com maybe/probably/I guess).</li><li>&quot;won't&quot; = will not.</li></ul></div></div>"},
{"order": 33, "badge": "33", "topic": "Modals for Necessity and Suggestion", "book": "Interchange 2", "ref": "Interchange 2 - pg. 33 (Unit 5)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para falar de necessidade (o que é obrigatório ou não) e dar sugestões usamos modais como must, have to, should, ought to e 'd better.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Necessidade</h5><p>must / need to / have to ; don't have to (não é necessário)<br>&quot;You must have health insurance.&quot;</p><h5 class=\"gram-subhead\">Sugestão forte</h5><p>'d better / ought to<br>&quot;You'd better avoid the stalls.&quot;</p><h5 class=\"gram-subhead\">Sugestão</h5><p>should / shouldn't<br>&quot;You should try some local specialties.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">You must have health insurance.</span> <span class=\"gram-trans\">(Você precisa ter plano de saúde.)</span></li><li><span class=\"gram-eng\">You don't have to get vaccinations.</span> <span class=\"gram-trans\">(Você não precisa tomar vacinas.)</span></li><li><span class=\"gram-eng\">You'd better avoid the stalls on the street.</span> <span class=\"gram-trans\">(É melhor você evitar as barracas de rua.)</span></li><li><span class=\"gram-eng\">You ought to make a copy of your passport.</span> <span class=\"gram-trans\">(Você deveria fazer uma cópia do passaporte.)</span></li><li><span class=\"gram-eng\">You shouldn't carry a lot of cash.</span> <span class=\"gram-trans\">(Você não deveria andar com muito dinheiro.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;must&quot; (obrigação) é mais forte que &quot;should&quot; (conselho).</li><li>&quot;don't have to&quot; = NÃO é necessário (não é proibição!). &quot;'d better&quot; = aviso/conselho forte.</li></ul></div></div>"},
{"order": 37, "badge": "37", "topic": "Two-Part Verbs; Will for Responding to Requests", "book": "Interchange 2", "ref": "Interchange 2 - pg. 37 (Unit 6)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Verbos de duas partes (phrasal verbs separáveis) têm verbo + partícula. Com pronome, a partícula vai obrigatoriamente depois dele. &quot;Will&quot; responde a pedidos.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Com substantivo</h5><p>as duas ordens valem<br>&quot;Turn down the TV. / Turn the TV down.&quot;</p><h5 class=\"gram-subhead\">Com pronome</h5><p>só uma ordem possível<br>&quot;Turn it down. (NÃO &quot;Turn down it.&quot;)&quot;</p><h5 class=\"gram-subhead\">Responder a pedido</h5><p>I'll + verbo<br>&quot;OK. I'll turn it down.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Turn down the TV. / Turn the TV down.</span> <span class=\"gram-trans\">(Abaixe a TV.)</span></li><li><span class=\"gram-eng\">Turn it down.</span> <span class=\"gram-trans\">(Abaixe ela.)</span></li><li><span class=\"gram-eng\">Put away your books. — All right. I'll put them away.</span> <span class=\"gram-trans\">(Guarde seus livros. — Tá bom, vou guardá-los.)</span></li><li><span class=\"gram-eng\">Please turn off the lights.</span> <span class=\"gram-trans\">(Por favor, apague as luzes.)</span></li><li><span class=\"gram-eng\">Pick up your things, please.</span> <span class=\"gram-trans\">(Pegue suas coisas, por favor.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>A grande armadilha: com PRONOME a partícula vem depois: &quot;turn it down&quot; (nunca &quot;turn down it&quot;).</li><li>&quot;I'll&quot; expressa disposição imediata (&quot;pode deixar que eu faço&quot;).</li></ul></div></div>"},
{"order": 39, "badge": "39", "topic": "Requests with Modals and Would You Mind ... ?", "book": "Interchange 2", "ref": "Interchange 2 - pg. 39 (Unit 6)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para pedidos educados usamos modais (can, could, would) + verbo na forma base, OU &quot;Would you mind...?&quot; seguido de verbo no gerúndio (-ing).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Modal + forma base</h5><p>Can/Could/Would you + verbo?<br>&quot;Could you turn the music down?&quot;</p><h5 class=\"gram-subhead\">Would you mind + gerúndio</h5><p>Would you mind + verbo-ing?<br>&quot;Would you mind turning the music down?&quot;</p><h5 class=\"gram-subhead\">Pedido negativo com mind</h5><p>Would you mind not + -ing?<br>&quot;Would you mind not parking here?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Can you keep your cat inside, please?</span> <span class=\"gram-trans\">(Você pode manter o gato dentro de casa, por favor?)</span></li><li><span class=\"gram-eng\">Would you please park your car in your space?</span> <span class=\"gram-trans\">(Você poderia estacionar na sua vaga, por favor?)</span></li><li><span class=\"gram-eng\">Would you mind keeping your cat inside?</span> <span class=\"gram-trans\">(Você se importaria de manter o gato dentro de casa?)</span></li><li><span class=\"gram-eng\">Would you mind speaking more quietly?</span> <span class=\"gram-trans\">(Você se importaria de falar mais baixo?)</span></li><li><span class=\"gram-eng\">Would you mind not using your phone in class?</span> <span class=\"gram-trans\">(Você se importaria de não usar o celular na aula?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de &quot;Would you mind&quot; o verbo vai no -ing: &quot;Would you mind closing...?&quot;.</li><li>Responder &quot;No&quot; a &quot;Would you mind...?&quot; significa SIM, eu faço (não me importo).</li></ul></div></div>"},
{"order": 45, "badge": "45", "topic": "Infinitives and Gerunds for Uses and Purposes", "book": "Interchange 2", "ref": "Interchange 2 - pg. 45 (Unit 7)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para explicar para que serve algo (a finalidade), usamos o infinitivo (to + verbo) ou o gerúndio com &quot;for&quot; (for + verbo-ing). Os dois têm o mesmo sentido.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Infinitivo</h5><p>to + verbo<br>&quot;I use my cell phone to send messages.&quot;</p><h5 class=\"gram-subhead\">Gerúndio com for</h5><p>for + verbo-ing<br>&quot;I use my cell phone for sending messages.&quot;</p><h5 class=\"gram-subhead\">Função</h5><p>ambos respondem &quot;para quê?&quot;<br>&quot;People use phones to take / for taking photos.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I use my cell phone to send messages.</span> <span class=\"gram-trans\">(Uso meu celular para enviar mensagens.)</span></li><li><span class=\"gram-eng\">I use my cell phone for sending messages.</span> <span class=\"gram-trans\">(Uso meu celular para enviar mensagens.)</span></li><li><span class=\"gram-eng\">People often use their phones to take photos.</span> <span class=\"gram-trans\">(As pessoas costumam usar o celular para tirar fotos.)</span></li><li><span class=\"gram-eng\">Many people use tablets for making video calls.</span> <span class=\"gram-trans\">(Muita gente usa tablets para fazer videochamadas.)</span></li><li><span class=\"gram-eng\">Engineers use 3-D printers to make car parts.</span> <span class=\"gram-trans\">(Engenheiros usam impressoras 3D para fazer peças de carro.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>As duas formas são intercambiáveis: &quot;to send&quot; = &quot;for sending&quot;.</li><li>Com &quot;for&quot; é sempre o gerúndio (for sending), nunca o infinitivo (&quot;for to send&quot; é erro).</li></ul></div></div>"},
{"order": 47, "badge": "47", "topic": "Imperatives and Infinitives for Giving Suggestions", "book": "Interchange 2", "ref": "Interchange 2 - pg. 47 (Unit 7)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para dar sugestões e lembretes usamos expressões no imperativo seguidas de infinitivo (to + verbo): be sure to, remember to, don't forget to, try (not) to.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Afirmativa</h5><p>Be sure to / Make sure to / Remember to + verbo<br>&quot;Be sure to update the app.&quot;</p><h5 class=\"gram-subhead\">Negativa</h5><p>Don't forget to / Try not to + verbo<br>&quot;Don't forget to reset your passwords.&quot;</p><h5 class=\"gram-subhead\">Forma</h5><p>sempre seguidas de to + verbo base<br>&quot;Try not to use public Wi-Fi.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Be sure to update the app.</span> <span class=\"gram-trans\">(Não deixe de atualizar o aplicativo.)</span></li><li><span class=\"gram-eng\">Make sure to charge your phone.</span> <span class=\"gram-trans\">(Certifique-se de carregar o celular.)</span></li><li><span class=\"gram-eng\">Remember to back up your files.</span> <span class=\"gram-trans\">(Lembre-se de fazer backup dos arquivos.)</span></li><li><span class=\"gram-eng\">Don't forget to reset your passwords.</span> <span class=\"gram-trans\">(Não esqueça de redefinir suas senhas.)</span></li><li><span class=\"gram-eng\">Try not to use public Wi-Fi networks.</span> <span class=\"gram-trans\">(Tente não usar redes Wi-Fi públicas.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Todas pedem &quot;to + verbo&quot;: &quot;remember TO back up&quot;.</li><li>&quot;remember to do&quot; (lembrar de fazer, antes) ≠ &quot;remember doing&quot; (lembrar de ter feito).</li></ul></div></div>"},
{"order": 51, "badge": "51", "topic": "Relative Clauses of Time", "book": "Interchange 2", "ref": "Interchange 2 - pg. 51 (Unit 8)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Orações relativas de tempo usam &quot;when&quot; para dar mais informação sobre um dia, uma noite ou um período. O &quot;when&quot; liga a descrição ao momento.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Estrutura</h5><p>substantivo de tempo + when + oração<br>&quot;Mother's Day is a day when my kids make pancakes.&quot;</p><h5 class=\"gram-subhead\">Usado com</h5><p>day, night, time, season, month<br>&quot;New Year's Eve is a night when...&quot;</p><h5 class=\"gram-subhead\">Sentido</h5><p>&quot;when&quot; = em que / no qual<br>&quot;a day when people give cards.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Mother's Day is a day when my kids make pancakes for me.</span> <span class=\"gram-trans\">(O Dia das Mães é um dia em que meus filhos fazem panquecas pra mim.)</span></li><li><span class=\"gram-eng\">New Year's Eve is a night when I have fun with my friends.</span> <span class=\"gram-trans\">(O Réveillon é uma noite em que me divirto com os amigos.)</span></li><li><span class=\"gram-eng\">April Fools' Day is a day when people play tricks on friends.</span> <span class=\"gram-trans\">(O Dia da Mentira é um dia em que as pessoas pregam peças.)</span></li><li><span class=\"gram-eng\">Summer is a time when many people go to the beach.</span> <span class=\"gram-trans\">(O verão é uma época em que muita gente vai à praia.)</span></li><li><span class=\"gram-eng\">Valentine's Day is a day when people express their love.</span> <span class=\"gram-trans\">(O Dia dos Namorados é um dia em que as pessoas declaram seu amor.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Use &quot;when&quot; (não &quot;that&quot; nem &quot;where&quot;) para se referir a TEMPO: &quot;a day when...&quot;.</li><li>Em português isso vira &quot;em que&quot;.</li></ul></div></div>"},
{"order": 54, "badge": "54", "topic": "Adverbial Clauses of Time", "book": "Interchange 2", "ref": "Interchange 2 - pg. 54 (Unit 8)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Orações adverbiais de tempo, introduzidas por when, after e before, indicam quando algo acontece em relação a outra ação.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">when (quando)</h5><p>When + oração<br>&quot;When women get married, they wear a sari.&quot;</p><h5 class=\"gram-subhead\">after (depois que)</h5><p>After + oração<br>&quot;After the groom arrives, they exchange garlands.&quot;</p><h5 class=\"gram-subhead\">before (antes de)</h5><p>Before + oração<br>&quot;Before the wedding, the relatives have a party.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">When women get married, they usually wear a brightly colored sari.</span> <span class=\"gram-trans\">(Quando as mulheres se casam, costumam usar um sári colorido.)</span></li><li><span class=\"gram-eng\">After the groom arrives, the bride and groom exchange garlands.</span> <span class=\"gram-trans\">(Depois que o noivo chega, os noivos trocam guirlandas.)</span></li><li><span class=\"gram-eng\">Before the wedding, the relatives have a party.</span> <span class=\"gram-trans\">(Antes do casamento, os parentes fazem uma festa.)</span></li><li><span class=\"gram-eng\">When a couple gets engaged, the man often gives a ring.</span> <span class=\"gram-trans\">(Quando um casal fica noivo, o homem costuma dar um anel.)</span></li><li><span class=\"gram-eng\">Before a man and woman get married, they usually date.</span> <span class=\"gram-trans\">(Antes de se casarem, o homem e a mulher costumam namorar.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Quando a oração de tempo abre a frase, usa-se vírgula: &quot;When women get married, they...&quot;.</li><li>Falando de costumes gerais, a oração com when/after/before fica no presente.</li></ul></div></div>"},
{"order": 59, "badge": "59", "topic": "Time Contrasts", "book": "Interchange 2", "ref": "Interchange 2 - pg. 59 (Unit 9)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para contrastar passado, presente e futuro usamos estruturas diferentes em cada tempo, junto com expressões de tempo (a few years ago, these days, soon...).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Passado</h5><p>used to / simple past + a few years ago, in the past<br>&quot;We used to go to a burger place.&quot;</p><h5 class=\"gram-subhead\">Presente</h5><p>presente simples/contínuo + these days, nowadays<br>&quot;These days, they're building lots of apartments.&quot;</p><h5 class=\"gram-subhead\">Futuro</h5><p>will / might / be going to + soon, in the future<br>&quot;Soon, there will be apartment blocks.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">A few years ago, there were just houses here.</span> <span class=\"gram-trans\">(Alguns anos atrás, só havia casas aqui.)</span></li><li><span class=\"gram-eng\">These days, they're building lots of apartments.</span> <span class=\"gram-trans\">(Hoje em dia, estão construindo muitos apartamentos.)</span></li><li><span class=\"gram-eng\">In the past, kids used to hang out with friends after school.</span> <span class=\"gram-trans\">(No passado, as crianças saíam com amigos depois da escola.)</span></li><li><span class=\"gram-eng\">In the future, restaurants might not exist.</span> <span class=\"gram-trans\">(No futuro, talvez restaurantes não existam.)</span></li><li><span class=\"gram-eng\">In a few years, we are going to have virtual friends.</span> <span class=\"gram-trans\">(Em alguns anos, vamos ter amigos virtuais.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Cada tempo pede sua estrutura: &quot;used to&quot; no passado; &quot;these days/nowadays&quot; no presente.</li><li>A expressão de tempo (soon, in the future) é a pista para escolher o tempo verbal.</li></ul></div></div>"},
{"order": 61, "badge": "61", "topic": "Conditional Sentences with If Clauses", "book": "Interchange 2", "ref": "Interchange 2 - pg. 61 (Unit 9)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O condicional real fala de situações possíveis no presente/futuro e suas consequências prováveis. A condição vai no presente; a consequência usa will, may ou might.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Condição</h5><p>If + presente simples<br>&quot;If you get a high-paying job, ...&quot;</p><h5 class=\"gram-subhead\">Consequência</h5><p>will / may / might + verbo<br>&quot;you'll have more cash to spend.&quot;</p><h5 class=\"gram-subhead\">Certeza variável</h5><p>may/might mostram menos certeza<br>&quot;you might not have any free time.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">If you get a high-paying job, you'll have more cash to spend.</span> <span class=\"gram-trans\">(Se você conseguir um emprego bem pago, terá mais dinheiro.)</span></li><li><span class=\"gram-eng\">If you don't save your money, you won't save anything.</span> <span class=\"gram-trans\">(Se você não economizar, não vai guardar nada.)</span></li><li><span class=\"gram-eng\">If you travel abroad, you'll be able to experience a new culture.</span> <span class=\"gram-trans\">(Se você viajar para o exterior, vai conhecer uma nova cultura.)</span></li><li><span class=\"gram-eng\">If you eat less fast food, you might feel a lot healthier.</span> <span class=\"gram-trans\">(Se comer menos fast food, você pode se sentir bem mais saudável.)</span></li><li><span class=\"gram-eng\">If you don't get enough sleep, you won't be able to stay awake.</span> <span class=\"gram-trans\">(Se não dormir o suficiente, não vai conseguir ficar acordado.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de &quot;if&quot; use o PRESENTE, não o futuro: &quot;If you get...&quot; (não &quot;If you will get...&quot;).</li><li>É a consequência que leva will/may/might.</li></ul></div></div>"},
{"order": 65, "badge": "65", "topic": "Gerunds; Short Responses", "book": "Interchange 2", "ref": "Interchange 2 - pg. 65 (Unit 10)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Vários verbos e expressões de gosto/opinião são seguidos por gerúndio (-ing). Para concordar usam-se respostas curtas com So/Neither.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Verbo + gerúndio</h5><p>love/hate/enjoy/don't mind/can't stand + verbo-ing<br>&quot;I love playing video games.&quot;</p><h5 class=\"gram-subhead\">Concordar (afirmativa)</h5><p>So do I. / So am I.<br>&quot;I hate working on weekends. — So do I.&quot;</p><h5 class=\"gram-subhead\">Concordar (negativa)</h5><p>Neither do I. / Neither can I.<br>&quot;I can't stand commuting. — Neither can I.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I love playing video games. — So do I.</span> <span class=\"gram-trans\">(Adoro jogar videogame. — Eu também.)</span></li><li><span class=\"gram-eng\">I'm good at solving problems. — So am I.</span> <span class=\"gram-trans\">(Sou bom em resolver problemas. — Eu também.)</span></li><li><span class=\"gram-eng\">I don't mind working evenings. — Neither do I.</span> <span class=\"gram-trans\">(Não me importo de trabalhar à noite. — Nem eu.)</span></li><li><span class=\"gram-eng\">I can't stand commuting. — Neither can I.</span> <span class=\"gram-trans\">(Não suporto o deslocamento. — Nem eu.)</span></li><li><span class=\"gram-eng\">I'm interested in learning foreign languages.</span> <span class=\"gram-trans\">(Tenho interesse em aprender línguas estrangeiras.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de like, hate, enjoy, don't mind, can't stand, be good at, be interested in → use o -ing.</li><li>&quot;So&quot; concorda com afirmativas; &quot;Neither&quot; com negativas (ambos com inversão).</li></ul></div></div>"},
{"order": 68, "badge": "68", "topic": "Clauses with Because", "book": "Interchange 2", "ref": "Interchange 2 - pg. 68 (Unit 10)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>A conjunção &quot;because&quot; introduz uma causa ou motivo. Liga uma afirmação à razão que a explica.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Estrutura</h5><p>oração principal + because + causa/razão<br>&quot;I'd make a good journalist because I'm good at writing.&quot;</p><h5 class=\"gram-subhead\">Função</h5><p>responde &quot;por quê?&quot;<br>&quot;because I'm very creative.&quot;</p><h5 class=\"gram-subhead\">Uso</h5><p>justifica algo positivo ou negativo<br>&quot;I wouldn't want to be a teacher because I'm impatient.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I'd make a good journalist because I'm good at writing.</span> <span class=\"gram-trans\">(Eu seria um bom jornalista porque sou bom em escrever.)</span></li><li><span class=\"gram-eng\">I could be a teacher because I'm very creative.</span> <span class=\"gram-trans\">(Eu poderia ser professor porque sou muito criativo.)</span></li><li><span class=\"gram-eng\">I could never be a stockbroker because I can't make decisions quickly.</span> <span class=\"gram-trans\">(Eu nunca poderia ser corretor porque não tomo decisões rápido.)</span></li><li><span class=\"gram-eng\">I'd like to be a physical therapist because I enjoy helping people.</span> <span class=\"gram-trans\">(Eu gostaria de ser fisioterapeuta porque gosto de ajudar as pessoas.)</span></li><li><span class=\"gram-eng\">I would make a bad librarian because I'm very disorganized.</span> <span class=\"gram-trans\">(Eu seria um péssimo bibliotecário porque sou muito desorganizado.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;because&quot; + frase completa (sujeito + verbo): &quot;because I'm good at writing&quot;.</li><li>Não confunda com &quot;because of&quot; + substantivo (&quot;because of the rain&quot;).</li></ul></div></div>"},
{"order": 73, "badge": "73", "topic": "Passive with by (Simple Past)", "book": "Interchange 2", "ref": "Interchange 2 - pg. 73 (Unit 11)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>A voz passiva muda o foco da frase para o objeto da ação. No passado, forma-se com was/were + particípio. O agente (quem faz) vem com &quot;by&quot;.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Forma</h5><p>was/were + particípio passado (+ by + agente)<br>&quot;It was founded by the Disney brothers.&quot;</p><h5 class=\"gram-subhead\">Ativa → Passiva</h5><p>o objeto vira sujeito<br>&quot;Disneyland was opened by Walt Disney.&quot;</p><h5 class=\"gram-subhead\">Agente</h5><p>&quot;by&quot; indica quem realizou a ação<br>&quot;The opening was broadcast by ABC.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">It was founded by the Disney brothers in 1923.</span> <span class=\"gram-trans\">(Foi fundada pelos irmãos Disney em 1923.)</span></li><li><span class=\"gram-eng\">Disneyland was opened by Walt Disney in 1955.</span> <span class=\"gram-trans\">(A Disneyland foi inaugurada por Walt Disney em 1955.)</span></li><li><span class=\"gram-eng\">The Statue of Liberty was designed by Bartholdi.</span> <span class=\"gram-trans\">(A Estátua da Liberdade foi projetada por Bartholdi.)</span></li><li><span class=\"gram-eng\">The first iPad was released in 2010.</span> <span class=\"gram-trans\">(O primeiro iPad foi lançado em 2010.)</span></li><li><span class=\"gram-eng\">The novel was written by Gabriel García Márquez.</span> <span class=\"gram-trans\">(O romance foi escrito por Gabriel García Márquez.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>A passiva sempre usa o PARTICÍPIO (founded, written, designed), não o passado simples.</li><li>Use &quot;by&quot; só quando importa dizer quem fez a ação.</li></ul></div></div>"},
{"order": 75, "badge": "75", "topic": "Passive without by (Simple Present)", "book": "Interchange 2", "ref": "Interchange 2 - pg. 75 (Unit 11)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Quando quem realiza a ação não é importante ou é óbvio, omite-se o &quot;by&quot;. No presente, a passiva forma-se com am/is/are + particípio.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Forma</h5><p>am/is/are + particípio passado (sem agente)<br>&quot;The euro is used in most of Europe.&quot;</p><h5 class=\"gram-subhead\">Ativa → Passiva</h5><p>foco no objeto<br>&quot;Dairy cattle are raised in the Netherlands.&quot;</p><h5 class=\"gram-subhead\">Sem agente</h5><p>quando é irrelevante ou genérico<br>&quot;Credit cards are accepted at most places.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">The euro is used in most of Europe.</span> <span class=\"gram-trans\">(O euro é usado na maior parte da Europa.)</span></li><li><span class=\"gram-eng\">Credit cards are accepted at most places.</span> <span class=\"gram-trans\">(Cartões de crédito são aceitos na maioria dos lugares.)</span></li><li><span class=\"gram-eng\">Rice is grown in many Asian countries.</span> <span class=\"gram-trans\">(Arroz é cultivado em muitos países asiáticos.)</span></li><li><span class=\"gram-eng\">Cars and electronics are manufactured in Japan.</span> <span class=\"gram-trans\">(Carros e eletrônicos são fabricados no Japão.)</span></li><li><span class=\"gram-eng\">French and Flemish are spoken in Belgium.</span> <span class=\"gram-trans\">(Francês e flamengo são falados na Bélgica.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Sem &quot;by&quot; quando o agente é óbvio ou geral (as pessoas, todo mundo).</li><li>Concordância: singular → is; plural → are (&quot;Cars are manufactured&quot;).</li></ul></div></div>"},
{"order": 79, "badge": "79", "topic": "Past Continuous vs. Simple Past", "book": "Interchange 2", "ref": "Interchange 2 - pg. 79 (Unit 12)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O passado contínuo descreve uma ação em andamento no passado; o passado simples descreve uma ação curta que a interrompe.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Passado contínuo (em andamento)</h5><p>was/were + verbo-ing<br>&quot;I was having lunch...&quot;</p><h5 class=\"gram-subhead\">Passado simples (interrompe)</h5><p>verbo no passado<br>&quot;...when I spilled coffee.&quot;</p><h5 class=\"gram-subhead\">Conectivos</h5><p>when (com o simples) / while (com o contínuo)<br>&quot;While I was shopping, a celebrity walked in.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I was having lunch when I spilled coffee on my clothes.</span> <span class=\"gram-trans\">(Eu estava almoçando quando derramei café na roupa.)</span></li><li><span class=\"gram-eng\">I was driving to the airport, but I got a flat tire.</span> <span class=\"gram-trans\">(Eu estava indo de carro ao aeroporto, mas furou o pneu.)</span></li><li><span class=\"gram-eng\">While I was shopping one day, a celebrity walked into the store.</span> <span class=\"gram-trans\">(Enquanto eu fazia compras um dia, uma celebridade entrou na loja.)</span></li><li><span class=\"gram-eng\">My father was skiing when he broke his leg.</span> <span class=\"gram-trans\">(Meu pai estava esquiando quando quebrou a perna.)</span></li><li><span class=\"gram-eng\">While I was driving in England, I realized I was on the wrong side.</span> <span class=\"gram-trans\">(Enquanto dirigia na Inglaterra, percebi que estava no lado errado.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>A ação longa de fundo vai no contínuo (was -ing); a ação curta que &quot;corta&quot; vai no passado simples.</li><li>&quot;While&quot; combina com o contínuo; &quot;when&quot; costuma vir com o passado simples.</li></ul></div></div>"},
{"order": 81, "badge": "81", "topic": "Present Perfect Continuous", "book": "Interchange 2", "ref": "Interchange 2 - pg. 81 (Unit 12)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O present perfect contínuo descreve ações que começaram no passado e continuam até o presente, com ênfase na duração da atividade.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Forma</h5><p>have/has + been + verbo-ing<br>&quot;I've been working two jobs.&quot;</p><h5 class=\"gram-subhead\">Pergunta</h5><p>Have you been + -ing?<br>&quot;What have you been doing lately?&quot;</p><h5 class=\"gram-subhead\">Duração</h5><p>for + período / since + início<br>&quot;I've been trying since I graduated.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">What have you been doing lately?</span> <span class=\"gram-trans\">(O que você anda fazendo ultimamente?)</span></li><li><span class=\"gram-eng\">I've been working two jobs for the last six months.</span> <span class=\"gram-trans\">(Estou trabalhando em dois empregos nos últimos seis meses.)</span></li><li><span class=\"gram-eng\">How long have you been trying? — Since I graduated.</span> <span class=\"gram-trans\">(Há quanto tempo você está tentando? — Desde que me formei.)</span></li><li><span class=\"gram-eng\">I haven't been saving money. I've been spending it!</span> <span class=\"gram-trans\">(Não estou economizando. Estou gastando!)</span></li><li><span class=\"gram-eng\">I've been running three times a week.</span> <span class=\"gram-trans\">(Tenho corrido três vezes por semana.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Estrutura fixa: have/has + BEEN + verbo-ing.</li><li>Use para algo que vem acontecendo e ainda está em curso (lately, recently, for the last...).</li></ul></div></div>"},
{"order": 87, "badge": "87", "topic": "Participles as Adjectives", "book": "Interchange 2", "ref": "Interchange 2 - pg. 87 (Unit 13)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Particípios viram adjetivos. O particípio presente (-ing) descreve a causa/ característica de algo; o particípio passado (-ed) descreve como a pessoa se sente.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Particípio presente (-ing)</h5><p>descreve a coisa que causa o sentimento<br>&quot;That movie sounds interesting.&quot;</p><h5 class=\"gram-subhead\">Particípio passado (-ed)</h5><p>descreve quem sente<br>&quot;I'm interested in action movies.&quot;</p><h5 class=\"gram-subhead\">Regra</h5><p>coisa = -ing ; pessoa = -ed<br>&quot;The books are fascinating. / I'm fascinated.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Stephen King's books are fascinating.</span> <span class=\"gram-trans\">(Os livros do Stephen King são fascinantes.)</span></li><li><span class=\"gram-eng\">I'm fascinated by Stephen King's books.</span> <span class=\"gram-trans\">(Sou fascinado pelos livros do Stephen King.)</span></li><li><span class=\"gram-eng\">I think action movies are boring.</span> <span class=\"gram-trans\">(Acho filmes de ação entediantes.)</span></li><li><span class=\"gram-eng\">I'm bored by action movies.</span> <span class=\"gram-trans\">(Fico entediado com filmes de ação.)</span></li><li><span class=\"gram-eng\">John Cho is an amazing actor. I'm always amazed by his talent.</span> <span class=\"gram-trans\">(O John Cho é um ator incrível. Sempre fico impressionado com o talento dele.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>A armadilha clássica: &quot;I'm boring&quot; (eu sou chato) ≠ &quot;I'm bored&quot; (estou entediado).</li><li>Coisa que causa o sentimento = -ing; pessoa que sente = -ed.</li></ul></div></div>"},
{"order": 89, "badge": "89", "topic": "Relative Pronouns for People and Things", "book": "Interchange 2", "ref": "Interchange 2 - pg. 89 (Unit 13)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Pronomes relativos ligam duas informações sobre a mesma pessoa ou coisa. Use who/that para pessoas e which/that para coisas.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Pessoas</h5><p>who ou that<br>&quot;He's an actor who is also a director.&quot;</p><h5 class=\"gram-subhead\">Coisas</h5><p>which ou that<br>&quot;It's a fantasy that has become a franchise.&quot;</p><h5 class=\"gram-subhead\">Função</h5><p>substitui o sujeito repetido (he, it)<br>&quot;an actor who/that..., a game which/that...&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">He's an actor who is also a director and producer.</span> <span class=\"gram-trans\">(Ele é um ator que também é diretor e produtor.)</span></li><li><span class=\"gram-eng\">It's a science fiction fantasy that has become a franchise.</span> <span class=\"gram-trans\">(É uma fantasia de ficção científica que virou uma franquia.)</span></li><li><span class=\"gram-eng\">Jennifer Hudson is a singer who has acted in several films.</span> <span class=\"gram-trans\">(Jennifer Hudson é uma cantora que atuou em vários filmes.)</span></li><li><span class=\"gram-eng\">Wii Fit is a video game that helps people get more exercise.</span> <span class=\"gram-trans\">(Wii Fit é um videogame que ajuda as pessoas a se exercitarem mais.)</span></li><li><span class=\"gram-eng\">Michael Keaton is an actor who began his career as a cameraman.</span> <span class=\"gram-trans\">(Michael Keaton é um ator que começou como cinegrafista.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;who&quot; só para pessoas; &quot;which&quot; só para coisas; &quot;that&quot; serve para os dois (informal).</li><li>Nunca use &quot;which&quot; para gente.</li></ul></div></div>"},
{"order": 93, "badge": "93", "topic": "Modals and Adverbs", "book": "Interchange 2", "ref": "Interchange 2 - pg. 93 (Unit 14)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para expressar grau de certeza sobre algo, usamos modais (might, may, could, must) ou advérbios equivalentes (maybe, perhaps, probably, definitely).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Possibilidade</h5><p>might/may/could  ≈  maybe/perhaps/probably<br>&quot;It might mean she wants to accept it.&quot;</p><h5 class=\"gram-subhead\">Quase certeza</h5><p>must  ≈  definitely<br>&quot;That must mean &quot;no.&quot;&quot;</p><h5 class=\"gram-subhead\">Posição</h5><p>modal + verbo base; advérbio antes do verbo<br>&quot;That definitely means &quot;no.&quot;&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">It might mean she wants to accept it.</span> <span class=\"gram-trans\">(Pode ser que ela queira aceitar.)</span></li><li><span class=\"gram-eng\">Maybe it means she wants to accept it.</span> <span class=\"gram-trans\">(Talvez signifique que ela quer aceitar.)</span></li><li><span class=\"gram-eng\">It could mean she doesn't want anything.</span> <span class=\"gram-trans\">(Pode significar que ela não quer nada.)</span></li><li><span class=\"gram-eng\">That must mean &quot;no.&quot;</span> <span class=\"gram-trans\">(Isso só pode significar &quot;não&quot;.)</span></li><li><span class=\"gram-eng\">That definitely means &quot;no.&quot;</span> <span class=\"gram-trans\">(Isso com certeza significa &quot;não&quot;.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Aqui &quot;must&quot; NÃO é obrigação — é dedução (quase certeza): &quot;That must mean no&quot;.</li><li>Equivalências: might/may/could ≈ maybe/perhaps; must ≈ definitely.</li></ul></div></div>"},
{"order": 95, "badge": "95", "topic": "Permission, Obligation, and Prohibition", "book": "Interchange 2", "ref": "Interchange 2 - pg. 95 (Unit 14)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para falar de regras usamos estruturas distintas: permissão (pode), obrigação (tem que) e proibição (não pode).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Permissão</h5><p>can / be allowed to<br>&quot;You can swim here. / You're allowed to park here.&quot;</p><h5 class=\"gram-subhead\">Obrigação</h5><p>have to / have got to<br>&quot;You have to fasten your seat belt.&quot;</p><h5 class=\"gram-subhead\">Proibição</h5><p>can't / not allowed to<br>&quot;You can't turn left. / Pets aren't allowed.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">You can swim here.</span> <span class=\"gram-trans\">(Você pode nadar aqui.)</span></li><li><span class=\"gram-eng\">You're allowed to park here.</span> <span class=\"gram-trans\">(É permitido estacionar aqui.)</span></li><li><span class=\"gram-eng\">You have to fasten your seat belt.</span> <span class=\"gram-trans\">(Você tem que colocar o cinto de segurança.)</span></li><li><span class=\"gram-eng\">You've got to take off your shoes.</span> <span class=\"gram-trans\">(Você tem que tirar os sapatos.)</span></li><li><span class=\"gram-eng\">Pets aren't allowed in this area.</span> <span class=\"gram-trans\">(Animais não são permitidos nesta área.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;have got to&quot; = &quot;have to&quot; (obrigação), mais comum na fala.</li><li>&quot;can't&quot;/&quot;aren't allowed to&quot; = proibição (não pode); bem diferente de &quot;don't have to&quot; (não é necessário).</li></ul></div></div>"},
{"order": 101, "badge": "101", "topic": "Unreal Conditional Sentences with If Clauses", "book": "Interchange 2", "ref": "Interchange 2 - pg. 101 (Unit 15)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>O condicional irreal fala de situações imaginárias ou improváveis no presente. A condição vai no passado simples; a consequência usa would, could ou might.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Condição (imaginária)</h5><p>If + passado simples<br>&quot;If I found $40,000, ...&quot;</p><h5 class=\"gram-subhead\">Consequência</h5><p>would / could / might + verbo<br>&quot;I would keep it.&quot;</p><h5 class=\"gram-subhead\">Pergunta</h5><p>What would you do if...?<br>&quot;What would you do if you found $40,000?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">If I found $40,000, I would keep it.</span> <span class=\"gram-trans\">(Se eu achasse 40 mil dólares, eu ficaria com eles.)</span></li><li><span class=\"gram-eng\">I wouldn't return it.</span> <span class=\"gram-trans\">(Eu não devolveria.)</span></li><li><span class=\"gram-eng\">I could buy a new car.</span> <span class=\"gram-trans\">(Eu poderia comprar um carro novo.)</span></li><li><span class=\"gram-eng\">If you had three months to travel, where would you go?</span> <span class=\"gram-trans\">(Se você tivesse três meses para viajar, para onde iria?)</span></li><li><span class=\"gram-eng\">If your doctor told you to exercise, which activity would you choose?</span> <span class=\"gram-trans\">(Se seu médico mandasse se exercitar, qual atividade você escolheria?)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>A situação é IMAGINÁRIA, mas o verbo após &quot;if&quot; vai no PASSADO (&quot;If I found...&quot;).</li><li>A consequência leva &quot;would/could/might&quot;. Não use &quot;would&quot; depois de &quot;if&quot;.</li></ul></div></div>"},
{"order": 103, "badge": "103", "topic": "Past Modals", "book": "Interchange 2", "ref": "Interchange 2 - pg. 103 (Unit 15)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Modais no passado (would have / should have + particípio) dão opiniões ou sugestões sobre ações que já aconteceram — o que alguém deveria ou teria feito.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">should have + particípio</h5><p>o certo seria ter feito<br>&quot;You should have told her about it.&quot;</p><h5 class=\"gram-subhead\">shouldn't have + particípio</h5><p>não deveria ter feito<br>&quot;You shouldn't have lied to your sister.&quot;</p><h5 class=\"gram-subhead\">would have + particípio</h5><p>eu teria feito<br>&quot;I would have called him.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">You should have told her about it.</span> <span class=\"gram-trans\">(Você deveria ter contado a ela.)</span></li><li><span class=\"gram-eng\">You shouldn't have lied to your sister.</span> <span class=\"gram-trans\">(Você não deveria ter mentido para sua irmã.)</span></li><li><span class=\"gram-eng\">What would you have done? — I would have called him.</span> <span class=\"gram-trans\">(O que você teria feito? — Eu teria ligado pra ele.)</span></li><li><span class=\"gram-eng\">I wouldn't have texted him.</span> <span class=\"gram-trans\">(Eu não teria mandado mensagem pra ele.)</span></li><li><span class=\"gram-eng\">You should have said something.</span> <span class=\"gram-trans\">(Você deveria ter dito alguma coisa.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Estrutura: modal + HAVE + particípio (told, lied, done).</li><li>Na fala, &quot;have&quot; reduz para /əv/ (soa como &quot;should've&quot;). Tudo se refere ao PASSADO.</li></ul></div></div>"},
{"order": 107, "badge": "107", "topic": "Reported Speech: Requests", "book": "Interchange 2", "ref": "Interchange 2 - pg. 107 (Unit 16)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para relatar pedidos e ordens de outra pessoa usamos said to / told (someone) to / asked (someone) to + infinitivo. Pedidos negativos levam &quot;not to&quot;.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Ordem afirmativa</h5><p>said to / told someone to + verbo<br>&quot;She told me to arrive on time.&quot;</p><h5 class=\"gram-subhead\">Ordem negativa</h5><p>said not to / told someone not to + verbo<br>&quot;He told me not to leave my bike.&quot;</p><h5 class=\"gram-subhead\">Pedido (Can you...?)</h5><p>asked someone to + verbo<br>&quot;She asked me to pick up some food.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">She told me to arrive on time for the meeting.</span> <span class=\"gram-trans\">(Ela me disse para chegar na hora da reunião.)</span></li><li><span class=\"gram-eng\">He told me not to leave my bike in the hallway.</span> <span class=\"gram-trans\">(Ele me disse para não deixar minha bici no corredor.)</span></li><li><span class=\"gram-eng\">She asked me to pick up some food on the way home.</span> <span class=\"gram-trans\">(Ela me pediu para comprar comida no caminho de casa.)</span></li><li><span class=\"gram-eng\">He told them to meet at his apartment at 7:30.</span> <span class=\"gram-trans\">(Ele disse a eles para se encontrarem no apartamento dele às 19h30.)</span></li><li><span class=\"gram-eng\">Aki asked us to help her clean up.</span> <span class=\"gram-trans\">(A Aki nos pediu para ajudá-la a limpar.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;tell/ask&quot; precisam de objeto (told ME, asked US); &quot;say&quot; não leva objeto (said to arrive).</li><li>Pedido = ask; ordem/instrução = tell. Negativo: &quot;not to&quot; antes do verbo.</li></ul></div></div>"},
{"order": 109, "badge": "109", "topic": "Reported Speech: Statements", "book": "Interchange 2", "ref": "Interchange 2 - pg. 109 (Unit 16)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Para relatar o que alguém disse (afirmações), usamos said/told + (that) + oração, e o verbo geralmente &quot;recua&quot; um tempo (presente vira passado, will vira would, etc.).</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">presente → passado</h5><p>am/is→was, are→were<br>&quot;&quot;I'm not feeling well&quot; → She said she wasn't feeling well.&quot;</p><h5 class=\"gram-subhead\">have/made → had / had made</h5><p>o passado recua para o mais-que-perfeito<br>&quot;&quot;I made a date&quot; → she had made a date.&quot;</p><h5 class=\"gram-subhead\">will→would, can→could, may→might</h5><p>modais recuam<br>&quot;&quot;We will be out&quot; → they would be out.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">She said she wasn't feeling well.</span> <span class=\"gram-trans\">(Ela disse que não estava se sentindo bem.)</span></li><li><span class=\"gram-eng\">She said she had houseguests for the weekend.</span> <span class=\"gram-trans\">(Ela disse que tinha visitas para o fim de semana.)</span></li><li><span class=\"gram-eng\">They told me they couldn't come tomorrow.</span> <span class=\"gram-trans\">(Eles me disseram que não podiam vir amanhã.)</span></li><li><span class=\"gram-eng\">They said they would be out of town.</span> <span class=\"gram-trans\">(Eles disseram que estariam fora da cidade.)</span></li><li><span class=\"gram-eng\">Mason said he already had plans for Saturday.</span> <span class=\"gram-trans\">(O Mason disse que já tinha planos para sábado.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>O verbo recua um tempo: am/is→was, have→had, will→would, can→could, may→might.</li><li>&quot;tell&quot; pede objeto (told ME); &quot;say&quot; não (said that...).</li></ul></div></div>"}
  ],

{"order": 3, "badge": "3", "topic": "Relative Pronouns (Who/That)", "book": "Interchange 3", "ref": "Interchange 3 - pg. 03 (Unit 1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos os pronomes relativos who/that para dar mais informação sobre pessoas, ligando duas ideias numa só frase. Eles podem funcionar como sujeito ou como objeto da oração relativa.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Como SUJEITO da oração (NÃO pode ser omitido)</h5><p>pessoa + who/that + verbo...<br>&quot;I like people who/that have a good sense of humor.&quot;</p><h5 class=\"gram-subhead\">Como OBJETO da oração (PODE ser omitido)</h5><p>pessoa + (who/that) + sujeito + verbo...<br>&quot;I want someone (who/that) I can have fun with.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I like people who aren't too serious.</span> <span class=\"gram-trans\">(Gosto de gente que não é séria demais.)</span></li><li><span class=\"gram-eng\">I have some good, old friends who/that I met in middle school.</span> <span class=\"gram-trans\">(Tenho bons e velhos amigos que conheci no ensino fundamental.)</span></li><li><span class=\"gram-eng\">I'd like to have a boss who/that I can respect as a leader.</span> <span class=\"gram-trans\">(Eu gostaria de ter um chefe que eu possa respeitar como líder.)</span></li><li><span class=\"gram-eng\">I'm looking for a partner who/that I have a lot in common with.</span> <span class=\"gram-trans\">(Estou procurando um parceiro com quem eu tenha muito em comum.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Quando who/that é OBJETO, pode ser cortado (&quot;someone I can talk to&quot;). Quando é SUJEITO, NUNCA pode sumir.</li></ul></div></div>"},
{"order": 6, "badge": "6", "topic": "It Clauses + Adverbial Clauses with When", "book": "Interchange 3", "ref": "Interchange 3 - pg. 06 (Unit 1)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Usamos orações com it + when para falar de como nos sentimos diante de certas situações. A oração com when descreve a situação que provoca o sentimento.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Reação + it + when...</h5><p>I like / I don't mind / I can't stand + it + when...<br>&quot;I like it when my roommate cleans the apartment.&quot;</p><h5 class=\"gram-subhead\">It + reação + when...</h5><p>It makes me happy / It bothers me / It upsets me + when...<br>&quot;It makes me happy when people do nice things for no reason.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">I don't mind it when a friend answers the phone at the dinner table.</span> <span class=\"gram-trans\">(Não me incomoda quando um amigo atende o telefone na mesa de jantar.)</span></li><li><span class=\"gram-eng\">I can't stand it when people tell me to calm down.</span> <span class=\"gram-trans\">(Não suporto quando me mandam ficar calmo.)</span></li><li><span class=\"gram-eng\">It bothers me when my doctor arrives late for an appointment.</span> <span class=\"gram-trans\">(Me incomoda quando meu médico chega atrasado para a consulta.)</span></li><li><span class=\"gram-eng\">It upsets me when a close friend forgets my birthday.</span> <span class=\"gram-trans\">(Me chateia quando um amigo próximo esquece meu aniversário.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Não esqueça o &quot;it&quot; depois de like, don't mind, can't stand. Em português a gente omite, mas em inglês ele é obrigatório.</li></ul></div></div>"},
{"order": 9, "badge": "9", "topic": "Gerund Phrases (Subjects and Objects)", "book": "Interchange 3", "ref": "Interchange 3 - pg. 09 (Unit 2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Frases com gerúndio (verbo + -ing) podem funcionar como sujeito ou objeto da frase. Servem para falar de atividades e ações como se fossem &quot;coisas&quot;.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Gerúndio como SUJEITO</h5><p>Gerund phrase + verbo...<br>&quot;Playing games all day would be lots of fun.&quot;</p><h5 class=\"gram-subhead\">Gerúndio como OBJETO (depois de verbo ou preposição)</h5><p>...verbo/preposição + gerund phrase<br>&quot;She'd enjoy working with animals.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Being a flight attendant sounds exciting.</span> <span class=\"gram-trans\">(Ser comissário de bordo parece empolgante.)</span></li><li><span class=\"gram-eng\">Working as a veterinarian could be rewarding.</span> <span class=\"gram-trans\">(Trabalhar como veterinário pode ser gratificante.)</span></li><li><span class=\"gram-eng\">He'd love being a flight attendant.</span> <span class=\"gram-trans\">(Ele adoraria ser comissário de bordo.)</span></li><li><span class=\"gram-eng\">She'd be good at testing games.</span> <span class=\"gram-trans\">(Ela seria boa em testar jogos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>Depois de preposição (at, about, in, of) sempre vem gerúndio, nunca infinitivo: &quot;good at testing&quot; (e não &quot;good at to test&quot;).</li></ul></div></div>"},
{"order": 11, "badge": "11", "topic": "Comparisons", "book": "Interchange 3", "ref": "Interchange 3 - pg. 11 (Unit 2)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Comparações mostram diferenças e semelhanças entre pessoas, coisas ou ações. A forma muda conforme o que comparamos: adjetivos, verbos, substantivos ou particípios.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Com ADJETIVOS</h5><p>more/less + adj + than  |  adj+er + than  |  (not) as + adj + as<br>&quot;Being a firefighter is more stressful than being a sales associate.&quot;</p><h5 class=\"gram-subhead\">Com VERBOS</h5><p>verbo + more/less than  |  verbo + as much as<br>&quot;A nutritionist earns less than a doctor.&quot;</p><h5 class=\"gram-subhead\">Com SUBSTANTIVOS</h5><p>more/less + noun + than  |  (not) as much/many + noun + as<br>&quot;Doctors have more education than nutritionists.&quot;</p><h5 class=\"gram-subhead\">Com PARTICÍPIOS</h5><p>better/worse + p.p. + than  |  (not) as well + p.p. + as<br>&quot;Banking is better paid than sales.&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Sales associates have better hours than firefighters.</span> <span class=\"gram-trans\">(Vendedores têm horários melhores que bombeiros.)</span></li><li><span class=\"gram-eng\">A career in banking is more demanding than a career in sales.</span> <span class=\"gram-trans\">(Uma carreira em banco é mais exigente que uma em vendas.)</span></li><li><span class=\"gram-eng\">Game testers don't need as much experience as software developers.</span> <span class=\"gram-trans\">(Testadores de jogos não precisam de tanta experiência quanto desenvolvedores.)</span></li><li><span class=\"gram-eng\">Nutritionists aren't as well paid as doctors.</span> <span class=\"gram-trans\">(Nutricionistas não são tão bem pagos quanto médicos.)</span></li></ul></div></div><div class=\"gram-section gram-section-observacoes\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">💡</span><span class=\"gram-section-title\">Dica</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li>&quot;as much as&quot; para incontáveis/verbos; &quot;as many as&quot; para contáveis. E cuidado: é &quot;as well paid&quot; (advérbio well), não &quot;as good paid&quot;.</li></ul></div></div>"},
{"order": 17, "badge": "17", "topic": "Requests with Modals, If Clauses, and Gerunds", "book": "Interchange 3", "ref": "Interchange 3 - pg. 17 (Unit 3)", "html": "<div class=\"gram-section gram-section-explicacao\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">📖</span><span class=\"gram-section-title\">Explicação</span></div><div class=\"gram-section-body\"><p>Há várias formas de fazer pedidos em inglês, do mais informal ao mais formal. O que muda é o modal, o uso de if e do gerúndio.</p></div></div><div class=\"gram-section gram-section-estrutura\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">🔧</span><span class=\"gram-section-title\">Estrutura</span></div><div class=\"gram-section-body\"><h5 class=\"gram-subhead\">Menos formal (modais diretos)</h5><p>Can/Could you...?  |  Do you mind if + presente...?<br>&quot;Could you lend me your truck, please?&quot;</p><h5 class=\"gram-subhead\">Mais formal (if + passado / I was wondering)</h5><p>Would you mind if + passado...?  |  I was wondering if you could...<br>&quot;Would you mind if I borrowed your truck?&quot;</p><h5 class=\"gram-subhead\">Would you mind + gerúndio</h5><p>Would you mind + gerund...?<br>&quot;Would you mind helping me on Sunday?&quot;</p></div></div><div class=\"gram-section gram-section-exemplos\"><div class=\"gram-section-head\"><span class=\"gram-section-icon\">✅</span><span class=\"gram-section-title\">Exemplos</span></div><div class=\"gram-section-body\"><ul class=\"gram-bullets\"><li><span class=\"gram-eng\">Is it OK if I use your credit card?</span> <span class=\"gram-trans\">(Tudo bem se eu usar seu cartão de crédito?)</span></li><li><span class=\"gram-eng\">Would it be all right if I used your credit card?</span> <span class=\"gram-trans\">(Tudo bem se eu usasse seu cartão de crédito? — mais formal)</span></li><li><span class=\"gram-eng\">I was wondering if you could help me move.</span> <span class=\"gram-trans\">(Eu queria saber se você poderia me aj
