<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Biblioteca — EA English Classes</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css">
<!-- html2canvas para gerar PNG dos cards de gramática (~195KB, servido localmente) -->
<script src="html2canvas.min.js" defer></script>
<style>
/* ════════════════════════════════════════════════════════
   📚 BIBLIOTECA PEDAGÓGICA — Timeline Design (v7.3)
   Inspirado em cursos.html, com linha do tempo cinematográfica
   ════════════════════════════════════════════════════════ */

* { box-sizing: border-box; }

/* === HERO === */
.bib-hero {
  background: linear-gradient(135deg, var(--navy) 0%, #1a2d6d 60%, #253c96 100%);
  padding: 80px 0 120px;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.bib-hero::before {
  content: '';
  position: absolute;
  top: -30%; right: -10%;
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(243,107,46,0.18), transparent 60%);
  border-radius: 50%;
  animation: heroBlobFloat 18s ease-in-out infinite;
}
.bib-hero::after {
  content: '';
  position: absolute;
  bottom: -30%; left: -10%;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(196,231,229,0.12), transparent 60%);
  border-radius: 50%;
  animation: heroBlobFloat 22s ease-in-out infinite reverse;
}
@keyframes heroBlobFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(-30px, 40px) scale(1.08); }
}
.bib-hero .container { position: relative; z-index: 1; }
.bib-back {
  color: rgba(255,255,255,0.55);
  font-size: 13px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 6px;
  margin-bottom: 22px;
  text-decoration: none;
  transition: all 0.2s;
}
.bib-back:hover { color: #fff; transform: translateX(-2px); }
.bib-eyebrow {
  display: inline-block;
  padding: 6px 14px; border-radius: 999px;
  background: rgba(245,154,30,0.15);
  border: 1px solid rgba(245,154,30,0.4);
  color: var(--mango);
  font-size: 11px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 16px;
}
.bib-title {
  font-family: 'Fraunces', serif;
  font-size: clamp(2.2rem, 5vw, 3.4rem);
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
  line-height: 1.05;
}
.bib-title em { color: var(--mango); font-style: italic; }
.bib-sub {
  font-size: 15.5px; opacity: 0.7;
  max-width: 580px; line-height: 1.55;
}

/* Search refinado */
.bib-search {
  position: relative;
  max-width: 460px;
  margin-top: 26px;
}
.bib-search input {
  width: 100%;
  padding: 14px 18px 14px 46px;
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  color: #fff;
  font-family: inherit; font-size: 14px;
  outline: none;
  transition: all 0.25s;
}
.bib-search input::placeholder { color: rgba(255,255,255,0.4); }
.bib-search input:focus {
  border-color: var(--mango);
  background: rgba(255,255,255,0.14);
  box-shadow: 0 0 0 4px rgba(245,154,30,0.12);
}
.bib-search svg {
  position: absolute; left: 16px; top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
}

/* === LEVEL NAVIGATOR (capas dos livros no hero) === */
.journey-wrap {
  margin-top: 44px;
  position: relative;
}
.j-line {
  position: absolute;
  top: 78px;
  left: 8%; right: 8%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18) 18%, rgba(255,255,255,0.18) 82%, transparent);
  z-index: 0;
  pointer-events: none;
}
.journey-bar {
  display: flex;
  justify-content: center;
  gap: clamp(18px, 4vw, 44px);
  position: relative;
  flex-wrap: wrap;
  z-index: 1;
}
.j-step {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
  cursor: pointer;
  padding: 4px;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  background: transparent;
  border: none;
  color: inherit;
  font-family: inherit;
  position: relative;
}
.j-step:hover { transform: translateY(-4px); }

.j-cover {
  width: 92px;
  height: 130px;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.18);
  box-shadow: 0 8px 22px rgba(0,0,0,0.32);
  transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  filter: saturate(0.7) brightness(0.8);
}
.j-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.j-cover::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.35) 100%);
  pointer-events: none;
}
.j-step:hover .j-cover {
  filter: saturate(1) brightness(1);
  border-color: rgba(255,255,255,0.5);
  transform: scale(1.05);
}
.j-step:hover .j-cover img { transform: scale(1.06); }

.j-step.active .j-cover {
  filter: saturate(1.05) brightness(1.02);
  border-color: var(--j-glow, var(--mango));
  box-shadow: 0 12px 32px var(--j-shadow, rgba(245,154,30,0.55)), 0 0 0 4px rgba(255,255,255,0.08);
  transform: scale(1.08);
}
.j-step.active .j-cover::before {
  content: '';
  position: absolute;
  top: 8px; right: 8px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--j-glow, var(--mango));
  box-shadow: 0 0 0 4px rgba(255,255,255,0.25), 0 2px 8px rgba(0,0,0,0.3);
  z-index: 2;
  animation: jDotPulse 2s ease-out infinite;
}
@keyframes jDotPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.25); opacity: 0.7; }
}

.j-label {
  font-size: 11.5px; font-weight: 800;
  opacity: 0.6;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
  transition: all 0.25s;
  text-align: center;
}
.j-step:hover .j-label { opacity: 0.9; }
.j-step.active .j-label { opacity: 1; }

/* Cores por nível — espelhando as capas reais */
.j-step[data-level="intro"] { --j-glow: var(--mango); --j-shadow: rgba(245,154,30,0.55); }
.j-step[data-level="intro"].active .j-label { color: var(--mango); }

.j-step[data-level="lvl1"] { --j-glow: #ef4444; --j-shadow: rgba(239,68,68,0.55); }
.j-step[data-level="lvl1"].active .j-label { color: #f87171; }

.j-step[data-level="lvl2"] { --j-glow: #60a5fa; --j-shadow: rgba(96,165,250,0.55); }
.j-step[data-level="lvl2"].active .j-label { color: #93c5fd; }

.j-step[data-level="lvl3"] { --j-glow: #34d399; --j-shadow: rgba(52,211,153,0.55); }
.j-step[data-level="lvl3"].active .j-label { color: #6ee7b7; }

/* === TABS (Currículo / Worksheets / Gramática) === */
.bib-tabs-wrap {
  position: relative;
  z-index: 5;
  margin-top: -36px;
  padding: 0 16px;
}
.bib-tabs {
  display: flex;
  gap: 4px;
  background: #fff;
  padding: 6px;
  border-radius: 16px;
  border: 1px solid var(--g100);
  max-width: 580px;
  margin: 0 auto;
  box-shadow: 0 12px 36px rgba(25,36,78,0.12);
}
.bib-tab {
  flex: 1;
  padding: 14px 12px;
  border: none;
  border-radius: 11px;
  background: transparent;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  color: var(--g500);
  cursor: pointer;
  transition: all 0.25s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: -0.005em;
}
.bib-tab:hover { background: var(--g50); color: var(--navy); }
.bib-tab.active {
  background: var(--navy);
  color: #fff;
  box-shadow: 0 4px 12px rgba(25,36,78,0.25);
}
.bib-tab svg { flex-shrink: 0; }

/* === CONTENT === */
.bib-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}
.bib-view { display: none; }
.bib-view.active { display: block; animation: bibFade 0.45s cubic-bezier(0.4,0,0.2,1); }
@keyframes bibFade {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Section intro */
.view-intro {
  text-align: center;
  margin-bottom: 56px;
}
.view-intro-eyebrow {
  display: inline-block;
  padding: 6px 14px; border-radius: 999px;
  background: var(--mango-soft);
  color: var(--orange);
  font-size: 11px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 14px;
}
.view-intro h2 {
  font-family: 'Fraunces', serif;
  font-size: clamp(1.8rem, 3.5vw, 2.4rem);
  font-weight: 800;
  color: var(--navy);
  letter-spacing: -0.02em;
  margin-bottom: 8px;
  line-height: 1.15;
}
.view-intro h2 em { color: var(--orange); font-style: italic; }
.view-intro p {
  font-size: 14.5px; color: var(--g500);
  max-width: 520px; margin: 0 auto;
  line-height: 1.6;
}

/* ════════════════════════════════════════════════════════
   📋 CURRÍCULO — Carrossel horizontal com zigzag de capa
   ════════════════════════════════════════════════════════ */
.cur-carousel {
  position: relative;
  max-width: 1180px;
  margin: 0 auto;
  padding: 8px 0 40px;
}

/* Track = container que desliza */
.cur-viewport {
  position: relative;
  overflow: hidden;
  border-radius: 24px;
}
.cur-track {
  display: flex;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  will-change: transform;
  touch-action: pan-y;
}
.cur-slide {
  flex: 0 0 100%;
  min-width: 0;
  padding: 24px;
}

/* Card do slide: livro + info, alternando lado */
.cur-row {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 56px;
  align-items: center;
  background: #fff;
  border: 1px solid var(--g100);
  border-radius: 22px;
  padding: 40px 44px;
  box-shadow: 0 12px 40px rgba(25,36,78,0.06);
  position: relative;
  overflow: hidden;
  min-height: 460px;
}
.cur-row::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: linear-gradient(90deg, var(--lvl-color, var(--mango)), var(--lvl-color-2, var(--orange)));
}
.cur-slide:nth-child(even) .cur-row {
  grid-template-columns: 1fr 360px;
}
.cur-slide:nth-child(even) .cur-row-img { order: 2; }
.cur-slide:nth-child(even) .cur-row-info { order: 1; }

/* Lado do livro */
.cur-row-img {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  height: 100%;
}
.cur-book-stage {
  position: relative;
  width: 100%;
  max-width: 320px;
  aspect-ratio: 3 / 4.2;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cur-book-stage::before {
  content: '';
  position: absolute;
  inset: -20px;
  background: radial-gradient(circle at 50% 60%, var(--lvl-color-glow, rgba(245,154,30,0.18)), transparent 65%);
  z-index: 0;
}
.cur-book-stage img {
  position: relative;
  z-index: 1;
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
  border-radius: 6px;
  box-shadow:
    0 20px 50px rgba(0,0,0,0.22),
    0 4px 12px rgba(0,0,0,0.10);
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
}
.cur-row:hover .cur-book-stage img {
  transform: translateY(-6px) rotate(-1.5deg);
}
.cur-unit-badge {
  position: absolute;
  top: 12px; right: 12px;
  z-index: 2;
  width: 64px; height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--lvl-color, var(--mango)), var(--lvl-color-2, var(--orange)));
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Fraunces', serif;
  box-shadow: 0 8px 22px var(--lvl-color-glow, rgba(245,154,30,0.45));
  transform: rotate(8deg);
}
.cur-unit-badge .cur-unit-badge-label {
  font-size: 8.5px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.92;
  line-height: 1;
  margin-bottom: 2px;
}
.cur-unit-badge .cur-unit-badge-num {
  font-size: 24px;
  font-weight: 900;
  line-height: 1;
}

/* Lado da informação */
.cur-row-info {
  min-width: 0;
}
.cur-info-head {
  margin-bottom: 22px;
}
.cur-unit-tag {
  display: inline-block;
  font-size: 10.5px; font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--lvl-color, var(--orange));
  padding: 5px 12px;
  background: var(--lvl-color-soft, var(--mango-soft));
  border-radius: 999px;
  margin-bottom: 14px;
}
.cur-title {
  font-family: 'Fraunces', serif;
  font-size: clamp(22px, 2.6vw, 30px);
  font-weight: 800;
  color: var(--navy);
  letter-spacing: -0.015em;
  line-height: 1.18;
  margin: 0;
}

.cur-meta-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 18px;
}
.cur-meta-item {
  display: flex; gap: 12px;
  align-items: flex-start;
  font-size: 13.5px;
  line-height: 1.5;
}
.cur-meta-icon {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 8px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800;
  letter-spacing: 0.04em;
}
.cur-meta-icon.voc { background: rgba(245,154,30,0.13); color: var(--mango); }
.cur-meta-icon.gra { background: rgba(37,60,150,0.13); color: var(--blue); }
.cur-meta-icon.obj { background: rgba(16,185,129,0.13); color: #10b981; }
.cur-meta-icon.wri { background: rgba(139,92,246,0.13); color: #7c3aed; }
.cur-meta-text { color: var(--g700); flex: 1; min-width: 0; }
.cur-meta-text strong {
  display: block;
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--g400);
  margin-bottom: 3px;
}

/* Setas de navegação */
.cur-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 5;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: #fff;
  border: 1.5px solid var(--g100);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 10px 28px rgba(25,36,78,0.14);
  color: var(--navy);
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  font-family: inherit;
}
.cur-nav:hover:not([disabled]) {
  background: var(--lvl-color, var(--navy));
  border-color: var(--lvl-color, var(--navy));
  color: #fff;
  transform: translateY(-50%) scale(1.08);
}
.cur-nav[disabled] {
  opacity: 0.35;
  cursor: not-allowed;
  box-shadow: 0 4px 10px rgba(25,36,78,0.06);
}
.cur-nav svg { width: 22px; height: 22px; }
.cur-nav-prev { left: -10px; }
.cur-nav-next { right: -10px; }

/* Indicador de progresso */
.cur-progress {
  margin-top: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.cur-progress-info {
  display: flex; align-items: center; gap: 12px;
  font-size: 12.5px;
  color: var(--g500);
  font-weight: 600;
}
.cur-progress-info strong {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 900;
  color: var(--lvl-color, var(--navy));
}
.cur-progress-info .cur-progress-sep {
  width: 1px; height: 16px;
  background: var(--g100);
}
.cur-dots {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 720px;
}
.cur-dot {
  width: 28px; height: 4px;
  background: var(--g100);
  border: none;
  border-radius: 99px;
  cursor: pointer;
  padding: 0;
  transition: all 0.3s ease;
}
.cur-dot:hover { background: var(--g200); transform: scaleY(1.5); }
.cur-dot.active {
  background: var(--lvl-color, var(--mango));
  width: 40px;
}

/* Cores por nível */
.cur-carousel[data-level="intro"] {
  --lvl-color: var(--mango);
  --lvl-color-2: var(--orange);
  --lvl-color-soft: var(--mango-soft);
  --lvl-color-glow: rgba(245,154,30,0.30);
}
.cur-carousel[data-level="lvl1"] {
  --lvl-color: #ef4444;
  --lvl-color-2: #dc2626;
  --lvl-color-soft: #fee2e2;
  --lvl-color-glow: rgba(239,68,68,0.28);
}
.cur-carousel[data-level="lvl2"] {
  --lvl-color: #3b82f6;
  --lvl-color-2: #2563eb;
  --lvl-color-soft: #dbeafe;
  --lvl-color-glow: rgba(59,130,246,0.28);
}
.cur-carousel[data-level="lvl3"] {
  --lvl-color: #10b981;
  --lvl-color-2: #059669;
  --lvl-color-soft: #d1fae5;
  --lvl-color-glow: rgba(16,185,129,0.28);
}

/* ════════════════════════════════════════════════════════
   📄 WORKSHEETS — Timeline horizontal compacta
   ════════════════════════════════════════════════════════ */
.ws-timeline {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
  max-width: 1080px;
  margin: 0 auto;
}
.ws-card {
  background: #fff;
  border: 1.5px solid var(--g100);
  border-radius: 16px;
  padding: 20px 18px;
  display: flex; flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  cursor: default;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  overflow: hidden;
  opacity: 0;
  transform: translateY(20px);
}
.ws-card.in-view {
  opacity: 1; transform: translateY(0);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.ws-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--lvl-color, var(--mango)), var(--lvl-color-2, var(--orange)));
  transform: scaleX(0.3);
  transform-origin: left;
  transition: transform 0.35s ease;
}
.ws-card:hover {
  transform: translateY(-6px);
  border-color: var(--lvl-color, var(--mango));
  box-shadow: 0 16px 40px rgba(25,36,78,0.12);
}
.ws-card:hover::before { transform: scaleX(1); }

.ws-card[data-level="intro"] { --lvl-color: #fbbf24; --lvl-color-2: var(--mango); }
.ws-card[data-level="lvl1"] { --lvl-color: #f87171; --lvl-color-2: #dc2626; }
.ws-card[data-level="lvl2"] { --lvl-color: #60a5fa; --lvl-color-2: #2563eb; }
.ws-card[data-level="lvl3"] { --lvl-color: #6ee7b7; --lvl-color-2: #059669; }

.ws-num-wrap {
  width: 62px; height: 62px;
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--lvl-color, #fbbf24) 0%, var(--lvl-color-2, var(--mango)) 100%);
  color: #fff;
  font-family: 'Fraunces', serif;
  font-size: 28px; font-weight: 900;
  box-shadow: 0 6px 16px rgba(0,0,0,0.10);
  margin-bottom: 4px;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.ws-card:hover .ws-num-wrap {
  transform: rotate(-6deg) scale(1.06);
}
.ws-label {
  font-size: 11px;
  color: var(--g500);
  font-weight: 700;
  text-align: center;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.ws-actions {
  display: flex; gap: 6px;
  margin-top: 8px;
  width: 100%;
}
.ws-btn {
  flex: 1;
  display: inline-flex;
  align-items: center; justify-content: center;
  gap: 4px;
  padding: 9px 8px;
  border-radius: 10px;
  font-size: 11.5px; font-weight: 700;
  text-decoration: none;

.gram-timeline {
  position: relative;
  max-width: 820px;
  margin: 0 auto;
  padding-left: 50px;
}
.gram-timeline::before {
  content: '';
  position: absolute;
  left: 21px;
  top: 12px; bottom: 12px;
  width: 2px;
  background: linear-gradient(180deg,
    transparent,
    var(--lvl-color, var(--blue)) 8%,
    var(--lvl-color, var(--blue)) 92%,
    transparent);
  opacity: 0.4;
  border-radius: 1px;
}
.gram-item {
  position: relative;
  margin-bottom: 14px;
  opacity: 0;
  transform: translateX(-12px);
  transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
}
.gram-item.in-view {
  opacity: 1; transform: translateX(0);
}
.gram-item::before {
  content: '';
  position: absolute;
  left: -36px; top: 22px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  border: 3px solid var(--lvl-color, var(--blue));
  box-shadow: 0 0 0 5px rgba(255,255,255,0.5), 0 4px 10px rgba(25,36,78,0.10);
  z-index: 1;
  transition: all 0.3s ease;
}
.gram-item:hover::before {
  background: var(--lvl-color, var(--blue));
  transform: scale(1.2);
}
.gram-item::after {
  content: '';
  position: absolute;
  left: -22px; top: 28px;
  width: 22px; height: 2px;
  background: var(--lvl-color, var(--blue));
  opacity: 0.35;
}

{order:3,badge:'3',topic:'POSSESSIVE ADJECTIVES & VERB TO BE',book:'Intro',ref:'Intro - pg. 3',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta página apresenta dois tópicos fundamentais para iniciantes:</p><p>1) POSSESSIVE ADJECTIVES (Adjetivos Possessivos)<br>São palavras utilizadas para demonstrar posse, ou seja, indicam a quem<br>pertence algo. Eles sempre vêm ANTES de um substantivo (objeto possuído).</p><p>2) VERBO \'TO BE\' (Presente)<br>O verbo \'to be\' expressa as ideias de "SER" ou "ESTAR" em português.<br>No tempo presente, ele possui TRÊS formas diferentes: AM, IS e ARE.<br>A forma utilizada depende do sujeito da frase.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">POSSESSIVE ADJECTIVES:</h5><p>MY = Meu / Minha<br>YOUR = Seu / Sua / Teu / Tua<br>HIS = Dele<br>HER = Dela<br>ITS = Dele/Dela (para objetos/animais)<br>OUR = Nosso / Nossa<br>THEIR = Deles / Delas</p><p>Estrutura: POSSESSIVE ADJECTIVE + SUBSTANTIVO</p><h5 class="gram-subhead">VERBO \'TO BE\' NO PRESENTE:</h5><p>I + AM (I\'m)<br>YOU + ARE (You\'re)<br>HE / SHE / IT + IS (He\'s / She\'s / It\'s)<br>WE + ARE (We\'re)<br>THEY + ARE (They\'re)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">POSSESSIVE ADJECTIVES:</h5><ul class="gram-bullets"><li><span class="gram-eng">His car is beautiful.</span> <span class="gram-trans">(O carro DELE é bonito.)</span></li><li><span class="gram-eng">Her house is yellow.</span> <span class="gram-trans">(A casa DELA é amarela.)</span></li><li><span class="gram-eng">My dog is there.</span> <span class="gram-trans">(MEU cachorro está ali.)</span></li><li><span class="gram-eng">Your school is big.</span> <span class="gram-trans">(SUA escola é grande.)</span></li></ul><h5 class="gram-subhead">VERBO TO BE:</h5><ul class="gram-bullets"><li><span class="gram-eng">I am a teacher.</span> <span class="gram-trans">(Eu SOU professor.)</span></li><li><span class="gram-eng">You are a nice friend.</span> <span class="gram-trans">(Você É um bom amigo.)</span></li><li><span class="gram-eng">She is a doctor.</span> <span class="gram-trans">(Ela É médica.)</span></li><li><span class="gram-eng">He is my father.</span> <span class="gram-trans">(Ele É meu pai.)</span></li><li><span class="gram-eng">It is a nice city.</span> <span class="gram-trans">(É uma cidade legal.)</span></li><li><span class="gram-eng">We are a family.</span> <span class="gram-trans">(Nós SOMOS uma família.)</span></li><li><span class="gram-eng">They are nice people.</span> <span class="gram-trans">(Eles SÃO pessoas legais.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>Os possessive adjectives NUNCA aparecem sozinhos - sempre acompanham um substantivo. (Ex.: "my book", "her phone")</li><li>Não confunda: HIS (dele) é para homens, HER (dela) é para mulheres.</li><li>O verbo TO BE pode ser contraído: I\'m, you\'re, he\'s, she\'s, it\'s, we\'re, they\'re - muito comum no inglês cotidiano.</li></ul></div></div>'},
{order:17,badge:'17',topic:'VERBO TO BE - FORMA NEGATIVA',book:'Intro',ref:'Intro - pg. 17',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Quando queremos NEGAR uma frase no Simple Present utilizando o verbo TO BE,<br>basta adicionar a palavra "NOT" logo APÓS o verbo (am, is, are).</p><p>Não usamos os auxiliares "don\'t" ou "doesn\'t" com o verbo to be - a negação<br>é feita diretamente com NOT.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><p>SUJEITO + AM / IS / ARE + NOT + COMPLEMENTO</p><h5 class="gram-subhead">FORMAS CONTRAÍDAS (mais comuns no inglês falado):</h5><p>IS + NOT = ISN\'T<br>ARE + NOT = AREN\'T<br>AM + NOT = (não tem contração padrão, usa-se "I\'m not")</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">FORMA COMPLETA:</h5><ul class="gram-bullets"><li><span class="gram-eng">He is not a teacher.</span> <span class="gram-trans">(Ele NÃO É professor.)</span></li><li><span class="gram-eng">You are not sad.</span> <span class="gram-trans">(Você NÃO ESTÁ triste.)</span></li><li><span class="gram-eng">I am not tired.</span> <span class="gram-trans">(Eu NÃO ESTOU cansado.)</span></li><li><span class="gram-eng">They are not at home.</span> <span class="gram-trans">(Eles NÃO ESTÃO em casa.)</span></li></ul><h5 class="gram-subhead">FORMA CONTRAÍDA:</h5><ul class="gram-bullets"><li><span class="gram-eng">He isn\'t a teacher.</span> <span class="gram-trans">(Ele não é professor.)</span></li><li><span class="gram-eng">You aren\'t sad.</span> <span class="gram-trans">(Você não está triste.)</span></li><li><span class="gram-eng">I\'m not tired.</span> <span class="gram-trans">(Eu não estou cansado.)</span></li><li><span class="gram-eng">They aren\'t at home.</span> <span class="gram-trans">(Eles não estão em casa.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>A forma contraída é mais comum em conversação informal.</li><li>Lembre-se: "AM NOT" não possui contração padrão (não existe "amn\'t").</li><li>Em frases negativas com TO BE, NUNCA usamos don\'t/doesn\'t. ❌ He doesn\'t is a teacher. ✔️ He isn\'t a teacher.</li></ul></div></div>'},
{order:20,badge:'20',topic:'WH-QUESTIONS COM O VERBO TO BE',book:'Intro',ref:'Intro - pg. 20',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>WH-Questions são perguntas feitas com palavras interrogativas (que em inglês<br>começam com "WH"). Diferentemente das perguntas de SIM/NÃO, as WH-Questions<br>pedem uma informação específica como resposta.</p><p>Quando usamos essas perguntas com o verbo TO BE, a estrutura é simples:<br>basta começar com a WH-Word, seguida do verbo to be e do sujeito.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><p>WH-WORD + IS / ARE + SUJEITO + (complemento) ?</p><h5 class="gram-subhead">PRINCIPAIS WH-WORDS:</h5><p>WHO = Quem?<br>WHAT = O que? / Qual?<br>WHERE = Onde?<br>WHEN = Quando?<br>WHY = Por quê?<br>HOW = Como?</p><h5 class="gram-subhead">ESTRUTURA ESPECIAL:</h5><p>WHAT + IS/ARE + SUJEITO + LIKE? = COMO É (descritivamente)?</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">Who are you?</span> <span class="gram-trans">(Quem é você?)</span></li><li><span class="gram-eng">Where is your house?</span> <span class="gram-trans">(Onde fica sua casa?)</span></li><li><span class="gram-eng">What is your full name?</span> <span class="gram-trans">(Qual é seu nome completo?)</span></li><li><span class="gram-eng">How is your mother?</span> <span class="gram-trans">(Como está sua mãe?)</span></li><li><span class="gram-eng">When is your birthday?</span> <span class="gram-trans">(Quando é seu aniversário?)</span></li><li><span class="gram-eng">What is Paris like?</span> <span class="gram-trans">(Como é Paris?)</span></li><li><span class="gram-eng">What are your friends like?</span> <span class="gram-trans">(Como são seus amigos?)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>Atenção à diferença entre "How are you?" (Como você está?) e "What are you like?" (Como você é? - personalidade/características).</li><li>"What... like?" é usado para pedir DESCRIÇÃO de algo ou alguém.</li><li>Use IS para sujeitos no singular (he, she, it, name) e ARE para sujeitos no plural (you, we, they, names).</li></ul></div></div>'},
{order:24,badge:'24',topic:'POSSESSIVE PRONOUNS E O POSSESSIVO \'S',book:'Intro',ref:'Intro - pg. 24',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Nesta página estudamos duas formas de expressar POSSE em inglês:</p><p>1) POSSESSIVE PRONOUNS (Pronomes Possessivos)<br>Ao contrário dos POSSESSIVE ADJECTIVES (my, your, his, her), que precisam<br>SEMPRE vir antes de um substantivo, os POSSESSIVE PRONOUNS podem aparecer<br>SOZINHOS na frase - eles já substituem o objeto possuído.</p><p>2) POSSESSIVO COM \'S<br>Usado para indicar posse quando o "dono" é um NOME PRÓPRIO ou substantivo,<br>em vez de um pronome pessoal (he, she, it, we, you, they).</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">POSSESSIVE ADJECTIVES vs POSSESSIVE PRONOUNS:</h5><p>POSSESSIVE ADJECTIVE POSSESSIVE PRONOUN<br>──────────────────── ──────────────────<br>MY MINE<br>YOUR YOURS<br>HIS HIS<br>HER HERS<br>ITS ITS<br>OUR OURS<br>THEIR THEIRS</p><h5 class="gram-subhead">PERGUNTANDO SOBRE POSSE COM "WHOSE":</h5><p>WHOSE + ITEM + IS/ARE + THIS/THESE?</p><h5 class="gram-subhead">POSSESSIVO COM \'S:</h5><p>DONO DO ITEM + \'S + ITEM</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">POSSESSIVE ADJECTIVE vs POSSESSIVE PRONOUN:</h5><ul class="gram-bullets"><li>This is MY HOUSE. (possessive adjective + substantivo)</li><li>The house IS MINE. (possessive pronoun sozinho)</li></ul><p>No segundo exemplo, "mine" aparece SOZINHO, sem o substantivo "house".</p><h5 class="gram-subhead">MAIS EXEMPLOS DE POSSESSIVE PRONOUNS:</h5><ul class="gram-bullets"><li><span class="gram-eng">These shoes are mine.</span> <span class="gram-trans">(Esses sapatos são meus.)</span></li><li><span class="gram-eng">These shoes are yours.</span> <span class="gram-trans">(Esses sapatos são seus.)</span></li><li><span class="gram-eng">These shoes are hers.</span> <span class="gram-trans">(Esses sapatos são dela.)</span></li><li><span class="gram-eng">These shoes are his.</span> <span class="gram-trans">(Esses sapatos são dele.)</span></li></ul><h5 class="gram-subhead">PERGUNTAS COM WHOSE:</h5><p>- Whose shirt is this? (De quem é essa camisa?)<br>- It is mine. (É minha.)</p><p>- Whose books are these? (De quem são esses livros?)<br>- They are hers. (São dela.)</p><h5 class="gram-subhead">POSSESSIVO COM \'S:</h5><ul class="gram-bullets"><li><span class="gram-eng">Michael\'s car</span> <span class="gram-trans">(O carro do Michael)</span></li><li><span class="gram-eng">The dog\'s tail</span> <span class="gram-trans">(O rabo do cachorro)</span></li><li><span class="gram-eng">My mother\'s house</span> <span class="gram-trans">(A casa da minha mãe)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: Use POSSESSIVE ADJECTIVE quando o substantivo aparecer logo depois. Use POSSESSIVE PRONOUN quando o substantivo NÃO aparecer. - This is MY book. (adjective + substantivo) - This book is MINE. (pronoun sozinho)</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Para nomes terminados em S (como "James"), também usa-se \'s: - James\'s car</span> <span class="gram-trans">(ou James\' car em algumas variações)</span></li></ul><ul class="gram-bullets"><li>HIS e ITS são iguais nas duas formas (adjetivo e pronome).</li></ul></div></div>'},
{order:26,badge:'26',topic:'PRESENT CONTINUOUS (Presente Contínuo)',book:'Intro',ref:'Intro - pg. 26 (também em Red book - pg. 32)',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O PRESENT CONTINUOUS é um tempo verbal caracterizado pelo uso do sufixo -ING<br>no final dos verbos. Ele é utilizado para expressar AÇÕES QUE ESTÃO<br>ACONTECENDO NESTE EXATO MOMENTO, em tempo real, no momento da fala.</p><p>Em português, equivale ao "estar + fazendo" (estou comendo, estamos<br>estudando, etc.).</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><p>SUJEITO + BE (am/is/are) + VERBO + ING</p><h5 class="gram-subhead">INTERROGATIVA (Yes/No):</h5><p>BE (am/is/are) + SUJEITO + VERBO + ING ?</p><h5 class="gram-subhead">INTERROGATIVA (Wh-question):</h5><p>WH-WORD + BE (am/is/are) + SUJEITO + VERBO + ING ?</p><h5 class="gram-subhead">NEGATIVA:</h5><p>SUJEITO + BE + NOT + VERBO + ING</p><h5 class="gram-subhead">REGRAS PARA ADICIONAR -ING:</h5><ul class="gram-bullets"><li>Verbos normais: apenas adicione -ING. play → playing | study → studying | read → reading</li><li>Verbos terminados em -E: retire o E e adicione -ING. write → writing | dance → dancing | make → making</li><li>Verbos curtos terminados em consoante-vogal-consoante: dobre a última consoante. run → running | sit → sitting | swim → swimming</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">I am drinking water.</span> <span class="gram-trans">(Estou bebendo água.)</span></li><li><span class="gram-eng">She is studying English.</span> <span class="gram-trans">(Ela está estudando inglês.)</span></li><li><span class="gram-eng">They are playing soccer.</span> <span class="gram-trans">(Eles estão jogando futebol.)</span></li></ul><h5 class="gram-subhead">INTERROGATIVA (Yes/No):</h5><ul class="gram-bullets"><li><span class="gram-eng">Are you studying English?</span> <span class="gram-trans">(Você está estudando inglês?)</span></li><li><span class="gram-eng">Is he working today?</span> <span class="gram-trans">(Ele está trabalhando hoje?)</span></li></ul><h5 class="gram-subhead">INTERROGATIVA (Wh-question):</h5><ul class="gram-bullets"><li><span class="gram-eng">What are you doing today?</span> <span class="gram-trans">(O que você está fazendo hoje?)</span></li><li><span class="gram-eng">Where is she going?</span> <span class="gram-trans">(Aonde ela está indo?)</span></li></ul><h5 class="gram-subhead">NEGATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">I am not working now.</span> <span class="gram-trans">(Eu não estou trabalhando agora.)</span></li><li><span class="gram-eng">She isn\'t studying.</span> <span class="gram-trans">(Ela não está estudando.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>Use Present Continuous para ações ACONTECENDO AGORA, no momento da fala.</li><li>Expressões comuns com este tempo verbal: now, right now, at the moment, today, this week.</li><li>ATENÇÃO: Verbos de estado (love, hate, know, believe, want, etc.) geralmente NÃO são usados na forma -ing. ❌ I am loving this song. ✔️ I love this song.</li></ul></div></div>'},
{order:37,badge:'37',topic:'SIMPLE PRESENT (Presente Simples)',book:'Intro',ref:'Intro - pg. 37 e Intro - pg. 39',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O SIMPLE PRESENT (Presente Simples) é utilizado para expressar:</p><ul class="gram-bullets"><li>Ações corriqueiras e habituais (rotinas)</li><li>Fatos sempre verdadeiros (verdades gerais e universais)</li><li>Preferências, gostos e opiniões</li></ul><p>Atenção especial: na 3ª pessoa do singular (HE, SHE, IT), o verbo principal<br>recebe uma terminação especial (-s, -es ou -ies).</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><p>SUJEITO + VERBO (+ S/ES/IES para he/she/it) + COMPLEMENTO</p><h5 class="gram-subhead">REGRAS PARA HE / SHE / IT:</h5><ul class="gram-bullets"><li>Maioria dos verbos: adicione -S (play → plays)</li><li><span class="gram-eng">Verbos terminados em -O, -CH, -SH, -SS, -X, -Z: adicione -ES</span> <span class="gram-trans">(go → goes | watch → watches | wash → washes | kiss → kisses)</span></li><li><span class="gram-eng">Verbos terminados em CONSOANTE + Y: troque o Y por -IES</span> <span class="gram-trans">(study → studies | try → tries | cry → cries)</span></li><li><span class="gram-eng">Verbos terminados em VOGAL + Y: apenas adicione -S</span> <span class="gram-trans">(play → plays | enjoy → enjoys)</span></li></ul><h5 class="gram-subhead">NEGATIVA:</h5><p>I / YOU / WE / THEY + DON\'T + VERBO (forma original)<br>HE / SHE / IT + DOESN\'T + VERBO (forma original)</p><h5 class="gram-subhead">INTERROGATIVA (Yes/No):</h5><p>DO + I / YOU / WE / THEY + VERBO + complemento ?<br>DOES + HE / SHE / IT + VERBO + complemento ?</p><h5 class="gram-subhead">INTERROGATIVA (Wh-question):</h5><p>WH-WORD + DO/DOES + SUJEITO + VERBO (forma original) ?</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">I go to school.</span> <span class="gram-trans">(Eu vou para a escola.)</span></li><li><span class="gram-eng">She plays video games.</span> <span class="gram-trans">(Ela joga videogame.)</span></li><li><span class="gram-eng">He plays soccer after class.</span> <span class="gram-trans">(Ele joga futebol depois da aula.)</span></li><li><span class="gram-eng">It rains every day.</span> <span class="gram-trans">(Chove todos os dias.)</span></li><li><span class="gram-eng">She goes to the park every day.</span> <span class="gram-trans">(Ela vai ao parque todos os dias.)</span></li></ul><h5 class="gram-subhead">NEGATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">I don\'t like soccer.</span> <span class="gram-trans">(Eu não gosto de futebol.)</span></li><li><span class="gram-eng">We don\'t like black cars.</span> <span class="gram-trans">(Nós não gostamos de carros pretos.)</span></li><li><span class="gram-eng">She doesn\'t eat chocolate.</span> <span class="gram-trans">(Ela não come chocolate.)</span></li><li><span class="gram-eng">He doesn\'t play basketball.</span> <span class="gram-trans">(Ele não joga basquete.)</span></li></ul><h5 class="gram-subhead">INTERROGATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">Do you like fish?</span> <span class="gram-trans">(Você gosta de peixe?)</span></li><li><span class="gram-eng">Does she eat bread?</span> <span class="gram-trans">(Ela come pão?)</span></li><li><span class="gram-eng">Does he play soccer?</span> <span class="gram-trans">(Ele joga futebol?)</span></li></ul><h5 class="gram-subhead">WH-QUESTIONS:</h5><ul class="gram-bullets"><li><span class="gram-eng">Where do you live?</span> <span class="gram-trans">(Onde você mora?)</span></li><li><span class="gram-eng">Where does she study?</span> <span class="gram-trans">(Onde ela estuda?)</span></li><li><span class="gram-eng">What time do you wake up?</span> <span class="gram-trans">(Que horas você acorda?)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>A "armadilha" do -S na terceira pessoa do singular: ❌ She play soccer. ✔️ She plays soccer.</li></ul><ul class="gram-bullets"><li>Quando usamos DOESN\'T ou DOES, o verbo principal volta à forma ORIGINAL (sem -S): ❌ She doesn\'t plays soccer. ✔️ She doesn\'t play soccer. ❌ Does she plays soccer? ✔️ Does she play soccer?</li></ul><ul class="gram-bullets"><li>Verbos irregulares importantes na 3ª pessoa: HAVE → HAS | DO → DOES | GO → GOES</li></ul></div></div>'},
{order:45,badge:'45',topic:'SIMPLE PRESENT - SHORT ANSWERS (Respostas Curtas)',book:'Intro',ref:'Intro - pg. 45',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>No inglês, quando alguém faz uma pergunta no Simple Present com DO/DOES,<br>não respondemos repetindo o verbo principal. Usamos respostas curtas<br>(short answers) com o MESMO auxiliar (do/does) que foi usado na pergunta.</p><p>É considerado pouco natural responder apenas "Yes" ou "No" sozinhos; o<br>inglês prefere as respostas curtas estruturadas.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">PERGUNTA:</h5><p>DO / DOES + SUJEITO + VERBO + COMPLEMENTO ?</p><h5 class="gram-subhead">AUXILIARES POR SUJEITO:</h5><p>DO → I, YOU, WE, THEY<br>DOES → HE, SHE, IT</p><h5 class="gram-subhead">RESPOSTAS CURTAS:</h5><p>AFIRMATIVA: Yes, + SUJEITO + DO/DOES.<br>NEGATIVA: No, + SUJEITO + DON\'T/DOESN\'T.</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM "DO":</h5><p>- Do you like to eat pizza?<br>- Yes, I do. / No, I don\'t.</p><p>- Do they play soccer?<br>- Yes, they do. / No, they don\'t.</p><p>- Do we have class today?<br>- Yes, we do. / No, we don\'t.</p><h5 class="gram-subhead">COM "DOES":</h5><p>- Does he go to school every day?<br>- Yes, he does. / No, he doesn\'t.</p><p>- Does she like coffee?<br>- Yes, she does. / No, she doesn\'t.</p><p>- Does it rain a lot here?<br>- Yes, it does. / No, it doesn\'t.</p></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>NUNCA repita o verbo principal em short answers: ❌ Yes, I like. ✔️ Yes, I do.</li></ul><ul class="gram-bullets"><li>Combine bem o auxiliar com o sujeito da pergunta: - Does HE play? → Yes, HE does. - Do THEY play? → Yes, THEY do.</li></ul><ul class="gram-bullets"><li>Em conversação natural, depois da short answer pode-se adicionar mais informação: - Do you like coffee? - Yes, I do. I drink it every morning.</li></ul></div></div>'},
{order:47,badge:'47',topic:'THERE IS / THERE ARE (Haver / Existir)',book:'Intro',ref:'Intro - pg. 47 e Red book - pg. 51',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>As expressões THERE IS e THERE ARE são usadas para expressar a EXISTÊNCIA<br>de algo ou alguém em um lugar. Equivalem aos verbos "HAVER" ou "EXISTIR"<br>em português.</p><ul class="gram-bullets"><li>THERE IS → usado com substantivos no SINGULAR</li><li>THERE ARE → usado com substantivos no PLURAL</li></ul></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><p>THERE IS + substantivo SINGULAR + complemento<br>THERE ARE + substantivo PLURAL + complemento</p><h5 class="gram-subhead">NEGATIVA (4 formas possíveis):</h5><p>THERE\'S NO + palavra no SINGULAR<br>THERE ISN\'T A + palavra no SINGULAR<br>THERE ARE NO + palavra no PLURAL<br>THERE AREN\'T ANY + palavra no PLURAL</p><h5 class="gram-subhead">INTERROGATIVA:</h5><p>IS THERE + substantivo singular?<br>ARE THERE + substantivo plural?</p><h5 class="gram-subhead">COM SOME / ANY:</h5><p>SOME → usado em frases AFIRMATIVAS (e em ofertas/pedidos)<br>ANY → usado em frases NEGATIVAS e INTERROGATIVAS</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">There is a mirror in my house.</span> <span class="gram-trans">(Há um espelho na minha casa.)</span></li><li>There is a happy man walking on the road.</li><li><span class="gram-eng">There are chairs in my house.</span> <span class="gram-trans">(Há cadeiras na minha casa.)</span></li><li>There are some sad birds on the tree.</li></ul><h5 class="gram-subhead">NEGATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">There\'s no table in the kitchen.</span> <span class="gram-trans">(Não há mesa na cozinha.)</span></li><li><span class="gram-eng">There isn\'t a table in the kitchen.</span> <span class="gram-trans">(Não há uma mesa na cozinha.)</span></li><li><span class="gram-eng">There are no windows in my bedroom.</span> <span class="gram-trans">(Não há janelas no quarto.)</span></li><li>There aren\'t any windows in my bedroom.</li></ul><h5 class="gram-subhead">INTERROGATIVA:</h5><p>- Are there any apples in the basket?<br>- Yes, there are. / No, there aren\'t.</p><p>- Is there a problem?<br>- Yes, there is. / No, there isn\'t.</p></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>Para fazer perguntas, basta INVERTER as posições de "there" e "is/are".</li></ul><ul class="gram-bullets"><li>Cuidado com a tradução literal: em inglês NÃO se usa "have" para dizer "haver/existir": ❌ It has a book on the table. ✔️ There is a book on the table.</li></ul><ul class="gram-bullets"><li>Para substantivos incontáveis (water, milk, money), use SEMPRE "There is": ✔️ There is water in the glass. ✔️ There is no money in my wallet.</li></ul></div></div>'},
{order:54,badge:'54',topic:'ADJECTIVE + NOUN (Adjetivo + Substantivo)',book:'Intro',ref:'Intro - pg. 54',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>No inglês, há duas formas principais de descrever algo ou alguém usando<br>adjetivos, e ambas têm o MESMO significado, mas estruturas diferentes:</p><p>1) Com o verbo TO BE: Sujeito + verbo to be + adjetivo<br>2) Com o verbo HAVE: Sujeito + have + a/an + adjetivo + substantivo</p><p>Uma diferença importante em relação ao português: no inglês, o ADJETIVO<br>geralmente vem ANTES do substantivo (ex.: "nice job", não "job nice").</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA 1 (com TO BE):</h5><p>A/AN + SUJEITO + \'S + JOB/THING + IS + ADJETIVO</p><h5 class="gram-subhead">ESTRUTURA 2 (com HAVE):</h5><p>A/AN + SUJEITO + HAS + A/AN + ADJETIVO + JOB/THING</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">EXEMPLO BÁSICO (ambas as frases têm o mesmo significado):</h5><ul class="gram-bullets"><li>My job is great.</li><li>I have a great job.</li></ul><h5 class="gram-subhead">ESTRUTURA 1 (com \'s + is + adjetivo):</h5><p>✅ A teacher\'s job is nice. (O trabalho de um professor é legal.)<br>✅ A doctor\'s life is busy. (A vida de um médico é ocupada.)<br>✅ A student\'s day is long.</p><h5 class="gram-subhead">ESTRUTURA 2 (have + a/an + adjetivo + substantivo):</h5><p>✅ A teacher has a nice job. (Um professor tem um trabalho legal.)<br>✅ A doctor has a busy life.<br>✅ A student has a long day.</p></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>ATENÇÃO à ordem: ADJETIVO antes do SUBSTANTIVO em inglês: ❌ I have a job nice. ✔️ I have a nice job.</li></ul><ul class="gram-bullets"><li>Use "A" antes de palavras que começam com som de CONSOANTE: - a nice job, a big house</li><li>Use "AN" antes de palavras que começam com som de VOGAL: - an old job, an interesting book</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Lembre-se: o artigo (a/an) acompanha o ADJETIVO, não o substantivo: - a HARD test (não "an hard test") - an EASY test</span> <span class="gram-trans">(não "a easy test")</span></li></ul></div></div>'},
{order:59,badge:'59',topic:'COUNT AND NONCOUNT NOUNS (Contáveis e Incontáveis)',book:'Intro',ref:'Intro - pg. 59',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>No inglês, os substantivos (nouns) são divididos em duas categorias<br>principais conforme a possibilidade de serem CONTADOS ou NÃO:</p><p>1) COUNT NOUNS (Substantivos Contáveis)<br>São tudo aquilo que PODE ser contado. Possuem forma no SINGULAR e no<br>PLURAL, e podem ser acompanhados por artigos (a, an, the) ou números.</p><p>2) NONCOUNT NOUNS (Substantivos Incontáveis)<br>São palavras que NÃO podem ser contadas individualmente. NÃO podem ser<br>usadas com artigos indefinidos (a, an) ou com números. Geralmente só<br>aparecem no SINGULAR (não têm forma plural).</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">NONCOUNT NOUNS GERALMENTE SÃO:</h5><ul class="gram-bullets"><li>Líquidos: milk, water, olive oil, coffee, juice</li><li>Grãos e itens muito pequenos: rice, salt, sugar, sand, flour</li><li>Conceitos abstratos: love, happiness, information, music</li><li>Materiais: gold, wood, glass, plastic</li></ul><h5 class="gram-subhead">USO DE SOME E ANY:</h5><p>SOME → usado em frases AFIRMATIVAS e em OFERTAS/PEDIDOS educados<br>ANY → usado em frases NEGATIVAS e INTERROGATIVAS</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COUNT NOUNS:</h5><p>👉 We have an apple. (Temos uma maçã.)<br>👉 There are many apples in the basket. (Há muitas maçãs na cesta.)<br>👉 I have three books.</p><h5 class="gram-subhead">NONCOUNT NOUNS:</h5><p>👉 There isn\'t any water in the bottle. (Não há água na garrafa.)<br>👉 We have little milk today. (Temos pouco leite hoje.)<br>👉 I need some sugar. (Eu preciso de açúcar.)</p><h5 class="gram-subhead">USO DE SOME / ANY:</h5><ul class="gram-bullets"><li>I have some friends here. (Afirmativa)</li><li>Would you like some coffee? (Oferta educada)</li><li>I don\'t have any money. (Negativa)</li><li>Do you have any questions? (Interrogativa)</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>NUNCA use artigo indefinido (a/an) com noncount nouns: ❌ I want a milk. ✔️ I want some milk.</li></ul><ul class="gram-bullets"><li>NUNCA use noncount nouns no plural: ❌ I drink many waters. ✔️ I drink a lot of water.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Para CONTAR substantivos incontáveis, use medidas: - a glass of water (um copo d\'água) - a cup of coffee (uma xícara de café) - a kilo of rice (um quilo de arroz) - a slice of bread</span> <span class="gram-trans">(uma fatia de pão)</span></li></ul></div></div>'},
{order:61,badge:'61',topic:'ADVERBS OF FREQUENCY (Advérbios de Frequência)',book:'Intro',ref:'Intro - pg. 61 e Red book - pg. 37',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Os ADVÉRBIOS DE FREQUÊNCIA indicam COM QUE FREQUÊNCIA uma ação acontece.<br>Eles são fundamentais para falar de hábitos, rotinas e ações habituais<br>no Simple Present.</p><p>A posição desses advérbios na frase segue regras específicas conforme<br>o tipo de verbo presente.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">PRINCIPAIS ADVÉRBIOS (do mais frequente ao menos frequente):</h5><p>ALWAYS = 100% (sempre)<br>USUALLY = ~90% (geralmente)<br>OFTEN = ~70% (frequentemente)<br>SOMETIMES = ~50% (às vezes)<br>HARDLY EVER = ~5% (raramente)<br>NEVER = 0% (nunca)<br>EVER = (alguma vez - usado em perguntas)</p><h5 class="gram-subhead">POSIÇÃO COM VERBOS NORMAIS:</h5><p>Os advérbios vêm ANTES do verbo principal.<br>SUJEITO + ADV. FREQUÊNCIA + VERBO</p><h5 class="gram-subhead">POSIÇÃO COM O VERBO TO BE:</h5><p>Os advérbios vêm DEPOIS do verbo to be.<br>SUJEITO + TO BE + ADV. FREQUÊNCIA + COMPLEMENTO</p><h5 class="gram-subhead">SOMETIMES e USUALLY podem aparecer no INÍCIO da frase também.</h5><h5 class="gram-subhead">EXPRESSÕES DE FREQUÊNCIA (quantas vezes):</h5><p>Vão no FINAL da frase: every day, twice a week, once a month...</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">ANTES DO VERBO PRINCIPAL:</h5><ul class="gram-bullets"><li><span class="gram-eng">She often goes to church.</span> <span class="gram-trans">(Ela frequentemente vai à igreja.)</span></li><li>He never plays soccer with his friends.</li><li>I always study at night.</li></ul><h5 class="gram-subhead">DEPOIS DO VERBO TO BE:</h5><ul class="gram-bullets"><li><span class="gram-eng">He is often tired.</span> <span class="gram-trans">(Ele frequentemente está cansado.)</span></li><li><span class="gram-eng">I am never stressed.</span> <span class="gram-trans">(Eu nunca estou estressado.)</span></li><li>She is always happy.</li></ul><h5 class="gram-subhead">FREQUÊNCIA NO FINAL DA FRASE:</h5><ul class="gram-bullets"><li><span class="gram-eng">I study every day.</span> <span class="gram-trans">(Estudo todos os dias.)</span></li><li>I take showers twice a day. (Tomo banho duas vezes por dia.)</li><li>She goes to the gym three times a week.</li></ul><h5 class="gram-subhead">SOMETIMES E USUALLY NO INÍCIO:</h5><ul class="gram-bullets"><li>He usually studies alone. = Usually he studies alone.</li><li>She sometimes plays. = Sometimes she plays.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: Com verbos NORMAIS → ANTES do verbo. Com o verbo TO BE → DEPOIS do verbo.</li></ul><ul class="gram-bullets"><li>NEVER já tem sentido negativo. NÃO use com "not" ou "don\'t": ❌ I don\'t never go there. ✔️ I never go there.</li></ul><ul class="gram-bullets"><li>Para perguntar sobre frequência, use HOW OFTEN: - How often do you exercise? - I exercise three times a week.</li></ul></div></div>'},
{order:67,badge:'67',topic:'CAN FOR ABILITY (Can para Habilidade)',book:'Intro',ref:'Intro - pg. 67',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>CAN é um VERBO MODAL, ou seja, um verbo que adiciona um significado especial<br>à frase. O CAN é usado principalmente para expressar:</p><ul class="gram-bullets"><li>HABILIDADE - capacidade de fazer algo (conseguir, saber fazer)</li><li>PERMISSÃO - autorização para fazer algo</li><li>POSSIBILIDADE - algo que pode acontecer</li></ul><p>Em português, equivale geralmente a "PODER" ou "CONSEGUIR".</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><p>SUJEITO + CAN + VERBO (forma original)</p><h5 class="gram-subhead">NEGATIVA:</h5><p>SUJEITO + CANNOT / CAN\'T + VERBO (forma original)</p><h5 class="gram-subhead">INTERROGATIVA:</h5><p>CAN + SUJEITO + VERBO (forma original) ?</p><h5 class="gram-subhead">IMPORTANTE: O verbo após CAN fica sempre na sua FORMA ORIGINAL</h5><p>(sem -S, sem -ING, sem -ED).</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">I can play the piano.</span> <span class="gram-trans">(Eu sei tocar piano.)</span></li><li><span class="gram-eng">She can speak three languages.</span> <span class="gram-trans">(Ela sabe falar três idiomas.)</span></li><li>We can swim very well.</li></ul><h5 class="gram-subhead">NEGATIVA:</h5><ul class="gram-bullets"><li>I cannot play the piano. (Forma completa)</li><li><span class="gram-eng">I can\'t play the piano.</span> <span class="gram-trans">(Forma contraída - mais comum)</span></li><li>He can\'t dance.</li><li>They can\'t come tomorrow.</li></ul><h5 class="gram-subhead">INTERROGATIVA:</h5><ul class="gram-bullets"><li>Can I play the piano?</li><li>Can you help me?</li><li>Can she sing?</li></ul><h5 class="gram-subhead">RESPOSTAS CURTAS:</h5><p>- Can you swim?<br>- Yes, I can. / No, I can\'t.</p></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>ATENÇÃO: A negação de CAN se escreve junto: CANNOT (não "can not"). A forma contraída é CAN\'T.</li></ul><ul class="gram-bullets"><li>Use CAN para habilidades atuais (no presente). Para habilidades no passado, usamos COULD.</li></ul><ul class="gram-bullets"><li>Após CAN, o verbo nunca leva -S, mesmo na 3ª pessoa do singular: ❌ She cans plays piano. ✔️ She can play piano.</li></ul><ul class="gram-bullets"><li>CAN também serve para pedir ou conceder permissão: - Can I go to the bathroom? (Posso ir ao banheiro?) - Yes, you can.</li></ul></div></div>'},
{order:73,badge:'73',topic:'BE GOING TO (Futuro com Planos)',book:'Intro',ref:'Intro - pg. 73',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>A estrutura "BE GOING TO" é usada para expressar o FUTURO em inglês,<br>especialmente quando falamos de:</p><ul class="gram-bullets"><li>PLANOS já feitos previamente</li><li>INTENÇÕES para o futuro</li><li>PREVISÕES baseadas em evidências do presente</li></ul><p>Lembre-se de conjugar o verbo BE conforme o sujeito: AM, IS ou ARE.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><p>SUJEITO + AM/IS/ARE + GOING TO + VERBO + COMPLEMENTO</p><h5 class="gram-subhead">INTERROGATIVA:</h5><p>AM/IS/ARE + SUJEITO + GOING TO + VERBO + COMPLEMENTO ?</p><h5 class="gram-subhead">NEGATIVA:</h5><p>SUJEITO + AM/IS/ARE + NOT + GOING TO + VERBO + COMPLEMENTO</p><h5 class="gram-subhead">CONJUGAÇÃO DO BE:</h5><p>I + AM GOING TO + verbo<br>YOU + ARE GOING TO + verbo<br>HE / SHE / IT + IS GOING TO + verbo<br>WE / THEY + ARE GOING TO + verbo</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><ul class="gram-bullets"><li><span class="gram-eng">She is going to buy a car next year.</span> <span class="gram-trans">(Ela vai comprar um carro no ano que vem.)</span></li><li><span class="gram-eng">They are going to get married.</span> <span class="gram-trans">(Eles vão se casar.)</span></li><li>I am going to study tonight.</li></ul><h5 class="gram-subhead">INTERROGATIVA:</h5><ul class="gram-bullets"><li>Is she going to read the book?</li><li>Is it going to rain tomorrow?</li><li>Are you going to the party?</li></ul><h5 class="gram-subhead">NEGATIVA:</h5><ul class="gram-bullets"><li>I am not going to work tomorrow.</li><li>He isn\'t going to help us.</li><li>They aren\'t going to come.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">Use BE GOING TO para PLANOS DECIDIDOS antes do momento da fala: - I\'m going to travel to Italy next month.</span> <span class="gram-trans">(Já tenho planos)</span></li></ul><ul class="gram-bullets"><li>Para decisões tomadas NO MOMENTO da fala, prefira WILL: - The phone is ringing. I\'ll answer it.</li></ul><ul class="gram-bullets"><li>Expressões de tempo comuns com BE GOING TO: - tomorrow, next week, next year, this weekend, tonight, soon</li></ul><ul class="gram-bullets"><li>Forma contraída muito comum: - I\'m going to → I\'m gonna (informal, evite em escrita formal)</li></ul></div></div>'},
{order:88,badge:'88',topic:'GIVING DIRECTIONS - PREPOSITIONS OF PLACE',book:'Intro',ref:'Intro - pg. 88',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Quando precisamos DAR DIREÇÕES ou indicar a LOCALIZAÇÃO de algum lugar<br>(loja, casa, restaurante, etc.), usamos preposições específicas em inglês.</p><p>Cada preposição indica uma posição diferente em relação a outro lugar<br>ou ponto de referência.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">PRINCIPAIS PREPOSIÇÕES PARA DIREÇÕES:</h5><p>ON → "no" / "na" (em ruas e avenidas)<br>ON THE CORNER OF → "na esquina de"<br>ACROSS FROM → "em frente a" / "do outro lado de"<br>NEXT TO → "do lado de"<br>BETWEEN → "entre" / "no meio de"</p><h5 class="gram-subhead">Outras úteis (não na página, mas relacionadas):</h5><p>IN FRONT OF → "na frente de"<br>BEHIND → "atrás de"<br>NEAR → "perto de"</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">ON (em rua/avenida):</h5><ul class="gram-bullets"><li><span class="gram-eng">The shopping mall is on Paulista Avenue.</span> <span class="gram-trans">(O shopping fica na Avenida Paulista.)</span></li><li>My house is on English Street, number 1000.</li></ul><h5 class="gram-subhead">ON THE CORNER OF (na esquina de):</h5><ul class="gram-bullets"><li><span class="gram-eng">The supermarket is on the corner of the next avenue.</span> <span class="gram-trans">(O supermercado fica na esquina da próxima avenida.)</span></li><li>The drugstore is on the corner of his house.</li></ul><h5 class="gram-subhead">ACROSS FROM (em frente a / do outro lado):</h5><ul class="gram-bullets"><li><span class="gram-eng">The park is across from the apartment building.</span> <span class="gram-trans">(O parque fica em frente ao prédio de apartamentos.)</span></li><li>The boy fell across from his house.</li></ul><h5 class="gram-subhead">NEXT TO (do lado de):</h5><ul class="gram-bullets"><li><span class="gram-eng">It is next to the pharmacy.</span> <span class="gram-trans">(Fica do lado da farmácia.)</span></li><li>His house is next to mine.</li></ul><h5 class="gram-subhead">BETWEEN (entre):</h5><ul class="gram-bullets"><li><span class="gram-eng">The school is between the supermarket and the bank.</span> <span class="gram-trans">(A escola fica entre o supermercado e o banco.)</span></li><li>The shopping mall is between these houses.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>BETWEEN é usado quando há DOIS lugares de referência. Para mais de dois lugares, use AMONG.</li></ul><ul class="gram-bullets"><li>Estruture frases para direções com: - Excuse me, where is the...? - It\'s [preposição] + [lugar].</li></ul><ul class="gram-bullets"><li>Para INSTRUÇÕES de como chegar, use imperativos: - Go straight. (Vá em frente.) - Turn left/right. (Vire à esquerda/direita.) - Walk one block. (Ande uma quadra.)</li></ul></div></div>'},
{order:107,badge:'107',topic:'OBJECT PRONOUNS (Pronomes do Objeto)',book:'Intro',ref:'Intro - pg. 107',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Diferentemente dos demais pronomes pessoais (subject pronouns: I, you, he,<br>she, it, we, they), que praticam a ação do verbo, os OBJECT PRONOUNS<br>SOFREM a ação de algum verbo - ou seja, eles são o OBJETO do verbo.</p><p>Os object pronouns aparecem APÓS os verbos ou após preposições.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">TABELA DE PRONOMES (subject vs object):</h5><p>SUBJECT PRONOUN OBJECT PRONOUN<br>(faz a ação) (recebe a ação)<br>─────────────── ──────────────<br>I ME (me, mim)<br>YOU YOU (você, te)<br>HE HIM (ele, o, lhe)<br>SHE HER (ela, a, lhe)<br>IT IT (o, a - objetos/animais)<br>WE US (nós, nos)<br>THEY THEM (eles/elas, os, as)</p><h5 class="gram-subhead">POSIÇÃO:</h5><p>Após VERBOS: verbo + object pronoun<br>(I love him.)<br>Após PREPOSIÇÕES: preposição + object pronoun<br>(She plays with me.)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COMPARAÇÃO ERRADO vs CORRETO:</h5><p>❌ I like they.<br>✔️ I like THEM. (Eu gosto deles.)</p><p>❌ She plays with I.<br>✔️ She plays with ME. (Ela brinca comigo.)</p><p>❌ Can you call she?<br>✔️ Can you call HER? (Você pode ligar para ela?)</p><h5 class="gram-subhead">MAIS EXEMPLOS:</h5><ul class="gram-bullets"><li><span class="gram-eng">I love him.</span> <span class="gram-trans">(Eu o amo.)</span></li><li><span class="gram-eng">She knows us.</span> <span class="gram-trans">(Ela nos conhece.)</span></li><li><span class="gram-eng">Can you help me?</span> <span class="gram-trans">(Você pode me ajudar?)</span></li><li><span class="gram-eng">Look at it!</span> <span class="gram-trans">(Olhe para isso!)</span></li><li><span class="gram-eng">The teacher is talking to them.</span> <span class="gram-trans">(O professor está falando com eles.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>YOU e IT são iguais como subject e object pronoun.</li></ul><ul class="gram-bullets"><li>Após preposições (to, with, for, at, about, by...), use SEMPRE object pronouns: ❌ This gift is for I. ✔️ This gift is for ME.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Cuidado para não confundir com possessive adjectives: - I see him. (object pronoun - vejo ele) - I see his car.</span> <span class="gram-trans">(possessive adjective - vejo o carro dele)</span></li></ul></div></div>'},
{order:1002,badge:'U2',topic:'ARTICLES - A, AN, THE (Artigos)',book:'Intro',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Os ARTIGOS em inglês são pequenas palavras colocadas ANTES dos substantivos<br>para indicar se estamos falando de algo ESPECÍFICO ou GENÉRICO.</p><p>Existem dois tipos de artigos:</p><p>1) ARTIGOS INDEFINIDOS (A / AN)<br>Usados para falar de algo NÃO ESPECÍFICO ou pela PRIMEIRA VEZ.<br>Equivalem a "UM" ou "UMA" em português.</p><p>2) ARTIGO DEFINIDO (THE)<br>Usado para falar de algo ESPECÍFICO, ÚNICO ou JÁ MENCIONADO.<br>Equivale a "O", "A", "OS", "AS" em português.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">A vs AN:</h5><p>A → antes de palavras que começam com som de CONSOANTE<br>AN → antes de palavras que começam com som de VOGAL</p><p>Importante: o que conta é o SOM, não a letra!</p><h5 class="gram-subhead">THE (artigo definido):</h5><ul class="gram-bullets"><li>Usado com qualquer substantivo (singular ou plural)</li><li>Quando o ouvinte já sabe do que estamos falando</li><li>Para coisas únicas (the sun, the moon, the world)</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM "A" (consoante):</h5><ul class="gram-bullets"><li>a book (um livro)</li><li>a chair (uma cadeira)</li><li><span class="gram-eng">a teacher</span> <span class="gram-trans">(um professor)</span></li><li><span class="gram-eng">a university</span> <span class="gram-trans">(uma universidade - "yu" som de consoante!)</span></li></ul><h5 class="gram-subhead">COM "AN" (vogal):</h5><ul class="gram-bullets"><li><span class="gram-eng">an apple</span> <span class="gram-trans">(uma maçã)</span></li><li>an elephant (um elefante)</li><li>an idea (uma ideia)</li><li><span class="gram-eng">an hour</span> <span class="gram-trans">(uma hora - "h" mudo, som de vogal!)</span></li></ul><h5 class="gram-subhead">COM "THE" (específico):</h5><ul class="gram-bullets"><li><span class="gram-eng">The book is on the table.</span> <span class="gram-trans">(O livro está sobre a mesa - sabemos qual livro)</span></li><li><span class="gram-eng">Open the door, please.</span> <span class="gram-trans">(Abra a porta - sabemos qual porta)</span></li><li><span class="gram-eng">The sun is bright today.</span> <span class="gram-trans">(O sol está brilhante hoje - só existe um sol)</span></li></ul><h5 class="gram-subhead">COMPARANDO A/AN vs THE:</h5><ul class="gram-bullets"><li>I have a dog. The dog is brown. (Tenho um cachorro. O cachorro é marrom.) - "a dog" → primeira menção - "the dog" → já mencionado, agora específico</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE de A vs AN: é o SOM da palavra seguinte que importa: - a UNIVERSITY (som "you" de consoante) - an HOUR (h mudo, som "a-u-a-r") - a USER (som "you") - an UMBRELLA (som de vogal)</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Quando NÃO usar artigo (zero article): - Com substantivos no plural genéricos: "I like dogs." (cães em geral) - Com substantivos incontáveis genéricos: "Water is essential." - Com nomes próprios: "Maria is here." (não "the Maria") - Com idiomas: "I speak English."</span> <span class="gram-trans">(não "the English")</span></li></ul><ul class="gram-bullets"><li>Use "the" antes de: - Coisas únicas: the sun, the moon, the Earth, the world - Superlativos: the biggest, the best - Instrumentos musicais: play the piano, play the guitar - Oceanos, rios, mares: the Atlantic, the Amazon</li></ul><ul class="gram-bullets"><li>NÃO use "the" antes de: - Refeições: have breakfast, have lunch (sem the) - Esportes: play soccer, play tennis (sem the) - Continentes/países (a maioria): in Brazil, in Asia</li></ul></div></div>'},
{order:1002,badge:'U2',topic:'PLURALS (Plurais)',book:'Intro',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Para formar o PLURAL de substantivos em inglês, geralmente adicionamos -S<br>ou -ES ao final da palavra. No entanto, existem regras específicas<br>dependendo da terminação do substantivo, além de alguns plurais irregulares.</p><p>Saber formar plurais corretamente é fundamental, pois afeta a conjugação<br>do verbo TO BE e o uso de artigos.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">REGRA 1 - Maioria dos substantivos: adicione -S</h5><p>book → books<br>pen → pens<br>chair → chairs</p><h5 class="gram-subhead">REGRA 2 - Terminados em -O, -CH, -SH, -SS, -X, -Z: adicione -ES</h5><p>tomato → tomatoes<br>watch → watches<br>dish → dishes<br>class → classes<br>box → boxes<br>quiz → quizzes</p><h5 class="gram-subhead">REGRA 3 - Terminados em CONSOANTE + Y: troque Y por -IES</h5><p>baby → babies<br>city → cities<br>country → countries<br>story → stories</p><h5 class="gram-subhead">REGRA 4 - Terminados em VOGAL + Y: apenas adicione -S</h5><p>boy → boys<br>day → days<br>key → keys<br>toy → toys</p><h5 class="gram-subhead">REGRA 5 - Terminados em -F ou -FE: troque por -VES</h5><p>leaf → leaves<br>wife → wives<br>knife → knives<br>life → lives</p><h5 class="gram-subhead">REGRA 6 - PLURAIS IRREGULARES (não seguem regra):</h5><p>man → men (homem → homens)<br>woman → women (mulher → mulheres)<br>child → children (criança → crianças)<br>foot → feet (pé → pés)<br>tooth → teeth (dente → dentes)<br>mouse → mice (rato → ratos)<br>person → people (pessoa → pessoas)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">FRASES COMPLETAS:</h5><ul class="gram-bullets"><li>There is one book on the table. There are three books on the shelf.</li><li>The boy is here. The boys are here.</li><li>The child is playing. The children are playing.</li><li>My foot hurts. My feet hurt.</li><li>This person is nice. These people are nice.</li></ul><h5 class="gram-subhead">APLICAÇÃO COM VERBO TO BE:</h5><ul class="gram-bullets"><li>Singular: This IS my pen.</li><li>Plural: These ARE my pens.</li></ul><ul class="gram-bullets"><li>Singular: The man IS my father.</li><li>Plural: The men ARE my brothers.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">ATENÇÃO ao PLURAL de "PERSON": ❌ persons ✔️ people</span> <span class="gram-trans">(esse é o plural natural; "persons" só em contextos legais)</span></li></ul><ul class="gram-bullets"><li>PLURAIS INVARIÁVEIS (mesma forma no singular e plural): - sheep → sheep (ovelha/ovelhas) - fish → fish (peixe/peixes) - deer → deer (cervo/cervos)</li></ul><ul class="gram-bullets"><li>Substantivos INCONTÁVEIS não têm plural: ❌ waters, moneys, advices ✔️ water, money, advice</li></ul><ul class="gram-bullets"><li>PRONÚNCIA do -S no final dos plurais: - /s/ → após sons surdos: books, cats, hats - /z/ → após sons sonoros: dogs, boys, beds - /iz/ → após -s, -z, -sh, -ch, -x: boxes, dishes, watches</li></ul><ul class="gram-bullets"><li>A regra para verbos na 3ª pessoa do singular é PARECIDA mas inversa: - Plural de substantivo: book → bookS - 3ª pessoa do verbo: he readS, she goeS</li></ul></div></div>'},
