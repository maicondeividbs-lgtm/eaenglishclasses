<style>
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--navy), var(--blue));
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  .login-wrap::before {
    content: '';
    position: absolute;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(243,107,46,0.2), transparent 60%);
    border-radius: 50%;
  }
  .login-wrap::after {
    content: '';
    position: absolute;
    bottom: -200px;
    left: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(245,154,30,0.15), transparent 60%);
    border-radius: 50%;
  }
  .login-box {
    max-width: 440px;
    width: 100%;
    position: relative;
    z-index: 1;
  }
  .login-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .login-logo .nav-logo-text { color: var(--white); font-size: 24px; }
  .login-logo .nav-logo-text span { color: var(--orange); }
  .login-card {
    background: var(--white);
    border-radius: var(--r-xl);
    padding: 40px;
    box-shadow: var(--shadow-xl);
  }
  .login-card h2 {
    font-size: 28px;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .login-card h2 em { color: var(--orange); font-style: italic; font-weight: 900; }
  .login-card > p {
    font-size: 14px;
    color: var(--g500);
    margin-bottom: 28px;
  }
  .login-footer {
    text-align: center;
    font-size: 13px;
    color: var(--g500);
    margin-top: 20px;
  }
  .login-footer a {
    color: var(--orange);
    font-weight: 700;
  }
  .portal-demo {
    margin-top: 28px;
    padding-top: 28px;
    border-top: 2px dashed var(--g200);
    text-align: center;
  }
  .portal-demo p {
    font-size: 13px;
    color: var(--g500);
    margin-bottom: 14px;
  }
  .portal-buttons {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .portal-btn {
    padding: 10px 16px;
    border-radius: var(--r-full);
    font-size: 13px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .portal-btn.student { background: var(--blue-soft); color: var(--blue); }
  .portal-btn.student:hover { background: var(--blue); color: var(--white); transform: translateY(-2px); }
  .portal-btn.teacher { background: var(--orange-soft); color: var(--orange); }
  .portal-btn.teacher:hover { background: var(--orange); color: var(--white); transform: translateY(-2px); }
  .portal-btn.coord { background: var(--mango-soft); color: var(--mango); }
  .portal-btn.coord:hover { background: var(--mango); color: var(--white); transform: translateY(-2px); }
  .back-home {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 24px;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    transition: color 0.2s;
  }
  .back-home:hover { color: var(--white); }
  .protopip {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-align: center;
    margin-top: 20px;
  }
</style>

<script>
document.addEventListener('DOMContentLoaded',()=>{
  const reveals=document.querySelectorAll('.reveal');
  const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible')})},{threshold:0.08,rootMargin:'0px 0px -50px 0px'});
  reveals.forEach(el=>obs.observe(el));
  window.addEventListener('scroll',()=>{document.getElementById('nav')?.classList.toggle('scrolled',window.scrollY>50)},{passive:true});
});
</script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const loginForm = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
  const loginError = document.getElementById('loginError');

  // Check if already logged in
  (async () => {
    const profile = await getUserProfile();
    if (profile) {
      redirectByRole(profile.role);
    }
  })();

  if (loginForm) {
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      loginBtn.disabled = true;
      loginBtn.textContent = 'Entrando...';
      loginError.style.display = 'none';

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      try {
        const data = await signIn(email, password);
        
        // Get user profile to determine role
        const profile = await getUserProfile();
        if (profile) {
          redirectByRole(profile.role);
        } else {
          window.location.href = 'dashboard-aluno.html';
        }
        
      } catch (err) {
        console.error('Login error:', err);
        let msg = 'E-mail ou senha incorretos.';
        if (err.message?.includes('Invalid login')) {
          msg = 'E-mail ou senha incorretos. Verifique e tente novamente.';
        } else if (err.message?.includes('Email not confirmed')) {
          msg = 'Confirme seu e-mail antes de fazer login. Verifique sua caixa de entrada.';
        }
        loginError.textContent = msg;
        loginError.style.display = 'block';
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Entrar';
      }
    });
  }
});
</script>
