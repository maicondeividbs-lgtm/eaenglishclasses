<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#19244e">
<title>Sem conexão — EA English Classes</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:linear-gradient(160deg,#19244e,#101733);color:#fff;min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
  .box{max-width:420px}
  .logo{width:88px;height:88px;border-radius:22px;background:#19244e;border:1px solid rgba(255,255,255,.12);
    display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-family:Georgia,serif;
    font-weight:800;font-size:40px}
  .logo b{color:#fff} .logo i{color:#f36b2e;font-style:normal}
  h1{font-family:Georgia,serif;font-size:26px;margin-bottom:12px}
  p{color:rgba(255,255,255,.7);line-height:1.6;font-size:15px;margin-bottom:28px}
  button{background:#f36b2e;color:#fff;border:none;border-radius:14px;padding:15px 28px;
    font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;min-height:48px}
  button:active{transform:scale(.97)}
</style>
</head>
<body>
  <div class="box">
    <div class="logo"><b>EA</b><i>.</i></div>
    <h1>Você está offline</h1>
    <p>Não foi possível conectar agora. Verifique sua internet — assim que voltar, é só recarregar para continuar de onde parou.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
