{order:1002,badge:'U2',topic:'PREPOSITIONS OF PLACE',book:'Intro',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>As PREPOSIÇÕES DE LUGAR são usadas para indicar ONDE algo ou alguém está<br>localizado no espaço.</p><p>Estas preposições são essenciais para descrever cenários, dar localizações<br>de objetos e responder a perguntas como "Where is/are...?".</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA BÁSICA:</h5><p>SUJEITO + IS/ARE + PREPOSIÇÃO + LUGAR</p><h5 class="gram-subhead">PRINCIPAIS PREPOSIÇÕES DE LUGAR:</h5><p>IN → DENTRO (de algo fechado/limitado)<br>ON → SOBRE / EM CIMA DE (uma superfície)<br>UNDER → EMBAIXO DE<br>IN FRONT OF → NA FRENTE DE<br>BEHIND → ATRÁS DE<br>NEXT TO → AO LADO DE<br>BETWEEN → ENTRE (dois objetos)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">IN (dentro de):</h5><ul class="gram-bullets"><li><span class="gram-eng">The keys are in the drawer.</span> <span class="gram-trans">(As chaves estão dentro da gaveta.)</span></li><li>My books are in the bag.</li><li>The cat is in the box.</li></ul><h5 class="gram-subhead">ON (em cima de):</h5><ul class="gram-bullets"><li><span class="gram-eng">The book is on the table.</span> <span class="gram-trans">(O livro está sobre a mesa.)</span></li><li>The painting is on the wall.</li><li>The cup is on the desk.</li></ul><h5 class="gram-subhead">UNDER (embaixo de):</h5><ul class="gram-bullets"><li><span class="gram-eng">The cat is under the table.</span> <span class="gram-trans">(O gato está embaixo da mesa.)</span></li><li>The shoes are under the bed.</li></ul><h5 class="gram-subhead">IN FRONT OF (na frente de):</h5><ul class="gram-bullets"><li><span class="gram-eng">The car is in front of the house.</span> <span class="gram-trans">(O carro está na frente da casa.)</span></li><li>She is in front of the window.</li></ul><h5 class="gram-subhead">BEHIND (atrás de):</h5><ul class="gram-bullets"><li><span class="gram-eng">The garden is behind the house.</span> <span class="gram-trans">(O jardim está atrás da casa.)</span></li><li>The pencil is behind the book.</li></ul><h5 class="gram-subhead">NEXT TO (ao lado de):</h5><ul class="gram-bullets"><li><span class="gram-eng">The lamp is next to the bed.</span> <span class="gram-trans">(O abajur está ao lado da cama.)</span></li><li>My house is next to the school.</li></ul><h5 class="gram-subhead">BETWEEN (entre):</h5><ul class="gram-bullets"><li><span class="gram-eng">The book is between the two pens.</span> <span class="gram-trans">(O livro está entre as duas canetas.)</span></li><li>The park is between my house and the school.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">Diferença CRUCIAL entre IN e ON: - IN → DENTRO de algo (caixa, sala, bolsa, gaveta) "The pen is IN the box." - ON → SOBRE uma superfície (mesa, parede, chão) "The pen is ON the box."</span> <span class="gram-trans">(em cima da caixa)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">BETWEEN sempre se refere a DOIS objetos. Para mais de dois, use AMONG: - The book is BETWEEN the pen and the cup. (2 objetos) - I found it AMONG my old papers.</span> <span class="gram-trans">(vários papéis)</span></li></ul><ul class="gram-bullets"><li>Para PERGUNTAR onde algo está: - Where is your pen? - It is on the table. - Where are your books? - They are in the bag.</li></ul><ul class="gram-bullets"><li>Existem MUITAS outras preposições de lugar úteis: - inside / outside (dentro / fora) - above / below (acima / abaixo - sem contato) - over / underneath (acima / debaixo - cobrindo) - near / far from (perto / longe de) - across from (do outro lado) - on the corner of (na esquina)</li></ul></div></div>'},
{order:1004,badge:'U4',topic:'CONJUNCTIONS - AND, BUT, SO',book:'Intro',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>As CONJUNCTIONS (conjunções) são palavras usadas para CONECTAR duas ideias,<br>frases ou palavras. Elas tornam a fala e a escrita mais fluida e natural.</p><p>As três conjunções básicas estudadas neste nível são:</p><ul class="gram-bullets"><li>AND → adiciona ideias (E)</li><li>BUT → contrasta ideias (MAS)</li><li><span class="gram-eng">SO → indica consequência ou resultado</span> <span class="gram-trans">(ENTÃO)</span></li></ul></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">AND (adição):</h5><p>Frase 1 + AND + Frase 2<br>(junta ideias semelhantes ou complementares)</p><h5 class="gram-subhead">BUT (contraste):</h5><p>Frase 1 + BUT + Frase 2<br>(mostra oposição ou contraste entre ideias)</p><h5 class="gram-subhead">SO (consequência):</h5><p>Frase 1, + SO + Frase 2<br>(a segunda ideia é o RESULTADO da primeira)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">AND (adicionando):</h5><ul class="gram-bullets"><li><span class="gram-eng">The shirt is blue AND the shoes are white.</span> <span class="gram-trans">(A camisa é azul e os sapatos são brancos.)</span></li><li><span class="gram-eng">She is tall AND beautiful.</span> <span class="gram-trans">(Ela é alta e bonita.)</span></li><li><span class="gram-eng">I like coffee AND tea.</span> <span class="gram-trans">(Eu gosto de café e chá.)</span></li></ul><h5 class="gram-subhead">BUT (contrastando):</h5><ul class="gram-bullets"><li><span class="gram-eng">The shirt is nice BUT it\'s expensive.</span> <span class="gram-trans">(A camisa é bonita, mas é cara.)</span></li><li><span class="gram-eng">He likes soccer BUT he doesn\'t like tennis.</span> <span class="gram-trans">(Ele gosta de futebol, mas não gosta de tênis.)</span></li><li><span class="gram-eng">It\'s cold today BUT I\'m not wearing a jacket.</span> <span class="gram-trans">(Está frio hoje, mas não estou usando casaco.)</span></li></ul><h5 class="gram-subhead">SO (consequência):</h5><ul class="gram-bullets"><li><span class="gram-eng">It\'s hot today, SO I\'m wearing a t-shirt.</span> <span class="gram-trans">(Está calor hoje, então estou usando uma camiseta.)</span></li><li><span class="gram-eng">She is tired, SO she is going to bed.</span> <span class="gram-trans">(Ela está cansada, então vai dormir.)</span></li><li><span class="gram-eng">The store is closed, SO we can\'t buy anything.</span> <span class="gram-trans">(A loja está fechada, então não podemos comprar nada.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>RESUMO RÁPIDO:</li></ul><p>Conjunção | Função | Tradução<br>───────────|─────────────────|──────────────<br>AND | adiciona | e<br>BUT | contrasta | mas<br>SO | dá consequência | então</p><ul class="gram-bullets"><li>Use VÍRGULA antes de SO em frases longas: - The weather was great, SO we went to the park.</li></ul><ul class="gram-bullets"><li>AND pode conectar PALAVRAS ou FRASES inteiras: - "John AND Mary" (palavras) - "John works AND Mary studies" (frases)</li></ul><ul class="gram-bullets"><li>BUT é o oposto de AND - mostra que algo é INESPERADO ou DIFERENTE: - "It\'s sunny BUT cold." (estranho ter sol e frio)</li></ul><ul class="gram-bullets"><li>Não confunda SO (consequência) com SO (tão/muito): - I was tired, SO I went home. (consequência) - I am SO tired. (intensidade - "muito cansado")</li></ul><ul class="gram-bullets"><li>Em conversas naturais, ao começar uma frase, SO indica início de conversa: - "So, what do you do for a living?"</li></ul></div></div>'},
{order:1005,badge:'U5',topic:'TIME EXPRESSIONS',book:'Intro',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Em inglês, existem várias expressões para se referir a HORAS, PERÍODOS DO<br>DIA e MOMENTOS ESPECÍFICOS. Cada expressão tem uma preposição específica<br>(AT, IN ou ON) que a acompanha.</p><p>Saber usar essas expressões corretamente é essencial para falar sobre<br>rotinas, marcar encontros e descrever atividades diárias.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">AT (com horários específicos):</h5><p>AT + hora exata<br>AT 7:00, AT noon, AT midnight, AT night</p><h5 class="gram-subhead">IN (com períodos do dia):</h5><p>IN THE + período<br>IN THE MORNING, IN THE AFTERNOON, IN THE EVENING</p><h5 class="gram-subhead">HORÁRIOS:</h5><p>O\'CLOCK → para horas "cheias" (3 o\'clock, 5 o\'clock)<br>A.M. → da madrugada/manhã (de 0h às 11:59h)<br>P.M. → da tarde/noite (de 12h às 23:59h)<br>NOON → meio-dia (12:00)<br>MIDNIGHT → meia-noite (00:00)</p><h5 class="gram-subhead">EXPRESSÕES COMUNS:</h5><ul class="gram-bullets"><li><span class="gram-eng">at 7:00</span> <span class="gram-trans">(às 7:00 - horário específico)</span></li><li>at noon (ao meio-dia)</li><li>at midnight (à meia-noite)</li><li><span class="gram-eng">at night</span> <span class="gram-trans">(à noite - genérico)</span></li><li><span class="gram-eng">in the morning</span> <span class="gram-trans">(de manhã)</span></li><li>in the afternoon (à tarde)</li><li>in the evening (de noite/à noite cedo)</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">HORÁRIOS EXATOS (com AT):</h5><ul class="gram-bullets"><li><span class="gram-eng">The class starts at 7:00.</span> <span class="gram-trans">(A aula começa às 7:00.)</span></li><li><span class="gram-eng">I wake up at 6 o\'clock.</span> <span class="gram-trans">(Eu acordo às 6 horas.)</span></li><li><span class="gram-eng">She has lunch at noon.</span> <span class="gram-trans">(Ela almoça ao meio-dia.)</span></li><li><span class="gram-eng">We go to bed at midnight.</span> <span class="gram-trans">(Vamos para a cama à meia-noite.)</span></li></ul><h5 class="gram-subhead">PERÍODOS DO DIA (com IN THE):</h5><ul class="gram-bullets"><li><span class="gram-eng">I exercise in the morning.</span> <span class="gram-trans">(Eu me exercito de manhã.)</span></li><li><span class="gram-eng">She works in the afternoon.</span> <span class="gram-trans">(Ela trabalha à tarde.)</span></li><li><span class="gram-eng">We watch TV in the evening.</span> <span class="gram-trans">(Nós assistimos TV de noite.)</span></li></ul><h5 class="gram-subhead">DISTINÇÃO ESPECIAL - AT NIGHT (sem "the"):</h5><ul class="gram-bullets"><li><span class="gram-eng">I read books at night.</span> <span class="gram-trans">(Eu leio livros à noite.)</span></li><li>The stars shine at night.</li></ul><h5 class="gram-subhead">A.M. vs P.M.:</h5><ul class="gram-bullets"><li><span class="gram-eng">The meeting is at 9 A.M.</span> <span class="gram-trans">(manhã)</span></li><li>The party starts at 8 P.M. (noite)</li><li>I usually sleep at 11 P.M.</li><li>I wake up at 6 A.M.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>RESUMO DAS PREPOSIÇÕES:</li></ul><p>Expressão | Preposição<br>───────────────────────────|────────────<br>Horários exatos | AT<br>Períodos genéricos do dia | IN THE<br>At night (exceção!) | AT (sem "the")<br>Meio-dia/Meia-noite | AT</p><ul class="gram-bullets"><li>Pergunta padrão: "What time is it?" Respostas: - It\'s 3 o\'clock. - It\'s 3:30 (three thirty). - It\'s half past three. - It\'s a quarter to four.</li></ul><ul class="gram-bullets"><li>Diferença A.M. vs P.M.: - A.M. = Ante Meridiem (antes do meio-dia) - P.M. = Post Meridiem (depois do meio-dia)</li></ul><ul class="gram-bullets"><li>ATENÇÃO à exceção: - "in the morning/afternoon/evening" (com "the") - "at night" (SEM "the") — não tem explicação lógica, é convenção!</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Em DATAS específicas, usamos ON: - on Monday (na segunda-feira) - on January 5th (no dia 5 de janeiro) - on my birthday</span> <span class="gram-trans">(no meu aniversário)</span></li></ul><ul class="gram-bullets"><li>Regra geral fácil de lembrar: - AT → ponto específico (hora exata, lugar pequeno) - IN → algo que envolve (manhã, mês, ano, país) - ON → superfície ou dia (segunda, dia 5, mesa)</li></ul></div></div>'},
{order:1012,badge:'U12',topic:'HAVE + NOUN / FEEL + ADJECTIVE / IMPERATIVES',book:'Intro',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta unidade apresenta estruturas essenciais para falar sobre SAÚDE e<br>dar CONSELHOS:</p><p>1) HAVE + NOUN<br>Usado para expressar SINTOMAS ou condições de saúde.</p><p>2) FEEL + ADJECTIVE<br>Usado para descrever COMO alguém SE SENTE.</p><p>3) IMPERATIVES (Imperativo)<br>Forma do verbo usada para dar ORDENS, CONSELHOS ou INSTRUÇÕES.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">HAVE + NOUN (sintomas):</h5><p>SUJEITO + HAVE/HAS + sintoma (substantivo)</p><h5 class="gram-subhead">FEEL + ADJECTIVE (sentimentos):</h5><p>SUJEITO + FEEL/FEELS + adjetivo<br>⚠️ Após FEEL, usa-se ADJETIVO (não substantivo)</p><h5 class="gram-subhead">IMPERATIVE (forma de comando):</h5><ul class="gram-bullets"><li>Afirmativo: VERBO (forma original) + complemento</li><li>Negativo: DON\'T + VERBO + complemento</li><li>Não há sujeito explícito (entende-se "YOU")</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">HAVE + NOUN (sintomas):</h5><ul class="gram-bullets"><li><span class="gram-eng">I have a headache.</span> <span class="gram-trans">(Eu estou com dor de cabeça.)</span></li><li><span class="gram-eng">She has a fever.</span> <span class="gram-trans">(Ela está com febre.)</span></li><li><span class="gram-eng">He has a cough.</span> <span class="gram-trans">(Ele está com tosse.)</span></li><li><span class="gram-eng">They have a cold.</span> <span class="gram-trans">(Eles estão resfriados.)</span></li><li><span class="gram-eng">I have the flu.</span> <span class="gram-trans">(Estou com gripe.)</span></li></ul><h5 class="gram-subhead">FEEL + ADJECTIVE (sentimentos):</h5><ul class="gram-bullets"><li><span class="gram-eng">I feel tired.</span> <span class="gram-trans">(Eu me sinto cansado.)</span></li><li><span class="gram-eng">She feels sick.</span> <span class="gram-trans">(Ela se sente doente.)</span></li><li><span class="gram-eng">He feels great.</span> <span class="gram-trans">(Ele se sente ótimo.)</span></li><li>They feel nervous. (Eles se sentem nervosos.)</li><li><span class="gram-eng">I feel terrible today.</span> <span class="gram-trans">(Eu me sinto péssimo hoje.)</span></li></ul><h5 class="gram-subhead">IMPERATIVE (afirmativo - dando conselho):</h5><ul class="gram-bullets"><li><span class="gram-eng">Drink some water.</span> <span class="gram-trans">(Beba um pouco de água.)</span></li><li>Take a rest. (Descanse.)</li><li><span class="gram-eng">Eat healthy food.</span> <span class="gram-trans">(Coma comida saudável.)</span></li><li><span class="gram-eng">Go to the doctor.</span> <span class="gram-trans">(Vá ao médico.)</span></li></ul><h5 class="gram-subhead">IMPERATIVE (negativo - o que NÃO fazer):</h5><ul class="gram-bullets"><li><span class="gram-eng">Don\'t eat too much sugar.</span> <span class="gram-trans">(Não coma muito açúcar.)</span></li><li><span class="gram-eng">Don\'t drink cold water.</span> <span class="gram-trans">(Não beba água gelada.)</span></li><li><span class="gram-eng">Don\'t stay up late.</span> <span class="gram-trans">(Não fique acordado até tarde.)</span></li><li><span class="gram-eng">Don\'t worry.</span> <span class="gram-trans">(Não se preocupe.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>ADJETIVOS POSITIVOS E NEGATIVOS comuns para FEEL:</li></ul><p>POSITIVOS: NEGATIVOS:<br>- great, fine, well - sick, ill, tired<br>- happy, excited - sad, depressed<br>- relaxed, calm - nervous, anxious<br>- healthy, energetic - exhausted, weak</p><ul class="gram-bullets"><li>Sintomas comuns com HAVE: - a headache (dor de cabeça) - a stomachache (dor de estômago) - a toothache (dor de dente) - a backache (dor nas costas) - a sore throat (dor de garganta) - a cold (resfriado) - the flu (gripe) - a fever (febre)</li></ul><ul class="gram-bullets"><li>REGRA-CHAVE no IMPERATIVE: - NÃO use sujeito! (Não diga "You drink water", apenas "Drink water!") - O imperativo serve para dar ordens, conselhos, instruções, convites - É a forma mais direta de se expressar</li></ul><ul class="gram-bullets"><li>Tom do IMPERATIVE depende do contexto: - "Sit down." (formal/autoritário) - "Please sit down." (educado) - "Could you sit down?" (mais educado)</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Diferença entre HAVE + sintoma e FEEL + adjetivo: - "I have a fever." (sintoma específico) - "I feel feverish."</span> <span class="gram-trans">(descrição de como me sinto)</span></li></ul></div></div>'},
{order:1015,badge:'U15',topic:'WH-QUESTIONS WITH DID, WAS & WERE',book:'Intro',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Para fazer perguntas no PASSADO em inglês, usamos auxiliares diferentes<br>conforme o tipo de verbo principal:</p><ul class="gram-bullets"><li>Para verbos NORMAIS no passado → usa-se DID</li><li>Para o verbo TO BE no passado → usa-se WAS ou WERE</li></ul><p>As WH-QUESTIONS no passado seguem essa mesma lógica e são fundamentais<br>para fazer perguntas detalhadas sobre eventos passados, biografias e<br>experiências.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM DID (verbos normais):</h5><p>WH-WORD + DID + SUJEITO + VERBO (forma original) ?</p><h5 class="gram-subhead">COM WAS/WERE (verbo TO BE no passado):</h5><p>WH-WORD + WAS/WERE + SUJEITO + complemento ?</p><h5 class="gram-subhead">USO DE WAS / WERE:</h5><p>I, HE, SHE, IT → WAS<br>YOU, WE, THEY → WERE</p><h5 class="gram-subhead">PRINCIPAIS WH-WORDS:</h5><p>WHERE = Onde?<br>WHEN = Quando?<br>WHAT = O que?<br>WHO = Quem?<br>WHY = Por quê?<br>HOW = Como?</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">WH-QUESTIONS COM DID (verbos normais):</h5><ul class="gram-bullets"><li><span class="gram-eng">Where did you study?</span> <span class="gram-trans">(Onde você estudou?)</span></li><li><span class="gram-eng">When did she travel to France?</span> <span class="gram-trans">(Quando ela viajou para a França?)</span></li><li><span class="gram-eng">What did they do yesterday?</span> <span class="gram-trans">(O que eles fizeram ontem?)</span></li><li><span class="gram-eng">Why did he leave?</span> <span class="gram-trans">(Por que ele saiu?)</span></li><li><span class="gram-eng">How did you learn English?</span> <span class="gram-trans">(Como você aprendeu inglês?)</span></li></ul><h5 class="gram-subhead">WH-QUESTIONS COM WAS/WERE (verbo to be):</h5><ul class="gram-bullets"><li><span class="gram-eng">Where were you born?</span> <span class="gram-trans">(Onde você nasceu?)</span></li><li><span class="gram-eng">When was your birthday?</span> <span class="gram-trans">(Quando foi seu aniversário?)</span></li><li><span class="gram-eng">Who was your teacher?</span> <span class="gram-trans">(Quem foi seu professor?)</span></li><li><span class="gram-eng">Why were you tired?</span> <span class="gram-trans">(Por que você estava cansado?)</span></li><li><span class="gram-eng">How was your vacation?</span> <span class="gram-trans">(Como foram suas férias?)</span></li></ul><h5 class="gram-subhead">RESPOSTAS TÍPICAS:</h5><ul class="gram-bullets"><li>Where did you study? - I studied at Harvard.</li><li>When were you born? - I was born in 1995.</li><li>Who was at the party? - My friends were there.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: ESCOLHA do auxiliar correto: - Verbo TO BE no passado → use WAS/WERE diretamente "Where WAS he?" (não "Where did he be?") - Outros verbos no passado → use DID "Where DID he go?"</li></ul><ul class="gram-bullets"><li>ATENÇÃO ao verbo principal após DID: Volta sempre à FORMA ORIGINAL (sem -ed): ❌ Where did you went? ✔️ Where did you GO?</li></ul><ul class="gram-bullets"><li>A questão "Where were you born?" usa WERE para TODOS os sujeitos quando perguntamos sobre nascimento: - Where were you born? (você - WERE) - Where were they born? (eles - WERE) - Where was he born? (ele - WAS) - Where was she born? (ela - WAS)</li></ul><ul class="gram-bullets"><li>Cuidado para não confundir com Present: - Where ARE you from? (presente - origem geral) - Where WERE you born? (passado - local de nascimento)</li></ul><ul class="gram-bullets"><li>Outras WH-Questions úteis no passado: - How old were you? - What was your favorite subject? - Who did you go with? - How long did you live there?</li></ul></div></div>'},
{order:1016,badge:'U16',topic:'PREPOSITIONAL PHRASES',book:'Intro',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>PREPOSITIONAL PHRASES (Frases Preposicionais) são combinações de<br>PREPOSIÇÃO + SUBSTANTIVO que descrevem a LOCALIZAÇÃO de pessoas ou<br>coisas.</p><p>Esta unidade foca especialmente em descrever ONDE alguém está, o que é<br>essencial em situações de TELEFONE quando precisamos avisar a localização<br>de uma pessoa.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA BÁSICA:</h5><p>PESSOA + IS/ARE + PREPOSIÇÃO + LUGAR</p><h5 class="gram-subhead">PREPOSIÇÕES DE LOCALIZAÇÃO MAIS USADAS:</h5><p>AT → em (lugar específico)<br>"She is AT work." / "He is AT school."</p><p>IN → dentro de (cidade, país, ambiente)<br>"We are IN Brazil." / "They are IN the kitchen."</p><p>ON → em (rua, andar, transporte público)<br>"I live ON Main Street." / "She is ON the bus."</p><h5 class="gram-subhead">COMBINAÇÕES COMUNS:</h5><p>AT home, AT work, AT school, AT the office, AT the gym<br>IN the kitchen, IN the bathroom, IN the living room<br>ON the bus, ON the train, ON the second floor<br>IN bed, AT the doctor\'s, IN the hospital</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM AT (lugares específicos):</h5><ul class="gram-bullets"><li><span class="gram-eng">She is at work.</span> <span class="gram-trans">(Ela está no trabalho.)</span></li><li><span class="gram-eng">He is at school.</span> <span class="gram-trans">(Ele está na escola.)</span></li><li><span class="gram-eng">They are at the mall.</span> <span class="gram-trans">(Eles estão no shopping.)</span></li><li><span class="gram-eng">I am at the gym.</span> <span class="gram-trans">(Eu estou na academia.)</span></li></ul><h5 class="gram-subhead">COM IN (dentro de algo):</h5><ul class="gram-bullets"><li><span class="gram-eng">He is in the kitchen.</span> <span class="gram-trans">(Ele está na cozinha.)</span></li><li><span class="gram-eng">She is in the bathroom.</span> <span class="gram-trans">(Ela está no banheiro.)</span></li><li><span class="gram-eng">They are in the car.</span> <span class="gram-trans">(Eles estão no carro.)</span></li><li><span class="gram-eng">We are in Brazil.</span> <span class="gram-trans">(Nós estamos no Brasil.)</span></li></ul><h5 class="gram-subhead">COM ON (em uma superfície ou meio de transporte):</h5><ul class="gram-bullets"><li><span class="gram-eng">She lives on Oak Street.</span> <span class="gram-trans">(Ela mora na Rua Oak.)</span></li><li><span class="gram-eng">He is on the bus.</span> <span class="gram-trans">(Ele está no ônibus.)</span></li><li><span class="gram-eng">My office is on the 5th floor.</span> <span class="gram-trans">(Meu escritório fica no 5º andar.)</span></li></ul><h5 class="gram-subhead">EM CONVERSAS AO TELEFONE (foco da unidade):</h5><p>- Hello! Is John there?<br>- I\'m sorry, he\'s not here right now. He\'s at the gym.</p><p>- Can I speak to Maria?<br>- She\'s in the kitchen. Just a moment.</p><p>- Is Tom available?<br>- No, he\'s at work. Can I take a message?</p></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRAS PRÁTICAS - AT, IN, ON:</li></ul><p>Preposição | Quando usar | Exemplos<br>───────────|──────────────────────────|──────────────────────<br>AT | Lugar específico/ponto | at home, at work, at school<br>IN | Dentro de algo amplo | in Brazil, in the kitchen<br>ON | Superfícies / Transporte | on the bus, on the table</p><ul class="gram-bullets"><li>EXPRESSÕES COMUNS com AT (lugares específicos): - at home (em casa) - at work (no trabalho) - at school (na escola) - at university (na universidade) - at the office (no escritório) - at the airport (no aeroporto) - at the doctor\'s (no médico) - at the gym (na academia) - at the supermarket (no mercado)</li></ul><ul class="gram-bullets"><li><span class="gram-eng">EXPRESSÕES COMUNS com IN: - in the kitchen / bedroom / bathroom - in the car / taxi (dentro) - in São Paulo / Brazil / Asia - in the office / room - in bed / in the hospital</span> <span class="gram-trans">(situações específicas)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">EXPRESSÕES COMUNS com ON: - on the bus / train / plane (transporte público) - on Oak Street (em ruas) - on the 5th floor (em andares) - on the table / floor / wall</span> <span class="gram-trans">(em superfícies)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">ATENÇÃO a algumas diferenças sutis: - "in the car" (dentro do carro - veículo particular) - "on the bus"</span> <span class="gram-trans">(em transporte público)</span></li></ul><p>- "at home" (em casa - sem THE)<br>- "in the house" (dentro da casa - com THE)</p><ul class="gram-bullets"><li>Para PERGUNTAR sobre localização: - Where is he? - He\'s at the office.</li></ul><p>- Where are they?<br>- They are in the kitchen.</p><ul class="gram-bullets"><li>Estrutura útil para RECADOS ao telefone: - "She\'s not at her desk right now." - "He\'s in a meeting." - "She\'s on the phone." - "He\'s at lunch." - "She\'s out of the office."</li></ul><ul class="gram-bullets"><li>Combinando com outras estruturas: - "She\'s at home WATCHING TV." (presente contínuo) - "He\'s in the kitchen COOKING dinner." - "They are at the gym EXERCISING."</li></ul></div></div>'}

{order:4,badge:'4',topic:'WH-WORDS COM O VERBO TO BE',book:'Red book',ref:'Red book - pg. 4',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>WH-WORDS são palavras interrogativas usadas para fazer perguntas mais<br>complexas. Diferente de perguntas de SIM/NÃO, as WH-Questions exigem uma<br>INFORMAÇÃO ESPECÍFICA como resposta.</p><p>Quando usadas com o verbo TO BE, a estrutura é direta: começamos pela<br>WH-Word, seguida pelo verbo to be e pelo restante da frase.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><p>WH-WORD + TO BE (is/are) + RESTO DA FRASE ?</p><h5 class="gram-subhead">PRINCIPAIS WH-WORDS:</h5><p>WHERE = Onde?<br>WHY = Por quê?<br>WHEN = Quando?<br>WHO = Quem?<br>WHAT = O que? / Qual?<br>HOW = Como?</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">When is your birthday?</span> <span class="gram-trans">(Quando é seu aniversário?)</span></li><li><span class="gram-eng">Where is your school?</span> <span class="gram-trans">(Onde fica sua escola?)</span></li><li><span class="gram-eng">Who is that man?</span> <span class="gram-trans">(Quem é aquele homem?)</span></li><li><span class="gram-eng">Why are you sad?</span> <span class="gram-trans">(Por que você está triste?)</span></li><li><span class="gram-eng">What is your favorite color?</span> <span class="gram-trans">(Qual é sua cor favorita?)</span></li><li><span class="gram-eng">How are your parents?</span> <span class="gram-trans">(Como estão seus pais?)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>Use IS para sujeitos no singular (your birthday, your school, that man).</li><li>Use ARE para sujeitos no plural (your parents, your friends, those books).</li></ul><ul class="gram-bullets"><li>Para responder, geralmente NÃO se usa Yes/No - dá-se a informação pedida: - When is your birthday? - It\'s on May 12th.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Não confunda: - WHO is your teacher? (Quem é? - pergunta sobre identidade) - WHAT is your teacher like?</span> <span class="gram-trans">(Como é? - pergunta sobre características)</span></li></ul></div></div>'},
{order:10,badge:'10',topic:'WH-QUESTIONS COM SIMPLE PRESENT',book:'Red book',ref:'Red book - pg. 10',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Para fazer perguntas mais detalhadas no Simple Present (que não sejam apenas<br>SIM/NÃO), usamos uma combinação de WH-WORDS com o verbo auxiliar DO ou DOES.</p><p>Essas perguntas pedem uma informação específica como resposta (um local,<br>uma razão, um momento, uma pessoa, uma quantidade, etc.).</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><p>WH-QUESTION + DO/DOES + SUJEITO + VERBO (forma original) ?</p><h5 class="gram-subhead">AUXILIARES:</h5><p>DO → para I, YOU, WE, THEY<br>DOES → para HE, SHE, IT</p><h5 class="gram-subhead">PRINCIPAIS WH-WORDS:</h5><p>WHERE = Onde?<br>WHAT = O que? / Qual?<br>WHEN = Quando?<br>WHO = Quem?<br>HOW = Como?<br>WHY = Por quê?</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">Why do you drink coffee every day?</span> <span class="gram-trans">(Por que você toma café todos os dias?)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Where do you live?</span> <span class="gram-trans">(Onde você mora?)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">What does she eat for breakfast?</span> <span class="gram-trans">(O que ela come no café da manhã?)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">When do they study English?</span> <span class="gram-trans">(Quando eles estudam inglês?)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">How does he go to work?</span> <span class="gram-trans">(Como ele vai para o trabalho?)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Who do you live with?</span> <span class="gram-trans">(Com quem você mora?)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>MUITO IMPORTANTE: o verbo principal SEMPRE fica na FORMA ORIGINAL, mesmo com he/she/it: ❌ Where does she lives? ✔️ Where does she live?</li></ul><ul class="gram-bullets"><li>Não confunda essas perguntas com perguntas usando o verbo TO BE: - Where do you LIVE? (verbo principal "live") - Where ARE you from? (verbo to be "are")</li></ul><ul class="gram-bullets"><li>Para responder, dê a INFORMAÇÃO ESPECÍFICA (não Yes/No): - Where do you live? - I live in São Paulo.</li></ul></div></div>'},
{order:17,badge:'17',topic:'ONE/ONES, WHICH, THIS/THESE, THAT/THOSE',book:'Red book',ref:'Red book - pg. 17',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Nesta página estudamos três grupos de palavras muito úteis em conversação,<br>especialmente em situações de COMPRAS e DESCRIÇÕES:</p><p>1) ONE / ONES → usados para SUBSTITUIR um substantivo já mencionado,<br>evitando a repetição.</p><p>2) WHICH → usado para PERGUNTAR qual item específico entre várias opções.</p><p>3) THIS / THESE / THAT / THOSE → DEMONSTRATIVOS que indicam a localização<br>dos objetos em relação ao falante.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ONE / ONES (substituem substantivo):</h5><p>ONE → substitui substantivos no SINGULAR<br>ONES → substitui substantivos no PLURAL</p><h5 class="gram-subhead">WHICH (qual? quais?):</h5><p>WHICH + (substantivo) + ...<br>WHICH ONE / WHICH ONES</p><h5 class="gram-subhead">DEMONSTRATIVOS:</h5><p>SINGULAR PLURAL<br>PERTO do falante: THIS THESE<br>LONGE do falante: THAT THOSE</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">ONE / ONES (substituindo o substantivo):</h5><ul class="gram-bullets"><li><span class="gram-eng">The blue jacket → The blue ONE</span> <span class="gram-trans">(em vez de repetir "jacket")</span></li><li><span class="gram-eng">The pretty colors → The pretty ONES</span> <span class="gram-trans">(em vez de repetir "colors")</span></li><li>I like the red car, not the green one.</li></ul><h5 class="gram-subhead">WHICH (perguntando especificamente):</h5><ul class="gram-bullets"><li>Which shirt? → Which ONE?</li><li>Which colors? → Which ONES?</li><li>Which book do you prefer?</li></ul><h5 class="gram-subhead">THIS / THESE (objetos PRÓXIMOS):</h5><ul class="gram-bullets"><li><span class="gram-eng">This is my book.</span> <span class="gram-trans">(Singular - este aqui)</span></li><li>These are my friends. (Plural - estes aqui)</li></ul><h5 class="gram-subhead">THAT / THOSE (objetos DISTANTES):</h5><ul class="gram-bullets"><li><span class="gram-eng">That is your bag.</span> <span class="gram-trans">(Singular - aquela ali)</span></li><li><span class="gram-eng">Those are her shoes.</span> <span class="gram-trans">(Plural - aqueles lá)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">Use ONE/ONES para evitar redundância. É mais natural em inglês. - Do you want the big book or the small ONE?</span> <span class="gram-trans">(não precisa repetir "book")</span></li></ul><ul class="gram-bullets"><li>Combinações úteis: - This one / These ones - That one / Those ones - The blue one / The red ones</li></ul><ul class="gram-bullets"><li>Em diálogos de compras, são extremamente comuns: - Which shirt do you like? - I like the blue one.</li></ul></div></div>'},
{order:20,badge:'20',topic:'PREFERENCES & COMPARISONS WITH ADJECTIVES',book:'Red book',ref:'Red book - pg. 20',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta página apresenta dois tópicos importantes para expressar gostos e<br>descrever diferenças entre coisas:</p><p>1) PREFERENCES (Preferências)<br>Três estruturas equivalentes para dizer o que você prefere.</p><p>2) COMPARATIVES (Comparativos)<br>Usados para COMPARAR duas pessoas ou coisas. A formação muda conforme<br>o TAMANHO do adjetivo (curto ou longo).</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">EXPRESSANDO PREFERÊNCIAS:</h5><p>I PREFER + objeto<br>I LIKE + objeto + MORE<br>I LIKE + objeto + BETTER</p><h5 class="gram-subhead">COMPARATIVOS:</h5><ul class="gram-bullets"><li>Adjetivos CURTOS (1 sílaba ou 2 sílabas terminadas em -y): adicione -ER ao final - big → bigger - happy → happier (troca y por i) - small → smaller - tall → taller</li></ul><ul class="gram-bullets"><li>Adjetivos LONGOS (2+ sílabas): use MORE antes do adjetivo - beautiful → more beautiful - expensive → more expensive - interesting → more interesting</li></ul><ul class="gram-bullets"><li>Adjetivos IRREGULARES: - good → better - bad → worse - far → farther/further</li></ul><h5 class="gram-subhead">ESTRUTURA DE COMPARAÇÃO:</h5><p>X + IS + COMPARATIVO + THAN + Y</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">EXPRESSANDO PREFERÊNCIAS (frases equivalentes):</h5><ul class="gram-bullets"><li>I prefer the blue shirt.</li><li>I like the blue one more.</li><li>I like the blue one better.</li></ul><h5 class="gram-subhead">COMPARATIVOS - ADJETIVOS CURTOS:</h5><ul class="gram-bullets"><li>big → bigger</li><li>happy → happier</li><li>This house is bigger than that one.</li><li>She is happier than her brother.</li></ul><h5 class="gram-subhead">COMPARATIVOS - ADJETIVOS LONGOS:</h5><ul class="gram-bullets"><li>beautiful → more beautiful</li><li>expensive → more expensive</li><li>This dress is more beautiful than that one.</li><li>My car is more expensive than yours.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>NÃO ESQUEÇA DE USAR "THAN" nas comparações: ❌ My house is bigger your house. ✔️ My house is bigger THAN your house.</li></ul><ul class="gram-bullets"><li>Regras de ortografia para -ER: - Verbos terminados em -E: apenas adicione -R (large → larger) - Consoante-vogal-consoante: dobre a consoante (big → bigger, hot → hotter) - Consoante + Y: troque Y por -IER (happy → happier)</li></ul><ul class="gram-bullets"><li>NÃO use MORE com adjetivos curtos: ❌ This house is more big. ✔️ This house is bigger.</li></ul></div></div>'},
{order:23,badge:'23',topic:'SIMPLE PRESENT - YES/NO QUESTIONS',book:'Red book',ref:'Red book - pg. 23',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Para fazer perguntas de SIM/NÃO no Simple Present, utilizamos os verbos<br>AUXILIARES "DO" e "DOES" no INÍCIO da frase.</p><p>A resposta sempre repete o mesmo auxiliar usado na pergunta (do/does<br>para afirmativa; don\'t/doesn\'t para negativa).</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">PERGUNTAS YES/NO:</h5><p>DO/DOES + SUJEITO + VERBO (forma original) + COMPLEMENTO ?</p><h5 class="gram-subhead">WH-QUESTIONS:</h5><p>WH-WORD + DO/DOES + SUJEITO + VERBO + COMPLEMENTO ?</p><h5 class="gram-subhead">AUXILIARES POR SUJEITO:</h5><p>DO → I, YOU, WE, THEY<br>DOES → HE, SHE, IT (3ª pessoa do singular)</p><h5 class="gram-subhead">RESPOSTAS CURTAS:</h5><p>AFIRMATIVA: Yes, + sujeito + DO/DOES.<br>NEGATIVA: No, + sujeito + DON\'T/DOESN\'T.</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">PERGUNTAS E RESPOSTAS COM "DOES":</h5><ul class="gram-bullets"><li>Does she like the boy? - Yes, she does. / No, she doesn\'t.</li></ul><ul class="gram-bullets"><li>Does he play soccer? - Yes, he does. / No, he doesn\'t.</li></ul><h5 class="gram-subhead">PERGUNTAS E RESPOSTAS COM "DO":</h5><ul class="gram-bullets"><li>Do you drink water every day? - Yes, I do. / No, I don\'t.</li></ul><ul class="gram-bullets"><li>Do they study English? - Yes, they do. / No, they don\'t.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE: o verbo principal SEMPRE fica na forma ORIGINAL (sem -S), mesmo com he/she/it: ❌ Does she likes the boy? ✔️ Does she like the boy?</li></ul><ul class="gram-bullets"><li>Em respostas curtas, NUNCA use o verbo principal: ❌ Yes, she likes. ✔️ Yes, she does.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Cuidado para não confundir com perguntas usando o verbo TO BE: - Do you LIKE pizza? (verbo principal "like" → usa "do") - ARE you happy?</span> <span class="gram-trans">(verbo to be "are" → não usa "do")</span></li></ul></div></div>'},
{order:26,badge:'26',topic:'INVITATIONS (Convites)',book:'Red book',ref:'Red book - pg. 26 e Red book - pg. 27',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>No inglês, há estruturas específicas para FAZER, ACEITAR e RECUSAR convites.<br>Saber utilizá-las é essencial para conversações cotidianas e socialmente<br>naturais.</p><p>A escolha entre uma estrutura e outra também envolve um nível de FORMALIDADE:<br>"Would you like to..." é mais educado do que "Do you want to...".</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">FAZENDO UM CONVITE:</h5><ul class="gram-bullets"><li>Would you like to + verbo + complemento? (mais educado/formal)</li><li>Do you want to + verbo + complemento? (mais informal)</li></ul><h5 class="gram-subhead">ACEITANDO UM CONVITE:</h5><ul class="gram-bullets"><li>Yes, I would. / Yes, I want to.</li><li>I\'d love to. (mais educado)</li><li>Sure! / Of course!</li></ul><h5 class="gram-subhead">RECUSANDO UM CONVITE (com desculpa):</h5><p>Use: want to / need to / have to + razão</p><ul class="gram-bullets"><li>I\'d like to, but I have to...</li><li>I\'d love to, but I need to...</li><li>Sorry, I can\'t. I want to...</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">CONVITES E ACEITES:</h5><ul class="gram-bullets"><li>Would you like to go to a party with me? - Yes, I would. - I\'d love to. (mais educado)</li></ul><ul class="gram-bullets"><li>Do you want to go to the cinema with me? - Yes, I want to! - Sure, let\'s go!</li></ul><h5 class="gram-subhead">RECUSAS COM DESCULPAS:</h5><ul class="gram-bullets"><li>Would you like to play soccer with me? - I\'d like to, but I have to do my homework.</li></ul><ul class="gram-bullets"><li>Do you want to go to the cinema with me? - I\'d like to, but I have to go to the doctor.</li></ul><ul class="gram-bullets"><li>Would you like to eat pizza tomorrow? - I\'d like to, but I need to study for a test.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>"I\'d love to" é educadamente entusiasmado - mostra interesse genuíno. "I\'d" é a contração de "I would".</li></ul><ul class="gram-bullets"><li>Ao RECUSAR um convite, é considerado polido SEMPRE DAR UMA DESCULPA - apenas dizer "no" sem justificativa pode ser visto como rude.</li></ul><ul class="gram-bullets"><li>Estrutura útil para recusa polida: - "Thanks for the invitation, but..." + razão.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Lembre-se: após "Would you like to" ou "Do you want to", o verbo seguinte sempre vai na FORMA ORIGINAL: - Would you like to GO? (não "to going") - Do you want to EAT?</span> <span class="gram-trans">(não "to eating")</span></li></ul></div></div>'},
{order:34,badge:'34',topic:'QUANTIFIERS (Quantificadores)',book:'Red book',ref:'Red book - pg. 34',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>QUANTIFIERS são palavras usadas para expressar quantidades aproximadas<br>quando não sabemos ou não queremos dizer a quantidade EXATA.</p><p>Em vez de dizer "85% dos estudantes" ou um número específico, usamos<br>quantificadores como "most students" (a maioria dos estudantes), "many",<br>"some", etc.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESCALA DE QUANTIFICADORES (do mais para o menos):</h5><p>ALL = 100% (todos)<br>NEARLY ALL = ~95% (quase todos)<br>MOST = ~75% (a maioria)<br>MANY = ~60% (muitos)<br>A LOT OF = ~60% (muitos)<br>SOME = ~50% (alguns)<br>NOT MANY = ~25% (não muitos)<br>FEW = ~10% (poucos)<br>NO ONE = 0% (ninguém)</p><h5 class="gram-subhead">REGRAS IMPORTANTES DE POSIÇÃO:</h5><ul class="gram-bullets"><li>A maioria dos quantifiers vem ANTES de palavras no PLURAL: all, nearly all, most, many, a lot of, some, not many, few</li></ul><ul class="gram-bullets"><li>"NO ONE" é uma exceção: vem antes de VERBOS NA 3ª PESSOA DO SINGULAR (he, she, it). Isso porque "no one" significa "nenhuma pessoa" (singular).</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM SUBSTANTIVOS NO PLURAL:</h5><ul class="gram-bullets"><li><span class="gram-eng">Most students in Brazil do well in school.</span> <span class="gram-trans">(A maioria dos estudantes no Brasil vai bem na escola.)</span></li><li>Many people like soccer.</li><li>Some friends came to my party.</li><li>Few cars are electric in this city.</li></ul><h5 class="gram-subhead">COM "NO ONE" (verbo no singular):</h5><ul class="gram-bullets"><li><span class="gram-eng">No one likes to eat pineapple in my family.</span> <span class="gram-trans">(Ninguém na minha família gosta de comer abacaxi.)</span></li><li>No one knows the answer.</li><li>No one wants to clean the house.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>ATENÇÃO à conjugação verbal: ❌ Most students DOES well in school. (most = plural → "do") ✔️ Most students DO well in school.</li></ul><p>❌ No one LIKE pineapple. (no one = singular → "likes")<br>✔️ No one LIKES pineapple.</p><ul class="gram-bullets"><li>MANY x MUCH: - MANY → para substantivos contáveis (many books, many people) - MUCH → para substantivos incontáveis (much water, much money)</li></ul><ul class="gram-bullets"><li><span class="gram-eng">A LOT OF é mais versátil: funciona com contáveis E incontáveis: - A lot of books / A lot of water</span> <span class="gram-trans">(sempre válido)</span></li></ul></div></div>'},
{order:40,badge:'40',topic:'QUESTIONS WITH "HOW" (Perguntas com How)',book:'Red book',ref:'Red book - pg. 40',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>A palavra "HOW" (como) pode ser combinada com outras palavras para formar<br>diversas perguntas específicas sobre FREQUÊNCIA, DURAÇÃO, QUALIDADE e<br>HABILIDADE.</p><p>Cada combinação tem um uso e uma estrutura específica.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">HOW OFTEN (com que frequência?):</h5><p>Para perguntar sobre FREQUÊNCIA de uma ação.<br>HOW OFTEN + do/does + sujeito + verbo?</p><h5 class="gram-subhead">HOW LONG (por quanto tempo?):</h5><p>Para perguntar sobre DURAÇÃO de uma ação.<br>HOW LONG + do/does + sujeito + verbo?</p><h5 class="gram-subhead">HOW GOOD (quão bom?):</h5><p>Para perguntar sobre habilidade COM O VERBO TO BE.<br>HOW GOOD + is/are + sujeito + at + atividade?</p><h5 class="gram-subhead">HOW WELL (quão bem?):</h5><p>Para perguntar sobre desempenho COM OUTROS VERBOS.<br>HOW WELL + do/does + sujeito + verbo?</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">HOW OFTEN (frequência):</h5><p>- How often do you run?<br>- I run every day.</p><p>- How often does she go to the gym?<br>- She goes three times a week.</p><h5 class="gram-subhead">HOW LONG (duração):</h5><p>- How long do you run?<br>- I run for about an hour.</p><p>- How long do you study English?<br>- For two hours every day.</p><h5 class="gram-subhead">HOW GOOD (com to be - habilidade):</h5><p>- How good are you at sports?<br>- I am pretty good.</p><p>- How good is he at chess?<br>- He is excellent.</p><h5 class="gram-subhead">HOW WELL (com outros verbos - desempenho):</h5><p>- How well do you sing?<br>- I sing pretty well.</p><p>- How well does she speak English?<br>- She speaks really well.</p></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>GOOD x WELL é uma diferença importante: - GOOD é ADJETIVO → usa-se com TO BE - WELL é ADVÉRBIO → usa-se com outros verbos</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Outras combinações úteis com HOW: - How much...? (quanto - incontável: How much is it?) - How many...? (quantos - contável: How many books do you have?) - How old...? (quantos anos) - How tall...? (qual a altura) - How far...?</span> <span class="gram-trans">(qual a distância)</span></li></ul><ul class="gram-bullets"><li>Respostas naturais sobre frequência: - every day / once a week / twice a month / three times a year - never / sometimes / always</li></ul></div></div>'},
{order:45,badge:'45',topic:'SIMPLE PAST (Passado Simples)',book:'Red book',ref:'Red book - pg. 45, Intro - pg. 93, Blue book - pg. 3',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O SIMPLE PAST (Passado Simples) é usado para descrever AÇÕES JÁ TERMINADAS<br>em um momento específico do passado. É equivalente ao "pretérito perfeito"<br>em português (eu fiz, eu joguei, eu vi).</p><p>Os verbos no Simple Past dividem-se em:</p><p>1) VERBOS REGULARES: caracterizados pelo -ED no final.<br>2) VERBOS IRREGULARES: não seguem uma regra fixa - a forma no passado<br>precisa ser memorizada.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA:</h5><p>SUJEITO + VERBO NO PASSADO + COMPLEMENTO</p><h5 class="gram-subhead">NEGATIVA:</h5><p>SUJEITO + DIDN\'T + VERBO (FORMA ORIGINAL) + COMPLEMENTO</p><h5 class="gram-subhead">INTERROGATIVA:</h5><p>DID + SUJEITO + VERBO (FORMA ORIGINAL) + COMPLEMENTO ?</p><h5 class="gram-subhead">WH-QUESTIONS:</h5><p>WH-WORD + DID + SUJEITO + VERBO (FORMA ORIGINAL) + COMPLEMENTO ?</p><h5 class="gram-subhead">REGRAS PARA VERBOS REGULARES (-ED):</h5><ul class="gram-bullets"><li>Maioria: adicione -ED work → worked | play → played</li><li>Verbos terminados em -E: adicione apenas -D dance → danced | like → liked</li><li>Verbos terminados em CONSOANTE + Y: troque Y por -IED try → tried | study → studied</li><li>Verbos curtos terminados em CVC: dobre a consoante final stop → stopped | plan → planned</li></ul><h5 class="gram-subhead">VERBOS IRREGULARES COMUNS:</h5><p>see → saw | go → went | have → had<br>take → took | make → made | come → came<br>do → did | eat → ate | drink → drank<br>buy → bought | bring → brought | think → thought<br>sleep → slept | read → read | write → wrote</p><h5 class="gram-subhead">PAST FORM OF TO BE:</h5><p>I, HE, SHE, IT → WAS<br>YOU, WE, THEY → WERE</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">VERBOS REGULARES:</h5><ul class="gram-bullets"><li>I worked yesterday. (Trabalhei ontem.)</li><li><span class="gram-eng">She played soccer last week.</span> <span class="gram-trans">(Ela jogou futebol semana passada.)</span></li><li>They tried hard.</li></ul><h5 class="gram-subhead">VERBOS IRREGULARES:</h5><ul class="gram-bullets"><li>I saw her at school.</li><li>He took the bus this morning.</li><li>We had a great time.</li></ul><h5 class="gram-subhead">FORMA NEGATIVA:</h5><ul class="gram-bullets"><li>I didn\'t work yesterday.</li><li>She didn\'t play soccer.</li><li>They didn\'t see the movie.</li></ul><h5 class="gram-subhead">FORMA INTERROGATIVA:</h5><ul class="gram-bullets"><li>What did you say to him?</li><li>Where did you go yesterday?</li><li>Did she eat dinner already?</li></ul><h5 class="gram-subhead">PAST OF TO BE:</h5><ul class="gram-bullets"><li>I was really tired yesterday.</li><li>He was drinking too much juice.</li><li>Were you tired yesterday?</li><li>We were playing soccer!</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>ATENÇÃO: Em negativas e interrogativas com DID/DIDN\'T, o verbo principal volta à FORMA ORIGINAL (sem -ed): ❌ Did you saw the movie? ✔️ Did you SEE the movie? ❌ She didn\'t worked yesterday. ✔️ She didn\'t WORK yesterday.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Expressões de tempo comuns com Simple Past: - yesterday, last week, last month, last year - two days ago, three years ago - in 2010, in 1990 - this morning</span> <span class="gram-trans">(se já passou)</span></li></ul><ul class="gram-bullets"><li>A pronúncia do -ED tem três variações: - /t/ → para verbos terminados em sons surdos (worked, stopped) - /d/ → para verbos terminados em sons sonoros (played, loved) - /id/ → para verbos terminados em -t ou -d (wanted, decided)</li></ul></div></div>'},
{order:47,badge:'47',topic:'PAST FORM OF TO BE (Verbo To Be no Passado)',book:'Red book',ref:'Red book - pg. 47',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O verbo TO BE no passado tem apenas DUAS formas: WAS e WERE.</p><p>Estas formas substituem AM, IS e ARE para indicar que algo "foi", "estava"<br>ou "esteve" em algum momento passado.</p><p>A escolha entre WAS e WERE depende SOMENTE do sujeito da frase.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">CONJUGAÇÃO:</h5><p>I → WAS<br>HE / SHE / IT → WAS<br>YOU → WERE<br>WE → WERE<br>THEY → WERE</p><h5 class="gram-subhead">AFIRMATIVA:</h5><p>SUJEITO + WAS/WERE + COMPLEMENTO</p><h5 class="gram-subhead">NEGATIVA:</h5><p>SUJEITO + WAS NOT (WASN\'T) / WERE NOT (WEREN\'T) + COMPLEMENTO</p><h5 class="gram-subhead">INTERROGATIVA:</h5><p>WAS/WERE + SUJEITO + COMPLEMENTO ?</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">AFIRMATIVA COM WAS (I, he, she, it):</h5><ul class="gram-bullets"><li><span class="gram-eng">I was really tired yesterday.</span> <span class="gram-trans">(Eu estava muito cansado ontem.)</span></li><li><span class="gram-eng">He was drinking too much juice.</span> <span class="gram-trans">(Ele estava bebendo muito suco.)</span></li><li>She was at home last night.</li><li>It was a beautiful day.</li></ul><h5 class="gram-subhead">AFIRMATIVA COM WERE (you, we, they):</h5><ul class="gram-bullets"><li><span class="gram-eng">You were a nice student.</span> <span class="gram-trans">(Você era um bom aluno.)</span></li><li><span class="gram-eng">We were playing soccer!</span> <span class="gram-trans">(Nós estávamos jogando futebol!)</span></li><li>They were happy yesterday.</li></ul><h5 class="gram-subhead">INTERROGATIVA:</h5><ul class="gram-bullets"><li>Were you tired yesterday? - Yes, I was. / No, I wasn\'t.</li></ul><ul class="gram-bullets"><li>Was she at the party? - Yes, she was. / No, she wasn\'t.</li></ul><h5 class="gram-subhead">NEGATIVA:</h5><ul class="gram-bullets"><li>I wasn\'t at school yesterday.</li><li>They weren\'t ready for the test.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>Contrações negativas: - WAS NOT → WASN\'T - WERE NOT → WEREN\'T</li></ul><ul class="gram-bullets"><li>O verbo TO BE no passado também é usado para formar o PAST CONTINUOUS: - I WAS drinking water when she arrived. - They WERE studying together.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">Cuidado para não confundir: - I WAS tired. (verbo to be no passado) - I HAD a car.</span> <span class="gram-trans">(outro verbo no passado)</span></li></ul><ul class="gram-bullets"><li>Em respostas curtas, usa-se o mesmo was/were: - Were you happy? - Yes, I was. / No, I wasn\'t.</li></ul></div></div>'},
{order:54,badge:'54',topic:'COUNT & NONCOUNT NOUNS - QUANTIFIERS',book:'Red book',ref:'Red book - pg. 54 e Blue book - pg. 9',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Quando usamos substantivos contáveis e incontáveis, precisamos usar<br>QUANTIFICADORES diferentes para cada tipo. Existem palavras específicas<br>que combinam apenas com cada categoria.</p><p>Conhecer esses pares é fundamental para soar natural em inglês.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM COUNT NOUNS (substantivos contáveis):</h5><p>MANY → muitos<br>FEW → poucos<br>FEWER → menos (comparativo)<br>A FEW → alguns (com sentido positivo)</p><h5 class="gram-subhead">COM NONCOUNT NOUNS (substantivos incontáveis):</h5><p>MUCH → muito<br>LITTLE → pouco<br>LESS → menos (comparativo)<br>A LITTLE → um pouco (com sentido positivo)</p><h5 class="gram-subhead">COM AMBOS (contáveis e incontáveis):</h5><p>A LOT OF / LOTS OF → muitos / muito<br>SOME → algum / alguns<br>ANY → algum (em negativas/interrogativas)<br>ENOUGH → o suficiente (vem antes do substantivo)<br>TOO MUCH / TOO MANY → excesso (much = incont, many = cont)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COUNT NOUNS (cars, books, people):</h5><ul class="gram-bullets"><li><span class="gram-eng">There are few cars in my city.</span> <span class="gram-trans">(Há poucos carros na minha cidade.)</span></li><li>There should be fewer cars in the city.</li><li>There are too many people on the streets.</li><li>I have too many books in my bookshelf.</li></ul><h5 class="gram-subhead">NONCOUNT NOUNS (pollution, noise, water):</h5><ul class="gram-bullets"><li><span class="gram-eng">There is much pollution here.</span> <span class="gram-trans">(Há muita poluição aqui.)</span></li><li><span class="gram-eng">There should be less pollution here.</span> <span class="gram-trans">(Deveria haver menos poluição aqui.)</span></li><li><span class="gram-eng">There is little noise at my house.</span> <span class="gram-trans">(Há pouco barulho na minha casa.)</span></li><li>There is too much noise here.</li></ul><h5 class="gram-subhead">ENOUGH (vem ANTES do substantivo):</h5><ul class="gram-bullets"><li><span class="gram-eng">There isn\'t enough air here.</span> <span class="gram-trans">(Não há ar suficiente aqui.)</span></li><li><span class="gram-eng">There aren\'t enough houses in my neighborhood.</span> <span class="gram-trans">(Não há casas suficientes no meu bairro.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>ATENÇÃO: Noncount nouns são SEMPRE singulares - usam-se com THERE IS: ✔️ There is too much water. ❌ There are too much waters.</li></ul><ul class="gram-bullets"><li>Diferença sutil: - FEW / LITTLE → ideia NEGATIVA ("pouco, quase nada") - A FEW / A LITTLE → ideia NEUTRA ou POSITIVA ("algum, um pouquinho")</li></ul><p>Exemplos:<br>- I have few friends. (poucos amigos = sentido negativo)<br>- I have a few friends. (alguns amigos = sentido positivo)</p><ul class="gram-bullets"><li>Verbos típicos com noncount nouns: - pollution, traffic, noise, music, advice, information, news, water - rice, sugar, salt, money, time</li></ul></div></div>'},
{order:62,badge:'62',topic:'PRESENT PARTICIPLE & PREPOSITIONS TO DESCRIBE PEOPLE',book:'Red book',ref:'Red book - pg. 62',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Para DESCREVER PESSOAS - o que estão vestindo ou fazendo - o inglês oferece<br>duas estruturas muito úteis:</p><p>1) PRESENT PARTICIPLE (verbo + -ING)<br>Usado para descrever uma AÇÃO que a pessoa está fazendo ou roupa que<br>está usando, com sentido descritivo.</p><p>2) PREPOSIÇÕES (in, with, next to, on)<br>Usadas para descrever LOCALIZAÇÃO ou CARACTERÍSTICAS visíveis da<br>pessoa (roupas, acessórios, posição).</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM PRESENT PARTICIPLE (-ING):</h5><p>NOME + IS + THE + (descrição) + VERBO + ING + complemento</p><h5 class="gram-subhead">COM PREPOSIÇÕES:</h5><p>NOME + IS + THE + (descrição) + PREPOSIÇÃO + complemento</p><h5 class="gram-subhead">PREPOSIÇÕES COMUNS PARA DESCREVER:</h5><p>IN → para roupas (in jeans, in a red dress)<br>WITH → para acessórios/itens (with glasses, with black shoes)<br>NEXT TO → ao lado de<br>ON → em (on the chair, on the left)</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">USANDO PRESENT PARTICIPLE (-ING):</h5><ul class="gram-bullets"><li><span class="gram-eng">Lucas is the man STANDING next to Olivia.</span> <span class="gram-trans">(Lucas é o homem em pé ao lado da Olivia.)</span></li><li><span class="gram-eng">Carlos is the elderly man DRINKING water.</span> <span class="gram-trans">(Carlos é o senhor bebendo água.)</span></li><li><span class="gram-eng">Julia is the girl EATING cake.</span> <span class="gram-trans">(Julia é a garota comendo bolo.)</span></li></ul><h5 class="gram-subhead">USANDO PREPOSIÇÕES:</h5><ul class="gram-bullets"><li><span class="gram-eng">Lucas is the man IN jeans.</span> <span class="gram-trans">(Lucas é o homem de jeans.)</span></li><li><span class="gram-eng">Carlos is the elderly man WITH black shoes.</span> <span class="gram-trans">(Carlos é o senhor com sapatos pretos.)</span></li><li><span class="gram-eng">Julia is the girl NEXT TO the window.</span> <span class="gram-trans">(Julia é a garota ao lado da janela.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>Note que NÃO usamos o verbo to be antes do particípio aqui - é uma redução de "who is": - The man WHO IS standing → The man STANDING</li></ul><ul class="gram-bullets"><li>Você pode combinar as duas estruturas em uma única descrição: - Lucas is the man in jeans standing next to Olivia. - Julia is the girl with red hair eating cake.</li></ul><ul class="gram-bullets"><li>Essas estruturas são muito úteis em descrições de fotos, em apresentações e ao apontar pessoas em uma multidão.</li></ul></div></div>'},
{order:73,badge:'73',topic:'ADVERBS OF INTENSITY & CONJUNCTIONS',book:'Red book',ref:'Red book - pg. 73',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta página apresenta dois tópicos complementares:</p><p>1) ADVERBS OF INTENSITY (Advérbios de Intensidade)<br>Usamos esses advérbios ANTES de adjetivos para INTENSIFICÁ-LOS, deixando<br>a ideia mais forte ou suave.</p><p>2) CONJUNCTIONS (Conjunções)<br>Palavras como AND, BUT, HOWEVER e THOUGH são usadas para CONECTAR ideias,<br>sejam similares (ambas positivas/negativas) ou contrastantes.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ADVÉRBIOS DE INTENSIDADE (do mais para o menos intenso):</h5><p>EXTREMELY → extremamente<br>VERY → muito<br>REALLY → realmente<br>PRETTY → bastante<br>FAIRLY → razoavelmente<br>TOO → demais (sentido negativo - "mais que o necessário")</p><p>Estrutura: SUJEITO + TO BE + ADV. INTENSIDADE + ADJETIVO</p><h5 class="gram-subhead">CONJUNÇÕES PARA CONECTAR IDEIAS:</h5><ul class="gram-bullets"><li>AND (&amp;) - conecta ideias DO MESMO TIPO (positiva+positiva ou negativa+negativa)</li></ul><ul class="gram-bullets"><li>BUT, HOWEVER, THOUGH - conectam ideias CONTRASTANTES</li></ul><p>POSIÇÕES:<br>- BUT vai no MEIO da frase, separando as duas ideias<br>- HOWEVER e THOUGH ficam no FINAL da segunda frase, com vírgula</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">ADVÉRBIOS DE INTENSIDADE:</h5><ul class="gram-bullets"><li>She is tired.</li><li>She is extremely tired.</li><li>She is very tired.</li><li>She is really tired.</li><li>She is pretty tired.</li><li>She is fairly tired.</li></ul><h5 class="gram-subhead">USO ESPECIAL DE "TOO" (sentido negativo):</h5><ul class="gram-bullets"><li><span class="gram-eng">This house is too big.</span> <span class="gram-trans">(Esta casa é grande demais - mais do que o necessário)</span></li><li><span class="gram-eng">This dessert is too sweet.</span> <span class="gram-trans">(Esta sobremesa é doce demais)</span></li></ul><h5 class="gram-subhead">CONJUNÇÕES - IDEIAS SIMILARES (AND):</h5><ul class="gram-bullets"><li><span class="gram-eng">She is happy AND excited.</span> <span class="gram-trans">(Ela está feliz E animada.)</span></li><li>The city has many cars AND it also has many people.</li></ul><h5 class="gram-subhead">CONJUNÇÕES - IDEIAS CONTRASTANTES:</h5><ul class="gram-bullets"><li><span class="gram-eng">The city was really noisy, BUT the weather was good.</span> <span class="gram-trans">(A cidade era barulhenta, mas o tempo estava bom.)</span></li><li><span class="gram-eng">The weather was great. The city was terrible, THOUGH.</span> <span class="gram-trans">(O clima estava ótimo. A cidade estava terrível, no entanto.)</span></li><li>The food was really spicy. The dessert was delicious, HOWEVER.</li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li><span class="gram-eng">"TOO" tem conotação NEGATIVA - implica que algo passou do limite ideal. Não confunda com VERY (apenas "muito"): - This coffee is VERY hot. (Está muito quente - pode ser bom) - This coffee is TOO hot.</span> <span class="gram-trans">(Está quente demais - é um problema)</span></li></ul><ul class="gram-bullets"><li>POSIÇÃO das conjunções de contraste: ✔️ It\'s hot, BUT I\'ll go out. ✔️ It\'s hot. I\'ll go out, THOUGH. ✔️ It\'s hot. I\'ll go out, HOWEVER.</li></ul><ul class="gram-bullets"><li>Lembre-se de usar VÍRGULA antes de HOWEVER e THOUGH no final da frase.</li></ul><ul class="gram-bullets"><li>HOWEVER é mais FORMAL que THOUGH e BUT.</li></ul></div></div>'},
{order:93,badge:'93',topic:'SUPERLATIVES (Superlativos)',book:'Red book',ref:'Red book - pg. 93',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Usamos os SUPERLATIVOS na língua inglesa para expressar duas ideias<br>principais:</p><p>1) Como uma palavra é DIFERENTE/ÚNICA dentro de um grupo;<br>2) Quando fazemos uma comparação envolvendo 3 OU MAIS itens.</p><p>Em português, o superlativo equivale a "o mais...", "o melhor", "o pior".</p><p>A formação muda conforme o TAMANHO do adjetivo (curto ou longo).</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA BÁSICA:</h5><p>THE + SUPERLATIVO + (substantivo) + IN/OF + grupo</p><h5 class="gram-subhead">FORMAÇÃO DO SUPERLATIVO:</h5><ul class="gram-bullets"><li>ADJETIVOS CURTOS (1 sílaba ou 2 sílabas terminadas em -y): adicione o sufixo -EST big → biggest | happy → happiest small → smallest | fast → fastest hot → hottest | nice → nicest</li></ul><ul class="gram-bullets"><li>ADJETIVOS LONGOS (2+ sílabas): coloque MOST antes do adjetivo beautiful → most beautiful expensive → most expensive interesting → most interesting important → most important</li></ul><h5 class="gram-subhead">ADJETIVOS IRREGULARES:</h5><p>GOOD → BEST (o melhor)<br>BAD → WORST (o pior)<br>FAR → FARTHEST / FURTHEST</p></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">COM ADJETIVOS CURTOS (-EST):</h5><ul class="gram-bullets"><li><span class="gram-eng">Brazil is the BIGGEST country in South America.</span> <span class="gram-trans">(Brasil é o maior país da América do Sul.)</span></li><li>Brazil is the RICHEST country among Argentina &amp; Chile.</li><li>She is the SMARTEST student in the class.</li><li>Mount Everest is the HIGHEST mountain in the world.</li></ul><h5 class="gram-subhead">COM ADJETIVOS LONGOS (MOST):</h5><ul class="gram-bullets"><li><span class="gram-eng">That store is the MOST EXPENSIVE one in the city.</span> <span class="gram-trans">(Aquela loja é a mais cara da cidade.)</span></li><li>This is the MOST INTERESTING book I\'ve ever read.</li><li>She is the MOST BEAUTIFUL person here.</li></ul><h5 class="gram-subhead">COM ADJETIVOS IRREGULARES:</h5><ul class="gram-bullets"><li><span class="gram-eng">He is the BEST teacher in the school.</span> <span class="gram-trans">(Ele é o melhor professor da escola.)</span></li><li><span class="gram-eng">This is the WORST movie of the year.</span> <span class="gram-trans">(Este é o pior filme do ano.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>SEMPRE use o artigo "THE" antes do superlativo: ❌ She is biggest student in class. ✔️ She is THE biggest student in class.</li></ul><ul class="gram-bullets"><li>Regras de ortografia para -EST: - Terminados em -E: apenas adicione -ST (large → largest) - Consoante-vogal-consoante: dobre a consoante (big → biggest) - Consoante + Y: troque Y por -IEST (happy → happiest)</li></ul><ul class="gram-bullets"><li>Use IN para lugares e OF para grupos: - The tallest building IN the city. - The best student OF the class.</li></ul><ul class="gram-bullets"><li>Comparativo vs Superlativo: - COMPARATIVO (2 itens): bigger THAN, more expensive THAN - SUPERLATIVO (3+ itens): THE biggest, THE most expensive</li></ul></div></div>'},
