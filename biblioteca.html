{order:1010,badge:'U10',topic:'FUTURE CONTINUOUS (Futuro Contínuo)',book:'Green book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>O FUTURE CONTINUOUS (Futuro Contínuo) é um tempo verbal usado para falar<br>de ações que ESTARÃO EM ANDAMENTO em um momento específico no FUTURO.</p><p>Em português, equivale a: "estarei + fazendo", "estarão + comendo", etc.</p><p>Diferente do Simple Future (que indica uma ação simples no futuro), o<br>Future Continuous enfatiza a CONTINUIDADE da ação durante um momento<br>futuro.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">ESTRUTURA BÁSICA:</h5><p>SUJEITO + WILL + BE + VERBO + ING + COMPLEMENTO</p><h5 class="gram-subhead">FORMA NEGATIVA:</h5><p>SUJEITO + WILL + NOT (WON\'T) + BE + VERBO + ING</p><h5 class="gram-subhead">FORMA INTERROGATIVA:</h5><p>WILL + SUJEITO + BE + VERBO + ING ?</p><h5 class="gram-subhead">EXPRESSÕES DE TEMPO TÍPICAS:</h5><ul class="gram-bullets"><li>AT this time tomorrow</li><li>THIS time next year</li><li>AT 8 PM tomorrow</li><li>DURING the next class</li><li>WHEN you arrive</li><li>IN ten years</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">AÇÕES EM ANDAMENTO NO FUTURO:</h5><ul class="gram-bullets"><li><span class="gram-eng">At this time tomorrow, I will be flying to Paris.</span> <span class="gram-trans">(A esta hora amanhã, estarei voando para Paris.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Next month, she will be studying in London.</span> <span class="gram-trans">(No próximo mês, ela estará estudando em Londres.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">In ten years, we will be living on Mars.</span> <span class="gram-trans">(Em dez anos, estaremos vivendo em Marte.)</span></li></ul><h5 class="gram-subhead">NEGATIVAS:</h5><ul class="gram-bullets"><li><span class="gram-eng">I won\'t be working tomorrow at 3 PM.</span> <span class="gram-trans">(Não estarei trabalhando amanhã às 15h.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She won\'t be attending the meeting.</span> <span class="gram-trans">(Ela não estará participando da reunião.)</span></li></ul><h5 class="gram-subhead">INTERROGATIVAS:</h5><ul class="gram-bullets"><li><span class="gram-eng">Will you be using your car tomorrow?</span> <span class="gram-trans">(Você estará usando seu carro amanhã?)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Will they be working on Sunday?</span> <span class="gram-trans">(Eles estarão trabalhando no domingo?)</span></li></ul><h5 class="gram-subhead">EM PREVISÕES DE LONGO PRAZO:</h5><ul class="gram-bullets"><li><span class="gram-eng">In 50 years, scientists will be making important discoveries.</span> <span class="gram-trans">(Em 50 anos, cientistas estarão fazendo descobertas importantes.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">In the future, robots will be doing many tasks.</span> <span class="gram-trans">(No futuro, robôs estarão fazendo muitas tarefas.)</span></li></ul><h5 class="gram-subhead">PARA PEDIDOS EDUCADOS (uso especial):</h5><ul class="gram-bullets"><li><span class="gram-eng">Will you be using the bathroom soon?</span> <span class="gram-trans">(Você vai usar o banheiro logo? - pergunta educada)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">Will you be needing anything else?</span> <span class="gram-trans">(Você vai precisar de mais alguma coisa?)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>COMPARAÇÃO entre SIMPLE FUTURE e FUTURE CONTINUOUS:</li></ul><p>Estrutura | O que indica<br>─────────────────────|──────────────────────────────────<br>Will + verb | Ação simples no futuro<br>Will be + V-ing | Ação EM ANDAMENTO no futuro</p><ul class="gram-bullets"><li><span class="gram-eng">EXEMPLOS COMPARATIVOS: - "Tomorrow, I will eat lunch." (vou almoçar - momento específico) - "Tomorrow at noon, I will BE EATING lunch."</span> <span class="gram-trans">(estarei almoçando neste momento)</span></li></ul><ul class="gram-bullets"><li>FORMA CONTRAÍDA comum: - I will be → I\'ll be - She will be → She\'ll be - They will be → They\'ll be - I will not → I won\'t</li></ul><ul class="gram-bullets"><li>REGRA-CHAVE para FORMAR o Future Continuous: - Sempre WILL + BE + verbo-ING - Independente do sujeito (I, you, he, she, it, we, they)</li></ul><ul class="gram-bullets"><li>Verbos de ESTADO geralmente NÃO usam future continuous: ❌ I will be knowing the answer. ✔️ I will know the answer.</li></ul><p>Verbos como: know, believe, understand, love, hate, want geralmente<br>ficam no Simple Future.</p><ul class="gram-bullets"><li>Use FUTURE CONTINUOUS para: - Ações longas/contínuas no futuro - Atividades já planejadas com horário específico - Pedidos polidos (Will you be needing anything?) - Previsões sobre o futuro distante</li></ul><ul class="gram-bullets"><li>EXPRESSÕES de tempo característicos: - "This time next year, I will be living in Spain." - "At 7 PM tomorrow, we will be having dinner." - "During the meeting, he will be presenting."</li></ul><ul class="gram-bullets"><li>Comparação completa dos FUTUROS em inglês:</li></ul><p>Tempo | Estrutura | Uso<br>───────────────────────|───────────────────────|──────────────────<br>Simple Future | will + verb | Decisão/previsão<br>Be going to | am/is/are going to V | Plano firme<br>Present Continuous | am/is/are + V-ing | Plano arranjado<br>Future Continuous | will be + V-ing | Em andamento no futuro<br>Future Perfect | will have + p. part. | Completado no futuro</p></div></div>'},
{order:1014,badge:'U14',topic:'DEFINING AND NON-DEFINING RELATIVE CLAUSES',book:'Green book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>RELATIVE CLAUSES (Orações Relativas) podem ser de DOIS TIPOS, e a diferença<br>muda completamente o significado e a pontuação:</p><p>1) DEFINING RELATIVE CLAUSES (Restritivas)<br>IDENTIFICAM ou DEFINEM o substantivo de forma essencial. Sem elas, a<br>frase fica vaga ou perde sentido.<br>SEM VÍRGULAS.</p><p>2) NON-DEFINING RELATIVE CLAUSES (Não-Restritivas)<br>Adicionam informação EXTRA sobre o substantivo, mas a informação NÃO<br>é essencial para identificá-lo.<br>COM VÍRGULAS.</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">DEFINING (essencial - SEM vírgulas):</h5><p>Substantivo + WHO/WHICH/THAT + oração + ...</p><ul class="gram-bullets"><li>WHO/THAT → pessoas</li><li>WHICH/THAT → coisas</li><li>Pode usar THAT</li><li>Pode OMITIR o pronome quando é objeto</li></ul><h5 class="gram-subhead">NON-DEFINING (extra info - COM vírgulas):</h5><p>Substantivo, + WHO/WHICH + oração, + ...</p><ul class="gram-bullets"><li>WHO → pessoas</li><li>WHICH → coisas</li><li>NÃO pode usar THAT</li><li>NÃO pode omitir o pronome</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">DEFINING RELATIVE CLAUSES (essenciais - sem vírgulas):</h5><ul class="gram-bullets"><li>The director who made Inception is Christopher Nolan. (O diretor QUE fez Inception é o Christopher Nolan.) → "who made Inception" identifica QUAL diretor.</li></ul><ul class="gram-bullets"><li>The movie that I watched yesterday was amazing. (O filme QUE eu assisti ontem foi incrível.) → identifica QUAL filme.</li></ul><ul class="gram-bullets"><li>People who work in films have an exciting career. (Pessoas QUE trabalham em filmes têm uma carreira emocionante.) → identifica QUE TIPO de pessoas.</li></ul><h5 class="gram-subhead">NON-DEFINING RELATIVE CLAUSES (extras - com vírgulas):</h5><ul class="gram-bullets"><li>Christopher Nolan, who is a famous director, made Inception. (Christopher Nolan, QUE é um famoso diretor, fez Inception.) → A informação extra não muda quem é Christopher Nolan.</li></ul><ul class="gram-bullets"><li><span class="gram-eng">The Avengers, which was a huge success, made millions.</span> <span class="gram-trans">(Os Vingadores, QUE foi um sucesso enorme, faturou milhões.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">My favorite actor, who lives in Hollywood, is very talented.</span> <span class="gram-trans">(Meu ator favorito, QUE mora em Hollywood, é muito talentoso.)</span></li></ul><h5 class="gram-subhead">COMPARANDO OS DOIS TIPOS:</h5><p>DEFINING (essencial):<br>"The student who got an A passed the test."<br>(Há vários estudantes; this one specific student passed.)</p><p>NON-DEFINING (extra):<br>"Maria, who got an A, passed the test."<br>(Já sabemos quem é Maria; a informação extra é adicional.)</p></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>REGRA-CHAVE - como SABER se é defining ou non-defining:</li></ul><p>TESTE: Se você REMOVER a oração, a frase ainda faz sentido claro?<br>- SE SIM → non-defining (use vírgulas, use WHICH/WHO)<br>- SE NÃO → defining (sem vírgulas, pode usar THAT)</p><ul class="gram-bullets"><li>PRONOMES por tipo:</li></ul><p>Tipo | Pessoas | Coisas | Pode OMITIR?<br>────────────────|────────────|──────────────|──────────────<br>Defining | who/that | which/that | sim (se objeto)<br>Non-defining | who | which | NÃO</p><ul class="gram-bullets"><li>ATENÇÃO: em non-defining clauses, NÃO use "that": ❌ My brother, that lives in NY, called. ✔️ My brother, who lives in NY, called.</li></ul><ul class="gram-bullets"><li>OMISSÃO em defining clauses (quando é OBJETO): - "The movie THAT I watched..." = "The movie I watched..." - "The book WHICH you gave me..." = "The book you gave me..."</li></ul><ul class="gram-bullets"><li>EXEMPLOS COMPLETOS - perceba a DIFERENÇA DE SIGNIFICADO:</li></ul><p>Defining (sem vírgulas):<br>"My sister who lives in Paris is a doctor."<br>(Tenho várias irmãs; estou me referindo à que mora em Paris.)</p><p>Non-defining (com vírgulas):<br>"My sister, who lives in Paris, is a doctor."<br>(Tenho apenas uma irmã; ela mora em Paris.)</p><ul class="gram-bullets"><li>Para CARREIRAS CRIATIVAS (foco desta unidade): - "An actor is someone who performs in movies." - "A director is the person who controls the production." - "A film, which can be a movie or a short, is created by a team."</li></ul><ul class="gram-bullets"><li><span class="gram-eng">NON-DEFINING CLAUSES com "WHICH" referindo-se à FRASE INTEIRA: - "She got the leading role, WHICH made her very happy."</span> <span class="gram-trans">(Aqui "which" se refere ao FATO de ela ter conseguido o papel.)</span></li></ul><ul class="gram-bullets"><li>PONTUAÇÃO - regra mais importante: - DEFINING: ___ que ___ → sem vírgulas - NON-DEFINING: ___, que ___, ___ → com vírgulas</li></ul></div></div>'},
{order:1016,badge:'U16',topic:'GOALS WITH FUTURE PERFECT & WOULD LIKE TO HAVE + PAST',book:'Green book',ref:'',html:'<div class="gram-section gram-section-explicacao"><div class="gram-section-head"><span class="gram-section-icon">📖</span><span class="gram-section-title">Explicação</span></div><div class="gram-section-body"><p>Esta unidade final apresenta duas estruturas para falar sobre OBJETIVOS,<br>METAS e DESEJOS:</p><p>1) FUTURE PERFECT (já estudado) - para metas alcançáveis até um momento<br>futuro específico.</p><p>2) WOULD LIKE TO HAVE + PAST PARTICIPLE - para desejos NÃO REALIZADOS<br>sobre o passado (algo que gostaríamos de ter feito, mas não fizemos).</p></div></div><div class="gram-section gram-section-estrutura"><div class="gram-section-head"><span class="gram-section-icon">🔧</span><span class="gram-section-title">Estrutura</span></div><div class="gram-section-body"><h5 class="gram-subhead">FUTURE PERFECT (metas alcançáveis no futuro):</h5><p>SUJEITO + WILL HAVE + PAST PARTICIPLE + COMPLEMENTO + BY + tempo</p><h5 class="gram-subhead">WOULD LIKE TO HAVE + PAST PARTICIPLE (desejos não realizados):</h5><p>SUJEITO + WOULD LIKE TO HAVE + past participle + complemento</p><p>Equivale a: "Eu gostaria de ter feito X (mas não fiz)."</p><h5 class="gram-subhead">EXPRESSÕES TÍPICAS:</h5><ul class="gram-bullets"><li><span class="gram-eng">BY 2030</span> <span class="gram-trans">(até 2030)</span></li><li><span class="gram-eng">BY THE TIME I\'M 40</span> <span class="gram-trans">(quando eu tiver 40)</span></li><li>IN 10 YEARS</li><li>ONE DAY (algum dia)</li></ul></div></div><div class="gram-section gram-section-exemplos"><div class="gram-section-head"><span class="gram-section-icon">✅</span><span class="gram-section-title">Exemplos</span></div><div class="gram-section-body"><h5 class="gram-subhead">METAS COM FUTURE PERFECT:</h5><ul class="gram-bullets"><li><span class="gram-eng">By the time I\'m 30, I will have finished my master\'s degree.</span> <span class="gram-trans">(Quando eu tiver 30 anos, terei terminado meu mestrado.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">By 2030, we will have explored more of the universe.</span> <span class="gram-trans">(Até 2030, teremos explorado mais do universo.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">In 5 years, she will have saved enough money to buy a house.</span> <span class="gram-trans">(Em 5 anos, ela terá economizado dinheiro suficiente para comprar uma casa.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">By next summer, they will have moved to a new country.</span> <span class="gram-trans">(Até o próximo verão, eles terão se mudado para um novo país.)</span></li></ul><h5 class="gram-subhead">DESEJOS NÃO REALIZADOS (would like to have + past participle):</h5><ul class="gram-bullets"><li><span class="gram-eng">I would like to have traveled more when I was young.</span> <span class="gram-trans">(Eu gostaria de ter viajado mais quando era jovem.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">She would like to have studied abroad.</span> <span class="gram-trans">(Ela gostaria de ter estudado fora.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">He would like to have spent more time with his family.</span> <span class="gram-trans">(Ele gostaria de ter passado mais tempo com a família.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">We would like to have learned to play an instrument.</span> <span class="gram-trans">(Nós gostaríamos de ter aprendido a tocar um instrumento.)</span></li></ul><h5 class="gram-subhead">COMBINANDO OS DOIS - METAS E ARREPENDIMENTOS:</h5><ul class="gram-bullets"><li><span class="gram-eng">I would like to have learned Spanish when I was young, but by the time I\'m 40, I will have mastered the language.</span> <span class="gram-trans">(Eu gostaria de ter aprendido espanhol quando era jovem, mas quando eu tiver 40 anos, terei dominado o idioma.)</span></li></ul><h5 class="gram-subhead">FALANDO DE GRANDES OBJETIVOS DE VIDA:</h5><ul class="gram-bullets"><li><span class="gram-eng">By the end of this decade, scientists will have found new treatments for cancer.</span> <span class="gram-trans">(Até o fim desta década, cientistas terão encontrado novos tratamentos para o câncer.)</span></li></ul><ul class="gram-bullets"><li><span class="gram-eng">I would like to have written a book by now.</span> <span class="gram-trans">(Eu gostaria de ter escrito um livro até agora.)</span></li></ul></div></div><div class="gram-section gram-section-observacoes"><div class="gram-section-head"><span class="gram-section-icon">💡</span><span class="gram-section-title">Observações</span></div><div class="gram-section-body"><ul class="gram-bullets"><li>DIFERENÇA entre as duas estruturas:</li></ul><p>Estrutura | Significado<br>────────────────────────────────|──────────────────────────────<br>Will have + past participle | Meta FUTURA alcançável<br>Would like to have + p. part. | Desejo PASSADO não realizado</p><ul class="gram-bullets"><li><span class="gram-eng">"WOULD LIKE TO HAVE + past participle" expressa ARREPENDIMENTO: - "I would like to have visited Japan."</span> <span class="gram-trans">(Implica: eu não visitei, mas teria gostado.)</span></li></ul><ul class="gram-bullets"><li>Forma contraída em conversação: - I would → I\'d - "I\'d like to have done it." (informal)</li></ul><ul class="gram-bullets"><li>EXPRESSÕES para conversar sobre METAS DE VIDA: - "My goal is to..." - "I hope to have + past participle... by..." - "I aim to..." - "I want to achieve..." - "By the time I\'m X, I will have..."</li></ul><ul class="gram-bullets"><li>EXPRESSÕES para falar de ARREPENDIMENTOS: - "I wish I had + past participle..." - "I should have + past participle..." - "If only I had + past participle..." - "I would like to have + past participle..."</li></ul><ul class="gram-bullets"><li>FRASES INSPIRADORAS típicas dessa unidade: - "Never stop dreaming." - "Set goals, achieve them." - "Reach for the stars." - "Never give up on your dreams."</li></ul><ul class="gram-bullets"><li>Como ESTRUTURAR uma redação sobre metas: 1) Primeiro, fale do passado: "I would like to have done X..." 2) Depois, do presente: "Now, I am working hard..." 3) Por fim, do futuro: "By the time I\'m 40, I will have achieved..."</li></ul><ul class="gram-bullets"><li>ATENÇÃO ao PAST PARTICIPLE: - Verbos regulares: -ED (finished, completed, learned) - Verbos irregulares: 3ª coluna (gone, seen, written, done)</li></ul><ul class="gram-bullets"><li>Como ALTERNATIVA, podemos usar: - "I HOPE TO HAVE + past participle" (espero ter feito) "I hope to have finished my book by next year." - "I PLAN TO HAVE + past participle" "I plan to have saved enough money by then."</li></ul><ul class="gram-bullets"><li>REFLEXÃO FINAL - este tópico é uma ÓTIMA conclusão para o curso, pois permite que o aluno fale sobre: - O que JÁ aconteceu na vida dele - O que ele DESEJARIA ter feito - O que ele PRETENDE alcançar no futuro Combinando praticamente todos os tempos verbais aprendidos!</li></ul></div></div>'}
],
};
</script>
<script>
let currentLevel = 'intro';
let currentView = 'curriculum';
let scrollObserver = null;
const LEVEL_NAMES = { intro: 'Intro', lvl1: 'Level 1', lvl2: 'Level 2', lvl3: 'Level 3' };
const LEVEL_BOOK_TAGS = { intro: 'Interchange Intro', lvl1: 'Interchange 1 (Red)', lvl2: 'Interchange 2 (Blue)', lvl3: 'Interchange 3 (Green)' };
const LEVEL_BOOK_IMG = { intro: 'img/books/interchange-intro.jpg', lvl1: 'img/books/interchange-1.jpg', lvl2: 'img/books/interchange-2.jpg', lvl3: 'img/books/interchange-3.jpg' };
const WS_KEYS = { intro: 'intro', lvl1: 'level1', lvl2: 'level2', lvl3: 'level3' };
let curCarouselState = { index: 0, total: 0 };

function setLevel(level) {
  currentLevel = level;
  document.querySelectorAll('.j-step').forEach(s => s.classList.toggle('active', s.dataset.level === level));
  render();
}
function setView(view) {
  currentView = view;
  document.querySelectorAll('.bib-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  document.querySelectorAll('.bib-view').forEach(v => v.classList.remove('active'));
  document.getElementById('v-' + view).classList.add('active');
  render();
}

function setupObserver() {
  if (scrollObserver) scrollObserver.disconnect();
  scrollObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
        scrollObserver.unobserve(entry.target);
      }
    });
  }, { rootMargin: '0px 0px -8% 0px', threshold: 0.08 });
  document.querySelectorAll('.ws-card, .gram-item').forEach(el => scrollObserver.observe(el));
}

function render() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  if (currentView === 'curriculum') renderCurriculum(search);
  else if (currentView === 'worksheets') renderWorksheets();
  else renderExamples(search);
  // Small delay so DOM is ready
  setTimeout(setupObserver, 30);
}

// === CURRICULUM: carrossel horizontal com zigzag ===
function renderCurriculum(search) {
  const items = curriculum[currentLevel] || [];
  const filtered = search
    ? items.filter(u => (u.u + ' ' + u.t + ' ' + u.v + ' ' + u.g + ' ' + u.o + ' ' + u.w).toLowerCase().includes(search))
    : items;
  const div = document.getElementById('v-curriculum');

  if (!filtered.length) {
    div.innerHTML = emptyState('📋', 'Nenhuma unidade encontrada com esses termos.');
    return;
  }

  const intro = '<div class="view-intro">' +
    '<div class="view-intro-eyebrow">' + LEVEL_BOOK_TAGS[currentLevel] + '</div>' +
    '<h2>16 unidades, uma <em>jornada</em></h2>' +
    '<p>Acompanhe a progressão do livro unidade por unidade — vocabulário, gramática, objetivos comunicativos e a writing prevista para cada uma. Use as setas, os pontos abaixo ou arraste para navegar.</p>' +
  '</div>';

  const bookImg = LEVEL_BOOK_IMG[currentLevel] || LEVEL_BOOK_IMG.intro;
  const bookAlt = LEVEL_BOOK_TAGS[currentLevel] || '';

  const slidesHtml = filtered.map(u => {
    return '<div class="cur-slide">' +
      '<div class="cur-row">' +
        '<div class="cur-row-img">' +
          '<div class="cur-book-stage">' +
            '<img src="' + bookImg + '" alt="' + escapeHtml(bookAlt) + '" loading="lazy">' +
            '<div class="cur-unit-badge">' +
              '<span class="cur-unit-badge-label">Unit</span>' +
              '<span class="cur-unit-badge-num">' + String(u.u).padStart(2,'0') + '</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="cur-row-info">' +
          '<div class="cur-info-head">' +
            '<span class="cur-unit-tag">Unidade ' + u.u + ' de ' + items.length + '</span>' +
            '<h3 class="cur-title">' + escapeHtml(u.t) + '</h3>' +
          '</div>' +
          '<div class="cur-meta-row">' +
            '<div class="cur-meta-item"><span class="cur-meta-icon voc">V</span><div class="cur-meta-text"><strong>Vocabulário</strong>' + escapeHtml(u.v) + '</div></div>' +
            '<div class="cur-meta-item"><span class="cur-meta-icon gra">G</span><div class="cur-meta-text"><strong>Gramática</strong>' + escapeHtml(u.g) + '</div></div>' +
            '<div class="cur-meta-item"><span class="cur-meta-icon obj">O</span><div class="cur-meta-text"><strong>Objetivos</strong>' + escapeHtml(u.o) + '</div></div>' +
            (u.w ? '<div class="cur-meta-item"><span class="cur-meta-icon wri">W</span><div class="cur-meta-text"><strong>Writing</strong>' + escapeHtml(u.w) + '</div></div>' : '') +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  const dotsHtml = filtered.map((u, i) =>
    '<button class="cur-dot' + (i === 0 ? ' active' : '') + '" data-cur-go="' + i + '" type="button" aria-label="Ir para unidade ' + u.u + '"></button>'
  ).join('');

  div.innerHTML = intro +
    '<div class="cur-carousel" data-level="' + currentLevel + '">' +
      '<div class="cur-viewport">' +
        '<div class="cur-track">' + slidesHtml + '</div>' +
      '</div>' +
      '<button class="cur-nav cur-nav-prev" type="button" aria-label="Unidade anterior" data-cur-prev>' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>' +
      '</button>' +
      '<button class="cur-nav cur-nav-next" type="button" aria-label="Próxima unidade" data-cur-next>' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>' +
      '</button>' +
      '<div class="cur-progress">' +
        '<div class="cur-progress-info">' +
          '<span>Unit <strong id="curProgressNow">1</strong></span>' +
          '<span class="cur-progress-sep"></span>' +
          '<span>de ' + filtered.length + '</span>' +
        '</div>' +
        '<div class="cur-dots">' + dotsHtml + '</div>' +
      '</div>' +
    '</div>';

  curCarouselState = { index: 0, total: filtered.length };
  updateCarousel();
  attachCarouselSwipe();
}

function updateCarousel() {
  const track = document.querySelector('.cur-track');
  if (!track) return;
  const { index, total } = curCarouselState;
  track.style.transform = 'translateX(-' + (index * 100) + '%)';

  document.querySelectorAll('.cur-dot').forEach((d, i) => d.classList.toggle('active', i === index));
  const prev = document.querySelector('[data-cur-prev]');
  const next = document.querySelector('[data-cur-next]');
  if (prev) prev.disabled = index === 0;
  if (next) next.disabled = index >= total - 1;
  const progress = document.getElementById('curProgressNow');
  if (progress) progress.textContent = index + 1;
}

function goCarousel(idx) {
  const { total } = curCarouselState;
  if (idx < 0) idx = 0;
  if (idx >= total) idx = total - 1;
  curCarouselState.index = idx;
  updateCarousel();
}

function attachCarouselSwipe() {
  const viewport = document.querySelector('.cur-viewport');
  if (!viewport) return;
  let startX = 0, startY = 0, deltaX = 0, deltaY = 0, swiping = false;

  viewport.addEventListener('touchstart', (e) => {
    if (!e.touches[0]) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    deltaX = 0; deltaY = 0; swiping = true;
  }, { passive: true });

  viewport.addEventListener('touchmove', (e) => {
    if (!swiping || !e.touches[0]) return;
    deltaX = e.touches[0].clientX - startX;
    deltaY = e.touches[0].clientY - startY;
  }, { passive: true });

  viewport.addEventListener('touchend', () => {
    if (!swiping) return;
    swiping = false;
    // só conta como swipe se foi mais horizontal que vertical e passou de 50px
    if (Math.abs(deltaX) > 50 && Math.abs(deltaX) > Math.abs(deltaY)) {
      if (deltaX < 0) goCarousel(curCarouselState.index + 1);
      else goCarousel(curCarouselState.index - 1);
    }
  });
}

// === WORKSHEETS: grade timeline ===
function renderWorksheets() {
  const levelKey = WS_KEYS[currentLevel] || 'intro';
  const levelName = LEVEL_NAMES[currentLevel] || '';
  const div = document.getElementById('v-worksheets');

  const intro = '<div class="view-intro">' +
    '<div class="view-intro-eyebrow">' + LEVEL_BOOK_TAGS[currentLevel] + '</div>' +
    '<h2>Worksheets <em>completos</em> — Units 1 a 16</h2>' +
    '<p>Baixe ou copie o link de cada worksheet. Use diretamente em aula ou envie para seus alunos.</p>' +
  '</div>';

  let cards = '';
  for (let i = 1; i <= 16; i++) {
    const path = STORAGE + '/' + levelKey + '/unit-' + String(i).padStart(2,'0') + '.pdf';
    cards += '<div class="ws-card" data-level="' + currentLevel + '">' +
      '<div class="ws-num-wrap">' + i + '</div>' +
      '<div class="ws-label">Unit ' + i + ' · ' + levelName + '</div>' +
      '<div class="ws-actions">' +
        '<a href="' + path + '" target="_blank" rel="noopener" class="ws-btn ws-dl">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
          'Baixar' +
        '</a>' +
        '<button class="ws-btn ws-copy" data-copy="' + path + '" type="button">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
          'Copiar' +
        '</button>' +
      '</div>' +
    '</div>';
  }

  div.innerHTML = intro + '<div class="ws-timeline">' + cards + '</div>';
}

// === EXAMPLES: timeline vertical com cards ===
function renderExamples(search) {
  const items = examples[currentLevel] || [];
  let filtered = search
    ? items.filter(ex => (ex.topic + ' ' + ex.html).toLowerCase().includes(search))
    : items;
  filtered = [...filtered].sort((a,b) => (a.order||0) - (b.order||0));
  const div = document.getElementById('v-examples');

  if (!filtered.length) {
    div.innerHTML = emptyState('💡', 'Nenhum exemplo de gramática encontrado.');
    return;
  }

  const intro = '<div class="view-intro">' +
    '<div class="view-intro-eyebrow">' + LEVEL_BOOK_TAGS[currentLevel] + '</div>' +
    '<h2>Explicações <em>gramaticais</em> por página</h2>' +
    '<p>Clique em cada conceito para ver a explicação completa com exemplos em português e inglês.</p>' +
  '</div>';

  const itemsHtml = filtered.map((ex, idx) => {
    const topic = (ex.topic || 'Conceito').replace(/<[^>]+>/g, '').slice(0, 100);
    const badge = ex.badge || (ex.page ? String(ex.page) : '—');
    const isUnit = /^U\d+/.test(badge);
    const label = isUnit ? 'UNIT' : 'PÁG';
    const numText = isUnit ? badge.replace(/^U/, '') : badge;
    return '<div class="gram-item">' +
      '<div class="gram-card" data-gram-idx="' + idx + '">' +
        '<div class="gram-page-badge"><div class="gram-page-label">' + label + '</div><div class="gram-page-num">' + escapeHtml(numText) + '</div></div>' +
        '<div class="gram-card-body">' +
          '<div class="gram-topic">' + escapeHtml(topic) + '</div>' +
          '<div class="gram-book-tag">' + escapeHtml(ex.book || LEVEL_NAMES[currentLevel]) + '</div>' +
        '</div>' +
        '<div class="gram-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>' +
      '</div>' +
    '</div>';
  }).join('');

  div.innerHTML = intro + '<div class="gram-timeline" data-level="' + currentLevel + '">' + itemsHtml + '</div>';
  window._filteredExamples = filtered;
}

function emptyState(icon, msg) {
  return '<div class="bib-empty"><div class="bib-empty-icon">' + icon + '</div><p>' + msg + '</p></div>';
}

function openGram(idx) {
  const ex = window._filteredExamples[idx];
  if (!ex) return;
  window._currentGramEx = ex;
  window._currentGramLevel = currentLevel;
  const topic = (ex.topic || '').replace(/<[^>]+>/g, '');
  document.getElementById('gramTitle').textContent = topic;
  // Texto da meta: prefere ref ("Intro - pg. 3"), senão monta a partir do badge
  let metaText;
  if (ex.ref) {
    metaText = ex.ref;
  } else {
    const badge = ex.badge || ex.page || '';
    const isUnit = /^U\d+/.test(String(badge));
    const prefix = isUnit ? 'Unit ' + String(badge).replace(/^U/, '') : 'Página ' + badge;
    metaText = prefix + ' · ' + (ex.book || LEVEL_NAMES[currentLevel]);
  }
  document.getElementById('gramMeta').innerHTML =
    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>' +
    '<span>' + escapeHtml(metaText) + '</span>';
  document.getElementById('gramBody').innerHTML = ex.html;
  // Color the modal head by level
  const head = document.getElementById('gramHead');
  const colors = {
    intro: ['#fbbf24', '#f59a1e'],
    lvl1: ['#f87171', '#dc2626'],
    lvl2: ['#60a5fa', '#2563eb'],
    lvl3: ['#6ee7b7', '#059669']
  };
  const [c1, c2] = colors[currentLevel] || ['#3b82f6', '#1d4ed8'];
  head.style.background = 'linear-gradient(135deg, ' + c2 + ' 0%, ' + c1 + ' 100%)';
  // Setar cor de destaque para subheads e bullets dentro do modal
  document.getElementById('gramBody').style.setProperty('--lvl-color-modal', c2);
  // Resetar estado do botão de download
  const dlBtn = document.getElementById('gramDownloadBtn');
  if (dlBtn) {
    dlBtn.disabled = false;
    dlBtn.classList.remove('is-loading', 'is-success');
    const lbl = dlBtn.querySelector('.modal-download-label');
    if (lbl) lbl.textContent = 'Baixar';
  }
  document.getElementById('gramModal').classList.add('open');
}

// Slugify para nome de arquivo: remove acentos/símbolos
function slugify(s) {
  return (s || 'card')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '')
    .slice(0, 60);
}

// Baixa o card de gramática atual como imagem PNG
async function downloadGramAsPNG() {
  if (typeof html2canvas === 'undefined') {
    showToast('Aguarde, carregando biblioteca...');
    return;
  }
  const ex = window._currentGramEx;
  if (!ex) return;

  const dlBtn = document.getElementById('gramDownloadBtn');
  const lbl = dlBtn.querySelector('.modal-download-label');
  // Feedback: estado "gerando"
  dlBtn.disabled = true;
  dlBtn.classList.add('is-loading');
  dlBtn.classList.remove('is-success');
  if (lbl) lbl.textContent = 'Gerando…';

  // Elemento a capturar: o modal-box inteiro
  const modalBox = document.querySelector('#gramModal .modal-box');
  const modalBody = document.getElementById('gramBody');

  // Salvar estados a restaurar depois
  const closeBtn = document.getElementById('gramCloseBtn');
  const prevBodyMaxH = modalBody.style.maxHeight;
  const prevBodyOverflow = modalBody.style.overflowY;
  const prevBoxMaxH = modalBox.style.maxHeight;
  const prevBoxHeight = modalBox.style.height;
  const dlPrevDisplay = dlBtn.style.display;
  const closePrevDisplay = closeBtn.style.display;

  // Para a captura: esconder botões e expandir o corpo
  dlBtn.style.display = 'none';
  closeBtn.style.display = 'none';
  modalBody.style.maxHeight = 'none';
  modalBody.style.overflowY = 'visible';
  modalBox.style.maxHeight = 'none';
  modalBox.style.height = 'auto';

  try {
    // Pequena pausa para o layout reagir
    await new Promise(r => setTimeout(r, 60));

    const canvas = await html2canvas(modalBox, {
      backgroundColor: '#ffffff',
      scale: 2,            // 2x para alta resolução
      useCORS: true,
      logging: false,
      windowWidth: modalBox.scrollWidth,
      windowHeight: modalBox.scrollHeight
    });

    // Gerar nome de arquivo
    const topic = (ex.topic || 'card').replace(/<[^>]+>/g, '');
    const levelTag = window._currentGramLevel || '';
    const filename = 'gramatica-' + slugify(topic) + (levelTag ? '-' + slugify(levelTag) : '') + '.png';

    // Baixar
    const link = document.createElement('a');
    link.download = filename;
    link.href = canvas.toDataURL('image/png');
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    // Feedback: sucesso
    dlBtn.classList.remove('is-loading');
    dlBtn.classList.add('is-success');
    if (lbl) lbl.textContent = 'Baixado ✓';
    setTimeout(() => {
      dlBtn.classList.remove('is-success');
      dlBtn.disabled = false;
      if (lbl) lbl.textContent = 'Baixar';
    }, 2200);
  } catch (err) {
    console.error('Erro ao gerar PNG:', err);
    dlBtn.classList.remove('is-loading');
    if (lbl) lbl.textContent = 'Erro — tentar de novo';
    dlBtn.disabled = false;
    showToast('Não foi possível gerar a imagem.');
  } finally {
    // Restaurar estados
    dlBtn.style.display = dlPrevDisplay;
    closeBtn.style.display = closePrevDisplay;
    modalBody.style.maxHeight = prevBodyMaxH;
    modalBody.style.overflowY = prevBodyOverflow;
    modalBox.style.maxHeight = prevBoxMaxH;
    modalBox.style.height = prevBoxHeight;
  }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'bib-toast';
  t.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' + msg;
  document.body.appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity 0.3s, transform 0.3s';
    t.style.opacity = '0';
    t.style.transform = 'translateY(10px)';
    setTimeout(() => t.remove(), 320);
  }, 2400);
}

function escapeHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ═══ EVENT DELEGATION ═══
document.addEventListener('click', (e) => {
  // Journey level
  const jStep = e.target.closest('.j-step');
  if (jStep) { setLevel(jStep.dataset.level); return; }
  // Tab
  const tab = e.target.closest('.bib-tab');
  if (tab) { setView(tab.dataset.view); return; }
  // Carrossel currículo: prev
  if (e.target.closest('[data-cur-prev]')) { goCarousel(curCarouselState.index - 1); return; }
  // Carrossel currículo: next
  if (e.target.closest('[data-cur-next]')) { goCarousel(curCarouselState.index + 1); return; }
  // Carrossel currículo: dot (ir direto)
  const curDot = e.target.closest('[data-cur-go]');
  if (curDot) { goCarousel(parseInt(curDot.dataset.curGo, 10)); return; }
  // Copy worksheet link
  const copyBtn = e.target.closest('[data-copy]');
  if (copyBtn) {
    navigator.clipboard.writeText(copyBtn.dataset.copy)
      .then(() => showToast('Link copiado!'))
      .catch(() => showToast('Erro ao copiar.'));
    return;
  }
  // Gram card
  const gramCard = e.target.closest('[data-gram-idx]');
  if (gramCard) { openGram(parseInt(gramCard.dataset.gramIdx)); return; }
  // Modal download (gerar PNG)
  if (e.target.closest('#gramDownloadBtn')) {
    downloadGramAsPNG();
    return;
  }
  // Modal close
  if (e.target.closest('#gramCloseBtn')) {
    document.getElementById('gramModal').classList.remove('open');
    return;
  }
  // Click outside modal box
  if (e.target.id === 'gramModal') {
    document.getElementById('gramModal').classList.remove('open');
  }
});

// Search input
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(window._searchTimer);
  window._searchTimer = setTimeout(render, 180);
});

// Escape to close modal + setas no carrossel
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') document.getElementById('gramModal').classList.remove('open');
  // Setas só navegam o carrossel quando estamos na aba Currículo e modal fechado
  const modalOpen = document.getElementById('gramModal').classList.contains('open');
  const searchFocused = document.activeElement && document.activeElement.id === 'searchInput';
  if (!modalOpen && !searchFocused && currentView === 'curriculum') {
    if (e.key === 'ArrowLeft') { goCarousel(curCarouselState.index - 1); }
    else if (e.key === 'ArrowRight') { goCarousel(curCarouselState.index + 1); }
  }
});

render();
</script>
